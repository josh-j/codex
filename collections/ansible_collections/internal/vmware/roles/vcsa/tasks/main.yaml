---
# internal.vmware.vcsa : tasks/main.yaml

- name: "VCSA | Resolve public interface"
  ansible.builtin.set_fact:
    _ncs_requested_action: "{{ ncs_action | default('audit') }}"
    _ncs_requested_profile: "{{ ncs_profile | default('none') }}"
    _ncs_requested_operation: "none"
  changed_when: false

- name: "VCSA | Backward-compat guard — collect action moved to vcenter_collect role"
  ansible.builtin.fail:
    msg: >-
      The 'collect' action has been moved to the internal.vmware.vcenter_collect role.
      Update your playbook to use 'role: internal.vmware.vcenter_collect' instead of
      'role: internal.vmware.vcsa' with 'ncs_action: collect'.
  when: _ncs_requested_action == 'collect'
  tags: [always]

- name: "VCSA | Validate public interface"
  ansible.builtin.assert:
    that:
      - _ncs_requested_action in ['audit', 'remediate', 'verify', 'collect']
      - (_ncs_requested_profile == 'none') or (_ncs_requested_profile == 'stig')
      - (_ncs_requested_operation == 'none')
      - (_ncs_requested_profile != 'stig') or (_ncs_requested_action in ['audit', 'remediate', 'verify'])
    fail_msg: >-
      Unsupported VCSA role interface:
      action={{ _ncs_requested_action }}, profile={{ _ncs_requested_profile }}, operation={{ _ncs_requested_operation }}.
  changed_when: false

- name: "VCSA STIG | Execute"
  ansible.builtin.include_tasks: stig.yaml
  when: _ncs_requested_profile == 'stig'
  tags: [always]
