---
# internal.vmware.vcsa : tasks/main.yaml

- name: "VCSA | Resolve public interface"
  ansible.builtin.set_fact:
    vcsa_ncs_requested_action: "{{ ncs_action | default('audit') }}"
    vcsa_ncs_requested_profile: "{{ ncs_profile | default('none') }}"
    vcsa_ncs_requested_operation: "none"
  changed_when: false

- name: "VCSA | Validate public interface"
  ansible.builtin.assert:
    that:
      - vcsa_ncs_requested_action in ['collect', 'audit', 'remediate', 'verify']
      - (vcsa_ncs_requested_profile == 'none') or (vcsa_ncs_requested_profile == 'stig')
      - (vcsa_ncs_requested_operation == 'none')
      - (vcsa_ncs_requested_profile != 'stig') or (vcsa_ncs_requested_action in ['audit', 'remediate', 'verify'])
    fail_msg: >-
      Unsupported VCSA role interface:
      action={{ vcsa_ncs_requested_action }}, profile={{ vcsa_ncs_requested_profile }}, operation={{ vcsa_ncs_requested_operation }}.
  changed_when: false

- name: "VCSA | Dispatch"
  module_defaults:
    group/community.vmware.vmware:
      hostname: "{{ _vcenter_hostname }}"
      username: "{{ vmware_username }}"
      password: "{{ vmware_password }}"
      validate_certs: "{{ vmware_validate_certs | default(false) | bool }}"
    vmware.vmware.appliance_info:
      hostname: "{{ _vcenter_hostname }}"
      username: "{{ vmware_username }}"
      password: "{{ vmware_password }}"
      validate_certs: "{{ vmware_validate_certs | default(false) | bool }}"
    vmware.vmware.vcsa_backup_schedule_info:
      hostname: "{{ _vcenter_hostname }}"
      username: "{{ vmware_username }}"
      password: "{{ vmware_password }}"
      validate_certs: "{{ vmware_validate_certs | default(false) | bool }}"
    internal.vmware.vmware_triggered_alarms_info:
      hostname: "{{ _vcenter_hostname }}"
      username: "{{ vmware_username }}"
      password: "{{ vmware_password }}"
      validate_certs: "{{ vmware_validate_certs | default(false) | bool }}"
    internal.core.stig:
      _stig_module_defaults:
        hostname: "{{ _vcenter_hostname }}"
        username: "{{ vmware_username }}"
        password: "{{ vmware_password }}"
        validate_certs: "{{ vmware_validate_certs | default(false) | bool }}"
  block:
    - name: "VCSA | Run dispatcher"
      ansible.builtin.include_tasks:
        file: >-
          {{
            role_path ~ '/tasks/collect.yaml'
            if vcsa_ncs_requested_action == 'collect'
            else role_path ~ '/tasks/stig.yaml'
          }}
