---
# internal.vmware.vcsa : tasks/collect.yaml
# VCSA collection: appliance health, backup schedule, alarms.

- name: Collect | Preflight
  ansible.builtin.include_tasks: preflight.yaml
  tags: [always]

- name: Collect | Save caller role path
  ansible.builtin.set_fact:
    _caller_role_path: "{{ role_path }}"
  changed_when: false

- name: Collect | Initialize Collection State
  block:
    - name: Collect | Bootstrap shared collection state
      ansible.builtin.include_role:
        name: internal.vmware.common
        tasks_from: init_collection
      vars:
        vmware_collection_raw_placeholders:
          _raw_appliance_health: {}
          _raw_appliance_backup: {}
          _raw_alarms: {}
          _raw_datacenters: {}
          _raw_clusters: {}
          _raw_datastores: {}

    - name: Collect | Simulated vCenter State
      ansible.builtin.include_tasks: collect/simulated.yaml
      tags: [collect, simulation]
      when: simulation_mode | default(false) | bool

    - name: Collect | vCenter Infrastructure Inventory
      ansible.builtin.include_tasks: collect/inventory.yaml
      tags: [collect, inventory]
      when:
        - not (simulation_mode | default(false) | bool)
        - vcsa_collect_inventory | default(true) | bool

    - name: Collect | vCenter Appliance State
      ansible.builtin.include_tasks: collect/appliance.yaml
      tags: [collect, infrastructure]
      when:
        - not (simulation_mode | default(false) | bool)
        - vcsa_collect_appliance | default(vcenter_collect_appliance | default(true)) | bool

    - name: Collect | vCenter Active Alarms
      ansible.builtin.include_tasks: collect/alarms.yaml
      tags: [collect, alarms]
      when:
        - not (simulation_mode | default(false) | bool)
        - vcsa_collect_alarms | default(vcenter_collect_alarms | default(true)) | bool

  always:
    - name: Finalize vCenter collection state
      ansible.builtin.include_role:
        name: internal.vmware.common
        tasks_from: finalize_collection
      vars:
        vmware_collection_assemble_task: "{{ _caller_role_path }}/tasks/collect/assemble.yaml"
        vmware_collection_export_task: "{{ _caller_role_path }}/tasks/collect/export.yaml"
