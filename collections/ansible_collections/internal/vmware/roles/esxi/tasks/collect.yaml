---
# internal.vmware.esxi : tasks/collect.yaml
# Collects ESXi infrastructure data: datacenters, clusters, datastores.

- name: ESXi Collect | Save caller role path
  ansible.builtin.set_fact:
    _caller_role_path: "{{ role_path }}"
  changed_when: false

- name: ESXi Collect | Initialize Collection State
  block:
    - name: ESXi Collect | Bootstrap shared collection state
      ansible.builtin.include_role:
        name: internal.vmware.common
        tasks_from: init_collection
      vars:
        vmware_collection_raw_placeholders:
          _raw_datacenters: {}
          _raw_clusters: {}
          _raw_datastores: {}

    - name: ESXi Collect | Simulated State
      ansible.builtin.include_tasks: collect/simulated.yaml
      tags: [collect, simulation]
      when: simulation_mode | default(false) | bool

    - name: ESXi Collect | Inventory State
      ansible.builtin.include_tasks: collect/inventory.yaml
      tags: [collect, inventory]
      when: not (simulation_mode | default(false) | bool)

  always:
    - name: Finalize ESXi collection state
      ansible.builtin.include_role:
        name: internal.vmware.common
        tasks_from: finalize_collection
      vars:
        vmware_collection_assemble_task: "{{ _caller_role_path }}/tasks/collect/assemble.yaml"
        vmware_collection_export_task: "{{ _caller_role_path }}/tasks/collect/export.yaml"
