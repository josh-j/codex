---
# vmware_host_service_manager tasks — wrapped in internal.core.stig

- block:
    # --- V-256400 / ESXI-70-000035: SSH service stopped ---
    - name: "stigrule_256400"
      internal.core.stig:
        service_name: TSM-SSH
        service_policy: "off"
        state: stop

    # --- V-256401 / ESXI-70-000036: ESXi Shell stopped ---
    - name: "stigrule_256401"
      internal.core.stig:
        service_name: TSM
        service_policy: "off"
        state: stop

    # --- V-256435 / ESXI-70-000083: SLPD stopped ---
    - name: "stigrule_256435"
      internal.core.stig:
        service_name: slpd
        service_policy: "off"
        state: stop

    # --- V-256448 / ESXI-70-000097: CIM watchdog stopped ---
    - name: "stigrule_256448"
      internal.core.stig:
        service_name: sfcbd-watchdog
        service_policy: "off"
        state: stop

  module_defaults:
    internal.core.stig:
      _stig_apply: community.vmware.vmware_host_service_manager
      esxi_hostname: "{{ _current_esxi_host }}"
      hostname: "{{ _vcenter_hostname }}"
      username: "{{ vmware_username }}"
      password: "{{ vmware_password }}"
      validate_certs: "{{ vmware_validate_certs | default(false) | bool }}"
