---
# tasks/v7r4/explicit_remediation.yaml
# Explicit PowerShell remediation rules using internal.core.stig_pwsh.

# --- V-256375 / ESXI-70-000001: Lockdown mode ---
- name: "stigrule_256375"
  internal.core.stig_pwsh:
    _stig_validate_expr:
      - var: _lockdown_mode
        matches: "(?i)^lockdown(normal|strict)$"
    script: |
      $vmh = Get-VMHost -Name $env:_PWSH_ESXI | Get-View
      $lockdown = Get-View $vmh.ConfigManager.HostAccessManager
      $lockdown.ChangeLockdownMode('{{ esxi_stig_lockdown_level | default('lockdownNormal') }}')

# --- V-256377 / ESXI-70-000003: Lockdown exceptions ---
- name: "stigrule_256377"
  internal.core.stig_pwsh:
    _stig_validate_expr:
      - var: _lockdown_exceptions
        equals: ""
    script: |
      $vmh = Get-VMHost -Name $env:_PWSH_ESXI | Get-View
      $lockdown = Get-View $vmh.ConfigManager.HostAccessManager
      $lockdown.UpdateLockdownExceptions(@())

# --- V-256415 / ESXI-70-000054: iSCSI CHAP ---
- name: "stigrule_256415"
  internal.core.stig_pwsh:
    _stig_validate_expr:
      - var: _iscsi_chap_type
        matches: "^(NO_ISCSI|Required)$"
    script: |
      $hbas = Get-VMHost -Name $env:_PWSH_ESXI | Get-VMHostHba | Where-Object { $_.Type -eq 'iscsi' }
      foreach ($hba in $hbas) {
        Set-VMHostHba -Hba $hba -ChapType Required -Confirm:$false | Out-Null
      }

# --- V-256417 / ESXI-70-000056: Firewall rules restrict access ---
- name: "stigrule_256417"
  internal.core.stig_pwsh:
    _stig_validate_expr:
      - var: _firewall_open_rulesets_empty
        equals: "true"
    script: |
      $exempt = @('vSphereClient','vpxHeartbeats')
      $rules = $esxcli.network.firewall.ruleset.list.Invoke() | Where-Object { $_.Enabled -eq 'true' }
      foreach ($r in $rules) {
        if ($r.Name -in $exempt) { continue }
        $allowed = $esxcli.network.firewall.ruleset.allowedip.list.Invoke(@{rulesetid=$r.Name})
        if ($allowed | Where-Object { $_.AllowedIPAddresses -eq 'All' }) {
          $a = $esxcli.network.firewall.ruleset.set.CreateArgs()
          $a.rulesetid = $r.Name
          $a.allowedall = $false
          $esxcli.network.firewall.ruleset.set.Invoke($a) | Out-Null
          Write-Host "Restricted: $($r.Name)"
        }
      }
