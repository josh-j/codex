---
# tasks/v7r4/vswitch_security.yaml
# AD domain join using internal.core.stig_pwsh.

# --- V-256402 / ESXI-70-000037: AD domain membership ---
- name: "stigrule_256402"
  internal.core.stig_pwsh:
    _stig_manage: "{{ (esxi_70_000037_Manage | default(true)) and (_esxi_bulk_ok | default(false)) }}"
    _stig_validate_expr:
      - var: _ad_domain
        not_empty: true
    script: |
      Get-VMHost -Name $env:_PWSH_ESXI |
        Set-VMHostAuthentication -JoinDomain -Domain '{{ esxi_stig_ad_domain | default('') }}' -User '{{ esxi_stig_ad_join_user | default('') }}' -Password '{{ esxi_stig_ad_join_password | default('') }}' -Confirm:$false | Out-Null
