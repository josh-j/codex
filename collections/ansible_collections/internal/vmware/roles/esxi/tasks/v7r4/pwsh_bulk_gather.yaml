---
# tasks/v7r4/pwsh_bulk_gather.yaml
# Single PowerCLI invocation to gather ALL data needed by ~43 STIG rules.
# Replaces 17 individual pwsh processes + 26 config_manager check-mode probes.

- name: "ESXi STIG | Pre | Bulk PowerCLI gather"
  ansible.builtin.shell:
    executable: /bin/bash
    cmd: |
      set -o pipefail
      timeout 90 pwsh -NoProfile -Command "
      \$ProgressPreference = 'SilentlyContinue'
      {{ _pwsh_preamble }}
      \$vmhost = Get-VMHost -Name '{{ _current_esxi_host }}' -ErrorAction SilentlyContinue
      if (-not \$vmhost) { \$vmhost = Get-VMHost | Select-Object -First 1 }
      \$esxcli = Get-EsxCli -VMHost \$vmhost -V2
      \$view = \$vmhost | Get-View

      \$result = @{}

      # --- Advanced Settings (covers all 26 config_manager rules) ---
      try {
        \$adv = @{}
        Get-AdvancedSetting -Entity \$vmhost | ForEach-Object { \$adv[\$_.Name] = [string]\$_.Value }
        \$result.advanced_settings = \$adv
      } catch {
        \$result.advanced_settings = @{}
        \$result.advanced_settings_error = \$_.Exception.Message
      }

      # --- Encryption / Secure Boot (V-256430, V-256446, V-256447) ---
      try {
        \$enc = \$esxcli.system.settings.encryption.get.Invoke()
        \$result.encryption = @{
          Mode = [string]\$enc.Mode
          RequireSecureBoot = [string]\$enc.RequireSecureBoot
        }
      } catch {
        \$result.encryption = @{ Mode = 'UNKNOWN'; RequireSecureBoot = 'UNKNOWN' }
      }

      # --- FIPS 140-2 rhttpproxy (V-256442) ---
      try {
        \$fipsRhttp = \$esxcli.system.security.fips140.rhttpproxy.get.Invoke()
        \$result.fips_rhttpproxy_enabled = [string]\$fipsRhttp.Enabled
      } catch {
        \$result.fips_rhttpproxy_enabled = 'UNKNOWN'
      }

      # --- FIPS 140-2 SSH (V-256384) ---
      try {
        \$fipsSsh = \$esxcli.system.security.fips140.ssh.get.Invoke()
        \$result.fips_ssh_enabled = [string]\$fipsSsh.Enabled
      } catch {
        \$result.fips_ssh_enabled = 'UNKNOWN'
      }

      # --- Audit records (V-256436) ---
      try {
        \$audit = \$esxcli.system.auditrecords.get.Invoke()
        \$result.audit_records = @{
          StorageActive = [string]\$audit.AuditRecordStorageActive
          RemoteTransmissionActive = [string]\$audit.AuditRecordRemoteTransmissionActive
        }
      } catch {
        \$result.audit_records = @{ StorageActive = 'UNKNOWN'; RemoteTransmissionActive = 'UNKNOWN' }
      }

      # --- Syslog config (V-256437) ---
      try {
        \$syslogCfg = \$esxcli.system.syslog.config.get.Invoke()
        \$result.syslog_strict_x509 = [string]\$syslogCfg.StrictX509Compliance
      } catch {
        \$result.syslog_strict_x509 = 'UNKNOWN'
      }

      # --- SNMP (V-256414) ---
      try {
        \$snmp = \$esxcli.system.snmp.get.Invoke()
        \$result.snmp = @{
          Enable = [string]\$snmp.Enable
          Communities = [string]\$snmp.Communities
        }
      } catch {
        \$result.snmp = @{ Enable = 'UNKNOWN'; Communities = '' }
      }

      # --- Firewall rulesets with AllIP=true (V-256417) ---
      try {
        \$exempt = @('vSphereClient','vpxHeartbeats')
        \$rules = \$esxcli.network.firewall.ruleset.list.Invoke() | Where-Object { \$_.Enabled -eq 'true' }
        \$openRulesets = @()
        foreach (\$r in \$rules) {
          if (\$r.Name -in \$exempt) { continue }
          \$allowed = \$esxcli.network.firewall.ruleset.allowedip.list.Invoke(@{rulesetid=\$r.Name})
          if (\$allowed | Where-Object { \$_.AllowedIPAddresses -eq 'All' }) {
            \$openRulesets += \$r.Name
          }
        }
        \$result.firewall_open_rulesets = \$openRulesets
      } catch {
        \$result.firewall_open_rulesets = @('UNKNOWN')
      }

      # --- Port Group security policies (V-256411,V-256412,V-256413) ---
      try {
        \$pgs = Get-VMHost -Name '{{ _current_esxi_host }}' | Get-VirtualPortGroup -Standard
        \$pgForged = \$false; \$pgMac = \$false; \$pgPromisc = \$false
        \$pgVlan4095 = \$false; \$pgVlanReserved = \$false; \$pgVlan1 = \$false
        foreach (\$pg in \$pgs) {
          \$sec = \$pg | Get-SecurityPolicy
          if (\$sec.ForgedTransmits) { \$pgForged = \$true }
          if (\$sec.MacChanges) { \$pgMac = \$true }
          if (\$sec.AllowPromiscuous) { \$pgPromisc = \$true }
          if (\$pg.VLanId -eq 4095) { \$pgVlan4095 = \$true }
          if ((\$pg.VLanId -ge 1001 -and \$pg.VLanId -le 1024) -or
              (\$pg.VLanId -ge 3968 -and \$pg.VLanId -le 4047) -or
              (\$pg.VLanId -eq 4094)) { \$pgVlanReserved = \$true }
          if (\$pg.VLanId -eq 1) { \$pgVlan1 = \$true }
        }
        \$result.pg_forged_transmits = [string]\$pgForged
        \$result.pg_mac_changes = [string]\$pgMac
        \$result.pg_promiscuous = [string]\$pgPromisc
        \$result.pg_vlan_4095 = [string]\$pgVlan4095
        \$result.pg_vlan_reserved = [string]\$pgVlanReserved
        \$result.pg_vlan_1 = [string]\$pgVlan1
      } catch {
        \$result.pg_forged_transmits = 'UNKNOWN'
        \$result.pg_mac_changes = 'UNKNOWN'
        \$result.pg_promiscuous = 'UNKNOWN'
        \$result.pg_vlan_4095 = 'UNKNOWN'
        \$result.pg_vlan_reserved = 'UNKNOWN'
        \$result.pg_vlan_1 = 'UNKNOWN'
      }

      # --- vSwitch security policies (V-256420,V-256421,V-256422) ---
      try {
        \$vswitches = Get-VMHost -Name '{{ _current_esxi_host }}' | Get-VirtualSwitch -Standard
        \$vsForged = \$false; \$vsMac = \$false; \$vsPromisc = \$false
        foreach (\$vs in \$vswitches) {
          \$sec = Get-SecurityPolicy -VirtualSwitch \$vs
          if (\$sec.ForgedTransmits) { \$vsForged = \$true }
          if (\$sec.MacChanges) { \$vsMac = \$true }
          if (\$sec.AllowPromiscuous) { \$vsPromisc = \$true }
        }
        \$result.vs_forged_transmits = [string]\$vsForged
        \$result.vs_mac_changes = [string]\$vsMac
        \$result.vs_promiscuous = [string]\$vsPromisc
      } catch {
        \$result.vs_forged_transmits = 'UNKNOWN'
        \$result.vs_mac_changes = 'UNKNOWN'
        \$result.vs_promiscuous = 'UNKNOWN'
      }

      # --- Firewall default policy (V-256418) ---
      try {
        \$fw = Get-VMHost -Name '{{ _current_esxi_host }}' | Get-VMHostFirewallDefaultPolicy
        \$result.fw_incoming = [string]\$fw.IncomingEnabled
        \$result.fw_outgoing = [string]\$fw.OutgoingEnabled
      } catch {
        \$result.fw_incoming = 'UNKNOWN'
        \$result.fw_outgoing = 'UNKNOWN'
      }

      # --- Lockdown mode (V-256375) ---
      try {
        \$result.lockdown_mode = [string]\$view.Config.LockdownMode
      } catch {
        \$result.lockdown_mode = 'UNKNOWN'
      }

      # --- Lockdown exceptions (V-256377) ---
      try {
        \$lockdownMgr = Get-View \$view.ConfigManager.HostAccessManager
        \$exceptions = \$lockdownMgr.QueryLockdownExceptions()
        \$result.lockdown_exceptions = if (\$exceptions) { (\$exceptions -join ',') } else { '' }
      } catch {
        \$result.lockdown_exceptions = 'UNKNOWN'
      }

      # --- VM swap placement (V-256444) ---
      try {
        \$result.vm_swap_placement = [string]\$view.Config.Vm.SwapPlacement
      } catch {
        \$result.vm_swap_placement = 'UNKNOWN'
      }

      # --- Host build number (V-256427) ---
      try {
        \$result.host_build = [string]\$vmhost.Build
      } catch {
        \$result.host_build = 'UNKNOWN'
      }

      # --- AD domain (V-256402) ---
      try {
        \$authInfo = \$vmhost | Get-VMHostAuthentication
        \$result.ad_domain = if (\$authInfo.Domain) { [string]\$authInfo.Domain } else { '' }
      } catch {
        \$result.ad_domain = 'UNKNOWN'
      }

      # --- iSCSI CHAP (V-256415) ---
      try {
        \$hbas = \$vmhost | Get-VMHostHba | Where-Object { \$_.Type -eq 'iscsi' }
        if (\$hbas) {
          \$result.iscsi_chap_type = (\$hbas.AuthenticationProperties.ChapType -join ',')
        } else {
          \$result.iscsi_chap_type = 'NO_ISCSI'
        }
      } catch {
        \$result.iscsi_chap_type = 'UNKNOWN'
      }

      \$result | ConvertTo-Json -Depth 4 -Compress
      " | tr -d '\r' | tail -1
  register: _pwsh_bulk_result
  environment:
    VC_PASS: "{{ vmware_password | string | trim }}"
  check_mode: false
  changed_when: false
  no_log: true
  ignore_errors: true  # noqa: ignore-errors — if gather fails, rules gate out as not_reviewed

- name: "ESXi STIG | Pre | Parse bulk gather"
  ansible.builtin.set_fact:
    _esxi_bulk: "{{ _pwsh_bulk_result.stdout | from_json }}"
    _esxi_bulk_ok: true
  check_mode: false
  changed_when: false
  when:
    - _pwsh_bulk_result is not failed
    - _pwsh_bulk_result.stdout | default('') | length > 2

- name: "ESXi STIG | Pre | Bulk gather failed"
  ansible.builtin.debug:
    msg: >-
      Bulk PowerCLI gather failed for {{ _current_esxi_host }}.
      All PowerCLI/config_manager rules will report as not_reviewed.
      Error: {{ _pwsh_bulk_result.stderr | default('unknown') | truncate(200) }}
  when: not (_esxi_bulk_ok | default(false))

- name: "ESXi STIG | Pre | Derive compliance facts"
  ansible.builtin.set_fact:
    # --- Advanced settings (flat vars for validate_expr) ---
    _adv_DCUI_Access: "{{ _esxi_bulk.advanced_settings['DCUI.Access'] | default('') }}"
    _adv_Syslog_global_logHost: "{{ _esxi_bulk.advanced_settings['Syslog.global.logHost'] | default('') }}"
    _adv_Security_AccountLockFailures: "{{ _esxi_bulk.advanced_settings['Security.AccountLockFailures'] | default('') }}"
    _adv_Security_AccountUnlockTime: "{{ _esxi_bulk.advanced_settings['Security.AccountUnlockTime'] | default('') }}"
    _adv_Annotations_WelcomeMessage: "{{ _esxi_bulk.advanced_settings['Annotations.WelcomeMessage'] | default('') }}"
    _adv_Config_Etc_issue: "{{ _esxi_bulk.advanced_settings['Config.Etc.issue'] | default('') }}"
    _adv_Config_HostAgent_log_level: "{{ _esxi_bulk.advanced_settings['Config.HostAgent.log.level'] | default('') }}"
    _adv_Security_PasswordQualityControl: "{{ _esxi_bulk.advanced_settings['Security.PasswordQualityControl'] | default('') }}"
    _adv_Security_PasswordHistory: "{{ _esxi_bulk.advanced_settings['Security.PasswordHistory'] | default('') }}"
    _adv_Config_HostAgent_plugins_solo_enableMob: "{{ _esxi_bulk.advanced_settings['Config.HostAgent.plugins.solo.enableMob'] | default('') }}"
    _adv_Config_HostAgent_plugins_hostsvc_esxAdminsGroup: "{{ _esxi_bulk.advanced_settings['Config.HostAgent.plugins.hostsvc.esxAdminsGroup'] | default('') }}"
    _adv_UserVars_ESXiShellInteractiveTimeOut: "{{ _esxi_bulk.advanced_settings['UserVars.ESXiShellInteractiveTimeOut'] | default('') }}"
    _adv_UserVars_ESXiShellTimeOut: "{{ _esxi_bulk.advanced_settings['UserVars.ESXiShellTimeOut'] | default('') }}"
    _adv_UserVars_DcuiTimeOut: "{{ _esxi_bulk.advanced_settings['UserVars.DcuiTimeOut'] | default('') }}"
    _adv_Syslog_global_logDir: "{{ _esxi_bulk.advanced_settings['Syslog.global.logDir'] | default('') }}"
    _adv_Mem_ShareForceSalting: "{{ _esxi_bulk.advanced_settings['Mem.ShareForceSalting'] | default('') }}"
    _adv_Net_BlockGuestBPDU: "{{ _esxi_bulk.advanced_settings['Net.BlockGuestBPDU'] | default('') }}"
    _adv_Net_DVFilterBindIpAddress: "{{ _esxi_bulk.advanced_settings['Net.DVFilterBindIpAddress'] | default('') }}"
    _adv_UserVars_ESXiVPsDisabledProtocols: "{{ _esxi_bulk.advanced_settings['UserVars.ESXiVPsDisabledProtocols'] | default('') }}"
    _adv_UserVars_SuppressShellWarning: "{{ _esxi_bulk.advanced_settings['UserVars.SuppressShellWarning'] | default('') }}"
    _adv_UserVars_SuppressHyperthreadWarning: "{{ _esxi_bulk.advanced_settings['UserVars.SuppressHyperthreadWarning'] | default('') }}"
    _adv_Syslog_global_logCheckSSLCerts: "{{ _esxi_bulk.advanced_settings['Syslog.global.logCheckSSLCerts'] | default('') }}"
    _adv_Mem_MemEagerZero: "{{ _esxi_bulk.advanced_settings['Mem.MemEagerZero'] | default('') }}"
    _adv_Config_HostAgent_vmacore_soap_sessionTimeout: "{{ _esxi_bulk.advanced_settings['Config.HostAgent.vmacore.soap.sessionTimeout'] | default('') }}"
    _adv_UserVars_HostClientSessionTimeout: "{{ _esxi_bulk.advanced_settings['UserVars.HostClientSessionTimeout'] | default('') }}"
    _adv_Security_PasswordMaxDays: "{{ _esxi_bulk.advanced_settings['Security.PasswordMaxDays'] | default('') }}"
    # --- Network audit facts ---
    _pg_has_forged_transmits: "{{ _esxi_bulk.pg_forged_transmits | default('UNKNOWN') }}"
    _pg_has_mac_changes: "{{ _esxi_bulk.pg_mac_changes | default('UNKNOWN') }}"
    _pg_has_promiscuous: "{{ _esxi_bulk.pg_promiscuous | default('UNKNOWN') }}"
    _vs_has_forged_transmits: "{{ _esxi_bulk.vs_forged_transmits | default('UNKNOWN') }}"
    _vs_has_mac_changes: "{{ _esxi_bulk.vs_mac_changes | default('UNKNOWN') }}"
    _vs_has_promiscuous: "{{ _esxi_bulk.vs_promiscuous | default('UNKNOWN') }}"
    _fw_incoming_enabled: "{{ _esxi_bulk.fw_incoming | default('UNKNOWN') }}"
    _fw_outgoing_enabled: "{{ _esxi_bulk.fw_outgoing | default('UNKNOWN') }}"
    _pg_has_vlan_4095: "{{ _esxi_bulk.pg_vlan_4095 | default('UNKNOWN') }}"
    _pg_has_vlan_reserved: "{{ _esxi_bulk.pg_vlan_reserved | default('UNKNOWN') }}"
    _pg_has_vlan_1: "{{ _esxi_bulk.pg_vlan_1 | default('UNKNOWN') }}"
    # --- Firmware / esxcli facts ---
    _encryption_mode: "{{ _esxi_bulk.encryption.Mode | default('UNKNOWN') }}"
    _encryption_require_secure_boot: "{{ _esxi_bulk.encryption.RequireSecureBoot | default('UNKNOWN') }}"
    _fips_rhttpproxy_enabled: "{{ _esxi_bulk.fips_rhttpproxy_enabled | default('UNKNOWN') }}"
    _fips_ssh_enabled: "{{ _esxi_bulk.fips_ssh_enabled | default('UNKNOWN') }}"
    _audit_storage_active: "{{ _esxi_bulk.audit_records.StorageActive | default('UNKNOWN') }}"
    _audit_remote_active: "{{ _esxi_bulk.audit_records.RemoteTransmissionActive | default('UNKNOWN') }}"
    _syslog_strict_x509: "{{ _esxi_bulk.syslog_strict_x509 | default('UNKNOWN') }}"
    _snmp_enable: "{{ _esxi_bulk.snmp.Enable | default('UNKNOWN') }}"
    _snmp_communities: "{{ _esxi_bulk.snmp.Communities | default('') }}"
    _firewall_open_rulesets: "{{ _esxi_bulk.firewall_open_rulesets | default([]) }}"
    _firewall_open_rulesets_empty: "{{ (_esxi_bulk.firewall_open_rulesets | default([]) | length == 0) | string | lower }}"
    _snmp_compliant: >-
      {{ ((_esxi_bulk.snmp.Enable | default('false')) != 'true' or
          ('public' not in (_esxi_bulk.snmp.Communities | default('')))) | string | lower }}
    # --- Explicit remediation facts ---
    _lockdown_mode: "{{ _esxi_bulk.lockdown_mode | default('UNKNOWN') }}"
    _lockdown_exceptions: "{{ _esxi_bulk.lockdown_exceptions | default('UNKNOWN') }}"
    _vm_swap_placement: "{{ _esxi_bulk.vm_swap_placement | default('UNKNOWN') }}"
    _vm_overrides_compliant: "{{ (_esxi_bulk.vm_swap_placement | default('') == '') | string | lower }}"
    _host_build: "{{ _esxi_bulk.host_build | default('UNKNOWN') }}"
    _host_build_compliant: >-
      {{ ((esxi_stig_expected_build | default('') | trim == '') or
          (_esxi_bulk.host_build | default('') == (esxi_stig_expected_build | default('')))) | string | lower }}
    _ad_domain: "{{ _esxi_bulk.ad_domain | default('UNKNOWN') }}"
    _iscsi_chap_type: "{{ _esxi_bulk.iscsi_chap_type | default('UNKNOWN') }}"
  check_mode: false
  changed_when: false
  when: _esxi_bulk_ok | default(false)
