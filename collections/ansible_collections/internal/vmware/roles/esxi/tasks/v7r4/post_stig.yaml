---
# tasks/v7r4/post_stig.yaml
#
# Post-flight: stop SSH/Shell and restore lockdown to its original state.

- name: "ESXi STIG | Post | Stop SSH service"
  community.vmware.vmware_host_service_manager:
    esxi_hostname: "{{ _current_esxi_host }}"
    service_name: TSM-SSH
    service_policy: "off"
    state: stop
  ignore_errors: true
  when: esxi_stig_pre_unlock | default(true) | bool

- name: "ESXi STIG | Post | Stop ESXi Shell service"
  community.vmware.vmware_host_service_manager:
    esxi_hostname: "{{ _current_esxi_host }}"
    service_name: TSM
    service_policy: "off"
    state: stop
  ignore_errors: true
  when: esxi_stig_pre_unlock | default(true) | bool

- name: "ESXi STIG | Post | Restore lockdown mode"
  ansible.builtin.shell:
    executable: /bin/bash
    cmd: |
      set -o pipefail
      timeout 60 pwsh -NoProfile -Command "
      {{ _pwsh_preamble }}
      \$vmhost = Get-VMHost -Name '{{ _current_esxi_host }}' -ErrorAction SilentlyContinue;
      if (-not \$vmhost) { \$vmhost = Get-VMHost | Select-Object -First 1 };
      \$view = \$vmhost | Get-View;
      \$lockdown = Get-View \$view.ConfigManager.HostAccessManager;
      Write-Host 'Current:' \$view.Config.LockdownMode;
      Write-Host 'Restoring to: {{ _esxi_lockdown_orig_mode | default('lockdownDisabled') }}';
      \$lockdown.ChangeLockdownMode('{{ _esxi_lockdown_orig_mode | default('lockdownDisabled') }}');
      Write-Host 'Done';
      " | tr -d '\r'
  environment:
    VC_PASS: "{{ vmware_password | string | trim }}"
  register: _post_lockdown_result
  changed_when: (_esxi_lockdown_was_enabled | default(false)) | bool
  check_mode: false
  no_log: false
  ignore_errors: true
  when:
    - esxi_stig_pre_unlock | default(true) | bool
    - _esxi_lockdown_was_enabled | default(false) | bool
