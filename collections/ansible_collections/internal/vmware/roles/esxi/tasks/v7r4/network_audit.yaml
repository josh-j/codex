---
# tasks/v7r4/network_audit.yaml
# Network / Port Group / vSwitch rules using internal.core.stig_pwsh.

# --- V-256411 / ESXI-70-000048: Port group forged transmits ---
- name: "stigrule_256411"
  internal.core.stig_pwsh:
    _stig_manage: "{{ (esxi_70_000048_Manage | default(true)) and (_esxi_bulk_ok | default(false)) }}"
    _stig_validate_expr:
      - var: _pg_has_forged_transmits
        equals: "False"
    script: |
      Get-VMHost -Name $env:_PWSH_ESXI | Get-VirtualPortGroup -Standard | Get-SecurityPolicy |
        Where-Object { $_.ForgedTransmits -eq $true } |
        Set-SecurityPolicy -ForgedTransmits:$false -Confirm:$false | Out-Null

# --- V-256412 / ESXI-70-000049: Port group MAC changes ---
- name: "stigrule_256412"
  internal.core.stig_pwsh:
    _stig_manage: "{{ (esxi_70_000049_Manage | default(true)) and (_esxi_bulk_ok | default(false)) }}"
    _stig_validate_expr:
      - var: _pg_has_mac_changes
        equals: "False"
    script: |
      Get-VMHost -Name $env:_PWSH_ESXI | Get-VirtualPortGroup -Standard | Get-SecurityPolicy |
        Where-Object { $_.MacChanges -eq $true } |
        Set-SecurityPolicy -MacChanges:$false -Confirm:$false | Out-Null

# --- V-256413 / ESXI-70-000050: Port group promiscuous mode ---
- name: "stigrule_256413"
  internal.core.stig_pwsh:
    _stig_manage: "{{ (esxi_70_000050_Manage | default(true)) and (_esxi_bulk_ok | default(false)) }}"
    _stig_validate_expr:
      - var: _pg_has_promiscuous
        equals: "False"
    script: |
      Get-VMHost -Name $env:_PWSH_ESXI | Get-VirtualPortGroup -Standard | Get-SecurityPolicy |
        Where-Object { $_.AllowPromiscuous -eq $true } |
        Set-SecurityPolicy -AllowPromiscuous:$false -Confirm:$false | Out-Null

# --- V-256420 / ESXI-70-000059: vSwitch forged transmits ---
- name: "stigrule_256420"
  internal.core.stig_pwsh:
    _stig_manage: "{{ (esxi_70_000059_Manage | default(true)) and (_esxi_bulk_ok | default(false)) }}"
    _stig_validate_expr:
      - var: _vs_has_forged_transmits
        equals: "False"
    script: |
      Get-VMHost -Name $env:_PWSH_ESXI | Get-VirtualSwitch -Standard |
        ForEach-Object { Get-SecurityPolicy -VirtualSwitch $_ } |
        Where-Object { $_.ForgedTransmits -eq $true } |
        Set-SecurityPolicy -ForgedTransmits:$false -Confirm:$false | Out-Null

# --- V-256421 / ESXI-70-000060: vSwitch MAC changes ---
- name: "stigrule_256421"
  internal.core.stig_pwsh:
    _stig_manage: "{{ (esxi_70_000060_Manage | default(true)) and (_esxi_bulk_ok | default(false)) }}"
    _stig_validate_expr:
      - var: _vs_has_mac_changes
        equals: "False"
    script: |
      Get-VMHost -Name $env:_PWSH_ESXI | Get-VirtualSwitch -Standard |
        ForEach-Object { Get-SecurityPolicy -VirtualSwitch $_ } |
        Where-Object { $_.MacChanges -eq $true } |
        Set-SecurityPolicy -MacChanges:$false -Confirm:$false | Out-Null

# --- V-256422 / ESXI-70-000061: vSwitch promiscuous mode ---
- name: "stigrule_256422"
  internal.core.stig_pwsh:
    _stig_manage: "{{ (esxi_70_000061_Manage | default(true)) and (_esxi_bulk_ok | default(false)) }}"
    _stig_validate_expr:
      - var: _vs_has_promiscuous
        equals: "False"
    script: |
      Get-VMHost -Name $env:_PWSH_ESXI | Get-VirtualSwitch -Standard |
        ForEach-Object { Get-SecurityPolicy -VirtualSwitch $_ } |
        Where-Object { $_.AllowPromiscuous -eq $true } |
        Set-SecurityPolicy -AllowPromiscuous:$false -Confirm:$false | Out-Null

# --- V-256418 / ESXI-70-000057: Firewall default policy ---
- name: "stigrule_256418"
  internal.core.stig_pwsh:
    _stig_manage: "{{ (esxi_70_000057_Manage | default(true)) and (_esxi_bulk_ok | default(false)) }}"
    _stig_validate_expr:
      - var: _fw_incoming_enabled
        equals: "False"
      - var: _fw_outgoing_enabled
        equals: "False"
    script: |
      Get-VMHost -Name $env:_PWSH_ESXI |
        Set-VMHostFirewallDefaultPolicy -AllowIncoming:$false -AllowOutgoing:$false -Confirm:$false | Out-Null

# --- V-256424 / ESXI-70-000063: VLAN 4095 (trunk) ---
- name: "stigrule_256424"
  internal.core.stig_pwsh:
    _stig_manage: "{{ (esxi_70_000063_Manage | default(true)) and (_esxi_bulk_ok | default(false)) }}"
    _stig_validate_expr:
      - var: _pg_has_vlan_4095
        equals: "False"
    script: |
      Get-VMHost -Name $env:_PWSH_ESXI | Get-VirtualPortGroup -Standard |
        Where-Object { $_.VLanId -eq 4095 } |
        Set-VirtualPortGroup -Standard -VLanId {{ esxi_stig_portgroup_remediation_vlan_id | default(0) }} -Confirm:$false | Out-Null

# --- V-256425 / ESXI-70-000064: Reserved VLANs ---
- name: "stigrule_256425"
  internal.core.stig_pwsh:
    _stig_manage: "{{ (esxi_70_000064_Manage | default(true)) and (_esxi_bulk_ok | default(false)) }}"
    _stig_validate_expr:
      - var: _pg_has_vlan_reserved
        equals: "False"
    script: |
      Get-VMHost -Name $env:_PWSH_ESXI | Get-VirtualPortGroup -Standard |
        Where-Object { ($_.VLanId -ge 1001 -and $_.VLanId -le 1024) -or ($_.VLanId -ge 3968 -and $_.VLanId -le 4047) -or ($_.VLanId -eq 4094) } |
        Set-VirtualPortGroup -Standard -VLanId {{ esxi_stig_portgroup_remediation_vlan_id | default(0) }} -Confirm:$false | Out-Null

# --- V-256426 / ESXI-70-000065: Native VLAN 1 ---
- name: "stigrule_256426"
  internal.core.stig_pwsh:
    _stig_manage: "{{ (esxi_70_000065_Manage | default(true)) and (_esxi_bulk_ok | default(false)) }}"
    _stig_validate_expr:
      - var: _pg_has_vlan_1
        equals: "False"
    script: |
      Get-VMHost -Name $env:_PWSH_ESXI | Get-VirtualPortGroup -Standard |
        Where-Object { $_.VLanId -eq 1 } |
        Set-VirtualPortGroup -Standard -VLanId {{ esxi_stig_portgroup_remediation_vlan_id | default(0) }} -Confirm:$false | Out-Null
