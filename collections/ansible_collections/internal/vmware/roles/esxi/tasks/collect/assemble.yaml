---
# internal.vmware.esxi : collect/assemble.yaml
# Assembles raw ESXi infrastructure data into vmware_raw_esxi.

- name: Assemble raw ESXi infrastructure context
  ansible.builtin.set_fact:
    vmware_raw_esxi:
      datacenters_info: "{{ _raw_datacenters | default({}) }}"
      clusters_info: "{{ _raw_clusters | default({}) }}"
      datastores_info:
        datastores: >-
          {{
            _raw_datastores.results | default([])
            | selectattr('datastores', 'defined')
            | map(attribute='datastores')
            | flatten | list
          }}
      config: "{{ vcenter.config | default({}) }}"
      collection_status: "{{ 'FAILED' if esxi_collect_failed | default(false) | bool else 'SUCCESS' }}"
      collection_error: "{{ esxi_connectivity_error | default('') }}"
  changed_when: false
  no_log: true
