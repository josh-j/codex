---
# internal.vmware.esxi : collect/export.yaml

- name: "ESXi | Emit collection telemetry"
  ansible.builtin.set_stats:
    data:
      ncs_collect_esxi:
        platform_dir: "vmware/esxi"
        report_directory: "{{ ncs_report_directory | default(ncs_config.report_directory | default('/srv/samba/reports')) }}"
        name: "esxi"
        payload: "{{ vmware_raw_esxi }}"
        config:
          vmware_cpu_critical_pct: "{{ vmware_cpu_critical_pct | default(90) }}"
          vmware_memory_critical_pct: "{{ vmware_memory_critical_pct | default(90) }}"
          vmware_datastore_free_critical_pct: "{{ vmware_datastore_free_critical_pct | default(10) }}"
          vmware_datastore_free_warning_pct: "{{ vmware_datastore_free_warning_pct | default(15) }}"
    per_host: true
  changed_when: false
  no_log: true
