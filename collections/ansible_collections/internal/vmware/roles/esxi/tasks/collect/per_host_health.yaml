---
# internal.vmware.esxi : collect/per_host_health.yaml
# Collects per-ESXi-host health details: facts, NICs, services.
# Requires _raw_clusters from inventory.yaml to discover host names.

- name: Per-Host | Build host list from cluster data
  ansible.builtin.set_fact:
    _all_esxi_hosts: >-
      {{
        _raw_clusters.results | default([])
        | selectattr('clusters_info', 'defined')
        | map(attribute='clusters_info')
        | map('dict2items') | flatten
        | map(attribute='value')
        | selectattr('hosts', 'defined')
        | map(attribute='hosts') | flatten
        | map(attribute='name') | list
      }}
  changed_when: false

- name: Per-Host | Query host facts (CPU, memory, system info)
  community.vmware.vmware_host_facts:
    esxi_hostname: "{{ item }}"
  loop: "{{ _all_esxi_hosts }}"
  register: _raw_host_facts
  delegate_to: localhost
  no_log: true
  failed_when: false
  changed_when: false
  retries: 1
  delay: 3
  until: _raw_host_facts is succeeded
  ignore_errors: true
  when: _all_esxi_hosts | length > 0

- name: Per-Host | Query physical NIC info
  community.vmware.vmware_host_vmnic_info:
    esxi_hostname: "{{ item }}"
  loop: "{{ _all_esxi_hosts }}"
  register: _raw_host_nics
  delegate_to: localhost
  no_log: true
  failed_when: false
  changed_when: false
  retries: 1
  delay: 3
  until: _raw_host_nics is succeeded
  ignore_errors: true
  when: _all_esxi_hosts | length > 0

- name: Per-Host | Query service status (SSH, NTP, syslog)
  community.vmware.vmware_host_service_info:
    esxi_hostname: "{{ item }}"
  loop: "{{ _all_esxi_hosts }}"
  register: _raw_host_services
  delegate_to: localhost
  no_log: true
  failed_when: false
  changed_when: false
  retries: 1
  delay: 3
  until: _raw_host_services is succeeded
  ignore_errors: true
  when: _all_esxi_hosts | length > 0
