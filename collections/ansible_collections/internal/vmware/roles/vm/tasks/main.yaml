---
# internal.vmware.vm : tasks/main.yaml

- name: "VM | Validate action"
  ansible.builtin.assert:
    that:
      - (vm_action | default('stig')) in (vm_supported_actions | default(['collect', 'snapshot', 'stig']))
    fail_msg: >-
      Unsupported vm_action '{{ vm_action | default('stig') }}'.
      Supported values: {{ vm_supported_actions | default(['collect', 'snapshot', 'stig']) | join(', ') }}.
  changed_when: false

- name: "VM | Dispatch: {{ vm_action | default('stig') }}"
  module_defaults:
    group/community.vmware.vmware:
      hostname: "{{ _vcenter_hostname }}"
      username: "{{ vmware_username }}"
      password: "{{ vmware_password }}"
      validate_certs: "{{ vmware_validate_certs | default(false) | bool }}"
    internal.core.stig:
      _stig_module_defaults:
        hostname: "{{ _vcenter_hostname }}"
        username: "{{ vmware_username }}"
        password: "{{ vmware_password }}"
        validate_certs: "{{ vmware_validate_certs | default(false) | bool }}"
  block:
    - name: "VM | Run: {{ vm_action | default('stig') }}"
      ansible.builtin.include_tasks: "{{ vm_action | default('stig') }}.yaml"
