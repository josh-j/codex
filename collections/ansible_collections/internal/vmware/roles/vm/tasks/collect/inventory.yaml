---
# internal.vmware.vm : collect/inventory.yaml
# Queries datacenters, VMs, and snapshots from vCenter.

- name: Inventory | Query Datacenters
  community.vmware.vmware_datacenter_info:
  register: _raw_datacenters
  delegate_to: localhost
  no_log: true
  failed_when: false
  changed_when: false

- name: Inventory | Extract Datacenter list
  ansible.builtin.set_fact:
    _vcenter_datacenters: "{{ _raw_datacenters.datacenter_info | default([]) | map(attribute='name') | list }}"
  changed_when: false

- name: Inventory | Query Workload (VMs)
  community.vmware.vmware_vm_info:
    vm_type: vm
    show_attribute: true
    show_tag: true
  register: _raw_vms
  delegate_to: localhost
  no_log: true
  failed_when: false
  changed_when: false
  when: vm_collect_workload | default(true) | bool

- name: Inventory | Query Snapshots
  community.vmware.vmware_all_snapshots_info:
    datacenter: "{{ item }}"
  loop: "{{ _vcenter_datacenters }}"
  register: _raw_snapshots
  delegate_to: localhost
  no_log: true
  failed_when: false
  changed_when: false
  when:
    - vm_collect_snapshots | default(true) | bool
    - _vcenter_datacenters | default([]) | length > 0
