---
# internal.vmware.vm : collect/export.yaml

- name: "VM | Emit collection telemetry"
  ansible.builtin.set_stats:
    data:
      ncs_collect_vm:
        platform_dir: "vmware/vcenter"
        report_directory: "{{ ncs_report_directory | default(ncs_config.report_directory | default('/srv/samba/reports')) }}"
        name: "vm"
        payload: "{{ vmware_raw_vm }}"
        config:
          vmware_snapshot_age_warning_days: "{{ vmware_snapshot_age_warning_days | default(7) }}"
          vmware_snapshot_size_warning_gb: "{{ vmware_snapshot_size_warning_gb | default(100) }}"
    per_host: true
  changed_when: false
  no_log: true
