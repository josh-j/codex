---
# v7r4/vm_attributes.yaml — VM attribute STIG rules (3 rules)
# vMotion encryption, logging, FT encryption
# Validate via _stig_validate_expr against bulk-gathered attributes.
# Remediate via community.vmware.vmware_guest.

# --- V-256472 / VMCH-70-000024: vMotion encryption required ---
- name: "stigrule_256472"
  internal.core.stig:
    _stig_manage: "{{ (vmch_70_000024_Manage | default(true)) and (_vm_bulk_ok | default(false)) }}"
    _stig_validate_expr:
      - var: _vm_attr_vmotion_encryption
        equals: "required"
    _stig_apply: community.vmware.vmware_guest
    _stig_use_check_mode_probe: false
    _stig_skip_post_validate: true
    name: "{{ _current_vm_name }}"
    datacenter: "{{ _current_vm_datacenter }}"
    vmotion_encryption: required

# --- V-256473 / VMCH-70-000025: Logging enabled ---
- name: "stigrule_256473"
  internal.core.stig:
    _stig_manage: "{{ (vmch_70_000025_Manage | default(true)) and (_vm_bulk_ok | default(false)) }}"
    _stig_validate_expr:
      - var: _vm_attr_logging_enabled
        equals: "True"
    _stig_apply: community.vmware.vmware_guest
    _stig_use_check_mode_probe: false
    _stig_skip_post_validate: true
    name: "{{ _current_vm_name }}"
    datacenter: "{{ _current_vm_datacenter }}"
    advanced_settings:
      - key: "vmx.log.enabled"
        value: "TRUE"

# --- V-256477 / VMCH-70-000029: FT encryption required ---
- name: "stigrule_256477"
  internal.core.stig:
    _stig_manage: "{{ (vmch_70_000029_Manage | default(true)) and (_vm_bulk_ok | default(false)) }}"
    _stig_validate_expr:
      - var: _vm_attr_ft_encryption
        matches: "(?i)^(required|ftencryptionrequired)$"
    _stig_apply: community.vmware.vmware_guest
    _stig_use_check_mode_probe: false
    _stig_skip_post_validate: true
    name: "{{ _current_vm_name }}"
    datacenter: "{{ _current_vm_datacenter }}"
    ft_encryption: required
