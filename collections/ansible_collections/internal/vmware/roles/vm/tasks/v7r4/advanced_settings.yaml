---
# v7r4/advanced_settings.yaml — 14 VM advanced settings rules
# Audit uses _stig_validate_expr against pre-gathered _vm_adv_* facts.
# Remediation uses community.vmware.vmware_guest to set advanced settings.

# --- V-256450 / VMCH-70-000001: Copy operations disabled ---
- name: "stigrule_256450"
  internal.core.stig:
    _stig_manage: "{{ (vmch_70_000001_Manage | default(true)) and (_vm_bulk_ok | default(false)) }}"
    _stig_validate_expr:
      - var: _vm_adv_copy_disable
        equals: "{{ vm_stig_256450_value | default('TRUE') }}"
    _stig_apply: community.vmware.vmware_guest
    _stig_use_check_mode_probe: false
    _stig_skip_post_validate: true
    name: "{{ _current_vm_name }}"
    datacenter: "{{ _current_vm_datacenter }}"
    advanced_settings:
      - key: "isolation.tools.copy.disable"
        value: "{{ vm_stig_256450_value | default('TRUE') }}"

