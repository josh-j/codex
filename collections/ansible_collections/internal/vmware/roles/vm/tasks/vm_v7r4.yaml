---
# internal.vmware.vm : tasks/vm_v7r4.yaml
#
# Per-VM V7R4 STIG tasks. Included via check.yaml which injects:
# check_mode, ignore_errors, tags, and _current_vm_name.
#
# All stigrule_ tasks are top-level (no blocks) for callback compatibility.

# =========================================================================
# INIT: Register target host and phase for ncs_collector callback
# =========================================================================

- name: "VM STIG | Register target VM for callback"
  ansible.builtin.set_fact:
    _ncs_stig_target_host: "{{ _current_vm_name }}"
    _ncs_stig_target_type: "vm"
    _stig_active_phase: >-
      {{ _stig_phase_hint | default((ansible_check_mode | default(false)) | ternary('audit', 'remediate')) }}
    _vm_bulk_ok: false
  check_mode: false
  changed_when: false

- name: "VM STIG | Set PowerCLI preamble"
  ansible.builtin.set_fact:
    _pwsh_preamble: >-
      Set-PowerCLIConfiguration -InvalidCertificateAction Ignore -Confirm:\$false | Out-Null;
      Set-PowerCLIConfiguration -ParticipateInCeip:\$false -Confirm:\$false | Out-Null;
      Connect-VIServer -Server '{{ _vcenter_hostname }}' -User '{{ vmware_username }}' -Password \$env:VC_PASS -Force -WarningAction SilentlyContinue | Out-Null;
  check_mode: false
  changed_when: false

- name: "VM STIG | Resolve datacenter for {{ _current_vm_name }}"
  ansible.builtin.set_fact:
    _current_vm_datacenter: "{{ vm_datacenter_map[_current_vm_name] | default(omit) }}"
  check_mode: false
  changed_when: false

# =========================================================================
# PRE-FLIGHT: Bulk PowerCLI gather
# =========================================================================

- name: "VM STIG | Bulk PowerCLI gather"
  ansible.builtin.include_tasks: v7r4/pwsh_bulk_gather.yaml

# =========================================================================
# STIG RULES: Advanced settings, hardware, VM attributes
# =========================================================================

- name: "Include advanced_settings.yaml"
  ansible.builtin.include_tasks: v7r4/advanced_settings.yaml

- name: "Include hardware_audit.yaml"
  ansible.builtin.include_tasks: v7r4/hardware_audit.yaml

- name: "Include vm_attributes.yaml"
  ansible.builtin.include_tasks: v7r4/vm_attributes.yaml
