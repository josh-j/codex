---
# tasks/xml_evaluator.yaml
# Data-driven XML STIG evaluator using xmllint on the VCSA.
# No community.general.xml — avoids Python 3.7 compatibility issues.
#
# Supports check_type: attribute, text, absent, absent_node, grep
# Variables from caller: _vcsa_notify_handler (optional restart handler)

# =========================================================================
# Reset results between loop iterations
# =========================================================================
- name: "{{ item.stig_id }} - {{ item.desc }} | Reset"
  ansible.builtin.set_fact:
    _xml_check_result:
      stdout: ""
      failed: true
    _xml_compliant: false
  changed_when: false
  check_mode: false

# =========================================================================
# Grep-based checks (no XML parsing needed)
# =========================================================================
- name: "{{ item.stig_id }} - {{ item.desc }} | Grep check"
  ansible.builtin.shell:
    cmd: "grep -c '{{ item.grep_pattern }}' '{{ item.path }}' || true"
  register: _xml_check_result
  changed_when: false
  check_mode: false
  when:
    - item.check_type == 'grep'
    - lookup('vars', item.manage_var, default=true) | bool

- name: "{{ item.stig_id }} - {{ item.desc }} | Grep assert"
  ansible.builtin.assert:
    that: >-
      (item.grep_expected == 'absent' and (_xml_check_result.stdout | default('0') | int) == 0) or
      (item.grep_expected == 'present' and (_xml_check_result.stdout | default('0') | int) > 0)
    fail_msg: >-
      {{ item.stig_id }}: grep '{{ item.grep_pattern }}' expected {{ item.grep_expected }}
      got count={{ _xml_check_result.stdout | default('0') }}
    success_msg: "{{ item.stig_id }}: compliant"
  ignore_errors: true # noqa: ignore-errors — ncs_collector captures
  when:
    - item.check_type == 'grep'
    - lookup('vars', item.manage_var, default=true) | bool

# =========================================================================
# Attribute check via xmllint
# xpath returns: attributeName="value"
# =========================================================================
- name: "{{ item.stig_id }} - {{ item.desc }} | Read attribute"
  ansible.builtin.shell:
    cmd: >
      xmllint --xpath '{{ item.xpath }}/@{{ item.attribute }}' '{{ item.path }}' 2>&1 || true
  register: _xml_check_result
  changed_when: false
  check_mode: false
  when:
    - item.check_type == 'attribute'
    - lookup('vars', item.manage_var, default=true) | bool

- name: "{{ item.stig_id }} - {{ item.desc }} | Assert attribute"
  ansible.builtin.assert:
    that:
      - "'XPath set is empty' not in _xml_check_result.stdout"
      - 'item.attribute + ''="'' + (item.expected | string) + ''"'' in _xml_check_result.stdout'
    fail_msg: >-
      {{ item.stig_id }}: expected {{ item.attribute }}="{{ item.expected }}"
      got: {{ _xml_check_result.stdout | default('MISSING') | trim }}
    success_msg: "{{ item.stig_id }}: {{ item.attribute }}={{ item.expected }} — compliant"
  ignore_errors: true # noqa: ignore-errors — ncs_collector captures
  when:
    - item.check_type == 'attribute'
    - lookup('vars', item.manage_var, default=true) | bool
    - not (vmware_stig_enable_hardening | default(false) | bool)

# =========================================================================
# Text node check via xmllint
# Strip XML namespace for web.xml checks (same as DISA check commands)
# =========================================================================
- name: "{{ item.stig_id }} - {{ item.desc }} | Read text"
  ansible.builtin.shell:
    cmd: >
      {% if item.namespaces is defined and item.namespaces %}
      xmllint --format '{{ item.path }}' | sed 's/xmlns="[^"]*"//g' |
      xmllint --xpath '{{ item.xpath | regex_replace("x:", "") }}' - 2>&1 || true
      {% else %}
      xmllint --xpath '{{ item.xpath }}' '{{ item.path }}' 2>&1 || true
      {% endif %}
  register: _xml_check_result
  changed_when: false
  check_mode: false
  when:
    - item.check_type == 'text'
    - lookup('vars', item.manage_var, default=true) | bool

- name: "{{ item.stig_id }} - {{ item.desc }} | Assert text"
  ansible.builtin.assert:
    that:
      - "'XPath set is empty' not in _xml_check_result.stdout"
      - "(item.expected | string) in _xml_check_result.stdout"
    fail_msg: >-
      {{ item.stig_id }}: expected text '{{ item.expected }}'
      got: {{ _xml_check_result.stdout | default('EMPTY') | trim }}
    success_msg: "{{ item.stig_id }}: text={{ item.expected }} — compliant"
  ignore_errors: true # noqa: ignore-errors — ncs_collector captures
  when:
    - item.check_type == 'text'
    - lookup('vars', item.manage_var, default=true) | bool
    - not (vmware_stig_enable_hardening | default(false) | bool)

# =========================================================================
# Absent check — attribute must not exist
# "XPath set is empty" = compliant
# =========================================================================
- name: "{{ item.stig_id }} - {{ item.desc }} | Read for absent check"
  ansible.builtin.shell:
    cmd: >
      xmllint --xpath '{{ item.xpath }}/@{{ item.attribute }}' '{{ item.path }}' 2>&1 || true
  register: _xml_check_result
  changed_when: false
  check_mode: false
  when:
    - item.check_type == 'absent'
    - lookup('vars', item.manage_var, default=true) | bool

- name: "{{ item.stig_id }} - {{ item.desc }} | Assert absent"
  ansible.builtin.assert:
    that:
      - "'XPath set is empty' in _xml_check_result.stdout or _xml_check_result.stdout | trim == ''"
    fail_msg: >-
      {{ item.stig_id }}: attribute '{{ item.attribute }}' should not be present
      but found: {{ _xml_check_result.stdout | default('') | trim }}
    success_msg: "{{ item.stig_id }}: {{ item.attribute }} absent — compliant"
  ignore_errors: true # noqa: ignore-errors — ncs_collector captures
  when:
    - item.check_type == 'absent'
    - lookup('vars', item.manage_var, default=true) | bool
    - not (vmware_stig_enable_hardening | default(false) | bool)

# =========================================================================
# Absent node check — entire xpath must return empty
# =========================================================================
- name: "{{ item.stig_id }} - {{ item.desc }} | Read for absent_node"
  ansible.builtin.shell:
    cmd: >
      xmllint --xpath '{{ item.xpath }}' '{{ item.path }}' 2>&1 || true
  register: _xml_check_result
  changed_when: false
  check_mode: false
  when:
    - item.check_type == 'absent_node'
    - lookup('vars', item.manage_var, default=true) | bool

- name: "{{ item.stig_id }} - {{ item.desc }} | Assert node absent"
  ansible.builtin.assert:
    that:
      - "'XPath set is empty' in _xml_check_result.stdout or _xml_check_result.stdout | trim == ''"
    fail_msg: >-
      {{ item.stig_id }}: xpath should match nothing but found:
      {{ _xml_check_result.stdout | default('') | trim }}
    success_msg: "{{ item.stig_id }}: node absent — compliant"
  ignore_errors: true # noqa: ignore-errors — ncs_collector captures
  when:
    - item.check_type == 'absent_node'
    - lookup('vars', item.manage_var, default=true) | bool
    - not (vmware_stig_enable_hardening | default(false) | bool)

# =========================================================================
# Remediation (hardening mode only) — uses sed/xmlstarlet
# Only attribute and text types support auto-remediation.
# Absent/absent_node remediation is rule-specific (manual).
# =========================================================================
- name: "{{ item.stig_id }} - {{ item.desc }} | Remediate attribute"
  ansible.builtin.shell:
    cmd: >
      xmlstarlet ed -L
      -u '{{ item.xpath }}/@{{ item.attribute }}'
      -v '{{ item.expected }}'
      '{{ item.path }}'
  register: _xml_fix_result
  when:
    - item.check_type == 'attribute'
    - lookup('vars', item.manage_var, default=true) | bool
    - vmware_stig_enable_hardening | default(false) | bool
    - '''XPath set is empty'' in _xml_check_result.stdout or
      (item.attribute + ''="'' + (item.expected | string) + ''"'') not in _xml_check_result.stdout'
  ignore_errors: true # noqa: ignore-errors — ncs_collector captures
  notify: "{{ _vcsa_notify_handler | default(omit) }}"

- name: "{{ item.stig_id }} - {{ item.desc }} | Remediate text"
  ansible.builtin.shell:
    cmd: >
      {% if item.namespaces is defined and item.namespaces %}
      xmlstarlet ed -L
      -N x='{{ (item.namespaces.values() | list)[0] }}'
      -u '{{ item.xpath }}'
      -v '{{ item.expected }}'
      '{{ item.path }}'
      {% else %}
      xmlstarlet ed -L
      -u '{{ item.xpath }}'
      -v '{{ item.expected }}'
      '{{ item.path }}'
      {% endif %}
  register: _xml_fix_result
  when:
    - item.check_type == 'text'
    - lookup('vars', item.manage_var, default=true) | bool
    - vmware_stig_enable_hardening | default(false) | bool
    - "'XPath set is empty' in _xml_check_result.stdout or
      (item.expected | string) not in _xml_check_result.stdout"
  ignore_errors: true # noqa: ignore-errors — ncs_collector captures
  notify: "{{ _vcsa_notify_handler | default(omit) }}"
