---
# Data-driven XML rules for Perfcharts STIG remediation.
# Consumed by xml_evaluator.yaml.

perfcharts_xml_rules:
  - stig_id: "VCPF-70-000001"
    desc: "Performance Charts must limit the amount of time that each TCP connection is kept alive."
    xml_path: "var_server_xml_path"
    xpath: "/Server/Service/Connector"
    attribute: "connectionTimeout"
    value: "{{ var_server_xml_connectiontimeout }}"
    manage_var: "run_connection_timeout"

  - stig_id: "VCPF-70-000002"
    desc: "Performance Charts must limit the number of concurrent connections permitted."
    xml_path: "var_server_xml_path"
    xpath: "/Server/Service/Executor"
    attribute: "maxThreads"
    value: "{{ var_server_xml_maxthreads }}"
    manage_var: "run_max_threads"

  - stig_id: "VCPF-70-000003"
    desc: "Performance Charts must limit the maximum size of a POST request."
    xml_path: "var_server_xml_path"
    xpath: "/Server/Service/Connector/@maxPostSize"
    state: "absent"
    manage_var: "run_max_post_size"

  - stig_id: "VCPF-70-000004"
    desc: "Performance Charts must protect cookies from XSS."
    xml_path: "var_web_stats_xml_path"
    xpath: "/x:web-app/x:session-config/x:cookie-config/x:http-only"
    value: "{{ var_web_xml_http_only }}"
    namespaces:
      x: "http://java.sun.com/xml/ns/javaee"
    manage_var: "run_http_only"

  - stig_id: "VCPF-70-000005"
    desc: "Performance Charts must record user access in a format that enables monitoring of remote access."
    xml_path: "var_server_xml_path"
    xpath: '/Server/Service/Engine/Host/Valve[@className="org.apache.catalina.valves.AccessLogValve"]'
    attribute: "pattern"
    value: "{{ var_server_xml_access_log_valve_pattern }}"
    manage_var: "run_access_valve_pattern"

  - stig_id: "VCPF-70-000010"
    desc: "Remove Realm"
    xml_path: "var_server_xml_path"
    xpath: "/Server/Service/Engine/Realm"
    state: "absent"
    manage_var: "run_user_database_realm"

  - stig_id: "VCPF-70-000012"
    desc: "MIME that invoke OS shell programs disabled. CSH"
    xml_path: "var_web_xml_path"
    xpath: '/x:web-app/x:mime-mapping/x:extension[text()="csh"]/..'
    state: "absent"
    namespaces:
      x: "http://xmlns.jcp.org/xml/ns/javaee"
    manage_var: "run_removed_mime_mappings"

  - stig_id: "VCPF-70-000012"
    desc: "MIME that invoke OS shell programs disabled. SH"
    xml_path: "var_web_xml_path"
    xpath: '/x:web-app/x:mime-mapping/x:extension[text()="sh"]/..'
    state: "absent"
    namespaces:
      x: "http://xmlns.jcp.org/xml/ns/javaee"
    manage_var: "run_removed_mime_mappings"

  - stig_id: "VCPF-70-000012"
    desc: "MIME that invoke OS shell programs disabled. SHAR"
    xml_path: "var_web_xml_path"
    xpath: '/x:web-app/x:mime-mapping/x:extension[text()="shar"]/..'
    state: "absent"
    namespaces:
      x: "http://xmlns.jcp.org/xml/ns/javaee"
    manage_var: "run_removed_mime_mappings"

  - stig_id: "VCPF-70-000012"
    desc: "MIME that invoke OS shell programs disabled. KSH"
    xml_path: "var_web_xml_path"
    xpath: '/x:web-app/x:mime-mapping/x:extension[text()="ksh"]/..'
    state: "absent"
    namespaces:
      x: "http://xmlns.jcp.org/xml/ns/javaee"
    manage_var: "run_removed_mime_mappings"

  - stig_id: "VCPF-70-000013"
    desc: "Performance Charts must have mappings set for Java servlet pages. jsp"
    xml_path: "var_web_xml_path"
    xpath: '/x:web-app/x:servlet-mapping[x:servlet-name="jsp"]/x:url-pattern[1]'
    value: "{{ var_web_xml_servlet_jsp_url_pattern1 }}"
    namespaces:
      x: "http://xmlns.jcp.org/xml/ns/javaee"
    manage_var: "run_java_servlet"

  - stig_id: "VCPF-70-000013"
    desc: "Performance Charts must have mappings set for Java servlet pages. jspx"
    xml_path: "var_web_xml_path"
    xpath: '/x:web-app/x:servlet-mapping[x:servlet-name="jsp"]/x:url-pattern[2]'
    value: "{{ var_web_xml_servlet_jsp_url_pattern2 }}"
    namespaces:
      x: "http://xmlns.jcp.org/xml/ns/javaee"
    manage_var: "run_java_servlet"

  - stig_id: "VCPF-70-000014"
    desc: "Performance Charts must not have the Web Distributed Authoring (WebDAV) servlet installed."
    xml_path: "var_web_xml_path"
    xpath: '/x:web-app/x:servlet-mapping[x:servlet-name="webdav"]/..'
    state: "absent"
    namespaces:
      x: "http://xmlns.jcp.org/xml/ns/javaee"
    manage_var: "run_remove_webdav"

  - stig_id: "VCPF-70-000015"
    desc: "Performance Charts must be configured with memory leak protection."
    xml_path: "var_server_xml_path"
    xpath: '/Server/Listener[@className="org.apache.catalina.core.JreMemoryLeakPreventionListener"]'
    state: "present"
    manage_var: "run_mem_leak_prevention"

  - stig_id: "VCPF-70-000019"
    desc: "Performance Charts must to limit the number of allowed connections."
    xml_path: "var_server_xml_path"
    xpath: "/Server/Service/Connector"
    attribute: "acceptCount"
    value: "{{ var_server_xml_acceptcount }}"
    manage_var: "run_accept_count"

  - stig_id: "VCPF-70-000020"
    desc: "Performance Charts must set URIEncoding to UTF-8."
    xml_path: "var_server_xml_path"
    xpath: "/Server/Service/Connector"
    attribute: "URIEncoding"
    value: "{{ var_server_xml_uriencoding }}"
    manage_var: "run_uri_encoding"

  - stig_id: "VCPF-70-000022"
    desc: "Performance Charts must set the welcome-file node to a default web page. html"
    xml_path: "var_web_xml_path"
    xpath: "/x:web-app/x:welcome-file-list/x:welcome-file[1]"
    value: "{{ var_web_xml_welcome_file_list1 }}"
    namespaces:
      x: "http://xmlns.jcp.org/xml/ns/javaee"
    manage_var: "run_web_welcome_file"

  - stig_id: "VCPF-70-000022"
    desc: "Performance Charts must set the welcome-file node to a default web page. htm"
    xml_path: "var_web_xml_path"
    xpath: "/x:web-app/x:welcome-file-list/x:welcome-file[2]"
    value: "{{ var_web_xml_welcome_file_list2 }}"
    namespaces:
      x: "http://xmlns.jcp.org/xml/ns/javaee"
    manage_var: "run_web_welcome_file"

  - stig_id: "VCPF-70-000022"
    desc: "Performance Charts must set the welcome-file node to a default web page. jsp"
    xml_path: "var_web_xml_path"
    xpath: "/x:web-app/x:welcome-file-list/x:welcome-file[3]"
    value: "{{ var_web_xml_welcome_file_list3 }}"
    namespaces:
      x: "http://xmlns.jcp.org/xml/ns/javaee"
    manage_var: "run_web_welcome_file"

  - stig_id: "VCPF-70-000023"
    desc: "Performance Charts must not show directory listings."
    xml_path: "var_web_xml_path"
    xpath: '/x:web-app/x:servlet[x:servlet-name="default"]/x:init-param[x:param-name="listings"]/x:param-value'
    value: "false"
    namespaces:
      x: "http://xmlns.jcp.org/xml/ns/javaee"
    manage_var: "run_web_remove_listings"

  - stig_id: "VCPF-70-000024"
    desc: "Performance Charts must configured to show error pages with minimal information."
    xml_path: "var_web_stats_xml_path"
    xpath: '/x:web-app/x:error-page[x:exception-type="java.lang.Throwable"]/x:location'
    value: "{{ var_web_xml_error_page }}"
    namespaces:
      x: "http://java.sun.com/xml/ns/javaee"
    manage_var: "run_web_error_page"

  - stig_id: "VCPF-70-000025"
    desc: "Performance Charts must be configured to not show error reports. showServerInfo"
    xml_path: "var_server_xml_path"
    xpath: '/Server/Service/Engine/Host/Valve[@className="org.apache.catalina.valves.ErrorReportValve"]'
    attribute: "showServerInfo"
    value: "{{ var_server_xml_show_server_info }}"
    manage_var: "run_hide_error_reports"

  - stig_id: "VCPF-70-000025"
    desc: "Performance Charts must be configured to not show error reports. showReport"
    xml_path: "var_server_xml_path"
    xpath: '/Server/Service/Engine/Host/Valve[@className="org.apache.catalina.valves.ErrorReportValve"]'
    attribute: "showReport"
    value: "{{ var_server_xml_show_server_report }}"
    manage_var: "run_hide_error_reports"

  - stig_id: "VCPF-70-000026"
    desc: "Performance Charts must hide the server version."
    xml_path: "var_server_xml_path"
    xpath: "/Server/Service/Connector"
    attribute: "server"
    value: "{{ var_server_xml_server }}"
    manage_var: "run_server_anonymous"

  - stig_id: "VCPF-70-000027"
    desc: "Performance Charts must not enable support for TRACE requests."
    xml_path: "var_server_xml_path"
    xpath: "/Server/Service/Connector/@allowTrace"
    state: "absent"
    manage_var: "run_allow_trace"

  - stig_id: "VCPF-70-000028"
    desc: "Performance Charts must have the debug option turned off."
    xml_path: "var_web_xml_path"
    xpath: '/x:web-app/x:servlet/x:init-param/x:param-name[text()="debug"]/..'
    state: "absent"
    namespaces:
      x: "http://xmlns.jcp.org/xml/ns/javaee"
    manage_var: "run_web_remove_debug"

  - stig_id: "VCPF-70-000033"
    desc: "Performance Charts must set the secure flag for cookies."
    xml_path: "var_web_stats_xml_path"
    xpath: "/x:web-app/x:session-config/x:cookie-config/x:secure"
    value: "{{ var_web_xml_cookie_secure }}"
    namespaces:
      x: "http://java.sun.com/xml/ns/javaee"
    manage_var: "run_web_cookie_secure"

  - stig_id: "VCPF-70-000034"
    desc: "Performance Charts default servlet must be set to readonly."
    xml_path: "var_web_xml_path"
    xpath: '/x:web-app/x:servlet/x:servlet-name[text()="default"]/../x:init-param/param-name[text()="readonly"]'
    state: "absent"
    namespaces:
      x: "http://xmlns.jcp.org/xml/ns/javaee"
    manage_var: "run_web_remove_readonly"
