---
# internal.vmware.vcenter_collect : tasks/collect/simulated.yaml
# Loads fixture data and maps it onto _raw_* variables expected by assemble.yaml.
# VCSA-only: appliance health, backup, alarms.

- name: Simulation | Ensure fixture exists for vCenter host
  ansible.builtin.stat:
    path: "{{ simulation_vcsa_fixture_file | default(simulation_vcenter_fixture_file) }}"
  register: _sim_vcenter_fixture
  delegate_to: localhost
  changed_when: false

- name: Simulation | Abort when fixture file is missing
  ansible.builtin.assert:
    that:
      - _sim_vcenter_fixture.stat.exists
    fail_msg: "Simulation fixture not found: {{ simulation_vcsa_fixture_file | default(simulation_vcenter_fixture_file) }}"
    success_msg: "Loaded simulation fixture: {{ simulation_vcsa_fixture_file | default(simulation_vcenter_fixture_file) }}"

- name: Simulation | Load fixture document
  ansible.builtin.set_fact:
    _sim_vcenter_doc: "{{ lookup('ansible.builtin.file', simulation_vcsa_fixture_file | default(simulation_vcenter_fixture_file)) | from_yaml }}"
  changed_when: false

- name: Simulation | Normalize fixture payload envelope
  ansible.builtin.set_fact:
    _sim_vcenter_payload: >-
      {{
        _sim_vcenter_doc.data
        if (_sim_vcenter_doc is mapping and _sim_vcenter_doc.data is defined)
        else (_sim_vcenter_doc | default({}))
      }}
  changed_when: false

- name: Simulation | Map fixture payload to raw module variables
  ansible.builtin.set_fact:
    _raw_appliance_health: "{{ _sim_vcenter_payload.appliance_health_info | default({}) }}"
    _raw_appliance_backup: "{{ _sim_vcenter_payload.appliance_backup_info | default({}) }}"
    _raw_alarms: "{{ _sim_vcenter_payload.alarms_info | default({}) }}"
  changed_when: false
