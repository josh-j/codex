---
# internal.vmware.vcenter_collect : tasks/main.yaml

- name: Phase 0 | Preflight & Connection Check
  ansible.builtin.include_tasks: preflight.yaml
  tags: [always]

- name: "vCenter Collect | Execute"
  tags: [always]
  module_defaults:
    group/community.vmware.vmware:
      hostname: "{{ _vcenter_hostname }}"
      username: "{{ vmware_username }}"
      password: "{{ vmware_password }}"
      validate_certs: "{{ vmware_validate_certs | default(false) | bool }}"

    vmware.vmware.appliance_info:
      hostname: "{{ _vcenter_hostname }}"
      username: "{{ vmware_username }}"
      password: "{{ vmware_password }}"
      validate_certs: "{{ vmware_validate_certs | default(false) | bool }}"
    vmware.vmware.vcsa_backup_schedule_info:
      hostname: "{{ _vcenter_hostname }}"
      username: "{{ vmware_username }}"
      password: "{{ vmware_password }}"
      validate_certs: "{{ vmware_validate_certs | default(false) | bool }}"
    internal.vmware.vmware_triggered_alarms_info:
      hostname: "{{ _vcenter_hostname }}"
      username: "{{ vmware_username }}"
      password: "{{ vmware_password }}"
      validate_certs: "{{ vmware_validate_certs | default(false) | bool }}"
  block:
    - name: "vCenter Collect | Run collection"
      ansible.builtin.include_tasks: collect.yaml
