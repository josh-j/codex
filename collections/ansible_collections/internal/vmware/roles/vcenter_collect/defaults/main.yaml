---
# internal.vmware.vcenter_collect : defaults/main.yaml

# =============================================================================
# Connection Defaults
# =============================================================================
# vmware_username: "administrator@vsphere.local"
# vmware_password: ""
vmware_validate_certs: false

# =============================================================================
# Performance/Safety Toggles
# =============================================================================
vmware_discovery_timeout: 30
vmware_skip_discovery: false
vcsa_collect_appliance: true
vcsa_collect_alarms: true

# =============================================================================
# Simulation Settings
# =============================================================================
simulation_mode: false
simulation_vcsa_fixture_root: "{{ playbook_dir }}/../tests/reports/mock_production_run/platform/vmware/vcenter/vcsa"
simulation_vcsa_fixture_file: "{{ simulation_vcsa_fixture_root }}/{{ inventory_hostname }}/raw_vcenter.yaml"
