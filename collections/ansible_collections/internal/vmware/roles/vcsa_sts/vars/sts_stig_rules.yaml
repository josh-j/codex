---
# Data-driven XML rules for STS STIG remediation.
# Consumed by xml_evaluator.yml.

sts_xml_rules:
  - stig_id: "VCST-70-000001"
    desc: "The Security Token Service must limit the amount of time that each TCP connection is kept alive."
    xml_path: "var_server_xml_path"
    xpath: '/Server/Service/Connector[@port="${bio-custom.http.port}"]'
    attribute: "connectionTimeout"
    value: "{{ var_server_xml_connectiontimeout }}"
    manage_var: "run_connection_timeout"

  - stig_id: "VCST-70-000002"
    desc: "The Security Token Service must limit the number of concurrent connections permitted."
    xml_path: "var_server_xml_path"
    xpath: '/Server/Service/Executor[@name="tomcatThreadPool"]'
    attribute: "maxThreads"
    value: "{{ var_server_xml_maxthreads }}"
    manage_var: "run_max_threads"

  - stig_id: "VCST-70-000003"
    desc: "The Security Token Service must limit the maximum size of a POST request."
    xml_path: "var_server_xml_path"
    xpath: "/Server/Service/Connector/@maxPostSize"
    state: "absent"
    manage_var: "run_max_post_size"

  - stig_id: "VCST-70-000004"
    desc: "The Security Token Service must protect cookies from XSS."
    xml_path: "var_web_xml_path"
    xpath: "/x:web-app/x:session-config/x:cookie-config/x:http-only"
    value: "{{ var_web_xml_http_only }}"
    namespaces:
      x: "http://java.sun.com/xml/ns/javaee"
    manage_var: "run_http_only"

  - stig_id: "VCST-70-000005"
    desc: "The Security Token Service must record user access in a format that enables monitoring of remote access."
    xml_path: "var_server_xml_path"
    xpath: '/Server/Service/Engine/Host/Valve[@className="org.apache.catalina.valves.AccessLogValve"]'
    attribute: "pattern"
    value: "{{ var_server_xml_access_log_valve_pattern }}"
    manage_var: "run_access_valve_pattern"

  - stig_id: "VCST-70-000010"
    desc: "Remove Realm"
    xml_path: "var_server_xml_path"
    xpath: "/Server/Service/Engine/Realm"
    state: "absent"
    manage_var: "run_user_database_realm"

  - stig_id: "VCST-70-000012"
    desc: "MIME that invoke OS shell programs disabled. CSH"
    xml_path: "var_web_xml_path"
    xpath: '/x:web-app/x:mime-mapping/x:extension[text()="csh"]/..'
    state: "absent"
    namespaces:
      x: "http://java.sun.com/xml/ns/javaee"
    manage_var: "run_removed_mime_mappings"

  - stig_id: "VCST-70-000012"
    desc: "MIME that invoke OS shell programs disabled. SH"
    xml_path: "var_web_xml_path"
    xpath: '/x:web-app/x:mime-mapping/x:extension[text()="sh"]/..'
    state: "absent"
    namespaces:
      x: "http://java.sun.com/xml/ns/javaee"
    manage_var: "run_removed_mime_mappings"

  - stig_id: "VCST-70-000012"
    desc: "MIME that invoke OS shell programs disabled. SHAR"
    xml_path: "var_web_xml_path"
    xpath: '/x:web-app/x:mime-mapping/x:extension[text()="shar"]/..'
    state: "absent"
    namespaces:
      x: "http://java.sun.com/xml/ns/javaee"
    manage_var: "run_removed_mime_mappings"

  - stig_id: "VCST-70-000012"
    desc: "MIME that invoke OS shell programs disabled. KSH"
    xml_path: "var_web_xml_path"
    xpath: '/x:web-app/x:mime-mapping/x:extension[text()="ksh"]/..'
    state: "absent"
    namespaces:
      x: "http://java.sun.com/xml/ns/javaee"
    manage_var: "run_removed_mime_mappings"

  - stig_id: "VCST-70-000013"
    desc: "The Security Token Service must have mappings set for Java servlet pages. jsp"
    xml_path: "var_web_xml_path"
    xpath: '/x:web-app/x:servlet-mapping[x:servlet-name="jsp"]/x:url-pattern[1]'
    value: "{{ var_web_xml_servlet_jsp_url_pattern1 }}"
    namespaces:
      x: "http://java.sun.com/xml/ns/javaee"
    manage_var: "run_java_servlet"

  - stig_id: "VCST-70-000013"
    desc: "The Security Token Service must have mappings set for Java servlet pages. jspx"
    xml_path: "var_web_xml_path"
    xpath: '/x:web-app/x:servlet-mapping[x:servlet-name="jsp"]/x:url-pattern[2]'
    value: "{{ var_web_xml_servlet_jsp_url_pattern2 }}"
    namespaces:
      x: "http://java.sun.com/xml/ns/javaee"
    manage_var: "run_java_servlet"

  - stig_id: "VCST-70-000014"
    desc: "The Security Token Service must not have the Web Distributed Authoring (WebDAV) servlet installed."
    xml_path: "var_web_xml_path"
    xpath: '/x:web-app/x:servlet-mapping[x:servlet-name="webdav"]/..'
    state: "absent"
    namespaces:
      x: "http://java.sun.com/xml/ns/javaee"
    manage_var: "run_remove_webdav"

  - stig_id: "VCST-70-000015"
    desc: "The Security Token Service must be configured with memory leak protection."
    xml_path: "var_server_xml_path"
    xpath: '/Server/Listener[@className="org.apache.catalina.core.JreMemoryLeakPreventionListener"]'
    state: "present"
    manage_var: "run_mem_leak_prevention"

  - stig_id: "VCST-70-000019"
    desc: "The Security Token Service must limit the number of allowed connections."
    xml_path: "var_server_xml_path"
    xpath: '/Server/Service/Connector[@port="${bio-custom.http.port}"]'
    attribute: "acceptCount"
    value: "{{ var_server_xml_acceptcount }}"
    manage_var: "run_accept_count"

  - stig_id: "VCST-70-000020"
    desc: "The Security Token Service must set URIEncoding to UTF-8."
    xml_path: "var_server_xml_path"
    xpath: '/Server/Service/Connector[@port="${bio-custom.http.port}"]'
    attribute: "URIEncoding"
    value: "{{ var_server_xml_uriencoding }}"
    manage_var: "run_uri_encoding"

  - stig_id: "VCST-70-000022"
    desc: "The Security Token Service must set the welcome-file node to a default web page. html"
    xml_path: "var_web_xml_path"
    xpath: "/x:web-app/x:welcome-file-list/x:welcome-file[1]"
    value: "{{ var_web_xml_welcome_file_list1 }}"
    namespaces:
      x: "http://java.sun.com/xml/ns/javaee"
    manage_var: "run_web_welcome_file"

  - stig_id: "VCST-70-000022"
    desc: "The Security Token Service must set the welcome-file node to a default web page. htm"
    xml_path: "var_web_xml_path"
    xpath: "/x:web-app/x:welcome-file-list/x:welcome-file[2]"
    value: "{{ var_web_xml_welcome_file_list2 }}"
    namespaces:
      x: "http://java.sun.com/xml/ns/javaee"
    manage_var: "run_web_welcome_file"

  - stig_id: "VCST-70-000022"
    desc: "The Security Token Service must set the welcome-file node to a default web page. jsp"
    xml_path: "var_web_xml_path"
    xpath: "/x:web-app/x:welcome-file-list/x:welcome-file[3]"
    value: "{{ var_web_xml_welcome_file_list3 }}"
    namespaces:
      x: "http://java.sun.com/xml/ns/javaee"
    manage_var: "run_web_welcome_file"

  - stig_id: "VCST-70-000023"
    desc: "The Security Token Service must not show directory listings."
    xml_path: "var_web_xml_path"
    xpath: '/x:web-app/x:servlet[x:servlet-name="default"]/x:init-param[x:param-name="listings"]/x:param-value'
    value: "false"
    namespaces:
      x: "http://java.sun.com/xml/ns/javaee"
    manage_var: "run_web_remove_listings"

  - stig_id: "VCST-70-000024"
    desc: "The Security Token Service must be configured to show error pages with minimal information. showReport"
    xml_path: "var_server_xml_path"
    xpath: '/Server/Service/Engine/Host/Valve[@className="org.apache.catalina.valves.ErrorReportValve"]'
    attribute: "showReport"
    value: "false"
    manage_var: "run_web_error_page"

  - stig_id: "VCST-70-000024"
    desc: "The Security Token Service must be configured to show error pages with minimal information. showServerInfo"
    xml_path: "var_server_xml_path"
    xpath: '/Server/Service/Engine/Host/Valve[@className="org.apache.catalina.valves.ErrorReportValve"]'
    attribute: "showServerInfo"
    value: "{{ var_web_xml_error_page }}"
    manage_var: "run_web_error_page"

  - stig_id: "VCST-70-000025"
    desc: "The Security Token Service must not enable support for TRACE requests."
    xml_path: "var_server_xml_path"
    xpath: "/Server/Service/Connector/@allowTrace"
    state: "absent"
    manage_var: "run_allow_trace"

  - stig_id: "VCST-70-000026"
    desc: "The Security Token Service must have the debug option disabled."
    xml_path: "var_web_xml_path"
    xpath: '/x:web-app/x:servlet/x:init-param/x:param-name[text()="debug"]/..'
    state: "absent"
    namespaces:
      x: "http://java.sun.com/xml/ns/javaee"
    manage_var: "run_web_remove_debug"

  # - stig_id: "VCST-70-000027"
  #   desc: "The Security Token Service must hide the server version."
  #   xml_path: "var_server_xml_path"
  #   xpath: '/Server/Service/Connector[@port="${bio-custom.http.port}"]'
  #   attribute: "server"
  #   value: "Anonymous"
  #   manage_var: "run_server_anonymous"

  - stig_id: "VCST-70-000030"
    desc: "The Security Token Service must set the secure flag for cookies."
    xml_path: "var_web_xml_path"
    xpath: "/x:web-app/x:session-config/x:cookie-config/x:secure"
    value: "{{ var_web_xml_cookie_secure }}"
    namespaces:
      x: "http://java.sun.com/xml/ns/javaee"
    manage_var: "run_web_cookie_secure"

  - stig_id: "VCST-70-000031"
    desc: "The Security Token Service default servlet must be set to readonly."
    xml_path: "var_web_xml_path"
    xpath: '/x:web-app/x:servlet/x:servlet-name[text()="default"]/../x:init-param/param-name[text()="readonly"]'
    state: "absent"
    namespaces:
      x: "http://java.sun.com/xml/ns/javaee"
    manage_var: "run_web_remove_readonly"
