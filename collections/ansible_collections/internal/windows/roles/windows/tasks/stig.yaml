---
# internal.windows.windows : tasks/stig.yaml

# =============================================================================
# Phase 0 | Initialize
# =============================================================================
- import_tasks: stig_prelude.yaml

# =============================================================================
# Phase 1 | Ingest Inputs / Evaluate
# =============================================================================

- name: "Windows STIG | Phase 1a | Load findings from provided rows"
  when: windows_stig_input_rows | default([]) | length > 0
  ansible.builtin.set_fact:
    audit_full_list: "{{ windows_stig_input_rows | default([]) | list }}"
    _stig_audit_ran: true
  changed_when: false

- name: "Windows STIG | Phase 1b | Run native checks"
  when:
    - not (_stig_audit_ran | default(false))
    - windows_stig_enable_audit | default(true) | bool
  block:
    - name: "Windows STIG | Phase 1b.1 | Execute native baseline checks"
      ansible.builtin.import_tasks: stig_check.yaml
      tags: [windows, stig, security, checks]

    - name: "Windows STIG | Phase 1b.2 | Execute native remediation"
      ansible.builtin.import_tasks: stig_remediate.yaml
      when: windows_stig_enable_hardening | default(false) | bool
      tags: [windows, stig, security, remediate]

    - name: "Windows STIG | Phase 1b.3 | Flag remediation as complete"
      ansible.builtin.set_fact:
        _stig_remediation_ran: true
      changed_when: false
      when: windows_stig_enable_hardening | default(false) | bool
  rescue:
    - name: "Windows STIG | Phase 1b.r | Mark native check failure"
      ansible.builtin.set_fact:
        _stig_run_failed: true
      changed_when: false

    - name: "Windows STIG | Phase 1b.r | Fail native-only mode"
      when: windows_stig_native_checks_only | default(false) | bool
      ansible.builtin.fail:
        msg: "Windows Server STIG native checks failed on {{ inventory_hostname }}."
  always:
    - name: "Windows STIG | Phase 1 | Log completion"
      ansible.builtin.debug:
        msg: >-
          Windows STIG {{ 'audit' if (_stig_audit_only | bool) else 'remediation' }}
          completed on {{ inventory_hostname }}.

- name: "Windows STIG | Phase 1c.1 | Mark audit ran if checks performed"
  when:
    - audit_full_list is defined
    - audit_full_list | default([]) | length > 0
    - not (_stig_audit_ran | default(false))
  ansible.builtin.set_fact:
    _stig_audit_ran: true
  changed_when: false

# =============================================================================
# Phase 2 | Post-remediation verification (remediate mode only)
# =============================================================================

- name: "Windows STIG | Phase 2 | Set phase hint to audit"
  ansible.builtin.set_fact:
    _stig_phase_hint: "audit"
    _stig_active_phase: "audit"
  changed_when: false
  when:
    - not (_stig_audit_only | bool)
    - windows_stig_enable_audit | default(true) | bool

- name: "Windows STIG | Phase 2 | Post-remediation audit"
  when:
    - not (_stig_audit_only | bool)
    - windows_stig_enable_audit | default(true) | bool
    - _stig_remediation_ran | default(false)
  block:
    - name: "Windows STIG | Phase 2a | Refresh checks after remediation"
      ansible.builtin.import_tasks: stig_check.yaml
      tags: [windows, stig, security, checks, verify]

    - name: "Windows STIG | Phase 2b | Flag verification as complete"
      ansible.builtin.set_fact:
        _stig_audit_ran: true
      changed_when: false
  rescue:
    - name: "Windows STIG | Phase 2r | Log verification failure"
      ansible.builtin.debug:
        msg: "Post-remediation STIG audit failed on {{ inventory_hostname }}. Exporting partial results."

# =============================================================================
# Phase 3 | Export
# =============================================================================

- name: Windows STIG | Emit telemetry
  ansible.builtin.set_stats:
    data:
      ncs_collect:
        platform: "windows"
        name: "stig_windows"
        report_directory: "{{ ncs_config.report_directory | default('/srv/samba/reports') }}"
        payload: "{{ audit_full_list }}"
    per_host: true
  when: _stig_audit_ran | default(false)
  changed_when: false
