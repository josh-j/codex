---
# updates/office.yaml — Microsoft Office C2R update

- name: "Update Software | Office | Check and update"
  ansible.windows.win_powershell:
    script: |
      $result = @{ app = 'Office C2R'; before = ''; after = ''; success = $false; message = '' }

      # Find OfficeC2RClient.exe
      $c2rPath = "${env:ProgramFiles}\Common Files\Microsoft Shared\ClickToRun\OfficeC2RClient.exe"
      if (-not (Test-Path $c2rPath)) {
        $result.message = 'Office C2R not installed'
        $result | ConvertTo-Json -Compress
        return
      }

      # Get current version from registry
      $officeReg = Get-ItemProperty 'HKLM:\SOFTWARE\Microsoft\Office\ClickToRun\Configuration' -ErrorAction SilentlyContinue
      $result.before = $officeReg.VersionToReport

      # Trigger update
      try {
        $proc = Start-Process $c2rPath -ArgumentList '/update user updatepromptuser=false forceappshutdown=true displaylevel=false' -Wait -PassThru -NoNewWindow
        Start-Sleep -Seconds 10
        $officeReg = Get-ItemProperty 'HKLM:\SOFTWARE\Microsoft\Office\ClickToRun\Configuration' -ErrorAction SilentlyContinue
        $result.after = $officeReg.VersionToReport
        $result.success = ($proc.ExitCode -eq 0)
        $result.message = "C2R exit code: $($proc.ExitCode)"
      } catch {
        $result.message = "Error: $($_.Exception.Message)"
      }
      $result | ConvertTo-Json -Compress
  register: _office_update_result
  changed_when: false

- name: "Update Software | Office | Stage result"
  ansible.builtin.set_fact:
    _update_software_results: "{{ _update_software_results | default([]) + [_office_update_result.output[0] | from_json] }}"
  changed_when: false
