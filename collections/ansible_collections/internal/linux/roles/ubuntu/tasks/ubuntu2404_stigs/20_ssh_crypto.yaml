---
# =============================================================================
# SSH crypto rules — migrated to internal.core.stig
# Rules: 270667 (sshd Ciphers), 270668 (sshd MACs), 270669 (sshd KexAlgorithms),
#        270670 (ssh_config Ciphers), 270671 (ssh_config MACs)
# =============================================================================

- block:
    - name: "stigrule_270667"
      internal.core.stig:
        _stig_manage: "{{ ubuntu2404STIG_stigrule_270667_manage | default(true) }}"
        ansible.builtin.lineinfile:
          path: /etc/ssh/sshd_config
          regexp: '(?i)^\s*Ciphers\s+'
          line: "{{ ubuntu2404STIG_stigrule_270667_Ciphers_line }}"
          create: true
      notify: ssh_restart

    - name: "stigrule_270668"
      internal.core.stig:
        _stig_manage: "{{ ubuntu2404STIG_stigrule_270668_manage | default(true) }}"
        ansible.builtin.lineinfile:
          path: /etc/ssh/sshd_config
          regexp: '(?i)^\s*MACs\s+'
          line: "{{ ubuntu2404STIG_stigrule_270668_MACs_line }}"
          create: true
      notify: ssh_restart

    - name: "stigrule_270669"
      internal.core.stig:
        _stig_manage: "{{ ubuntu2404STIG_stigrule_270669_manage | default(true) }}"
        ansible.builtin.lineinfile:
          path: /etc/ssh/sshd_config
          regexp: '(?i)^\s*KexAlgorithms\s+'
          line: "{{ ubuntu2404STIG_stigrule_270669_KexAlgorithms_line }}"
          create: true
      notify: ssh_restart

    - name: "stigrule_270670"
      internal.core.stig:
        _stig_manage: "{{ ubuntu2404STIG_stigrule_270670_manage | default(true) }}"
        ansible.builtin.lineinfile:
          path: /etc/ssh/ssh_config
          regexp: '(?i)^\s*Ciphers\s+'
          line: "{{ ubuntu2404STIG_stigrule_270670_Ciphers_line }}"
          create: true
      notify: ssh_restart

    - name: "stigrule_270671"
      internal.core.stig:
        _stig_manage: "{{ ubuntu2404STIG_stigrule_270671_manage | default(true) }}"
        ansible.builtin.lineinfile:
          path: /etc/ssh/ssh_config
          regexp: '(?i)^\s*MACs\s+'
          line: "{{ ubuntu2404STIG_stigrule_270671_MACs_line }}"
          create: true
      notify: ssh_restart

  module_defaults:
    internal.core.stig:
      _stig_gate_packages: [openssh-server]
      _stig_notify: [ssh_restart]
