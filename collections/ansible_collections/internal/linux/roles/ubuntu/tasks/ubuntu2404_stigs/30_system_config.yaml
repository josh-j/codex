    _stig_notify: [rsyslog_restart]
    _stig_validate: ansible.builtin.shell
    _stig_validate_args:
      cmd: |
        set -eu
        grep -qE '^\s*auth\.\*,authpriv\.\*' /etc/rsyslog.d/50-default.conf
        grep -qE '^\s*daemon\.\*' /etc/rsyslog.d/50-default.conf
    cmd: |
      set -eu
      f=/etc/rsyslog.d/50-default.conf
      grep -qE '^\s*auth\.\*,authpriv\.\*' "$f" && \
        sed -i 's|^\s*auth\.\*,authpriv\.\*.*|{{ ubuntu2404STIG_stigrule_270681_rsyslog_auth_line }}|' "$f" || \
