    _stig_use_check_mode_probe: false
    _stig_manage: "{{ ubuntu2404STIG_stigrule_270675_manage | default(true) }}"
    _stig_gate_vars:
      ubuntu2404STIG_stigrule_270675_grub_pbkdf2_hash: "non-empty"
    _stig_gate_status: not_reviewed
    _stig_validate: ansible.builtin.shell
    _stig_validate_args:
      cmd: "grep -qE '^set superusers=' /etc/grub.d/40_custom && grep -qE '^password_pbkdf2 ' /etc/grub.d/40_custom"
    cmd: |
      set -eu
      cat > /etc/grub.d/40_custom <<'GRUBEOF'
      #!/bin/sh
      exec tail -n +3 $0
      set superusers="root"
      password_pbkdf2 root {{ ubuntu2404STIG_stigrule_270675_grub_pbkdf2_hash }}
      GRUBEOF
      chmod 0755 /etc/grub.d/40_custom
      update-grub

# --- 270676 - GRUB audit=1 ---
- name: "stigrule_270676"
  internal.core.stig:
    _stig_apply: ansible.builtin.shell
    _stig_use_check_mode_probe: false
    _stig_manage: "{{ ubuntu2404STIG_stigrule_270676_manage | default(true) }}"
    _stig_validate: ansible.builtin.shell
    _stig_validate_args:
      cmd: "grep -qE '^GRUB_CMDLINE_LINUX=.*audit=1' /etc/default/grub"
    cmd: |
      set -eu
      if grep -qE '^GRUB_CMDLINE_LINUX=' /etc/default/grub; then
        sed -i 's/^\(GRUB_CMDLINE_LINUX=".*\)"/\1 audit=1"/' /etc/default/grub
      else
        echo 'GRUB_CMDLINE_LINUX="audit=1"' >> /etc/default/grub
      fi
      update-grub

# --- 270746 - Kernel core dumps disabled ---
- name: "stigrule_270746"
  internal.core.stig:
    _stig_apply: ansible.builtin.shell
    _stig_use_check_mode_probe: false
    _stig_manage: "{{ ubuntu2404STIG_stigrule_270746_manage | default(true) }}"
    _stig_validate: ansible.builtin.shell
    _stig_validate_args:
      cmd: |
        set -eu
        [ "$(sysctl -n kernel.core_pattern)" = "|/bin/false" ]
        grep -qE '^\s*\*\s+hard\s+core\s+0' /etc/security/limits.conf
    cmd: |
      set -eu
      echo 'kernel.core_pattern=|/bin/false' > /etc/sysctl.d/10-no-coredump.conf
      sysctl -p /etc/sysctl.d/10-no-coredump.conf
      grep -qE '^\s*\*\s+hard\s+core\s+' /etc/security/limits.conf && \
        sed -i 's/^\s*\*\s\+hard\s\+core\s\+.*/* hard core 0/' /etc/security/limits.conf || \
        echo '* hard core 0' >> /etc/security/limits.conf

# --- 270747 - LUKS full disk encryption ---
- name: "stigrule_270747"
  internal.core.stig:
    _stig_apply: ansible.builtin.shell
    _stig_use_check_mode_probe: false
    _stig_audit_only: true
    _stig_manage: "{{ ubuntu2404STIG_stigrule_270747_manage | default(true) }}"
    _stig_validate: ansible.builtin.shell
    _stig_validate_args:
      cmd: |
        set -eu
        blkid -t TYPE=crypto_LUKS | grep -q . || grep -q '^[^#]' /etc/crypttab 2>/dev/null
    cmd: "true"

