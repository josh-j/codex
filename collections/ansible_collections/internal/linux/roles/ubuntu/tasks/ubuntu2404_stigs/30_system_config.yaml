# --- 270658 - audisp remote plugin ---
- name: "stigrule_270658"
  internal.core.stig:
    _stig_apply: ansible.builtin.shell
    _stig_use_check_mode_probe: false
    _stig_manage: "{{ ubuntu2404STIG_stigrule_270658_manage | default(true) }}"
    _stig_gate_packages: [audispd-plugins]
    _stig_gate_vars:
      ubuntu2404STIG_stigrule_270658_remote_server: "non-empty"
    _stig_gate_status: not_reviewed
    _stig_validate: ansible.builtin.shell
    _stig_validate_args:
      cmd: |
        set -eu
        grep -qE '^\s*active\s*=\s*yes' /etc/audit/plugins.d/au-remote.conf 2>/dev/null || \
        grep -qE '^\s*active\s*=\s*yes' /etc/audisp/plugins.d/au-remote.conf 2>/dev/null
        grep -qE '^\s*remote_server\s*=' /etc/audit/audisp-remote.conf 2>/dev/null || \
        grep -qE '^\s*remote_server\s*=' /etc/audisp/audisp-remote.conf 2>/dev/null
    cmd: |
      set -eu
      conf=""
      [ -d /etc/audit/plugins.d ] && conf=/etc/audit/plugins.d/au-remote.conf || conf=/etc/audisp/plugins.d/au-remote.conf
      sed -i 's/^\s*active\s*=.*/active = yes/' "$conf" 2>/dev/null || echo 'active = yes' >> "$conf"
      rconf=""
      [ -f /etc/audit/audisp-remote.conf ] && rconf=/etc/audit/audisp-remote.conf || rconf=/etc/audisp/audisp-remote.conf
      sed -i "s/^\s*remote_server\s*=.*/remote_server = {{ ubuntu2404STIG_stigrule_270658_remote_server }}/" "$rconf"

