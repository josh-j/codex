# ubuntu2404_stigs/41_audit_rule_audits.yaml
# =============================================================================
# Audit completion for augenrules-managed audit rules
#
# Performance optimization: instead of 42 sequential SSH round-trips (each
# running grep + auditctl), we build the rule list locally, send it in a
# single shell call, and parse the JSON result.
# =============================================================================

# --- Build the list of id|line pairs for the batch check ---
