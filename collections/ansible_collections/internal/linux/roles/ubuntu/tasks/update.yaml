---
# internal.linux.ubuntu : tasks/update.yaml
# Standalone apt update + dist-upgrade action.

- name: "Ubuntu Update | apt update + dist-upgrade"
  ansible.builtin.apt:
    upgrade: dist
    update_cache: true
  become: true

- name: "Ubuntu Update | Check if reboot is required"
  ansible.builtin.stat:
    path: /var/run/reboot-required
  register: _reboot_required_stat

- name: "Ubuntu Update | Reboot if required"
  ansible.builtin.reboot:
    msg: "Rebooting for system updates (Ansible)"
  become: true
  when:
    - _reboot_required_stat.stat.exists
    - ubuntu_enable_upgrade_reboots | default(true) | bool
