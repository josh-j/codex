---
- name: ssh_restart
  ansible.builtin.service:
    name: ssh
    state: restarted

- name: dconf_update
  ansible.builtin.command:
    cmd: dconf update
  when: ansible_facts.packages['dconf-cli'] is defined

- name: update_grub
  ansible.builtin.command:
    cmd: update-grub

- name: reload_audit_rules
  ansible.builtin.command:
    cmd: augenrules --load
  failed_when: false

- name: auditd_sighup
  ansible.builtin.command:
    cmd: systemctl kill auditd -s SIGHUP

- name: auditd_restart
  ansible.builtin.service:
    name: auditd
    state: restarted

- name: rsyslog_restart
  ansible.builtin.service:
    name: rsyslog
    state: restarted

- name: chrony_restart
  ansible.builtin.systemd_service:
    name: chrony.service
    enabled: true
    masked: false
    state: restarted
    daemon_reload: true

- name: update_ca_certificates
  ansible.builtin.command:
    cmd: update-ca-certificates
