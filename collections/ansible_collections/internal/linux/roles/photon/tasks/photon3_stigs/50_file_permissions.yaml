      logdir=$(awk '/^\s*log_file\s*=/ {sub(/.*=\s*/, ""); print; exit}' {{ var_auditd_conf_file }} | xargs dirname 2>/dev/null)
      [ -n "$logdir" ] || logdir="/var/log/audit"
      find "$logdir" -maxdepth 1 -name '*.log' ! -name 'auth.log' ! -group root -exec chgrp root {} +

# --- PHTN-30-000019 - Audit config file permissions (0640) ---
- name: "stigrule_PHTN-30-000019"
  internal.core.stig:
    _stig_apply: ansible.builtin.shell
    _stig_use_check_mode_probe: false
    _stig_manage: "{{ run_audit_config_permissions }}"
    _stig_gate_packages: [audit]
    _stig_validate: ansible.builtin.shell
    _stig_validate_args:
      cmd: |
        set -eu
        [ -z "$(find /etc/audit/ -type f -perm /137 -print 2>/dev/null)" ]
    cmd: |
      set -eu
      find /etc/audit/ -type f -exec chmod 0640 {} +

# --- PHTN-30-000040 - /var/log permissions (0755) ---
- name: "stigrule_PHTN-30-000040"
  internal.core.stig:
    _stig_apply: ansible.builtin.file
    _stig_manage: "{{ run_log_dir_permissions }}"
    path: /var/log
    mode: "0755"
    owner: root
    group: root

# --- PHTN-30-000041 - /var/log/messages permissions (0640) ---
- name: "stigrule_PHTN-30-000041"
  internal.core.stig:
    _stig_apply: ansible.builtin.shell
    _stig_use_check_mode_probe: false
    _stig_manage: "{{ run_log_messages_permissions }}"
    _stig_validate: ansible.builtin.shell
    _stig_validate_args:
      cmd: |
        set -eu
        test -f /var/log/messages
        perms=$(stat -c '%a %U %G' /var/log/messages)
        echo "$perms" | grep -qE '^640 root root'
    cmd: |
      set -eu
      touch /var/log/messages
      chmod 0640 /var/log/messages
      chown root:root /var/log/messages

# --- PHTN-30-000047 - auditd.conf owner/group (root:root) ---
- name: "stigrule_PHTN-30-000047"
  internal.core.stig:
    _stig_apply: ansible.builtin.file
    _stig_manage: "{{ run_audit_conf_permissions }}"
    _stig_gate_packages: [audit]
    path: '{{ var_auditd_conf_file }}'
    owner: root
    group: root

# --- PHTN-30-000048 - Audit tool binary permissions (0750) ---
- name: "stigrule_PHTN-30-000048"
  internal.core.stig:
    _stig_apply: ansible.builtin.shell
    _stig_use_check_mode_probe: false
    _stig_manage: "{{ run_audit_tools_permissions }}"
    _stig_gate_packages: [audit]
    _stig_validate: ansible.builtin.shell
    _stig_validate_args:
      cmd: |
        set -eu
        for f in /usr/sbin/auditctl /usr/sbin/auditd /usr/sbin/augenrules /usr/sbin/aureport /usr/sbin/ausearch /usr/sbin/autrace /usr/sbin/audispd; do
          [ ! -f "$f" ] && continue
          perms=$(stat -c '%a' "$f")
          [ "$perms" = "750" ] || exit 1
        done
    cmd: |
      set -eu
      for f in /usr/sbin/auditctl /usr/sbin/auditd /usr/sbin/augenrules /usr/sbin/aureport /usr/sbin/ausearch /usr/sbin/autrace /usr/sbin/audispd; do
        [ -f "$f" ] && chmod 0750 "$f"
      done

# --- PHTN-30-000090 - /etc/skel file permissions ---
- name: "stigrule_PHTN-30-000090"
  internal.core.stig:
    _stig_apply: ansible.builtin.shell
    _stig_use_check_mode_probe: false
    _stig_manage: "{{ run_skel_config_permissions }}"
