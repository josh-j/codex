---
# =============================================================================
# File and directory permissions — Photon OS 3.0 STIG
# =============================================================================

# --- PHTN-30-000016 - Audit log file permissions (0600) ---
- name: "stigrule_PHTN-30-000016"
  internal.core.stig:
    _stig_apply: ansible.builtin.shell
    _stig_use_check_mode_probe: false
    _stig_manage: "{{ run_audit_logs_permissions }}"
    _stig_gate_packages: [audit]
    _stig_validate: ansible.builtin.shell
    _stig_validate_args:
      cmd: |
        set -eu
        logdir=$(awk '/^\s*log_file\s*=/ {sub(/.*=\s*/, ""); print; exit}' {{ var_auditd_conf_file }} | xargs dirname 2>/dev/null)
        [ -n "$logdir" ] || logdir="/var/log/audit"
        [ -z "$(find "$logdir" -maxdepth 1 -name '*.log' ! -name 'auth.log' -perm /177 -print 2>/dev/null)" ]
    cmd: |
      set -eu
      logdir=$(awk '/^\s*log_file\s*=/ {sub(/.*=\s*/, ""); print; exit}' {{ var_auditd_conf_file }} | xargs dirname 2>/dev/null)
      [ -n "$logdir" ] || logdir="/var/log/audit"
      find "$logdir" -maxdepth 1 -name '*.log' ! -name 'auth.log' -exec chmod 0600 {} +

# --- PHTN-30-000017 - Audit log file owner (root) ---
- name: "stigrule_PHTN-30-000017"
  internal.core.stig:
    _stig_apply: ansible.builtin.shell
    _stig_use_check_mode_probe: false
    _stig_manage: "{{ run_audit_logs_owner }}"
