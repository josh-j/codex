        [ -n "$logdir" ] || logdir="/var/log/audit"
        [ -z "$(find "$logdir" -maxdepth 1 -name '*.log' ! -name 'auth.log' ! -user root -print 2>/dev/null)" ]
    cmd: |
      set -eu
      logdir=$(awk '/^\s*log_file\s*=/ {sub(/.*=\s*/, ""); print; exit}' {{ var_auditd_conf_file }} | xargs dirname 2>/dev/null)
      [ -n "$logdir" ] || logdir="/var/log/audit"
      find "$logdir" -maxdepth 1 -name '*.log' ! -name 'auth.log' ! -user root -exec chown root {} +

