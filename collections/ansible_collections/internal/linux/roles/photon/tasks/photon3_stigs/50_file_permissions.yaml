# --- PHTN-30-000091 - /root directory permissions (0700) ---
- name: "stigrule_PHTN-30-000091"
  internal.core.stig:
    _stig_apply: ansible.builtin.file
    _stig_manage: "{{ run_root_dir_permissions }}"
    path: /root
    state: directory
    mode: "0700"
    owner: root
    group: root

# --- PHTN-30-000092 - Init files permissions ---
- name: "stigrule_PHTN-30-000092"
  internal.core.stig:
    _stig_apply: ansible.builtin.shell
    _stig_use_check_mode_probe: false
    _stig_manage: "{{ run_init_files_permissions }}"
    _stig_validate: ansible.builtin.shell
    _stig_validate_args:
      cmd: |
        set -eu
        bad=""
        for f in /etc/bash.bashrc /etc/profile; do
          [ -f "$f" ] || continue
          perms=$(stat -c '%a %U %G' "$f")
          owner=$(echo "$perms" | awk '{print $2}')
          group=$(echo "$perms" | awk '{print $3}')
          mode=$(echo "$perms" | awk '{print $1}')
          other_w=$(( (mode % 10) & 2 ))
          [ "$owner" = "root" ] && [ "$group" = "root" ] && [ "$other_w" -eq 0 ] || bad="${bad}$f "
        done
        for f in /etc/profile.d/*; do
          [ -f "$f" ] || continue
          perms=$(stat -c '%a %U %G' "$f")
          owner=$(echo "$perms" | awk '{print $2}')
          group=$(echo "$perms" | awk '{print $3}')
          mode=$(echo "$perms" | awk '{print $1}')
          other_w=$(( (mode % 10) & 2 ))
          [ "$owner" = "root" ] && [ "$group" = "root" ] && [ "$other_w" -eq 0 ] || bad="${bad}$f "
        done
        [ -z "$bad" ]
    cmd: |
      set -eu
      for f in /etc/bash.bashrc /etc/profile; do
        [ -f "$f" ] && chown root:root "$f" && chmod o-w "$f"
      done
      for f in /etc/profile.d/*; do
        [ -f "$f" ] && chown root:root "$f" && chmod o-w "$f"
      done

# --- PHTN-30-000093 - rc.d file permissions ---
- name: "stigrule_PHTN-30-000093"
  internal.core.stig:
    _stig_apply: ansible.builtin.shell
    _stig_use_check_mode_probe: false
    _stig_manage: "{{ run_rcd_files_permissions }}"
    _stig_validate: ansible.builtin.shell
    _stig_validate_args:
      cmd: |
        set -eu
        [ -z "$(find /etc/rc.d/ -type f \( ! -user root -o ! -group root -o -perm /002 \) -print 2>/dev/null)" ]
    cmd: |
      set -eu
      find /etc/rc.d/ -type f \( ! -user root -o ! -group root -o -perm /002 \) -exec sh -c 'chown root:root "$1" && chmod o-w "$1"' _ {} \;

# --- PHTN-30-000094 - All files have owner/group (audit-only) ---
- name: "stigrule_PHTN-30-000094"
  internal.core.stig:
    _stig_apply: ansible.builtin.shell
    _stig_use_check_mode_probe: false
    _stig_audit_only: true
    _stig_manage: "{{ run_files_have_owner | default(true) }}"
    _stig_validate: ansible.builtin.shell
    _stig_validate_args:
      cmd: |
        set -eu
        [ -z "$(find / -path /proc -prune -o -path /sys -prune -o -path /dev -prune -o -path /run -prune -o \( -nouser -o -nogroup \) -print 2>/dev/null | head -1)" ]
    _stig_skip_post_validate: true
    cmd: "true"

# --- PHTN-30-000095 - /etc/cron.allow permissions (0600) ---
- name: "stigrule_PHTN-30-000095"
  internal.core.stig:
    _stig_apply: ansible.builtin.shell
    _stig_use_check_mode_probe: false
    _stig_manage: "{{ run_cron_allow_permissions }}"
    _stig_validate: ansible.builtin.shell
    _stig_validate_args:
      cmd: |
        set -eu
        test -f /etc/cron.allow
        perms=$(stat -c '%a %U %G' /etc/cron.allow)
        echo "$perms" | grep -qE '^600 root root'
    cmd: |
      set -eu
      touch /etc/cron.allow
      chmod 0600 /etc/cron.allow
      chown root:root /etc/cron.allow

# --- PHTN-30-000096 - Cron job file permissions (0644) ---
- name: "stigrule_PHTN-30-000096"
  internal.core.stig:
    _stig_apply: ansible.builtin.shell
    _stig_use_check_mode_probe: false
    _stig_manage: "{{ run_cron_files_permissions }}"
    _stig_validate: ansible.builtin.shell
    _stig_validate_args:
      cmd: |
        set -eu
        [ -z "$(find /etc/cron.d /etc/cron.daily /etc/cron.hourly /etc/cron.monthly /etc/cron.weekly -type f -perm /133 -print 2>/dev/null)" ]
    cmd: |
      set -eu
      find /etc/cron.d /etc/cron.daily /etc/cron.hourly /etc/cron.monthly /etc/cron.weekly -type f -exec chmod 0644 {} + 2>/dev/null || true

# --- PHTN-30-000097 - Cron directory permissions (0755) ---
- name: "stigrule_PHTN-30-000097"
  internal.core.stig:
    _stig_apply: ansible.builtin.shell
    _stig_use_check_mode_probe: false
    _stig_manage: "{{ run_cron_dir_permissions }}"
    _stig_validate: ansible.builtin.shell
    _stig_validate_args:
      cmd: |
        set -eu
        for d in /etc/cron.d /etc/cron.daily /etc/cron.hourly /etc/cron.monthly /etc/cron.weekly; do
          test -d "$d"
          perms=$(stat -c '%a %U %G' "$d")
          echo "$perms" | grep -qE '^755 root root'
        done
    cmd: |
      set -eu
      for d in /etc/cron.d /etc/cron.daily /etc/cron.hourly /etc/cron.monthly /etc/cron.weekly; do
        mkdir -p "$d"
        chmod 0755 "$d"
        chown root:root "$d"
      done

# --- PHTN-30-000108 - SSH public key permissions (0644) ---
- name: "stigrule_PHTN-30-000108"
  internal.core.stig:
    _stig_apply: ansible.builtin.shell
    _stig_use_check_mode_probe: false
    _stig_manage: "{{ run_ssh_pubkeys_permissions }}"
    _stig_validate: ansible.builtin.shell
    _stig_validate_args:
      cmd: |
        set -eu
        [ -z "$(find /etc/ssh -name '*.pub' \( -perm /133 -o ! -user root -o ! -group root \) -print 2>/dev/null)" ]
    cmd: |
      set -eu
      find /etc/ssh -name '*.pub' -exec chmod 0644 {} +
      find /etc/ssh -name '*.pub' -exec chown root:root {} +

