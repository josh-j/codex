---
# =============================================================================
# Package management and service controls — Photon OS 3.0 STIG
# =============================================================================

# --- PHTN-30-000026 - OpenSSH server version check ---
- name: "stigrule_PHTN-30-000026"
  internal.core.stig:
    _stig_apply: ansible.builtin.shell
    _stig_use_check_mode_probe: false
    _stig_audit_only: true
    _stig_manage: true
    _stig_validate: ansible.builtin.shell
    _stig_validate_args:
      cmd: |
        set -eu
        sshd -V 2>&1 || true
    _stig_skip_post_validate: true
    cmd: "true"

# --- PHTN-30-000051 - Package file integrity ---
- name: "stigrule_PHTN-30-000051"
  internal.core.stig:
    _stig_apply: ansible.builtin.shell
    _stig_use_check_mode_probe: false
    _stig_audit_only: true
    _stig_manage: true
    _stig_validate: ansible.builtin.shell
    _stig_validate_args:
      cmd: |
        set -eu
        test -z "$(rpm -V audit 2>/dev/null | grep '^..5' | grep -v '^...........c')"
    _stig_skip_post_validate: true
    cmd: "true"

# --- PHTN-30-000058 - NTP server configuration ---
- name: "stigrule_PHTN-30-000058"
  internal.core.stig:
    _stig_apply: ansible.builtin.shell
    _stig_use_check_mode_probe: false
    _stig_manage: "{{ run_set_ntp_server }}"
    _stig_gate_files: ['{{ var_ntp_conf_file }}']
    _stig_gate_status: not_reviewed
    _stig_validate: ansible.builtin.shell
    _stig_validate_args:
      cmd: |
        set -eu
        grep -qE '^\s*server\s+\S+' {{ var_ntp_conf_file }}
    cmd: |
      set -eu
      sed -i '/^\s*server\s/d' {{ var_ntp_conf_file }}
      {% for srv in var_ntp_servers %}
      {% if srv %}
      echo "server {{ srv }} iburst" >> {{ var_ntp_conf_file }}
      {% endif %}
      {% endfor %}
      systemctl restart ntpd 2>/dev/null || systemctl restart systemd-timesyncd 2>/dev/null || true

# --- PHTN-30-000059/000060 - tdnf gpgcheck ---
- name: "stigrule_PHTN-30-000059"
  internal.core.stig:
    _stig_apply: ansible.builtin.shell
    _stig_use_check_mode_probe: false
    _stig_manage: "{{ run_tdnf_gpgcheck }}"
    _stig_validate: ansible.builtin.shell
    _stig_validate_args:
      cmd: |
        set -eu
        ! grep -qiE '^\s*nosignature' /etc/rpmrc 2>/dev/null
        grep -qE '^\s*gpgcheck\s*=\s*1' {{ var_tdnf_conf_file }}
    cmd: |
      set -eu
      sed -i '/^\s*nosignature/d' /etc/rpmrc 2>/dev/null || true
      if grep -qE '^\s*gpgcheck\s*=' {{ var_tdnf_conf_file }}; then
        sed -i 's/^\s*gpgcheck\s*=.*/gpgcheck=1/' {{ var_tdnf_conf_file }}
      else
        echo 'gpgcheck=1' >> {{ var_tdnf_conf_file }}
      fi

# --- PHTN-30-000060 - RPM nosignature option disabled ---
- name: "stigrule_PHTN-30-000060"
  internal.core.stig:
    _stig_apply: ansible.builtin.shell
    _stig_use_check_mode_probe: false
    _stig_manage: true
    _stig_validate: ansible.builtin.shell
    _stig_validate_args:
      cmd: |
        set -eu
        ! grep -qi nosignature /etc/rpmrc 2>/dev/null
    cmd: |
      set -eu
      sed -i '/nosignature/Id' /etc/rpmrc 2>/dev/null || true

# --- PHTN-30-000061 - gpgcheck in all yum repos ---
- name: "stigrule_PHTN-30-000061"
  internal.core.stig:
    _stig_apply: ansible.builtin.shell
    _stig_use_check_mode_probe: false
    _stig_manage: "{{ run_yum_gpgcheck }}"
    _stig_validate: ansible.builtin.shell
    _stig_validate_args:
      cmd: |
        set -eu
        ! find /etc/yum.repos.d/ -name '*.repo' -exec grep -lE '^\s*gpgcheck\s*=\s*0' {} + 2>/dev/null | grep -q .
    cmd: |
      set -eu
      find /etc/yum.repos.d/ -name '*.repo' -exec \
        sed -i 's/^\s*gpgcheck\s*=\s*0/gpgcheck=1/' {} +

# --- PHTN-30-000066 - clean_requirements_on_remove in tdnf.conf ---
- name: "stigrule_PHTN-30-000066"
  internal.core.stig:
    _stig_apply: ansible.builtin.lineinfile
    _stig_manage: "{{ run_tdnf_cleanreqs }}"
    path: '{{ var_tdnf_conf_file }}'
    regexp: '^\s*clean_requirements_on_remove\s*='
    line: "clean_requirements_on_remove=true"
    state: present

# --- PHTN-30-000076 - Disable debug-shell ---
- name: "stigrule_PHTN-30-000076"
  internal.core.stig:
    _stig_apply: ansible.builtin.shell
    _stig_use_check_mode_probe: false
    _stig_manage: "{{ run_service_debug_shell }}"
    _stig_validate: ansible.builtin.shell
    _stig_validate_args:
      cmd: |
        state="$(systemctl is-enabled debug-shell.service 2>/dev/null)" || state="not-found"
        [ "$state" = "masked" ] || [ "$state" = "disabled" ] || [ "$state" = "not-found" ]
    cmd: |
      set -eu
      systemctl stop debug-shell.service 2>/dev/null || true
      systemctl disable debug-shell.service 2>/dev/null || true
      systemctl mask debug-shell.service 2>/dev/null || true

# --- PHTN-30-000089 - Mask ctrl-alt-del ---
- name: "stigrule_PHTN-30-000089"
  internal.core.stig:
    _stig_apply: ansible.builtin.shell
    _stig_use_check_mode_probe: false
    _stig_manage: "{{ run_mask_ctrl_alt_del }}"
    _stig_validate: ansible.builtin.shell
    _stig_validate_args:
      cmd: '[ "$(systemctl is-enabled ctrl-alt-del.target 2>/dev/null)" = "masked" ]'
    cmd: |
      set -eu
      systemctl disable ctrl-alt-del.target 2>/dev/null || true
      systemctl mask ctrl-alt-del.target
      systemctl daemon-reload
