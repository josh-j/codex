# =============================================================================
# PAM rules (shell+validator — Photon 3 uses pam_tally2 and pam_cracklib)
# =============================================================================

# --- PHTN-30-000002 - pam_tally2 account lockout ---
- name: "stigrule_PHTN-30-000002"
  internal.core.stig:
    _stig_apply: ansible.builtin.shell
    _stig_use_check_mode_probe: false
    _stig_manage: "{{ run_pamd_lock }}"
    _stig_validate: ansible.builtin.shell
    _stig_validate_args:
      cmd: |
        set -eu
        grep -qE 'pam_tally2\.so.*deny={{ var_pamd_lock }}.*onerr=fail.*audit' {{ var_pamd_systemauth_file }}
        grep -qE 'pam_tally2\.so.*onerr=fail.*audit' /etc/pam.d/system-account
    cmd: |
      set -eu
      f="{{ var_pamd_systemauth_file }}"
      line="auth required pam_tally2.so deny={{ var_pamd_lock }} onerr=fail audit even_deny_root unlock_time={{ var_pamd_unlock_time }} root_unlock_time={{ var_pamd_root_unlock_time }}"
      if grep -qE 'pam_tally2\.so' "$f"; then
        sed -i '/pam_tally2\.so/c\'"$line" "$f"
      else
        sed -i '1i\'"$line" "$f"
      fi
      # Account side
      acct_line="account required pam_tally2.so onerr=fail audit"
      if grep -qE 'pam_tally2\.so' /etc/pam.d/system-account 2>/dev/null; then
        sed -i '/pam_tally2\.so/c\'"$acct_line" /etc/pam.d/system-account
      else
        echo "$acct_line" >> /etc/pam.d/system-account
      fi

# --- PHTN-30-000021 - pam_cracklib ucredit ---
- name: "stigrule_PHTN-30-000021"
  internal.core.stig:
    _stig_apply: ansible.builtin.shell
    _stig_use_check_mode_probe: false
    _stig_manage: "{{ run_pamd_upperchars }}"
    _stig_validate: ansible.builtin.shell
    _stig_validate_args:
      cmd: |
        set -eu
        grep -E 'pam_cracklib\.so' {{ var_pamd_systempassword_file }} | grep -qE 'ucredit={{ var_pamd_upperchars }}'
    cmd: |
      set -eu
      f="{{ var_pamd_systempassword_file }}"
      if grep -qE 'ucredit=' "$f"; then
        sed -i 's/ucredit=[^ ]*/ucredit={{ var_pamd_upperchars }}/' "$f"
      else
        sed -i '/pam_cracklib\.so/s/$/ ucredit={{ var_pamd_upperchars }}/' "$f"
      fi

