# --- PHTN-30-000071 - pam_cracklib module presence ---
- name: "stigrule_PHTN-30-000071"
  internal.core.stig:
    _stig_apply: ansible.builtin.shell
    _stig_use_check_mode_probe: false
    _stig_manage: "{{ run_pamd_cracklib }}"
    _stig_validate: ansible.builtin.shell
    _stig_validate_args:
      cmd: |
        set -eu
        grep -qE 'pam_cracklib\.so' {{ var_pamd_systempassword_file }}
        lines=$(grep -cE 'pam_cracklib\.so' {{ var_pamd_systempassword_file }})
        [ "$lines" -eq 1 ]
    cmd: |
      set -eu
      f="{{ var_pamd_systempassword_file }}"
      if ! grep -qE 'pam_cracklib\.so' "$f"; then
        sed -i '1i password requisite pam_cracklib.so minlen={{ var_pamd_minlength }} minclass=4 ucredit={{ var_pamd_upperchars }} lcredit={{ var_pamd_lowerchars }} dcredit={{ var_pamd_numberchars }} ocredit={{ var_pamd_complexchars }} difok={{ var_pamd_diffchars }}' "$f"
      fi

