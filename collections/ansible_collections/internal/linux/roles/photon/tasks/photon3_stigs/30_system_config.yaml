# --- PHTN-30-000029 - pam_pwhistory remember ---
- name: "stigrule_PHTN-30-000029"
  internal.core.stig:
    _stig_apply: ansible.builtin.shell
    _stig_use_check_mode_probe: false
    _stig_manage: "{{ run_pamd_pwremember }}"
    _stig_validate: ansible.builtin.shell
    _stig_validate_args:
      cmd: |
        set -eu
        grep -qE 'pam_pwhistory\.so.*remember={{ var_pamd_pwremember }}' {{ var_pamd_systempassword_file }}
    cmd: |
      set -eu
      f="{{ var_pamd_systempassword_file }}"
      if grep -qE 'pam_pwhistory\.so' "$f"; then
        if grep -qE 'remember=' "$f"; then
          sed -i 's/remember=[^ ]*/remember={{ var_pamd_pwremember }}/' "$f"
        else
          sed -i '/pam_pwhistory\.so/s/$/ remember={{ var_pamd_pwremember }}/' "$f"
        fi
      else
        sed -i '/pam_cracklib\.so/a password required pam_pwhistory.so remember={{ var_pamd_pwremember }} use_authtok' "$f"
      fi

