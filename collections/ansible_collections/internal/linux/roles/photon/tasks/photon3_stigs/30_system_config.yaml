# --- PHTN-30-000245 - Disable FallbackDNS ---
- name: "stigrule_PHTN-30-000245"
  internal.core.stig:
    _stig_apply: ansible.builtin.lineinfile
    _stig_manage: "{{ run_dns_fallback }}"
    _stig_notify: [photon_restart_resolved]
    path: '{{ var_resolved_file }}'
    regexp: '^\s*FallbackDNS\s*='
    line: "FallbackDNS="
    state: present
  notify: photon_restart_resolved
