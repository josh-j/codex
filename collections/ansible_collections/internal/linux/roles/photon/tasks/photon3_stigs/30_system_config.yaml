        fi
      fi

# --- PHTN-30-000118 - Create /etc/security/opasswd ---
- name: "stigrule_PHTN-30-000118"
  internal.core.stig:
    _stig_apply: ansible.builtin.file
    _stig_manage: "{{ run_create_opasswd }}"
    path: /etc/security/opasswd
    state: touch
    owner: root
    group: root
    mode: "0600"
    modification_time: preserve
    access_time: preserve

# =============================================================================
# Misc system settings
# =============================================================================

# --- PHTN-30-000004 - maxlogins ---
- name: "stigrule_PHTN-30-000004"
  internal.core.stig:
    _stig_apply: ansible.builtin.lineinfile
    _stig_manage: "{{ run_limits_maxlogins }}"
    path: '{{ var_limits_conf_file }}'
    regexp: '^\*\s+hard\s+maxlogins\s+'
    line: "* hard maxlogins {{ var_limits_maxlogins }}"
    state: present

# --- PHTN-30-000005 - tmout.sh profile script ---
- name: "stigrule_PHTN-30-000005"
  internal.core.stig:
    _stig_apply: ansible.builtin.shell
    _stig_use_check_mode_probe: false
    _stig_manage: "{{ run_configure_tmout }}"
    _stig_validate: ansible.builtin.shell
    _stig_validate_args:
      cmd: |
        set -eu
        grep -qE '^TMOUT={{ var_tmout_sh }}' /etc/profile.d/tmout.sh
        grep -qE '^readonly TMOUT' /etc/profile.d/tmout.sh
    cmd: |
      set -eu
      cat > /etc/profile.d/tmout.sh <<'TMEOF'
      TMOUT={{ var_tmout_sh }}
      readonly TMOUT
      export TMOUT
      mesg n 2>/dev/null
      TMEOF
      chmod 0644 /etc/profile.d/tmout.sh
      chown root:root /etc/profile.d/tmout.sh

# --- PHTN-30-000007 - rsyslog authpriv logging ---
- name: "stigrule_PHTN-30-000007"
  internal.core.stig:
    _stig_apply: ansible.builtin.lineinfile
    _stig_manage: "{{ run_sshd_rsyslog }}"
    _stig_gate_packages: [rsyslog]
    _stig_notify: [photon_restart_rsyslog]
    path: '{{ var_syslog_conf_path }}'
    regexp: '^\s*authpriv\.\*'
    line: "authpriv.* {{ var_syslog_authpriv_log }}"
    state: present
    create: true
  notify: photon_restart_rsyslog

# --- PHTN-30-000032 - Disable kernel modules via modprobe.conf ---
- name: "stigrule_PHTN-30-000032"
  internal.core.stig:
    _stig_apply: ansible.builtin.shell
    _stig_use_check_mode_probe: false
    _stig_manage: "{{ run_disable_kernel_modules }}"
    _stig_validate: ansible.builtin.shell
    _stig_validate_args:
      cmd: |
        set -eu
        grep -qE '^install sctp /bin/false' {{ var_modprobe_conf_file }}
        grep -qE '^install usb_storage /bin/false' {{ var_modprobe_conf_file }}
        grep -qE '^install bluetooth /bin/false' {{ var_modprobe_conf_file }}
    cmd: |
      set -eu
      cat > {{ var_modprobe_conf_file }} <<'MODEOF'
      install sctp /bin/false
      install dccp /bin/false
      install dccp_ipv4 /bin/false
      install dccp_ipv6 /bin/false
      install ipx /bin/false
      install appletalk /bin/false
      install decnet /bin/false
      install rds /bin/false
      install tipc /bin/false
      install bluetooth /bin/false
      install usb_storage /bin/false
      install ieee1394 /bin/false
      install cramfs /bin/false
      install freevxfs /bin/false
      install jffs2 /bin/false
      install hfs /bin/false
      install hfsplus /bin/false
      install squashfs /bin/false
      install udf /bin/false
      MODEOF
      chmod 0644 {{ var_modprobe_conf_file }}
      chown root:root {{ var_modprobe_conf_file }}

# --- PHTN-30-000033 - Duplicate UIDs (audit-only) ---
- name: "stigrule_PHTN-30-000033"
  internal.core.stig:
    _stig_apply: ansible.builtin.shell
    _stig_use_check_mode_probe: false
    _stig_audit_only: true
    _stig_manage: "{{ run_duplicate_user_uids }}"
    _stig_validate: ansible.builtin.shell
    _stig_validate_args:
      cmd: |
        set -eu
        test -z "$(awk -F: '{print $3}' /etc/passwd | sort -n | uniq -d)"
    _stig_skip_post_validate: true
    cmd: "true"

# --- PHTN-30-000035 - INACTIVE=0 in useradd ---
- name: "stigrule_PHTN-30-000035"
  internal.core.stig:
    _stig_apply: ansible.builtin.lineinfile
    _stig_manage: "{{ run_useradd_inactive }}"
    path: '{{ var_useradd_file }}'
    regexp: '^\s*INACTIVE\s*='
    line: "INACTIVE={{ var_useradd_inactive }}"
    state: present

# --- PHTN-30-000062 - NOPASSWD in sudoers (audit-only) ---
- name: "stigrule_PHTN-30-000062"
  internal.core.stig:
    _stig_apply: ansible.builtin.shell
    _stig_use_check_mode_probe: false
    _stig_audit_only: true
    _stig_manage: "{{ run_sudo_nopasswd }}"
    _stig_validate: ansible.builtin.shell
    _stig_validate_args:
      cmd: |
        set -eu
        ! grep -rE '^\s*[^#].*NOPASSWD' /etc/sudoers /etc/sudoers.d/ 2>/dev/null | grep -q .
    _stig_skip_post_validate: true
    cmd: "true"


