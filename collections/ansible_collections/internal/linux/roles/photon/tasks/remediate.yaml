---
# internal.linux.photon : tasks/remediate.yaml
# Delegates to stig.yaml with hardening enabled.

- name: "Photon STIG | Enable hardening mode"
  ansible.builtin.set_fact:
    photon_stig_enable_hardening: true
  changed_when: false

- name: "Photon STIG | Run remediation via stig orchestrator"
  ansible.builtin.include_tasks: stig.yaml
