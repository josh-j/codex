---
# internal/linux/playbooks/ubuntu_stig_audit.yml
# Read-only Ubuntu STIG verification collection + compliance report.
- name: "Ubuntu | STIG Verify"
  hosts: "{{ ubuntu_target_hosts | default('ubuntu_servers') }}"
  gather_facts: true
  tags: ["ubuntu", "stig", "audit", "verify", "security"]
  roles:
    - role: internal.linux.ubuntu
      vars:
        ncs_action: audit
        ncs_profile: stig

- name: "Ubuntu | STIG Compliance Report"
  ansible.builtin.import_playbook: ubuntu_stig_verify.yml
