---
# internal/linux/playbooks/ubuntu_proxyjump_bootstrap.yml
# Idempotent: writes a host_vars snippet pinning ProxyJump for an Ubuntu
# host that's only reachable through a jump host (e.g. an isolated lab
# subnet routed through a maas/router VM). The snippet is plain YAML;
# vault the file separately if your inventory policy requires it.
#
# After this runs once, every subsequent ubuntu_* playbook against the
# target host just works — no per-invocation ``-o ProxyJump=...`` flags.
#
# Required vars:
#   - ubuntu_proxyjump_via       Jump-host SSH spec, e.g. "sio@maas"
#   - ubuntu_proxyjump_target    Inventory hostname to scope the host_vars to
#
# Optional vars:
#   - ubuntu_proxyjump_host_vars_dir
#       Directory under the orchestrator inventory where host_vars/ live.
#       Defaults to the active inventory's host_vars/ via inventory_dir.
#
# Run on the controller (no SSH session to the target needed).

- name: "Ubuntu | ProxyJump Bootstrap"
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    ubuntu_proxyjump_host_vars_dir: "{{ inventory_dir }}/host_vars"
  tasks:
    - name: "Ubuntu ProxyJump | Validate inputs"
      ansible.builtin.assert:
        that:
          - ubuntu_proxyjump_via is defined and ubuntu_proxyjump_via | length > 0
          - ubuntu_proxyjump_target is defined and ubuntu_proxyjump_target | length > 0
        fail_msg: >-
          ubuntu_proxyjump_via and ubuntu_proxyjump_target are required.
          Example: -e ubuntu_proxyjump_via=sio@maas -e ubuntu_proxyjump_target=ubu01

    - name: "Ubuntu ProxyJump | Ensure host_vars/ exists"
      ansible.builtin.file:
        path: "{{ ubuntu_proxyjump_host_vars_dir }}"
        state: directory
        mode: "0755"

    - name: "Ubuntu ProxyJump | Write host_vars snippet"
      ansible.builtin.copy:
        dest: "{{ ubuntu_proxyjump_host_vars_dir }}/{{ ubuntu_proxyjump_target }}.yaml"
        content: |
          ---
          # Generated by internal.linux.ubuntu_proxyjump_bootstrap. Re-run with
          # different ubuntu_proxyjump_via to update.
          ansible_ssh_common_args: "-o ProxyJump={{ ubuntu_proxyjump_via }} -o StrictHostKeyChecking=accept-new"
        mode: "0644"
