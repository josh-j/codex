# yaml-language-server: $schema=../../.schemas/ncs_reporter_config_schema.json
# Shared Linux alerts — included by linux.yaml, photon.yaml, etc.

- id: memory_critical
  category: "Capacity"
  severity: CRITICAL
  when: memory_used_pct >= 98.0
  message: "Memory saturation: {{ memory_used_pct | round(1) }}% used"

- id: memory_warning
  category: "Capacity"
  severity: WARNING
  suppress_if: memory_critical
  when: memory_used_pct >= 85.0 and memory_used_pct < 98.0
  message: "Memory pressure: {{ memory_used_pct | round(1) }}% used"

- id: disk_critical
  category: "Capacity"
  severity: CRITICAL
  when: disks | selectattr('used_pct', 'ge', 95.0) | list | length > 0
  message: "One or more filesystems critically full (>=95%)"

- id: disk_warning
  category: "Capacity"
  severity: WARNING
  suppress_if: disk_critical
  when: disks | selectattr('used_pct', 'ge', 80.0) | rejectattr('used_pct', 'ge', 95.0) | list | length > 0
  message: "One or more filesystems reaching capacity (>=80%)"

- id: services_failed
  category: "Availability"
  severity: CRITICAL
  when: failed_services_count > 0
  message: "{{ failed_services_count }} systemd service(s) failed"

- id: reboot_pending
  category: "Patching"
  severity: WARNING
  when: reboot_pending == 1.0
  message: "System requires a reboot to apply kernel or security updates"

- id: pending_updates
  category: "Patching"
  severity: WARNING
  when: pending_updates_count > 0
  message: "{{ pending_updates_count }} package update(s) pending"

- id: uptime_violation
  category: "Maintenance"
  severity: WARNING
  when: uptime_days > 180.0
  message: "Uptime policy violation: server has not rebooted in over 6 months ({{ uptime_days | round(0) }} days)"

- id: world_writable_files
  category: "Security"
  severity: WARNING
  when: world_writable_count > 0
  message: "{{ world_writable_count }} world-writable file(s) detected"

- id: auditd_inactive
  category: "Logging"
  severity: WARNING
  when: not audit_active
  message: "auditd service is not running — security audit trail is incomplete"

- id: syslog_inactive
  category: "Logging"
  severity: WARNING
  when: not syslog_active
  message: "no syslog daemon is running (rsyslog/syslog-ng) — system events may not be persisted"

- id: recent_journal_critical
  category: "Logging"
  severity: WARNING
  when: critical_journal_event_count > 0
  message: "{{ critical_journal_event_count }} critical/error journal event(s) in the last 24h"

- id: non_standard_user_count_high
  category: "Inventory"
  severity: INFO
  when: non_standard_user_count > 5
  message: "{{ non_standard_user_count }} non-standard user account(s) (UID ≥ 1000) — review for unauthorized accounts"
