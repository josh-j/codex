# yaml-language-server: $schema=../../.schemas/ncs_reporter_config_schema.json
config:
  platform: linux/ubuntu
  stig:
    ansible_playbook:
      path: "internal.linux.ubuntu_stig_remediate"
      target_var: "ubuntu_target_hosts"
    platform_to_checklist:
      ubuntu: cklb_skeletons/U_CAN_Ubuntu_24-04_LTS_STIG_V1R4.cklb
    rule_prefix_to_platform:
      UBTU: ubuntu
      GEN: ubuntu
  extra_inventory_widget_columns:
    - name: Distribution
      value: "{{ distribution }}"
    - name: Uptime (d)
      value: "{{ uptime_days }}"
    - name: Critical
      value: "{{ _critical_count }}"
    - name: Warning
      value: "{{ _warning_count }}"
vars:
  $include: "linux_base_fields.yaml"

alerts:
  $include: "linux_base_alerts.yaml"

widgets:
  $include: "linux_base_widgets.yaml"
