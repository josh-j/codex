---
# Write vault SSH key to temp file and activate key-based auth.
- name: Write SSH key to temp file
  ansible.builtin.copy:
    content: "{{ vault_logservers_private_key }}"
    dest: /tmp/logservers_key
    mode: "0600"
  delegate_to: localhost
  run_once: true
  when: vault_logservers_private_key | default('') | trim | length > 0

- name: Activate SSH key auth
  ansible.builtin.set_fact:
    ansible_ssh_private_key_file: /tmp/logservers_key
  when: vault_logservers_private_key | default('') | trim | length > 0
