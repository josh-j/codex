---
argument_specs:
  main:
    short_description: Photon OS audit, collection, and STIG orchestration
    description:
      - Collects Photon OS system state and security configuration.
      - Performs STIG compliance evaluation and optional hardening.
      - Manages local user passwords.
      - Connects via SSH (credentials from inventory group_vars).
    options:
      ncs_action:
        type: str
        required: false
        default: collect
        choices: [collect, audit, remediate, verify]
        description: Primary action to perform.
      ncs_profile:
        type: str
        required: false
        choices: [stig]
        description: Compliance profile. Mutually exclusive with ncs_operation.
      ncs_operation:
        type: str
        required: false
        choices: [password_status, password_rotate]
        description: Named operation. Mutually exclusive with ncs_profile.
      photon_skip_export:
        type: bool
        required: false
        default: false
        description: Skip telemetry export.
      photon_stig_enable_audit:
        type: bool
        required: false
        default: true
        description: Enable STIG audit checks.
      photon_stig_enable_hardening:
        type: bool
        required: false
        default: false
        description: Enable STIG remediation (mutating).
