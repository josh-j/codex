---
# =============================================================================
# SSH hardening — Photon OS 3.0 STIG
# ~22 rules, mostly lineinfile on sshd_config
# =============================================================================

# --- PHTN-30-000003 - SSH Banner ---
- name: "stigrule_PHTN-30-000003"
  internal.core.stig:
    _stig_apply: ansible.builtin.lineinfile
    _stig_manage: "{{ run_sshd_banner }}"
    _stig_notify: [photon_restart_sshd]
    path: '{{ var_sshd_config_file }}'
    regexp: '^#?\s*Banner\s'
    line: "Banner {{ var_sshd_banner }}"
    state: present
  notify: photon_restart_sshd

- name: "stigrule_PHTN-30-000003 - Deploy DoD banner"
  ansible.builtin.template:
    src: "{{ _ncs_task_root }}/stig_photon3/templates/issue"
    dest: /etc/issue
    owner: root
    group: root
    mode: "0644"
  when:
    - run_sshd_banner | bool
    - _photon3_stig_phase != 'audit'

# --- SSH sshd_config lineinfile rules ---
- block:
    - name: "stigrule_PHTN-30-000006"
      internal.core.stig:
        _stig_manage: "{{ run_sshd_syslogfacility }}"
