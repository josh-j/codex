---
# internal.linux.common : tasks/password_status.yaml
# Shared Linux password status check (Ubuntu + Photon).
#
# Required vars:
#   _ncs_role_label — Display name for task labels (e.g. "Ubuntu", "Photon")

- name: "{{ _ncs_role_label }} Password Status | Check SSH connectivity"
  ansible.builtin.wait_for_connection:
    timeout: "{{ ansible_ssh_timeout | default(10) }}"

- name: "{{ _ncs_role_label }} Password Status | Get password aging info"
  ansible.builtin.command: chage -l {{ rotate_user | default('root') }}
  register: _linux_chage
  changed_when: false

- name: "{{ _ncs_role_label }} Password Status | Get account status"
  ansible.builtin.command: passwd -S {{ rotate_user | default('root') }}
  register: _linux_passwd
  changed_when: false

- name: "{{ _ncs_role_label }} Password Status | Display password status"
  ansible.builtin.debug:
    msg: |-
      === {{ inventory_hostname }} | {{ rotate_user | default('root') }} ===
      {{ _linux_passwd.stdout }}
      {{ _linux_chage.stdout }}
