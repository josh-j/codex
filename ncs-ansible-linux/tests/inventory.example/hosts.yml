---
# internal.linux test inventory skeleton.
# Copy this directory to tests/inventory/ and replace the example hosts
# with real lab machines. ubuntu_servers and photon_servers are the
# group names the playbooks (ubuntu_collect.yml, photon_stig_audit.yml,
# …) default to via *_target_hosts variables.

all:
  children:
    ubuntu_servers:
      hosts:
        ubuntu-lab-01.example.test:
          ansible_host: 10.0.0.10
    photon_servers:
      hosts:
        photon-lab-01.example.test:
          ansible_host: 10.0.0.20
