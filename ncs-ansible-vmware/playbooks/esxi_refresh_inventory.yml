---
# internal/vmware/playbooks/esxi_refresh_inventory.yml
# Queries all vCenters and writes inventory/production/esxi_hosts.yaml
# with discovered ESXi hosts grouped by managing vCenter.
#
# Usage:
#   just refresh-esxi-inventory
#   ansible-playbook internal.vmware.esxi_refresh_inventory

- name: "Refresh ESXi host inventory"
  hosts: vcsa
  connection: local
  gather_facts: false
  become: false
  vars:
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
    _inventory_path: "{{ playbook_dir }}/../../../inventory/production/esxi_hosts.yaml"
  tasks:
    - name: "Init vCenter connection"
      ansible.builtin.include_role:
        name: internal.vmware.common
        tasks_from: init_vcenter

    - name: "Query datacenters"
      community.vmware.vmware_datacenter_info:
        hostname: "{{ ansible_host }}"
        username: "{{ vmware_username }}"
        password: "{{ vmware_password }}"
        validate_certs: "{{ vmware_validate_certs | default(false) | bool }}"
      register: _refresh_datacenters

    - name: "Query clusters per datacenter"
      vmware.vmware.cluster_info:
        hostname: "{{ ansible_host }}"
        username: "{{ vmware_username }}"
        password: "{{ vmware_password }}"
        validate_certs: "{{ vmware_validate_certs | default(false) | bool }}"
        datacenter: "{{ item }}"
      loop: "{{ _refresh_datacenters.datacenter_info | default([]) | map(attribute='name') | list }}"
      register: _refresh_clusters

    - name: "Extract ESXi hostnames"
      ansible.builtin.set_fact:
        _refresh_esxi_hosts: >-
          {{
            _refresh_clusters.results | default([])
            | selectattr('clusters', 'defined')
            | map(attribute='clusters')
            | map('dict2items') | flatten
            | map(attribute='value')
            | selectattr('hosts', 'defined')
            | map(attribute='hosts') | flatten
            | map(attribute='name')
            | sort | unique | list
          }}

    - name: "Store per-vCenter results"
      ansible.builtin.set_fact:
        _refresh_result:
          vcenter: "{{ inventory_hostname }}"
          hosts: "{{ _refresh_esxi_hosts | default([]) }}"

    - name: "Write inventory file"
      ansible.builtin.copy:
        content: |
          ---
          # ESXi hosts grouped by managing vCenter.
          # Auto-generated by: ansible-playbook internal.vmware.esxi_refresh_inventory
          # ansible_host on each ESXi entry points to its managing vCenter.
          # These are "phantom" inventory entries for --limit targeting only.
          all:
            children:
              esxi_hosts:
                vars:
                  vmware_validate_certs: false
                children:
          {% for vc in groups['vcsa'] | sort %}
          {% set result = hostvars[vc]['_refresh_result'] | default(none) %}
          {% if result is not none %}
          {% set site_code = result.vcenter | regex_replace('^vcsa-', '') %}
                  esxi_{{ site_code }}:
                    vars:
                      ansible_host: "{{ hostvars[result.vcenter]['ansible_host'] | default(result.vcenter) }}"
          {% if result.hosts | length > 0 %}
                    hosts:
          {% for host in result.hosts | sort %}
                      {{ host }}: {}
          {% endfor %}
          {% else %}
                    hosts: {}
          {% endif %}
          {% endif %}
          {% endfor %}
        dest: "{{ _inventory_path }}"
        mode: "0644"
      run_once: true

    - name: "Summary"
      ansible.builtin.debug:
        msg: >-
          Wrote {{ groups['vcsa'] | map('extract', hostvars, '_refresh_result')
          | select('defined') | map(attribute='hosts') | map('length') | sum }} ESXi hosts
          across {{ groups['vcsa'] | length }} vCenters to {{ _inventory_path }}
      run_once: true
