# >>>
# options:
#   esxi_stig_enable_ssh_checks: bool = true | SSH Checks | Run SSH-based STIG checks (disable for lockdown mode hosts)
# <<<
---
# internal/vmware/playbooks/esxi_stig_remediate.yml
# Automated security hardening remediation for VMware ESXi hosts.

- name: "Phase 2c | ESXi STIG Hardening"
  hosts: "vcsa:esxi_hosts"
  connection: local
  gather_facts: false
  become: false
  tags: ["vmware", "stig", "remediate", "esxi"]
  vars:
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
    esxi_stig_enable_ssh_checks: false
  pre_tasks:
    - name: Resolve ESXi targets from vSphere graph
      internal.vmware.vsphere_graph_targets_info:
        report_directory: "{{ lookup('env', 'NCS_REPORT_DIRECTORY') | default(ncs_report_directory | default(ncs_config.report_directory | default('/srv/samba/reports/data')), true) }}"
        target_type: esxi
      register: _graph_esxi_targets
      delegate_to: localhost
      changed_when: false
      when: esxi_stig_target_hosts | default([]) | length == 0

    - name: Use graph-selected ESXi targets
      ansible.builtin.set_fact:
        esxi_stig_target_hosts: "{{ _graph_esxi_targets.targets }}"
      changed_when: false
      when:
        - esxi_stig_target_hosts | default([]) | length == 0
        - _graph_esxi_targets.targets | default([]) | length > 0

    - name: Route ESXi targets
      ansible.builtin.include_role:
        name: internal.vmware.common
        tasks_from: route_esxi

  tasks:
    - name: "Execute ESXi STIG Hardening"
      ansible.builtin.include_role:
        name: internal.vmware.esxi
      vars:
        ncs_action: remediate
        ncs_profile: stig
      when: esxi_stig_target_hosts | default([]) | length > 0

- name: "Phase 2e | Post-Remediation ESXi STIG Audit"
  hosts: "vcsa:esxi_hosts"
  connection: local
  gather_facts: false
  become: false
  tags: ["vmware", "stig", "audit", "esxi"]
  vars:
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
  pre_tasks:
    - name: Resolve ESXi targets from vSphere graph
      internal.vmware.vsphere_graph_targets_info:
        report_directory: "{{ lookup('env', 'NCS_REPORT_DIRECTORY') | default(ncs_report_directory | default(ncs_config.report_directory | default('/srv/samba/reports/data')), true) }}"
        target_type: esxi
      register: _graph_esxi_targets
      delegate_to: localhost
      changed_when: false
      when: esxi_stig_target_hosts | default([]) | length == 0

    - name: Use graph-selected ESXi targets
      ansible.builtin.set_fact:
        esxi_stig_target_hosts: "{{ _graph_esxi_targets.targets }}"
      changed_when: false
      when:
        - esxi_stig_target_hosts | default([]) | length == 0
        - _graph_esxi_targets.targets | default([]) | length > 0

    - name: Route ESXi targets
      ansible.builtin.include_role:
        name: internal.vmware.common
        tasks_from: route_esxi
  tasks:
    - name: "Execute Post-Remediation ESXi STIG Audit"
      ansible.builtin.include_role:
        name: internal.vmware.esxi
      vars:
        ncs_action: verify
        ncs_profile: stig
      when: esxi_stig_target_hosts | default([]) | length > 0
