---
# internal.vmware test inventory skeleton.
# Copy this directory to tests/inventory/ and replace the example hosts
# with real lab vCenters / ESXi hosts. The collect + STIG playbooks
# default to groups vcsa, esxi_hosts, and (for VM audits) the dynamic
# vm_targets group populated by the discovery tasks.

all:
  children:
    vcsa:
      hosts:
        vcsa-lab-01.example.test:
          ansible_host: 10.0.1.10
          vmware_hostname: vcsa-lab-01.example.test
          vmware_username: "administrator@vsphere.local"
          vmware_password: "{{ vault_vcenter_password }}"
    esxi_hosts:
      hosts:
        esxi-lab-01.example.test:
          ansible_host: 10.0.1.20
        esxi-lab-02.example.test:
          ansible_host: 10.0.1.21
