---
# Resolve VMware connection parameters from vault or explicit variables.
# Safe to call multiple times — set_fact is idempotent.
#
# Input:  vmware_hostname (optional override → sets ansible_host)
#         vmware_username, vmware_password (optional, fall back to vault_vcenter_*)
# Output: ansible_host (if vmware_hostname provided)
#         vmware_username, vmware_password, vmware_validate_certs (resolved)

- name: Apply vmware_hostname override
  ansible.builtin.set_fact:
    ansible_host: "{{ vmware_hostname | regex_replace('^https?://', '') | regex_replace('/.*$', '') }}"
  when: vmware_hostname is defined
  changed_when: false

- name: Resolve VMware connection parameters
  ansible.builtin.set_fact:
    # Adapt vaulted credentials to role-standard names
    vmware_username: "{{ vmware_username | default(vault_vcenter_username | default('')) }}"
    vmware_password: "{{ vmware_password | default(vault_vcenter_password | default('')) }}"
    vmware_validate_certs: "{{ vmware_validate_certs | default(false) | bool }}"
  changed_when: false
  no_log: true
