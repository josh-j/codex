---
# internal.vmware.esxi : tasks/main.yaml

- name: "ESXi | Capture task root"
  ansible.builtin.set_fact:
    _ncs_task_root: "{{ role_path }}/tasks"
  changed_when: false

- name: "ESXi | Dispatch"
  module_defaults:
    group/community.vmware.vmware:
      hostname: "{{ ansible_host }}"
      username: "{{ vmware_username }}"
      password: "{{ vmware_password }}"
      validate_certs: "{{ vmware_validate_certs | default(false) | bool }}"
    group/vmware.vmware.vmware:
      hostname: "{{ ansible_host }}"
      username: "{{ vmware_username }}"
      password: "{{ vmware_password }}"
      validate_certs: "{{ vmware_validate_certs | default(false) | bool }}"
    internal.core.stig:
      _stig_module_defaults:
        hostname: "{{ ansible_host }}"
        username: "{{ vmware_username }}"
        password: "{{ vmware_password }}"
        validate_certs: "{{ vmware_validate_certs | default(false) | bool }}"
  block:
    - name: "ESXi | Include dispatcher"
      ansible.builtin.include_role:
        name: internal.core.dispatch
      vars:
        _ncs_role_label: ESXi
        _ncs_default_action: collect
        _ncs_action_routes:
          - collect
        _ncs_allowed_operations:
          - password_status
          - password_rotate
        _ncs_extra_validations:
          - "{{ (_ncs_requested_operation != 'password_rotate') or (_ncs_requested_action == 'remediate') }}"
          - "{{ (_ncs_requested_operation != 'password_status') or (_ncs_requested_action in ['audit', 'verify']) }}"

        _dispatch_map:
          collect: collect
          password_status: maintain/password_status
          password_rotate: maintain/password_rotate
          _default_: stig
