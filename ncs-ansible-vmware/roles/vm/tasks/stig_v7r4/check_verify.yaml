---
# check_verify.yaml — Phase 2 post-remediation re-audit
# Always runs in check_mode regardless of vm_stig_enable_hardening

- name: "VM STIG | Verify each VM"
  ansible.builtin.include_tasks: stig_v7r4/main.yaml
  loop: "{{ vm_stig_target_vms | reject('match', '^vCLS-') | list }}"
  loop_control:
    loop_var: _current_vm_name
    label: "{{ _current_vm_name }}"
  args:
    apply:
      check_mode: true
      tags: [stig_task]
      vars:
        stig_target_host: "{{ _current_vm_name }}"
        stig_target_type: "vm"
        stig_platform: "vmware/vm"
  ignore_errors: true  # noqa: ignore-errors — assert failures are expected; ncs_collector captures them
