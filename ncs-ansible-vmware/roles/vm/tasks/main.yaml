---
# internal.vmware.vm : tasks/main.yaml

- name: "VM | Capture task root"
  ansible.builtin.set_fact:
    _ncs_task_root: "{{ role_path }}/tasks"
  changed_when: false

- name: "VM | Dispatch"
  module_defaults:
    group/community.vmware.vmware: "{{ _vmware_creds }}"
    internal.core.stig:
      _stig_module_defaults: "{{ _vmware_creds }}"
  block:
    - name: "VM | Include dispatcher"
      ansible.builtin.include_role:
        name: internal.core.dispatch
      vars:
        _ncs_role_label: VM
        _ncs_default_action: collect
        _ncs_action_routes:
          - collect
        _ncs_allowed_operations:
          - snapshot
        _ncs_extra_validations:
          - "{{ (_ncs_requested_operation == 'none') or (_ncs_requested_action == 'remediate') }}"
        _dispatch_map:
          collect: collect
          snapshot: maintain/snapshot
          _default_: stig
