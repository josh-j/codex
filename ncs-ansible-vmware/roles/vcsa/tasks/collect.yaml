---
# internal.vmware.vcsa : tasks/collect.yaml
# VCSA collection: infrastructure inventory, appliance health, alarms.

- name: Collect | Preflight
  ansible.builtin.include_tasks: preflight.yaml
  tags: [always]

- name: VCSA Collect
  block:
    - name: Collect | Bootstrap shared collection state
      ansible.builtin.include_role:
        name: internal.vmware.common
        tasks_from: init_collection
      vars:
        vmware_collection_raw_placeholders:
          _raw_appliance_health: {}
          _raw_appliance_backup: {}
          _raw_alarms: {}
          _raw_datacenters: {}
          _raw_clusters: {}
          _raw_datastores: {}
          _raw_resource_pools: {}
          _raw_dvswitches: {}
          _raw_dvs_portgroups: {}
          _raw_licenses: {}
          _raw_extensions: {}
          _raw_content_library_ids: {}
          _raw_content_libraries: {}
          _raw_tag_categories: {}
          _raw_tags: {}
          _raw_vcsa_vms_tagged: {}
          _raw_vcsa_vms_untagged: {}
          _raw_vcsa_snapshots: {}

    # --- Inventory ---

    - name: Inventory | Query Datacenters
      community.vmware.vmware_datacenter_info:
      register: _raw_datacenters
      delegate_to: localhost
      no_log: true
      failed_when: false
      changed_when: false
      when: vcsa_collect_datacenters | default(true) | bool

    - name: Inventory | Extract Datacenter list
      ansible.builtin.set_fact:
        _vcenter_datacenters: "{{ _raw_datacenters.datacenter_info | default([]) | map(attribute='name') | list }}"
      changed_when: false
      when: vcsa_collect_datacenters | default(true) | bool

    - name: Inventory | Query Compute (Clusters & Hosts)
      vmware.vmware.cluster_info:
        datacenter: "{{ item }}"
      loop: "{{ _vcenter_datacenters }}"
      register: _raw_clusters
      delegate_to: localhost
      no_log: true
      failed_when: false
      changed_when: false
      when:
        - vcsa_collect_compute | default(true) | bool
        - _vcenter_datacenters | default([]) | length > 0

    - name: Inventory | Query Storage (Datastores)
      community.vmware.vmware_datastore_info:
        datacenter: "{{ item }}"
      loop: "{{ _vcenter_datacenters }}"
      register: _raw_datastores
      delegate_to: localhost
      no_log: true
      failed_when: false
      changed_when: false
      retries: 2
      delay: 5
      until: _raw_datastores is succeeded
      when:
        - vcsa_collect_storage | default(true) | bool
        - _vcenter_datacenters | default([]) | length > 0

    - name: Inventory | Query Resource Pools
      community.vmware.vmware_resource_pool_info:
      register: _raw_resource_pools
      delegate_to: localhost
      no_log: true
      failed_when: false
      changed_when: false
      when: vcsa_collect_resource_pools | default(true) | bool

    - name: Inventory | Query Distributed Switches
      community.vmware.vmware_dvswitch_info:
      register: _raw_dvswitches
      delegate_to: localhost
      no_log: true
      failed_when: false
      changed_when: false
      when: vcsa_collect_networking | default(true) | bool

    - name: Inventory | Query Distributed Portgroups
      community.vmware.vmware_dvs_portgroup_info:
        datacenter: "{{ item }}"
      loop: "{{ _vcenter_datacenters }}"
      register: _raw_dvs_portgroups
      delegate_to: localhost
      no_log: true
      failed_when: false
      changed_when: false
      when:
        - vcsa_collect_networking | default(true) | bool
        - _vcenter_datacenters | default([]) | length > 0

    - name: Inventory | Query Licenses
      vmware.vmware.license_info:
      register: _raw_licenses
      delegate_to: localhost
      no_log: true
      failed_when: false
      changed_when: false
      when: vcsa_collect_licenses | default(true) | bool

    - name: Inventory | Query vCenter Extensions
      community.vmware.vcenter_extension_info:
      register: _raw_extensions
      delegate_to: localhost
      no_log: true
      failed_when: false
      changed_when: false
      when: vcsa_collect_extensions | default(true) | bool

    - name: Inventory | Query Content Library IDs
      community.vmware.vmware_content_library_info:
      register: _raw_content_library_ids
      delegate_to: localhost
      no_log: true
      failed_when: false
      changed_when: false
      when: vcsa_collect_content_libraries | default(true) | bool

    - name: Inventory | Query Content Library Details
      community.vmware.vmware_content_library_info:
        library_id: "{{ item }}"
      loop: "{{ (_raw_content_library_ids | default({})).content_libs | default([]) }}"
      register: _raw_content_libraries
      delegate_to: localhost
      no_log: true
      failed_when: false
      changed_when: false
      when:
        - vcsa_collect_content_libraries | default(true) | bool
        - (_raw_content_library_ids | default({})).content_libs | default([]) | length > 0

    - name: Inventory | Query Tag Categories
      community.vmware.vmware_category_info:
      register: _raw_tag_categories
      delegate_to: localhost
      no_log: true
      failed_when: false
      changed_when: false
      when: vcsa_collect_tags | default(true) | bool

    - name: Inventory | Query Tags
      community.vmware.vmware_tag_info:
      register: _raw_tags
      delegate_to: localhost
      no_log: true
      failed_when: false
      changed_when: false
      when: vcsa_collect_tags | default(true) | bool

    # --- Appliance ---

    # Version/build come from pyvmomi (community.vmware.vmware_about_info),
    # which honors ``validate_certs: false`` for self-signed lab vCenters.
    - name: Appliance | Gather about-info (version/build)
      community.vmware.vmware_about_info:
      register: _raw_appliance_about
      delegate_to: localhost
      no_log: true
      failed_when: false
      changed_when: false
      when: vcsa_collect_appliance | default(vcenter_collect_appliance | default(true)) | bool

    # Appliance health + uptime come from the vCenter REST API directly,
    # not via ``vmware.vmware.appliance_info``: that module needs the
    # vSphere Automation SDK and a trusted CA chain (validate_certs is
    # not honored by the SDK's HTTP transport), so on lab vCenters with
    # self-signed certs it fails silently and the appliance overview
    # widget shows all-gray. The REST endpoints work with basic auth +
    # ``validate_certs: false``.
    - name: Appliance | REST session
      ansible.builtin.uri:
        url: "https://{{ ansible_host }}/api/session"
        method: POST
        url_username: "{{ vmware_username }}"
        url_password: "{{ vmware_password }}"
        force_basic_auth: true
        validate_certs: "{{ vmware_validate_certs | default(false) | bool }}"
        return_content: true
        status_code: [200, 201]
      register: _raw_vcsa_rest_session
      delegate_to: localhost
      no_log: true
      failed_when: false
      changed_when: false
      when: vcsa_collect_appliance | default(vcenter_collect_appliance | default(true)) | bool

    - name: Appliance | Gather REST appliance facts
      ansible.builtin.uri:
        url: "https://{{ ansible_host }}/api/appliance/{{ item }}"
        method: GET
        headers:
          vmware-api-session-id: "{{ _raw_vcsa_rest_session.json | default('') }}"
        validate_certs: "{{ vmware_validate_certs | default(false) | bool }}"
        return_content: true
      loop:
        - health/system
        - health/load
        - health/mem
        - health/database-storage
        - health/storage
        - system/uptime
      register: _raw_vcsa_rest_facts
      delegate_to: localhost
      no_log: true
      failed_when: false
      changed_when: false
      when:
        - vcsa_collect_appliance | default(vcenter_collect_appliance | default(true)) | bool
        - _raw_vcsa_rest_session.status | default(0) | int in [200, 201]

    # The `_vcsa_rest` items2dict shaping moved to the schema's
    # `_appliance_rest` field, which indexes the raw uri results list
    # below by `item.item` → `item.json`.

    - name: Appliance | Get backup schedule
      vmware.vmware.vcsa_backup_schedule_info:
      register: _raw_appliance_backup
      delegate_to: localhost
      failed_when: false
      changed_when: false
      no_log: true
      when: vcsa_collect_appliance | default(vcenter_collect_appliance | default(true)) | bool

    # --- VM workload + snapshots ---
    # vCenter-scoped queries. The reporter exposes this bundle to
    # per-ESXi inline_evaluations via the ``parent`` Jinja primitive
    # for per-host filtering; owner_digest.py reads from the same file.

    - name: Inventory | Query VM workload (with tags)
      community.vmware.vmware_vm_info:
        vm_type: vm
        show_attribute: true
        show_tag: true
      register: _raw_vcsa_vms_tagged
      delegate_to: localhost
      no_log: true
      ignore_errors: true
      changed_when: false
      when: vcsa_collect_vms | default(true) | bool

    - name: Inventory | Query VM workload (no tags fallback)
      community.vmware.vmware_vm_info:
        vm_type: vm
        show_attribute: true
        show_tag: false
      register: _raw_vcsa_vms_untagged
      delegate_to: localhost
      no_log: true
      failed_when: false
      changed_when: false
      when:
        - vcsa_collect_vms | default(true) | bool
        - _raw_vcsa_vms_tagged.failed | default(false) | bool

    # The tagged-vs-untagged fallback moved to the schema's
    # `virtual_machines.source` first_of chain. We now emit both raw
    # registers and the schema picks the first present.

    - name: Inventory | Warn when VM tags are unavailable
      ansible.builtin.debug:
        msg: >-
          vSphere Automation SDK not available on the controller; VM tag
          enrichment skipped. Tag-based alerts (e.g. vms_no_backup_tags)
          will not fire. Install vmware-vapi-runtime to enable.
      when:
        - vcsa_collect_vms | default(true) | bool
        - _raw_vcsa_vms_tagged.failed | default(false) | bool

    - name: Inventory | Query Snapshots (per datacenter)
      community.vmware.vmware_all_snapshots_info:
        datacenter: "{{ item }}"
      loop: "{{ _vcenter_datacenters | default([]) }}"
      register: _raw_vcsa_snapshots
      delegate_to: localhost
      no_log: true
      failed_when: false
      changed_when: false
      when:
        - vcsa_collect_snapshots | default(vcsa_collect_vms | default(true)) | bool
        - _vcenter_datacenters | default([]) | length > 0

    # --- Alarms ---

    - name: Alarms | Get triggered alarms
      internal.vmware.vmware_triggered_alarms_info:
      register: _raw_alarms
      delegate_to: localhost
      changed_when: false
      when: vcsa_collect_alarms | default(vcenter_collect_alarms | default(true)) | bool

  always:
    # --- Assemble ---

    - name: Assemble raw vCenter payload
      ansible.builtin.set_fact:
        vmware_raw_vcenter:
          appliance_about: "{{ _raw_appliance_about | default({}) }}"
          appliance_health: "{{ _raw_appliance_health | default({}) }}"
          appliance_rest_results: "{{ (_raw_vcsa_rest_facts | default({})).results | default([]) }}"
          appliance_backup: "{{ _raw_appliance_backup | default({}) }}"
          datacenters_raw: "{{ _raw_datacenters | default({}) }}"
          clusters_raw: "{{ _raw_clusters | default({}) }}"
          datastores_raw: "{{ _raw_datastores | default({}) }}"
          resource_pools_raw: "{{ _raw_resource_pools | default({}) }}"
          dvswitches_raw: "{{ _raw_dvswitches | default({}) }}"
          dvs_portgroups_raw: "{{ _raw_dvs_portgroups | default({}) }}"
          licenses_raw: "{{ _raw_licenses | default({}) }}"
          extensions_raw: "{{ _raw_extensions | default({}) }}"
          content_library_ids_raw: "{{ _raw_content_library_ids | default({}) }}"
          content_libraries_raw: "{{ _raw_content_libraries | default({}) }}"
          tag_categories_raw: "{{ _raw_tag_categories | default({}) }}"
          tags_raw: "{{ _raw_tags | default({}) }}"
          vms_tagged_raw: "{{ _raw_vcsa_vms_tagged | default({}) }}"
          vms_untagged_raw: "{{ _raw_vcsa_vms_untagged | default({}) }}"
          snapshots_raw: "{{ _raw_vcsa_snapshots | default({}) }}"
          alarms_raw: "{{ _raw_alarms | default({}) }}"
          infra_patterns: "{{ (vcenter | default({})).config.infrastructure_vm_patterns | default([]) }}"
          config: "{{ vcenter.config | default({}) }}"
      changed_when: false
      no_log: true

    # --- Export ---

    - name: "vCenter | Emit collection telemetry"
      ansible.builtin.set_stats:
        data:
          ncs_collect_vcenter:
            platform_dir: "vmware/vcsa"
            report_directory: "{{
              lookup('env', 'NCS_REPORT_DIRECTORY')
              | default(ncs_report_directory | default(ncs_config.report_directory | default('/srv/samba/reports')), true)
            }}"
            payload: "{{ vmware_raw_vcenter }}"
            config: {}
            # Hierarchical report layout: vsphere/<vcenter-slug>/raw.yaml
            tree_path:
              - vsphere
              - "{{ inventory_hostname | lower | regex_replace('[^a-z0-9]+', '-') | regex_replace('^-+|-+$', '') }}"
        per_host: true
      when: vmware_raw_vcenter is defined
      changed_when: false
      no_log: true
