---
# internal.vmware.vcsa : tasks/preflight.yaml
# vCenter connectivity check for collection actions.

- name: Initialize shared vCenter connection context
  ansible.builtin.include_role:
    name: internal.vmware.common
    tasks_from: init_vcenter
  tags: [always]

- name: "vCenter Collect | Initialize collection state"
  ansible.builtin.set_fact:
    vcsa_collect_failed: false
    vcsa_connectivity_error: ""
  tags: [always]

- name: Check vCenter reachability
  ansible.builtin.uri:
    url: "https://{{ ansible_host }}/rest/com/vmware/cis/session"
    method: POST
    user: "{{ vmware_username }}"
    password: "{{ vmware_password }}"
    validate_certs: "{{ vmware_validate_certs | default(false) | bool }}"
    force_basic_auth: true
    status_code: [200, 503]
    timeout: 10
  register: _vc_reachability
  delegate_to: 127.0.0.1
  connection: local
  become: false
  failed_when: false
  changed_when: false
  no_log: true
  tags: [always]

- name: Handle reachability failure
  when:
    - (_vc_reachability.status | default(0)) not in [200, 503]
  block:
    - name: Stage connectivity failure
      ansible.builtin.set_fact:
        vcsa_collect_failed: true
        vcsa_connectivity_error: "vCenter {{ ansible_host }} is unreachable (HTTP {{ _vc_reachability.status | default('Timeout') }})"
        vmware_raw_vcenter:
          collect_failed: true
          connectivity_error: "vCenter {{ ansible_host }} is unreachable (HTTP {{ _vc_reachability.status | default('Timeout') }})"
      changed_when: false
    - name: Export failure state
      ansible.builtin.set_stats:
        data:
          ncs_collect_vcenter:
            platform_dir: "vmware/vcsa"
            report_directory: "{{ ncs_report_directory | default(ncs_config.report_directory | default('/srv/samba/reports')) }}"
            payload: "{{ vmware_raw_vcenter }}"
            config: {}
            tree_path:
              - vsphere
              - "{{ inventory_hostname | lower | regex_replace('[^a-z0-9]+', '-') | regex_replace('^-+|-+$', '') }}"
        per_host: true
    - name: Stop execution for this vCenter
      ansible.builtin.meta: end_host
