---
# internal.vmware.vcsa : tasks/stig.yaml
#
# VCSA is the most complex STIG — it has a Photon baseline, profile vars,
# and a service loop. Pre-phase1 setup runs in stig_vcsa_pre.yaml; the
# orchestrator handles the common Phase 0/1/2 structure.

- name: "VCSA STIG"
  ansible.builtin.include_role:
    name: internal.core.stig_orchestrator
  vars:
    _ncs_stig_label: "VCSA STIG"
    _ncs_stig_target_type: "vcsa"
    _ncs_stig_task_file: "{{ _ncs_task_root }}/stig_v1r4/stig_service.yaml"
    _ncs_stig_compat_facts:
      vcsa_stig_enable_audit: "{{ vmware_stig_enable_audit | default(vcsa_stig_enable_audit) | default(true) }}"
      vcsa_stig_enable_hardening: "{{ vmware_stig_enable_hardening | default(vcsa_stig_enable_hardening) | default(false) }}"
    _ncs_stig_mode_facts:
      vcsa_stig_enable_audit: "{{ _ncs_stig_action in ['audit', 'verify'] }}"
      vcsa_stig_enable_hardening: "{{ _ncs_stig_action == 'remediate' }}"
      # Inline VCSA rule `when:` guards still read this legacy name.
      vmware_stig_enable_hardening: "{{ _ncs_stig_action == 'remediate' }}"
    _ncs_stig_pre_phase1: "{{ _ncs_task_root }}/stig_v1r4/stig_vcsa_pre.yaml"
    _ncs_stig_phase1_loop: "{{ vcsa_stig_services | default(_vcsa_stig_default_services) }}"
    _ncs_stig_phase1_loop_var: _vcsa_service
    _vcsa_stig_default_services:
      - { name: eam, target_type: eam }
      - { name: lookup, target_type: lookup_svc }
      - { name: perfcharts, target_type: perfcharts }
      - { name: postgresql, target_type: postgresql }
      - { name: rhttpproxy, target_type: rhttpproxy }
      - { name: sts, target_type: sts }
      - { name: ui, target_type: ui }
      - { name: vami, target_type: vami }
