---
# internal.vmware.vcsa : tasks/stig_v1r4/vars/vami.yaml
# Toggle flags (run_*) + variable bindings consumed by stig_v1r4/vami.yaml.
# Loaded once per service from stig_service.yaml::include_vars.

# =============================================================================
# TOGGLE FLAGS
# =============================================================================

run_create_backups: true


# --- VCLD-70-000001: Max connections ---
run_conf_server_max_connections: true

# --- VCLD-70-000002: SSL ciphers ---
run_conf_ssl_ciphers: true

# --- VCLD-70-000003: SSL engine ---
run_conf_ssl_engine: true

# --- VCLD-70-000004: Access log module ---
run_conf_server_mod_accesslog: true

# --- VCLD-70-000005: Error log ---
run_conf_server_error_log: true

# --- VCLD-70-000006: Access log format ---
run_conf_comment_accesslog_format: true

# --- VCLD-70-000007: VAMI logs ---
run_vami_logs: true

# --- VCLD-70-000008: Syslog configuration ---
run_vami_syslog_config: true

# --- VCLD-70-000010: Server modules ---
run_conf_set_server_modules: true

# --- VCLD-70-000011: Remove shell mimetypes ---
run_conf_remove_shell_mimetypes: true

# --- VCLD-70-000012: Mimetype xattr ---
run_conf_mimetype_xattr: true

# --- VCLD-70-000013: CGI assign ---
run_conf_set_cgi_assign: true

# --- VCLD-70-000014: URL access deny ---
run_conf_url_access_deny: true

# --- VCLD-70-000015: Remove mod_webdav ---
run_conf_remove_mod_webdav: true

# --- VCLD-70-000016: Max keep-alive idle ---
run_conf_server_max_keep_alive_idle: true

# --- VCLD-70-000017: Key permissions ---
run_key_permissions: true

# --- VCLD-70-000018: Max FDs ---
run_conf_server_max_fds: true

# --- VCLD-70-000019: Text mime UTF-8 ---
run_conf_text_mime_utf8: true

# --- VCLD-70-000020: Directory listing ---
run_conf_dir_listing_activate: true

# --- VCLD-70-000021: Remove mod_status ---
run_conf_remove_mod_status: true

# --- VCLD-70-000022: Debug log request handling ---
run_conf_debug_log_request_handling: true

# --- VCLD-70-000023: Service remove user ---
run_conf_service_remove_user: true
run_service_remove_user: true

# --- VCLD-70-000024: SSL disabled versions ---
run_conf_ssl_disabled_versions: true

# --- VCLD-70-000025: SSL honor cipher order ---
run_conf_ssl_honor_cipher_order: true

# --- VCLD-70-000026: SSL disable client renegotiation ---
run_conf_ssl_disable_client_renegotiation: true

# --- VCLD-70-000027: Server tag ---
run_conf_server_tag: true

# --- VCLD-70-000056: FIPS mode ---
run_conf_server_fips_mode: true

# =============================================================================
# VARIABLES
# =============================================================================

# Lighttpd
var_conf_path: '/opt/vmware/etc/lighttpd/lighttpd.conf'
var_conf_path_etc: '/etc/applmgmt/appliance/lighttpd.conf'
var_conf_server_max_connections: 1024
var_conf_ssl_ciphers: "!aNULL:kECDH+AESGCM:ECDH+AESGCM:RSA+AESGCM:kECDH+AES:ECDH+AES:RSA+AES"
var_conf_ssl_engine: '"enable"'
var_conf_server_error_log: '"/opt/vmware/var/log/lighttpd/error.log"'
var_conf_mimetype_xattr: "disable"
var_conf_url_access_deny: '( "~", ".inc" )'
var_conf_server_max_keep_alive_idle: 30
var_conf_server_port: 5480
var_conf_server_max_fds: 2048
var_conf_dir_listing_activate: "disable"
var_conf_debug_log_request_handling: "disable"
var_conf_ssl_disabled_versions: "disable"
var_conf_ssl_enabled_versions: "enable"
var_conf_ssl_honor_cipher_order: "enable"
var_conf_server_tag: "vami"
var_conf_server_fips_mode: "enable"
var_server_pem_file: '/etc/applmgmt/appliance/server.pem'
var_syslog_conf_path: '/etc/vmware-syslog/vmware-services-applmgmt.conf'
