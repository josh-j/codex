---
# internal.vmware.vcsa : tasks/stig_v1r4/vars/eam.yaml
# Toggle flags (run_*) + variable bindings consumed by stig_v1r4/eam.yaml.
# Loaded once per service from stig_service.yaml::include_vars.

# =============================================================================
# TOGGLE FLAGS
# =============================================================================

run_create_backups: true

# VCEM-70-000001
run_connection_timeout: true

# VCEM-70-000002
run_max_threads: true

# VCEM-70-000003
run_max_post_size: true

# VCEM-70-000004
run_http_only: true

# VCEM-70-000005
run_access_valve_pattern: true

# VCEM-70-000006
run_json_stream_redirect_file: true

# VCEM-70-000007
run_logs_permissions: true

# VCEM-70-000010
run_user_database_realm: true

# VCEM-70-000011
run_catalina_properties: true

# VCEM-70-000012
run_removed_mime_mappings: true

# VCEM-70-000013
run_java_servlet: true

# VCEM-70-000014
run_remove_webdav: true

# VCEM-70-000015
run_mem_leak_prevention: true

# --- VCEM-70-000017: Web application file permissions ---
# DISABLED: Recursively changing file permissions on the EAM web
# application directory can break ESX Agent Manager. EAM deploys and
# manages partner solutions (NSX, vSAN agents) on ESXi hosts — if it
# loses file access, agent deployments and updates will fail.
run_web_files_permissions: false

# VCEM-70-000018
run_catalina_properties_shutdown: true

# VCEM-70-000019
run_accept_count: true

# VCEM-70-000020
run_uri_encoding: true

# VCEM-70-000021
run_web_filter: true

# VCEM-70-000022
run_web_welcome_file: true

# VCEM-70-000023
run_web_remove_listings: true

# VCEM-70-000024
run_web_error_page: true

# VCEM-70-000025
run_hide_error_reports: true

# VCEM-70-000026
run_server_anonymous: true

# VCEM-70-000027
run_allow_trace: true

# VCEM-70-000028
run_web_remove_debug: true

# VCEM-70-000029
run_eam_syslog_config: true

# VCEM-70-000030
run_web_cookie_secure: true

# VCEM-70-000031
run_catalina_properties_bioport: true

# VCEM-70-000032
run_catalina_properties_shutdownport: true

# VCEM-70-000033
run_web_remove_readonly: true

# =============================================================================
# VARIABLES
# =============================================================================

# server.xml variables
var_server_xml_path: '/usr/lib/vmware-eam/web/conf/server.xml'
var_server_xml_connectiontimeout: '60000'
var_server_xml_maxthreads: '300'
# This may need special escaping if special characters are used like & and {# #}  {% raw %} and {% endraw %} at the beginning and end will get most of it
# Also &quot; needs to just be a " which turns into &quot;
var_server_xml_access_log_valve_pattern: '{% raw %}%h %{X-Forwarded-For}i %l %u %t [%I] "%r" %s %b [Processing time %D msec] "%{User-Agent}i"{% endraw %}'
var_server_xml_acceptcount: '300'
var_server_xml_uriencoding: 'UTF-8'
var_server_xml_show_server_info: 'false'
var_server_xml_show_server_report: 'false'
var_server_xml_server: 'Anonymous'

# web.xml variables
var_web_xml_path: '/usr/lib/vmware-eam/web/webapps/eam/WEB-INF/web.xml'
var_web_xml_http_only: 'true'
var_web_xml_servlet_jsp_url_pattern: '*.jsp'
var_web_xml_filter_class: 'org.apache.catalina.filters.SetCharacterEncodingFilter'
var_web_xml_welcome_file_list: 'index.jsp'
var_web_xml_error_page: '/error.jsp'
var_web_xml_cookie_secure: 'true'

# eam.json variables
var_eam_json_path: '/etc/vmware/vmware-vmon/svcCfgfiles/eam.json'
var_stream_redirect_file: '%VMWARE_LOG_DIR%/vmware/eam/jvm.log'

# eam log variables
var_eam_logs_path: '/var/log/vmware/eam/web/'

# catalina properties variables
var_catalina_props_path: '/etc/vmware-eam/catalina.properties'

# misc variables
var_eam_web_path: '/usr/lib/vmware-eam/web/'
var_syslog_conf_path: '/etc/vmware-syslog/vmware-services-eam.conf'
