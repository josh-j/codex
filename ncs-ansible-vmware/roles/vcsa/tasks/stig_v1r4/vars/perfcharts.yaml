---
# internal.vmware.vcsa : tasks/stig_v1r4/vars/perfcharts.yaml
# Toggle flags (run_*) + variable bindings consumed by stig_v1r4/perfcharts.yaml.
# Loaded once per service from stig_service.yaml::include_vars.

# =============================================================================
# TOGGLE FLAGS
# =============================================================================

run_create_backups: true

# VCPF-70-000001
run_connection_timeout: true
# VCPF-70-000002
run_max_threads: true
# VCPF-70-000003
run_max_post_size: true
# VCPF-70-000004
run_http_only: true
# VCPF-70-000005
run_access_valve_pattern: true
# VCPF-70-000006
run_json_stream_redirect_file: true
# VCPF-70-000007
run_logs_permissions: true
# VCPF-70-000010
run_user_database_realm: true
# VCPF-70-000011
run_catalina_properties_packages: true
# VCPF-70-000012
run_removed_mime_mappings: true
# VCPF-70-000013
run_java_servlet: true
# VCPF-70-000014
run_remove_webdav: true
# VCPF-70-000015
run_mem_leak_prevention: true

# --- VCPF-70-000017: Web application file permissions ---
# DISABLED: Recursively changing file permissions on the Performance Charts
# web application directory can break the service. The perfcharts service
# may fail to start or lose access to its data files, requiring manual
# SSH recovery to restore permissions.
run_web_files_permissions: false

# VCPF-70-000018
run_catalina_properties_shutdown: true
# VCPF-70-000019
run_accept_count: true
# VCPF-70-000020
run_uri_encoding: true
# VCPF-70-000021
run_web_filter: true
# VCPF-70-000022
run_web_welcome_file: true
# VCPF-70-000023
run_web_remove_listings: true
# VCPF-70-000024
run_web_error_page: true
# VCPF-70-000025
run_hide_error_reports: true
# VCPF-70-000026
run_server_anonymous: true
# VCPF-70-000027
run_allow_trace: true
# VCPF-70-000028
run_web_remove_debug: true
# VCPF-70-000029
run_perfcharts_log_rotation: true
# VCPF-70-000030
run_perfcharts_syslog_config: true
# VCPF-70-000031
run_catalina_properties_bioport: true
# VCPF-70-000032
run_catalina_properties_shutdownport: true
# VCPF-70-000033
run_web_cookie_secure: true
# VCPF-70-000034
run_web_remove_readonly: true

# =============================================================================
# VARIABLES
# =============================================================================

# server.xml variables
var_server_xml_path: '/usr/lib/vmware-perfcharts/tc-instance/conf/server.xml'
var_server_xml_connectiontimeout: '20000'
var_server_xml_maxthreads: '300'
# This may need special escaping if special characters are used like & and {# #}  {% raw %} and {% endraw %} at the beginning and end will get most of it
# Also & needs to just be a " which turns into &quot
var_server_xml_access_log_valve_pattern: '{% raw %}%h %{X-Forwarded-For}i %l %u %t "%r" %s %b "%{User-Agent}i"{% endraw %}'
var_server_xml_acceptcount: '300'
var_server_xml_uriencoding: 'UTF-8'
var_server_xml_show_server_info: 'false'
var_server_xml_show_server_report: 'false'
var_server_xml_server: "Anonymous"

# web.xml variables
var_web_xml_path: '/usr/lib/vmware-perfcharts/tc-instance/conf/web.xml'
var_web_stats_xml_path: '/usr/lib/vmware-perfcharts/tc-instance/webapps/statsreport/WEB-INF/web.xml'
var_web_xml_http_only: 'true'
var_web_xml_servlet_jsp_url_pattern1: '*.jsp'
var_web_xml_servlet_jsp_url_pattern2: '*.jspx'
var_web_xml_welcome_file_list1: 'index.html'
var_web_xml_welcome_file_list2: 'index.htm'
var_web_xml_welcome_file_list3: 'index.jsp'
var_web_xml_error_page: '/http_error.jsp'
var_web_xml_cookie_secure: 'true'

# perfcharts.json variables
var_json_path: '/etc/vmware/vmware-vmon/svcCfgfiles/perfcharts.json'
var_stream_redirect_file: '%VMWARE_LOG_DIR%/vmware/perfcharts/vmware-perfcharts-runtime.log'

# perfcharts log variables
var_perf_logs_path: '/storage/log/vmware/perfcharts'
var_perf_log4j_path: '/etc/vmware-perfcharts/log4j.properties'
var_perf_syslog_conf: '/etc/vmware-syslog/vmware-services-perfcharts.conf'

# catalina properties variables
var_catalina_props_path: '/usr/lib/vmware-perfcharts/tc-instance/conf/catalina.properties'

# misc variables
var_perfcharts_web_path: '/usr/lib/vmware-perfcharts/tc-instance/webapps/'
var_syslog_conf_path: '/etc/vmware-syslog/vmware-services-perfcharts.conf'
