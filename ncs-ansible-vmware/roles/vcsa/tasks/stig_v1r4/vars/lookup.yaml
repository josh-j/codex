---
# internal.vmware.vcsa : tasks/stig_v1r4/vars/lookup.yaml
# Toggle flags (run_*) + variable bindings consumed by stig_v1r4/lookup.yaml.
# Loaded once per service from stig_service.yaml::include_vars.

# =============================================================================
# TOGGLE FLAGS
# =============================================================================

run_create_backups: true

# VCLU-70-000001
run_connection_timeout: true

# VCLU-70-000002
run_max_threads: true

# VCLU-70-000003
run_max_post_size: true

# VCLU-70-000004
run_http_only: true

# VCLU-70-000005
run_access_valve_pattern: true

# VCLU-70-000006
run_json_stream_redirect_file: true

# VCLU-70-000007
run_logs_permissions: true

# VCLU-70-000010
run_user_database_realm: true

# VCLU-70-000011
run_catalina_properties: true

# VCLU-70-000012
run_removed_mime_mappings: true

# VCLU-70-000013
run_java_servlet: true

# VCLU-70-000014
run_remove_webdav: true

# VCLU-70-000015
run_mem_leak_prevention: true

# --- VCLU-70-000017: Web application file permissions ---
# DISABLED: Recursively changing file permissions on the Lookup Service
# web application directory can break service discovery. The Lookup Service
# is critical for SSO, component registration, and inter-service
# communication — if it loses file access, vCenter services cannot
# locate each other and the platform becomes unusable.
run_web_files_permissions: false

# VCLU-70-000018
run_catalina_properties_shutdown: true

# VCLU-70-000019
run_accept_count: true

# VCLU-70-000020
run_uri_encoding: true

# VCLU-70-000021
run_web_welcome_file: true

# VCLU-70-000022
run_web_remove_listings: true

# VCLU-70-000023
run_server_anonymous: true

# VCLU-70-000024
run_hide_error_reports: true

# VCLU-70-000025
run_allow_trace: true

# VCLU-70-000026
run_web_remove_debug: true

# VCLU-70-000028
run_syslog_config: true

# VCLU-70-000029
run_catalina_properties_ports: true

# VCLU-70-000030
run_server_shutdownport: true

# VCLU-70-000031
run_web_cookie_secure: true

# =============================================================================
# VARIABLES
# =============================================================================

# server.xml variables
var_server_xml_path: '/usr/lib/vmware-lookupsvc/conf/server.xml'
var_server_xml_connectiontimeout: '60000'
var_server_xml_maxthreads: '300'
# This may need special escaping if special characters are used like & and {# #}  {% raw %} and {% endraw %} at the beginning and end will get most of it
# Also &quot; needs to just be a " which turns into &quot;
var_server_xml_access_log_valve_pattern: '{% raw %}%t %I [RemoteIP] %{X-Forwarded-For}i %u [Request] %h:%{remote}p to local %{local}p - %H %m %U%q    [Response] %s - %b bytes    [Perf] process %Dms / commit %Fms / conn [%X]{% endraw %}'
var_server_xml_acceptcount: '100'
var_server_xml_uriencoding: 'UTF-8'
var_server_xml_show_server_info: 'false'
var_server_xml_show_server_report: 'false'
var_server_xml_server: 'Anonymous'
var_server_xml_shutdownport: '${base.shutdown.port}'

# web.xml variables
var_web_xml_path: '/usr/lib/vmware-lookupsvc/conf/web.xml'
var_web_xml_servlet_jsp_url_pattern1: '*.jsp'
var_web_xml_servlet_jsp_url_pattern2: '*.jspx'
var_web_xml_filter_class: 'org.apache.catalina.filters.SetCharacterEncodingFilter'
var_web_xml_welcome_file_list1: 'index.html'
var_web_xml_welcome_file_list2: 'index.htm'
var_web_xml_welcome_file_list3: 'index.jsp'
var_web_xml_error_page: '/error.jsp'
var_web_xml_cookie_secure: 'true'

# context.xml variables
var_context_xml_path: '/usr/lib/vmware-lookupsvc/conf/context.xml'
var_context_xml_http_only: 'true'

# lookupsvc.json variables
var_json_path: '/etc/vmware/vmware-vmon/svcCfgfiles/lookupsvc.json'
var_stream_redirect_file: '%VMWARE_LOG_DIR%/vmware/lookupsvc/lookupsvc_stream.log'

# lookup log variables
var_logs_path: '/var/log/vmware/lookupsvc/'

# catalina properties variables
var_catalina_props_path: '/usr/lib/vmware-lookupsvc/conf/catalina.properties'

# misc variables
var_lib_path: '/usr/lib/vmware-lookupsvc/lib'
var_conf_path: '/usr/lib/vmware-lookupsvc/conf'
var_syslog_conf_path: '/etc/vmware-syslog/vmware-services-lookupsvc.conf'
