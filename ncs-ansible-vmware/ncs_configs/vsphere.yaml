# yaml-language-server: $schema=../../.schemas/ncs_reporter_config_schema.json
#
# vSphere inventory root — the product page for the vSphere tree.
# Populated from the child vCenter nodes. The reporter's tree walker
# supplies `vcenters` as a list of child-node summaries (slug, title,
# health, alert_counts, report_url) before rendering.
config:
  display_name: "vSphere"
  platform: vsphere
  extra_inventory_widget_columns:
    - name: vCenters
      value: "{{ vcenter_count }}"
    - name: ESXi Hosts
      value: "{{ esxi_host_count }}"

# Tree shape — declarative replacement for the old hardcoded
# build_vsphere_tree() Python. The reporter walks <reports_root>/vsphere/
# and instantiates one ReportNode per raw.yaml using the matching level.
tree:
  root_slug: vsphere
  root_title: vSphere
  levels:
    - tier: vcenter
      schema: vcsa
      bundle_key: raw_vcsa
      children_label: ESXi Hosts
    - tier: esxi_host
      schema: esxi
      bundle_key: raw_esxi
      parent_tier: vcenter
      children_label: VMs
  # Cross-vCenter rollups for the root page. The vcsa role emits
  # ``esxi_hosts`` and ``virtual_machines`` summary lists into each
  # vCenter's raw_vcsa.data; the reporter unions them across child
  # vCenters and exposes them on the root's data_source. No Python.
  merge_from_children:
    - field: esxi_hosts
      from: raw_vcsa.data.esxi_hosts
    - field: virtual_machines
      from: raw_vcsa.data.virtual_machines

vars: {}

alerts: []

widgets:
  # Single Inventory widget: stat-card header (the old "Product
  # Footprint") + auto-injected children section (auto-injected by
  # the tree renderer) + the flat per-tier subtables. One panel,
  # consistent across every tree page.
  - type: inventory
    slug: vsphere_inventory
    name: "Inventory"
    stat_cards:
      - name: vCenters
        value: "{{ vcenter_count }}"
      - name: ESXi Hosts
        value: "{{ esxi_host_count }}"
      - name: VMs
        value: "{{ virtual_machines_count }}"
    sections:
      - name: "ESXi Hosts"
        when: esxi_hosts_count > 0
        rows: "{{ esxi_hosts }}"
        columns:
          - name: Host
            value: "{{ name }}"
          - name: Datacenter
            value: "{{ datacenter }}"
          - name: Cluster
            value: "{{ cluster }}"

      - name: "Virtual Machines"
        when: virtual_machines_count > 0
        rows: "{{ virtual_machines }}"
        columns:
          - name: VM
            value: "{{ name }}"
          - name: Power
            value: "{{ power_state }}"
            as: status-badge
          - name: Guest OS
            value: "{{ guest_os }}"
          - name: ESXi Host
            value: "{{ esxi_host }}"
          - name: IP Address
            value: "{{ ip_address }}"
