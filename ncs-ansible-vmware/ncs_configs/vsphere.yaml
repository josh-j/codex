# yaml-language-server: $schema=../../.schemas/ncs_reporter_config_schema.json
#
# vSphere inventory root — the product page for the vSphere tree.
# Populated from the child vCenter nodes. The reporter's tree walker
# supplies `vcenters` as a list of child-node summaries (slug, title,
# health, alert_counts, report_url) before rendering.
config:
    display_name: "vSphere"
    platform: vsphere
    extra_inventory_widget_columns:
        - name: vCenters
          value: "{{ vcenter_count }}"
        - name: ESXi Hosts
          value: "{{ esxi_host_count }}"

vars:
    # Tree mode renders these pages with `vcenters`/`hosts`/`vms` provided
    # by the tree assembler; standalone mode has none of those defined,
    # in which case the counts collapse to a sensible footprint of "1".
    # `if: {defined: ...}` skips the branch when the source is missing,
    # rather than letting `first_of` stop at a `count` of 0.
    vcenter_count:
        normalize:
            first_of:
                - { if: { defined: vcenters }, then: { count: vcenters } }
                - { const: 1 }
        type: int
    esxi_host_count:
        normalize:
            first_of:
                - { path: metadata.counts.hosts }
                - { if: { defined: hosts }, then: { count: hosts } }
                - { if: { defined: esxi_hosts }, then: { count: esxi_hosts } }
                - { const: 0 }
        type: int
    virtual_machines_count:
        normalize:
            first_of:
                - { path: metadata.counts.vms }
                - { if: { defined: vms }, then: { count: vms } }
                - {
                      if: { defined: virtual_machines },
                      then: { count: virtual_machines },
                  }
                - { const: 0 }
        type: int

alerts: []

widgets:
    # Single Inventory widget: stat-card header (the old "Product
    # Footprint") + auto-injected children section (auto-injected by
    # the tree renderer) + the flat per-tier subtables. One panel,
    # consistent across every tree page.
    - type: inventory
      slug: vsphere_inventory
      name: "Inventory"
      stat_cards:
          - name: vCenters
            value: "{{ vcenter_count }}"
          - name: ESXi Hosts
            value: "{{ esxi_host_count }}"
          - name: VMs
            value: "{{ virtual_machines_count }}"
      sections:
          - name: "ESXi Hosts"
            when: esxi_host_count > 0
            rows: "{{ esxi_hosts }}"
            columns:
                - name: Host
                  value: "{{ name }}"
                - name: Datacenter
                  value: "{{ datacenter }}"
                - name: Cluster
                  value: "{{ cluster }}"

          - name: "Virtual Machines"
            when: virtual_machines_count > 0
            rows: "{{ virtual_machines }}"
            columns:
                - name: VM
                  value: "{{ name }}"
                - name: Power
                  value: "{{ power_state }}"
                  as: status-badge
                - name: Guest OS
                  value: "{{ guest_os }}"
                - name: ESXi Host
                  value: "{{ esxi_host }}"
                - name: IP Address
                  value: "{{ ip_address }}"
