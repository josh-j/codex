# yaml-language-server: $schema=../../.schemas/ncs_reporter_config_schema.json
#
# vSphere inventory root — the product page for the vSphere tree.
# Populated from the child vCenter nodes. The reporter's tree walker
# supplies `vcenters` as a list of child-node summaries (slug, title,
# health, alert_counts, report_url) before rendering.
config:
  display_name: "vSphere"
  platform: vsphere
  extra_inventory_widget_columns:
    - name: vCenters
      value: "{{ vcenter_count }}"
    - name: Datacenters
      value: "{{ datacenter_count }}"
    - name: ESXi Hosts
      value: "{{ esxi_host_count }}"

vars: {}

alerts: []

widgets:
  # Single Inventory widget: stat-card header (the old "Product
  # Footprint") + auto-injected children section (auto-injected by
  # the tree renderer) + the flat per-tier subtables. One panel,
  # consistent across every tree page.
  - type: inventory
    slug: vsphere_inventory
    name: "Inventory"
    stat_cards:
      - name: vCenters
        value: "{{ vcenter_count }}"
      - name: Datacenters
        value: "{{ datacenter_count }}"
      - name: ESXi Hosts
        value: "{{ esxi_host_count }}"
      - name: VMs
        value: "{{ vm_count }}"
    sections:
      - name: "Datacenters"
        when: datacenter_count > 0
        rows: "{{ datacenters }}"
        columns:
          - name: Datacenter
            value: "{{ name }}"
            link_field: report_url
          - name: vCenter
            value: "{{ vcenter }}"
          - name: Clusters
            value: "{{ cluster_count }}"
          - name: ESXi Hosts
            value: "{{ esxi_host_count }}"
          - name: NCS Alerts
            value: "{{ ncs_alerts }}"
            as: severity-tally

      - name: "ESXi Hosts"
        when: esxi_host_count > 0
        rows: "{{ esxi_hosts }}"
        columns:
          - name: Host
            value: "{{ name }}"
            link_field: report_url
          - name: Datacenter
            value: "{{ datacenter }}"
          - name: Cluster
            value: "{{ cluster }}"
          - name: Version
            value: "{{ version }}"
          - name: Status
            value: "{{ overall_status }}"
            as: status-badge
          - name: NCS Alerts
            value: "{{ ncs_alerts }}"
            as: severity-tally

      - name: "Virtual Machines"
        when: vm_count > 0
        rows: "{{ virtual_machines }}"
        columns:
          - name: VM
            value: "{{ name }}"
          - name: Power
            value: "{{ power_state }}"
            as: status-badge
          - name: Guest OS
            value: "{{ guest_os }}"
          - name: ESXi Host
            value: "{{ esxi_host }}"
            link_field: esxi_host_url
          - name: Datacenter
            value: "{{ datacenter }}"
          - name: IP Address
            value: "{{ ip_address }}"
