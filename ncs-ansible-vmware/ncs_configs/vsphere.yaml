# yaml-language-server: $schema=../../.schemas/ncs_reporter_config_schema.json
#
# vSphere inventory root — the product page for the vSphere tree.
# Populated from the child vCenter nodes. The reporter's tree walker
# supplies `vcenters` as a list of child-node summaries (slug, title,
# health, alert_counts, report_url) before rendering.
config:
  display_name: "vSphere"
  platform: vsphere
  extra_inventory_widget_columns:
    - name: vCenters
      value: "{{ vcenter_count }}"
    - name: Datacenters
      value: "{{ datacenter_count }}"
    - name: ESXi Hosts
      value: "{{ esxi_host_count }}"

vars: {}

alerts: []

widgets:
  - type: stat-cards
    slug: vsphere_kpis
    name: "Fleet Footprint"
    cards:
      - name: vCenters
        value: "{{ vcenter_count }}"
      - name: Datacenters
        value: "{{ datacenter_count }}"
      - name: ESXi Hosts
        value: "{{ esxi_host_count }}"
      - name: VMs
        value: "{{ vm_count }}"

  - type: table
    name: "vCenter Appliances"
    slug: vcenter_appliances
    when: vcenter_count > 0
    rows: "{{ vcenters }}"
    columns:
      - name: Appliance
        value: "{{ title }}"
        link_field: report_url
      - name: Version
        value: "{{ version }}"
      - name: Health
        value: "{{ health }}"
        as: status-badge
      - name: Datacenters
        value: "{{ datacenter_count }}"
      - name: ESXi Hosts
        value: "{{ esxi_host_count }}"
