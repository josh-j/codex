# yaml-language-server: $schema=../../.schemas/ncs_reporter_config_schema.json
config:
  display_name: "VMware VCSA"
  platform: vmware/vcsa
  stig:
    ansible_playbook:
      path: "internal.vmware.vcsa_stig_remediate"
      target_var: "vcsa_stig_target_hosts"
    platform_to_checklist:
      vcsa: cklb_skeletons/cklb_skeleton_vsphere7_vcsa_V1R3.json
      vcenter: cklb_skeletons/cklb_skeleton_vsphere7_vcsa_V1R3.json
      vami: cklb_skeletons/cklb_skeleton_vsphere7_vami_V1R2.json
      eam: cklb_skeletons/cklb_skeleton_vsphere7_vca_eam_V1R2.json
      lookup_svc: cklb_skeletons/cklb_skeleton_vsphere7_vca_lookup_svc_V1R2.json
      perfcharts: cklb_skeletons/cklb_skeleton_vsphere7_vca_perfcharts_V1R1.json
      vcsa_photon_os: cklb_skeletons/cklb_skeleton_vsphere7_vca_photon_os_V1R4.json
      postgresql: cklb_skeletons/cklb_skeleton_vsphere7_vca_postgresql_V1R2.json
      rhttpproxy: cklb_skeletons/cklb_skeleton_vsphere7_vca_rhttpproxy_V1R1.json
      sts: cklb_skeletons/cklb_skeleton_vsphere7_vca_sts_V1R2.json
      ui: cklb_skeletons/cklb_skeleton_vsphere7_vca_ui_V1R2.json
    rule_prefix_to_platform:
      VMCH: vm
      ESXI: esxi
      VC: vcsa
      PH: photon
      # Per-service prefixes used by the vcsa role's stig_v1r4 service loop.
      # Each prefix maps to the per-service target_type so the callback's
      # platform lookup recognizes structured rules tagged with these
      # target_types and persists per-service raw_stig_*.yaml files.
      VCEM: eam
      VCLU: lookup_svc
      VCPF: perfcharts
      VCPG: postgresql
      VCRP: rhttpproxy
      VCST: sts
      VCUI: ui
      VCLD: vami
  extra_inventory_widget_columns:
    - name: Version
      value: "{{ appliance_version }}"
vars:
  # Appliance
  appliance_version:
    normalize:
      first_of: [appliance_version, appliance_about.about_info.version, appliance_health.appliance.summary.version]
      default: unknown
    type: str
  appliance_build:
    normalize:
      first_of: [appliance_build, appliance_about.about_info.build, appliance_health.appliance.summary.build_number]
      default: unknown
    type: str
  # Newer playbook emits `appliance_rest_results` (the raw uri results
  # list); schema re-indexes it. Older playbook still emits the
  # pre-shaped `appliance_rest` dict, which `first_of` falls back to.
  _appliance_rest:
    normalize:
      first_of:
        - appliance_rest
        - {index: {source: appliance_rest_results, key: item.item, value: item.json}}
        - {const: {}}
    type: dict

  appliance_health_overall:
    normalize:
      first_of: [appliance_health_overall, _appliance_rest.health/system, appliance_health.appliance.summary.health.overall]
      default: gray
    type: str
  appliance_health_cpu:
    normalize:
      first_of: [appliance_health_cpu, _appliance_rest.health/load, appliance_health.appliance.summary.health.cpu]
      default: gray
    type: str
  appliance_health_memory:
    normalize:
      first_of: [appliance_health_memory, _appliance_rest.health/mem, appliance_health.appliance.summary.health.memory]
      default: gray
    type: str
  appliance_health_database:
    normalize:
      first_of: [appliance_health_database, _appliance_rest.health/database-storage, appliance_health.appliance.summary.health.database]
      default: gray
    type: str
  appliance_health_storage:
    normalize:
      first_of: [appliance_health_storage, _appliance_rest.health/storage, appliance_health.appliance.summary.health.storage]
      default: gray
    type: str
  appliance_uptime_seconds:
    normalize:
      first_of: [appliance_uptime_seconds, _appliance_rest.system/uptime, appliance_health.appliance.summary.uptime]
      default: 0
    type: float
  ssh_enabled:
    normalize:
      truthy:
        first_of: [ssh_enabled, appliance_health.appliance.access.ssh, {const: false}]
    type: bool
  shell_enabled:
    normalize:
      truthy:
        first_of: [shell_enabled, appliance_health.appliance.access.shell.enabled, {const: false}]
    type: bool
  ntp_mode:
    normalize:
      first_of: [ntp_mode, appliance_health.appliance.time.time_sync.mode]
      default: unknown
    type: str
  ntp_servers:
    normalize:
      first_of: [ntp_servers, appliance_health.appliance.time.time_sync.servers, {const: []}]
    type: list
  backup_schedules:
    normalize:
      first_of: [backup_schedules, appliance_backup.schedules, {const: []}]
    type: list
  backup_schedule_count:
    normalize: {count: backup_schedules}
    type: int

  # Inventory
  datastores:
    normalize:
      list:
        source:
          first_of:
            - datastores
            - {flatten: "datastores_raw.results[].datastores[]"}
        include_source: false
        map:
          name: {first_of: [name, {const: ""}]}
          type: {first_of: [type, {const: ""}]}
          capacity_gb:
            first_of:
              - capacity_gb
              - {expr: "{{ (capacity | default(0) | float / 1073741824) | round(1) }}"}
          free_gb:
            first_of:
              - free_gb
              - {expr: "{{ (freeSpace | default(0) | float / 1073741824) | round(1) }}"}
          used_pct:
            first_of:
              - used_pct
              - {expr: "{{ (((capacity | default(0) | float) - (freeSpace | default(0) | float)) / (capacity | default(1) | float) * 100) | round(1) if (capacity | default(0) | float) > 0 else 0.0 }}"}
          accessible: {first_of: [accessible, {const: false}]}
          maintenance_mode: {first_of: [maintenance_mode, maintenanceMode, {const: normal}]}
    type: list
  clusters:
    normalize:
      first_of:
        - clusters
        - list:
            for_each: clusters_raw.results
            expand: clusters
            include_source: false
            map:
              name: item.key
              datacenter: parent.item
              host_count: {count: item.value.hosts}
              host_names: {pluck: {source: item.value.hosts, path: name}}
              ha_enabled: {first_of: [item.value.ha_enabled, {const: false}]}
              drs_enabled: {first_of: [item.value.drs_enabled, {const: false}]}
              cpu_usage_pct: {expr: "{{ (((item.value.resource_summary.cpuUsedMHz | default(0) | float) / (item.value.resource_summary.cpuCapacityMHz | default(1) | float)) * 100) | round(1) if (item.value.resource_summary.cpuCapacityMHz | default(0) | float) > 0 else 0.0 }}"}
              mem_usage_pct: {expr: "{{ (((item.value.resource_summary.memUsedMB | default(0) | float) / (item.value.resource_summary.memCapacityMB | default(1) | float)) * 100) | round(1) if (item.value.resource_summary.memCapacityMB | default(0) | float) > 0 else 0.0 }}"}
        - {const: []}
    type: list
  esxi_hosts:
    normalize:
      first_of:
        - esxi_hosts
        - list:
            for_each: clusters
            expand: host_names
            include_source: false
            map:
              name: item
              cluster: parent.name
              datacenter: parent.datacenter
        - {const: []}
    type: list
  virtual_machines:
    normalize:
      list:
        source:
          first_of:
            - vms_raw
            - {path: vms_tagged_raw.virtual_machines}
            - {path: vms_untagged_raw.virtual_machines}
            - vms_info_raw.virtual_machines
            - virtual_machines
        include_source: false
        map:
          name: {first_of: [guest_name, guest_fullname, name, {const: ""}]}
          guest_os: {first_of: [guest_fullname, guest_os, {const: ""}]}
          power_state: {first_of: [power_state, {const: ""}]}
          ip_address: {first_of: [ip_address, {const: ""}]}
          esxi_host: {first_of: [esxi_hostname, esxi_host, {const: ""}]}
    type: list
  vms_info_raw:
    normalize:
      object:
        virtual_machines:
          first_of:
            - vms_raw
            - {path: vms_tagged_raw.virtual_machines}
            - {path: vms_untagged_raw.virtual_machines}
            - vms_info_raw.virtual_machines
            - {const: []}
    type: dict
  snapshots_raw:
    normalize:
      first_of:
        - {flatten: "snapshots_raw.results[].vmware_all_snapshots_info[]"}
        - snapshots_raw
        - {const: []}
    type: list
  resource_pools:
    normalize:
      first_of: [resource_pools, resource_pools_raw.resource_pool_info, {const: []}]
    type: list
  dvswitches:
    normalize:
      list:
        source:
          first_of: [dvswitches, dvswitches_raw.distributed_virtual_switches]
        include_source: false
        map:
          name: {first_of: [name, configure.settings.properties.general.name, configure.name, {const: ""}]}
          num_ports: {first_of: [num_ports, configure.settings.properties.general.numPorts, {const: 0}]}
          num_uplinks: {first_of: [num_uplinks, configure.settings.properties.general.numUplinks, {const: 0}]}
          mtu: {first_of: [mtu, configure.settings.properties.advanced.maxMtu, {const: 0}]}
          uuid: {first_of: [uuid, {const: ""}]}
          vendor: {first_of: [vendor, configure.settings.properties.general.vendor, {const: ""}]}
          version: {first_of: [version, configure.settings.properties.general.version, {const: ""}]}
    type: list
  dvs_portgroups:
    normalize:
      first_of:
        - dvs_portgroups
        - {flatten: "dvs_portgroups_raw.results[].dvs_portgroup_info[]"}
        - {const: []}
    type: list
  licenses:
    normalize:
      first_of: [licenses, licenses_raw.licenses, {const: []}]
    type: list
  extensions:
    normalize:
      list:
        source:
          first_of: [extensions, extensions_raw.extension_info]
        include_source: false
        map:
          ext_label: {first_of: [ext_label, extension_label, {const: ""}]}
          ext_company: {first_of: [ext_company, extension_company, {const: ""}]}
          ext_version: {first_of: [ext_version, extension_version, {const: ""}]}
          ext_key: {first_of: [ext_key, extension_key, {const: ""}]}
          ext_last_heartbeat_time: {first_of: [ext_last_heartbeat_time, extension_last_heartbeat_time, {const: ""}]}
    type: list
  content_libraries:
    normalize:
      list:
        source:
          first_of:
            - content_libraries
            - {flatten: "content_libraries_raw.results[].content_lib_details[]"}
        include_source: false
        map:
          lib_name: {first_of: [lib_name, library_name, {const: ""}]}
          lib_type: {first_of: [lib_type, library_type, {const: ""}]}
          lib_description: {first_of: [lib_description, library_description, {const: ""}]}
          lib_id: {first_of: [lib_id, library_id, {const: ""}]}
    type: list
  tag_categories:
    normalize:
      first_of: [tag_categories, tag_categories_raw.tag_category_info, {const: []}]
    type: list
  tags:
    normalize:
      first_of: [tags, tags_raw.tag_info, {const: []}]
    type: list
  active_alarms:
    normalize:
      first_of: [active_alarms, alarms_raw.alarms, {const: []}]
    type: list
  infra_patterns:
    normalize:
      first_of: [infra_patterns, config.infrastructure_vm_patterns, {const: []}]
    type: list
  config:
    normalize:
      first_of: [config, {const: {}}]
    type: dict

  datacenter_count:
    normalize:
      first_of: [datacenter_count, {count: datacenters_raw.datacenter_info}]
      default: 0
    type: int
  cluster_count: {normalize: {count: clusters}, type: int}
  esxi_host_count: {normalize: {count: esxi_hosts}, type: int}
  datastore_count: {normalize: {count: datastores}, type: int}
  resource_pool_count: {normalize: {count: resource_pools}, type: int}
  dvswitch_count: {normalize: {count: dvswitches}, type: int}
  dvs_portgroup_count: {normalize: {count: dvs_portgroups}, type: int}
  license_count: {normalize: {count: licenses}, type: int}
  extension_count: {normalize: {count: extensions}, type: int}
  content_library_count:
    normalize: {count: content_libraries}
    type: int
  tag_category_count: {normalize: {count: tag_categories}, type: int}
  tag_count: {normalize: {count: tags}, type: int}
  vm_count: {normalize: {count: virtual_machines}, type: int}
  snapshot_count: {normalize: {count: snapshots_raw}, type: int}
  alarm_count:
    normalize: {count: active_alarms}
    type: int
    thresholds:
      warn_if_above: 1
      crit_if_above: 5

  appliance_uptime_days:
    compute: "{{ appliance_uptime_seconds / 86400 }}"

alerts:
  - id: appliance_health_red
    category: "Appliance Health"
    severity: CRITICAL
    when: appliance_health_overall == 'red'
    msg: "VCSA component failure: overall health is RED"

  - id: appliance_health_yellow
    category: "Appliance Health"
    severity: WARNING
    suppress_if: appliance_health_red
    when: appliance_health_overall == 'yellow'
    msg: "VCSA degraded: overall health is YELLOW"

  - id: appliance_health_gray
    category: "Data Quality"
    severity: WARNING
    suppress_if: [appliance_health_red, appliance_health_yellow]
    when: appliance_health_overall == 'gray'
    msg: "VCSA health unknown: overall health is GRAY — check permissions and API availability"

  - id: ssh_enabled
    category: "Security"
    severity: WARNING
    when: ssh_enabled == 1.0
    msg: "Hardening violation: SSH is enabled on VCSA"

  - id: shell_enabled
    category: "Security"
    severity: WARNING
    when: shell_enabled == 1.0
    msg: "Hardening violation: interactive shell is enabled on VCSA"

  - id: ntp_disabled
    category: "Time Synchronization"
    severity: WARNING
    when: ntp_mode not in ['NTP', 'HOST']
    msg: "Time sync misconfigured: NTP mode is '{{ ntp_mode }}' — clock drift may affect logs and certificates"

  - id: appliance_uptime_excessive
    category: "Appliance Lifecycle"
    severity: WARNING
    when: appliance_uptime_days >= 90.0
    msg: "VCSA has not been rebooted in {{ appliance_uptime_days | round(0) }} days — may be missing patches"

  - id: appliance_uptime_recent_reboot
    category: "Appliance Lifecycle"
    severity: WARNING
    suppress_if: appliance_uptime_excessive
    when: appliance_uptime_days < 1.0
    msg: "VCSA was rebooted less than 24 hours ago — verify this was planned"

  - id: no_backup_schedule
    category: "Data Protection"
    severity: CRITICAL
    when: backup_schedule_count <= 0
    msg: "DR risk: no file-based backup schedule configured on VCSA"

  - id: backup_schedule_disabled
    category: "Data Protection"
    severity: CRITICAL
    when: backup_schedules | selectattr('enabled', 'eq', false) | list | length > 0
    msg: "DR risk: a configured backup schedule is DISABLED on VCSA"

  - id: active_critical_alarms
    category: "vCenter Alarms"
    severity: CRITICAL
    when: active_alarms | selectattr('severity', 'eq', 'critical') | list | length > 0
    msg: "Active CRITICAL alarms detected in vCenter ({{ alarm_count }} total triggered)"

  - id: active_warning_alarms
    category: "vCenter Alarms"
    severity: WARNING
    suppress_if: active_critical_alarms
    when: active_alarms | selectattr('severity', 'eq', 'warning') | list | length > 0
    msg: "Active WARNING alarms detected in vCenter ({{ alarm_count }} total triggered)"

widgets:

  - type: table
    name: "Active vCenter Alarms"
    when: alarm_count > 0
    rows: "{{ active_alarms }}"
    columns:
      - name: Alarm
        value: "{{ alarm_name }}"
      - name: Entity
        value: "{{ entity }}"
      - name: Severity
        value: "{{ severity }}"
        as: status-badge
      - name: Time
        value: "{{ time }}"
      - name: Description
        value: "{{ description }}"
  # The standalone "Infrastructure KPIs" stat-cards widget was retired —
  # the inventory tier root (vSphere) shows the cross-vCenter footprint
  # in its own Inventory widget, and per-vCenter details now live in the
  # sectioned tables below + the auto-injected children section. Keeping
  # both produced a redundant stat strip.

  - type: key-value
    name: "Appliance Overview"
    layout: half
    fields:
      - name: Version
        value: "{{ appliance_version }}"
      - name: Build
        value: "{{ appliance_build }}"
      - name: Health Overall
        value: "{{ appliance_health_overall }}"
        as: status-badge
      - name: Health CPU
        value: "{{ appliance_health_cpu }}"
        as: status-badge
      - name: Health Memory
        value: "{{ appliance_health_memory }}"
        as: status-badge
      - name: Health DB
        value: "{{ appliance_health_database }}"
        as: status-badge
      - name: Health Storage
        value: "{{ appliance_health_storage }}"
        as: status-badge
      - name: Uptime (days)
        value: "{{ appliance_uptime_days }}"
      - name: SSH Enabled
        value: "{{ 'Yes' if ssh_enabled else 'No' }}"
      - name: NTP Mode
        value: "{{ ntp_mode }}"
      - name: Backup Schedules
        value: "{{ backup_schedule_count }}"
      - name: Extensions
        value: "{{ extension_count }}"
      - name: Content Libraries
        value: "{{ content_library_count }}"
      - name: Tag Categories
        value: "{{ tag_category_count }}"
  - type: table
    name: "Clusters"
    when: cluster_count > 0
    rows: "{{ clusters }}"
    columns:
      - name: Cluster
        value: "{{ name }}"
      - name: Datacenter
        value: "{{ datacenter }}"
      - name: Hosts
        value: "{{ host_count }}"
      - name: HA
        value: "{{ ha_enabled }}"
        as: status-badge
      - name: DRS
        value: "{{ drs_enabled }}"
        as: status-badge
      - name: CPU %
        value: "{{ cpu_usage_pct }}"
      - name: Mem %
        value: "{{ mem_usage_pct }}"
  - type: table
    name: "Datastores"
    when: datastore_count > 0
    rows: "{{ datastores }}"
    columns:
      - name: Name
        value: "{{ name }}"
      - name: Capacity (GB)
        value: "{{ capacity_gb }}"
      - name: Free (GB)
        value: "{{ free_gb }}"
      - name: Used %
        value: "{{ used_pct }}"
  - type: table
    name: "Resource Pools"
    when: resource_pool_count > 0
    rows: "{{ resource_pools }}"
    columns:
      - name: Name
        value: "{{ name }}"
      - name: CPU Reservation
        value: "{{ runtime_cpu_reservation_used }} MHz"
      - name: CPU Usage
        value: "{{ runtime_cpu_overall_usage }} MHz"
      - name: Memory Reservation (GB)
        value: "{{ '%.2f' | format(runtime_memory_reservation_used | int / 1073741824) }}"
      - name: Memory Usage (GB)
        value: "{{ '%.2f' | format(runtime_memory_overall_usage | int / 1073741824) }}"
  - type: table
    name: "Distributed Switches"
    when: dvswitch_count > 0
    rows: "{{ dvswitches }}"
    columns:
      - name: Name
        value: "{{ name }}"
      - name: Ports
        value: "{{ num_ports }}"
      - name: Uplinks
        value: "{{ num_uplinks }}"
      - name: MTU
        value: "{{ mtu }}"
  - type: table
    name: "Distributed Portgroups"
    when: dvs_portgroup_count > 0
    rows: "{{ dvs_portgroups }}"
    columns:
      - name: Name
        value: "{{ portgroup_name }}"
      - name: Switch
        value: "{{ dvswitch_name }}"
      - name: VLAN
        value: "{{ vlan_id }}"
      - name: Ports
        value: "{{ num_ports }}"
      - name: Type
        value: "{{ port_binding }}"
  - type: table
    name: "Licenses"
    when: license_count > 0
    rows: "{{ licenses }}"
    columns:
      - name: Name
        value: "{{ name }}"
      - name: Edition
        value: "{{ edition }}"
      - name: Total
        value: "{{ total }}"
      - name: Used
        value: "{{ used }}"
      - name: Expiration
        value: "{{ expiration_date }}"
  - type: table
    name: "Content Libraries"
    when: content_library_count > 0
    rows: "{{ content_libraries }}"
    columns:
      - name: Name
        value: "{{ lib_name }}"
      - name: Type
        value: "{{ lib_type }}"
      - name: Description
        value: "{{ lib_description }}"
  - type: table
    name: "Backup Schedules"
    when: backup_schedule_count > 0
    rows: "{{ backup_schedules }}"
    columns:
      - name: Name
        value: "{{ name }}"
      - name: Enabled
        value: "{{ enabled }}"
        as: status-badge
        style_rules:
          - when: enabled == 0.0
            css_class: "sv-critical"
      - name: Location
        value: "{{ location }}"
      - name: Retain Count
        value: "{{ retain_count }}"
