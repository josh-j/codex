# yaml-language-server: $schema=../../.schemas/ncs_reporter_config_schema.json
#
# vCenter Appliances overview — the single tier between vsphere root and
# the individual vCenter (vcsa) host reports. Its data_source is the same
# overview dict fed to the vsphere root (see models/tree.build_vsphere_tree)
# so we can reuse the vcenters table + footprint KPIs here without double-
# collecting anything.
#
# Inputs carried by the node's data_source:
#   vcenters         : list[dict]  — one row per vCenter (title/report_url/version/health/...)
#   vcenter_count    : int
#   datacenter_count : int
#   esxi_host_count  : int
#   vm_count         : int

config:
  display_name: "vCenter Appliances"
  platform: vcsa_fleet
  extra_inventory_widget_columns:
    - name: vCenters
      value: "{{ vcenter_count }}"
    - name: ESXi Hosts
      value: "{{ esxi_host_count }}"

vars: {}

alerts: []

widgets:
  - type: stat-cards
    slug: vcsa_fleet_kpis
    name: "Fleet Footprint"
    cards:
      - name: vCenters
        value: "{{ vcenter_count }}"
      - name: Datacenters
        value: "{{ datacenter_count }}"
      - name: ESXi Hosts
        value: "{{ esxi_host_count }}"
      - name: VMs
        value: "{{ vm_count }}"

  - type: table
    name: "vCenter Appliances"
    slug: vcsa_fleet_list
    when: vcenter_count > 0
    rows: "{{ vcenters }}"
    columns:
      - name: Appliance
        value: "{{ title }}"
        link_field: report_url
      - name: Version
        value: "{{ version }}"
      - name: Health
        value: "{{ health }}"
        as: status-badge
      - name: Datacenters
        value: "{{ datacenter_count }}"
      - name: ESXi Hosts
        value: "{{ esxi_host_count }}"
