# yaml-language-server: $schema=../../.schemas/ncs_reporter_config_schema.json
config:
  display_name: "VMware ESXi"
  platform: vmware/esxi
  stig:
    platform_to_checklist:
      esxi: cklb_skeletons/cklb_skeleton_vsphere7_esxi_V1R4.json
  extra_inventory_widget_columns:
    - name: Cluster
      value: "{{ cluster }}"
    - name: Status
      value: "{{ overall_status }}"
    - name: CPU %
      value: "{{ cpu_used_pct }}"
    - name: Mem %
      value: "{{ mem_used_pct }}"
    - name: VMs
      value: "{{ vm_count }}"

# Run the vm.yaml schema's alert rules against this host's slice of the
# vCenter VM bundle so VM-level alerts (snapshot age, missing backup
# tags, powered-off VMs, …) surface on each ESXi page. Replaces the
# vSphere-specific Python branch in tree_render.py:_compute_tree_state.
inline_evaluations:
  - schema: vm
    seed_template:
      raw_vm:
        data:
          # Pull VM/snapshot data from the parent vCenter's bundle
          # (single source of truth — the vcsa role queries everything
          # once per vCenter) and filter to this ESXi at render time.
          virtual_machines: >-
            {{ parent.raw_vcsa.data.virtual_machines | default([])
               | selectattr('esxi_hostname', 'eq', raw_esxi.metadata.host) | list }}
          vms_info_raw:
            virtual_machines: >-
              {{ (parent.raw_vcsa.data.vms_info_raw | default({})).get('virtual_machines', [])
                 | selectattr('esxi_hostname', 'eq', raw_esxi.metadata.host) | list }}
          vm_count: >-
            {{ (parent.raw_vcsa.data.virtual_machines | default([])
               | selectattr('esxi_hostname', 'eq', raw_esxi.metadata.host) | list) | length }}
          # Snapshots filtered to this host's VMs by name. The parent
          # bundle ships the full vCenter snapshot list; the Jinja
          # selectattr below partitions per-host without any Python.
          snapshots_raw: >-
            {%- set host_vm_names = parent.raw_vcsa.data.virtual_machines | default([])
                | selectattr('esxi_hostname', 'eq', raw_esxi.metadata.host)
                | map(attribute='guest_name') | list -%}
            {{ parent.raw_vcsa.data.snapshots_raw | default([])
               | selectattr('vm_name', 'in', host_vm_names) | list }}
          infra_patterns: "{{ parent.raw_vcsa.data.infra_patterns | default([]) }}"
          datacenters: []
          config: {}

vars:
  # All raw_esxi.data.* fields are auto-imported from the collector payload.
  # Only computed/derived vars and metadata need explicit declaration.
  uptime_days:
    compute: "{{ uptime_seconds / 86400 }}"
  cpu_used_pct:
    thresholds:
      warn_if_above: 80
      crit_if_above: 90
  mem_used_pct:
    thresholds:
      warn_if_above: 80
      crit_if_above: 90

alerts:
  - id: host_disconnected
    category: "Host Connectivity"
    severity: CRITICAL
    when: connection_state == 'disconnected'
    msg: "ESXi host is disconnected from vCenter"

  - id: host_not_responding
    category: "Host Connectivity"
    severity: CRITICAL
    when: connection_state == 'notResponding'
    msg: "ESXi host is not responding"

  - id: host_in_maintenance
    category: "Host Status"
    severity: WARNING
    when: in_maintenance_mode == 1.0
    msg: "ESXi host is in maintenance mode"

  - id: mem_critical
    category: "Host Resources"
    severity: CRITICAL
    when: mem_used_pct >= 95.0
    msg: "Memory utilization critically high at {{ mem_used_pct | round(0) }}%"

  - id: mem_warning
    category: "Host Resources"
    severity: WARNING
    suppress_if: mem_critical
    when: mem_used_pct >= 85.0
    msg: "Memory utilization elevated at {{ mem_used_pct | round(0) }}%"

  - id: cpu_critical
    category: "Host Resources"
    severity: CRITICAL
    when: cpu_used_pct >= 95.0
    msg: "CPU utilization critically high at {{ cpu_used_pct | round(0) }}%"

  - id: cpu_warning
    category: "Host Resources"
    severity: WARNING
    suppress_if: cpu_critical
    when: cpu_used_pct >= 85.0
    msg: "CPU utilization elevated at {{ cpu_used_pct | round(0) }}%"

  - id: ssh_enabled
    category: "Security"
    severity: WARNING
    when: ssh_enabled == 1.0
    msg: "SSH is enabled on this ESXi host"

  - id: shell_enabled
    category: "Security"
    severity: WARNING
    when: shell_enabled == 1.0
    msg: "ESXi Shell is enabled on this host"

  - id: uptime_excessive
    category: "Host Lifecycle"
    severity: WARNING
    when: uptime_days >= 90.0
    msg: "ESXi host has not been rebooted in {{ uptime_days | round(0) }} days — may be missing patches"

widgets:

  - type: key-value
    name: "Host Overview"
    layout: half
    fields:
      - name: Connection State
        value: "{{ connection_state }}"
      - name: Overall Status
        value: "{{ overall_status }}"
        as: status-badge
      - name: Cluster
        value: "{{ cluster }}"
      - name: Datacenter
        value: "{{ datacenter }}"
      - name: Version
        value: "{{ version }}"
      - name: Build
        value: "{{ build }}"
      - name: Maintenance Mode
        value: "{{ 'Yes' if in_maintenance_mode else 'No' }}"
      - name: Lockdown Mode
        # Render the SDK enum verbatim ("normal", "strict", "disabled")
        # so operators can tell which mode is active. "unknown" surfaces
        # only when the API call failed.
        value: "{{ lockdown_mode | default('unknown') }}"
  - type: stat-cards
    slug: resource_kpis
    name: "Resource Utilization"
    layout: half
    cards:
      - name: CPU %
        value: "{{ cpu_used_pct | round(0) }}%"
      - name: Mem %
        value: "{{ mem_used_pct | round(0) }}%"
      - name: VMs
        value: "{{ vm_count }}"
      - name: Uptime
        # Format helpfully across the typical range:
        #   < 1 hour:  "<1h"     (lab boots, fresh restarts)
        #   < 1 day:   "Nh"      (recent restarts)
        #   ≥ 1 day:   "Nd"      (steady-state hosts)
        value: >-
          {% set s = (uptime_seconds | default(0) | int) %}
          {% if s < 3600 %}<1h
          {% elif s < 86400 %}{{ (s / 3600) | round(0, 'floor') | int }}h
          {% else %}{{ (s / 86400) | round(0, 'floor') | int }}d
          {% endif %}

  - type: key-value
    name: "Security & Services"
    layout: half
    fields:
      - name: SSH Enabled
        value: "{{ 'Yes' if ssh_enabled else 'No' }}"
      - name: Shell Enabled
        value: "{{ 'Yes' if shell_enabled else 'No' }}"
      - name: NTP Running
        value: "{{ 'Yes' if ntp_running else 'No' }}"

  - type: table
    name: "Datastores"
    rows: "{{ datastores }}"
    columns:
      - name: Name
        value: "{{ name }}"
      - name: Total
        value: "{{ total }}"
      - name: Free
        value: "{{ free }}"
  - type: table
    name: "Physical NICs"
    when: (nics | length) > 0
    rows: "{{ nics }}"
    columns:
      - name: Device
        value: "{{ device }}"
      - name: Status
        value: "{{ link_status }}"
        as: status-badge
      - name: Speed (Mbps)
        value: "{{ speed_mbps }}"
      - name: Driver
        value: "{{ driver }}"
      - name: Switch
        value: "{{ switch }}"

  - type: table
    name: "Virtual Machines"
    slug: esxi_vms
    when: (virtual_machines | length) > 0
    rows: "{{ virtual_machines }}"
    columns:
      - name: VM
        value: "{{ guest_name }}"
      - name: Power
        value: "{{ power_state }}"
        as: status-badge
      - name: Tools
        value: "{{ tools_status }}"
        as: status-badge
      - name: IP
        value: "{{ ip_address }}"
      - name: vCPU
        value: "{{ allocated.cpu }}"
      - name: Memory (MB)
        value: "{{ allocated.memory }}"
      - name: Owner
        value: "{{ owner_email }}"