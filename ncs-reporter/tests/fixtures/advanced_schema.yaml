name: advanced_test
platform: test
display_name: "Advanced Schema Test"

detection:
  keys_any: [test_raw]

fields:
  uptime:
    $ref: "shared_schema.yaml#/fields/shared_uptime"
  uptime_days:
    path: "test_raw.data.uptime | to_days"
    type: float
    format: "{value} days"
  storage_bytes:
    path: "test_raw.data.storage"
    type: bytes
  storage_gb:
    path: "test_raw.data.storage | to_gb"
    type: float
  used_pct:
    path: "test_raw.data.used_pct"
    type: percentage
  last_boot:
    path: "test_raw.data.boot_time"
    type: datetime
  interfaces:
    path: "test_raw.data.interfaces"
    type: list

widgets:
  - slug: layout_test
    name: "Layout Test"
    type: key_value
    layout: { width: "half" }
    fields:
      - { name: "Uptime", value: "{{ uptime_days }}" }

  - slug: storage_progress
    name: "Storage Usage"
    type: progress_bar
    layout: { width: "half" }
    value: "{{ used_pct }}"
    value_label: storage_gb
    color: auto
    thresholds:
      warn_if_above: 75
      crit_if_above: 90

  - slug: network_table
    name: "Network Interfaces"
    type: table
    rows_field: interfaces
    columns:
      - name: "Name"
        value: "{{ name }}"
      - name: "Status"
        value: "{{ status }}"
        style_rules:
          - when: status == 'down'
            css_class: "health-crit"
          - when: status == 'up'
            css_class: "health-ok"

  - slug: note
    name: "Note"
    type: markdown
    content: "This is a **markdown** widget."
