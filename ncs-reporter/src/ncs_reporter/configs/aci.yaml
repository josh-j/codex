# yaml-language-server: $schema=../../.schemas/ncs_reporter_config_schema.json
config:
  display_name: "Cisco ACI"
  platform: aci/apic
  extra_fleet_widget_columns:
    - name: Site
      value: "{{ site_label }}"
    - name: Fabric
      value: "{{ fabric_health_score }}"
    - name: Tenant
      value: "{{ tenant_health_score }}"
    - name: Active Faults
      value: "{{ active_fault_count }}"
    - name: OSPF Down
      value: "{{ ospf_down_count }}"

# ---------------------------------------------------------------------------
# Fields
# ---------------------------------------------------------------------------
#
# All raw_aci.data.* fields are auto-imported from the collector payload.
# That covers: apic_hostname, apic_short, health_results, faults,
# cleared_faults, ingress, egress, ospf, interface_description_map,
# audit_failed. Only derived / script-normalized fields are declared here.

vars:
  # Site-code → friendly-name lookup. Keyed on the first 4 characters of
  # `apic_short` (lowercased). Expand as new sites come online.
  _site_map:
    const:
      tyfq: TYFQ-Ramstein
      ashe: ASHE-Aviano
      gfpy: GFPY-Mildenhall
      aedw: AEDW-Alconbury
      sdhm: SDHM-Spangdahlem
      mqna: MQNA-Lajes

  site_label:
    compute: "{{ _site_map.get((apic_short | string)[:4] | lower, apic_short) }}"

  # Fabric + tenant health score extraction. The raw health_results shape is
  # a pair of ansible.builtin.uri responses; the script pulls the numeric
  # `cur` value from each. Returns -1 when the APIC response was missing.
  _health_scores:
    script:
      run: "aci_extract_health.py"
    type: dict

  fabric_health_score:
    compute: "{{ _health_scores.fabric if _health_scores.fabric is not none else -1 }}"
    type: int
    fallback: -1

  tenant_health_score:
    compute: "{{ _health_scores.tenant if _health_scores.tenant is not none else -1 }}"
    type: int
    fallback: -1

  # Flattened fault attribute dicts (drops the `faultInst` wrapper).
  active_faults:
    compute: "{{ faults | map(attribute='faultInst.attributes') | list }}"
    type: list

  cleared_fault_attrs:
    compute: "{{ cleared_faults | map(attribute='faultInst.attributes') | list }}"
    type: list

  # Recent cleared faults, excluding noisy TCA ingress-drop events, capped
  # at the top 5 by raw order (which the APIC returns newest-first).
  recent_cleared_faults:
    compute: >-
      {{ (cleared_fault_attrs
          | rejectattr('descr', 'search', '(?i)TCA:\\s*ingress\\s*drop')
          | list)[:5] }}
    type: list

  # Active fault severity counts.
  critical_fault_count:
    compute: "{{ active_faults | selectattr('severity', 'eq', 'critical') | list | length }}"
    type: int
  major_fault_count:
    compute: "{{ active_faults | selectattr('severity', 'eq', 'major') | list | length }}"
    type: int
  warning_fault_count:
    compute: "{{ active_faults | selectattr('severity', 'eq', 'warning') | list | length }}"
    type: int
  active_fault_count:
    compute: "{{ active_faults | length }}"
    type: int

  # OSPF neighbors not in 'full' adjacency — attributes only.
  ospf_attrs:
    compute: "{{ ospf | map(attribute='ospfAdjEp.attributes') | list }}"
    type: list
  ospf_down:
    compute: "{{ ospf_attrs | rejectattr('operSt', 'eq', 'full') | list }}"
    type: list
  ospf_down_count:
    compute: "{{ ospf_down | length }}"
    type: int

  # Interface utilization — enriched and filtered by the script. Rows include
  # interface_label (DN-decoded) and description (from the APIC's per-dn
  # description map). Port-channel aggregates are dropped (member ports stay).
  ingress_high_util:
    script:
      run: "aci_enrich_interfaces.py"
      args:
        source: ingress
        util_threshold: 25
        top_n: 10
    type: list
  egress_high_util:
    script:
      run: "aci_enrich_interfaces.py"
      args:
        source: egress
        util_threshold: 25
        top_n: 10
    type: list

  critical_ingress_util:
    compute: "{{ ingress_high_util | selectattr('utilMax', 'gt', 75) | list | length }}"
    type: int
  critical_egress_util:
    compute: "{{ egress_high_util | selectattr('utilMax', 'gt', 75) | list | length }}"
    type: int

# ---------------------------------------------------------------------------
# Alerts
# ---------------------------------------------------------------------------

alerts:
  - id: collection_failed
    category: "Data Quality"
    severity: CRITICAL
    when: audit_failed
    msg: "APIC data collection failed — fabric telemetry is stale"

  - id: fabric_health_critical
    category: "Fabric Health"
    severity: CRITICAL
    when: fabric_health_score >= 0 and fabric_health_score < 75
    msg: "Fabric health score is {{ fabric_health_score }} (below critical threshold 75)"

  - id: fabric_health_major
    category: "Fabric Health"
    severity: WARNING
    suppress_if: fabric_health_critical
    when: fabric_health_score >= 0 and fabric_health_score < 85
    msg: "Fabric health score is {{ fabric_health_score }} (below major threshold 85)"

  - id: fabric_health_warning
    category: "Fabric Health"
    severity: WARNING
    suppress_if: [fabric_health_critical, fabric_health_major]
    when: fabric_health_score >= 0 and fabric_health_score < 100
    msg: "Fabric health score is {{ fabric_health_score }} (not fully healthy)"

  - id: tenant_health_critical
    category: "Tenant Health"
    severity: CRITICAL
    when: tenant_health_score >= 0 and tenant_health_score < 75
    msg: "Tenant health score is {{ tenant_health_score }} (below critical threshold 75)"

  - id: tenant_health_major
    category: "Tenant Health"
    severity: WARNING
    suppress_if: tenant_health_critical
    when: tenant_health_score >= 0 and tenant_health_score < 85
    msg: "Tenant health score is {{ tenant_health_score }} (below major threshold 85)"

  - id: tenant_health_warning
    category: "Tenant Health"
    severity: WARNING
    suppress_if: [tenant_health_critical, tenant_health_major]
    when: tenant_health_score >= 0 and tenant_health_score < 100
    msg: "Tenant health score is {{ tenant_health_score }} (not fully healthy)"

  - id: active_critical_faults
    category: "Faults"
    severity: CRITICAL
    when: critical_fault_count > 0
    msg: "{{ critical_fault_count }} active critical fault(s) on APIC"

  - id: active_major_faults
    category: "Faults"
    severity: WARNING
    when: major_fault_count > 0
    msg: "{{ major_fault_count }} active major fault(s) on APIC"

  - id: ospf_peers_down
    category: "Routing"
    severity: CRITICAL
    when: ospf_down_count > 0
    msg: "{{ ospf_down_count }} OSPF neighbor(s) not in 'full' adjacency"

  - id: link_utilization_critical_ingress
    category: "Link Utilization"
    severity: CRITICAL
    when: critical_ingress_util > 0
    msg: "{{ critical_ingress_util }} ingress interface(s) above 75% peak utilization"

  - id: link_utilization_critical_egress
    category: "Link Utilization"
    severity: CRITICAL
    when: critical_egress_util > 0
    msg: "{{ critical_egress_util }} egress interface(s) above 75% peak utilization"

  - id: link_utilization_warning_ingress
    category: "Link Utilization"
    severity: WARNING
    suppress_if: link_utilization_critical_ingress
    when: (ingress_high_util | length) > 0
    msg: "{{ ingress_high_util | length }} ingress interface(s) above 25% average utilization"

  - id: link_utilization_warning_egress
    category: "Link Utilization"
    severity: WARNING
    suppress_if: link_utilization_critical_egress
    when: (egress_high_util | length) > 0
    msg: "{{ egress_high_util | length }} egress interface(s) above 25% average utilization"

# ---------------------------------------------------------------------------
# Widgets
# ---------------------------------------------------------------------------

widgets:

  - type: stat-cards
    slug: aci_health_kpis
    name: "Fabric Overview"
    cards:
      - name: Site
        value: "{{ site_label }}"
      - name: Fabric Health
        value: "{{ fabric_health_score }}"
        as: status-badge
      - name: Tenant Health
        value: "{{ tenant_health_score }}"
        as: status-badge
      - name: Active Faults
        value: "{{ active_fault_count }}"
      - name: Critical Faults
        value: "{{ critical_fault_count }}"
      - name: OSPF Down
        value: "{{ ospf_down_count }}"

  - type: table
    name: "Active Faults"
    when: active_fault_count > 0
    rows: "{{ active_faults | sort(attribute='severity') }}"
    columns:
      - name: Severity
        value: "{{ severity }}"
        as: status-badge
      - name: Description
        value: "{{ descr }}"
      - name: Created
        value: "{{ created }}"
      - name: DN
        value: "{{ dn }}"

  - type: table
    name: "Recent Cleared Faults"
    when: (recent_cleared_faults | length) > 0
    rows: "{{ recent_cleared_faults }}"
    columns:
      - name: Severity
        value: "{{ severity }}"
        as: status-badge
      - name: Description
        value: "{{ descr }}"
      - name: Created
        value: "{{ created }}"
      - name: DN
        value: "{{ dn }}"

  - type: table
    name: "OSPF Neighbors Not in 'full' State"
    when: ospf_down_count > 0
    rows: "{{ ospf_down }}"
    columns:
      - name: Interface
        value: "{{ dn | regex_replace('^.*/(node-\\d+)/.*?\\[(.*?)\\]/.*$', 'leaf \\1 \\2') }}"
      - name: Peer IP
        value: "{{ peerIp }}"
      - name: State
        value: "{{ operSt }}"
        as: status-badge

  - type: table
    name: "High Ingress Utilization (> 25%)"
    when: (ingress_high_util | length) > 0
    rows: "{{ ingress_high_util }}"
    columns:
      - name: Interface
        value: "{{ interface_label }}"
      - name: Description
        value: "{{ description }}"
      - name: Avg Util %
        value: "{{ utilAvg | round | int }}"
      - name: Max Util %
        value: "{{ utilMax | round | int }}"
        as: status-badge
        style_rules:
          - when: utilMax > 75
            css_class: "sv-critical"

  - type: table
    name: "High Egress Utilization (> 25%)"
    when: (egress_high_util | length) > 0
    rows: "{{ egress_high_util }}"
    columns:
      - name: Interface
        value: "{{ interface_label }}"
      - name: Description
        value: "{{ description }}"
      - name: Avg Util %
        value: "{{ utilAvg | round | int }}"
      - name: Max Util %
        value: "{{ utilMax | round | int }}"
        as: status-badge
        style_rules:
          - when: utilMax > 75
            css_class: "sv-critical"
