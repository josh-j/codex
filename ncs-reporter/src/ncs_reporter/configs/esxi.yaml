# yaml-language-server: $schema=../../.schemas/report_schema.json
config:
  display_name: "VMware ESXi"
  platform: vmware/esxi
  stig:
    platform_to_checklist:
      esxi: cklb_skeletons/cklb_skeleton_vsphere7_esxi_V1R4.json
  extra_fleet_widget_columns:
    - header: Cluster
      field: cluster
    - header: Status
      field: overall_status
    - header: CPU %
      field: cpu_used_pct
    - header: Mem %
      field: mem_used_pct
    - header: VMs
      field: vm_count

vars:
  # All raw_esxi.data.* fields are auto-imported from the collector payload.
  # Only computed/derived vars and metadata need explicit declaration.
  uptime_days:
    compute: "{{ uptime_seconds / 86400 }}"
  cpu_used_pct:
    thresholds:
      warn_at: 80
      crit_at: 90
  mem_used_pct:
    thresholds:
      warn_at: 80
      crit_at: 90

alerts:
  - id: host_disconnected
    category: "Host Connectivity"
    severity: CRITICAL
    when: connection_state == 'disconnected'
    msg: "ESXi host is disconnected from vCenter"

  - id: host_not_responding
    category: "Host Connectivity"
    severity: CRITICAL
    when: connection_state == 'notResponding'
    msg: "ESXi host is not responding"

  - id: host_in_maintenance
    category: "Host Status"
    severity: WARNING
    when: in_maintenance_mode == 1.0
    msg: "ESXi host is in maintenance mode"

  - id: mem_critical
    category: "Host Resources"
    severity: CRITICAL
    when: mem_used_pct >= 95.0
    msg: "Memory utilization critically high at {{ mem_used_pct | round(0) }}%"

  - id: mem_warning
    category: "Host Resources"
    severity: WARNING
    suppress_if: mem_critical
    when: mem_used_pct >= 85.0
    msg: "Memory utilization elevated at {{ mem_used_pct | round(0) }}%"

  - id: cpu_critical
    category: "Host Resources"
    severity: CRITICAL
    when: cpu_used_pct >= 95.0
    msg: "CPU utilization critically high at {{ cpu_used_pct | round(0) }}%"

  - id: cpu_warning
    category: "Host Resources"
    severity: WARNING
    suppress_if: cpu_critical
    when: cpu_used_pct >= 85.0
    msg: "CPU utilization elevated at {{ cpu_used_pct | round(0) }}%"

  - id: ssh_enabled
    category: "Security"
    severity: WARNING
    when: ssh_enabled == 1.0
    msg: "SSH is enabled on this ESXi host"

  - id: shell_enabled
    category: "Security"
    severity: WARNING
    when: shell_enabled == 1.0
    msg: "ESXi Shell is enabled on this host"

  - id: uptime_excessive
    category: "Host Lifecycle"
    severity: WARNING
    when: uptime_days >= 90.0
    msg: "ESXi host has not been rebooted in {{ uptime_days | round(0) }} days — may be missing patches"

widgets:

  - type: key-value
    title: "Host Overview"
    layout: half
    fields:
      - label: Connection State
        field: connection_state
        as: status-badge
      - label: Overall Status
        field: overall_status
        as: status-badge
      - label: Cluster
        field: cluster
      - label: Datacenter
        field: datacenter
      - label: Version
        field: version
      - label: Build
        field: build
      - label: Maintenance Mode
        field: in_maintenance_mode
        as: status-badge
      - label: Lockdown Mode
        field: lockdown_mode

  - type: stat-cards
    id: resource_kpis
    title: "Resource Utilization"
    layout: half
    cards:
      'CPU %': "{{ cpu_used_pct | round(0) }}%"
      'Mem %': "{{ mem_used_pct | round(0) }}%"
      'VMs': "{{ vm_count }}"
      'Uptime (days)': "{{ uptime_days | round(0) }}"

  - type: key-value
    title: "Security & Services"
    layout: half
    fields:
      - label: SSH Enabled
        field: ssh_enabled
        as: status-badge
      - label: Shell Enabled
        field: shell_enabled
        as: status-badge
      - label: NTP Running
        field: ntp_running
        as: status-badge

  - type: table
    title: "Datastores"
    rows: "{{ datastores }}"
    columns:
      - header: Name
        field: name
      - header: Total
        field: total
      - header: Free
        field: free

  - type: table
    title: "Physical NICs"
    rows: "{{ nics }}"
    columns:
      - header: Device
        field: device
      - header: Status
        field: link_status
        as: status-badge
      - header: Speed (Mbps)
        field: speed_mbps
      - header: Driver
        field: driver
      - header: Switch
        field: switch
