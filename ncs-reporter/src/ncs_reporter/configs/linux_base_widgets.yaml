# Shared Linux widgets — included by linux.yaml, photon.yaml, etc.


- type: stat-cards
  slug: headline_kpis
  name: "Key Metrics"
  # Thresholds for these vars are declared in linux_base_fields.yaml
  cards:
    - name: Uptime (d)
      value: "{{ uptime_days | round(0) }}"
    - name: Mem Used %
      value: "{{ memory_used_pct | round(1) }}%"
    - name: Failed Svcs
      value: "{{ failed_services_count }}"
    - name: Pending Updates
      value: "{{ pending_updates_count }}"

- type: key-value
  name: "System Overview"
  fields:
    - name: Hostname
      value: "{{ hostname }}"
    - name: IP Address
      value: "{{ ip_address }}"
    - name: Distribution
      value: "{{ distribution }}"
    - name: Version
      value: "{{ distribution_version }}"
    - name: Kernel
      value: "{{ kernel }}"
    - name: Uptime (days)
      value: "{{ uptime_days }}"
      format: "{{ value | round(1) }}"
    - name: Load Avg (15m)
      value: "{{ load_avg_15m }}"
      format: "{value:.2f}"

- type: key-value
  name: "Memory"
  fields:
    - name: Total (MB)
      value: "{{ memory_total_mb }}"
      format: "{{ value | round(1) }}"
    - name: Free (MB)
      value: "{{ memory_free_mb }}"
      format: "{{ value | round(1) }}"
    - name: Used %
      value: "{{ memory_used_pct }}"
      format: "{{ value | round(1) }}"
    - name: Swap Total (MB)
      value: "{{ swap_total_mb }}"
      format: "{{ value | round(1) }}"
    - name: Swap Used %
      value: "{{ swap_used_pct }}"
      format: "{{ value | round(1) }}"

- type: key-value
  name: "Patching & Services"
  fields:
    - name: Failed Services
      value: "{{ failed_services_count }}"
    - name: Pending Updates
      value: "{{ pending_updates_count }}"
    - name: Reboot Required
      value: "{{ reboot_pending }}"
- type: table
  name: "Filesystems"
  rows: "{{ disks }}"
  columns:
    - name: Mount
      value: "{{ mount }}"
    - name: Device
      value: "{{ device }}"
    - name: FS Type
      value: "{{ fstype }}"
    - name: Total (GB)
      value: "{{ total_gb }}"
    - name: Free (GB)
      value: "{{ free_gb }}"
    - name: Used %
      value: "{{ used_pct }}"
      as: status-badge
