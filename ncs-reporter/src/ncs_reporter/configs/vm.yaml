# yaml-language-server: $schema=../../.schemas/report_schema.json
config:
  display_name: "VMware VM"
  platform: vmware/vm
  stig:
    ansible_playbook:
      path: "playbooks/vmware/vm/stig_remediate.yml"
      target_var: "vm_stig_target_vms"
    platform_to_checklist:
      vm: cklb_skeletons/cklb_skeleton_vsphere7_vms_V1R4.json
  extra_fleet_widget_columns:
    'VMs': "{{ vm_count }}"
    'Snapshots': "{{ snapshot_count }}"
    'Powered Off': "{{ powered_off_vm_count }}"

# ---------------------------------------------------------------------------
# Fields
# ---------------------------------------------------------------------------

vars:
  # All raw_vm.data.* fields are auto-imported from the collector payload.
  # Only scripts and computes need explicit declaration.

  virtual_machines:
    script:
      run: "get_vms_list.py"
      args:
        exclude_patterns: "{{ infra_patterns }}"
    type: list

  snapshot_age_days:
    compute: "{{ 7 }}"

  snapshots:
    script:
      run: "normalize_snapshots.py"
      args:
        mode: list
        age_days: 7
    type: list

  snapshot_count:
    thresholds: { 1: yellow, 10: red }

  powered_off_vms:
    compute: "{{ virtual_machines | selectattr('power_state', 'eq', 'poweredOff') | list }}"
    type: list

  powered_on_vms:
    compute: "{{ virtual_machines | selectattr('power_state', 'eq', 'poweredOn') | list }}"
    type: list

  vms_tools_not_running:
    compute: "{{ powered_on_vms | selectattr('tools_status', 'eq', 'toolsNotRunning') | list }}"
    type: list

  vms_tools_not_installed:
    compute: "{{ powered_on_vms | selectattr('tools_status', 'eq', 'toolsNotInstalled') | list }}"
    type: list

  aged_snapshots:
    compute: "{{ snapshots | selectattr('days_old', 'ge', snapshot_age_days) | list }}"
    type: list

  powered_off_vm_count:
    compute: "{{ powered_off_vms | length }}"
    thresholds: { 1: yellow, 5: red }

  vms_tools_not_running_count:
    compute: "{{ vms_tools_not_running | length }}"

  vms_tools_not_installed_count:
    compute: "{{ vms_tools_not_installed | length }}"

  aged_snapshot_count:
    compute: "{{ aged_snapshots | length }}"

# ---------------------------------------------------------------------------
# Alerts
# ---------------------------------------------------------------------------

alerts:
  - id: powered_off_vms
    category: "Workload Inventory"
    severity: WARNING
    when: powered_off_vm_count > 0
    items: "{{ powered_off_vms }}"
    msg: "{{ powered_off_vm_count }} powered-off VM(s) detected — review for cleanup or licensing"

  - id: vm_tools_not_running
    category: "Workload Compliance"
    severity: WARNING
    when: vms_tools_not_running_count > 0
    items: "{{ vms_tools_not_running }}"
    msg: "{{ vms_tools_not_running_count }} powered-on VM(s) with VMware Tools not running"

  - id: vm_tools_not_installed
    category: "Workload Compliance"
    severity: WARNING
    when: vms_tools_not_installed_count > 0
    items: "{{ vms_tools_not_installed }}"
    msg: "{{ vms_tools_not_installed_count }} powered-on VM(s) with VMware Tools not installed"

  - id: snapshots_present
    category: "Snapshots"
    severity: WARNING
    when: snapshot_count > 0
    msg: "{{ snapshot_count }} VM snapshot(s) present — review for removal"

  - id: aged_snapshots
    category: "Snapshots"
    severity: CRITICAL
    when: aged_snapshot_count > 0
    items: "{{ aged_snapshots }}"
    msg: "{{ aged_snapshot_count }} snapshot(s) older than {{ snapshot_age_days }} days"

# ---------------------------------------------------------------------------
# Widgets
# ---------------------------------------------------------------------------

widgets:

  - type: stat-cards
    id: vm_kpis
    title: "VM KPIs"
    cards:
      'VMs': "{{ vm_count }}"
      'Snapshots': "{{ snapshot_count }}"
      'Powered Off': "{{ powered_off_vm_count }}"

  - type: grouped-table
    title: "Virtual Machines"
    rows: "{{ virtual_machines }}"
    group_by: "{{ cluster }}"
    columns:
      - 'Name': "{{ guest_name }}"
        link_field: "{{ guest_name }}"
      - 'Power State': "{{ power_state }}"
        badge: true
        style_rules:
          - when: power_state == 'poweredOff'
            css_class: "subtle-text"
      - 'Tools Status': "{{ tools_status }}"
        badge: true
      - 'Cluster': "{{ cluster }}"
      - 'IP Address': "{{ ip_address }}"
      - 'Memory (MB)': "{{ allocated.memory }}"
      - 'vCPU': "{{ allocated.cpu }}"
      - 'Owner Email': "{{ owner_email }}"
      - 'Last Backup': "{{ backup_info }}"

  - type: table
    title: "Snapshots"
    when: snapshot_count > 0
    rows: "{{ snapshots }}"
    columns:
      'VM': "{{ vm_name }}"
      'Owner Email': "{{ owner_email }}"
      'Snapshot': "{{ name }}"
      'Created': "{{ creation_time }}"
      'State': "{{ state }}"
      'Days Old': "{{ 'Unknown' if days_old == -1 else days_old }}"
