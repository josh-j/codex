# Shared Linux/Photon base fields.
# Included via $include from linux-family schemas.
#
# Most fields are auto-imported from the collector's flat payload.
# Only computed, transform-based, and threshold vars need declaration.

# --- Computed ---

uptime_days:
  compute: "{{ uptime_seconds / 86400 }}"

memory_used_pct:
  compute: "{{ (memory_total_mb - memory_free_mb) / memory_total_mb * 100 }}"
  thresholds:
    warn_at: 85
    crit_at: 98

swap_used_pct:
  compute: "{{ (swap_total_mb - swap_free_mb) / swap_total_mb * 100 }}"

# --- Transform-based (pipe transforms not available in collectors) ---

failed_services:
  path: ".failed_services.stdout_lines"
  type: list
failed_services_count:
  path: ".failed_services.stdout_lines | len_if_list"
  type: int
  thresholds:
    crit_at: 1

pending_updates_count:
  path: ".apt_simulate.stdout_lines | join_lines | regex_extract('(\\d+) upgraded,')"
  type: int
  thresholds:
    warn_at: 1
reboot_pending:
  path: ".reboot_stat.stat.exists"
  type: bool

# --- Storage (needs list_filter + list_map) ---

disks:
  path: ".mounts"
  type: list
  list_filter:
    exclude:
      fstype: [tmpfs, devtmpfs, squashfs, overlay, proc, sysfs, devpts]
      device: ["^/dev/loop"]
  list_map:
    total_gb: "size_total / 1073741824"
    free_gb: "size_available / 1073741824"
    used_pct: "(size_total - size_available) / size_total * 100"

# --- Security (transforms) ---

shadow_lines:
  path: ".shadow_raw.stdout_lines"
  type: list
sshd_config:
  path: ".sshd_raw.stdout_lines | parse_kv(' ', '#')"
  type: dict
world_writable_files:
  path: ".world_writable.stdout_lines"
  type: list
world_writable_count:
  path: ".world_writable.stdout_lines | len_if_list"
  type: int

users:
  script:
    run: "user_inventory.py"
  type: list
