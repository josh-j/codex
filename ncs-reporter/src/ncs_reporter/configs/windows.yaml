# yaml-language-server: $schema=../../.schemas/report_schema.json
config:
  platform: windows
  stig:
    rule_prefix_to_platform:
      WN: windows
      MS: windows
  extra_fleet_widget_columns:
    - header: Collected At
      field: collected_at
    - header: CCM Status
      field: ccm_service_state
    - header: Reboot
      field: health_reboot_pending
    - header: Critical
      field: _critical_count
    - header: Warning
      field: _warning_count

# ---------------------------------------------------------------------------
# Fields
# ---------------------------------------------------------------------------

# All raw_windows.data.* fields are auto-imported from the collector payload.

# ---------------------------------------------------------------------------
# Alerts
# ---------------------------------------------------------------------------

alerts:
  - id: ccmexec_not_running
    category: "Services"
    severity: WARNING
    when: ccm_service_state != 'running'
    msg: "ConfigMgr client service (CCMExec) is not running (state: {{ ccm_service_state }})"

  - id: failed_updates
    category: "Patching"
    severity: WARNING
    when: update_results | selectattr('failed', 'eq', true) | list | length > 0
    msg: "One or more ConfigMgr application updates failed"

  - id: apps_pending_update
    category: "Patching"
    severity: WARNING
    when: apps_to_update is defined and apps_to_update | length > 0
    msg: "ConfigMgr applications have pending updates"

  - id: reboot_pending
    category: "Health"
    severity: WARNING
    when: health_reboot_pending == 1
    msg: "System has a pending reboot ({{ health_reboot_reasons }})"

  - id: disk_space_warning
    category: "Health"
    severity: WARNING
    when: health_disk | selectattr('UsedPct', 'gt', 80.0) | list | length > 0
    msg: "One or more disks exceed 80% usage"

  - id: memory_high
    category: "Health"
    severity: WARNING
    when: health_memory_used_pct > 85
    msg: "Memory usage is high ({{ health_memory_used_pct }}%)"

  - id: secure_channel_failed
    category: "Health"
    severity: CRITICAL
    when: health_secure_channel == 'FAILED'
    msg: "Domain secure channel test FAILED"

  - id: critical_events
    category: "Health"
    severity: WARNING
    when: health_event_count > 0
    msg: "{{ health_event_count }} critical/error events in recent logs"

  - id: open_vulnerabilities
    category: "Security"
    severity: WARNING
    when: vuln_open > 0
    msg: "{{ vuln_open }} open vulnerability findings"

# ---------------------------------------------------------------------------
# Widgets
# ---------------------------------------------------------------------------

widgets:

  - type: key-value
    title: "System Information"
    fields:
      - label: Hostname
        field: health_hostname
      - label: OS
        field: health_os_name
      - label: Uptime (hours)
        field: health_uptime_hours
      - label: CCMExec State
        field: ccm_service_state
      - label: Reboot Pending
        field: health_reboot_pending
      - label: Secure Channel
        field: health_secure_channel

  - type: table
    title: "Disk Usage"
    rows: "{{ health_disk }}"
    columns:
      - header: Drive
        field: DeviceID
      - header: Size (GB)
        field: SizeGB
      - header: Free (GB)
        field: FreeGB
      - header: Used %
        field: UsedPct
        as: status-badge

  - type: key-value
    title: "Memory & CPU"
    fields:
      - label: Memory Used %
        field: health_memory_used_pct
      - label: CPU Load %
        field: health_cpu_load_pct

  - type: table
    title: "Critical Services"
    rows: "{{ health_services }}"
    columns:
      - header: Service
        field: display_name
      - header: Status
        field: status
        as: status-badge
      - header: Start Type
        field: start_type

  - type: table
    title: "Recent Critical/Error Events"
    rows: "{{ health_events }}"
    columns:
      - header: Time
        field: time
      - header: Log
        field: log
      - header: Level
        field: level
        as: status-badge
      - header: Source
        field: source
      - header: ID
        field: id
      - header: Message
        field: message

  - type: key-value
    title: "Vulnerability Summary"
    fields:
      - label: Total Findings
        field: vuln_total_findings
      - label: Remediated
        field: vuln_remediated
      - label: Open
        field: vuln_open

  - type: table
    title: "Vulnerability Findings"
    rows: "{{ vuln_findings }}"
    columns:
      - header: Plugin ID
        field: plugin_id
      - header: Severity
        field: severity
        as: status-badge
      - header: Title
        field: title
      - header: Remediated
        field: remediated
        as: status-badge

  - type: table
    title: "ConfigMgr Applications"
    rows: "{{ configmgr_apps }}"
    columns:
      - header: Name
        field: Name
      - header: Version
        field: Version

  - type: table
    title: "Applications Pending Update"
    rows: "{{ apps_to_update }}"
    columns:
      - header: Name
        field: Name
      - header: Current Version
        field: CurrentVersion
      - header: Target Version
        field: TargetVersion

  - type: table
    title: "Update Results"
    rows: "{{ update_results }}"
    columns:
      - header: Application
        field: application
      - header: Status
        field: status
        as: status-badge
      - header: Failed
        field: failed
        as: status-badge

  - type: table
    title: "KB Detection Status"
    rows: "{{ kb_detection }}"
    columns:
      - header: KB
        field: kb
      - header: Installed
        field: installed
        as: status-badge
      - header: Detection Method
        field: method

  - type: table
    title: "Installed Software"
    rows: "{{ health_software_versions }}"
    columns:
      - header: Name
        field: name
      - header: Version
        field: version
      - header: Publisher
        field: publisher
