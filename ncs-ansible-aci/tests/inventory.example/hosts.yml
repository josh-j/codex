---
# internal.aci test inventory skeleton.
# The apic_collect playbook defaults to the aci_apics group. Each
# entry is an APIC controller reachable by the Ansible host.

all:
  children:
    aci_apics:
      hosts:
        apic-lab-01.example.test:
          ansible_host: 10.0.3.10
          aci_username: admin
          aci_password: "{{ vault_aci_admin_password }}"
