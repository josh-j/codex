---
# internal.aci.apic : tasks/collect.yaml
#
# APIC REST is reached over HTTPS by URL, never by SSH — every call is
# delegated to localhost.

- name: ACI Collection Orchestrator
  vars:
    _discover_failed: false
    _aci_data_fetches:
      - { name: fabric_health,  uri: "{{ aci_health_fabric_uri }}" }
      - { name: tenant_health,  uri: "{{ aci_health_tenant_uri }}" }
      - { name: faults,         uri: "{{ aci_faults_uri }}" }
      - { name: cleared_faults, uri: "{{ aci_cleared_faults_uri }}" }
      - { name: ingress,        uri: "{{ aci_ingr_uri }}" }
      - { name: egress,         uri: "{{ aci_egr_uri }}" }
      - { name: ospf,           uri: "{{ aci_ospf_uri }}" }
      - { name: interfaces,     uri: "{{ aci_intf_descr_uri }}" }
  block:
    - name: "ACI | Authenticate to APIC"
      delegate_to: localhost
      ansible.builtin.uri:
        url: "https://{{ inventory_hostname }}{{ aci_login_uri }}"
        method: POST
        body:
          aaaUser:
            attributes:
              name: "{{ aci_username }}"
              pwd: "{{ aci_password }}"
        body_format: json
        validate_certs: false
      register: _aci_login
      retries: "{{ aci_login_retries }}"
      delay: "{{ aci_login_delay }}"
      until: _aci_login.status == 200
      no_log: true

    - name: "ACI | Set login cookie fact"
      delegate_to: localhost
      ansible.builtin.set_fact:
        apic_cookie: "{{ _aci_login.cookies_string | regex_search('APIC-cookie=[^;]+') }}"

    - name: "ACI | Fetch data blocks"
      delegate_to: localhost
      ansible.builtin.uri:
        url: "https://{{ inventory_hostname }}{{ item.uri }}"
        method: GET
        headers:
          Cookie: "{{ apic_cookie }}"
        validate_certs: false
      register: _aci_responses
      loop: "{{ _aci_data_fetches }}"
      loop_control:
        label: "{{ item.name }}"

    # The previous `_aci_by_name` / `_aci_description_map` /
    # `_enrich_util.yaml` shaping moved into the schema (see
    # `ncs-ansible-aci/ncs_configs/aci.yaml`). The collect task now
    # emits raw `_aci_responses.results` only; downstream
    # `_aci_by_name`, description joins, port-channel filtering,
    # threshold gating, regex DN decoding, dedupe-by-interface, and
    # top-N truncation all happen in `normalize:` specs.

  rescue:
    - name: "ACI | Mark discovery as failed"
      ansible.builtin.set_fact:
        _discover_failed: true
      changed_when: false

  always:
    # Emit the raw `_aci_responses.results` list verbatim. All
    # downstream shaping (index-by-name, description join, util
    # enrichment, top-N) happens in the schema. See
    # `ncs-ansible-aci/ncs_configs/aci.yaml`.
    - name: "ACI | Assemble flat discovery payload"
      ansible.builtin.set_fact:
        _aci_raw_payload:
          apic_hostname: "{{ inventory_hostname }}"
          apic_short: "{{ inventory_hostname_short }}"
          aci_responses_raw: "{{ _aci_responses.results | default([]) }}"
          audit_failed: "{{ _discover_failed | bool }}"
      changed_when: false

    - name: "ACI | Emit discovery telemetry"
      ansible.builtin.include_role:
        name: internal.core.emit
      vars:
        _ncs_emit_platform: "aci/apic"
        _ncs_emit_tree_path:
          - aci
          - "{{ inventory_hostname }}"
        _ncs_emit_payload: "{{ _aci_raw_payload | default({}) }}"
        _ncs_emit_skip: "{{ aci_skip_export | default(false) }}"
