# yaml-language-server: $schema=../../.schemas/ncs_reporter_config_schema.json
config:
  display_name: "Cisco ACI"
  platform: aci/apic
  extra_inventory_widget_columns:
    - name: Site
      value: "{{ site_label }}"
    - name: Fabric
      value: "{{ fabric_health_score }}"
    - name: Tenant
      value: "{{ tenant_health_score }}"
    - name: Active Faults
      value: "{{ active_fault_count }}"
    - name: OSPF Down
      value: "{{ ospf_down_count }}"

vars:
  # Keyed on the first 4 chars of `apic_short` (lowercased); extend as new
  # sites come online.
  _site_map:
    const:
      tyfq: TYFQ-Ramstein
      ashe: ASHE-Aviano
      gfpy: GFPY-Mildenhall
      aedw: AEDW-Alconbury
      sdhm: SDHM-Spangdahlem
      mqna: MQNA-Lajes

  site_label:
    compute: "{{ _site_map.get((apic_short | string)[:4] | lower, apic_short) }}"

  # `aci_responses_raw` is a list of ansible-uri results
  # ({item: {name: ...}, json: ...}); `_aci_by_name` reindexes by fetch
  # name so downstream fields reference one canonical shape. The
  # `item.item.name` path strips DSL's source-item prefix to reach the
  # loop label.
  _aci_by_name:
    normalize:
      first_of:
        - {index: {source: aci_responses_raw, key: item.item.name, value: item.json}}
        - {const: {}}
    type: dict

  fabric_health_score:
    normalize:
      first_of:
        - {path: health_results.0.imdata.0.fabricHealthTotal.attributes.cur}
        - {path: _aci_by_name.fabric_health.imdata.0.fabricHealthTotal.attributes.cur}
        - {const: -1}
    type: int

  tenant_health_score:
    normalize:
      first_of:
        - {path: health_results.1.imdata.0.healthInst.attributes.cur}
        - {path: _aci_by_name.tenant_health.imdata.0.healthInst.attributes.cur}
        - {const: -1}
    type: int

  _faults_imdata:
    normalize:
      first_of:
        - faults
        - {path: _aci_by_name.faults.imdata}
        - {const: []}
    type: list

  _cleared_faults_imdata:
    normalize:
      first_of:
        - cleared_faults
        - {path: _aci_by_name.cleared_faults.imdata}
        - {const: []}
    type: list

  _ospf_imdata:
    normalize:
      first_of:
        - ospf
        - {path: _aci_by_name.ospf.imdata}
        - {const: []}
    type: list

  active_faults:
    normalize: {pluck: {source: _faults_imdata, path: faultInst.attributes}}
    type: list

  # TCA ingress-drop events are noisy environmental churn; APIC returns
  # cleared faults newest-first, so slicing after the reject is safe.
  recent_cleared_faults:
    normalize:
      slice:
        source:
          list:
            source: {pluck: {source: _cleared_faults_imdata, path: faultInst.attributes}}
            exclude_match_any: {field: descr, patterns: ['TCA:\s*ingress\s*drop']}
        stop: 5
    type: list

  critical_fault_count:
    normalize: {count: {list: {source: active_faults, include_where: {severity: critical}}}}
    type: int
  major_fault_count:
    normalize: {count: {list: {source: active_faults, include_where: {severity: major}}}}
    type: int
  warning_fault_count:
    normalize: {count: {list: {source: active_faults, include_where: {severity: warning}}}}
    type: int
  active_fault_count:
    normalize: {count: active_faults}
    type: int

  ospf_down:
    normalize:
      list:
        source: {pluck: {source: _ospf_imdata, path: ospfAdjEp.attributes}}
        exclude_where: {operSt: full}
    type: list

  # --- Link utilization enrichment ---
  # Pipeline: filter port-channel aggregates, threshold on utilAvg, join
  # the description map, regex-decode the DN into "leaf <node> <intf>",
  # dedupe by interface, sort by utilMax, top-N.

  _aci_interfaces_imdata:
    normalize:
      first_of:
        - {path: _aci_by_name.interfaces.imdata}
        - {const: []}
    type: list

  _aci_description_map:
    normalize:
      first_of:
        - aci_description_map
        - {index: {source: _aci_interfaces_imdata, key: item.l1PhysIf.attributes.dn, value: item.l1PhysIf.attributes.descr}}
        - {const: {}}
    type: dict

  # YAML anchor for the shared filter/sort/dedupe/top-N pipeline.
  # `<<: *…` substitutes the anchored map; only the imdata source path
  # and the per-direction wrapper key differ between ingress and egress.
  ingress_high_util:
    normalize: &_high_util_pipeline_ingress
      first_of:
        - ingress_high_util
        - slice:
            source:
              unique:
                source:
                  sort:
                    source:
                      list:
                        source: {pluck: {source: {path: _aci_by_name.ingress.imdata}, path: eqptIngrTotalHist15min.attributes}}
                        include_where: &_high_util_filters
                          - {field: dn, op: ne, value: ''}
                          - {field: {expr: "{{ utilAvg | default(0) | float }}"}, op: gt, value: 25}
                        exclude_where: &_high_util_excludes {field: dn, op: matches, value: '\[Po\d+\]'}
                        map: &_high_util_map
                          dn: dn
                          utilAvg: {expr: "{{ utilAvg | default(0) | float }}"}
                          utilMax: {expr: "{{ utilMax | default(0) | float }}"}
                          interface_label:
                            regex_replace:
                              value: dn
                              pattern: '^.*/(node-\d+)/.*?\[(.*?)\]/.*$'
                              replacement: 'leaf \1 \2'
                          description:
                            get:
                              source: _aci_description_map
                              key:
                                regex_search: {value: dn, pattern: '^.*\]'}
                              default: 'N/A'
                    by: utilMax
                    reverse: true
                by: interface_label
            stop: 10
        - {const: []}
    type: list

  egress_high_util:
    normalize:
      first_of:
        - egress_high_util
        - slice:
            source:
              unique:
                source:
                  sort:
                    source:
                      list:
                        source: {pluck: {source: {path: _aci_by_name.egress.imdata}, path: eqptEgrTotalHist15min.attributes}}
                        include_where: *_high_util_filters
                        exclude_where: *_high_util_excludes
                        map: *_high_util_map
                    by: utilMax
                    reverse: true
                by: interface_label
            stop: 10
        - {const: []}
    type: list
  ospf_down_count:
    normalize: {count: ospf_down}
    type: int

  critical_ingress_util:
    normalize:
      count:
        list:
          source: ingress_high_util
          include_where: {field: utilMax, op: gt, value: 75}
    type: int
  critical_egress_util:
    normalize:
      count:
        list:
          source: egress_high_util
          include_where: {field: utilMax, op: gt, value: 75}
    type: int

alerts:
  - id: collection_failed
    category: "Data Quality"
    severity: CRITICAL
    when: audit_failed
    msg: "APIC data collection failed — fabric telemetry is stale"

  - id: fabric_health_critical
    category: "Fabric Health"
    severity: CRITICAL
    when: fabric_health_score >= 0 and fabric_health_score < 75
    msg: "Fabric health score is {{ fabric_health_score }} (below critical threshold 75)"

  - id: fabric_health_major
    category: "Fabric Health"
    severity: WARNING
    suppress_if: fabric_health_critical
    when: fabric_health_score >= 0 and fabric_health_score < 85
    msg: "Fabric health score is {{ fabric_health_score }} (below major threshold 85)"

  - id: fabric_health_warning
    category: "Fabric Health"
    severity: WARNING
    suppress_if: [fabric_health_critical, fabric_health_major]
    when: fabric_health_score >= 0 and fabric_health_score < 100
    msg: "Fabric health score is {{ fabric_health_score }} (not fully healthy)"

  - id: tenant_health_critical
    category: "Tenant Health"
    severity: CRITICAL
    when: tenant_health_score >= 0 and tenant_health_score < 75
    msg: "Tenant health score is {{ tenant_health_score }} (below critical threshold 75)"

  - id: tenant_health_major
    category: "Tenant Health"
    severity: WARNING
    suppress_if: tenant_health_critical
    when: tenant_health_score >= 0 and tenant_health_score < 85
    msg: "Tenant health score is {{ tenant_health_score }} (below major threshold 85)"

  - id: tenant_health_warning
    category: "Tenant Health"
    severity: WARNING
    suppress_if: [tenant_health_critical, tenant_health_major]
    when: tenant_health_score >= 0 and tenant_health_score < 100
    msg: "Tenant health score is {{ tenant_health_score }} (not fully healthy)"

  - id: active_critical_faults
    category: "Faults"
    severity: CRITICAL
    when: critical_fault_count > 0
    msg: "{{ critical_fault_count }} active critical fault(s) on APIC"

  - id: active_major_faults
    category: "Faults"
    severity: WARNING
    when: major_fault_count > 0
    msg: "{{ major_fault_count }} active major fault(s) on APIC"

  - id: ospf_peers_down
    category: "Routing"
    severity: CRITICAL
    when: ospf_down_count > 0
    msg: "{{ ospf_down_count }} OSPF neighbor(s) not in 'full' adjacency"

  - id: link_utilization_critical_ingress
    category: "Link Utilization"
    severity: CRITICAL
    when: critical_ingress_util > 0
    msg: "{{ critical_ingress_util }} ingress interface(s) above 75% peak utilization"

  - id: link_utilization_critical_egress
    category: "Link Utilization"
    severity: CRITICAL
    when: critical_egress_util > 0
    msg: "{{ critical_egress_util }} egress interface(s) above 75% peak utilization"

  - id: link_utilization_warning_ingress
    category: "Link Utilization"
    severity: WARNING
    suppress_if: link_utilization_critical_ingress
    when: (ingress_high_util | length) > 0
    msg: "{{ ingress_high_util | length }} ingress interface(s) above 25% average utilization"

  - id: link_utilization_warning_egress
    category: "Link Utilization"
    severity: WARNING
    suppress_if: link_utilization_critical_egress
    when: (egress_high_util | length) > 0
    msg: "{{ egress_high_util | length }} egress interface(s) above 25% average utilization"

widgets:

  - type: stat-cards
    slug: aci_health_kpis
    name: "Fabric Overview"
    cards:
      - name: Site
        value: "{{ site_label }}"
      - name: Fabric Health
        value: "{{ fabric_health_score }}"
      - name: Tenant Health
        value: "{{ tenant_health_score }}"
      - name: Active Faults
        value: "{{ active_fault_count }}"
      - name: Critical Faults
        value: "{{ critical_fault_count }}"
      - name: OSPF Down
        value: "{{ ospf_down_count }}"

  - type: table
    name: "Active Faults"
    when: active_fault_count > 0
    rows: "{{ active_faults | sort(attribute='severity') }}"
    columns:
      - name: Severity
        value: "{{ severity }}"
        as: status-badge
      - name: Description
        value: "{{ descr }}"
      - name: Created
        value: "{{ created }}"
      - name: DN
        value: "{{ dn }}"

  - type: table
    name: "Recent Cleared Faults"
    when: (recent_cleared_faults | length) > 0
    rows: "{{ recent_cleared_faults }}"
    columns:
      - name: Severity
        value: "{{ severity }}"
        as: status-badge
      - name: Description
        value: "{{ descr }}"
      - name: Created
        value: "{{ created }}"
      - name: DN
        value: "{{ dn }}"

  - type: table
    name: "OSPF Neighbors Not in 'full' State"
    when: ospf_down_count > 0
    rows: "{{ ospf_down }}"
    columns:
      - name: Interface
        value: "{{ dn | regex_replace('^.*/(node-\\d+)/.*?\\[(.*?)\\]/.*$', 'leaf \\1 \\2') }}"
      - name: Peer IP
        value: "{{ peerIp }}"
      - name: State
        value: "{{ operSt }}"
        as: status-badge

  - type: table
    name: "High Ingress Utilization (> 25%)"
    when: (ingress_high_util | length) > 0
    rows: "{{ ingress_high_util }}"
    columns:
      - name: Interface
        value: "{{ interface_label }}"
      - name: Description
        value: "{{ description }}"
      - name: Avg Util %
        value: "{{ utilAvg | round | int }}"
      - name: Max Util %
        value: "{{ utilMax | round | int }}"
        as: status-badge
        style_rules:
          - when: utilMax > 75
            css_class: "sv-critical"

  - type: table
    name: "High Egress Utilization (> 25%)"
    when: (egress_high_util | length) > 0
    rows: "{{ egress_high_util }}"
    columns:
      - name: Interface
        value: "{{ interface_label }}"
      - name: Description
        value: "{{ description }}"
      - name: Avg Util %
        value: "{{ utilAvg | round | int }}"
      - name: Max Util %
        value: "{{ utilMax | round | int }}"
        as: status-badge
        style_rules:
          - when: utilMax > 75
            css_class: "sv-critical"
