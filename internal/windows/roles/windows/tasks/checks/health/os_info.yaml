---
# checks/health/os_info.yaml — OS version, hostname, domain, uptime

- name: "Health | OS Info | Gather system information"
  ansible.windows.win_powershell:
    script: |
      $os = Get-CimInstance Win32_OperatingSystem
      $cs = Get-CimInstance Win32_ComputerSystem
      @{
        hostname       = $env:COMPUTERNAME
        domain         = $cs.Domain
        domain_role    = $cs.DomainRole
        os_name        = $os.Caption
        os_version     = $os.Version
        os_build       = $os.BuildNumber
        os_arch        = $os.OSArchitecture
        install_date   = $os.InstallDate.ToString('o')
        last_boot      = $os.LastBootUpTime.ToString('o')
        uptime_hours   = [math]::Round(((Get-Date) - $os.LastBootUpTime).TotalHours, 1)
        system_type    = $cs.SystemType
        manufacturer   = $cs.Manufacturer
        model          = $cs.Model
      } | ConvertTo-Json -Compress
  register: _health_os_info_result
  changed_when: false

- name: "Health | OS Info | Stage results"
  ansible.builtin.set_fact:
    _health_os_info: "{{ _health_os_info_result.output[0] | from_json }}"
  changed_when: false
