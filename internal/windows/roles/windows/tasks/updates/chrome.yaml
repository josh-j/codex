---
# updates/chrome.yaml — Google Chrome update

- name: "Update Software | Chrome | Get current version and update"
  ansible.windows.win_powershell:
    script: |
      $result = @{ app = 'Chrome'; before = ''; after = ''; success = $false; message = '' }

      # Get current version
      $chromePath = "${env:ProgramFiles}\Google\Chrome\Application\chrome.exe"
      $chromePath86 = "${env:ProgramFiles(x86)}\Google\Chrome\Application\chrome.exe"
      $exe = if (Test-Path $chromePath) { $chromePath } elseif (Test-Path $chromePath86) { $chromePath86 } else { $null }

      if ($exe) {
        $result.before = (Get-Item $exe).VersionInfo.FileVersion
      } else {
        $result.message = 'Chrome not installed'
        $result | ConvertTo-Json -Compress
        return
      }

      # Kill Chrome processes
      Get-Process chrome -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
      Start-Sleep -Seconds 2

      # Download and run installer
      $installerUrl = 'https://dl.google.com/chrome/install/latest/chrome_installer.exe'
      $installerPath = Join-Path $env:TEMP 'chrome_installer.exe'
      try {
        [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
        Invoke-WebRequest -Uri $installerUrl -OutFile $installerPath -UseBasicParsing
        $proc = Start-Process $installerPath -ArgumentList '/silent /install' -Wait -PassThru -NoNewWindow
        Start-Sleep -Seconds 5
        $result.after = (Get-Item $exe).VersionInfo.FileVersion
        $result.success = ($proc.ExitCode -eq 0)
        $result.message = "Installer exit code: $($proc.ExitCode)"
      } catch {
        $result.message = "Error: $($_.Exception.Message)"
      } finally {
        Remove-Item $installerPath -Force -ErrorAction SilentlyContinue
      }
      $result | ConvertTo-Json -Compress
  register: _chrome_update_result
  changed_when: false

- name: "Update Software | Chrome | Stage result"
  ansible.builtin.set_fact:
    _update_software_results: "{{ _update_software_results | default([]) + [_chrome_update_result.output[0] | from_json] }}"
  changed_when: false
