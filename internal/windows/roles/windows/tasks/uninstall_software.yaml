---
# internal.windows.windows : tasks/uninstall_software.yaml
# Software uninstaller — Win32 apps, AppX packages, VC++ cleanup, winget removal.

- name: "Uninstall Software | Orchestrator"
  vars:
    _uninstall_failed: false
  block:
    # --- Win32 App Uninstall ---
    - name: "Uninstall Software | Win32 | Remove by name"
      ansible.windows.win_powershell:
        script: |
          param([string[]]$AppNames)
          $results = @()
          $paths = @(
            'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall\*',
            'HKLM:\SOFTWARE\WOW6432Node\Microsoft\Windows\CurrentVersion\Uninstall\*'
          )
          foreach ($name in $AppNames) {
            $apps = Get-ItemProperty $paths -ErrorAction SilentlyContinue |
              Where-Object { $_.DisplayName -like "*$name*" }
            foreach ($app in $apps) {
              $r = @{ name = $app.DisplayName; success = $false; message = '' }
              $uninstall = $app.UninstallString
              if ($uninstall) {
                try {
                  if ($uninstall -match 'msiexec') {
                    $guid = if ($uninstall -match '\{[A-F0-9-]+\}') { $Matches[0] } else { $null }
                    if ($guid) {
                      $proc = Start-Process 'msiexec.exe' -ArgumentList "/x $guid /qn /norestart" -Wait -PassThru -NoNewWindow
                      $r.success = ($proc.ExitCode -eq 0 -or $proc.ExitCode -eq 3010)
                      $r.message = "msiexec exit: $($proc.ExitCode)"
                    }
                  } else {
                    $proc = Start-Process cmd.exe -ArgumentList "/c `"$uninstall`" /S /silent /quiet" -Wait -PassThru -NoNewWindow
                    $r.success = ($proc.ExitCode -eq 0)
                    $r.message = "Uninstall exit: $($proc.ExitCode)"
                  }
                } catch {
                  $r.message = "Error: $($_.Exception.Message)"
                }
              } else {
                $r.message = 'No uninstall string found'
              }
              $results += $r
            }
          }
          @($results) | ConvertTo-Json -Compress
        parameters:
          AppNames: "{{ windows_uninstall_names }}"
      register: _uninstall_win32_result
      when: windows_uninstall_names | length > 0
      changed_when: false

    # --- AppX Removal ---
    - name: "Uninstall Software | AppX | Remove packages"
      ansible.windows.win_powershell:
        script: |
          param([string[]]$AppNames)
          $results = @()
          foreach ($name in $AppNames) {
            $pkgs = Get-AppxPackage -AllUsers -Name "*$name*" -ErrorAction SilentlyContinue
            foreach ($pkg in $pkgs) {
              $r = @{ name = $pkg.Name; version = $pkg.Version; success = $false; message = '' }
              try {
                Remove-AppxPackage -Package $pkg.PackageFullName -AllUsers -ErrorAction Stop
                $r.success = $true
                $r.message = 'Removed'
              } catch {
                $r.message = "Error: $($_.Exception.Message)"
              }
              $results += $r
            }
          }
          @($results) | ConvertTo-Json -Compress
        parameters:
          AppNames: "{{ windows_uninstall_names }}"
      register: _uninstall_appx_result
      when: windows_uninstall_appx | bool
      changed_when: false

    # --- VC++ Redistributable Cleanup ---
    - name: "Uninstall Software | VC++ | Remove old redistributables"
      ansible.windows.win_powershell:
        script: |
          $results = @()
          $paths = @(
            'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall\*',
            'HKLM:\SOFTWARE\WOW6432Node\Microsoft\Windows\CurrentVersion\Uninstall\*'
          )
          $vcApps = Get-ItemProperty $paths -ErrorAction SilentlyContinue |
            Where-Object { $_.DisplayName -match 'Microsoft Visual C\+\+.*Redistributable' } |
            Sort-Object DisplayName
          foreach ($app in $vcApps) {
            $r = @{ name = $app.DisplayName; success = $false; message = '' }
            # Keep latest version of each arch, remove older
            $uninstall = $app.UninstallString
            if ($uninstall -match '\{[A-F0-9-]+\}') {
              $guid = $Matches[0]
              try {
                $proc = Start-Process 'msiexec.exe' -ArgumentList "/x $guid /qn /norestart" -Wait -PassThru -NoNewWindow
                $r.success = ($proc.ExitCode -eq 0 -or $proc.ExitCode -eq 3010)
                $r.message = "msiexec exit: $($proc.ExitCode)"
              } catch {
                $r.message = "Error: $($_.Exception.Message)"
              }
            }
            $results += $r
          }
          @($results) | ConvertTo-Json -Compress
      register: _uninstall_vcredist_result
      when: windows_uninstall_vcredist_cleanup | bool
      changed_when: false

    # --- Winget Removal ---
    - name: "Uninstall Software | Winget | Remove packages"
      ansible.windows.win_powershell:
        script: |
          param([string[]]$PackageNames)
          $results = @()
          foreach ($pkg in $PackageNames) {
            $r = @{ name = $pkg; success = $false; message = '' }
            try {
              $proc = Start-Process 'winget' -ArgumentList "uninstall `"$pkg`" --silent --accept-source-agreements" -Wait -PassThru -NoNewWindow
              $r.success = ($proc.ExitCode -eq 0)
              $r.message = "winget exit: $($proc.ExitCode)"
            } catch {
              $r.message = "Error: $($_.Exception.Message)"
            }
            $results += $r
          }
          @($results) | ConvertTo-Json -Compress
        parameters:
          PackageNames: "{{ windows_uninstall_winget_names }}"
      register: _uninstall_winget_result
      when:
        - windows_uninstall_winget_remove | bool
        - windows_uninstall_winget_names | length > 0
      changed_when: false

  rescue:
    - name: "Uninstall Software | Mark failure"
      ansible.builtin.set_fact:
        _uninstall_failed: true
      changed_when: false

  always:
    - name: "Uninstall Software | Emit telemetry"
      ansible.builtin.set_stats:
        data:
          ncs_collect:
            platform: "windows"
            name: "uninstall_software"
            report_directory: "{{ ncs_config.report_directory | default('/srv/samba/reports') }}"
            payload:
              win32: "{{ _uninstall_win32_result.output[0] | default('[]') | from_json }}"
              appx: "{{ _uninstall_appx_result.output[0] | default('[]') | from_json }}"
              vcredist: "{{ _uninstall_vcredist_result.output[0] | default('[]') | from_json }}"
              winget: "{{ _uninstall_winget_result.output[0] | default('[]') | from_json }}"
              failed: "{{ _uninstall_failed | bool }}"
        per_host: true
      changed_when: false
