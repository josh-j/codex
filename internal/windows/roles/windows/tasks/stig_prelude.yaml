---
# internal.windows.windows : tasks/stig_prelude.yaml
# Phase 0 | Initialize — extracted from stig.yaml

- name: "Windows STIG | Phase 0 | Initialize state"
  ansible.builtin.set_fact:
    _stig_audit_ran: false
    _stig_run_failed: false
    _stig_active_phase: "{{ 'audit' if ((windows_stig_enable_audit | default(true) | bool) and not (windows_stig_enable_hardening | default(false) | bool)) else 'remediate' }}"
    audit_full_list: []
  changed_when: false

- name: "Windows STIG | Phase 0 | Determine run mode"
  ansible.builtin.set_fact:
    _stig_audit_only: >-
      {{ (windows_stig_enable_audit | default(true) | bool)
         and not (windows_stig_enable_hardening | default(false) | bool) }}
  changed_when: false

- name: "Windows STIG | Phase 0 | Register target context for ncs_collector"
  ansible.builtin.set_fact:
    _ncs_stig_target_host: "{{ inventory_hostname }}"
    _ncs_stig_target_type: "windows"
  tags:
    - always

- name: "Windows STIG | Phase 0 | Set phase hint for included tasks"
  ansible.builtin.set_fact:
    _stig_phase_hint: "{{ 'audit' if (_stig_audit_only | bool) else 'remediate' }}"
  changed_when: false
