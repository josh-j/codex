---
# internal.windows.windows : tasks/main.yaml

- name: "Windows | Dispatch"
  ansible.builtin.include_role:
    name: internal.core.dispatch
  vars:
    _ncs_role_label: Windows
    _ncs_task_root: "{{ role_path }}/tasks"
    _ncs_default_action: audit
    _ncs_dynamic_dispatch: true
    _ncs_pre_dispatch_facts:
      windows_audit_force_update: "{{ ncs_action | default('audit') == 'remediate' and ncs_operation | default('none') == 'patch' }}"
    _ncs_validations:
      - _ncs_requested_action in ['collect', 'audit', 'remediate', 'verify']
      - (_ncs_requested_profile == 'none') or (_ncs_requested_profile in ['stig', 'health'])
      - (_ncs_requested_operation == 'none') or (_ncs_requested_operation in ['ad_search', 'cleanup', 'kb_install', 'openssh', 'patch', 'registry_fix', 'remote_ops', 'scheduled_task', 'service', 'uninstall_software', 'update_software', 'vuln_scan', 'windows_update', 'winrm_enable'])
      - not (_ncs_requested_profile != 'none' and _ncs_requested_operation != 'none')
      - (_ncs_requested_profile != 'stig') or (_ncs_requested_action in ['audit', 'remediate', 'verify'])
      - (_ncs_requested_profile != 'health') or (_ncs_requested_action in ['audit', 'collect', 'verify'])
      - (_ncs_requested_operation not in ['ad_search', 'vuln_scan']) or (_ncs_requested_action in ['audit', 'verify'])
      - (_ncs_requested_operation not in ['cleanup', 'kb_install', 'openssh', 'patch', 'registry_fix', 'remote_ops', 'scheduled_task', 'service', 'uninstall_software', 'update_software', 'windows_update', 'winrm_enable']) or (_ncs_requested_action in ['remediate', 'verify'])
    _dispatch_map:
      stig: stig
      health: health
      patch: audit
      _default_: audit
