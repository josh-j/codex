---
# internal.windows.domain : ops/computer_search.yaml

- name: "Computer Search | Query AD computers"
  ansible.windows.win_powershell:
    script: |
      $params = @{ Filter = '{{ domain_search_filter | default("*") }}' }
      if ('{{ domain_search_base }}') { $params.SearchBase = '{{ domain_search_base }}' }
      Get-ADComputer @params -Properties OperatingSystem, OperatingSystemVersion, LastLogonDate, Enabled, IPv4Address, WhenCreated |
        Select-Object Name, OperatingSystem, OperatingSystemVersion, LastLogonDate, Enabled, IPv4Address, DistinguishedName, WhenCreated
  register: _ad_computers
  delegate_to: "{{ domain_dc_hostname }}"

- name: "Computer Search | Store results"
  ansible.builtin.set_fact:
    domain_computer_results: "{{ _ad_computers.output }}"
  changed_when: false

- name: "Computer Search | Display count"
  ansible.builtin.debug:
    msg: "Found {{ domain_computer_results | length }} computers"
