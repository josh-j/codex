---
# internal.windows.domain : ops/group_search.yaml

- name: "Group Search | Query AD groups"
  ansible.windows.win_powershell:
    script: |
      $params = @{ Filter = '{{ domain_search_filter | default("*") }}' }
      if ('{{ domain_search_base }}') { $params.SearchBase = '{{ domain_search_base }}' }
      Get-ADGroup @params -Properties Description, GroupScope, GroupCategory, MemberOf, WhenCreated |
        Select-Object Name, Description, GroupScope, GroupCategory, DistinguishedName, WhenCreated
  register: _ad_groups
  delegate_to: "{{ domain_dc_hostname }}"

- name: "Group Search | Store results"
  ansible.builtin.set_fact:
    domain_group_results: "{{ _ad_groups.output }}"
  changed_when: false

- name: "Group Search | Display count"
  ansible.builtin.debug:
    msg: "Found {{ domain_group_results | length }} groups"
