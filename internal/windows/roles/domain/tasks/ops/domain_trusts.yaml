---
# internal.windows.domain : ops/domain_trusts.yaml

- name: "Domain Trusts | Query trust relationships"
  ansible.windows.win_powershell:
    script: |
      Get-ADTrust -Filter * | Select-Object Name, Direction, TrustType,
        DisallowTransivity, SelectiveAuthentication, IntraForest,
        ForestTransitive, Source, Target
  register: _ad_trusts

- name: "Domain Trusts | Store results"
  ansible.builtin.set_fact:
    domain_trust_results: "{{ _ad_trusts.output }}"
  changed_when: false

- name: "Domain Trusts | Display count"
  ansible.builtin.debug:
    msg: "Found {{ domain_trust_results | length }} domain trusts"
