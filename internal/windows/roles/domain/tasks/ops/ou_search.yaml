---
# internal.windows.domain : ops/ou_search.yaml

- name: "OU Search | Query organizational units"
  ansible.windows.win_powershell:
    script: |
      $params = @{ Filter = '{{ domain_search_filter | default("*") }}' }
      if ('{{ domain_search_base }}') { $params.SearchBase = '{{ domain_search_base }}' }
      Get-ADOrganizationalUnit @params -Properties Description, WhenCreated |
        Select-Object Name, Description, DistinguishedName, WhenCreated
  register: _ad_ous
  delegate_to: "{{ domain_dc_hostname }}"

- name: "OU Search | Store results"
  ansible.builtin.set_fact:
    domain_ou_results: "{{ _ad_ous.output }}"
  changed_when: false

- name: "OU Search | Display count"
  ansible.builtin.debug:
    msg: "Found {{ domain_ou_results | length }} OUs"
