---
# internal.windows.domain : ops/password_policy.yaml

- name: "Password Policy | Query default domain password policy"
  ansible.windows.win_powershell:
    script: |
      $policy = Get-ADDefaultDomainPasswordPolicy
      $fineGrained = Get-ADFineGrainedPasswordPolicy -Filter * |
        Select-Object Name, Precedence, MinPasswordLength, MaxPasswordAge,
                      LockoutThreshold, LockoutDuration, LockoutObservationWindow,
                      ComplexityEnabled, ReversibleEncryptionEnabled, AppliesTo
      @{
        default_policy = @{
          min_password_length       = $policy.MinPasswordLength
          max_password_age_days     = $policy.MaxPasswordAge.Days
          min_password_age_days     = $policy.MinPasswordAge.Days
          password_history_count    = $policy.PasswordHistoryCount
          complexity_enabled        = $policy.ComplexityEnabled
          reversible_encryption     = $policy.ReversibleEncryptionEnabled
          lockout_threshold         = $policy.LockoutThreshold
          lockout_duration_minutes  = $policy.LockoutDuration.TotalMinutes
          lockout_window_minutes    = $policy.LockoutObservationWindow.TotalMinutes
        }
        fine_grained_policies = $fineGrained
      }
  register: _ad_password_policy
  delegate_to: "{{ domain_dc_hostname }}"

- name: "Password Policy | Store results"
  ansible.builtin.set_fact:
    domain_password_policy: "{{ _ad_password_policy.output[0] }}"
  changed_when: false
