---
# updates/edge.yaml — Microsoft Edge update

- name: "Update Software | Edge | Get current version and update"
  ansible.windows.win_powershell:
    script: |
      $result = @{ app = 'Edge'; before = ''; after = ''; success = $false; message = '' }

      $edgePath = "${env:ProgramFiles(x86)}\Microsoft\Edge\Application\msedge.exe"
      if (-not (Test-Path $edgePath)) {
        $edgePath = "${env:ProgramFiles}\Microsoft\Edge\Application\msedge.exe"
      }

      if (Test-Path $edgePath) {
        $result.before = (Get-Item $edgePath).VersionInfo.FileVersion
      } else {
        $result.message = 'Edge not installed'
        $result | ConvertTo-Json -Compress
        return
      }

      # Kill Edge processes
      Get-Process msedge -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
      Start-Sleep -Seconds 2

      # Trigger Edge self-update via MicrosoftEdgeUpdate.exe
      $updateExe = "${env:ProgramFiles(x86)}\Microsoft\EdgeUpdate\MicrosoftEdgeUpdate.exe"
      if (Test-Path $updateExe) {
        try {
          $proc = Start-Process $updateExe -ArgumentList '/silent /install appguid={56EB18F8-B008-4CBD-B6D2-8C97FE7E9062}&appname=Microsoft%20Edge&needsadmin=True' -Wait -PassThru -NoNewWindow
          Start-Sleep -Seconds 10
          $result.after = (Get-Item $edgePath).VersionInfo.FileVersion
          $result.success = ($proc.ExitCode -eq 0)
          $result.message = "EdgeUpdate exit code: $($proc.ExitCode)"
        } catch {
          $result.message = "Error: $($_.Exception.Message)"
        }
      } else {
        $result.message = 'EdgeUpdate.exe not found'
      }
      $result | ConvertTo-Json -Compress
  register: _edge_update_result
  changed_when: false

- name: "Update Software | Edge | Stage result"
  ansible.builtin.set_fact:
    _update_software_results: "{{ _update_software_results | default([]) + [_edge_update_result.output[0] | from_json] }}"
  changed_when: false
