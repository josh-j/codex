---
# internal.windows.server : tasks/winrm_enable.yaml
# Enable WinRM on targets — test first, fall back to CIM/DCOM scheduled task.

- name: "WinRM Enable | Test current WinRM state"
  ansible.windows.win_powershell:
    script: |
      $result = @{ winrm_active = $false; message = '' }
      try {
        $test = Test-WSMan -ComputerName localhost -ErrorAction Stop
        $result.winrm_active = $true
        $result.message = 'WinRM already active'
      } catch {
        $result.message = $_.Exception.Message
      }
      $result | ConvertTo-Json -Compress
  register: _winrm_test_result
  changed_when: false
  ignore_errors: true

- name: "WinRM Enable | Configure WinRM via PowerShell"
  ansible.windows.win_powershell:
    script: |
      $result = @{ success = $false; steps = @(); message = '' }

      try {
        # Enable WinRM service
        Set-Service WinRM -StartupType Automatic -ErrorAction Stop
        Start-Service WinRM -ErrorAction Stop
        $result.steps += 'Service started'

        # Configure WinRM
        winrm quickconfig -force 2>&1 | Out-Null
        $result.steps += 'quickconfig applied'

        # Set up HTTPS listener if cert available, otherwise HTTP
        $listeners = winrm enumerate winrm/config/Listener 2>&1
        if ($listeners -notmatch 'Transport = HTTP') {
          winrm create winrm/config/Listener?Address=*+Transport=HTTP 2>&1 | Out-Null
          $result.steps += 'HTTP listener created'
        }

        # Configure firewall
        $rule = Get-NetFirewallRule -Name 'WINRM-HTTP-In-TCP' -ErrorAction SilentlyContinue
        if (-not $rule) {
          New-NetFirewallRule -Name 'WINRM-HTTP-In-TCP' -DisplayName 'WinRM HTTP' `
            -Direction Inbound -Protocol TCP -LocalPort 5985 -Action Allow -ErrorAction Stop
          $result.steps += 'Firewall rule created'
        } elseif (-not $rule.Enabled) {
          Enable-NetFirewallRule -Name 'WINRM-HTTP-In-TCP'
          $result.steps += 'Firewall rule enabled'
        }

        # Increase MaxEnvelopeSizekb for large payloads
        winrm set winrm/config '@{MaxEnvelopeSizekb="8192"}' 2>&1 | Out-Null
        $result.steps += 'MaxEnvelopeSize set to 8192kb'

        # Verify
        $test = Test-WSMan -ComputerName localhost -ErrorAction Stop
        $result.success = $true
        $result.message = 'WinRM configured successfully'
      } catch {
        $result.message = "Error: $($_.Exception.Message)"
      }
      $result | ConvertTo-Json -Compress
  register: _winrm_enable_result
  when: >-
    windows_winrm_enable_force | bool
    or (_winrm_test_result is failed)
    or (not (_winrm_test_result.output[0] | from_json).winrm_active | default(false))
  changed_when: false

- name: "WinRM Enable | Emit telemetry"
  ansible.builtin.set_stats:
    data:
      ncs_collect:
        platform: "windows"
        name: "winrm_enable"
        report_directory: "{{ ncs_config.report_directory | default('/srv/samba/reports') }}"
        payload:
          test: "{{ _winrm_test_result.output[0] | default('{}') | from_json }}"
          enable: "{{ _winrm_enable_result.output[0] | default('{}') | from_json }}"
    per_host: true
  changed_when: false
