---
# internal.windows.server : tasks/kb_install.yaml
# KB detection (3 methods) and installation via DISM.

- name: "KB Install | Validate input"
  ansible.builtin.assert:
    that:
      - windows_kb_list | length > 0
    fail_msg: "windows_kb_list must contain comma-separated KB numbers (e.g., 'KB5034441,KB5034439')"

- name: "KB Install | Detect installed KBs (3-method check)"
  ansible.windows.win_powershell:
    script: |
      param([string]$KBList)
      $kbs = $KBList -split ',' | ForEach-Object { $_.Trim().ToUpper() }
      $results = @()

      foreach ($kb in $kbs) {
        $kbNum = $kb -replace '^KB', ''
        $found = $false
        $method = 'none'

        # Method 1: Get-HotFix
        if (-not $found) {
          $hf = Get-HotFix -Id "KB$kbNum" -ErrorAction SilentlyContinue
          if ($hf) { $found = $true; $method = 'Get-HotFix' }
        }

        # Method 2: CBS Registry packages
        if (-not $found) {
          $cbsPath = 'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Component Based Servicing\Packages'
          $match = Get-ChildItem $cbsPath -ErrorAction SilentlyContinue |
            Where-Object { $_.PSChildName -match "KB$kbNum" }
          if ($match) { $found = $true; $method = 'CBS Registry' }
        }

        # Method 3: Windows Update COM history
        if (-not $found) {
          try {
            $session = New-Object -ComObject Microsoft.Update.Session
            $searcher = $session.CreateUpdateSearcher()
            $count = $searcher.GetTotalHistoryCount()
            if ($count -gt 0) {
              $history = $searcher.QueryHistory(0, [math]::Min($count, 500))
              $match = $history | Where-Object { $_.Title -match "KB$kbNum" }
              if ($match) { $found = $true; $method = 'WU COM History' }
            }
          } catch {}
        }

        $results += @{
          kb        = "KB$kbNum"
          installed = $found
          method    = $method
        }
      }
      @($results) | ConvertTo-Json -Compress
    parameters:
      KBList: "{{ windows_kb_list }}"
  register: _kb_detect_result
  changed_when: false

- name: "KB Install | Stage detection results"
  ansible.builtin.set_fact:
    _kb_detection: "{{ _kb_detect_result.output[0] | from_json | default([]) }}"
  changed_when: false

- name: "KB Install | Install missing KBs via DISM"
  ansible.windows.win_powershell:
    script: |
      param([string]$KB, [string]$SourcePath)
      $kbNum = $KB -replace '^KB', ''
      $result = @{ kb = $KB; action = 'install'; success = $false; message = '' }

      # Search for .msu or .cab in source path
      $installer = $null
      if ($SourcePath -and (Test-Path $SourcePath)) {
        $installer = Get-ChildItem -Path $SourcePath -Filter "*$kbNum*" -Recurse -File |
          Where-Object { $_.Extension -in '.msu', '.cab' } | Select-Object -First 1
      }

      if ($installer) {
        $ext = $installer.Extension
        if ($ext -eq '.msu') {
          $proc = Start-Process 'wusa.exe' -ArgumentList "`"$($installer.FullName)`" /quiet /norestart" -Wait -PassThru -NoNewWindow
          $result.success = ($proc.ExitCode -eq 0 -or $proc.ExitCode -eq 3010)
          $result.message = "WUSA exit code: $($proc.ExitCode)"
        } else {
          $proc = Start-Process 'dism.exe' -ArgumentList "/Online /Add-Package /PackagePath:`"$($installer.FullName)`" /Quiet /NoRestart" -Wait -PassThru -NoNewWindow
          $result.success = ($proc.ExitCode -eq 0 -or $proc.ExitCode -eq 3010)
          $result.message = "DISM exit code: $($proc.ExitCode)"
        }
      } else {
        # Try Windows Update COM API
        try {
          $session = New-Object -ComObject Microsoft.Update.Session
          $searcher = $session.CreateUpdateSearcher()
          $search = $searcher.Search("IsInstalled=0")
          $target = $search.Updates | Where-Object { $_.Title -match "KB$kbNum" }
          if ($target) {
            $dl = New-Object -ComObject Microsoft.Update.UpdateDownloader
            $dl.Updates = New-Object -ComObject Microsoft.Update.UpdateColl
            $dl.Updates.Add($target) | Out-Null
            $dl.Download() | Out-Null

            $inst = New-Object -ComObject Microsoft.Update.UpdateInstaller
            $inst.Updates = $dl.Updates
            $instResult = $inst.Install()
            $result.success = ($instResult.ResultCode -le 2)
            $result.message = "WU COM install result: $($instResult.ResultCode)"
          } else {
            $result.message = "KB not found in WU catalog or local source"
          }
        } catch {
          $result.message = "Error: $($_.Exception.Message)"
        }
      }
      $result | ConvertTo-Json -Compress
    parameters:
      KB: "{{ item.kb }}"
      SourcePath: "{{ windows_kb_source_path }}"
  loop: "{{ _kb_detection | selectattr('installed', 'equalto', false) | list }}"
  loop_control:
    label: "{{ item.kb }}"
  when: windows_kb_install | bool
  register: _kb_install_results

- name: "KB Install | Emit telemetry"
  ansible.builtin.set_stats:
    data:
      ncs_collect:
        platform: "windows"
        name: "kb_install"
        report_directory: "{{ ncs_config.report_directory | default('/srv/samba/reports') }}"
        payload:
          detection: "{{ _kb_detection }}"
          install_results: "{{ _kb_install_results.results | default([]) | map(attribute='output') | list }}"
          install_attempted: "{{ windows_kb_install | bool }}"
    per_host: true
  changed_when: false
