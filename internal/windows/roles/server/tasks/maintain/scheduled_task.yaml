---
# internal.windows.server : tasks/scheduled_task.yaml
# Remote scheduled task management — list, run, enable, disable, delete.

- name: "Scheduled Task | List tasks"
  ansible.windows.win_powershell:
    script: |
      param([string]$TaskPath)
      $tasks = Get-ScheduledTask -TaskPath "$TaskPath*" -ErrorAction SilentlyContinue |
        Select-Object TaskName, TaskPath,
          @{N='State';E={[string]$_.State}},
          @{N='LastRunTime';E={$_.LastRunTime.ToString('o')}},
          @{N='LastResult';E={$_.LastTaskResult}},
          @{N='NextRunTime';E={$_.NextRunTime.ToString('o')}},
          Author, Description
      @($tasks) | ConvertTo-Json -Compress
    parameters:
      TaskPath: "{{ windows_task_path }}"
  register: _task_list_result
  when: windows_task_action == 'list'
  changed_when: false

- name: "Scheduled Task | Run task"
  ansible.windows.win_powershell:
    script: |
      param([string]$TaskName, [string]$TaskPath)
      Start-ScheduledTask -TaskName $TaskName -TaskPath $TaskPath -ErrorAction Stop
      @{ task = $TaskName; action = 'run'; success = $true } | ConvertTo-Json -Compress
    parameters:
      TaskName: "{{ windows_task_name }}"
      TaskPath: "{{ windows_task_path }}"
  register: _task_run_result
  when: windows_task_action == 'run'

- name: "Scheduled Task | Enable task"
  ansible.windows.win_powershell:
    script: |
      param([string]$TaskName, [string]$TaskPath)
      Enable-ScheduledTask -TaskName $TaskName -TaskPath $TaskPath -ErrorAction Stop
      @{ task = $TaskName; action = 'enable'; success = $true } | ConvertTo-Json -Compress
    parameters:
      TaskName: "{{ windows_task_name }}"
      TaskPath: "{{ windows_task_path }}"
  register: _task_enable_result
  when: windows_task_action == 'enable'

- name: "Scheduled Task | Disable task"
  ansible.windows.win_powershell:
    script: |
      param([string]$TaskName, [string]$TaskPath)
      Disable-ScheduledTask -TaskName $TaskName -TaskPath $TaskPath -ErrorAction Stop
      @{ task = $TaskName; action = 'disable'; success = $true } | ConvertTo-Json -Compress
    parameters:
      TaskName: "{{ windows_task_name }}"
      TaskPath: "{{ windows_task_path }}"
  register: _task_disable_result
  when: windows_task_action == 'disable'

- name: "Scheduled Task | Delete task"
  ansible.windows.win_powershell:
    script: |
      param([string]$TaskName, [string]$TaskPath)
      Unregister-ScheduledTask -TaskName $TaskName -TaskPath $TaskPath -Confirm:$false -ErrorAction Stop
      @{ task = $TaskName; action = 'delete'; success = $true } | ConvertTo-Json -Compress
    parameters:
      TaskName: "{{ windows_task_name }}"
      TaskPath: "{{ windows_task_path }}"
  register: _task_delete_result
  when: windows_task_action == 'delete'

- name: "Scheduled Task | Emit telemetry"
  ansible.builtin.set_stats:
    data:
      ncs_collect:
        platform: "windows"
        name: "scheduled_task"
        report_directory: "{{ ncs_config.report_directory | default('/srv/samba/reports') }}"
        payload:
          action: "{{ windows_task_action }}"
          task_name: "{{ windows_task_name }}"
          list: "{{ _task_list_result.output[0] | default('[]') | from_json }}"
    per_host: true
  changed_when: false
