---
# checks/health/memory_cpu.yaml — Memory/CPU utilization

- name: "Health | Memory/CPU | Gather utilization"
  ansible.windows.win_powershell:
    script: |
      $os = Get-CimInstance Win32_OperatingSystem
      $cpu = Get-CimInstance Win32_Processor | Select-Object -First 1
      $cs = Get-CimInstance Win32_ComputerSystem
      $totalMemGB = [math]::Round($cs.TotalPhysicalMemory / 1GB, 2)
      $freeMemGB = [math]::Round($os.FreePhysicalMemory / 1MB, 2)
      $usedMemPct = [math]::Round((($totalMemGB - $freeMemGB) / $totalMemGB) * 100, 1)
      @{
        cpu_name          = $cpu.Name.Trim()
        cpu_cores         = $cpu.NumberOfCores
        cpu_logical       = $cpu.NumberOfLogicalProcessors
        cpu_load_pct      = $cpu.LoadPercentage
        memory_total_gb   = $totalMemGB
        memory_free_gb    = $freeMemGB
        memory_used_pct   = $usedMemPct
      } | ConvertTo-Json -Compress
  register: _health_memcpu_result
  changed_when: false

- name: "Health | Memory/CPU | Stage results"
  ansible.builtin.set_fact:
    _health_memory_cpu: "{{ _health_memcpu_result.output[0] | from_json }}"
  changed_when: false
