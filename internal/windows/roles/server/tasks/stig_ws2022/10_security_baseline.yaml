---
# internal.windows.server : tasks/stig_ws2022/10_security_baseline.yaml
# Per-rule Windows Server 2022 STIG baseline checks using internal.core.stig.

# ── Registry-based rules ────────────────────────────────────────────────────

- name: "stigrule_000001"
  internal.core.stig:
    _stig_apply: ansible.windows.win_regedit
    _stig_validate_expr:
      - var: _ws2022_rdp_nla
        equals: "{{ stig_ws2022_stigrule_000001_rdp_nla_value }}"
    path: 'HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp'
    name: UserAuthentication
    data: "{{ stig_ws2022_stigrule_000001_rdp_nla_value }}"
    type: dword

- name: "stigrule_000009"
  internal.core.stig:
    _stig_apply: ansible.windows.win_regedit
    _stig_validate_expr:
      - var: _ws2022_uac_filter_admin
        equals: "{{ stig_ws2022_stigrule_000009_uac_filter_admin_value }}"
    path: 'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System'
    name: FilterAdministratorToken
    data: "{{ stig_ws2022_stigrule_000009_uac_filter_admin_value }}"
    type: dword

# ── Shell-remediation rules ─────────────────────────────────────────────────

- name: "stigrule_000002"
  internal.core.stig:
    _stig_validate_expr:
      - var: _ws2022_firewall_disabled_profiles
        equals: ""
    cmd: |
      Get-NetFirewallProfile | Where-Object { -not $_.Enabled } | ForEach-Object {
        Set-NetFirewallProfile -Profile $_.Name -Enabled True
      }

- name: "stigrule_000007"
  internal.core.stig:
    _stig_validate_expr:
      - var: _ws2022_winrm_allow_unencrypted
        equals: "false"
    cmd: "winrm set winrm/config/service '@{AllowUnencrypted=\"false\"}'"
    _stig_notify: [winrm_restart]

- name: "stigrule_000008"
  internal.core.stig:
    _stig_validate_expr:
      - var: _ws2022_winrm_basic_auth
        equals: "false"
    cmd: "winrm set winrm/config/service/auth '@{Basic=\"false\"}'"
    _stig_notify: [winrm_restart]

# ── Module-based rules ──────────────────────────────────────────────────────

- name: "stigrule_000003"
  internal.core.stig:
    _stig_apply: ansible.windows.win_optional_feature
    _stig_validate_expr:
      - var: _ws2022_smb1_state
        contains: "Disabled"
    name: SMB1Protocol
    state: absent

- name: "stigrule_000004"
  internal.core.stig:
    _stig_apply: ansible.windows.win_user
    _stig_validate_expr:
      - var: _ws2022_guest_enabled
        equals: "false"
    name: Guest
    account_disabled: true

# ── Audit-only rules (no auto-remediation available) ────────────────────────

- name: "stigrule_000005"
  internal.core.stig:
    _stig_audit_only: true
    _stig_validate_expr:
      - var: _ws2022_password_complexity
        equals: "{{ stig_ws2022_stigrule_000005_password_complexity_value }}"

- name: "stigrule_000006"
  internal.core.stig:
    _stig_audit_only: true
    _stig_validate_expr:
      - var: _ws2022_defender_realtime
        equals: "true"

- name: "stigrule_000010"
  internal.core.stig:
    _stig_audit_only: true
    _stig_validate_expr:
      - var: _ws2022_audit_logon_setting
        contains: "Success"
      - var: _ws2022_audit_logon_setting
        contains: "Failure"
