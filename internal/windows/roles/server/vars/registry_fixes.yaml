---
# vars/registry_fixes.yaml
# Predefined registry-based CVE remediations.
# Each entry: id, title, cve, path, name, value, type, arch (32/64/both)

windows_registry_fix_catalog:
  - id: "REG-001"
    title: "Disable Print Spooler RCE (PrintNightmare)"
    cve: "CVE-2021-34527"
    path: 'HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Printers\PointAndPrint'
    name: "NoWarningNoElevationOnInstall"
    value: 0
    type: dword

  - id: "REG-002"
    title: "Disable Print Spooler RCE - RestrictDriverInstallationToAdministrators"
    cve: "CVE-2021-34527"
    path: 'HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Printers\PointAndPrint'
    name: "RestrictDriverInstallationToAdministrators"
    value: 1
    type: dword

  - id: "REG-003"
    title: "Disable MSDT Protocol Handler (Follina)"
    cve: "CVE-2022-30190"
    path: 'HKLM:\SOFTWARE\Policies\Microsoft\Windows\ScriptedDiagnostics'
    name: "EnableDiagnostics"
    value: 0
    type: dword

  - id: "REG-004"
    title: "Disable LLMNR"
    cve: "MITRE-T1557"
    path: 'HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\DNSClient'
    name: "EnableMulticast"
    value: 0
    type: dword

  - id: "REG-005"
    title: "Disable WPAD"
    cve: "MITRE-T1557"
    path: 'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Internet Settings\Wpad'
    name: "WpadOverride"
    value: 1
    type: dword

  - id: "REG-006"
    title: "Disable NetBIOS over TCP/IP"
    cve: "MITRE-T1557"
    path: 'HKLM:\SYSTEM\CurrentControlSet\Services\NetBT\Parameters'
    name: "NodeType"
    value: 2
    type: dword

  - id: "REG-007"
    title: "Disable SMB compression (SMBGhost)"
    cve: "CVE-2020-0796"
    path: 'HKLM:\SYSTEM\CurrentControlSet\Services\LanmanServer\Parameters'
    name: "DisableCompression"
    value: 1
    type: dword

  - id: "REG-008"
    title: "Enable LSA Protection"
    cve: "MITRE-T1003"
    path: 'HKLM:\SYSTEM\CurrentControlSet\Control\Lsa'
    name: "RunAsPPL"
    value: 1
    type: dword

  - id: "REG-009"
    title: "Disable WDigest credential caching"
    cve: "MITRE-T1003"
    path: 'HKLM:\SYSTEM\CurrentControlSet\Control\SecurityProviders\WDigest'
    name: "UseLogonCredential"
    value: 0
    type: dword

  - id: "REG-010"
    title: "Restrict NTLM authentication"
    cve: "MITRE-T1557"
    path: 'HKLM:\SYSTEM\CurrentControlSet\Control\Lsa\MSV1_0'
    name: "RestrictSendingNTLMTraffic"
    value: 2
    type: dword
