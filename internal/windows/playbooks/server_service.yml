---
# internal/windows/playbooks/server_service.yml
# Remote service management — list, start, stop, restart.

- name: "Windows | Service Management"
  hosts: "{{ windows_target_hosts | default('windows_servers') }}"
  gather_facts: false
  tags: [windows, service]
  roles:
    - role: internal.windows.server
      vars:
        ncs_action: remediate
        ncs_operation: service
