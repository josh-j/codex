---
# internal/windows/playbooks/server_registry_fix.yml
# Apply registry-based CVE remediations from predefined catalog.

- name: "Windows | Registry Fix (CVE Remediation)"
  hosts: "{{ windows_target_hosts | default('windows_servers') }}"
  gather_facts: false
  tags: [windows, registry, security, cve]
  roles:
    - role: internal.windows.server
      vars:
        ncs_action: remediate
        ncs_operation: registry_fix
