---
# internal/windows/playbooks/server_remote_ops.yml
# Quick remote operations: reboot, shutdown, logoff, gpupdate, message, uptime.

- name: "Windows | Remote Operations"
  hosts: "{{ windows_target_hosts | default('windows_servers') }}"
  gather_facts: false
  tags: [windows, remote_ops]
  roles:
    - role: internal.windows.server
      vars:
        ncs_action: remediate
        ncs_operation: remote_ops
