---
# collections/ansible_collections/internal/linux/roles/photon/defaults/main.yml
#
# SAFE DEFAULTS FOR VCSA PHOTON OS STIG
#
# These defaults are tuned for vCenter Server Appliance environments where
# availability and recoverability take priority over maximum hardening.
# Controls that can break vCenter services, lock out administrators, or
# render the appliance unrecoverable without VMware support are disabled
# by default and documented below.
#
# To enable a disabled control, override the variable in group_vars or
# host_vars after testing in a non-production environment.
#
# !!DO NOT EDIT THIS FILE!! Override values in inventory group_vars/host_vars.

# --- Actions ---
photon_action: discover

# --- Feature Flags ---
photon_skip_export: false
photon_stig_enable_audit: true
photon_stig_enable_hardening: false

# --- Runtime Defaults ---
ansible_is_chroot: false

# Create backups of files?
run_create_backups: true

############################################
# Auditd rules and service
############################################

# PHTN-50-000003 (+ 000019, 000031, 000076, 000078, 000107, 000173, 000175, 000204)
# Auditd rules template — safe, read-only audit configuration
photon_5_defaults_run_phtn_50_000003: true

# PHTN-50-000014 - Configure write_logs in auditd.conf
photon_5_defaults_run_phtn_50_000014: true

# PHTN-50-000016 - Ensure auditd is installed and running
photon_5_defaults_run_phtn_50_000016: true
photon_5_defaults_run_phtn_50_000016_auditd_install: true

# PHTN-50-000019 - Audit config file permissions (0640)
photon_5_defaults_run_phtn_50_000019: true

# PHTN-50-000021 - Auditd disk_full/disk_error/admin_space_left actions
photon_5_defaults_run_phtn_50_000021: true

# PHTN-50-000026 - Audit log file permissions (0600) and log_group
photon_5_defaults_run_phtn_50_000026: true

# PHTN-50-000030 - Audit config directory file permissions (0640)
photon_5_defaults_run_phtn_50_000030: true

# PHTN-50-000080 - Add audit=1 to grub kernel line
photon_5_defaults_run_phtn_50_000080: true

# PHTN-50-000082 - Audit tool binary permissions
photon_5_defaults_run_phtn_50_000082: true

# PHTN-50-000092 - Audit tool integrity (manual check, just prints debug msg)
photon_5_defaults_run_phtn_50_000092: true

# PHTN-50-000110 - Auditd num_logs and max_log_file_action
photon_5_defaults_run_phtn_50_000110: true

# PHTN-50-000112 - Auditd space_left and space_left_action
photon_5_defaults_run_phtn_50_000112: true

# PHTN-50-000186 - Auditd flush and freq settings
photon_5_defaults_run_phtn_50_000186: true

############################################
# PAM / Password policy
############################################

# PHTN-50-000004 - Faillock deny and fail_interval
photon_5_defaults_run_phtn_50_000004: true

# PHTN-50-000035 - pwquality ucredit (uppercase requirement)
photon_5_defaults_run_phtn_50_000035: true

# PHTN-50-000036 - pwquality lcredit (lowercase requirement)
photon_5_defaults_run_phtn_50_000036: true

# PHTN-50-000037 - pwquality dcredit (digit requirement)
photon_5_defaults_run_phtn_50_000037: true

# PHTN-50-000038 - pwquality difok (character difference from old password)
photon_5_defaults_run_phtn_50_000038: true

# PHTN-50-000039 - ENCRYPT_METHOD SHA512 in login.defs
photon_5_defaults_run_phtn_50_000039: true

# PHTN-50-000044 - pwquality minlen (minimum password length)
photon_5_defaults_run_phtn_50_000044: true

# PHTN-50-000059 - pam_unix.so sha512 in system-password
photon_5_defaults_run_phtn_50_000059: true

# PHTN-50-000086 - pwquality ocredit (special character requirement)
photon_5_defaults_run_phtn_50_000086: true

# PHTN-50-000108 - Faillock unlock_time
photon_5_defaults_run_phtn_50_000108: true

# PHTN-50-000184 - pwquality dictcheck
photon_5_defaults_run_phtn_50_000184: true

# PHTN-50-000192 - pam_faillock preauth/authfail in system-auth and system-account
photon_5_defaults_run_phtn_50_000192: true

# PHTN-50-000193 - Faillock silent mode
photon_5_defaults_run_phtn_50_000193: true

# PHTN-50-000194 - Faillock audit mode
photon_5_defaults_run_phtn_50_000194: true

# PHTN-50-000195 - Faillock even_deny_root
# DANGER: With unlock_time=0 (permanent lock), a brute force attempt or
# mistyped password will permanently lock the root account. On VCSA, root
# is your only emergency SSH access. A locked root account requires booting
# into single-user mode or VMware support intervention to recover.
# RECOMMENDATION: If you enable this, also change unlock_time to 900 (15 min)
# instead of 0 so locks are temporary.
photon_5_defaults_run_phtn_50_000195: false

# PHTN-50-000196 - Faillock directory configuration
photon_5_defaults_run_phtn_50_000196: true

# PHTN-50-000197 - pam_pwquality in system-password
photon_5_defaults_run_phtn_50_000197: true

# PHTN-50-000206 - pam_faildelay (4 second delay between login attempts)
photon_5_defaults_run_phtn_50_000206: true

# PHTN-50-000235 - pwquality enforce_for_root
photon_5_defaults_run_phtn_50_000235: true

# PHTN-50-000247 - Remove nullok from pam_unix.so
photon_5_defaults_run_phtn_50_000247: true

############################################
# SSH hardening
############################################

# PHTN-50-000005 - SSH banner configuration
photon_5_defaults_run_phtn_50_000005: true
# Set to true to deploy the DoD consent banner to /etc/issue
# Set to false to only configure the Banner directive without replacing the file
photon_5_defaults_run_phtn_50_000005_dod_banner: false

# PHTN-50-000069 - ClientAliveInterval
photon_5_defaults_run_phtn_50_000069: true

# PHTN-50-000079 - SSH Ciphers (run early before FIPS provider install)
photon_5_defaults_run_phtn_50_000079: true

# PHTN-50-000188 - HostbasedAuthentication no
photon_5_defaults_run_phtn_50_000188: true

# PHTN-50-000200 - SyslogFacility AUTHPRIV
photon_5_defaults_run_phtn_50_000200: true

# PHTN-50-000201 - LogLevel INFO
photon_5_defaults_run_phtn_50_000201: true

# PHTN-50-000203 - ClientAliveCountMax
photon_5_defaults_run_phtn_50_000203: true

# PHTN-50-000207 - PermitEmptyPasswords no
photon_5_defaults_run_phtn_50_000207: true

# PHTN-50-000208 - PermitUserEnvironment no
photon_5_defaults_run_phtn_50_000208: true

# PHTN-50-000209 - CREATE_HOME yes in login.defs
photon_5_defaults_run_phtn_50_000209: true

# PHTN-50-000211 - GSSAPIAuthentication no
photon_5_defaults_run_phtn_50_000211: true

# PHTN-50-000212 - X11Forwarding no
photon_5_defaults_run_phtn_50_000212: true

# PHTN-50-000213 - StrictModes yes
photon_5_defaults_run_phtn_50_000213: true

# PHTN-50-000214 - KerberosAuthentication no
photon_5_defaults_run_phtn_50_000214: true

# PHTN-50-000215 - Compression no
photon_5_defaults_run_phtn_50_000215: true

# PHTN-50-000216 - PrintLastLog yes
photon_5_defaults_run_phtn_50_000216: true

# PHTN-50-000217 - IgnoreRhosts yes
photon_5_defaults_run_phtn_50_000217: true

# PHTN-50-000218 - IgnoreUserKnownHosts yes
photon_5_defaults_run_phtn_50_000218: true

# PHTN-50-000219 - MaxAuthTries 6
photon_5_defaults_run_phtn_50_000219: true

# PHTN-50-000220 - AllowTcpForwarding no
photon_5_defaults_run_phtn_50_000220: true

# PHTN-50-000221 - LoginGraceTime 30
photon_5_defaults_run_phtn_50_000221: true

# PHTN-50-000239 - SSH MACs
photon_5_defaults_run_phtn_50_000239: true

############################################
# Sysctl / kernel hardening
############################################

# PHTN-50-000067 - kernel.dmesg_restrict = 1
photon_5_defaults_run_phtn_50_000067: true

# PHTN-50-000068 - net.ipv4.tcp_syncookies = 1
photon_5_defaults_run_phtn_50_000068: true

# PHTN-50-000105 - fs.protected_symlinks = 1
photon_5_defaults_run_phtn_50_000105: true

# PHTN-50-000160 - kernel.randomize_va_space = 2
photon_5_defaults_run_phtn_50_000160: true

# PHTN-50-000223 - Disable accept_source_route (ipv4 + ipv6)
photon_5_defaults_run_phtn_50_000223: true

# PHTN-50-000224 - icmp_echo_ignore_broadcasts = 1
photon_5_defaults_run_phtn_50_000224: true

# PHTN-50-000225 - Disable accept_redirects
photon_5_defaults_run_phtn_50_000225: true

# PHTN-50-000226 - Disable secure_redirects
photon_5_defaults_run_phtn_50_000226: true

# PHTN-50-000227 - Disable send_redirects
photon_5_defaults_run_phtn_50_000227: true

# PHTN-50-000228 - Enable log_martians
photon_5_defaults_run_phtn_50_000228: true

# PHTN-50-000229 - Enable rp_filter (reverse path filtering)
photon_5_defaults_run_phtn_50_000229: true

# PHTN-50-000231 - Disable ip_forward (skipped if container packages detected)
photon_5_defaults_run_phtn_50_000231: true

# PHTN-50-000232 - tcp_timestamps = 1
photon_5_defaults_run_phtn_50_000232: true

# PHTN-50-000244 - fs.protected_hardlinks = 1
photon_5_defaults_run_phtn_50_000244: true

# PHTN-50-000246 - fs.suid_dumpable = 0
photon_5_defaults_run_phtn_50_000246: true

############################################
# File permissions
############################################

# PHTN-50-000031 - Audit rules template (covered by 000003 block)
photon_5_defaults_run_phtn_50_000031: true

# PHTN-50-000073 - /var/log directory permissions (0755 root:root)
photon_5_defaults_run_phtn_50_000073: true

# PHTN-50-000074 - rsyslog umask
photon_5_defaults_run_phtn_50_000074: true

# PHTN-50-000076 - Covered by 000003 auditd rules block
photon_5_defaults_run_phtn_50_000076: true

# PHTN-50-000078 - Covered by 000003 auditd rules block
photon_5_defaults_run_phtn_50_000078: true

# PHTN-50-000085 - Remove world-write from /usr/lib files
# CAUTION: On a freshly deployed VCSA this is safe, but on a system with
# third-party agents that installed world-writable files under /usr/lib,
# removing write permissions could break those agents.
photon_5_defaults_run_phtn_50_000085: true

# PHTN-50-000093 - tmout.sh profile script (session timeout)
photon_5_defaults_run_phtn_50_000093: true

# PHTN-50-000107 - Covered by 000003 auditd rules block
photon_5_defaults_run_phtn_50_000107: true

# PHTN-50-000173 - Covered by 000003 auditd rules block
photon_5_defaults_run_phtn_50_000173: true

# PHTN-50-000175 - Covered by 000003 auditd rules block
photon_5_defaults_run_phtn_50_000175: true

# PHTN-50-000204 - Covered by 000003 auditd rules block
photon_5_defaults_run_phtn_50_000204: true

# PHTN-50-000233 - SSH public key file permissions (0644 root:root)
photon_5_defaults_run_phtn_50_000233: true

# PHTN-50-000234 - SSH private key file permissions (0600 root:root)
photon_5_defaults_run_phtn_50_000234: true

############################################
# Login / account settings
############################################

# PHTN-50-000007 - maxlogins hard limit in limits.conf
photon_5_defaults_run_phtn_50_000007: true

# PHTN-50-000041 - PASS_MIN_DAYS in login.defs
photon_5_defaults_run_phtn_50_000041: true

# PHTN-50-000042 - PASS_MAX_DAYS in login.defs
photon_5_defaults_run_phtn_50_000042: true

# PHTN-50-000185 - FAIL_DELAY in login.defs
photon_5_defaults_run_phtn_50_000185: true

# PHTN-50-000187 - UMASK 077 in login.defs
photon_5_defaults_run_phtn_50_000187: true

############################################
# Package management
############################################

# PHTN-50-000013 - Install OpenSSL FIPS provider
photon_5_defaults_run_phtn_50_000013: true

# PHTN-50-000040 - Remove telnet
photon_5_defaults_run_phtn_50_000040: true

# PHTN-50-000127 - Install AIDE
photon_5_defaults_run_phtn_50_000127: true

# PHTN-50-000130 - gpgcheck=1 in tdnf.conf
photon_5_defaults_run_phtn_50_000130: true

# PHTN-50-000133 - Sudo re-auth (manual check, just prints debug msg)
photon_5_defaults_run_phtn_50_000133: true

# PHTN-50-000161 - clean_requirements_on_remove in tdnf.conf
photon_5_defaults_run_phtn_50_000161: true

# PHTN-50-000199 - gpgcheck=1 in all yum repos
photon_5_defaults_run_phtn_50_000199: true

############################################
# Service configuration
############################################

# PHTN-50-000012 - rsyslog auth/authpriv logging
photon_5_defaults_run_phtn_50_000012: true

# PHTN-50-000210 - Disable debug-shell service
photon_5_defaults_run_phtn_50_000210: true

# PHTN-50-000222 - Mask ctrl-alt-del target
photon_5_defaults_run_phtn_50_000222: true

# PHTN-50-000236 - Clear FallbackDNS in resolved.conf
photon_5_defaults_run_phtn_50_000236: true

# PHTN-50-000241 - Install rsyslog
photon_5_defaults_run_phtn_50_000241: true

# PHTN-50-000242 - Enable and start rsyslog
photon_5_defaults_run_phtn_50_000242: true

############################################
# Kernel modules
############################################

# PHTN-50-000047 - Disable unnecessary kernel modules via modprobe.conf
# Disables: USB storage, bluetooth, cramfs, hfs, etc.
# NOTE: If you ever need USB storage for emergency log export or recovery
# media, this will block it. Safe for normal VCSA operations.
photon_5_defaults_run_phtn_50_000047: true

############################################
# Boot / GRUB
############################################

# PHTN-50-000046 - Require authentication for single-user mode (manual)
photon_5_defaults_run_phtn_50_000046: true

# PHTN-50-000049 - No duplicate UIDs (manual check, just prints debug msg)
photon_5_defaults_run_phtn_50_000049: true

# PHTN-50-000182 - FIPS mode (fips=1 in grub)
# DISABLED: Adding fips=1 to the kernel boot line on VCSA can break vCenter
# services that rely on non-FIPS cryptographic operations. VMware has specific
# FIPS enablement procedures that go beyond a grub flag — enabling this
# without following the full VMware FIPS configuration guide can render
# the appliance unable to start SSO, certificate services, or other critical
# components after reboot. Test thoroughly in a lab before enabling.
# See: https://docs.vmware.com/en/VMware-vSphere/7.0/com.vmware.vsphere.security.doc/
photon_5_defaults_run_phtn_50_000182: false

############################################
# AIDE (file integrity)
############################################

# PHTN-50-000237 - AIDE configuration and database initialization
# NOTE: AIDE init can take several minutes and consumes significant I/O.
# On production VCSA, schedule this during a maintenance window.
photon_5_defaults_run_phtn_50_000237: true

############################################
# /tmp mount hardening
############################################

# PHTN-50-000245 - Add nodev, noexec, nosuid to /tmp mount
photon_5_defaults_run_phtn_50_000245: true

############################################
# Auditd Configuration Values
############################################
photon_5_defaults_auditd_conf_disk_full_action: "SYSLOG"
photon_5_defaults_auditd_conf_disk_error_action: "SYSLOG"
photon_5_defaults_auditd_conf_admin_space_left_action: "SYSLOG"
photon_5_defaults_auditd_conf_max_log_file_action: "ROTATE"
photon_5_defaults_auditd_conf_num_logs: 5
photon_5_defaults_auditd_conf_space_left: 25%
photon_5_defaults_auditd_conf_space_left_action: "SYSLOG"
photon_5_defaults_auditd_conf_flush: "INCREMENTAL_ASYNC"
photon_5_defaults_auditd_conf_freq: 50

############################################
# PAM Configuration Values
############################################
## Set to false to configure pam_pwquality settings in system-password directly
photon_5_defaults_pam_use_pwquality_conf: true
photon_5_defaults_pam_faillock_deny: 3
photon_5_defaults_pam_faillock_fail_interval: 900
# IMPORTANT: unlock_time=0 means PERMANENT lock. If even_deny_root is enabled
# (000195), a locked root account requires single-user mode recovery.
# Recommend changing to 900 (15 minutes) if you enable even_deny_root.
photon_5_defaults_pam_faillock_unlock_time: 900
photon_5_defaults_pam_faillock_dir: "/var/log/faillock"
## requisite or required
photon_5_defaults_pam_pwquality_control: "requisite"
photon_5_defaults_pam_pwquality_ucredit: "-1"
photon_5_defaults_pam_pwquality_lcredit: "-1"
photon_5_defaults_pam_pwquality_dcredit: "-1"
photon_5_defaults_pam_pwquality_ocredit: "-1"
photon_5_defaults_pam_pwquality_difok: 8
photon_5_defaults_pam_pwquality_minlen: 15
photon_5_defaults_pam_pwquality_dictcheck: 1

############################################
# SSH Configuration Values
############################################
photon_5_defaults_sshd_ciphers: "aes256-gcm@openssh.com,aes128-gcm@openssh.com,aes256-ctr,aes192-ctr,aes128-ctr"
photon_5_defaults_sshd_clientaliveinterval: 900
photon_5_defaults_sshd_hostbasedauthentication: "no"
photon_5_defaults_sshd_syslogfacility: AUTHPRIV
photon_5_defaults_sshd_loglevel: INFO
photon_5_defaults_sshd_clientalivecountmax: 0
photon_5_defaults_sshd_permitemptypasswords: "no"
photon_5_defaults_sshd_permituserenvironment: "no"
photon_5_defaults_sshd_gssapiauthentication: "no"
photon_5_defaults_sshd_x11forwarding: "no"
photon_5_defaults_sshd_strictmodes: "yes"
photon_5_defaults_sshd_kerberosauthentication: "no"
photon_5_defaults_sshd_compression: "no"
photon_5_defaults_sshd_printlastlog: "yes"
photon_5_defaults_sshd_ignorerhosts: "yes"
photon_5_defaults_sshd_ignoreuserknownhosts: "yes"
photon_5_defaults_sshd_maxauthtries: 6
photon_5_defaults_sshd_allowtcpforwarding: "no"
photon_5_defaults_sshd_logingracetime: 30
photon_5_defaults_sshd_macs: "hmac-sha2-512,hmac-sha2-256"

############################################
# Rsyslog Configuration Values
############################################
photon_5_defaults_rsyslog_authpriv_log: "/var/log/messages"
photon_5_defaults_rsyslog_umask: "0037"

############################################
# Misc Configuration Values
############################################
photon_5_defaults_limits_maxlogins: 10
photon_5_defaults_login_defs_pass_min_days: 1
photon_5_defaults_login_defs_pass_max_days: 90
photon_5_defaults_login_defs_fail_delay: 4
photon_5_defaults_sysctl_fs_suid_dumpable: 0
