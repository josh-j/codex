---
# =============================================================================
# Auditd configuration — Photon OS 3.0 STIG
# =============================================================================

# --- PHTN-30-000001 - Audit rules template ---
# Template modules are action plugins and cannot be wrapped by internal.core.stig.
# Use phase-gated raw template (like Ubuntu banner pattern) + shell validator for audit.
- name: "stigrule_PHTN-30-000001"
  internal.core.stig:
    _stig_apply: ansible.builtin.shell
    _stig_use_check_mode_probe: false
    _stig_manage: "{{ run_auditd_rules }}"
    _stig_gate_packages: [audit]
    _stig_notify: [photon_reload_auditd]
    _stig_validate: ansible.builtin.shell
    _stig_validate_args:
      cmd: |
        set -eu
        [ -f {{ var_auditd_rule_file }} ]
        grep -cE '^\s*-[aw]' {{ var_auditd_rule_file }} | grep -qv '^0$'
    cmd: "true"

- name: "stigrule_PHTN-30-000001 - Deploy audit rules template"
  ansible.builtin.template:
    src: "{{ role_path }}/tasks/stig_photon3/templates/photon3/audit.STIG.rules"
    dest: '{{ var_auditd_rule_file }}'
    owner: root
    group: root
    mode: "0640"
  when:
    - run_auditd_rules | bool
    - "'audit' in (ansible_facts.packages | default({}))"
    - _photon3_stig_phase != 'audit'
  notify: photon_reload_auditd

# --- PHTN-30-000013 - Enable and start auditd ---
- name: "stigrule_PHTN-30-000013"
  internal.core.stig:
    _stig_apply: ansible.builtin.service
    _stig_manage: "{{ run_auditd_service_enable }}"
    _stig_gate_packages: [audit]
    name: auditd
    state: started
    enabled: true

# --- Auditd.conf lineinfile rules (flattened — no module_defaults block) ---
- name: "stigrule_PHTN-30-000010"
  internal.core.stig:
    _stig_apply: ansible.builtin.lineinfile
    _stig_manage: "{{ run_auditd_write_logs }}"
    _stig_gate_packages: [audit]
