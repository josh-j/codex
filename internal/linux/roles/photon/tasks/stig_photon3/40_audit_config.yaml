# GRUB / Boot
# =============================================================================

# --- PHTN-30-000031 - Grub password (manual check) ---
- name: "stigrule_PHTN-30-000031"
  internal.core.stig:
    _stig_apply: ansible.builtin.shell
    _stig_use_check_mode_probe: false
    _stig_manage: false
    cmd: "true"

# --- PHTN-30-000046 - audit=1 in grub ---
- name: "stigrule_PHTN-30-000046"
  internal.core.stig:
    _stig_apply: ansible.builtin.shell
    _stig_use_check_mode_probe: false
    _stig_manage: "{{ run_grub_enable_audit }}"
    _stig_validate: ansible.builtin.shell
    _stig_validate_args:
      cmd: |
        set -eu
        grep -qE 'audit=1' /proc/cmdline || grep -qE 'audit=1' {{ var_grub_conf_file }}
    cmd: |
      set -eu
      if [ -f /etc/default/grub ]; then
        if grep -qE '^GRUB_CMDLINE_LINUX=' /etc/default/grub; then
          if ! grep -qE 'audit=1' /etc/default/grub; then
            sed -i 's/^\(GRUB_CMDLINE_LINUX=".*\)"/\1 audit=1"/' /etc/default/grub
          fi
        else
          echo 'GRUB_CMDLINE_LINUX="audit=1"' >> /etc/default/grub
        fi
        grub2-mkconfig -o {{ var_grub_conf_file }} 2>/dev/null || true
      else
        # Photon 3 minimal — edit grub.cfg directly
        if ! grep -qE 'audit=1' {{ var_grub_conf_file }}; then
          sed -i 's|\(linux.*\)|\1 audit=1|' {{ var_grub_conf_file }}
        fi
      fi

# --- PHTN-30-000240 - Kernel FIPS mode (disabled by default) ---
- name: "stigrule_PHTN-30-000240"
  internal.core.stig:
    _stig_apply: ansible.builtin.shell
    _stig_use_check_mode_probe: false
    _stig_manage: "{{ run_kernel_fips }}"
    _stig_validate: ansible.builtin.shell
    _stig_validate_args:
      cmd: |
        set -eu
        grep -qE 'fips=1' {{ var_grub_conf_file }} || [ "$(cat /proc/sys/crypto/fips_enabled 2>/dev/null)" = "1" ]
    cmd: |
      set -eu
      if [ -f /etc/default/grub ]; then
        if ! grep -qE 'fips=1' /etc/default/grub; then
          sed -i 's/^\(GRUB_CMDLINE_LINUX=".*\)"/\1 fips=1"/' /etc/default/grub
          grub2-mkconfig -o {{ var_grub_conf_file }} 2>/dev/null || true
        fi
      fi
