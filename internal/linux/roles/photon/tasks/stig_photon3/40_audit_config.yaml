# --- PHTN-30-000012 - Audit account creation events ---
- name: "stigrule_PHTN-30-000012"
  internal.core.stig:
    _stig_apply: ansible.builtin.shell
    _stig_use_check_mode_probe: false
    _stig_audit_only: true
    _stig_manage: true
    _stig_gate_packages: [audit]
    _stig_validate: ansible.builtin.shell
    _stig_validate_args:
      cmd: |
        set -eu
        grep -qE '/etc/passwd' {{ var_auditd_rule_file }}
        grep -qE '/etc/shadow' {{ var_auditd_rule_file }}
        grep -qE '/etc/group' {{ var_auditd_rule_file }}
        grep -qE '/etc/gshadow' {{ var_auditd_rule_file }}
    _stig_skip_post_validate: true
    cmd: "true"

