---
# internal.linux.photon : defaults/stig.yaml
# Photon OS 3.0 STIG configuration defaults.

# Create backups of files?
run_create_backups: true

# =============================================================================
# Auditd rules and service
# =============================================================================

# PHTN-30-000001 (+ 000012, 000020, 000042-000045, 000056, 000067-000070)
# Auditd rules template — safe, configures audit rules file
run_auditd_rules: true

# PHTN-30-000010 - auditd write_logs = yes
run_auditd_write_logs: true

# PHTN-30-000011 - auditd log_format = RAW
run_auditd_log_format: true

# PHTN-30-000013 - Enable and start auditd service
run_auditd_service_enable: true

# PHTN-30-000014 - auditd space_left_action
run_auditd_space_left_action: true

# PHTN-30-000015 - auditd disk_full/disk_error/admin_space_left actions
run_auditd_disk_full_action: true
run_auditd_disk_error_action: true
run_auditd_admin_space_left_action: true

# PHTN-30-000016 - Audit log file permissions (0600)
run_audit_logs_permissions: true

# PHTN-30-000017 - Audit log file owner (root)
run_audit_logs_owner: true

# PHTN-30-000018 - Audit log file group (root)
run_audit_logs_group: true

# PHTN-30-000019 - Audit config file permissions (0640)
run_audit_config_permissions: true

# PHTN-30-000046 - Add audit=1 to grub kernel line
run_grub_enable_audit: true

# PHTN-30-000047 - auditd.conf file owner/group (root:root)
run_audit_conf_permissions: true

# PHTN-30-000048 - Audit tool binary permissions (0750)
run_audit_tools_permissions: true

# PHTN-30-000055 - auditd num_logs
run_auditd_num_logs: true

# PHTN-30-000056 - auditd max_log_file_action
run_auditd_max_log_file_action: true

# PHTN-30-000057 - auditd space_left
run_auditd_space_left: true

# PHTN-30-000074 - auditd flush and freq
run_auditd_flush: true
run_auditd_freq: true

# =============================================================================
# PAM / Password policy
# =============================================================================

# PHTN-30-000002 - pam_tally2 account lockout
# Configures deny count, unlock_time, even_deny_root, and root_unlock_time.
# The Photon 3 implementation uses pam_tally2 (not faillock like Photon 5).
# NOTE: even_deny_root is baked into the pam_tally2 arguments in the task
# file. If var_pamd_root_unlock_time is set too high or var_pamd_unlock_time
# is too long, you risk extended root lockout. Current defaults (900s / 300s)
# provide a reasonable balance.
run_pamd_lock: true

# PHTN-30-000021 - pam_cracklib ucredit (uppercase requirement)
run_pamd_upperchars: true

# PHTN-30-000022 - pam_cracklib lcredit (lowercase requirement)
run_pamd_lowerchars: true

# PHTN-30-000023 - pam_cracklib dcredit (digit requirement)
run_pamd_numchars: true

# PHTN-30-000024 - pam_cracklib difok (character difference)
run_pamd_diffchars: true

# PHTN-30-000025 - ENCRYPT_METHOD SHA512 in login.defs
run_login_encrypt_method: true

# PHTN-30-000029 - pam_pwhistory remember (password reuse prevention)
run_pamd_pwremember: true

# PHTN-30-000030 - pam_cracklib minlen (minimum password length)
run_pamd_minlength: true

# PHTN-30-000050 - pam_cracklib ocredit (special character requirement)
run_pamd_complexchars: true

# PHTN-30-000071 - pam_cracklib module presence (met by other controls)
run_pamd_cracklib: true

# PHTN-30-000073 - pam_faildelay (4 second delay between login attempts)
run_pamd_faildelay: true

# PHTN-30-000110 - pam_cracklib enforce_for_root
run_pamd_enforceforroot: true

# PHTN-30-000117 - pam_unix.so sha512 encryption
run_pamd_encryption: true

# PHTN-30-000118 - Create /etc/security/opasswd file
run_create_opasswd: true

# =============================================================================
# SSH hardening
# =============================================================================

# PHTN-30-000003 - SSH Banner directive
run_sshd_banner: true
# Set to true to deploy the DoD consent banner to /etc/issue
# Set to false to only configure the Banner directive without replacing the file
run_sshd_banner_issue: false

# PHTN-30-000006 - SyslogFacility AUTHPRIV
run_sshd_syslogfacility: true

# PHTN-30-000007 - rsyslog authpriv logging for SSH
run_sshd_rsyslog: true

# PHTN-30-000008 - LogLevel INFO
run_sshd_loglevel: true

# PHTN-30-000009 - FipsMode yes in sshd_config
# NOTE: This sets FipsMode in sshd_config only — it does NOT enable kernel
# FIPS (that's PHTN-30-000240). SSH FipsMode restricts sshd to FIPS-approved
# algorithms. Safe to enable as long as your SSH clients support FIPS ciphers.
run_sshd_fipsmode: true

# PHTN-30-000037 - ClientAliveInterval
run_sshd_clientaliveinterval: true

# PHTN-30-000038 - ClientAliveCountMax
run_sshd_clientalivecountmax: true

# PHTN-30-000064 - SSH Ciphers
run_sshd_ciphers: true

# PHTN-30-000078 - GSSAPIAuthentication no
run_sshd_gssapiauthentication: true

# PHTN-30-000079 - PermitUserEnvironment no
run_sshd_permituserenvironment: true

# PHTN-30-000080 - X11Forwarding no
run_sshd_x11forwarding: true

# PHTN-30-000081 - StrictModes yes
run_sshd_strictmodes: true

# PHTN-30-000082 - KerberosAuthentication no
run_sshd_kerberosauth: true

# PHTN-30-000083 - PermitEmptyPasswords no
run_sshd_permitemptypasswords: true

# PHTN-30-000084 - Compression no
run_sshd_compression: true

# PHTN-30-000085 - PrintLastLog yes
run_sshd_printlastlog: true

# PHTN-30-000086 - IgnoreRhosts yes
run_sshd_ignorerhosts: true

# PHTN-30-000087 - IgnoreUserKnownHosts yes
run_sshd_ignoreuserknownhosts: true

# PHTN-30-000088 - MaxAuthTries
run_sshd_maxauthtries: true

# PHTN-30-000115 - HostbasedAuthentication no
run_sshd_hostbasedauth: true

# PHTN-30-000119 - AllowTcpForwarding no
run_sshd_allowtcpforwarding: true

# PHTN-30-000120 - LoginGraceTime
run_sshd_logingracetime: true

# =============================================================================
# Sysctl / kernel hardening
# =============================================================================

# PHTN-30-000036 - net.ipv4.tcp_syncookies = 1
run_sysctl_tcp_syncookies: true

# PHTN-30-000065 - kernel.randomize_va_space = 2
run_sysctl_randomize_va_space: true

# PHTN-30-000098 - Disable accept_source_route (ipv4 + ipv6)
run_sysctl_net_ipv4_conf_all_accept_source_route: true
run_sysctl_net_ipv4_conf_default_accept_source_route: true
run_sysctl_net_ipv4_conf_eth0_accept_source_route: true
run_sysctl_net_ipv6_conf_all_accept_source_route: true
run_sysctl_net_ipv6_conf_default_accept_source_route: true
run_sysctl_net_ipv6_conf_eth0_accept_source_route: true

# PHTN-30-000099 - icmp_echo_ignore_broadcasts = 1
run_sysctl_net_ipv4_icmp_echo_ignore_broadcasts: true

# PHTN-30-000100 - Disable accept_redirects
run_sysctl_net_ipv4_conf_all_accept_redirects: true
run_sysctl_net_ipv4_conf_default_accept_redirects: true
run_sysctl_net_ipv4_conf_eth0_accept_redirects: true

# PHTN-30-000101 - Disable secure_redirects
run_sysctl_net_ipv4_conf_all_secure_redirects: true
run_sysctl_net_ipv4_conf_default_secure_redirects: true
run_sysctl_net_ipv4_conf_eth0_secure_redirects: true

# PHTN-30-000102 - Disable send_redirects
run_sysctl_net_ipv4_conf_all_send_redirects: true
run_sysctl_net_ipv4_conf_default_send_redirects: true
run_sysctl_net_ipv4_conf_eth0_send_redirects: true

# PHTN-30-000103 - Enable log_martians
run_sysctl_net_ipv4_conf_all_log_martians: true
run_sysctl_net_ipv4_conf_default_log_martians: true
run_sysctl_net_ipv4_conf_eth0_log_martians: true

# PHTN-30-000104 - Enable rp_filter (reverse path filtering)
run_sysctl_net_ipv4_conf_all_rp_filter: true
run_sysctl_net_ipv4_conf_default_rp_filter: true
run_sysctl_net_ipv4_conf_eth0_rp_filter: true

# PHTN-30-000105 - Disable multicast forwarding
run_sysctl_net_ipv4_conf_all_mc_forwarding: true
run_sysctl_net_ipv4_conf_default_mc_forwarding: true
run_sysctl_net_ipv4_conf_eth0_mc_forwarding: true
run_sysctl_net_ipv6_conf_all_mc_forwarding: true
run_sysctl_net_ipv6_conf_default_mc_forwarding: true
run_sysctl_net_ipv6_conf_eth0_mc_forwarding: true

# PHTN-30-000106 - Disable ip_forward
run_sysctl_net_ipv4_ip_forward: true

# PHTN-30-000107 - tcp_timestamps = 1
run_sysctl_tcp_timestamps: true

# =============================================================================
# File permissions
# =============================================================================

# PHTN-30-000040 - /var/log directory permissions (0755 root:root)
run_log_dir_permissions: true

# PHTN-30-000041 - /var/log/messages permissions (0640 root:root)
run_log_messages_permissions: true

# PHTN-30-000090 - /etc/skel file permissions
run_skel_config_permissions: true

# PHTN-30-000091 - /root directory permissions (0700)
run_root_dir_permissions: true

# PHTN-30-000092 - Init files permissions (/etc/bash.bashrc, /etc/profile, profile.d)
run_init_files_permissions: true

# PHTN-30-000093 - /etc/rc.d file permissions
run_rcd_files_permissions: true

# PHTN-30-000095 - /etc/cron.allow permissions (0600)
run_cron_allow_permissions: true

# PHTN-30-000096 - Cron job file permissions (0644)
run_cron_files_permissions: true

# PHTN-30-000097 - Cron directory permissions (0755)
run_cron_dir_permissions: true

# PHTN-30-000108 - SSH public key file permissions (0644 root:root)
run_ssh_pubkeys_permissions: true

# PHTN-30-000109 - SSH private key file permissions (0600 root:root)
run_ssh_prikeys_permissions: true

# PHTN-30-000111 - Boot config file permissions (o-w root:root)
run_boot_config_file_permissions: true

# PHTN-30-000112 - sshd_config permissions (0600 root:root)
run_ssh_config_file_permissions: true

# PHTN-30-000113 - Sysctl config file permissions (o-w root:root)
run_sysctl_file_permissions: true

# =============================================================================
# Login / account settings
# =============================================================================

# PHTN-30-000004 - maxlogins hard limit in limits.conf
run_limits_maxlogins: true

# PHTN-30-000005 - Create tmout.sh session timeout profile script
run_configure_tmout: true

# PHTN-30-000027 - PASS_MIN_DAYS in login.defs
run_login_pass_min_days: true

# PHTN-30-000028 - PASS_MAX_DAYS in login.defs
run_login_pass_max_days: true

# PHTN-30-000033 - Check for duplicate UIDs (audit-only)
run_duplicate_user_uids: true

# PHTN-30-000035 - INACTIVE=0 in /etc/default/useradd
run_useradd_inactive: true

# PHTN-30-000072 - FAIL_DELAY in login.defs
run_login_fail_delay: true

# PHTN-30-000075 - CREATE_HOME yes in login.defs
run_login_createhome: true

# PHTN-30-000094 - All files have valid owner and group (audit-only)
run_files_have_owner: true

# PHTN-30-000114 - UMASK 077 in login.defs
run_login_umask: true

# =============================================================================
# Kernel modules
# =============================================================================

# PHTN-30-000032 - Disable unnecessary kernel modules via modprobe.conf
run_disable_kernel_modules: true

# =============================================================================
# Package management
# =============================================================================

# PHTN-30-000059/000060 - Remove nosignature from rpmrc, gpgcheck in tdnf
run_tdnf_gpgcheck: true

# PHTN-30-000061 - gpgcheck=1 in all yum repos
run_yum_gpgcheck: true

# PHTN-30-000062 - Check for NOPASSWD in sudoers
run_sudo_nopasswd: true

# PHTN-30-000066 - clean_requirements_on_remove in tdnf.conf
run_tdnf_cleanreqs: true

# =============================================================================
# Service configuration
# =============================================================================

# PHTN-30-000076 - Stop and disable debug-shell service
run_service_debug_shell: true

# PHTN-30-000089 - Mask ctrl-alt-del target
run_mask_ctrl_alt_del: true

# =============================================================================
# Boot / GRUB
# =============================================================================

# PHTN-30-000031 - Grub password (manual)
run_grub_password: true

# --- PHTN-30-000240: Kernel FIPS mode (fips=1 in grub) ---
# DISABLED: Enabling kernel FIPS mode on the VCSA can break vCenter services
# that rely on non-FIPS cryptographic algorithms. Test thoroughly in a
# non-production environment before enabling.
run_kernel_fips: false

# =============================================================================
# DNS
# =============================================================================

# PHTN-30-000245 - Disable systemd-resolved fallback DNS
run_dns_fallback: true
