############################################
# V-256519 / PHTN-30-000074 - auditd flush and freq
############################################
- name: "PHTN-30-000074_query"
  ansible.builtin.shell: |
    set -o pipefail
    flush=$(grep -oP '^flush\s*=\s*\K\S+' {{ var_auditd_conf_file }} 2>/dev/null || echo "NOT_SET")
    freq=$(grep -oP '^freq\s*=\s*\K\S+' {{ var_auditd_conf_file }} 2>/dev/null || echo "NOT_SET")
    echo "${flush}|${freq}"
  register: _phtn74_flush
  changed_when: false
  failed_when: false
  tags: [PHTN-30-000074, V-256519, audit]

- name: "PHTN-30-000074_assert"
  vars:
    _flush_val: "{{ (_phtn74_flush.stdout | trim).split('|')[0] }}"
    _freq_val: "{{ (_phtn74_flush.stdout | trim).split('|')[1] | default('NOT_SET') }}"
  ansible.builtin.assert:
    that:
      - _flush_val == 'INCREMENTAL_ASYNC'
      - _freq_val != 'NOT_SET'
    fail_msg: "flush={{ _flush_val }}, freq={{ _freq_val }} (expected INCREMENTAL_ASYNC and a freq value)"
    success_msg: "flush={{ _flush_val }}, freq={{ _freq_val }}"
  ignore_errors: true
  tags: [PHTN-30-000074, V-256519, audit]

