############################################
# V-256540 / PHTN-30-000095 - /etc/cron.allow permissions
############################################
- name: "PHTN-30-000095_query"
  ansible.builtin.shell: |
    set -o pipefail
    if [ ! -f /etc/cron.allow ]; then
      echo "MISSING"
    else
      stat -c '%a %U %G' /etc/cron.allow
    fi
  register: _phtn95_cronallow
  changed_when: false
  failed_when: false
  tags: [PHTN-30-000095, V-256540, audit]

- name: "PHTN-30-000095_assert"
  vars:
    _perms: "{{ _phtn95_cronallow.stdout | trim }}"
    _mode: "{{ _perms.split()[0] | default('999') }}"
    _owner: "{{ _perms.split()[1] | default('unknown') }}"
    _group: "{{ _perms.split()[2] | default('unknown') }}"
  ansible.builtin.assert:
    that:
      - _perms != 'MISSING'
      - _owner == 'root'
      - _group == 'root'
      - (_mode | int) <= 600
    fail_msg: "/etc/cron.allow: {{ _perms }} (need mode<=0600, root:root)"
    success_msg: "/etc/cron.allow: mode={{ _mode }} owner={{ _owner }}:{{ _group }}"
  ignore_errors: true
  tags: [PHTN-30-000095, V-256540, audit]

