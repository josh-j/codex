---
# collections/ansible_collections/internal/linux/roles/photon/tasks/photon3_check.yaml
#
# PHOTON OS 3.0 STIG AUDIT CHECKS
#
# Each rule follows the pattern the ncs_collector callback expects:
#   1. A _query task (shell/command) that gathers data — collector ignores these
#   2. An _assert task that passes or fails — collector records the result
#
# Task naming convention:
#   "PHTN-30-XXXXXX_query"   → data gathering (skipped by collector)
#   "PHTN-30-XXXXXX_assert"  → compliance assertion (recorded by collector)
#
# The collector extracts the rule ID from the PHTN-30-XXXXXX prefix and
# maps pass/fail from the assert result.

############################################
# NCS Collector Context
############################################

- name: "Set NCS STIG target type to photon"
  ansible.builtin.set_fact:
    _ncs_stig_target_type: "photon"
  tags:
    - always

- name: "Set NCS STIG target host"
  ansible.builtin.set_fact:
    _ncs_stig_target_host: "{{ inventory_hostname }}"
  tags:
    - always

############################################
# V-256478 / PHTN-30-000033 - No duplicate UIDs
############################################
- name: "PHTN-30-000033_query"
  ansible.builtin.shell: |
    set -o pipefail
    awk -F: '{print $3}' /etc/passwd | sort -n | uniq -d
  register: _phtn33_dupes
  changed_when: false
  failed_when: false
  tags: [PHTN-30-000033, V-256478, audit]

- name: "PHTN-30-000033_assert"
  ansible.builtin.assert:
    that:
      - _phtn33_dupes.stdout | trim | length == 0
    fail_msg: "Duplicate UIDs found: {{ _phtn33_dupes.stdout | trim }}"
    success_msg: "No duplicate UIDs found"
  ignore_errors: true
  tags: [PHTN-30-000033, V-256478, audit]

############################################
# V-256484 / PHTN-30-000039 - Rsyslog remote logging
############################################
- name: "PHTN-30-000039_query"
  ansible.builtin.shell: |
    set -o pipefail
    grep -E '^\*\.\*\s+@@?' {{ var_syslog_conf_path }} 2>/dev/null || true
  register: _phtn39_syslog
  changed_when: false
  failed_when: false
  tags: [PHTN-30-000039, V-256484, audit]

- name: "PHTN-30-000039_assert"
  ansible.builtin.assert:
    that:
      - _phtn39_syslog.stdout | trim | length > 0
    fail_msg: >-
      No remote syslog target found in {{ var_syslog_conf_path }}.
      Note: If logging is configured via a different mechanism (e.g., vmware syslog),
      document as site-specific.
    success_msg: "Remote syslog configured: {{ _phtn39_syslog.stdout_lines | first | default('') }}"
  ignore_errors: true
  tags: [PHTN-30-000039, V-256484, audit]

############################################
# V-256489 / PHTN-30-000044 - Audit rules for privileged commands
############################################
- name: "PHTN-30-000044_query"
  ansible.builtin.shell: |
    set -o pipefail
    if [ -f {{ var_auditd_rule_file }} ]; then
      grep -cE '^\s*-[aw]' {{ var_auditd_rule_file }} 2>/dev/null || echo "0"
    else
      echo "0"
    fi
  register: _phtn44_rules
  changed_when: false
  failed_when: false
  tags: [PHTN-30-000044, V-256489, audit]

- name: "PHTN-30-000044_assert"
  ansible.builtin.assert:
    that:
      - (_phtn44_rules.stdout | trim | int) > 0
    fail_msg: "Audit rules file missing or empty"
    success_msg: "{{ _phtn44_rules.stdout | trim }} audit rules configured"
  ignore_errors: true
  tags: [PHTN-30-000044, V-256489, audit]

############################################
# V-256497 / PHTN-30-000052 - TMOUT in bashrc
############################################
- name: "PHTN-30-000052_query"
  ansible.builtin.shell: |
    set -o pipefail
    found=""
    val=$(grep -oP '^(export\s+)?TMOUT=\K\d+' {{ var_bashrc_file }} 2>/dev/null | head -1)
    if [ -n "$val" ]; then found="bashrc:$val"; fi
    val2=$(grep -oP '^(export\s+)?TMOUT=\K\d+' /etc/profile.d/tmout.sh 2>/dev/null | head -1)
    if [ -n "$val2" ]; then found="${found:+$found,}tmout.sh:$val2"; fi
    if [ -z "$found" ]; then echo "NOT_SET"; else echo "$found"; fi
  register: _phtn52_tmout
  changed_when: false
  failed_when: false
  tags: [PHTN-30-000052, V-256497, audit]

- name: "PHTN-30-000052_assert"
  ansible.builtin.assert:
    that:
      - _phtn52_tmout.stdout | trim != 'NOT_SET'
    fail_msg: "TMOUT not configured in bashrc or profile.d"
    success_msg: "TMOUT configured: {{ _phtn52_tmout.stdout | trim }}"
  ignore_errors: true
  tags: [PHTN-30-000052, V-256497, audit]

############################################
# V-256513 / PHTN-30-000068 - Audit rule for /etc/group
