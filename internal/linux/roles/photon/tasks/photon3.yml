############################################
# V-256590 / PHTN-30-000245 - systemd-resolved fallback DNS
############################################
- name: "PHTN-30-000245_query"
  ansible.builtin.shell: |
    set -o pipefail
    val=$(grep -oP '^FallbackDNS=\K.*' {{ var_resolved_file }} 2>/dev/null)
    rc=$?
    if [ $rc -ne 0 ]; then
      commented=$(grep -cP '^\s*#\s*FallbackDNS=' {{ var_resolved_file }} 2>/dev/null || echo "0")
      if [ "$commented" -gt 0 ]; then
        echo "COMMENTED_OUT"
      else
        echo "NOT_PRESENT"
      fi
    elif [ -z "$val" ]; then
      echo "EMPTY"
    else
      echo "SET:$val"
    fi
  register: _phtn245_fallback
  changed_when: false
  failed_when: false
  tags: [PHTN-30-000245, V-256590, audit]

- name: "PHTN-30-000245_assert"
  ansible.builtin.assert:
    that:
