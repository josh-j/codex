# V-256506/V-256507 / PHTN-30-000030 - pam_cracklib full check
############################################
- name: "PHTN-30-000030_query"
  ansible.builtin.shell: |
    set -o pipefail
    lines=$(grep -c 'pam_cracklib' /etc/pam.d/system-password 2>/dev/null || echo "0")
    content=$(grep 'pam_cracklib' /etc/pam.d/system-password 2>/dev/null || echo "NOT_FOUND")
