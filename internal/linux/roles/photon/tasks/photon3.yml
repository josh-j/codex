############################################
# V-256537 / PHTN-30-000092 - Init files permissions
############################################
- name: "PHTN-30-000092_query"
  ansible.builtin.shell: |
    set -o pipefail
    bad=""
    for f in /etc/bash.bashrc /etc/profile; do
      if [ -f "$f" ]; then
        perms=$(stat -c '%a %U %G' "$f")
        owner=$(echo "$perms" | awk '{print $2}')
        group=$(echo "$perms" | awk '{print $3}')
        mode=$(echo "$perms" | awk '{print $1}')
        other_w=$(( mode % 10 / 2 ))
        if [ "$owner" != "root" ] || [ "$group" != "root" ] || [ "$other_w" -eq 1 ]; then
          bad="${bad}${f}(${perms}) "
        fi
      fi
    done
    for f in /etc/profile.d/*; do
      if [ -f "$f" ]; then
        perms=$(stat -c '%a %U %G' "$f")
        owner=$(echo "$perms" | awk '{print $2}')
        group=$(echo "$perms" | awk '{print $3}')
        mode=$(echo "$perms" | awk '{print $1}')
        other_w=$(( mode % 10 / 2 ))
        if [ "$owner" != "root" ] || [ "$group" != "root" ] || [ "$other_w" -eq 1 ]; then
          bad="${bad}${f}(${perms}) "
        fi
      fi
    done
    if [ -z "$bad" ]; then echo "COMPLIANT"; else echo "$bad"; fi
  register: _phtn92_initfiles
  changed_when: false
  failed_when: false
  tags: [PHTN-30-000092, V-256537, audit]

- name: "PHTN-30-000092_assert"
  ansible.builtin.assert:
    that:
      - _phtn92_initfiles.stdout | trim == 'COMPLIANT'
    fail_msg: "Non-compliant files: {{ _phtn92_initfiles.stdout | trim }}"
    success_msg: "All init files have correct permissions"
  ignore_errors: true
  tags: [PHTN-30-000092, V-256537, audit]

