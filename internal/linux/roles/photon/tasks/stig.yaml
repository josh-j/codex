---
# internal.linux.photon : tasks/stig.yaml

- name: "Photon STIG"
  ansible.builtin.include_role:
    name: internal.core.stig_orchestrator
  vars:
    _ncs_stig_label: "Photon STIG"
    _ncs_stig_target_type: "photon"
    _ncs_stig_task_file: "{{ role_path }}/tasks/stig_photon3/main.yaml"
    _ncs_stig_mode_facts:
      photon_stig_enable_audit: "{{ _ncs_stig_action in ['audit', 'verify'] }}"
      photon_stig_enable_hardening: "{{ _ncs_stig_action == 'remediate' }}"
