---
# internal.linux.photon : tasks/stig.yaml
- name: "Photon STIG | Load version-specific vars"
  when: photon_version | default('5') | string == '3'
  block:
    - name: "Photon STIG | Load Photon 3.0 defaults"
      ansible.builtin.include_vars: "{{ role_path }}/defaults/photon3_defaults.yml"
    - name: "Photon STIG | Load Photon 3.0 vars"
      ansible.builtin.include_vars: "{{ role_path }}/vars/photon3_vars.yml"

- name: "Photon STIG | Set audit mode fact"
  ansible.builtin.set_fact:
    _photon_stig_audit_only: "{{ (photon_stig_enable_audit | default(true) | bool) and not (photon_stig_enable_hardening | default(false) | bool) }}"

- name: "Photon STIG | Register target context for ncs_collector"
  ansible.builtin.set_fact:
    _ncs_stig_target_host: "{{ inventory_hostname }}"
    _ncs_stig_target_type: "{{ 'vcsa_photon_os' if (photon_version | default('5') | string == '3') else 'photon' }}"

- name: "Photon STIG | Phase 1 | Evaluate compliance (read-only)"
  ansible.builtin.include_tasks:
    file: "{{ 'photon3.yml' if (photon_version | default('5') | string == '3') else 'photon.yml' }}"
    apply:
      check_mode: "{{ _photon_stig_audit_only | bool }}"
      tags: [stig_task]
  when:
    - photon_stig_enable_audit | default(true) | bool or photon_stig_enable_hardening | default(false) | bool
  ignore_errors: true # noqa: ignore-errors

- name: "Photon STIG | Flag audit as complete"
  ansible.builtin.set_fact:
    _stig_audit_ran: true
  changed_when: false
