---
# internal.linux.photon : tasks/rotate_password.yaml

- name: "Photon Rotate Password | Validate vault password is set"
  ansible.builtin.assert:
    that:
      - rotate_password | default(vault_rotate_password | default('')) | length > 0
    fail_msg: >-
      vault_rotate_password is not set.
      Define rotate_password or vault_rotate_password before running password rotation.

- name: "Photon Rotate Password | Check SSH connectivity"
  ansible.builtin.wait_for_connection:
    timeout: "{{ ansible_ssh_timeout | default(10) }}"

- name: "Photon Rotate Password | Set user password"
  ansible.builtin.user:
    name: "{{ rotate_user | default('root') }}"
    password: "{{ (rotate_password | default(vault_rotate_password)) | password_hash('sha512') }}"
    update_password: always
  no_log: true

- name: "Photon Rotate Password | Force password change on next login"
  ansible.builtin.command: chage -d 0 {{ rotate_user | default('root') }}
  changed_when: true
  when: rotate_force_change | default(true) | bool

- name: "Photon Rotate Password | Confirm rotation"
  ansible.builtin.debug:
    msg: "Password rotated for {{ rotate_user | default('root') }} on {{ inventory_hostname }}."
