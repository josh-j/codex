- name: "stigrule_270653_rsyslog_assert"
  ansible.builtin.assert:
    that:
      - "'rsyslog' in ansible_facts.packages"
      - ansible_facts.services.get('rsyslog.service', {}).get('state') == 'running'
    fail_msg: "rsyslog is not installed or not running"
    success_msg: "rsyslog is installed and running"
  ignore_errors: true
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - ubuntu2404STIG_stigrule_270653_manage | default(true) | bool

- name: "stigrule_270653_rsyslog"
  ansible.builtin.apt:
    name: rsyslog
    state: present
    update_cache: true
  when:
    - _ubuntu2404_stig_phase != 'audit'
    - ubuntu2404STIG_stigrule_270653_manage | default(true) | bool

- name: "stigrule_270655_ufw_status_check"
  ansible.builtin.command:
    cmd: ufw status
  register: _stigrule_270655_ufw_status
  changed_when: false
  failed_when: false
  check_mode: false
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - ubuntu2404STIG_stigrule_270655_manage | default(true) | bool

- name: "stigrule_270655_ufw_status_assert"
  ansible.builtin.assert:
    that:
      - _stigrule_270655_ufw_status.rc == 0
      - "'Status: active' in _stigrule_270655_ufw_status.stdout"
    fail_msg: "ufw is not active"
    success_msg: "ufw is active"
  ignore_errors: true
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - ubuntu2404STIG_stigrule_270655_manage | default(true) | bool
    - _stigrule_270655_ufw_status is defined

- name: "stigrule_270655_ufw_allow_ssh"
  community.general.ufw:
    rule: allow
    name: OpenSSH
  become: true
  when:
    - _ubuntu2404_stig_phase != 'audit'
    - ubuntu2404STIG_stigrule_270655_manage | default(true) | bool

- name: "stigrule_270655_ufw_enable"
  community.general.ufw:
    state: enabled
  become: true
  when:
    - _ubuntu2404_stig_phase != 'audit'
    - ubuntu2404STIG_stigrule_270655_manage | default(true) | bool

- name: "stigrule_270662_sssd_packages_assert"
  ansible.builtin.assert:
    that:
      - "'sssd' in ansible_facts.packages"
      - "'libpam-sss' in ansible_facts.packages"
      - "'libnss-sss' in ansible_facts.packages"
    fail_msg: "SSSD package set is incomplete"
    success_msg: "SSSD package set is installed"
  ignore_errors: true
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - ubuntu2404STIG_stigrule_270662_manage | default(true) | bool

- name: "stigrule_270662_sssd_packages_install"
  ansible.builtin.apt:
    name:
      - sssd
      - libpam-sss
      - libnss-sss
    state: present
    update_cache: true
  when:
    - _ubuntu2404_stig_phase != 'audit'
    - ubuntu2404STIG_stigrule_270662_manage | default(true) | bool

- name: "stigrule_270662_sssd_conf_skeleton"
  ansible.builtin.template:
    src: sssd.conf.j2
    dest: /etc/sssd/sssd.conf
    owner: root
    group: root
    mode: "0600"
    force: false
  when:
    - _ubuntu2404_stig_phase != 'audit'
    - ubuntu2404STIG_stigrule_270662_manage | default(true) | bool

# Refresh service facts after package installation so service enable/start
# tasks below can see newly installed units (apparmor, sssd, auditd, etc.)
- name: "Ubuntu STIG | Refresh service facts after package changes"
  ansible.builtin.service_facts:
  check_mode: false
  when: _ubuntu2404_stig_phase != 'audit'

# Ensure auditd is running before audit checks — it may be in failed state
# from immutable flag restart attempts on a previously hardened host.
- name: "Ubuntu STIG | Recover auditd if in failed state"
  ansible.builtin.shell:
    cmd: |
      if systemctl is-failed auditd.service >/dev/null 2>&1; then
        systemctl reset-failed auditd.service
        # Hide immutable rules so augenrules --load (ExecStartPost) doesn't fail
        [ -f /etc/audit/rules.d/99-stig-immutable.rules ] && mv /etc/audit/rules.d/99-stig-immutable.rules /tmp/_stig_immutable_recover.rules
        systemctl start auditd.service 2>/dev/null || true
        [ -f /tmp/_stig_immutable_recover.rules ] && mv /tmp/_stig_immutable_recover.rules /etc/audit/rules.d/99-stig-immutable.rules
      fi
  changed_when: false
  failed_when: false
  check_mode: false
  when: _ubuntu2404_stig_phase == 'audit'

# Refresh service facts before audit checks so we see the current state
# (services may have been started/enabled earlier in this run).
- name: "Ubuntu STIG | Refresh service facts before service audit"
  ansible.builtin.service_facts:
  check_mode: false
  when: _ubuntu2404_stig_phase == 'audit'

- name: "stigrule_service_assert"
  ansible.builtin.assert:
    that:
      - ansible_facts.services.get(item.unit, {}).get('state') in item.valid_states | default(['running'])
      - ansible_facts.services.get(item.unit, {}).get('status') == 'enabled'
    fail_msg: "{{ item.unit }} is not running and enabled"
    success_msg: "{{ item.unit }} is running and enabled"
  ignore_errors: true
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - lookup('vars', item.manage_var, default=true) | bool
  loop:
    - {
        id: "270657",
        manage_var: "ubuntu2404STIG_stigrule_270657_manage",
        unit: "auditd.service",
      }
    - {
        id: "270660",
        manage_var: "ubuntu2404STIG_stigrule_270660_manage",
        unit: "apparmor.service",
        valid_states: ["running", "stopped"],
      }
    - {
        id: "270663",
        manage_var: "ubuntu2404STIG_stigrule_270663_manage",
        unit: "sssd.service",
      }
  loop_control:
    label: "stigrule_{{ item.id }}"

- name: "stigrule_270657_auditd_enable"
  ansible.builtin.service:
    name: auditd.service
    state: "{{ ubuntu2404STIG_stigrule_270657_auditd_enable_state }}"
    enabled: "{{ ubuntu2404STIG_stigrule_270657_auditd_enable_enabled }}"
  failed_when: false
  when:
    - _ubuntu2404_stig_phase != 'audit'
    - ubuntu2404STIG_stigrule_270657_manage | default(true) | bool

- name: "stigrule_270660_apparmor_start"
  ansible.builtin.service:
    name: apparmor.service
    state: "{{ ubuntu2404STIG_stigrule_270660_apparmor_start_state }}"
    enabled: "{{ ubuntu2404STIG_stigrule_270660_apparmor_enable_enabled }}"
  when:
    - _ubuntu2404_stig_phase != 'audit'
    - ubuntu2404STIG_stigrule_270660_manage | default(true) | bool

- name: "stigrule_270660_apparmor_enforce"
  ansible.builtin.command:
    cmd: aa-enforce /etc/apparmor.d/*
  changed_when: true
  failed_when: false
  when:
    - _ubuntu2404_stig_phase != 'audit'
    - ubuntu2404STIG_stigrule_270660_manage | default(true) | bool

- name: "stigrule_270663_sssd_enable"
  ansible.builtin.service:
    name: sssd.service
    state: "{{ ubuntu2404STIG_stigrule_270663_sssd_enable_state }}"
    enabled: "{{ ubuntu2404STIG_stigrule_270663_sssd_enable_enabled }}"
  when:
    - _ubuntu2404_stig_phase != 'audit'
    - ubuntu2404STIG_stigrule_270663_manage | default(true) | bool

- name: "stigrule_270666_ssh_enabled_check"
  ansible.builtin.command:
    cmd: systemctl is-enabled ssh.service
  register: _stigrule_270666_ssh_enabled
  changed_when: false
  failed_when: false
  check_mode: false
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - ubuntu2404STIG_stigrule_270666_manage | default(true) | bool

- name: "stigrule_270666_ssh_active_check"
  ansible.builtin.command:
    cmd: systemctl is-active ssh
  register: _stigrule_270666_ssh_active
  changed_when: false
  failed_when: false
  check_mode: false
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - ubuntu2404STIG_stigrule_270666_manage | default(true) | bool

- name: "stigrule_270666_ssh_assert"
  ansible.builtin.assert:
    that:
      - _stigrule_270666_ssh_enabled.stdout | trim in ['enabled', 'static', 'alias']
      - _stigrule_270666_ssh_active.stdout | trim == 'active'
    fail_msg: >-
      ssh is not compliant:
      enabled={{ _stigrule_270666_ssh_enabled.stdout | default('unknown') | trim }},
      active={{ _stigrule_270666_ssh_active.stdout | default('unknown') | trim }}
    success_msg: "ssh is enabled and active"
  ignore_errors: true
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - ubuntu2404STIG_stigrule_270666_manage | default(true) | bool
    - _stigrule_270666_ssh_enabled is defined
    - _stigrule_270666_ssh_active is defined

- name: "stigrule_270666_ssh_start"
  ansible.builtin.systemd_service:
    name: ssh.service
    state: started
    enabled: true
  when:
    - _ubuntu2404_stig_phase != 'audit'
    - ubuntu2404STIG_stigrule_270666_manage | default(true) | bool
