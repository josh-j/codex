---
# =============================================================================
# Package management and core services
# =============================================================================

- name: "stigrule_package_absent_assert"
  ansible.builtin.assert:
    that:
      - item.pkg not in ansible_facts.packages
    fail_msg: "{{ item.pkg }} is installed"
    success_msg: "{{ item.pkg }} is absent"
  ignore_errors: true
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - lookup('vars', item.manage_var, default=true) | bool
  loop:
    - {
        id: "270645",
        manage_var: "ubuntu2404STIG_stigrule_270645_manage",
        pkg: "systemd-timesyncd",
      }
    - {
        id: "270646",
        manage_var: "ubuntu2404STIG_stigrule_270646_manage",
        pkg: "ntp",
      }
    - {
        id: "270648",
        manage_var: "ubuntu2404STIG_stigrule_270648_manage",
        pkg: "rsh-server",
      }
  loop_control:
    label: "stigrule_{{ item.id }}"

- name: "stigrule_package_absent"
  ansible.builtin.apt:
    name: "{{ item.pkg }}"
    state: absent
    purge: "{{ item.purge | default(false) }}"
    autoremove: "{{ item.autoremove | default(false) }}"
    update_cache: "{{ item.update_cache | default(true) }}"
  when:
    - _ubuntu2404_stig_phase != 'audit'
    - lookup('vars', item.manage_var, default=true) | bool
  loop:
    - {
        id: "270645",
        manage_var: "ubuntu2404STIG_stigrule_270645_manage",
        pkg: "systemd-timesyncd",
        purge: true,
      }
    - {
        id: "270646",
        manage_var: "ubuntu2404STIG_stigrule_270646_manage",
        pkg: "ntp",
        purge: true,
      }
    - {
        id: "270648",
        manage_var: "ubuntu2404STIG_stigrule_270648_manage",
        pkg: "rsh-server",
      }
  loop_control:
    label: "stigrule_{{ item.id }}"

- name: "stigrule_270647_telnetd_check"
  ansible.builtin.shell:
    cmd: "dpkg -l | grep -w telnetd"
  register: _stigrule_270647_telnetd
  changed_when: false
  failed_when: false
  check_mode: false
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - ubuntu2404STIG_stigrule_270647_manage | default(true) | bool

- name: "stigrule_270647_telnetd_assert"
  ansible.builtin.assert:
    that:
      - _stigrule_270647_telnetd.rc != 0
    fail_msg: "telnetd is installed"
    success_msg: "telnetd is absent"
  ignore_errors: true
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - ubuntu2404STIG_stigrule_270647_manage | default(true) | bool
    - _stigrule_270647_telnetd is defined

- name: "stigrule_270647_telnetd_remove"
  ansible.builtin.apt:
    name: telnetd
    state: absent
    purge: true
    autoremove: true
  when:
    - _ubuntu2404_stig_phase != 'audit'
    - ubuntu2404STIG_stigrule_270647_manage | default(true) | bool

