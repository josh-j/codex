---
# -----------------------------------------------------------------------------
# 270784 / 270785 / 270809 - persistent syscall audit rules
# -----------------------------------------------------------------------------
- name: "stigrule_syscall_audit_rule"
  ansible.builtin.lineinfile:
    path: /etc/audit/rules.d/stig.rules
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    create: true
    mode: "0640"
  when:
    - not (ansible_check_mode | default(false))
    - lookup('vars', item.manage_var, default=true) | bool
  loop:
    - {
        id: "270784a",
        manage_var: "ubuntu2404STIG_stigrule_270784_manage",
        regexp: "^-a always,exit -F arch=b32 -S setxattr,fsetxattr,lsetxattr,removexattr,fremovexattr,lremovexattr -F auid>=1000 -F auid!=-1 -k .+$",
        line: "-a always,exit -F arch=b32 -S setxattr,fsetxattr,lsetxattr,removexattr,fremovexattr,lremovexattr -F auid>=1000 -F auid!=-1 -k perm_mod",
      }
    - {
        id: "270784b",
        manage_var: "ubuntu2404STIG_stigrule_270784_manage",
        regexp: "^-a always,exit -F arch=b32 -S setxattr,fsetxattr,lsetxattr,removexattr,fremovexattr,lremovexattr -F auid=0 -k .+$",
        line: "-a always,exit -F arch=b32 -S setxattr,fsetxattr,lsetxattr,removexattr,fremovexattr,lremovexattr -F auid=0 -k perm_mod",
      }
    - {
        id: "270784c",
        manage_var: "ubuntu2404STIG_stigrule_270784_manage",
        regexp: "^-a always,exit -F arch=b64 -S setxattr,fsetxattr,lsetxattr,removexattr,fremovexattr,lremovexattr -F auid>=1000 -F auid!=-1 -k .+$",
        line: "-a always,exit -F arch=b64 -S setxattr,fsetxattr,lsetxattr,removexattr,fremovexattr,lremovexattr -F auid>=1000 -F auid!=-1 -k perm_mod",
      }
    - {
        id: "270784d",
        manage_var: "ubuntu2404STIG_stigrule_270784_manage",
        regexp: "^-a always,exit -F arch=b64 -S setxattr,fsetxattr,lsetxattr,removexattr,fremovexattr,lremovexattr -F auid=0 -k .+$",
        line: "-a always,exit -F arch=b64 -S setxattr,fsetxattr,lsetxattr,removexattr,fremovexattr,lremovexattr -F auid=0 -k perm_mod",
      }
    - {
        id: "270785a",
        manage_var: "ubuntu2404STIG_stigrule_270785_manage",
        regexp: "^-a always,exit -F arch=b32 -S chown,fchown,fchownat,lchown -F auid>=1000 -F auid!=-1 -k .+$",
        line: "-a always,exit -F arch=b32 -S chown,fchown,fchownat,lchown -F auid>=1000 -F auid!=-1 -k perm_chng",
      }
    - {
        id: "270785b",
        manage_var: "ubuntu2404STIG_stigrule_270785_manage",
        regexp: "^-a always,exit -F arch=b64 -S chown,fchown,fchownat,lchown -F auid>=1000 -F auid!=-1 -k .+$",
        line: "-a always,exit -F arch=b64 -S chown,fchown,fchownat,lchown -F auid>=1000 -F auid!=-1 -k perm_chng",
      }
    - {
        id: "270809a",
        manage_var: "ubuntu2404STIG_stigrule_270809_manage",
        regexp: "^-a always,exit -F arch=b64 -S unlink,unlinkat,rename,renameat,rmdir -F auid>=1000 -F auid!=-1 -k .+$",
        line: "-a always,exit -F arch=b64 -S unlink,unlinkat,rename,renameat,rmdir -F auid>=1000 -F auid!=-1 -k delete",
      }
    - {
        id: "270809b",
        manage_var: "ubuntu2404STIG_stigrule_270809_manage",
        regexp: "^-a always,exit -F arch=b32 -S unlink,unlinkat,rename,renameat,rmdir -F auid>=1000 -F auid!=-1 -k .+$",
        line: "-a always,exit -F arch=b32 -S unlink,unlinkat,rename,renameat,rmdir -F auid>=1000 -F auid!=-1 -k delete",
      }
  loop_control:
    label: "stigrule_{{ item.id }}"

- name: "stigrule_syscall_audit_rules_load"
  ansible.builtin.command:
    cmd: augenrules --load
  register: _stigrule_syscall_augenrules_load
  changed_when: false
  failed_when: _stigrule_syscall_augenrules_load.rc != 0
  when:
    - not (ansible_check_mode | default(false))
    - >
      ubuntu2404STIG_stigrule_270784_manage | default(true) | bool
      or ubuntu2404STIG_stigrule_270785_manage | default(true) | bool
      or ubuntu2404STIG_stigrule_270809_manage | default(true) | bool

- name: "stigrule_syscall_persistent_rule_check"
  ansible.builtin.shell:
    cmd: |
      set -eu
      grep -E -- {{ item.pattern | quote }} /etc/audit/rules.d/stig.rules
      grep -E -- {{ item.pattern | quote }} /etc/audit/audit.rules
  register: _stigrule_42_syscall_persistent_checks
  changed_when: false
  failed_when: false
  check_mode: false
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - lookup('vars', item.manage_var, default=true) | bool
  loop:
    - {
        id: "270784a",
        manage_var: "ubuntu2404STIG_stigrule_270784_manage",
        pattern: "arch=b32 .*setxattr,fsetxattr,lsetxattr,removexattr,fremovexattr,lremovexattr .*auid>=1000 .*auid!=-1",
      }
    - {
        id: "270784b",
        manage_var: "ubuntu2404STIG_stigrule_270784_manage",
        pattern: "arch=b32 .*setxattr,fsetxattr,lsetxattr,removexattr,fremovexattr,lremovexattr .*auid=0",
      }
    - {
        id: "270784c",
        manage_var: "ubuntu2404STIG_stigrule_270784_manage",
        pattern: "arch=b64 .*setxattr,fsetxattr,lsetxattr,removexattr,fremovexattr,lremovexattr .*auid>=1000 .*auid!=-1",
      }
    - {
        id: "270784d",
        manage_var: "ubuntu2404STIG_stigrule_270784_manage",
        pattern: "arch=b64 .*setxattr,fsetxattr,lsetxattr,removexattr,fremovexattr,lremovexattr .*auid=0",
      }
    - {
        id: "270785a",
        manage_var: "ubuntu2404STIG_stigrule_270785_manage",
        pattern: "arch=b32 .*chown,fchown,fchownat,lchown .*auid>=1000 .*auid!=-1",
      }
    - {
        id: "270785b",
        manage_var: "ubuntu2404STIG_stigrule_270785_manage",
        pattern: "arch=b64 .*chown,fchown,fchownat,lchown .*auid>=1000 .*auid!=-1",
      }
    - {
        id: "270809a",
        manage_var: "ubuntu2404STIG_stigrule_270809_manage",
        pattern: "arch=b64 .*unlink,unlinkat,rename,renameat,rmdir .*auid>=1000 .*auid!=-1 .*delete",
      }
    - {
        id: "270809b",
        manage_var: "ubuntu2404STIG_stigrule_270809_manage",
        pattern: "arch=b32 .*unlink,unlinkat,rename,renameat,rmdir .*auid>=1000 .*auid!=-1 .*delete",
      }
  loop_control:
    label: "stigrule_{{ item.id }}"

- name: "stigrule_syscall_live_rule_check"
  ansible.builtin.shell:
    cmd: |
      set -eu
      auditctl -l | grep -E -- {{ item.pattern | quote }}
  register: _stigrule_42_syscall_live_checks
  changed_when: false
  failed_when: false
  check_mode: false
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - lookup('vars', item.manage_var, default=true) | bool
  loop:
    - {
        id: "270784a",
        manage_var: "ubuntu2404STIG_stigrule_270784_manage",
        pattern: "arch=b32 .*setxattr,fsetxattr,lsetxattr,removexattr,fremovexattr,lremovexattr .*auid>=1000 .*auid!=-1",
      }
    - {
        id: "270784b",
        manage_var: "ubuntu2404STIG_stigrule_270784_manage",
        pattern: "arch=b32 .*setxattr,fsetxattr,lsetxattr,removexattr,fremovexattr,lremovexattr .*auid=0",
      }
    - {
        id: "270784c",
        manage_var: "ubuntu2404STIG_stigrule_270784_manage",
        pattern: "arch=b64 .*setxattr,fsetxattr,lsetxattr,removexattr,fremovexattr,lremovexattr .*auid>=1000 .*auid!=-1",
      }
    - {
        id: "270784d",
        manage_var: "ubuntu2404STIG_stigrule_270784_manage",
        pattern: "arch=b64 .*setxattr,fsetxattr,lsetxattr,removexattr,fremovexattr,lremovexattr .*auid=0",
      }
    - {
        id: "270785a",
        manage_var: "ubuntu2404STIG_stigrule_270785_manage",
        pattern: "arch=b32 .*chown,fchown,fchownat,lchown .*auid>=1000 .*auid!=-1",
      }
    - {
        id: "270785b",
        manage_var: "ubuntu2404STIG_stigrule_270785_manage",
        pattern: "arch=b64 .*chown,fchown,fchownat,lchown .*auid>=1000 .*auid!=-1",
      }
    - {
        id: "270809a",
        manage_var: "ubuntu2404STIG_stigrule_270809_manage",
        pattern: "arch=b64 .*unlink,unlinkat,rename,renameat,rmdir .*auid>=1000 .*auid!=-1 .*(key=delete|-k delete| delete$)",
      }
    - {
        id: "270809b",
        manage_var: "ubuntu2404STIG_stigrule_270809_manage",
        pattern: "arch=b32 .*unlink,unlinkat,rename,renameat,rmdir .*auid>=1000 .*auid!=-1 .*(key=delete|-k delete| delete$)",
      }
  loop_control:
    label: "stigrule_{{ item.id }}"

- name: "stigrule_syscall_rule_assert"
  ansible.builtin.assert:
    that:
      - (item.0.rc | default(1)) == 0
      - (item.1.rc | default(1)) == 0
    fail_msg: "Audit rule for STIG {{ item.0.item.id }} is not persisted and loaded"
    success_msg: "Audit rule for STIG {{ item.0.item.id }} is persisted and loaded"
  ignore_errors: true
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - item.0 is mapping
    - item.1 is mapping
  loop: "{{ (_stigrule_42_syscall_persistent_checks.results | default([])) | zip(_stigrule_42_syscall_live_checks.results | default([])) | list }}"
  loop_control:
    label: "stigrule_{{ item.0.item.id if (item.0 is mapping and item.0.item is defined) else 'unknown' }}"
