      }
    - {
        id: "270699",
        manage_var: "ubuntu2404STIG_stigrule_270699_manage",
        cmd: "find /lib /lib64 /usr/lib /usr/lib64 -type f -name '*.so*' ! -group root -exec chgrp root {} +",
      }
    - {
        id: "270700",
        manage_var: "ubuntu2404STIG_stigrule_270700_manage",
        cmd: "find /lib /usr/lib /lib64 /usr/lib64 ! -group root -type d -exec chgrp root {} +",
      }
    - {
        id: "270701",
        manage_var: "ubuntu2404STIG_stigrule_270701_manage",
        cmd: "find /bin /sbin /usr/bin /usr/sbin /usr/local/bin /usr/local/sbin -perm /022 -type f -exec chmod 0755 {} +",
      }
    - {
        id: "270702",
        manage_var: "ubuntu2404STIG_stigrule_270702_manage",
        cmd: "find /bin /sbin /usr/bin /usr/sbin /usr/local/bin /usr/local/sbin ! -user root -type f -exec chown root {} +",
