        cmd: "find /run/log/journal /var/log/journal -type f -exec chown root {} + 2>/dev/null || true",
      }
    - {
        id: "270775",
        manage_var: "ubuntu2404STIG_stigrule_270775_manage",
        cmd: "find /etc/audit -maxdepth 2 \\( -name 'audit*.rules' -o -name 'auditd.conf' -o -name 'stig.rules' \\) -type f -exec chmod 0640 {} +",
      }
    - {
        id: "270776",
        manage_var: "ubuntu2404STIG_stigrule_270776_manage",
        cmd: "find /etc/audit -maxdepth 2 \\( -name 'audit*.rules' -o -name 'auditd.conf' -o -name 'stig.rules' \\) -type f -exec chown root {} +",
      }
    - {
        id: "270777",
        manage_var: "ubuntu2404STIG_stigrule_270777_manage",
        cmd: "find /etc/audit -maxdepth 2 \\( -name 'audit*.rules' -o -name 'auditd.conf' -o -name 'stig.rules' \\) -type f -exec chgrp root {} +",
