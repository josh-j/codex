- name: "stigrule_270723_270738_pam_pkcs11_policy_check"
  ansible.builtin.shell:
    cmd: |
      set -eu
      awk '/pkcs11_module[[:space:]]+opensc[[:space:]]*{/,/}/' /etc/pam_pkcs11/pam_pkcs11.conf \
        | grep -E '^[[:space:]]*cert_policy[[:space:]]*=' \
        | grep -v '^[[:space:]]*#' \
        | grep -q 'ocsp_on'
  register: _stigrule_270723_pam_pkcs11
  changed_when: false
  failed_when: false
  check_mode: false
  when:
    - _ubuntu2404_stig_phase == 'audit'
