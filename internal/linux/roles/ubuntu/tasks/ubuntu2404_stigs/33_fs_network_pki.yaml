# =============================================================================
# Firewall
# =============================================================================

- name: "stigrule_270719_firewall_policy_check"
  ansible.builtin.command:
    cmd: ufw status
  register: _stigrule_270719_ufw_status
  changed_when: false
  failed_when: false
  check_mode: false
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - ubuntu2404STIG_stigrule_270719_manage | default(true) | bool

- name: "stigrule_270719_firewall_policy_assert"
  ansible.builtin.assert:
    that:
      - _stigrule_270719_ufw_status.rc == 0
      - "'Status: active' in _stigrule_270719_ufw_status.stdout"
    fail_msg: "ufw is not active for policy enforcement"
    success_msg: "ufw is active for policy enforcement"
  ignore_errors: true
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - ubuntu2404STIG_stigrule_270719_manage | default(true) | bool
    - _stigrule_270719_ufw_status is defined

- name: "stigrule_270719_firewall_policy_remediate"
  community.general.ufw:
    state: enabled
  when:
    - not (ansible_check_mode | default(false))
    - ubuntu2404STIG_stigrule_270719_manage | default(true) | bool

- name: "stigrule_270719_firewall_policy_rules"
  community.general.ufw:
    rule: "{{ item.rule | default('allow') }}"
    direction: "{{ item.direction | default(omit) }}"
    port: "{{ item.port | default(omit) }}"
    proto: "{{ item.proto | default(omit) }}"
    from_ip: "{{ item.from_ip | default(omit) }}"
    to_ip: "{{ item.to_ip | default(omit) }}"
  loop: "{{ ubuntu2404STIG_stigrule_270719_allowed_ufw_rules | default([]) }}"
  loop_control:
    label: "{{ item.port | default(item.rule) }}"
  when:
    - not (ansible_check_mode | default(false))
    - ubuntu2404STIG_stigrule_270719_manage | default(true) | bool

- name: "stigrule_270754_listening_services"
  ansible.builtin.shell:
    cmd: |
      set -eu
      ss -H -lntu | awk '
        {
          proto=$1
          localaddr=$5
          if (localaddr ~ /127\.0\.0\.1:/ || localaddr ~ /\[::1\]:/) next
          sub(/^.*:/, "", localaddr)
          if (localaddr ~ /^[0-9]+$/) print localaddr "/" proto
        }
      ' | sort -u
  register: _stigrule_270754_listening
  changed_when: false
  failed_when: false
  check_mode: false
  when:
    - (_ubuntu2404_stig_phase == 'audit') or (not (ansible_check_mode | default(false)))
    - ubuntu2404STIG_stigrule_270754_manage | default(true) | bool

- name: "stigrule_270754_rate_limit_check"
  ansible.builtin.shell:
    cmd: |
      set -eu
      ufw status | grep -q '^Status: active'
      while IFS= read -r portproto; do
        [ -z "$portproto" ] && continue
        port="${portproto%/*}"
        proto="${portproto#*/}"
        ufw status | grep -Eq "^${port}/${proto}[[:space:]]+LIMIT[[:space:]]"
      done <<'EOF'
      {{ _stigrule_270754_listening.stdout | default('') }}
      EOF
  register: _stigrule_270754_ufw_status
  changed_when: false
  failed_when: false
  check_mode: false
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - ubuntu2404STIG_stigrule_270754_manage | default(true) | bool

- name: "stigrule_270754_rate_limit_assert"
  ansible.builtin.assert:
    that:
      - _stigrule_270754_ufw_status.rc == 0
    fail_msg: "One or more listening services do not have a UFW LIMIT rule"
    success_msg: "All listening services have a UFW LIMIT rule"
  ignore_errors: true
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - ubuntu2404STIG_stigrule_270754_manage | default(true) | bool
    - _stigrule_270754_ufw_status is defined

- name: "stigrule_270754_enable_ufw"
  community.general.ufw:
    state: enabled
  when:
    - not (ansible_check_mode | default(false))
    - ubuntu2404STIG_stigrule_270754_manage | default(true) | bool

- name: "stigrule_270754_rate_limit_remediate"
  community.general.ufw:
    rule: limit
    port: "{{ item.split('/')[0] }}"
    proto: "{{ item.split('/')[1] }}"
  loop: "{{ _stigrule_270754_listening.stdout_lines | default([]) }}"
  loop_control:
    label: "{{ item }}"
  when:
    - not (ansible_check_mode | default(false))
    - ubuntu2404STIG_stigrule_270754_manage | default(true) | bool

- name: "stigrule_270755_wireless_check"
  ansible.builtin.shell:
    cmd: "ls -L -d /sys/class/net/*/wireless 2>/dev/null | xargs -r dirname | xargs -r basename"
  register: _stigrule_270755_wireless
  changed_when: false
  failed_when: false
  check_mode: false
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - ubuntu2404STIG_stigrule_270755_manage | default(true) | bool

- name: "stigrule_270755_wireless_assert"
  ansible.builtin.assert:
    that:
      - _stigrule_270755_wireless.stdout | trim == ''
    fail_msg: "Wireless interfaces were found"
    success_msg: "No wireless interfaces were found"
  ignore_errors: true
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - ubuntu2404STIG_stigrule_270755_manage | default(true) | bool
    - _stigrule_270755_wireless is defined

- name: "stigrule_270755_wireless_remediate"
  ansible.builtin.shell:
    cmd: |
      set -eu
      for iface in $(ls -L -d /sys/class/net/*/wireless 2>/dev/null | xargs -r dirname | xargs -r basename); do
        ip link set "$iface" down || true
      done
  when:
    - not (ansible_check_mode | default(false))
    - ubuntu2404STIG_stigrule_270755_manage | default(true) | bool

# =============================================================================
# PKI / SSSD / PAM smart-card controls
