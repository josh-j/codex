- name: "stigrule_270757_270764_systemd_tmpfiles_check"
  ansible.builtin.shell:
    cmd: |
      set -eu
      systemd-tmpfiles --cat-config \
        | grep -Fqx 'z /run/log/journal 2640 root systemd-journal - -'
      systemd-tmpfiles --cat-config \
        | grep -Fqx 'Z /run/log/journal/%m 2640 root systemd-journal - -'
      systemd-tmpfiles --cat-config \
        | grep -Fqx 'z /var/log/journal 2640 root systemd-journal - -'
      systemd-tmpfiles --cat-config \
        | grep -Fqx 'z /var/log/journal/%m 2640 root systemd-journal - -'
      systemd-tmpfiles --cat-config \
        | grep -Fqx 'z /var/log/journal/%m/system.journal 0640 root systemd-journal - -'
  register: _stigrule_270757_tmpfiles
  changed_when: false
  failed_when: false
  check_mode: false
