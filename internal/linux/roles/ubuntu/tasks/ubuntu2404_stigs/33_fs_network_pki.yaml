---
# ubuntu2404_stigs/33_fs_network_pki.yaml
# =============================================================================
# Filesystem, network, PKI, cryptography, and platform controls
# =============================================================================

- name: "stigrule_270694_ssh_confirm_script_check"
  ansible.builtin.slurp:
    src: /etc/profile.d/ssh_confirm.sh
  register: _stigrule_270694_ssh_confirm
  failed_when: false
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - ubuntu2404STIG_stigrule_270694_manage | default(true) | bool

- name: "stigrule_270694_ssh_confirm_script_assert"
  ansible.builtin.assert:
    that:
      - _stigrule_270694_ssh_confirm.content is defined
      - (_stigrule_270694_ssh_confirm.content | b64decode) is search('SSH_CLIENT')
      - (_stigrule_270694_ssh_confirm.content | b64decode) is search('DoD Notice and Consent Banner Acknowledgement')
    fail_msg: "SSH acknowledgement script is missing or incomplete"
    success_msg: "SSH acknowledgement script is present"
  ignore_errors: true
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - ubuntu2404STIG_stigrule_270694_manage | default(true) | bool
    - _stigrule_270694_ssh_confirm is defined

- name: "stigrule_270694_ssh_confirm_script_remediate"
  ansible.builtin.copy:
    dest: /etc/profile.d/ssh_confirm.sh
    owner: root
    group: root
    mode: "0755"
    content: |
      #!/bin/bash
      if [ -n "$SSH_CLIENT" ] || [ -n "$SSH_TTY" ]; then
        if [ -z "${DOD_SSH_BANNER_ACK:-}" ]; then
          while true; do
            read -r -p "DoD Notice and Consent Banner Acknowledgement [y/n]: " reply
            case "$reply" in
              y|Y)
                export DOD_SSH_BANNER_ACK=1
                break
                ;;
              n|N)
                exit 1
                ;;
            esac
          done
        fi
      fi
  when:
    - not (ansible_check_mode | default(false))
    - ubuntu2404STIG_stigrule_270694_manage | default(true) | bool

# =============================================================================
# AIDE
# =============================================================================

- name: "stigrule_270650_aide_installed_check"
  ansible.builtin.assert:
    that:
      - "'aide' in ansible_facts.packages or 'aide-common' in ansible_facts.packages"
    fail_msg: "AIDE is not installed"
    success_msg: "AIDE is installed"
  ignore_errors: true
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - ubuntu2404STIG_stigrule_270650_manage | default(true) | bool

- name: "stigrule_270650_aide_compliance_check"
  ansible.builtin.shell:
    cmd: |
      set -eu
      command -v aide >/dev/null 2>&1
      test -f /etc/aide/aide.conf
      test -f /var/lib/aide/aide.db || test -f /var/lib/aide/aide.db.gz
      test -f /etc/cron.daily/dailyaidecheck || test -f /usr/share/aide/config/cron.daily/aide
  register: _stigrule_270650_aide_compliance
  changed_when: false
  failed_when: false
  check_mode: false
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - ubuntu2404STIG_stigrule_270650_manage | default(true) | bool

- name: "stigrule_270650_aide_deep_check_run"
  ansible.builtin.command:
    cmd: aide -c /etc/aide/aide.conf --check
  register: _stigrule_270650_aide_check
  changed_when: false
  failed_when: false
  check_mode: false
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - ubuntu2404STIG_stigrule_270650_manage | default(true) | bool
    - ubuntu2404STIG_stigrule_270650_run_deep_check | default(false) | bool

- name: "stigrule_270650_aide_check_assert"
  ansible.builtin.assert:
    that:
      # AIDE returns 0 when no differences and 1 when differences are found.
      - _stigrule_270650_aide_check.rc in [0, 1]
    fail_msg: "AIDE check could not be executed successfully"
    success_msg: "AIDE check executed successfully"
  ignore_errors: true
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - ubuntu2404STIG_stigrule_270650_manage | default(true) | bool
    - _stigrule_270650_aide_check is defined

- name: "stigrule_270650_aide_db_present"
  ansible.builtin.stat:
    path: /var/lib/aide/aide.db
  register: _stigrule_270650_aide_db
  when:
    - not (ansible_check_mode | default(false))
    - ubuntu2404STIG_stigrule_270650_manage | default(true) | bool
    - "'aide' in ansible_facts.packages or 'aide-common' in ansible_facts.packages"

- name: "stigrule_270650_aideinit"
  ansible.builtin.command:
    cmd: aideinit
  register: _stigrule_270650_aideinit
  changed_when: true
  when:
    - not (ansible_check_mode | default(false))
    - ubuntu2404STIG_stigrule_270650_manage | default(true) | bool
    - "'aide' in ansible_facts.packages or 'aide-common' in ansible_facts.packages"
    - _stigrule_270650_aide_db.stat.exists is defined
    - not _stigrule_270650_aide_db.stat.exists

- name: "stigrule_270650_aide_db_copy_new"
  ansible.builtin.shell:
    cmd: |
      set -eu
      for candidate in /var/lib/aide/aide.db.new /var/lib/aide/aide.db.new.gz; do
        if [ -e "$candidate" ]; then
          cp -pf "$candidate" /var/lib/aide/aide.db
          exit 0
        fi
      done
      exit 1
  changed_when: true
  when:
    - not (ansible_check_mode | default(false))
    - ubuntu2404STIG_stigrule_270650_manage | default(true) | bool
    - "'aide' in ansible_facts.packages or 'aide-common' in ansible_facts.packages"
    - _stigrule_270650_aideinit is defined
    # - _stigrule_270650_aideinit.rc == 0

- name: "stigrule_270651_aide_default_conf_check"
  ansible.builtin.shell:
    cmd: |
      set -eu
      test -f /etc/aide/aide.conf
      test -f /usr/share/aide/config/aide/aide.conf
      test "$(sha256sum /etc/aide/aide.conf | awk '{print $1}')" = \
           "$(sha256sum /usr/share/aide/config/aide/aide.conf | awk '{print $1}')"
  register: _stigrule_270651_aide_conf
  changed_when: false
  failed_when: false
  check_mode: false
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - ubuntu2404STIG_stigrule_270651_manage | default(true) | bool
    - "'aide' in ansible_facts.packages or 'aide-common' in ansible_facts.packages"

- name: "stigrule_270651_aide_schedule_check"
  ansible.builtin.shell:
    cmd: |
      set -eu
      grep -r aide /etc/cron* /etc/crontab 2>/dev/null || true
      systemctl list-unit-files dailyaidecheck.timer 2>/dev/null | grep -q '^dailyaidecheck.timer'
  register: _stigrule_270651_aide_schedule
  changed_when: false
  failed_when: false
  check_mode: false
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - ubuntu2404STIG_stigrule_270651_manage | default(true) | bool
    - "'aide' in ansible_facts.packages or 'aide-common' in ansible_facts.packages"

- name: "stigrule_270651_aide_assert"
  ansible.builtin.assert:
    that:
      - _stigrule_270651_aide_conf.rc == 0
      - _stigrule_270651_aide_schedule.rc == 0
    fail_msg: "AIDE default config or scheduling is not compliant"
    success_msg: "AIDE default config and scheduling are compliant"
  ignore_errors: true
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - ubuntu2404STIG_stigrule_270651_manage | default(true) | bool
    - "'aide' in ansible_facts.packages or 'aide-common' in ansible_facts.packages"

- name: "stigrule_270651_restore_default_aide_conf"
  ansible.builtin.copy:
    src: /usr/share/aide/config/aide/aide.conf
    remote_src: true
    dest: /etc/aide/aide.conf
    owner: root
    group: root
    mode: "0644"
  when:
    - not (ansible_check_mode | default(false))
    - ubuntu2404STIG_stigrule_270651_manage | default(true) | bool
    - "'aide' in ansible_facts.packages or 'aide-common' in ansible_facts.packages"

- name: "stigrule_270651_restore_default_aide_cron_script"
  ansible.builtin.copy:
    src: /usr/share/aide/config/cron.daily/aide
    remote_src: true
    dest: /etc/cron.daily/dailyaidecheck
    owner: root
    group: root
    mode: "0755"
  failed_when: false
  when:
    - not (ansible_check_mode | default(false))
    - ubuntu2404STIG_stigrule_270651_manage | default(true) | bool
    - "'aide' in ansible_facts.packages or 'aide-common' in ansible_facts.packages"

- name: "stigrule_270651_enable_dailyaidecheck_timer"
  ansible.builtin.systemd_service:
    name: dailyaidecheck.timer
    enabled: true
    state: started
    daemon_reload: true
  failed_when: false
  when:
    - not (ansible_check_mode | default(false))
    - ubuntu2404STIG_stigrule_270651_manage | default(true) | bool
    - "'aide' in ansible_facts.packages or 'aide-common' in ansible_facts.packages"

- name: "stigrule_270831_aide_audit_tools_check"
  ansible.builtin.shell:
    cmd: |
      set -eu
      for tool in /sbin/auditctl /sbin/auditd /sbin/ausearch /sbin/aureport /sbin/autrace /sbin/augenrules; do
        grep -Eq "^${tool}[[:space:]]+.*sha512" /etc/aide/aide.conf
      done
  register: _stigrule_270831_aide_audit_tools
  changed_when: false
  failed_when: false
  check_mode: false
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - ubuntu2404STIG_stigrule_270831_manage | default(true) | bool
    - "'aide' in ansible_facts.packages or 'aide-common' in ansible_facts.packages"

- name: "stigrule_270831_aide_audit_tools_assert"
  ansible.builtin.assert:
    that:
      - _stigrule_270831_aide_audit_tools.rc == 0
    fail_msg: "AIDE audit tool integrity lines are missing or incomplete"
    success_msg: "AIDE audit tool integrity lines are configured"
  ignore_errors: true
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - ubuntu2404STIG_stigrule_270831_manage | default(true) | bool
    - _stigrule_270831_aide_audit_tools is defined

- name: "stigrule_270831_aide_audit_tools_remediate"
  ansible.builtin.blockinfile:
    path: /etc/aide/aide.conf
    marker: "# {mark} ANSIBLE MANAGED STIG 270831"
    block: |
      # Audit Tools
      /sbin/auditctl p+i+n+u+g+s+b+acl+xattrs+sha512
      /sbin/auditd p+i+n+u+g+s+b+acl+xattrs+sha512
      /sbin/ausearch p+i+n+u+g+s+b+acl+xattrs+sha512
      /sbin/aureport p+i+n+u+g+s+b+acl+xattrs+sha512
      /sbin/autrace p+i+n+u+g+s+b+acl+xattrs+sha512
      /sbin/augenrules p+i+n+u+g+s+b+acl+xattrs+sha512
    create: true
  when:
    - not (ansible_check_mode | default(false))
    - ubuntu2404STIG_stigrule_270831_manage | default(true) | bool
    - "'aide' in ansible_facts.packages or 'aide-common' in ansible_facts.packages"

