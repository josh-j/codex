  failed_when: false
  check_mode: false
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - lookup('vars', item.manage_var, default=true) | bool
  loop:
    - {
        id: "270696",
        manage_var: "ubuntu2404STIG_stigrule_270696_manage",
        cmd: "find /lib /lib64 /usr/lib /usr/lib64 -type f -name '*.so*' -perm /022 -print",
      }
    - {
        id: "270697",
        manage_var: "ubuntu2404STIG_stigrule_270697_manage",
        cmd: "find /lib /lib64 /usr/lib /usr/lib64 -type f -name '*.so*' ! -user root -print",
      }
    - {
        id: "270698",
        manage_var: "ubuntu2404STIG_stigrule_270698_manage",
        cmd: "find /lib /lib64 /usr/lib /usr/lib64 ! -user root -type d -print",
      }
    - {
        id: "270699",
        manage_var: "ubuntu2404STIG_stigrule_270699_manage",
        cmd: "find /lib /lib64 /usr/lib /usr/lib64 -type f -name '*.so*' ! -group root -print",
      }
    - {
        id: "270700",
        manage_var: "ubuntu2404STIG_stigrule_270700_manage",
        cmd: "find /lib /usr/lib /lib64 /usr/lib64 ! -group root -type d -print",
      }
    - {
        id: "270701",
        manage_var: "ubuntu2404STIG_stigrule_270701_manage",
        cmd: "find /bin /sbin /usr/bin /usr/sbin /usr/local/bin /usr/local/sbin -perm /022 -type f -print",
      }
    - {
        id: "270702",
        manage_var: "ubuntu2404STIG_stigrule_270702_manage",
        cmd: "find /bin /sbin /usr/bin /usr/sbin /usr/local/bin /usr/local/sbin ! -user root -type f -print",
      }
    - id: "270703"
      manage_var: "ubuntu2404STIG_stigrule_270703_manage"
      cmd: >
        find /bin /sbin /usr/bin /usr/sbin /usr/local/bin /usr/local/sbin
        -type f -perm -u=x -exec stat --format='%n %G' {} + |
        awk '$2 != "root" && $2 != "daemon" && $2 != "adm" && $2 != "shadow" && $2 != "mail" && $2 != "crontab" && $2 != "_ssh"'
    - {
        id: "270756",
        manage_var: "ubuntu2404STIG_stigrule_270756_manage",
        cmd: "find /var/log -perm /137 ! -name '*[bw]tmp' ! -name '*lastlog' ! -name 'history' ! -name 'eipp.log.xz' -type f -print",
      }
    - {
        id: "270761",
        manage_var: "ubuntu2404STIG_stigrule_270761_manage",
        cmd: "find /run/log/journal /var/log/journal -type d ! -group systemd-journal 2>/dev/null",
      }
    - {
        id: "270762",
        manage_var: "ubuntu2404STIG_stigrule_270762_manage",
        cmd: "find /run/log/journal /var/log/journal -type f ! -group systemd-journal 2>/dev/null",
      }
    - {
        id: "270763",
        manage_var: "ubuntu2404STIG_stigrule_270763_manage",
        cmd: "find /run/log/journal /var/log/journal -type d ! -user root 2>/dev/null",
      }
    - {
        id: "270764",
        manage_var: "ubuntu2404STIG_stigrule_270764_manage",
        cmd: "find /run/log/journal /var/log/journal -type f ! -user root 2>/dev/null",
      }
    - {
        id: "270775",
        manage_var: "ubuntu2404STIG_stigrule_270775_manage",
        cmd: "find /etc/audit -maxdepth 2 \\( -name 'audit*.rules' -o -name 'auditd.conf' -o -name 'stig.rules' \\) -type f -perm /137 -print",
      }
    - {
        id: "270776",
        manage_var: "ubuntu2404STIG_stigrule_270776_manage",
        cmd: "find /etc/audit -maxdepth 2 \\( -name 'audit*.rules' -o -name 'auditd.conf' -o -name 'stig.rules' \\) -type f ! -user root -print",
      }
    - {
        id: "270777",
        manage_var: "ubuntu2404STIG_stigrule_270777_manage",
        cmd: "find /etc/audit -maxdepth 2 \\( -name 'audit*.rules' -o -name 'auditd.conf' -o -name 'stig.rules' \\) -type f ! -group root -print",
      }
    - {
        id: "270821",
        manage_var: "ubuntu2404STIG_stigrule_270821_manage",
        cmd: "stat -c '%n %a' /sbin/auditctl /sbin/aureport /sbin/ausearch /sbin/autrace /sbin/auditd /sbin/augenrules /sbin/audisp* 2>/dev/null | awk '$2 > 755'",
      }
    - id: "270822"
      manage_var: "ubuntu2404STIG_stigrule_270822_manage"
      cmd: >
        stat -c '%n %U' /sbin/auditctl /sbin/aureport /sbin/ausearch /sbin/autrace /sbin/auditd /sbin/augenrules /sbin/audisp* 2>/dev/null |
        awk '$2 != "root"'
    - id: "270823"
      manage_var: "ubuntu2404STIG_stigrule_270823_manage"
      cmd: >
        stat -c '%n %G' /sbin/auditctl /sbin/aureport /sbin/ausearch /sbin/autrace /sbin/auditd /sbin/augenrules /sbin/audisp* 2>/dev/null |
        awk '$2 != "root"'
    - {
        id: "270824",
        manage_var: "ubuntu2404STIG_stigrule_270824_manage",
        cmd: "find /bin /sbin /usr/bin /usr/sbin /usr/local/bin /usr/local/sbin -perm /022 -type d -print",
      }
    - {
        id: "270825",
        manage_var: "ubuntu2404STIG_stigrule_270825_manage",
        cmd: "find /bin /sbin /usr/bin /usr/sbin /usr/local/bin /usr/local/sbin ! -user root -type d -print",
      }
    - {
        id: "270826",
        manage_var: "ubuntu2404STIG_stigrule_270826_manage",
        cmd: "find /bin /sbin /usr/bin /usr/sbin /usr/local/bin /usr/local/sbin ! -group root -type d -print",
      }
  loop_control:
    label: "stigrule_{{ item.id }}"

- name: "stigrule_find_noncompliant_assert"
  ansible.builtin.assert:
    that:
      - item.stdout | trim == ''
    fail_msg: "Noncompliant paths were found for STIG {{ item.item.id }}"
    success_msg: "No noncompliant paths were found for STIG {{ item.item.id }}"
  ignore_errors: true
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - item is mapping
  loop: "{{ _stigrule_33_find_checks.results | default([]) }}"
  loop_control:
    label: "stigrule_{{ item.item.id if (item is mapping and item.item is defined) else 'unknown' }}"

- name: "stigrule_filesystem_remediate"
  ansible.builtin.shell:
    cmd: "{{ item.cmd }}"
  when:
    - not (ansible_check_mode | default(false))
    - lookup('vars', item.manage_var, default=true) | bool
  loop:
    - {
        id: "270696",
        manage_var: "ubuntu2404STIG_stigrule_270696_manage",
        cmd: "find /lib /lib64 /usr/lib /usr/lib64 -type f -name '*.so*' -perm /022 -exec chmod go-w {} +",
