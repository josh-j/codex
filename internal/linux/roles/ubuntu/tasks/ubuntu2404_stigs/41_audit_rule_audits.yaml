- name: "stigrule_audit_rule_assert"
  ansible.builtin.assert:
    that:
      - item.rc == 0
    fail_msg: "Audit rule for STIG {{ item.item.id }} is missing from either stig.rules or the loaded audit rule set"
    success_msg: "Audit rule for STIG {{ item.item.id }} is present in both stig.rules and the loaded audit rule set"
  ignore_errors: true
  when:
    - item is mapping
  loop: "{{ _stigrule_audit_rule_checks.results | default([]) }}"
  loop_control:
    label: "stigrule_{{ item.item.id if (item is mapping and item.item is defined) else 'unknown' }}"
