    cmd: passwd -l root
  when:
    - _ubuntu2404_stig_phase != 'audit'
    - ubuntu2404STIG_stigrule_270724_manage | default(true) | bool

- name: "stigrule_270725_sha512_remediate"
  ansible.builtin.lineinfile:
    path: /etc/pam.d/common-password
    regexp: '^\s*password\s+\[success=1 default=ignore\]\s+pam_unix\.so\b'
    line: "password [success=1 default=ignore] pam_unix.so obscure sha512"
  when:
    - _ubuntu2404_stig_phase != 'audit'
    - ubuntu2404STIG_stigrule_270725_manage | default(true) | bool

- name: "stigrule_270734_offline_credentials_remediate"
  block:
    - name: "stigrule_270734_sssd_conf_present"
      ansible.builtin.file:
        path: /etc/sssd/sssd.conf
        state: touch
        owner: root
        group: root
        mode: "0600"

    - name: "stigrule_270734_ensure_pam_section"
      ansible.builtin.blockinfile:
        path: /etc/sssd/sssd.conf
        marker: "# {mark} ANSIBLE MANAGED SSSD PAM SECTION"
        block: |
          [pam]
      when: >
        ('[pam]' not in (lookup('ansible.builtin.file', '/etc/sssd/sssd.conf', errors='ignore') | default('', true)))
      ignore_errors: true

    - name: "stigrule_270734_offline_credentials_line"
      ansible.builtin.lineinfile:
        path: /etc/sssd/sssd.conf
        regexp: '^\s*offline_credentials_expiration\s*='
        line: "offline_credentials_expiration = 1"
        insertafter: '^\[pam\]'
        create: true
        owner: root
        group: root
        mode: "0600"
  when:
    - _ubuntu2404_stig_phase != 'audit'
    - ubuntu2404STIG_stigrule_270734_manage | default(true) | bool

- name: "stigrule_270748_sudo_group_members_check"
