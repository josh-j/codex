---
# ubuntu2404_stigs/32_access_pam.yaml
# =============================================================================
# Access control, PAM, accounts, and privilege elevation
# =============================================================================

- name: "stigrule_270677_maxlogins_check"
  ansible.builtin.shell:
    cmd: |
      set -e
      grep -rE '^[[:space:]]*\*[[:space:]]+hard[[:space:]]+maxlogins[[:space:]]+([0-9]|10)([[:space:]]|$)' \
        /etc/security/limits.conf /etc/security/limits.d/*.conf 2>/dev/null
      ! grep -rE '^[[:space:]]*\*[[:space:]]+hard[[:space:]]+maxlogins[[:space:]]+([1-9][1-9]|[0-9]{3,})([[:space:]]|$)' \
        /etc/security/limits.conf /etc/security/limits.d/*.conf 2>/dev/null
  register: _stigrule_270677_maxlogins
  changed_when: false
  failed_when: false
  check_mode: false
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - ubuntu2404STIG_stigrule_270677_manage | default(true) | bool

- name: "stigrule_270677_maxlogins_assert"
  ansible.builtin.assert:
    that:
      - _stigrule_270677_maxlogins.rc == 0
    fail_msg: "maxlogins is not configured to 10 or less, or conflicting values are present"
    success_msg: "maxlogins is configured to 10 or less without conflicts"
  ignore_errors: true
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - ubuntu2404STIG_stigrule_270677_manage | default(true) | bool
    - _stigrule_270677_maxlogins is defined

- name: "stigrule_270677_find_limits_d_files"
  ansible.builtin.find:
    paths: /etc/security/limits.d
    patterns: "*.conf"
    file_type: file
  register: _stigrule_270677_limits_d_files
  failed_when: false
  when:
    - _ubuntu2404_stig_phase != 'audit'
    - ubuntu2404STIG_stigrule_270677_manage | default(true) | bool

- name: "stigrule_270677_remove_limits_conf_maxlogins"
  ansible.builtin.lineinfile:
    path: /etc/security/limits.conf
    regexp: '^[[:space:]]*\*[[:space:]]+hard[[:space:]]+maxlogins[[:space:]]+'
    state: absent
  when:
    - _ubuntu2404_stig_phase != 'audit'
    - ubuntu2404STIG_stigrule_270677_manage | default(true) | bool

- name: "stigrule_270677_remove_conflicting_limits_d_maxlogins"
  ansible.builtin.lineinfile:
    path: "{{ item.path }}"
    regexp: '^[[:space:]]*\*[[:space:]]+hard[[:space:]]+maxlogins[[:space:]]+'
    state: absent
  loop: "{{ _stigrule_270677_limits_d_files.files | default([]) }}"
  loop_control:
    label: "{{ item.path }}"
  when:
    - _ubuntu2404_stig_phase != 'audit'
    - ubuntu2404STIG_stigrule_270677_manage | default(true) | bool

- name: "stigrule_270677_maxlogins_remediate"
  ansible.builtin.copy:
    dest: /etc/security/limits.d/maxlogins.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      * hard maxlogins 10
  when:
    - _ubuntu2404_stig_phase != 'audit'
    - ubuntu2404STIG_stigrule_270677_manage | default(true) | bool

- name: "stigrule_270682_temporary_accounts_check"
  ansible.builtin.shell:
    cmd: |
      set -e
      for acct in {{ ubuntu2404STIG_stigrule_270682_temporary_accounts | default([]) | join(' ') }}; do
        test -n "$acct"
        expiry="$(chage -l "$acct" | awk -F': ' '/Account expires/ {print $2}')"
        test "$expiry" != "never"
      done
  register: _stigrule_270682_temp_accounts
  changed_when: false
  failed_when: false
  check_mode: false
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - ubuntu2404STIG_stigrule_270682_manage | default(true) | bool

- name: "stigrule_270682_temporary_accounts_assert"
  ansible.builtin.assert:
    that:
      - _stigrule_270682_temp_accounts.rc == 0
    fail_msg: "One or more temporary accounts do not have an expiration date"
    success_msg: "Temporary accounts are configured with expiration dates"
  ignore_errors: true
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - ubuntu2404STIG_stigrule_270682_manage | default(true) | bool
    - _stigrule_270682_temp_accounts is defined

- name: "stigrule_270682_temporary_accounts_remediate"
  ansible.builtin.shell:
    cmd: "chage -E $(date -d +3days +%Y-%m-%d) {{ item }}"
  loop: "{{ ubuntu2404STIG_stigrule_270682_temporary_accounts | default([]) }}"
  loop_control:
    label: "{{ item }}"
  when:
    - _ubuntu2404_stig_phase != 'audit'
    - ubuntu2404STIG_stigrule_270682_manage | default(true) | bool

- name: "stigrule_270690_faillock_check"
  ansible.builtin.shell:
    cmd: |
      set -e
      grep -Eq 'auth\s+\[.*default=die.*\]\s+pam_faillock\.so\s+authfail' /etc/pam.d/common-auth
      grep -Fq -- 'auth sufficient pam_faillock.so authsucc' /etc/pam.d/common-auth
      grep -Eq '^audit$' /etc/security/faillock.conf
      grep -Eq '^silent$' /etc/security/faillock.conf
      grep -Eq '^deny *= *3$' /etc/security/faillock.conf
      grep -Eq '^fail_interval *= *900$' /etc/security/faillock.conf
      grep -Eq '^unlock_time *= *0$' /etc/security/faillock.conf
  register: _stigrule_270690_faillock
  changed_when: false
  failed_when: false
  check_mode: false
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - ubuntu2404STIG_stigrule_270690_manage | default(true) | bool

- name: "stigrule_270690_faillock_assert"
  ansible.builtin.assert:
    that:
      - _stigrule_270690_faillock.rc == 0
    fail_msg: "pam_faillock or faillock.conf settings are not compliant"
    success_msg: "pam_faillock and faillock.conf settings are compliant"
  ignore_errors: true
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - ubuntu2404STIG_stigrule_270690_manage | default(true) | bool
    - _stigrule_270690_faillock is defined

- name: "stigrule_270690_faillock_config"
  ansible.builtin.blockinfile:
    path: /etc/security/faillock.conf
    marker: "# {mark} ANSIBLE MANAGED STIG 270690"
    block: |
      audit
      silent
      deny = 3
      fail_interval = 900
      unlock_time = 0
    create: true
  when:
    - _ubuntu2404_stig_phase != 'audit'
    - ubuntu2404STIG_stigrule_270690_manage | default(true) | bool

- name: "stigrule_270690_faillock_pam"
  ansible.builtin.shell:
    cmd: |
      set -e
      PAM=/etc/pam.d/common-auth
      MARKER="ANSIBLE MANAGED STIG 270690 pam_faillock"
      if grep -q "$MARKER" "$PAM"; then echo "already_present"; exit 0; fi
      python3 -c "
      import re, sys
      pam = open('$PAM').read()
      # Bump pam_unix.so success=N by 2 to skip over the two new faillock lines
      def bump(m):
          return m.group(1) + '[success=' + str(int(m.group(2)) + 2) + m.group(3)
      pam = re.sub(r'^(auth\s+)\[success=(\d+)(\s+default=ignore\]\s+pam_unix\.so)', bump, pam, flags=re.MULTILINE)
      # Insert faillock block after pam_unix.so line
      lines = pam.split('\n')
      out = []
      for line in lines:
          out.append(line)
          if 'pam_unix.so' in line and line.strip().startswith('auth'):
              out.append('# BEGIN $MARKER')
              out.append('auth [default=die] pam_faillock.so authfail')
              out.append('auth sufficient pam_faillock.so authsucc')
              out.append('# END $MARKER')
      open('$PAM', 'w').write('\n'.join(out))
      "
      echo "applied"
  register: _stigrule_270690_faillock_pam_result
  changed_when: "'applied' in _stigrule_270690_faillock_pam_result.stdout"
  when:
    - _ubuntu2404_stig_phase != 'audit'
    - ubuntu2404STIG_stigrule_270690_manage | default(true) | bool

- name: "stigrule_270721_pkcs11_functional_check"
  ansible.builtin.shell:
    cmd: |
      set -e
      dpkg -l pam-pkcs11 2>/dev/null | grep -q '^ii'
      test -f /usr/lib/x86_64-linux-gnu/security/pam_pkcs11.so -o -f /usr/lib/security/pam_pkcs11.so
  register: _stigrule_270721_pkcs11_functional
  changed_when: false
  failed_when: false
  check_mode: false
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - ubuntu2404STIG_stigrule_270721_manage | default(true) | bool

- name: "stigrule_270721_pkcs11_functional_assert"
  ansible.builtin.assert:
    that:
      - _stigrule_270721_pkcs11_functional.rc == 0
    fail_msg: "pam_pkcs11 is not installed — smartcard authentication cannot function"
    success_msg: "pam_pkcs11 module is installed and present"
  ignore_errors: true
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - ubuntu2404STIG_stigrule_270721_manage | default(true) | bool
    - _stigrule_270721_pkcs11_functional is defined

- name: "stigrule_single_line_check"
  ansible.builtin.shell:
    cmd: "grep -Fq -- {{ item.line | quote }} {{ item.path | quote }}"
  register: _stigrule_32_single_line_checks
  changed_when: false
  failed_when: false
  check_mode: false
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - lookup('vars', item.manage_var, default=true) | bool
    - item.id != '270724'
  loop:
    - {
        id: "270704",
        manage_var: "ubuntu2404STIG_stigrule_270704_manage",
        path: "/etc/security/pwquality.conf",
        line: "dictcheck=1",
      }
    - {
        id: "270721",
        manage_var: "ubuntu2404STIG_stigrule_270721_manage",
        path: "/etc/pam.d/common-auth",
        line: "auth [success=2 default=ignore] pam_pkcs11.so",
      }
    - {
        id: "270725",
        manage_var: "ubuntu2404STIG_stigrule_270725_manage",
        path: "/etc/pam.d/common-password",
        line: "password [success=1 default=ignore] pam_unix.so obscure sha512",
      }
    - {
        id: "270734",
        manage_var: "ubuntu2404STIG_stigrule_270734_manage",
        path: "/etc/sssd/sssd.conf",
        line: "offline_credentials_expiration = 1",
      }
  loop_control:
    label: "stigrule_{{ item.id }}"

- name: "stigrule_single_line_assert"
  ansible.builtin.assert:
    that:
      - item.rc == 0
    fail_msg: "Required setting for STIG {{ item.item.id }} is missing or incorrect"
    success_msg: "Required setting for STIG {{ item.item.id }} is present"
  ignore_errors: true
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - item is mapping
  loop: "{{ _stigrule_32_single_line_checks.results | default([]) }}"
  loop_control:
    label: "stigrule_{{ item.item.id if (item is mapping and item.item is defined) else 'unknown' }}"

- name: "stigrule_270704_dictcheck_remediate"
  ansible.builtin.lineinfile:
    path: /etc/security/pwquality.conf
    regexp: "^dictcheck="
    line: "dictcheck=1"
    create: true
  when:
    - _ubuntu2404_stig_phase != 'audit'
    - ubuntu2404STIG_stigrule_270704_manage | default(true) | bool

