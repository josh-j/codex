    success_msg: "Root account is locked"
  ignore_errors: true
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - ubuntu2404STIG_stigrule_270724_manage | default(true) | bool
    - _stigrule_270724_root_status is defined

- name: "stigrule_270724_root_lock_remediate"
