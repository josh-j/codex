    - ubuntu2404STIG_stigrule_270721_manage | default(true) | bool

- name: "stigrule_270723_270738_pkcs11_functional_check"
  ansible.builtin.shell:
    cmd: |
      set -e
      dpkg -l pam-pkcs11 2>/dev/null | grep -q '^ii'
      test -f /usr/lib/x86_64-linux-gnu/security/pam_pkcs11.so -o -f /usr/lib/security/pam_pkcs11.so
  register: _stigrule_270723_pkcs11_functional
  changed_when: false
  failed_when: false
  check_mode: false
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - ubuntu2404STIG_stigrule_270723_manage | default(true) | bool
      or ubuntu2404STIG_stigrule_270737_manage | default(true) | bool
      or ubuntu2404STIG_stigrule_270738_manage | default(true) | bool

- name: "stigrule_270723_270738_pkcs11_functional_assert"
  ansible.builtin.assert:
    that:
      - _stigrule_270723_pkcs11_functional.rc == 0
    fail_msg: "pam_pkcs11 is not installed — smartcard cert_policy checks cannot function"
    success_msg: "pam_pkcs11 module is installed and present"
  ignore_errors: true
  when:
    - _ubuntu2404_stig_phase == 'audit'
