    - _ubuntu2404_stig_phase == 'audit'
    - ubuntu2404STIG_stigrule_270713_manage | default(true) | bool
    - _stigrule_270713_blank_passwords is defined

- name: "stigrule_270713_blank_passwords_remediate"
