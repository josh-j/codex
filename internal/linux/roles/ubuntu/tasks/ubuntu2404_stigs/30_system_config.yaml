    - { key: "PASS_MAX_DAYS", line: "{{ ubuntu2404STIG_stigrule_270731__etc_login_defs_line }}", manage_var: "ubuntu2404STIG_stigrule_270731_manage" }
    - { key: "ENCRYPT_METHOD", line: "{{ ubuntu2404STIG_stigrule_270739__etc_login_defs_line }}", manage_var: "ubuntu2404STIG_stigrule_270739_manage" }
  loop_control:
    label: "{{ item.key }}"
  when:
    - _ubuntu2404_stig_phase != 'audit'
    - lookup('vars', item.manage_var, default=true) | bool

- name: "stigrule_270752_chrony_makestep_remediate"
  ansible.builtin.lineinfile:
    path: /etc/chrony/chrony.conf
    regexp: '^\s*makestep\s+'
    line: "{{ ubuntu2404STIG_stigrule_270752_chrony_makestep_line }}"
    create: true
  when:
    - _ubuntu2404_stig_phase != 'audit'
    - ubuntu2404STIG_stigrule_270752_manage | default(true) | bool

- name: "stigrule_270773_unattended_upgrades_remediate"
  ansible.builtin.lineinfile:
    path: /etc/apt/apt.conf.d/50unattended-upgrades
    regexp: '^\s*{{ item.key }}'
    line: "{{ item.line }}"
    create: true
  loop:
    - { key: 'Unattended-Upgrade::Remove-Unused-Dependencies', line: "{{ ubuntu2404STIG_stigrule_270773__etc_apt_apt_conf_d_50unattended_upgrades_Remove_Unused_Dependencies_line }}" }
    - { key: 'Unattended-Upgrade::Remove-Unused-Kernel-Packages', line: "{{ ubuntu2404STIG_stigrule_270773__etc_apt_apt_conf_d_50unattended_upgrades_Remove_Unused_Kernel_Packages_line }}" }
  loop_control:
    label: "{{ item.key }}"
  when:
    - _ubuntu2404_stig_phase != 'audit'
    - ubuntu2404STIG_stigrule_270773_manage | default(true) | bool
