# -----------------------------------------------------------------------------
# SV-270705r1068354
# pwquality enforcing and PAM line
# -----------------------------------------------------------------------------
- name: "stigrule_270705_pwquality_enforcing_remediate"
  ansible.builtin.lineinfile:
    path: /etc/security/pwquality.conf
    regexp: '^\s*enforcing\s*='
    line: "{{ ubuntu2404STIG_stigrule_270705_pwquality_enforcing_line }}"
    create: true
  when:
    - _ubuntu2404_stig_phase != 'audit'
    - ubuntu2404STIG_stigrule_270705_manage | default(true) | bool

- name: "stigrule_270705_pam_pwquality_remediate"
  ansible.builtin.lineinfile:
    path: /etc/pam.d/common-password
    regexp: '^\s*password\s+requisite\s+pam_pwquality\.so'
    line: "{{ ubuntu2404STIG_stigrule_270705_pam_pwquality_line }}"
    insertbefore: '^\s*password\s+\[success='
    create: false
  when:
    - _ubuntu2404_stig_phase != 'audit'
    - ubuntu2404STIG_stigrule_270705_manage | default(true) | bool

# -----------------------------------------------------------------------------
# Remediations for stigrule_line_check items (270683, 270695, 270706, 270716,
