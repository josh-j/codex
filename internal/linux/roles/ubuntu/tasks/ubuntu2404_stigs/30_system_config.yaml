- name: "stigrule_pwquality_conf_remediate"
  ansible.builtin.lineinfile:
    path: /etc/security/pwquality.conf
    regexp: '^\s*{{ item.key }}\s*='
    line: "{{ item.line }}"
    create: true
  loop:
    - { key: "ucredit", line: "{{ ubuntu2404STIG_stigrule_270726__etc_security_pwquality_conf_line }}", manage_var: "ubuntu2404STIG_stigrule_270726_manage" }
    - { key: "lcredit", line: "{{ ubuntu2404STIG_stigrule_270727__etc_security_pwquality_conf_line }}", manage_var: "ubuntu2404STIG_stigrule_270727_manage" }
    - { key: "dcredit", line: "{{ ubuntu2404STIG_stigrule_270728__etc_security_pwquality_conf_line }}", manage_var: "ubuntu2404STIG_stigrule_270728_manage" }
    - { key: "difok", line: "{{ ubuntu2404STIG_stigrule_270729__etc_security_pwquality_conf_line }}", manage_var: "ubuntu2404STIG_stigrule_270729_manage" }
    - { key: "minlen", line: "{{ ubuntu2404STIG_stigrule_270732__etc_security_pwquality_conf_line }}", manage_var: "ubuntu2404STIG_stigrule_270732_manage" }
    - { key: "ocredit", line: "{{ ubuntu2404STIG_stigrule_270733__etc_security_pwquality_conf_line }}", manage_var: "ubuntu2404STIG_stigrule_270733_manage" }
  loop_control:
    label: "{{ item.key }}"
  when:
    - _ubuntu2404_stig_phase != 'audit'
    - lookup('vars', item.manage_var, default=true) | bool

- name: "stigrule_login_defs_remediate"
  ansible.builtin.lineinfile:
