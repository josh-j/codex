- name: "stigrule_270678_not_applicable"
  ansible.builtin.debug:
    msg: "GDM3 not installed — session lock control is not applicable."
  when:
    - ubuntu2404STIG_stigrule_270678_manage | default(true) | bool
    - ansible_facts.packages['gdm3'] is not defined

- name: "stigrule_270678_dconf_session_lock_check"
  ansible.builtin.shell:
    cmd: |
      set -e
      grep -Fqx -- "[org/gnome/desktop/session]" /etc/dconf/db/local.d/00-screensaver
      grep -Fqx -- "idle-delay={{ ubuntu2404STIG_stigrule_270678__etc_dconf_db_local_d_00_screensaver_idle_delay_value }}" /etc/dconf/db/local.d/00-screensaver
      grep -Fqx -- "[org/gnome/desktop/screensaver]" /etc/dconf/db/local.d/00-screensaver
      grep -Fqx -- "lock-enabled={{ ubuntu2404STIG_stigrule_270678__etc_dconf_db_local_d_00_screensaver_lock_enabled_value }}" /etc/dconf/db/local.d/00-screensaver
      grep -Fqx -- "lock-delay={{ ubuntu2404STIG_stigrule_270678__etc_dconf_db_local_d_00_screensaver_lock_delay_value }}" /etc/dconf/db/local.d/00-screensaver
  register: _stigrule_270678_dconf
  changed_when: false
  failed_when: false
  check_mode: false
  when:
    - ubuntu2404STIG_stigrule_270678_manage | default(true) | bool
    - ansible_facts.packages['gdm3'] is defined

- name: "stigrule_270678_dconf_session_lock_assert"
  ansible.builtin.assert:
    that:
      - _stigrule_270678_dconf.rc == 0
    fail_msg: "GDM session lock settings are incomplete or incorrect"
    success_msg: "GDM session lock settings match the required values"
  ignore_errors: true
  when:
    - ubuntu2404STIG_stigrule_270678_manage | default(true) | bool
    - ansible_facts.packages['gdm3'] is defined
    - _stigrule_270678_dconf is defined

