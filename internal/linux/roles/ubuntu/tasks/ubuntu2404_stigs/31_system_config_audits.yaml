  when:
    - ubuntu2404STIG_stigrule_270711_manage | default(true) | bool
    - ansible_facts.packages['gdm3'] is not defined

- name: "stigrule_dconf_ini_check"
  ansible.builtin.shell:
    cmd: |
      set -e
      grep -Fqx -- {{ ('[' ~ item.section ~ ']') | quote }} {{ item.path | quote }}
      grep -Fqx -- {{ (item.option ~ '=' ~ item.value) | quote }} {{ item.path | quote }}
  register: _stigrule_dconf_ini_checks
  changed_when: false
  failed_when: false
  check_mode: false
  when:
    - lookup('vars', item.manage_var, default=true) | bool
    - ansible_facts.packages['gdm3'] is defined
  loop:
    - {
        id: "270692",
        manage_var: "ubuntu2404STIG_stigrule_270692_manage",
        path: "/etc/gdm3/greeter.dconf-defaults",
        section: "org/gnome/login-screen",
        option: "banner-message-enable",
        value: "{{ ubuntu2404STIG_stigrule_270692__etc_gdm3_greeter_dconf_defaults_enable_value }}",
      }
    - {
        id: "270693",
        manage_var: "ubuntu2404STIG_stigrule_270693_manage",
        path: "/etc/gdm3/greeter.dconf-defaults",
        section: "org/gnome/login-screen",
        option: "banner-message-text",
        value: "{{ ubuntu2404STIG_stigrule_270693__etc_gdm3_greeter_dconf_defaults_text_value }}",
      }
    - {
        id: "270711",
        manage_var: "ubuntu2404STIG_stigrule_270711_manage",
        path: "/etc/dconf/db/local.d/00-screensaver",
        section: "org/gnome/settings-daemon/plugins/media-keys",
        option: "logout",
        value: "{{ ubuntu2404STIG_stigrule_270711__etc_dconf_db_local_d_00_screensaver_media_keys_value }}",
      }
  loop_control:
    label: "stigrule_{{ item.id }}"

# FIX: Added skipped guard — without it, skipped check results still
# enter the assert loop and can produce false failures.
- name: "stigrule_dconf_ini_assert"
  ansible.builtin.assert:
    that:
      - item.rc == 0
    fail_msg: "Dconf setting for STIG {{ item.item.id }} is missing or incorrect"
    success_msg: "Dconf setting for STIG {{ item.item.id }} matches the required value"
  ignore_errors: true
  when:
    - item is mapping
    - not (item.skipped | default(false))
  loop: "{{ _stigrule_dconf_ini_checks.results | default([]) }}"
  loop_control:
    label: "stigrule_{{ item.item.id if (item is mapping and item.item is defined) else 'unknown' }}"

- name: "stigrule_270705_pwquality_check"
  ansible.builtin.shell:
    cmd: |
      set -e
      grep -Fqx -- {{ ubuntu2404STIG_stigrule_270705_pwquality_enforcing_line | quote }} /etc/security/pwquality.conf
      grep -Fqx -- {{ (ubuntu2404STIG_stigrule_270705_pam_pwquality_line | default('password requisite pam_pwquality.so retry=3')) | quote }} /etc/pam.d/common-password
  register: _stigrule_270705_pwquality
  changed_when: false
  failed_when: false
  check_mode: false
  when:
    - ubuntu2404STIG_stigrule_270705_manage | default(true) | bool

- name: "stigrule_270705_pwquality_assert"
  ansible.builtin.assert:
    that:
      - _stigrule_270705_pwquality.rc == 0
    fail_msg: "pwquality settings are incomplete or incorrect"
    success_msg: "pwquality settings match the required values"
  ignore_errors: true
  when:
    - ubuntu2404STIG_stigrule_270705_manage | default(true) | bool
    - _stigrule_270705_pwquality is defined

- name: "stigrule_ssh_setting_check"
  ansible.builtin.shell:
    cmd: "{{ item.check_cmd }}"
  register: _ssh_setting_checks
  changed_when: false
  failed_when: false
  check_mode: false
  when:
    - lookup('vars', item.manage_var, default=true) | bool
    - ansible_facts.packages['openssh-server'] is defined
  loop:
    - {
        id: "270708",
        manage_var: "ubuntu2404STIG_stigrule_270708_manage",
        check_cmd: "grep -rsiE '^\\s*X11Forwarding\\s+' /etc/ssh/sshd_config /etc/ssh/sshd_config.d 2>/dev/null",
      }
    - {
        id: "270709",
        manage_var: "ubuntu2404STIG_stigrule_270709_manage",
        check_cmd: "grep -rsiE '^\\s*X11UseLocalhost\\s+' /etc/ssh/sshd_config /etc/ssh/sshd_config.d 2>/dev/null",
      }
    - {
        id: "270717",
        manage_var: "ubuntu2404STIG_stigrule_270717_manage",
        check_cmd: "grep -rsiE '^\\s*(PermitEmptyPasswords|PermitUserEnvironment)\\s+' /etc/ssh/sshd_config /etc/ssh/sshd_config.d 2>/dev/null",
      }
    - {
        id: "270722",
        manage_var: "ubuntu2404STIG_stigrule_270722_manage",
        check_cmd: "grep -rsiE '^\\s*PubkeyAuthentication\\s+' /etc/ssh/sshd_config /etc/ssh/sshd_config.d 2>/dev/null",
      }
    - {
        id: "270741",
        manage_var: "ubuntu2404STIG_stigrule_270741_manage",
        check_cmd: "grep -rsiE '^\\s*UsePAM\\s+' /etc/ssh/sshd_config /etc/ssh/sshd_config.d 2>/dev/null",
      }
    - {
        id: "270742",
        manage_var: "ubuntu2404STIG_stigrule_270742_manage",
        check_cmd: "grep -rsiE '^\\s*ClientAliveCountMax\\s+' /etc/ssh/sshd_config /etc/ssh/sshd_config.d 2>/dev/null",
      }
    - {
        id: "270743",
        manage_var: "ubuntu2404STIG_stigrule_270743_manage",
        check_cmd: "grep -rsiE '^\\s*ClientAliveInterval\\s+' /etc/ssh/sshd_config /etc/ssh/sshd_config.d 2>/dev/null",
      }
  loop_control:
    label: "stigrule_{{ item.id }}"

# FIX: Removed trailing $ from regex anchors. Jinja2's search() filter
# uses re.search without re.MULTILINE, so $ only matches end-of-string,
# not end-of-line. For multi-line stdout (270717 returns 2 lines),
# 'PermitEmptyPasswords no$' fails because the string doesn't end there.
# Substring match is safe here — stdout_lines length check already
# guards against extra/conflicting entries.
- name: "stigrule_ssh_setting_assert"
  ansible.builtin.assert:
    that: "{{ _assertions_map[item.item.id] }}"
    fail_msg: "SSH setting {{ item.item.id }} is missing, commented, or conflicting across config includes"
    success_msg: "SSH setting {{ item.item.id }} matches the required value"
  vars:
    _assertions_map:
      "270708":
        - item.stdout_lines | length == 1
        - item.stdout is search('X11Forwarding no')
      "270709":
        - item.stdout_lines | length == 1
        - item.stdout is search('X11UseLocalhost yes')
      "270717":
        - item.stdout_lines | length == 2
        - item.stdout is search('PermitEmptyPasswords no')
        - item.stdout is search('PermitUserEnvironment no')
      "270722":
        - item.stdout_lines | length == 1
