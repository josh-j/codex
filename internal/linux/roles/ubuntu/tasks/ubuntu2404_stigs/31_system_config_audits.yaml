  register: _stigrule_270652_aide
  changed_when: false
  failed_when: false
  check_mode: false
  when:
    - ubuntu2404STIG_stigrule_270652_manage | default(true) | bool

- name: "stigrule_270652_aide_silentreports_assert"
  ansible.builtin.assert:
