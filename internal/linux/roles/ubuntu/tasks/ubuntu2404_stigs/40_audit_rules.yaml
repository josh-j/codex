---
# ubuntu2404_stigs/40_audit_rules.yaml
# =============================================================================
# Audit rules loaded via augenrules
# =============================================================================

- name: "stigrule_audit_rule"
  ansible.builtin.lineinfile:
    path: /etc/audit/rules.d/stig.rules
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    create: true
  notify: reload_audit_rules
  when:
    - lookup('vars', item.manage_var, default=true) | bool
  loop:
    - {
        id: "270684",
        manage_var: "ubuntu2404STIG_stigrule_270684_manage",
        regexp: "^-w /etc/passwd -p wa -k usergroup_modification$",
        line: "{{ ubuntu2404STIG_stigrule_270684__etc_audit_rules_d_stig_rules__etc_passwd_line }}",
      }
    - {
        id: "270685",
        manage_var: "ubuntu2404STIG_stigrule_270685_manage",
        regexp: "^-w /etc/group -p wa -k usergroup_modification$",
        line: "{{ ubuntu2404STIG_stigrule_270685__etc_audit_rules_d_stig_rules__etc_group_line }}",
