---
# Shared reboot check + conditional reboot.
# Used by both maintain and update flows.

- name: "Ubuntu | Check if reboot is required"
  ansible.builtin.stat:
    path: /var/run/reboot-required
  register: _reboot_required_stat

- name: "Ubuntu | Reboot if required"
  ansible.builtin.reboot:
    msg: "Rebooting for system updates (Ansible)"
  become: true
  when:
    - _reboot_required_stat.stat.exists
    - ubuntu_enable_upgrade_reboots | default(true) | bool
