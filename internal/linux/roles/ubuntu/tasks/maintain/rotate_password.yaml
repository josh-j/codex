---
# Password rotation for Ubuntu hosts.

- name: Build default Ubuntu user payload for password rotation
  ansible.builtin.set_fact:
    ubuntu_users:
      - name: "{{ rotate_user | default('root') }}"
        password: "{{ (rotate_password | default(vault_rotate_password)) | password_hash('sha512') }}"
        update_password: "always"
        force_change: "{{ rotate_force_change | default(true) | bool }}"
  no_log: true
  when: ubuntu_users is not defined or (ubuntu_users | length == 0)

- name: Manage User Passwords and Aging
  ansible.builtin.user:
    name: "{{ item.name }}"
    password: "{{ item.password }}"
    update_password: "{{ item.update_password | default('on_create') }}"
    password_expire_max: "{{ ubuntu_pass_max_days }}"
    password_expire_min: "{{ ubuntu_pass_min_days }}"
    password_expire_warn: "{{ ubuntu_pass_warn_days }}"
    shell: "{{ item.shell | default('/bin/bash') }}"
    state: present
  loop: "{{ ubuntu_users }}"
  loop_control:
    label: "{{ item.name }}"
  no_log: true
  register: _user_mods

- name: Enforce Password Change on next login (Optional)
  ansible.builtin.command: chage -d 0 {{ item.name }}
  loop: "{{ ubuntu_users }}"
  when:
    - item.force_change | default(false) | bool
    - _user_mods.changed
  loop_control:
    label: "{{ item.name }}"
  changed_when: true

- name: Audit Security State if users changed
  ansible.builtin.include_role:
    name: internal.linux.ubuntu
  vars:
    ncs_action: collect
  when: _user_mods.changed
  tags: [skip_ansible_lint]
