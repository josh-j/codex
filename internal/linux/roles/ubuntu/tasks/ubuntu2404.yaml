# ubuntu2404.yaml

- name: "Ubuntu STIG | Prelude"
  ansible.builtin.import_tasks: ubuntu2404_stigs/00_prelude.yaml

- name: "Ubuntu STIG | Packages and services"
  ansible.builtin.import_tasks: ubuntu2404_stigs/10_packages_services.yaml

- name: "Ubuntu STIG | SSH crypto"
  ansible.builtin.import_tasks: ubuntu2404_stigs/20_ssh_crypto.yaml
- name: "Ubuntu STIG | System config"
  ansible.builtin.import_tasks: ubuntu2404_stigs/30_system_config.yaml

# Use include_tasks for files that are phase-gated
- name: "Ubuntu STIG | System config audits"
  ansible.builtin.include_tasks: ubuntu2404_stigs/31_system_config_audits.yaml
  when: _ubuntu2404_stig_phase == 'audit'
- name: "Ubuntu STIG | Access and PAM"
  ansible.builtin.import_tasks: ubuntu2404_stigs/32_access_pam.yaml

- name: "Ubuntu STIG | Filesystem, network, and PKI"
  ansible.builtin.import_tasks: ubuntu2404_stigs/33_fs_network_pki.yaml

- name: "Ubuntu STIG | AIDE"
  ansible.builtin.import_tasks: ubuntu2404_stigs/34_aide.yaml

- name: "Ubuntu STIG | Remaining filesystem and audit log controls"
  ansible.builtin.import_tasks: ubuntu2404_stigs/35_remaining_fs_audit.yaml

- name: "Ubuntu STIG | Audit rules"
  ansible.builtin.import_tasks: ubuntu2404_stigs/40_audit_rules.yaml

- name: "Ubuntu STIG | Shelter immutable rules before handler flush"
  ansible.builtin.shell:
    cmd: >
      [ -f /etc/audit/rules.d/99-stig-immutable.rules ] &&
      mv /etc/audit/rules.d/99-stig-immutable.rules /tmp/_stig_immutable_stash.rules &&
      echo "stashed" || echo "none"
  changed_when: false
  failed_when: false
  check_mode: false
  when: _ubuntu2404_stig_phase != 'audit'

- name: "Ubuntu STIG | Flush handlers before audit rule verification"
  ansible.builtin.meta: flush_handlers

- name: "Ubuntu STIG | Load audit rules (without immutable flag)"
  ansible.builtin.command:
    cmd: augenrules --load
  changed_when: false
  failed_when: false
  check_mode: false
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - "'auditd.service' in ansible_facts.services | default({})"

- name: "Ubuntu STIG | Audit rule audits"
  ansible.builtin.include_tasks: ubuntu2404_stigs/41_audit_rule_audits.yaml
  when: _ubuntu2404_stig_phase == 'audit'

- name: "Ubuntu STIG | Audit daemon and tooling"
  ansible.builtin.import_tasks: ubuntu2404_stigs/42_auditd_controls.yaml

- name: "Ubuntu STIG | Restore and load immutable audit rules"
  ansible.builtin.shell:
    cmd: |
      [ -f /tmp/_stig_immutable_stash.rules ] && mv /tmp/_stig_immutable_stash.rules /etc/audit/rules.d/99-stig-immutable.rules
      augenrules --load 2>/dev/null || true
  changed_when: false
  failed_when: false
  check_mode: false
  when: _ubuntu2404_stig_phase != 'audit'
