---
# internal.linux.ubuntu : tasks/stig.yaml
# =============================================================================
# Ubuntu 24.04 STIG — single-file audit/remediate pattern
#
# This follows the same approach as the Photon STIG role:
#   - One task file (ubuntu2404_stig_remediations.yaml) used for both paths
#   - Audit-only mode:  include_tasks with check_mode: true
#   - Remediate mode:   include_tasks with check_mode: false
#
# The ncs_collector callback captures runner events from every module call
# (apt, lineinfile, service, sysctl, etc.) and records pass/fail based on
# check_mode + changed status.  Task names carry stigrule_XXXXXX prefixes
# which the collector extracts as rule numbers.
# =============================================================================

# =============================================================================
# Phase 0 | Preconditions
# =============================================================================
- name: "Ubuntu STIG | Phase 0 | Gather service facts"
  ansible.builtin.service_facts:

- name: "Ubuntu STIG | Phase 0 | Determine run mode"
  ansible.builtin.set_fact:
    _ubuntu_stig_audit_only: >-
      {{ (ubuntu_enable_stig_audit | default(true) | bool)
         and not (ubuntu_enable_stig_hardening | default(false) | bool) }}
  changed_when: false

- name: "Ubuntu STIG | Phase 0 | Register target context for ncs_collector"
  ansible.builtin.set_fact:
    _ncs_stig_target_host: "{{ inventory_hostname }}"
    _ncs_stig_target_type: "ubuntu"
  tags:
    - always

# Add this right before the Phase 1 block
- name: "Ubuntu STIG | Phase 0 | Set phase hint for included tasks"
  ansible.builtin.set_fact:
    _ubuntu_stig_phase_hint: "{{ 'audit' if (_ubuntu_stig_audit_only | bool) else 'remediate' }}"
  changed_when: false
# =============================================================================
# Phase 1 | Evaluate / Remediate
#
# In audit-only mode the remediation tasks run under check_mode: true.
# The collector interprets:
#   check_mode + changed:true   → "failed"  (non-compliant)
#   check_mode + changed:false  → "pass"    (compliant)
#   real run   + changed:true   → "fixed"   (remediated)
#   real run   + changed:false  → "pass"    (already compliant)
#
# In remediate mode tasks run normally (check_mode: false).
# =============================================================================
- name: "Ubuntu STIG | Phase 1 | Evaluate and/or remediate"
  when:
    - ubuntu_enable_stig_audit | default(true) | bool or ubuntu_enable_stig_hardening | default(false) | bool
  block:
    - name: "Ubuntu STIG | Phase 1a | Run STIG tasks"
      ansible.builtin.include_tasks:
        file: ubuntu2404.yaml
        apply:
          check_mode: "{{ _ubuntu_stig_audit_only | bool }}"
          tags: [stig_task]
      tags: [stig, security]

    - name: "Ubuntu STIG | Phase 1b | Flag run as complete"
      ansible.builtin.set_fact:
        _stig_audit_ran: true
        _stig_remediation_ran: "{{ not (_ubuntu_stig_audit_only | bool) }}"
      changed_when: false
  rescue:
    - name: "Ubuntu STIG | Phase 1r | Set failure flag"
      ansible.builtin.set_fact:
        _stig_run_failed: true
      changed_when: false

    - name: "Ubuntu STIG | Phase 1r | Log failure"
      ansible.builtin.debug:
        msg: >-
          Ubuntu STIG {{ 'audit' if (_ubuntu_stig_audit_only | bool) else 'remediation' }}
          failed on {{ inventory_hostname }}. Partial results emitted via ncs_collector.
  always:
    - name: "Ubuntu STIG | Phase 1 | Log completion"
      ansible.builtin.debug:
        msg: >-
          Ubuntu STIG {{ 'audit' if (_ubuntu_stig_audit_only | bool) else 'remediation' }}
          completed on {{ inventory_hostname }}. Results emitted via ncs_collector.

# =============================================================================
# Phase 2 | Post-remediation verification (remediate mode only)
#
# After remediation, re-run the same tasks in check_mode to verify.
# The collector will overwrite prior results with worst-status-wins,
# so a rule that was "fixed" but still shows changed in check_mode
# will correctly surface as an issue.
# =============================================================================
- name: "Ubuntu STIG | Phase 2 | Set phase hint to audit"
  ansible.builtin.set_fact:
    _ubuntu_stig_phase_hint: "audit"
  changed_when: false
  when:
    - not (_ubuntu_stig_audit_only | bool)
    - ubuntu_enable_stig_audit | default(true) | bool

- name: "Ubuntu STIG | Phase 2 | Post-remediation audit"
  when:
    - not (_ubuntu_stig_audit_only | bool)
    - ubuntu_enable_stig_audit | default(true) | bool
  block:
    - name: "Ubuntu STIG | Phase 2a | Verify remediation (check_mode)"
      ansible.builtin.include_tasks:
        file: ubuntu2404.yaml
        apply:
          check_mode: true
          tags: [stig_task]
      tags: [stig, security, verify]

    - name: "Ubuntu STIG | Phase 2b | Flag verification as complete"
      ansible.builtin.set_fact:
        _stig_audit_ran: true
      changed_when: false
  rescue:
    - name: "Ubuntu STIG | Phase 2r | Log failure"
      ansible.builtin.debug:
        msg: "Post-remediation STIG audit failed on {{ inventory_hostname }}. Exporting partial results."
# # =============================================================================
# # Phase 3 | Export
# # =============================================================================
# - name: "Ubuntu STIG | Phase 3 | Export results"
#   ansible.builtin.import_tasks: export.yaml
#   tags: [export, stig]
#   when: _stig_audit_ran | default(false) | bool
