---
# internal.linux.ubuntu : tasks/password_status.yaml

- name: "Ubuntu Password Status | Check SSH connectivity"
  ansible.builtin.wait_for_connection:
    timeout: "{{ ansible_ssh_timeout | default(10) }}"

- name: "Ubuntu Password Status | Get password aging info"
  ansible.builtin.command: chage -l {{ rotate_user | default('root') }}
  register: _ubuntu_chage
  changed_when: false

- name: "Ubuntu Password Status | Get account status"
  ansible.builtin.command: passwd -S {{ rotate_user | default('root') }}
  register: _ubuntu_passwd
  changed_when: false

- name: "Ubuntu Password Status | Display password status"
  ansible.builtin.debug:
    msg: |-
      === {{ inventory_hostname }} | {{ rotate_user | default('root') }} ===
      {{ _ubuntu_passwd.stdout }}
      {{ _ubuntu_chage.stdout }}
