# --- 270694 - SSH acknowledgement confirm script ---
- name: "stigrule_270694"
  internal.core.stig:
    _stig_check: |
      set -eu
      test -f /etc/profile.d/ssh_confirm.sh
      grep -q 'SSH_CLIENT' /etc/profile.d/ssh_confirm.sh
      grep -q 'DoD Notice and Consent Banner Acknowledgement' /etc/profile.d/ssh_confirm.sh
    cmd: |
      cat > /etc/profile.d/ssh_confirm.sh <<'SSHEOF'
      #!/bin/bash
      if [ -n "$SSH_CLIENT" ] || [ -n "$SSH_TTY" ]; then
        if [ -z "${DOD_SSH_BANNER_ACK:-}" ]; then
          while true; do
            read -r -p "DoD Notice and Consent Banner Acknowledgement [y/n]: " reply
            case "$reply" in
              y|Y)
                export DOD_SSH_BANNER_ACK=1
                break
                ;;
              n|N)
                echo "Session terminated."
                exit 1
                ;;
            esac
          done
        fi
      fi
      SSHEOF
      chown root:root /etc/profile.d/ssh_confirm.sh
      chmod 0755 /etc/profile.d/ssh_confirm.sh

