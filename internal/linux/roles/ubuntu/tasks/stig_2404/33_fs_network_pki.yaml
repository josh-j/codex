# =============================================================================
# Platform hardening
# =============================================================================

# --- 270771 - NX bit ---
- name: "stigrule_270771"
  internal.core.stig:
    _stig_check: "dmesg 2>/dev/null | grep -qi 'execute disable' || grep -wq nx /proc/cpuinfo"
    cmd: "grep -wq nx /proc/cpuinfo"

# --- 270772 - ASLR (kernel.randomize_va_space = 2) ---
- name: "stigrule_270772"
  internal.core.stig:
    _stig_check: |
      set -eu
      [ "$(sysctl -n kernel.randomize_va_space)" = "2" ]
      grep -qE '^\s*kernel\.randomize_va_space\s*=\s*2\s*$' /etc/sysctl.d/10-kernel-hardening.conf
    cmd: |
      set -eu
      for f in /etc/sysctl.conf /etc/sysctl.d/*.conf /run/sysctl.d/*.conf /usr/local/lib/sysctl.d/*.conf /usr/lib/sysctl.d/*.conf /lib/sysctl.d/*.conf; do
        [ -f "$f" ] && sed -i '/^\s*kernel\.randomize_va_space\s*=/d' "$f" 2>/dev/null
      done
      echo 'kernel.randomize_va_space = 2' > /etc/sysctl.d/10-kernel-hardening.conf
      sysctl -p /etc/sysctl.d/10-kernel-hardening.conf

# =============================================================================
# Firewall
# =============================================================================

# --- 270719 - UFW firewall active ---
- name: "stigrule_270719"
  internal.core.stig:
    _stig_gate_packages: [ufw]
    _stig_gate_status: failed
    _stig_check: "ufw status | grep -q 'Status: active'"
    cmd: "ufw --force enable"

# --- 270754 - UFW rate limiting on listening services ---
- name: "stigrule_270754"
  internal.core.stig:
    _stig_gate_packages: [ufw]
    _stig_check: |
      set -eu
      ufw status | grep -q 'Status: active'
      ss -H -lntu | awk '{
        proto=$1; localaddr=$5
        if (localaddr ~ /127\.0\.0\.1:/ || localaddr ~ /\[::1\]:/) next
        sub(/^.*:/, "", localaddr)
        if (localaddr ~ /^[0-9]+$/) print localaddr "/" proto
      }' | sort -u | while IFS= read -r portproto; do
        [ -z "$portproto" ] && continue
        port="${portproto%/*}"
        proto="${portproto#*/}"
        ufw status | grep -Eq "^${port}/${proto}[[:space:]]+LIMIT[[:space:]]" || exit 1
      done
    cmd: |
      set -eu
      ufw --force enable
      ss -H -lntu | awk '{
        proto=$1; localaddr=$5
        if (localaddr ~ /127\.0\.0\.1:/ || localaddr ~ /\[::1\]:/) next
        sub(/^.*:/, "", localaddr)
        if (localaddr ~ /^[0-9]+$/) print localaddr "/" proto
      }' | sort -u | while IFS= read -r portproto; do
        [ -z "$portproto" ] && continue
        port="${portproto%/*}"
        proto="${portproto#*/}"
        ufw limit "${port}/${proto}" || true
      done

# --- 270755 - no wireless interfaces ---
- name: "stigrule_270755"
  internal.core.stig:
    _stig_check: |
      [ -z "$(ls -L -d /sys/class/net/*/wireless 2>/dev/null)" ]
    cmd: |
      set -eu
      for iface in $(ls -L -d /sys/class/net/*/wireless 2>/dev/null | xargs -r dirname | xargs -r basename); do
        ip link set "$iface" down || true
      done

# =============================================================================
# PKI / SSSD
# =============================================================================

# --- 270735 - SSSD PKI settings ---
- name: "stigrule_270735"
  internal.core.stig:
    _stig_gate_packages: [sssd]
    _stig_gate_status: failed
    _stig_check: |
      set -eu
      grep -R -E '^\s*services\s*=.*pam' /etc/sssd/sssd.conf /etc/sssd/conf.d/*.conf 2>/dev/null
      grep -R -E '^\s*pam_cert_auth\s*=\s*True\s*$' /etc/sssd/sssd.conf /etc/sssd/conf.d/*.conf 2>/dev/null
      grep -R -E '^\s*certificate_verification\s*=\s*ca_cert,ocsp\s*$' /etc/sssd/sssd.conf /etc/sssd/conf.d/*.conf 2>/dev/null
      grep -R -E '^\s*ca_cert\s*=\s*/etc/ssl/certs/ca-certificates\.crt\s*$' /etc/sssd/sssd.conf /etc/sssd/conf.d/*.conf 2>/dev/null
    cmd: |
      set -eu
      mkdir -p /etc/sssd/conf.d
      cat > /etc/sssd/conf.d/91-stig-pki.conf <<'PKIEOF'
      [sssd]
      services = nss,pam,ssh

      [pam]
      pam_cert_auth = True
      certificate_verification = ca_cert,ocsp
      ca_cert = /etc/ssl/certs/ca-certificates.crt
      PKIEOF
      chown root:root /etc/sssd/conf.d/91-stig-pki.conf
      chmod 0600 /etc/sssd/conf.d/91-stig-pki.conf

# --- 270744 - FIPS mode ---
- name: "stigrule_270744"
  internal.core.stig:
    _stig_gate_vars:
      stig_2404_stigrule_270744_pro_token: "non-empty"
    _stig_gate_status: not_reviewed
    _stig_check: '[ "$(cat /proc/sys/crypto/fips_enabled 2>/dev/null)" = "1" ]'
    cmd: |
      set -eu
      pro status >/dev/null 2>&1 || true
      pro attach {{ stig_2404_stigrule_270744_pro_token | quote }} || true
      {{ stig_2404_stigrule_270744_enable_command | default('pro enable fips-updates') }}
      grep -qE 'fips=1' /etc/default/grub || \
        sed -i 's/^\(GRUB_CMDLINE_LINUX=".*\)"/\1 fips=1"/' /etc/default/grub
      update-grub

# --- 270745 - DoD CA certificates ---
- name: "stigrule_270745"
  internal.core.stig:
    _stig_audit_only: true
    _stig_check: "grep -ir DOD /etc/ssl/certs >/dev/null 2>&1"
    cmd: "true"
