# --- 270680 - TMOUT profile ---
# copy with content: requires the copy action plugin (not just module),
# so we keep this as a regular task.
- name: "stigrule_270680"
  ansible.builtin.copy:
    dest: "{{ stig_2404_stigrule_270680__etc_profile_d_99_terminal_tmout_sh_dest }}"
    content: "{{ stig_2404_stigrule_270680__etc_profile_d_99_terminal_tmout_sh_content }}"
    owner: root
    group: root
    mode: "0644"
  when:
    - _ubuntu2404_stig_phase != 'audit'
    - stig_2404_stigrule_270680_manage | default(true) | bool

# --- 270691 - SSH banner /etc/issue.net ---
- name: "stigrule_270691"
  ansible.builtin.copy:
