---
# =============================================================================
# Accounts, PAM, and password policy — split from 30_system_config.yaml
# =============================================================================

# --- 270705 - pwquality enforcing + pam line ---
- name: "stigrule_270705"
  internal.core.stig:
    _stig_check: |
      set -eu
      grep -qE '^\s*enforcing\s*=\s*1' /etc/security/pwquality.conf
      grep -qE '^\s*password\s+requisite\s+pam_pwquality\.so' /etc/pam.d/common-password
    cmd: |
      set -eu
      grep -qE '^\s*enforcing\s*=' /etc/security/pwquality.conf && \
        sed -i 's/^\s*enforcing\s*=.*/{{ stig_2404_stigrule_270705_pwquality_enforcing_line }}/' /etc/security/pwquality.conf || \
        echo '{{ stig_2404_stigrule_270705_pwquality_enforcing_line }}' >> /etc/security/pwquality.conf
      grep -qE '^\s*password\s+requisite\s+pam_pwquality\.so' /etc/pam.d/common-password && \
        sed -i 's|^\s*password\s\+requisite\s\+pam_pwquality\.so.*|{{ stig_2404_stigrule_270705_pam_pwquality_line }}|' /etc/pam.d/common-password || \
        sed -i '/^\s*password\s\+\[success=/i {{ stig_2404_stigrule_270705_pam_pwquality_line }}' /etc/pam.d/common-password

# --- Simple lineinfile rules ---
- name: "stigrule_270683"
  internal.core.stig:
    _stig_apply: ansible.builtin.lineinfile
    path: /etc/default/useradd
    regexp: '^\s*INACTIVE\s*='
    line: "{{ stig_2404_stigrule_270683_useradd_inactive_line }}"
    create: true

- name: "stigrule_270695"
  internal.core.stig:
    _stig_apply: ansible.builtin.lineinfile
    path: /etc/apt/apt.conf.d/01-vendor-ubuntu
    regexp: '^\s*APT::Get::AllowUnauthenticated\s+'
    line: "{{ stig_2404_stigrule_270695__etc_apt_apt_conf_d_01_vendor_ubuntu_line }}"
    create: true

- name: "stigrule_270706"
  internal.core.stig:
    _stig_apply: ansible.builtin.lineinfile
    path: /etc/pam.d/common-auth
    regexp: '^\s*auth\s+required\s+pam_faildelay\.so'
    line: "{{ stig_2404_stigrule_270706_pam_faildelay_line }}"
    create: false

- name: "stigrule_270716"
  internal.core.stig:
    _stig_apply: ansible.builtin.lineinfile
    path: /etc/login.defs
    regexp: '^\s*UMASK\s+'
