---
# =============================================================================
# 270784 / 270785 / 270809 — persistent syscall audit rules
# Migrated to internal.core.stig
# =============================================================================

- block:
    # --- xattr syscalls (270784 a-d) ---
    - name: "stigrule_270784a"
      internal.core.stig:
        regexp: "^-a always,exit -F arch=b32 -S setxattr,fsetxattr,lsetxattr,removexattr,fremovexattr,lremovexattr -F auid>=1000 -F auid!=-1 -k .+$"
        line: "-a always,exit -F arch=b32 -S setxattr,fsetxattr,lsetxattr,removexattr,fremovexattr,lremovexattr -F auid>=1000 -F auid!=-1 -k perm_mod"
      notify: reload_audit_rules

    - name: "stigrule_270784b"
      internal.core.stig:
        regexp: "^-a always,exit -F arch=b32 -S setxattr,fsetxattr,lsetxattr,removexattr,fremovexattr,lremovexattr -F auid=0 -k .+$"
        line: "-a always,exit -F arch=b32 -S setxattr,fsetxattr,lsetxattr,removexattr,fremovexattr,lremovexattr -F auid=0 -k perm_mod"
      notify: reload_audit_rules

    - name: "stigrule_270784c"
      internal.core.stig:
        regexp: "^-a always,exit -F arch=b64 -S setxattr,fsetxattr,lsetxattr,removexattr,fremovexattr,lremovexattr -F auid>=1000 -F auid!=-1 -k .+$"
        line: "-a always,exit -F arch=b64 -S setxattr,fsetxattr,lsetxattr,removexattr,fremovexattr,lremovexattr -F auid>=1000 -F auid!=-1 -k perm_mod"
      notify: reload_audit_rules

    - name: "stigrule_270784d"
      internal.core.stig:
        regexp: "^-a always,exit -F arch=b64 -S setxattr,fsetxattr,lsetxattr,removexattr,fremovexattr,lremovexattr -F auid=0 -k .+$"
        line: "-a always,exit -F arch=b64 -S setxattr,fsetxattr,lsetxattr,removexattr,fremovexattr,lremovexattr -F auid=0 -k perm_mod"
      notify: reload_audit_rules

    # --- chown syscalls (270785 a-b) ---
    - name: "stigrule_270785a"
      internal.core.stig:
        regexp: "^-a always,exit -F arch=b32 -S chown,fchown,fchownat,lchown -F auid>=1000 -F auid!=-1 -k .+$"
        line: "-a always,exit -F arch=b32 -S chown,fchown,fchownat,lchown -F auid>=1000 -F auid!=-1 -k perm_chng"
      notify: reload_audit_rules

    - name: "stigrule_270785b"
      internal.core.stig:
        regexp: "^-a always,exit -F arch=b64 -S chown,fchown,fchownat,lchown -F auid>=1000 -F auid!=-1 -k .+$"
        line: "-a always,exit -F arch=b64 -S chown,fchown,fchownat,lchown -F auid>=1000 -F auid!=-1 -k perm_chng"
      notify: reload_audit_rules

    # --- delete syscalls (270809 a-b) ---
    - name: "stigrule_270809a"
      internal.core.stig:
        regexp: "^-a always,exit -F arch=b64 -S unlink,unlinkat,rename,renameat,rmdir -F auid>=1000 -F auid!=-1 -k .+$"
        line: "-a always,exit -F arch=b64 -S unlink,unlinkat,rename,renameat,rmdir -F auid>=1000 -F auid!=-1 -k delete"
      notify: reload_audit_rules

    - name: "stigrule_270809b"
      internal.core.stig:
        regexp: "^-a always,exit -F arch=b32 -S unlink,unlinkat,rename,renameat,rmdir -F auid>=1000 -F auid!=-1 -k .+$"
        line: "-a always,exit -F arch=b32 -S unlink,unlinkat,rename,renameat,rmdir -F auid>=1000 -F auid!=-1 -k delete"
      notify: reload_audit_rules

  module_defaults:
    internal.core.stig:
      _stig_apply: ansible.builtin.lineinfile
      _stig_notify: [reload_audit_rules]
      _stig_gate_packages: [auditd]
      _stig_gate_status: failed
      path: /etc/audit/rules.d/stig.rules
      create: true
      mode: "0640"
