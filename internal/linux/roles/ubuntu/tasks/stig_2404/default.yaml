---
# collections/ansible_collections/internal/linux/roles/ubuntu/tasks/stig_2404/default.yaml

# =============================================================================
# SITE-SPECIFIC — must be configured per-environment before use
# =============================================================================

# Audisp remote syslog/SIEM destination (SV-270658)
stig_2404_stigrule_270658_remote_server: ""

# Site helper — audisp-syslog forwarder (not a STIG rule).
# Opt-in because rule 270829 locks audit logs to root:root 0600, so any
# syslog daemon that needs audit events must receive them via the audispd
# plugin (running inside auditd as root) rather than reading the files.
# Requires audispd-plugins; rsyslog must be configured to handle the
# chosen facility (default local6).
stig_2404_site_audisp_syslog_manage: false
stig_2404_site_audisp_syslog_priority: "LOG_INFO"
stig_2404_site_audisp_syslog_facility: "LOG_LOCAL6"

# NTP server (SV-270751)
stig_2404_stigrule_270751_chrony_server: "172.25.70.11"

# Authorized sudo members (SV-270748)
stig_2404_stigrule_270748_authorized_sudo_members:
  - "josh"

# SSSD / LDAP (SV-270734/735/736)
stig_2404_sssd_domain: "area52.afnoapps.usaf.mil"
stig_2404_sssd_ldap_uri: "ldap://ftfa-dc-006v.area52.afnoapps.usaf.mil"
stig_2404_sssd_ldap_search_base: "DC=area52,DC=afnoapps,DC=usaf,DC=mil"

# DoD Root CA (SV-270745)
stig_2404_stigrule_270745_dod_ca_filename: "dod-root-ca.crt"
stig_2404_stigrule_270745_dod_ca_content: ""

# Ubuntu Pro token (SV-270744)
stig_2404_stigrule_270744_pro_token: ""

# GRUB password hash (SV-270675)
stig_2404_stigrule_270675_grub_pbkdf2_hash: ""

# LUKS/crypttab entries (SV-270747)
stig_2404_stigrule_270747_crypttab_entries:
  - "cryptpart    UUID=b02f4154-b7a2-4cf7-abfc-d4b85363d32a    none    luks"

# Audit log directory (SV-270816)
stig_2404_stigrule_270816_audit_log_mountpoint: "/var/log/audit"
stig_2404_stigrule_270816_min_free_kb: "13639976"

# Weekly audit offload rsync target (SV-270817)
stig_2404_stigrule_270817_audit_offload_destination: ""

# UFW rate-limited services (SV-270754)
stig_2404_stigrule_270754_limited_services: []

# UFW allowed rules (SV-270719)
stig_2404_stigrule_270719_allowed_ufw_rules:
  - { rule: "allow", port: "514", proto: "tcp" }
  - { rule: "allow", port: "514", proto: "udp" }
  - { rule: "allow", port: "22", proto: "tcp" }
  - { rule: "allow", port: "514", proto: "tcp" }
  - { rule: "allow", port: "123", proto: "udp" }
  - { rule: "allow", port: "Anywhere", proto: "tcp" }

# =============================================================================
# STIG CONFIGURATION VALUES — safe defaults, override in group/host vars
# =============================================================================

# --- Packages & services ---
stig_2404_stigrule_270650_run_deep_check: false
stig_2404_stigrule_270650_deep_check_timeout: 120
stig_2404_stigrule_270652_silentreports_line: "SILENTREPORTS=no"
stig_2404_stigrule_270657_auditd_enable_enabled: true
stig_2404_stigrule_270657_auditd_enable_state: "started"
stig_2404_stigrule_270660_apparmor_enable_enabled: true
stig_2404_stigrule_270660_apparmor_start_state: "started"
stig_2404_stigrule_270663_sssd_enable_enabled: true
stig_2404_stigrule_270663_sssd_enable_state: "started"
stig_2404_stigrule_270666_ssh_active_enabled: true
stig_2404_stigrule_270666_ssh_start_state: "started"

# --- SSH crypto ---
stig_2404_stigrule_270667_Ciphers_line: "Ciphers aes256-gcm@openssh.com,aes128-gcm@openssh.com,aes256-ctr,aes128-ctr"
stig_2404_stigrule_270668_MACs_line: "MACs hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com,hmac-sha2-512,hmac-sha2-256"
stig_2404_stigrule_270669_KexAlgorithms_line: "KexAlgorithms ecdh-sha2-nistp521,ecdh-sha2-nistp384,ecdh-sha2-nistp256,diffie-hellman-group-exchange-sha256,diffie-hellman-group16-sha512,diffie-hellman-group14-sha256"
stig_2404_stigrule_270670_Ciphers_line: "Ciphers aes256-gcm@openssh.com,aes128-gcm@openssh.com,aes256-ctr,aes128-ctr"
stig_2404_stigrule_270671_MACs_line: "MACs hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com,hmac-sha2-512,hmac-sha2-256"
stig_2404_stigrule_270743_ClientAliveInterval_line: "ClientAliveInterval 600"

# --- Accounts, PAM & password quality ---
stig_2404_stigrule_270683_useradd_inactive_line: "INACTIVE=35"
stig_2404_stigrule_270705_pam_pwquality_line: "password requisite pam_pwquality.so retry=3"
stig_2404_stigrule_270705_pwquality_enforcing_line: "enforcing = 1"
stig_2404_stigrule_270706_pam_faildelay_line: "auth    required    pam_faildelay.so    delay=4000000"
stig_2404_stigrule_270716__etc_login_defs_line: "UMASK 077"
stig_2404_stigrule_270726__etc_security_pwquality_conf_line: "ucredit=-1"
stig_2404_stigrule_270727__etc_security_pwquality_conf_line: "lcredit=-1"
stig_2404_stigrule_270728__etc_security_pwquality_conf_line: "dcredit=-1"
stig_2404_stigrule_270729__etc_security_pwquality_conf_line: "difok=8"
stig_2404_stigrule_270730__etc_login_defs_line: "PASS_MIN_DAYS 1"
stig_2404_stigrule_270731__etc_login_defs_line: "PASS_MAX_DAYS 60"
stig_2404_stigrule_270732__etc_security_pwquality_conf_line: "minlen=15"
stig_2404_stigrule_270733__etc_security_pwquality_conf_line: "ocredit=-1"
stig_2404_stigrule_270739__etc_login_defs_line: "ENCRYPT_METHOD SHA512"

# --- Desktop / GDM / screensaver ---
stig_2404_stigrule_270678__etc_dconf_db_local_d_00_screensaver_idle_delay_value: "uint32 900"
stig_2404_stigrule_270678__etc_dconf_db_local_d_00_screensaver_lock_delay_value: "uint32 600"
stig_2404_stigrule_270678__etc_dconf_db_local_d_00_screensaver_lock_enabled_value: "true"
stig_2404_stigrule_270692__etc_gdm3_greeter_dconf_defaults_enable_value: "true"
stig_2404_stigrule_270693__etc_gdm3_greeter_dconf_defaults_text_value: "'You are accessing a U.S. Government (USG) Information System (IS) that is provided for USG-authorized use only.\\n\\nBy using this IS (which includes any device attached to this IS), you consent to the following conditions:\\n\\n-The USG routinely intercepts and monitors communications on this IS for purposes including, but not limited to, penetration testing, COMSEC monitoring, network operations and defense, personnel misconduct (PM), law enforcement (LE), and counterintelligence (CI) investigations.\\n\\n-At any time, the USG may inspect and seize data stored on this IS.\\n\\n-Communications using, or data stored on, this IS are not private, are subject to routine monitoring, interception, and search, and may be disclosed or used for any USG-authorized purpose.\\n\\n-This IS includes security measures (e.g., authentication and access controls) to protect USG interests--not for your personal benefit or privacy.\\n\\n-Notwithstanding the above, using this IS does not constitute consent to PM, LE or CI investigative searching or monitoring of the content of privileged communications, or work product, related to personal representation or services by attorneys, psychotherapists, or clergy, and their assistants. Such communications and work product are private and confidential. See User Agreement for details.'"
stig_2404_stigrule_270711__etc_dconf_db_local_d_00_screensaver_media_keys_value: "['']"

# --- Banner ---
stig_2404_stigrule_270691__etc_issue_net_dest: "/etc/issue.net"
stig_2404_stigrule_270691__etc_issue_net_content: |
  You are accessing a U.S. Government (USG) Information System (IS) that is provided for USG-authorized use only.

  By using this IS (which includes any device attached to this IS), you consent to the following conditions:

  -The USG routinely intercepts and monitors communications on this IS for purposes including, but not limited to, penetration testing, COMSEC monitoring, network operations and defense, personnel misconduct (PM), law enforcement (LE), and counterintelligence (CI) investigations.

  -At any time, the USG may inspect and seize data stored on this IS.

  -Communications using, or data stored on, this IS are not private, are subject to routine monitoring, interception, and search, and may be disclosed or used for any USG-authorized purpose.

  -This IS includes security measures (e.g., authentication and access controls) to protect USG interests--not for your personal benefit or privacy.

  -Notwithstanding the above, using this IS does not constitute consent to PM, LE or CI investigative searching or monitoring of the content of privileged communications, or work product, related to personal representation or services by attorneys, psychotherapists, or clergy, and their assistants. Such communications and work product are private and confidential. See User Agreement for details.

