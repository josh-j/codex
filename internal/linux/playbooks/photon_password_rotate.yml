# >>>
# label: Rotate Password
# options:
#   rotate_user: text = root | Username | Local account to rotate password for
#   rotate_password: text | New Password (blank = use vault) | Leave blank to use vault_rotate_password
#   rotate_force_change: bool = true | Force Password Change at Login | Require user to change password on next login
# <<<
---
# internal/linux/playbooks/photon_password_rotate.yml
# Rotate a local user password on Photon OS servers.
#
# Usage:
#   ansible-playbook internal.linux.photon_password_rotate \
#     -l photon_servers -e 'rotate_user=root'

- name: "Photon | Rotate Local User Password"
  hosts: "{{ rotate_target | default('photon_servers') }}"
  gather_facts: false
  become: true
  vars:
    rotate_user: root
    rotate_password: "{{ vault_rotate_password }}"
    rotate_force_change: true
    ansible_ssh_timeout: 10

  pre_tasks:
    - name: Validate vault password is set
      ansible.builtin.assert:
        that:
          - rotate_password | default('') | length > 0
        fail_msg: >-
          vault_rotate_password is not set.
          Define it in your Ansible vault or pass via -e.

  roles:
    - role: internal.linux.photon
      vars:
        ncs_action: remediate
        ncs_operation: password_rotate
