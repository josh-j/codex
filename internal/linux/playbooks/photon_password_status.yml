# >>>
# label: Password Status
# is_read_only: true
# options:
#   rotate_user: text = root | User | Local account to check password status for
# <<<
---
# internal/linux/playbooks/photon_password_status.yml
# Report password aging and account status for a local user on Photon OS servers.
#
# Usage:
#   ansible-playbook internal.linux.photon_password_status -l photon_servers
#   ansible-playbook internal.linux.photon_password_status -l photon_servers -e 'rotate_user=root'

- name: "Photon | Password & Account Status"
  hosts: "{{ rotate_target | default('photon_servers') }}"
  gather_facts: false
  become: true
  vars:
    rotate_user: root
    ansible_ssh_timeout: 10

  roles:
    - role: internal.linux.photon
      vars:
        ncs_action: audit
        ncs_operation: password_status
