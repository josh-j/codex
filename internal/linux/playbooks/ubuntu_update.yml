# >>>
# options:
#   ubuntu_enable_upgrade_reboots: bool = true | Allow Reboot | Permit automatic reboot after package upgrades if required
# <<<
---
# internal/linux/playbooks/ubuntu_update.yml
# Composite Ubuntu update workflow: discover → update → discover.

- name: "Composite Ubuntu Update | Pre-Discover"
  ansible.builtin.import_playbook: ubuntu_collect.yml

- name: "Composite Ubuntu Update | Apply"
  ansible.builtin.import_playbook: ubuntu_update_apply.yml

- name: "Composite Ubuntu Update | Post-Discover"
  ansible.builtin.import_playbook: ubuntu_collect.yml
