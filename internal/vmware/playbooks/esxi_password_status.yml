# >>>
# label: Password Status
# is_read_only: true
# options:
#   esxi_stig_target_hosts: text | ESXi Hosts (JSON array, required) | JSON array of ESXi hostnames e.g. ["esxi01.lab","esxi02.lab"]
#   rotate_user: text = root | User | Local account to check password status for
# <<<
---
# internal/vmware/playbooks/esxi_password_status.yml
# Report local user accounts and password policy on ESXi hosts.
# Lockdown-aware: gracefully degrades if lockdown blocks direct queries.
#
# Usage:
#   ansible-playbook internal.vmware.esxi_password_status \
#     -l vcsa-site1 -e '{"esxi_stig_target_hosts": ["esxi01.lab"]}'

- name: "ESXi | Local User & Account Status"
  hosts: "{{ rotate_target | default('vcsa') }}"
  connection: local
  gather_facts: false
  become: false
  vars:
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
    rotate_user: root

  pre_tasks:
    - name: Validate ESXi target list
      ansible.builtin.assert:
        that:
          - esxi_stig_target_hosts | default([]) | length > 0
        fail_msg: >-
          No ESXi targets provided. Set esxi_stig_target_hosts
          (e.g., -e '{"esxi_stig_target_hosts": ["esxi01"]}').

  roles:
    - role: internal.vmware.esxi
      vars:
        ncs_action: audit
        ncs_operation: password_status
