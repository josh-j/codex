---
# internal/vmware/playbooks/dev_esxi_standalone_stig_audit.yml
# Standalone ESXi STIG audit — direct ESXi host, no vCenter required.
#
# Usage:
#   ansible-playbook internal.vmware.dev_esxi_standalone_stig_audit \
#     -i inventory/lab/standalone/esxi_inventory.yml

- name: "Standalone ESXi STIG Audit"
  hosts: esxi_standalone
  connection: local
  gather_facts: false
  tags: ["vmware", "stig", "audit", "esxi"]
  vars:
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
    esxi_stig_enable_hardening: false
  pre_tasks:
    # For standalone ESXi the "vCenter" endpoint IS the ESXi host.
    - name: "Set vCenter hostname to ESXi host"
      ansible.builtin.set_fact:
        ansible_host: "{{ vmware_hostname }}"
        vmware_username: "{{ vmware_username }}"
        vmware_password: "{{ vmware_password }}"
        vmware_validate_certs: "{{ vmware_validate_certs | default(false) }}"
      changed_when: false
      no_log: true

  roles:
    - role: internal.vmware.esxi
      vars:
        esxi_stig_enable_hardening: false
