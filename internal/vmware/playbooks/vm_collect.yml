# >>>
# is_read_only: true
# label: Collect
# options:
#   vm_collect_workload: bool = true | Workload Metrics | Collect VM CPU, memory, and disk usage
#   vm_collect_snapshots: bool = true | Snapshot Audit | Audit VM snapshot age and size
#   vmware_snapshot_age_warning_days: text = 7 | Snapshot Age Warning (days) | Days before a snapshot is flagged as stale
#   vmware_snapshot_size_warning_gb: text = 100 | Snapshot Size Warning (GB) | GB threshold to flag oversized snapshots
# <<<
---
# internal/vmware/playbooks/vm_collect.yml
# Read-only audit focused on VM inventory and snapshot state.

- name: Phase 2c | VMware VM Workload Audit
  hosts: vcsa
  connection: local
  gather_facts: false
  become: false
  roles:
    - role: internal.vmware.vm
      vars:
        ncs_action: collect
