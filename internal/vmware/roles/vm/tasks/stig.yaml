---
# internal.vmware.vm : tasks/stig.yaml
# =============================================================================
# VM STIG — three-phase audit/remediate orchestrator
#
# Phase 0: Determine run mode and set context
# Phase 1: Execute STIG tasks (audit-only via check_mode, or remediate)
# Phase 2: Post-remediation verification (re-run in check_mode)
# =============================================================================

# =============================================================================
# Phase 0 | Preconditions
# =============================================================================
- name: "VM STIG | Phase 0 | Backward-compat aliases"
  ansible.builtin.set_fact:
    vm_stig_enable_audit: "{{ vmware_stig_enable_audit | default(vm_stig_enable_audit) | default(true) }}"
    vm_stig_enable_hardening: "{{ vmware_stig_enable_hardening | default(vm_stig_enable_hardening) | default(false) }}"
  changed_when: false

- name: "VM STIG | Phase 0 | Resolve canonical action"
  ansible.builtin.set_fact:
    _ncs_stig_action: "{{ _ncs_requested_action | default(ncs_action | default('audit')) }}"
  changed_when: false

- name: "VM STIG | Phase 0 | Validate target VMs"
  ansible.builtin.assert:
    that: vm_stig_target_vms | default([]) | length > 0
    fail_msg: "No VMs defined in vm_stig_target_vms"

- name: "VM STIG | Phase 0 | Determine run mode"
  ansible.builtin.set_fact:
    _stig_audit_only: >-
      {{ _ncs_stig_action in ['audit', 'verify'] }}
    vm_stig_enable_audit: "{{ _ncs_stig_action in ['audit', 'verify'] }}"
    vm_stig_enable_hardening: "{{ _ncs_stig_action == 'remediate' }}"
  changed_when: false

- name: "VM STIG | Phase 0 | Register target context for ncs_collector"
  ansible.builtin.set_fact:
    _ncs_stig_target_host: "{{ inventory_hostname }}"
    _ncs_stig_target_type: "vm"
  tags:
    - always

- name: "VM STIG | Phase 0 | Set phase hint for included tasks"
  ansible.builtin.set_fact:
    _stig_phase_hint: "{{ 'audit' if (_stig_audit_only | bool) else 'remediate' }}"
    _stig_active_phase: "{{ 'audit' if (_stig_audit_only | bool) else 'remediate' }}"
  changed_when: false

# =============================================================================
# Phase 1 | Evaluate / Remediate
# =============================================================================
- name: "VM STIG | Phase 1 | Evaluate and/or remediate"
  when:
    - _ncs_stig_action in ['audit', 'remediate']
  block:
    - name: "VM STIG | Phase 1a | Run STIG tasks"
      ansible.builtin.include_tasks: check.yaml
      tags: [checks, stig, security]

    - name: "VM STIG | Phase 1b | Flag run as complete"
      ansible.builtin.set_fact:
        _stig_audit_ran: true
        _stig_remediation_ran: "{{ not (_stig_audit_only | bool) }}"
      changed_when: false
  rescue:
    - name: "VM STIG | Phase 1r | Set failure flag"
      ansible.builtin.set_fact:
        _stig_run_failed: true
      changed_when: false

    - name: "VM STIG | Phase 1r | Log failure"
      ansible.builtin.debug:
        msg: >-
          VM STIG {{ 'audit' if (_stig_audit_only | bool) else 'remediation' }}
          failed on {{ inventory_hostname }}. Partial results emitted via ncs_collector.
  always:
    - name: "VM STIG | Phase 1 | Log completion"
      ansible.builtin.debug:
        msg: >-
          VM STIG {{ 'audit' if (_stig_audit_only | bool) else 'remediation' }}
          completed on {{ inventory_hostname }}. Results emitted via ncs_collector.

# =============================================================================
# Phase 2 | Post-remediation verification (remediate mode only)
# =============================================================================
- name: "VM STIG | Phase 2 | Set phase hint to audit"
  ansible.builtin.set_fact:
    _stig_phase_hint: "audit"
    _stig_active_phase: "audit"
  changed_when: false
  when:
    - _ncs_stig_action == 'verify'

- name: "VM STIG | Phase 2 | Post-remediation audit"
  when:
    - _ncs_stig_action == 'verify'
  block:
    - name: "VM STIG | Phase 2a | Verify remediation"
      ansible.builtin.include_tasks: check_verify.yaml
      tags: [checks, stig, security, verify]

    - name: "VM STIG | Phase 2b | Flag verification as complete"
      ansible.builtin.set_fact:
        _stig_audit_ran: true
      changed_when: false
  rescue:
    - name: "VM STIG | Phase 2r | Log verification failure"
      ansible.builtin.debug:
        msg: "Post-remediation VM STIG audit failed on {{ inventory_hostname }}. Exporting partial results."
