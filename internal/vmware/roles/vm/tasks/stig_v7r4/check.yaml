---
# internal.vmware.stig : vm/check.yaml
#
# Outer loop wrapper: iterates over vm_stig_target_vms, including
# stig_v7r4/main.yaml once per VM. In audit mode (hardening=false) tasks run
# in check_mode; in hardening mode they apply changes.

- name: "VM STIG | Process each VM"
  ansible.builtin.include_tasks: stig_v7r4/main.yaml
  loop: "{{ vm_stig_target_vms | reject('match', '^vCLS-') | list }}"
  loop_control:
    loop_var: _current_vm_name
    label: "{{ _current_vm_name }}"
  args:
    apply:
      check_mode: "{{ not (vm_stig_enable_hardening | default(false) | bool) }}"
      tags: [stig_task]
      vars:
        stig_target_host: "{{ _current_vm_name }}"
        stig_target_type: "vm"
        stig_platform: "vmware/vm"
  ignore_errors: true # noqa: ignore-errors — assert failures are expected; ncs_collector captures them

- name: "VM STIG | Flag audit as complete"
  ansible.builtin.set_fact:
    _stig_audit_ran: true
  changed_when: false
