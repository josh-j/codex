---
# internal.vmware.vm : tasks/main.yaml

- name: "VM | Resolve public interface"
  ansible.builtin.set_fact:
    vm_ncs_requested_action: "{{ ncs_action | default('collect') }}"
    vm_ncs_requested_profile: "{{ ncs_profile | default('none') }}"
    vm_ncs_requested_operation: "{{ ncs_operation | default('none') }}"
  changed_when: false

- name: "VM | Validate action"
  ansible.builtin.assert:
    that:
      - vm_ncs_requested_action in ['collect', 'audit', 'remediate', 'verify']
      - (vm_ncs_requested_profile == 'none') or (vm_ncs_requested_profile == 'stig')
      - (vm_ncs_requested_operation == 'none') or (vm_ncs_requested_operation == 'snapshot')
      - not (vm_ncs_requested_profile != 'none' and vm_ncs_requested_operation != 'none')
      - (vm_ncs_requested_profile != 'stig') or (vm_ncs_requested_action in ['audit', 'remediate', 'verify'])
      - (vm_ncs_requested_operation == 'none') or (vm_ncs_requested_action == 'remediate')
    fail_msg: >-
      Unsupported VM role interface:
      action={{ vm_ncs_requested_action }}, profile={{ vm_ncs_requested_profile }}, operation={{ vm_ncs_requested_operation }}.
  changed_when: false

- name: "VM | Dispatch"
  module_defaults:
    group/community.vmware.vmware:
      hostname: "{{ _vcenter_hostname }}"
      username: "{{ vmware_username }}"
      password: "{{ vmware_password }}"
      validate_certs: "{{ vmware_validate_certs | default(false) | bool }}"
    internal.core.stig:
      _stig_module_defaults:
        hostname: "{{ _vcenter_hostname }}"
        username: "{{ vmware_username }}"
        password: "{{ vmware_password }}"
        validate_certs: "{{ vmware_validate_certs | default(false) | bool }}"
  block:
    - name: "VM | Build dispatch map"
      ansible.builtin.set_fact:
        _dispatch_map:
          snapshot: snapshot
          _default_: stig
      changed_when: false

    - name: "VM | Run dispatcher"
      ansible.builtin.include_tasks:
        file: >-
          {{ role_path ~ '/tasks/' ~ (
               'collect' if vm_ncs_requested_action == 'collect'
               else _dispatch_map.get(vm_ncs_requested_operation, '_default_')
             ) ~ '.yaml' }}
