---
# internal.vmware.vm : collect/assemble.yaml
# Assembles raw VM workload data into a flat payload for ncs_reporter.

- name: Assemble flat VM workload payload
  ansible.builtin.set_fact:
    vmware_raw_vm:
      datacenters: "{{ (_raw_datacenters | default({})).datacenter_info | default([]) }}"
      vms_info_raw: "{{ _raw_vms | default({}) }}"
      virtual_machines: "{{ (_raw_vms | default({})).virtual_machines | default([]) }}"
      vm_count: "{{ ((_raw_vms | default({})).virtual_machines | default([])) | length }}"
      snapshots_raw: >-
        {{
          _raw_snapshots.results | default([])
          | selectattr('vmware_all_snapshots_info', 'defined')
          | map(attribute='vmware_all_snapshots_info')
          | flatten | list
        }}
      snapshot_count: >-
        {{
          _raw_snapshots.results | default([])
          | selectattr('vmware_all_snapshots_info', 'defined')
          | map(attribute='vmware_all_snapshots_info')
          | flatten | list | length
        }}
      infra_patterns: "{{ (vcenter | default({})).config.infrastructure_vm_patterns | default([]) }}"
      config: "{{ vcenter.config | default({}) }}"
  changed_when: false
  no_log: true
