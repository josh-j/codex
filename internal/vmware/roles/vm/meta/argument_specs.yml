---
argument_specs:
  main:
    short_description: VM audit, collection, snapshot, and STIG orchestration
    description:
      - Collects VM inventory, snapshot state, and workload metrics.
      - Performs STIG compliance evaluation and optional hardening.
      - Creates safety snapshots before remediation.
      - Requires vCenter credentials (explicit or vault).
    options:
      ncs_action:
        type: str
        required: false
        default: collect
        choices: [collect, audit, remediate, verify]
        description: Primary action to perform.
      ncs_profile:
        type: str
        required: false
        choices: [stig]
        description: Compliance profile. Mutually exclusive with ncs_operation.
      ncs_operation:
        type: str
        required: false
        choices: [snapshot]
        description: Named operation. Mutually exclusive with ncs_profile.
      vmware_username:
        type: str
        required: false
        description: vCenter username. Falls back to vault_vcenter_username.
      vmware_password:
        type: str
        required: false
        description: vCenter password. Falls back to vault_vcenter_password.
      vmware_validate_certs:
        type: bool
        required: false
        default: false
        description: Validate vCenter TLS certificates.
      vm_stig_target_vms:
        type: list
        elements: str
        required: false
        default: []
        description: Explicit VM list. If empty, discovered from vCenter.
      vm_stig_enable_audit:
        type: bool
        required: false
        default: true
        description: Enable STIG audit checks.
      vm_stig_enable_hardening:
        type: bool
        required: false
        default: false
        description: Enable STIG remediation (mutating).
      vm_collect_workload:
        type: bool
        required: false
        default: true
        description: Collect VM workload metrics.
      vm_collect_snapshots:
        type: bool
        required: false
        default: true
        description: Collect VM snapshot state.
