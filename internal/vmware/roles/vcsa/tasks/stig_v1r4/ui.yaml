- name: "stigrule_VCUI-70-000011"
  internal.core.stig:
    _stig_id: VCUI-70-000011
    _stig_apply: ansible.builtin.shell
    _stig_audit_only: true
    _stig_manage: "{{ run_catalina_props_package_access | bool }}"
    _stig_use_check_mode_probe: false
    _stig_validate: ansible.builtin.command
    _stig_validate_args:
      argv: [/bin/bash, -lc, "grep -Fx 'package.access=sun.,org.apache.catalina.,org.apache.coyote.,org.apache.jasper.,org.apache.tomcat.' '{{ var_catalina_props_path }}'"]
    cmd: "true"

- name: "stigrule_VCUI-70-000012"
  internal.core.stig:
    _stig_id: VCUI-70-000012
    _stig_apply: ansible.builtin.shell
    _stig_audit_only: true
    _stig_manage: "{{ run_removed_mime_mappings | bool }}"
