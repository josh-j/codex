    _stig_validate: ansible.builtin.command
    _stig_validate_args:
      argv: [/bin/bash, -lc, "test -z \"$(grep -En '(x-csh<)|(x-sh<)|(x-shar<)|(x-ksh<)' '{{ var_web_xml_path }}' || true)\""]
    cmd: "true"

- name: "stigrule_VCUI-70-000013"
  internal.core.stig:
    _stig_id: VCUI-70-000013
    _stig_apply: ansible.builtin.shell
    _stig_audit_only: true
    _stig_manage: "{{ run_java_servlet | bool }}"
    _stig_use_check_mode_probe: false
    _stig_validate: ansible.builtin.command
    _stig_validate_args:
      argv: [/bin/bash, -lc, "block=\"$(xmllint --format '{{ var_web_xml_path }}' | sed 's/xmlns=\".*\"//g' | xmllint --xpath '/web-app/servlet-mapping/servlet-name[text()=\"jsp\"]/parent::servlet-mapping' - 2>/dev/null || true)\"; printf '%s\\n' \"$block\" | grep -F '<servlet-name>jsp</servlet-name>'; printf '%s\\n' \"$block\" | grep -F '<url-pattern>*.jsp</url-pattern>'; printf '%s\\n' \"$block\" | grep -F '<url-pattern>*.jspx</url-pattern>'"]
    cmd: "true"

- name: "stigrule_VCUI-70-000014"
  internal.core.stig:
    _stig_id: VCUI-70-000014
    _stig_apply: ansible.builtin.shell
    _stig_audit_only: true
    _stig_manage: "{{ run_remove_webdav | bool }}"
    _stig_use_check_mode_probe: false
    _stig_validate: ansible.builtin.command
    _stig_validate_args:
      argv: [/bin/bash, -lc, "test \"$(xmllint --format '{{ var_web_xml_path }}' | sed 's/xmlns=\".*\"//g' | xmllint --xpath '/web-app/servlet-mapping/servlet-name[text()=\"webdav\"]/parent::servlet-mapping' - 2>&1 || true)\" = 'XPath set is empty'"]
    cmd: "true"

- name: "stigrule_VCUI-70-000015"
  internal.core.stig:
    _stig_id: VCUI-70-000015
    _stig_apply: ansible.builtin.shell
    _stig_audit_only: true
    _stig_manage: "{{ run_mem_leak_prevention | bool }}"
    _stig_use_check_mode_probe: false
    _stig_validate: ansible.builtin.command
    _stig_validate_args:
      argv: [/bin/bash, -lc, "test \"$(xmllint --xpath '/Server/Listener[@className=\"org.apache.catalina.core.JreMemoryLeakPreventionListener\"]' '{{ var_server_xml_path }}' 2>/dev/null || true)\" = '<Listener className=\"org.apache.catalina.core.JreMemoryLeakPreventionListener\"/>'"]
    cmd: "true"

- name: "stigrule_VCUI-70-000016"
  internal.core.stig:
    _stig_id: VCUI-70-000016
    _stig_apply: ansible.builtin.shell
    _stig_audit_only: true
    _stig_manage: true
    _stig_use_check_mode_probe: false
    _stig_validate: ansible.builtin.command
