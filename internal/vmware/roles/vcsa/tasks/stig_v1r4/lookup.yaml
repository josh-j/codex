- name: "VCLU-70-000028 | Deploy vmware-services-lookupsvc.conf"
  ansible.builtin.template:
    src: vmware-services-lookupsvc.conf
    dest: "{{ var_syslog_conf_path }}"
    owner: root
    group: root
    mode: "0644"
    force: true
  when:
    - run_syslog_config | bool
    - vmware_stig_enable_hardening | default(false) | bool
  notify:
    - restart syslog

- name: "VCLU-70-000028 | Restore packaged mtime"
  ansible.builtin.shell:
    executable: /bin/bash
    cmd: |
      set -eu
      epoch="$(rpm -q --dump VMware-visl-integration | grep '/etc/vmware-syslog/vmware-services-lookupsvc.conf' | awk 'NR==1{print $3}')"
      test -n "$epoch"
      touch -d "@$epoch" "{{ var_syslog_conf_path }}"
  when:
    - run_syslog_config | bool
    - vmware_stig_enable_hardening | default(false) | bool

