    _stig_audit_only: true
    _stig_manage: "{{ run_catalina_properties | bool }}"
    _stig_use_check_mode_probe: false
    _stig_validate: ansible.builtin.shell
    _stig_validate_args:
      executable: /bin/bash
      cmd: |
        set -eu
        test "$(grep 'package.access' '{{ var_catalina_props_path }}' || true)" = 'package.access=sun.,org.apache.catalina.,org.apache.coyote.,org.apache.tomcat.,org.apache.jasper.'
    cmd: "true"

- name: "VCLU-70-000012 | Remove prohibited MIME mappings"
  community.general.xml:
    path: "{{ var_web_xml_path }}"
    xpath: "{{ item }}"
    state: absent
    namespaces:
      x: http://java.sun.com/xml/ns/javaee
  loop:
    - '/x:web-app/x:mime-mapping[x:extension="csh"]'
    - '/x:web-app/x:mime-mapping[x:extension="sh"]'
    - '/x:web-app/x:mime-mapping[x:extension="shar"]'
    - '/x:web-app/x:mime-mapping[x:extension="ksh"]'
  when:
    - run_removed_mime_mappings | bool
    - vmware_stig_enable_hardening | default(false) | bool
  notify:
    - restart lookupsvc

- name: "stigrule_VCLU-70-000012"
  internal.core.stig:
    _stig_id: VCLU-70-000012
    _stig_apply: ansible.builtin.shell
    _stig_audit_only: true
    _stig_manage: "{{ run_removed_mime_mappings | bool }}"
    _stig_use_check_mode_probe: false
    _stig_validate: ansible.builtin.shell
    _stig_validate_args:
      executable: /bin/bash
      cmd: |
        set -eu
        test -z "$(grep -En '(x-csh<)|(x-sh<)|(x-shar<)|(x-ksh<)' '{{ var_web_xml_path }}' || true)"
    cmd: "true"

- name: "VCLU-70-000013 | Ensure JSP servlet mappings"
  community.general.xml:
    path: "{{ var_web_xml_path }}"
    xpath: "{{ item.xpath }}"
    value: "{{ item.value }}"
    namespaces:
      x: http://java.sun.com/xml/ns/javaee
    state: present
  loop:
    - { xpath: '/x:web-app/x:servlet-mapping[x:servlet-name="jsp"]/x:url-pattern[1]', value: '{{ var_web_xml_servlet_jsp_url_pattern1 }}' }
    - { xpath: '/x:web-app/x:servlet-mapping[x:servlet-name="jsp"]/x:url-pattern[2]', value: '{{ var_web_xml_servlet_jsp_url_pattern2 }}' }
  when:
    - run_java_servlet | bool
    - vmware_stig_enable_hardening | default(false) | bool
  notify:
    - restart lookupsvc

- name: "stigrule_VCLU-70-000013"
  internal.core.stig:
    _stig_id: VCLU-70-000013
    _stig_apply: ansible.builtin.shell
    _stig_audit_only: true
    _stig_manage: "{{ run_java_servlet | bool }}"
    _stig_use_check_mode_probe: false
    _stig_validate: ansible.builtin.shell
    _stig_validate_args:
      executable: /bin/bash
      cmd: |
        set -eu
        mapping="$(xmllint --format '{{ var_web_xml_path }}' | sed 's/xmlns=".*"//g' | xmllint --xpath '/web-app/servlet-mapping/servlet-name[text()="jsp"]/parent::servlet-mapping' - 2>/dev/null || true)"
        grep -Fq '<url-pattern>*.jsp</url-pattern>' <<<"$mapping"
        grep -Fq '<url-pattern>*.jspx</url-pattern>' <<<"$mapping"
    cmd: "true"

