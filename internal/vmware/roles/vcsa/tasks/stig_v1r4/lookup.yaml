---

- name: Create time stamp
  ansible.builtin.set_fact:
    backup_timestamp: "{{ lookup('pipe', 'date +%Y-%m-%d-%H-%M-%S') }}"
  when:
    - run_create_backups | default(create_backups | default(true)) | bool
    - vmware_stig_enable_hardening | default(false) | bool

- name: Backup files...if restoring be sure to restore permissions that original file had!!
  ansible.builtin.copy:
    remote_src: true
    src: "{{ item }}"
    dest: "/tmp/ansible-vcsa-lookup-backups-{{ backup_timestamp }}/"
    mode: preserve
  loop:
    - "{{ var_server_xml_path }}"
    - "{{ var_web_xml_path }}"
    - "{{ var_context_xml_path }}"
    - "{{ var_json_path }}"
    - "{{ var_catalina_props_path }}"
    - "{{ var_syslog_conf_path }}"
  changed_when: false
  register: backupresult
  failed_when:
    - backupresult.msg is defined
    - "'not found' not in backupresult.msg"
  when:
    - run_create_backups | default(create_backups | default(true)) | bool
    - vmware_stig_enable_hardening | default(false) | bool

- name: "Lookup STIG | Normalize context.xml"
  ansible.builtin.shell:
    executable: /bin/bash
    cmd: |
      python3 - <<'PY'
      import xml.etree.ElementTree as ET
      path = "{{ var_context_xml_path }}"
      tree = ET.parse(path)
      root = tree.getroot()
      root.set("useHttpOnly", "true")
      tree.write(path, encoding="UTF-8", xml_declaration=True)
      PY
  when:
    - run_http_only | bool
    - vmware_stig_enable_hardening | default(false) | bool
  notify:
    - restart lookupsvc

- name: "Lookup STIG | Normalize server.xml"
  ansible.builtin.shell:
    executable: /bin/bash
    cmd: |
      python3 - <<'PY'
      import xml.etree.ElementTree as ET
      from pathlib import Path

      path = Path("{{ var_server_xml_path }}")
      tree = ET.parse(path)
      root = tree.getroot()
      service = root.find("./Service")
      engine = service.find("./Engine")
      host = engine.find("./Host")
      connector = service.find('./Connector[@port="${bio-custom.http.port}"]')

      root.set("port", "${base.shutdown.port}")

      if root.find('./Listener[@className="org.apache.catalina.core.JreMemoryLeakPreventionListener"]') is None:
          listener = ET.Element("Listener")
          listener.set("className", "org.apache.catalina.core.JreMemoryLeakPreventionListener")
          root.insert(0, listener)

      connector.set("connectionTimeout", "60000")
      connector.set("acceptCount", "100")
      connector.set("URIEncoding", "UTF-8")
      connector.set("server", "Anonymous")
      for attr in ("maxThreads", "maxPostSize", "allowTrace"):
          connector.attrib.pop(attr, None)

      access = host.find('./Valve[@className="org.apache.catalina.valves.AccessLogValve"]')
      access.set(
          "pattern",
          "%t %I [RemoteIP] %{X-Forwarded-For}i %u [Request] %h:%{remote}p to local %{local}p - %H %m %U%q    [Response] %s - %b bytes    [Perf] process %Dms / commit %Fms / conn [%X]",
      )

      for realm in list(engine.findall("./Realm")):
          host.remove(realm) if False else None
      for realm in list(engine.findall("./Realm")):
          engine.remove(realm)

      tree.write(path, encoding="UTF-8", xml_declaration=True)
      PY
  when:
    - (run_connection_timeout | bool) or
      (run_access_valve_pattern | bool) or
      (run_user_database_realm | bool) or
      (run_mem_leak_prevention | bool) or
      (run_accept_count | bool) or
      (run_uri_encoding | bool) or
      (run_server_anonymous | bool) or
      (run_hide_error_reports | bool) or
      (run_allow_trace | bool) or
      (run_server_shutdownport | bool)
    - vmware_stig_enable_hardening | default(false) | bool
  notify:
    - restart lookupsvc

- name: "VCLU-70-000024 | Normalize ErrorReportValve text"
  ansible.builtin.shell:
    executable: /bin/bash
    cmd: |
      python3 - <<'PY'
      import re
      from pathlib import Path
      path = Path("{{ var_server_xml_path }}")
      text = path.read_text()
      text = re.sub(
          r'<Valve className="org\.apache\.catalina\.valves\.ErrorReportValve"[^>]*/>\s*</Host>',
          '<Valve className="org.apache.catalina.valves.ErrorReportValve" showServerInfo="false" showReport="false"/>\n            </Host>',
          text,
          count=1,
      )
      path.write_text(text)
      PY
  when:
    - run_hide_error_reports | bool
    - vmware_stig_enable_hardening | default(false) | bool
  notify:
    - restart lookupsvc

- name: "Lookup STIG | Normalize web.xml cookie config"
  ansible.builtin.shell:
    executable: /bin/bash
    cmd: |
      python3 - <<'PY'
      import xml.etree.ElementTree as ET
      path = "{{ var_web_xml_path }}"
      ns = {"x": "http://java.sun.com/xml/ns/javaee"}
      ET.register_namespace("", ns["x"])
      tree = ET.parse(path)
      root = tree.getroot()
      session_config = root.find("./x:session-config", ns)
      cookie_config = session_config.find("./x:cookie-config", ns)
      if cookie_config is None:
          cookie_config = ET.SubElement(session_config, "{http://java.sun.com/xml/ns/javaee}cookie-config")
      secure = cookie_config.find("./x:secure", ns)
      if secure is None:
          secure = ET.SubElement(cookie_config, "{http://java.sun.com/xml/ns/javaee}secure")
      secure.text = "true"
      tree.write(path, encoding="UTF-8", xml_declaration=True)
      PY
  when:
    - run_web_cookie_secure | bool
    - vmware_stig_enable_hardening | default(false) | bool
  notify:
    - restart lookupsvc

- name: "stigrule_VCLU-70-000001"
  internal.core.stig:
    _stig_id: VCLU-70-000001
    _stig_apply: community.general.xml
    _stig_manage: "{{ run_connection_timeout | bool }}"
    _stig_use_check_mode_probe: false
    _stig_notify: [restart lookupsvc]
    _stig_validate: ansible.builtin.shell
    _stig_validate_args:
      executable: /bin/bash
      cmd: |
        set -eu
        test "$(xmllint --xpath '/Server/Service/Connector[@port="${bio-custom.http.port}"]/@connectionTimeout' '{{ var_server_xml_path }}' 2>/dev/null || true)" = ' connectionTimeout="60000"'
    path: "{{ var_server_xml_path }}"
    xpath: '/Server/Service/Connector[@port="${bio-custom.http.port}"]'
    attribute: connectionTimeout
    value: "{{ var_server_xml_connectiontimeout }}"
    state: present

