- name: "VCLU-70-000021 | Ensure welcome file list"
  community.general.xml:
    path: "{{ var_web_xml_path }}"
    xpath: "{{ item.xpath }}"
    value: "{{ item.value }}"
    namespaces:
      x: http://java.sun.com/xml/ns/javaee
    state: present
  loop:
    - { xpath: '/x:web-app/x:welcome-file-list/x:welcome-file[1]', value: '{{ var_web_xml_welcome_file_list1 }}' }
    - { xpath: '/x:web-app/x:welcome-file-list/x:welcome-file[2]', value: '{{ var_web_xml_welcome_file_list2 }}' }
    - { xpath: '/x:web-app/x:welcome-file-list/x:welcome-file[3]', value: '{{ var_web_xml_welcome_file_list3 }}' }
  when:
    - run_web_welcome_file | bool
    - vmware_stig_enable_hardening | default(false) | bool
  notify:
    - restart lookupsvc

- name: "stigrule_VCLU-70-000021"
  internal.core.stig:
