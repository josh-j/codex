- name: "VCLU-70-000017 | Discover non-compliant lookupsvc files"
  ansible.builtin.shell:
    executable: /bin/bash
    cmd: |
      find {{ var_lib_path }} {{ var_conf_path }} -xdev -type f -a '(' -perm -o+w -o -not -user root -o -not -group root ')' -print
  register: _lookup_bad_files
  changed_when: false
  when: run_web_files_permissions | bool

- name: "VCLU-70-000017 | Correct lookupsvc file ownership"
  ansible.builtin.file:
    path: "{{ item }}"
    state: file
    owner: root
    group: root
    mode: "0644"
  loop: "{{ _lookup_bad_files.stdout_lines | default([]) }}"
  when:
    - run_web_files_permissions | bool
    - vmware_stig_enable_hardening | default(false) | bool

