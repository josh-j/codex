    path: "{{ var_server_xml_path }}"
    xpath: /Server/Service/Engine/Realm
    state: absent

- name: "VCLU-70-000011/000018/000029 | Deploy compliant catalina.properties"
  ansible.builtin.template:
    src: lookup_catalina.properties
    dest: "{{ var_catalina_props_path }}"
    owner: root
    group: root
    mode: "0644"
    force: true
  when:
    - (run_catalina_properties | bool) or (run_catalina_properties_shutdown | bool) or (run_catalina_properties_ports | bool)
    - vmware_stig_enable_hardening | default(false) | bool
  notify:
    - restart lookupsvc

- name: "stigrule_VCLU-70-000011"
  internal.core.stig:
    _stig_id: VCLU-70-000011
