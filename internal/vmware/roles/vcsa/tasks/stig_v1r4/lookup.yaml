- name: "stigrule_VCLU-70-000006"
  internal.core.stig:
    _stig_id: VCLU-70-000006
    _stig_apply: ansible.builtin.lineinfile
    _stig_manage: "{{ run_json_stream_redirect_file | bool }}"
    _stig_use_check_mode_probe: false
    _stig_notify: [restart lookupsvc]
    _stig_validate: ansible.builtin.shell
    _stig_validate_args:
      executable: /bin/bash
      cmd: |
        set -eu
        grep -Fq '"StreamRedirectFile": "{{ var_stream_redirect_file }}",' '{{ var_json_path }}'
    path: "{{ var_json_path }}"
    regexp: '^.*"StreamRedirectFile".*$'
    line: '  "StreamRedirectFile": "{{ var_stream_redirect_file }}",'
    insertbefore: ^.*WorkingDir.*$
    firstmatch: true
    state: present

- name: "Lookup STIG | Discover current log files"
  ansible.builtin.find:
    paths: "{{ var_logs_path }}"
    file_type: file
    patterns:
      - "*.current"
      - "*.stdout"
      - "*.stderr"
      - "*.log"
    excludes:
      - lookupsvc-init.log
    recurse: true
  register: _lookup_logs
  when:
    - run_logs_permissions | bool

- name: "VCLU-70-000007 | Normalize lookupsvc log permissions"
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: file
    mode: o-w
    owner: lookupsvc
    group: lookupsvc
  loop: "{{ _lookup_logs.files | default([]) }}"
  when:
    - run_logs_permissions | bool
    - vmware_stig_enable_hardening | default(false) | bool

- name: "stigrule_VCLU-70-000007"
  internal.core.stig:
    _stig_id: VCLU-70-000007
    _stig_apply: ansible.builtin.shell
    _stig_audit_only: true
    _stig_manage: "{{ run_logs_permissions | bool }}"
    _stig_use_check_mode_probe: false
    _stig_validate: ansible.builtin.shell
    _stig_validate_args:
      executable: /bin/bash
      cmd: |
        set -eu
        test -z "$(find '{{ var_logs_path }}' -xdev -type f ! -name lookupsvc-init.log -a '(' -perm -o+w -o -not -user lookupsvc -o -not -group lookupsvc ')' -exec ls -ld {} \; 2>/dev/null || true)"
    cmd: "true"

- name: "stigrule_VCLU-70-000008"
