    _stig_apply: ansible.builtin.shell
    _stig_audit_only: true
    _stig_manage: "{{ run_web_welcome_file | bool }}"
    _stig_use_check_mode_probe: false
    _stig_validate: ansible.builtin.shell
    _stig_validate_args:
      executable: /bin/bash
      cmd: |
        set -eu
        welcome="$(xmllint --format '{{ var_web_xml_path }}' | sed 's/xmlns=".*"//g' | xmllint --xpath '/web-app/welcome-file-list' - 2>/dev/null || true)"
        grep -Fq '<welcome-file>index.html</welcome-file>' <<<"$welcome"
        grep -Fq '<welcome-file>index.htm</welcome-file>' <<<"$welcome"
        grep -Fq '<welcome-file>index.jsp</welcome-file>' <<<"$welcome"
    cmd: "true"

