          printf '%s\n' "$output" | grep -Fxq 'fsync|on'
          printf '%s\n' "$output" | grep -Fxq 'full_page_writes|on'
          printf '%s\n' "$output" | grep -Fxq 'synchronous_commit|on'
    cmd: "true"

- name: "VCPG-70-000014 | Normalize fsync/full_page_writes/synchronous_commit"
  ansible.builtin.command:
    argv:
      - /opt/vmware/vpostgres/current/bin/psql
      - -U
      - postgres
      - -c
      - "{{ item }}"
  loop:
    - "ALTER SYSTEM SET fsync = '{{ var_postgres_conf_fsync }}';"
    - "ALTER SYSTEM SET full_page_writes = '{{ var_postgres_conf_full_page_writes }}';"
    - "ALTER SYSTEM SET synchronous_commit = '{{ var_postgres_conf_synchronous_commit }}';"
