- name: "stigrule_VCPG-70-000007"
  internal.core.stig:
    _stig_id: VCPG-70-000007
    _stig_apply: ansible.builtin.shell
    _stig_audit_only: true
    _stig_manage: true
    _stig_use_check_mode_probe: false
    _stig_validate: ansible.builtin.command
    _stig_validate_args:
      argv:
        - /bin/bash
        - -lc
        - |
          create_lines="$(/opt/vmware/vpostgres/current/bin/psql -U postgres -c "\du;" | grep "Create" || true)"
          printf '%s\n' "$create_lines" | grep -Eq '^\s*postgres\s+\| Superuser, Create role, Create DB, Replication, Bypass RLS \| \{\}$'
          printf '%s\n' "$create_lines" | grep -Eq '^\s*vc\s+\| Create DB\s+\| \{\}$'
          printf '%s\n' "$create_lines" | grep -Eq '^\s*vlcmuser\s+\| Create DB\s+\| \{\}$'
          test "$(printf '%s\n' "$create_lines" | sed '/^\s*$/d' | wc -l)" -eq 3
    cmd: "true"

