---

- name: "PostgreSQL | Create backup timestamp"
  ansible.builtin.set_fact:
    backup_timestamp: "{{ lookup('pipe', 'date +%Y-%m-%d-%H-%M-%S') }}"
  when:
    - run_create_backups | default(create_backups | default(true)) | bool
    - vmware_stig_enable_hardening | default(false) | bool

- name: "PostgreSQL | Backup config files"
  ansible.builtin.copy:
    remote_src: true
    src: "{{ item }}"
    dest: "/tmp/ansible-vcsa-postgresql-backups-{{ backup_timestamp }}/"
    mode: preserve
  loop:
    - "{{ var_postgres_conf_file }}"
    - "{{ var_postgres_hba_conf_file }}"
    - "{{ var_syslog_conf_path }}"
    - "{{ var_syslog_conf_path2 }}"
  changed_when: false
  register: backupresult
  failed_when:
    - backupresult.msg is defined
    - "'not found' not in backupresult.msg"
  when:
    - run_create_backups | default(create_backups | default(true)) | bool
    - vmware_stig_enable_hardening | default(false) | bool

- name: "VCPG-70-000003 | Discover PostgreSQL config files"
  ansible.builtin.find:
    paths: /storage/db/vpostgres
    file_type: file
    patterns: "*conf*"
  register: _vcpg_conf_files
  when: run_postgres_conf_file_permissions | bool

- name: "VCPG-70-000003 | Normalize PostgreSQL config file permissions"
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: file
    mode: "0600"
    owner: vpostgres
    group: vpgmongrp
  loop: "{{ _vcpg_conf_files.files | default([]) }}"
  when:
    - run_postgres_conf_file_permissions | bool
    - vmware_stig_enable_hardening | default(false) | bool

- name: "VCPG-70-000005 | Discover PostgreSQL log files"
  ansible.builtin.find:
    paths: "{{ var_postgres_log_path }}"
    file_type: file
    patterns: "*"
  register: _vcpg_log_files
  when: run_postgres_log_file_permissions | bool

- name: "VCPG-70-000005 | Normalize PostgreSQL log file permissions"
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: file
    mode: "0600"
    owner: vpostgres
    group: vpgmongrp
  loop: "{{ _vcpg_log_files.files | default([]) }}"
  when:
    - run_postgres_log_file_permissions | bool
    - vmware_stig_enable_hardening | default(false) | bool

- name: "VCPG-70-000012 | Normalize server.key permissions"
  ansible.builtin.file:
    path: /storage/db/vpostgres_ssl/server.key
    state: file
    mode: "0600"
    owner: vpostgres
    group: vpgmongrp
  when:
    - run_postgres_key_file_permissions | bool
    - vmware_stig_enable_hardening | default(false) | bool

- name: "VCPG-70-000019 | Deploy vmware-services-vmware-postgres-archiver.conf"
  ansible.builtin.template:
    src: "{{ role_path }}/tasks/stig_v1r4/templates/vmware-services-vmware-postgres-archiver.conf"
    dest: "{{ var_syslog_conf_path2 }}"
    owner: root
    group: root
    mode: "0644"
    force: true
  when:
    - run_postgres_syslog_config | bool
    - vmware_stig_enable_hardening | default(false) | bool
  notify:
    - restart syslog

- name: "VCPG-70-000019 | Deploy vmware-services-vmware-vpostgres.conf"
  ansible.builtin.template:
    src: "{{ role_path }}/tasks/stig_v1r4/templates/vmware-services-vmware-vpostgres.conf"
    dest: "{{ var_syslog_conf_path }}"
    owner: root
    group: root
    mode: "0644"
    force: true
  when:
    - run_postgres_syslog_config | bool
    - vmware_stig_enable_hardening | default(false) | bool
  notify:
    - restart syslog

- name: "VCPG-70-000007 | Normalize PostgreSQL create privileges"
  ansible.builtin.shell: |
    set -euo pipefail
    changed=0

    if [ "$(/opt/vmware/vpostgres/current/bin/psql -U postgres -A -t -c "select rolcreatedb from pg_roles where rolname='vc';")" != "t" ]; then
      /opt/vmware/vpostgres/current/bin/psql -U postgres -c "ALTER ROLE vc CREATEDB;"
      changed=1
    fi

    if [ "$(/opt/vmware/vpostgres/current/bin/psql -U postgres -A -t -c "select rolcreatedb from pg_roles where rolname='vlcmuser';")" != "t" ]; then
      /opt/vmware/vpostgres/current/bin/psql -U postgres -c "ALTER ROLE vlcmuser CREATEDB;"
      changed=1
    fi

    if /opt/vmware/vpostgres/current/bin/psql -U postgres -A -t -c "select 1 from pg_auth_members am join pg_roles role on am.roleid = role.oid join pg_roles member on am.member = member.oid where member.rolname='vlcmuser' and role.rolname='pg_monitor';" | grep -qx '1'; then
      /opt/vmware/vpostgres/current/bin/psql -U postgres -c "REVOKE pg_monitor FROM vlcmuser;"
      changed=1
    fi

    if [ "$changed" -eq 1 ]; then
      echo changed
    fi
  args:
    executable: /bin/bash
  register: _vcpg_role_privs
  changed_when: "'changed' in (_vcpg_role_privs.stdout | default(''))"
  when:
    - vmware_stig_enable_hardening | default(false) | bool

- name: "VCPG-70-000020 | Normalize log_timezone"
  ansible.builtin.shell: |
    set -euo pipefail
    if [ "$(/opt/vmware/vpostgres/current/bin/psql -U postgres -A -t -c "SHOW log_timezone;")" != "{{ var_postgres_conf_log_timezone }}" ]; then
      /opt/vmware/vpostgres/current/bin/psql -U postgres -c "ALTER SYSTEM SET log_timezone = '{{ var_postgres_conf_log_timezone }}';"
      echo changed
    fi
  args:
    executable: /bin/bash
  register: _vcpg_log_timezone
  changed_when: "'changed' in (_vcpg_log_timezone.stdout | default(''))"
  when:
    - run_postgres_conf_log_timezone | bool
    - vmware_stig_enable_hardening | default(false) | bool
  notify:
    - reload vpostgres config

- name: "stigrule_VCPG-70-000001"
  internal.core.stig:
    _stig_id: VCPG-70-000001
    _stig_apply: ansible.builtin.shell
    _stig_audit_only: true
    _stig_manage: true
    _stig_use_check_mode_probe: false
    _stig_validate: ansible.builtin.command
    _stig_validate_args:
      argv:
        - /bin/bash
        - -lc
        - |
          set -eu
          value="$(/opt/vmware/vpostgres/current/bin/psql -U postgres -A -t -c "SHOW max_connections;")"
          [ "$value" -ge 100 ] && [ "$value" -le 1000 ]
    cmd: "true"

