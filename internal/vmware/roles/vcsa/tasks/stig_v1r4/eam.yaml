    _stig_validate: ansible.builtin.shell
    _stig_validate_args:
      executable: /bin/bash
      cmd: |
        set -eu
        grep -Fq 'package.access=\' '{{ var_catalina_props_path }}'
        grep -Fq 'sun.,\' '{{ var_catalina_props_path }}'
        grep -Fq 'org.apache.catalina.,\' '{{ var_catalina_props_path }}'
        grep -Fq 'org.apache.coyote.,\' '{{ var_catalina_props_path }}'
        grep -Fq 'org.apache.tomcat.,\' '{{ var_catalina_props_path }}'
        grep -Fq 'org.apache.jasper.' '{{ var_catalina_props_path }}'
