- name: "VCEM-70-000017 | Correct web file ownership"
  ansible.builtin.shell:
    cmd: |
      set -eu
      find '{{ var_eam_web_path }}' -xdev -type f -a '(' -not -user root -o -not -group root ')' -exec chown root:root {} +
  when:
