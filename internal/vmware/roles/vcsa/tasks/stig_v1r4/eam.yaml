- name: "VCEM-70-000011/000018/000031/000032 | Deploy compliant catalina.properties"
  ansible.builtin.template:
    src: eam_catalina.properties
    dest: "{{ var_catalina_props_path }}"
    owner: root
    group: root
    mode: "0644"
    force: true
  when:
    - vmware_stig_enable_hardening | default(false) | bool
    - >
      run_catalina_properties | bool or
      run_catalina_properties_shutdown | bool or
      run_catalina_properties_bioport | bool or
      run_catalina_properties_shutdownport | bool
  notify:
    - restart eam

