- name: "stigrule_VCEM-70-000005"
  internal.core.stig:
    _stig_id: VCEM-70-000005
    _stig_apply: ansible.builtin.shell
    _stig_audit_only: true
    _stig_use_check_mode_probe: false
    _stig_manage: "{{ run_access_valve_pattern | bool }}"
    _stig_validate: ansible.builtin.shell
    _stig_validate_args:
      executable: /bin/bash
      cmd: |
        set -eu
        python3 - <<'PY'
        import subprocess
        import sys

        expected = 'pattern="%h %{X-Forwarded-For}i %l %u %t [%I] &quot;%r&quot; %s %b [Processing time %D msec] &quot;%{User-Agent}i&quot;"'
        out = subprocess.run(
            [
                "xmllint",
                "--xpath",
                '/Server/Service/Engine/Host/Valve[@className="org.apache.catalina.valves.AccessLogValve"]/@pattern',
                "{{ var_server_xml_path }}",
            ],
            capture_output=True,
            text=True,
        )
        combined = (out.stdout or "") + (out.stderr or "")
        if 'XPath set is empty' in combined:
            sys.exit(1)
        sys.exit(0 if expected in combined else 1)
        PY
    executable: /bin/bash
    cmd: "true"

