      insertbefore: ^.*WorkingDir.*$
      firstmatch: true

- name: "EAM STIG | Discover current web log files"
  ansible.builtin.find:
    paths: "{{ var_eam_logs_path }}"
    file_type: file
    patterns: "*.log*,*.txt*"
  register: _eam_log_files
  changed_when: false
  check_mode: false

- name: "VCEM-70-000007 | Normalize EAM log permissions"
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: file
    mode: "0644"
    owner: "eam"
    group: "users"
  loop: "{{ _eam_log_files.files }}"
  when:
    - run_logs_permissions | bool
    - vmware_stig_enable_hardening | default(false) | bool

- name: "stigrule_VCEM-70-000007"
  internal.core.stig:
    _stig_id: VCEM-70-000007
    _stig_apply: ansible.builtin.shell
    _stig_audit_only: true
    _stig_use_check_mode_probe: false
    _stig_manage: "{{ run_logs_permissions | bool }}"
    _stig_validate: ansible.builtin.shell
    _stig_validate_args:
      executable: /bin/bash
      cmd: |
        set -eu
        test -z "$(find '{{ var_eam_logs_path }}' -xdev -type f -a '(' -perm -o+w -o -not -user eam -o -not -group users ')' -exec ls -ld {} \;)"
    executable: /bin/bash
    cmd: "true"

