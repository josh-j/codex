- name: "VCEM-70-000021 | Remediate setCharacterEncodingFilter"
  ansible.builtin.shell:
    cmd: |
      python3 - <<'PY'
      import xml.etree.ElementTree as ET

      web_xml = "{{ var_web_xml_path }}"
      ns_uri = "http://java.sun.com/xml/ns/javaee"
      ns = {"x": ns_uri}
      ET.register_namespace("", ns_uri)

      tree = ET.parse(web_xml)
      root = tree.getroot()
      def tag(name):
          return "{" + ns_uri + "}" + name

      for parent, xpath in (
          (root, "./x:filter"),
          (root, "./x:filter-mapping"),
      ):
          for elem in list(parent.findall(xpath, ns)):
              name_elem = elem.find("x:filter-name", ns)
              if name_elem is not None and name_elem.text == "setCharacterEncodingFilter":
                  parent.remove(elem)

      filter_elem = ET.SubElement(root, tag("filter"))
      ET.SubElement(filter_elem, tag("filter-name")).text = "setCharacterEncodingFilter"
      ET.SubElement(filter_elem, tag("filter-class")).text = (
          "org.apache.catalina.filters.SetCharacterEncodingFilter"
      )

      for param_name, param_value in (("encoding", "UTF-8"), ("ignore", "true")):
          init_param = ET.SubElement(filter_elem, tag("init-param"))
          ET.SubElement(init_param, tag("param-name")).text = param_name
          ET.SubElement(init_param, tag("param-value")).text = param_value

      ET.SubElement(filter_elem, tag("async-supported")).text = "true"

      mapping_elem = ET.SubElement(root, tag("filter-mapping"))
      ET.SubElement(mapping_elem, tag("filter-name")).text = "setCharacterEncodingFilter"
      ET.SubElement(mapping_elem, tag("url-pattern")).text = "/*"

      tree.write(web_xml, encoding="UTF-8", xml_declaration=True)
      PY
    executable: /bin/bash
  when:
    - run_web_filter | bool
    - vmware_stig_enable_hardening | default(false) | bool
  ignore_errors: true
  notify:
    - restart eam

- name: "stigrule_VCEM-70-000021"
  internal.core.stig:
    _stig_id: VCEM-70-000021
    _stig_apply: ansible.builtin.shell
    _stig_audit_only: true
    _stig_use_check_mode_probe: false
    _stig_manage: "{{ run_web_filter | bool }}"
    _stig_validate: ansible.builtin.shell
    _stig_validate_args:
      executable: /bin/bash
      cmd: |
        set -eu
        mapping="$(
          xmllint --format '{{ var_web_xml_path }}' | sed 's/xmlns=".*"//g' \
          | xmllint --xpath '/web-app/filter-mapping/filter-name[text()="setCharacterEncodingFilter"]/parent::filter-mapping' - 2>&1 || true
        )"
        filter="$(
          xmllint --format '{{ var_web_xml_path }}' | sed 's/xmlns=".*"//g' \
          | xmllint --xpath '/web-app/filter/filter-name[text()="setCharacterEncodingFilter"]/parent::filter' - 2>&1 || true
        )"
        grep -Fq '<url-pattern>/*</url-pattern>' <<<"$mapping"
        grep -Fq '<filter-class>org.apache.catalina.filters.SetCharacterEncodingFilter</filter-class>' <<<"$filter"
        grep -Fq '<param-name>encoding</param-name>' <<<"$filter"
        grep -Fq '<param-value>UTF-8</param-value>' <<<"$filter"
        grep -Fq '<param-name>ignore</param-name>' <<<"$filter"
        grep -Fq '<param-value>true</param-value>' <<<"$filter"
        grep -Fq '<async-supported>true</async-supported>' <<<"$filter"
    executable: /bin/bash
    cmd: "true"

