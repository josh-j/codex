---
# EAM STIG implementation migrated to internal.core.stig-driven rule tasks.

- name: Create time stamp
  ansible.builtin.set_fact:
    backup_timestamp: "{{ lookup('pipe', 'date +%Y-%m-%d-%H-%M-%S') }}"
  when:
    - run_create_backups | default(create_backups | default(true)) | bool
    - vmware_stig_enable_hardening | default(false) | bool

- name: Backup files...if restoring be sure to restore permissions that original file had!!
  ansible.builtin.copy:
    remote_src: true
    src: "{{ item }}"
    dest: "/tmp/ansible-vcsa-eam-backups-{{ backup_timestamp }}/"
    mode: preserve
  loop:
    - "{{ var_server_xml_path }}"
    - "{{ var_web_xml_path }}"
    - "{{ var_eam_json_path }}"
    - "{{ var_catalina_props_path }}"
    - "{{ var_syslog_conf_path }}"
  changed_when: false
  register: backupresult
  failed_when:
    - backupresult.msg is defined
    - "'not found' not in backupresult.msg"
  when:
    - run_create_backups | default(create_backups | default(true)) | bool
    - vmware_stig_enable_hardening | default(false) | bool

- name: "stigrule_VCEM-70-000001"
  internal.core.stig:
    _stig_id: VCEM-70-000001
    _stig_apply: ansible.builtin.shell
    _stig_audit_only: true
    _stig_use_check_mode_probe: false
    _stig_manage: "{{ run_connection_timeout | bool }}"
    _stig_validate: ansible.builtin.shell
    _stig_validate_args:
      executable: /bin/bash
      cmd: |
        set -eu
        out="$(xmllint --xpath '/Server/Service/Connector/@connectionTimeout' '{{ var_server_xml_path }}' 2>&1 || true)"
        ! grep -Fq 'XPath set is empty' <<<"$out"
        grep -Fq 'connectionTimeout="{{ var_server_xml_connectiontimeout }}"' <<<"$out"
    executable: /bin/bash
    cmd: "true"

