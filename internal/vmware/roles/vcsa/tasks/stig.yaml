---
# internal.vmware.vcsa : tasks/stig.yaml
# =============================================================================
# VCSA STIG — three-phase audit/remediate orchestrator
#
# Phase 0: Determine run mode and set context
# Phase 1: Execute STIG tasks (profile vars + Photon baseline + service loop)
# Phase 2: Post-remediation verification (re-run service loop in check_mode)
# =============================================================================

# =============================================================================
# Phase 0 | Preconditions
# =============================================================================
- name: "VCSA STIG | Phase 0 | Backward-compat aliases"
  ansible.builtin.set_fact:
    vcsa_stig_enable_audit: >-
      {{ vmware_stig_enable_audit
         | default(vcenter_stig_enable_audit
         | default(vcsa_stig_enable_audit)) | default(true) }}
    vcsa_stig_enable_hardening: >-
      {{ vmware_stig_enable_hardening
         | default(vcenter_stig_enable_hardening
         | default(vcsa_stig_enable_hardening)) | default(false) }}
  changed_when: false

- name: "VCSA STIG | Phase 0 | Resolve canonical action"
  ansible.builtin.set_fact:
    _ncs_stig_action: "{{ _ncs_requested_action | default(ncs_action | default('audit')) }}"
  changed_when: false

# Back-set vmware_stig_enable_hardening so the VCSA service tasks
# continue working — they have 100+ inline references to vmware_stig_enable_hardening.
- name: "VCSA STIG | Phase 0 | Back-set vmware_stig_enable_hardening for service tasks"
  ansible.builtin.set_fact:
    vmware_stig_enable_hardening: "{{ vcsa_stig_enable_hardening }}"
  changed_when: false

- name: "VCSA STIG | Phase 0 | Determine run mode"
  ansible.builtin.set_fact:
    _stig_audit_only: >-
      {{ _ncs_stig_action in ['audit', 'verify'] }}
    vcsa_stig_enable_audit: "{{ _ncs_stig_action in ['audit', 'verify'] }}"
    vcsa_stig_enable_hardening: "{{ _ncs_stig_action == 'remediate' }}"
  changed_when: false

- name: "VCSA STIG | Phase 0 | Register target context for ncs_collector"
  ansible.builtin.set_fact:
    _ncs_stig_target_host: "{{ inventory_hostname }}"
    _ncs_stig_target_type: "vcsa"
  tags:
    - always

- name: "VCSA STIG | Phase 0 | Set phase hint for included tasks"
  ansible.builtin.set_fact:
    _stig_phase_hint: "{{ 'audit' if (_stig_audit_only | bool) else 'remediate' }}"
    _stig_active_phase: "{{ 'audit' if (_stig_audit_only | bool) else 'remediate' }}"
  changed_when: false

# =============================================================================
# Phase 1 | Evaluate / Remediate
# =============================================================================
- name: "VCSA STIG | Phase 1 | Evaluate and/or remediate"
  when:
    - _ncs_stig_action in ['audit', 'remediate']
  block:
    - name: "VCSA STIG | Load VCSA profile vars"
      ansible.builtin.include_vars: "vcsa_{{ vcsa_stig_profile | default('v1r4') }}.yaml"

    - name: "VCSA STIG | Optional Photon baseline"
      ansible.builtin.include_role:
        name: internal.linux.photon
      vars:
        ncs_action: "{{ 'remediate' if (vcsa_stig_enable_hardening | default(false) | bool) else 'audit' }}"
        ncs_profile: stig
      when: vcsa_stig_include_photon | default(false) | bool

    - name: "VCSA STIG | Execute VCSA service tasks"
      ansible.builtin.include_tasks:
        file: "{{ role_path }}/tasks/stig_service.yaml"
        apply:
          check_mode: "{{ (_stig_phase2_verify | default(false) | bool) or (not (vcsa_stig_enable_hardening | default(false) | bool)) }}"
          tags: [stig_task]
      loop: "{{ vcsa_stig_services | default(_vcsa_stig_default_services) }}"
      loop_control:
        loop_var: _vcsa_service
        label: "{{ _vcsa_service.name }}"
      vars:
        _vcsa_stig_default_services:
          # - { name: misc, target_type: vcsa }
          - { name: eam, target_type: eam }
          - { name: lookup, target_type: lookup_svc }
          - { name: perfcharts, target_type: perfcharts }
          - { name: postgresql, target_type: postgresql }
          - { name: rhttpproxy, target_type: rhttpproxy }
          - { name: sts, target_type: sts }
          - { name: ui, target_type: ui }
          - { name: vami, target_type: vami }

    - name: "VCSA STIG | Phase 1b | Flag run as complete"
      ansible.builtin.set_fact:
        _stig_audit_ran: true
        _stig_remediation_ran: "{{ not (_stig_audit_only | bool) }}"
      changed_when: false
  rescue:
    - name: "VCSA STIG | Phase 1r | Set failure flag"
      ansible.builtin.set_fact:
        _stig_run_failed: true
      changed_when: false

    - name: "VCSA STIG | Phase 1r | Log failure"
      ansible.builtin.debug:
        msg: >-
          VCSA STIG {{ 'audit' if (_stig_audit_only | bool) else 'remediation' }}
          failed on {{ inventory_hostname }}. Partial results emitted via ncs_collector.
  always:
    - name: "VCSA STIG | Phase 1 | Log completion"
      ansible.builtin.debug:
        msg: >-
          VCSA STIG {{ 'audit' if (_stig_audit_only | bool) else 'remediation' }}
          completed on {{ inventory_hostname }}. Results emitted via ncs_collector.

# =============================================================================
# Phase 2 | Post-remediation verification (remediate mode only)
# =============================================================================
- name: "VCSA STIG | Phase 2 | Set phase hint to audit"
  ansible.builtin.set_fact:
    _stig_phase_hint: "audit"
    _stig_active_phase: "audit"
  changed_when: false
  when:
    - _ncs_stig_action == 'verify'

- name: "VCSA STIG | Phase 2 | Post-remediation audit"
  when:
    - _ncs_stig_action == 'verify'
  block:
    - name: "VCSA STIG | Phase 2a | Verify remediation (check_mode)"
      ansible.builtin.include_tasks:
        file: "{{ role_path }}/tasks/stig_service.yaml"
        apply:
          check_mode: true
          tags: [stig_task]
      loop: "{{ vcsa_stig_services | default(_vcsa_stig_default_services) }}"
      loop_control:
        loop_var: _vcsa_service
        label: "{{ _vcsa_service.name }}"
      vars:
        _stig_phase2_verify: true
        _vcsa_stig_default_services:
          - { name: eam, target_type: eam }
          - { name: lookup, target_type: lookup_svc }
          - { name: perfcharts, target_type: perfcharts }
          - { name: postgresql, target_type: postgresql }
          - { name: rhttpproxy, target_type: rhttpproxy }
          - { name: sts, target_type: sts }
          - { name: ui, target_type: ui }
          - { name: vami, target_type: vami }

    - name: "VCSA STIG | Phase 2b | Flag verification as complete"
      ansible.builtin.set_fact:
        _stig_audit_ran: true
      changed_when: false
  rescue:
    - name: "VCSA STIG | Phase 2r | Log verification failure"
      ansible.builtin.debug:
        msg: "Post-remediation STIG audit failed on {{ inventory_hostname }}. Exporting partial results."
