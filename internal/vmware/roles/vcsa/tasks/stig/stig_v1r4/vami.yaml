---

- name: "VAMI | Create backup timestamp"
  ansible.builtin.set_fact:
    backup_timestamp: "{{ lookup('pipe', 'date +%Y-%m-%d-%H-%M-%S') }}"
  when:
    - run_create_backups | default(true) | bool
    - vmware_stig_enable_hardening | default(false) | bool

- name: "VAMI | Backup config files"
  ansible.builtin.copy:
    remote_src: true
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    mode: preserve
  loop:
    - { src: "{{ var_conf_path }}", dest: "/tmp/ansible-vcsa-vami-backups-{{ backup_timestamp }}/" }
    - { src: "{{ var_syslog_conf_path }}", dest: "/tmp/ansible-vcsa-vami-backups-{{ backup_timestamp }}/" }
    - { src: "{{ var_conf_path_etc }}", dest: "/tmp/ansible-vcsa-vami-backups-{{ backup_timestamp }}/etc/" }
  changed_when: false
  register: backupresult
  failed_when:
    - backupresult.msg is defined
    - "'not found' not in backupresult.msg"
  when:
    - run_create_backups | default(true) | bool
    - vmware_stig_enable_hardening | default(false) | bool

- name: "VCLD-70-000001/000003/000005/000012/000014/000016/000018/000020/000022/000024/000025/000026/000056 | Normalize primary VAMI lighttpd settings"
  ansible.builtin.lineinfile:
    path: "{{ var_conf_path }}"
    regexp: "{{ item.regexp }}"
    line: "{{ item.line | default(omit) }}"
    state: "{{ item.state | default('present') }}"
    firstmatch: true
  loop:
    - { regexp: '^server.max-connections.*$', line: 'server.max-connections = {{ var_conf_server_max_connections }}' }
    - { regexp: '^ssl.engine.*$', line: 'ssl.engine = {{ var_conf_ssl_engine }}' }
    - { regexp: '^server.errorlog.*$', line: 'server.errorlog = "/opt/vmware/var/log/lighttpd/error.log"' }
    - { regexp: '^mimetype.use-xattr.*$', line: 'mimetype.use-xattr = "{{ var_conf_mimetype_xattr }}"' }
    - { regexp: '^url.access-deny.*$', line: 'url.access-deny             = {{ var_conf_url_access_deny }}' }
    - { regexp: '^server.max-keep-alive-idle.*$', line: 'server.max-keep-alive-idle = {{ var_conf_server_max_keep_alive_idle }}' }
    - { regexp: '^server.max-fds.*$', line: 'server.max-fds = {{ var_conf_server_max_fds }}' }
    - { regexp: '^dir-listing.activate.*$', line: 'dir-listing.activate = "{{ var_conf_dir_listing_activate }}"' }
    - { regexp: '^debug.log-request-handling.*$', line: 'debug.log-request-handling = "{{ var_conf_debug_log_request_handling }}"' }
    - { regexp: '^ssl.use-sslv2.*$', line: 'ssl.use-sslv2 = "{{ var_conf_ssl_disabled_versions }}"' }
    - { regexp: '^ssl.use-sslv3.*$', line: 'ssl.use-sslv3 = "{{ var_conf_ssl_disabled_versions }}"' }
    - { regexp: '^ssl.use-tlsv10.*$', line: 'ssl.use-tlsv10 = "{{ var_conf_ssl_disabled_versions }}"' }
    - { regexp: '^ssl.use-tlsv11.*$', line: 'ssl.use-tlsv11 = "{{ var_conf_ssl_disabled_versions }}"' }
    - { regexp: '^ssl.use-tlsv12.*$', line: 'ssl.use-tlsv12 = "{{ var_conf_ssl_enabled_versions }}"' }
    - { regexp: '^ssl.honor-cipher-order.*$', line: 'ssl.honor-cipher-order = "{{ var_conf_ssl_honor_cipher_order }}"' }
    - { regexp: '^ssl.disable-client-renegotiation.*$', state: absent }
    - { regexp: '^server.fips-mode.*$', line: 'server.fips-mode = "{{ var_conf_server_fips_mode }}"' }
  when:
    - vmware_stig_enable_hardening | default(false) | bool
  notify:
    - restart vami

- name: "VCLD-70-000002/000027 | Normalize VAMI appliance override settings"
  ansible.builtin.lineinfile:
    path: "{{ var_conf_path_etc }}"
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
    firstmatch: true
  loop:
    - { regexp: '^ssl.cipher-list.*$', line: 'ssl.cipher-list = "{{ var_conf_ssl_ciphers }}"' }
    - { regexp: '^server.tag.*$', line: 'server.tag = "{{ var_conf_server_tag }}"' }
  when:
    - vmware_stig_enable_hardening | default(false) | bool
  notify:
    - restart vami

- name: "VCLD-70-000004/000010 | Ensure required primary server modules"
  ansible.builtin.lineinfile:
    path: "{{ var_conf_path }}"
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    insertafter: "{{ item.insertafter | default(omit) }}"
    firstmatch: true
    state: present
  loop:
    - { regexp: '^server.modules = \($', line: 'server.modules = (' }
    - { regexp: '^  "mod_access",$', line: '  "mod_access",', insertafter: '^server.modules = \($' }
    - { regexp: '^  "mod_accesslog",$', line: '  "mod_accesslog",', insertafter: '^  "mod_access",$' }
    - { regexp: '^  "mod_proxy",$', line: '  "mod_proxy",', insertafter: '^  "mod_accesslog",$' }
    - { regexp: '^  "mod_cgi",$', line: '  "mod_cgi",', insertafter: '^  "mod_proxy",$' }
    - { regexp: '^  "mod_rewrite",$', line: '  "mod_rewrite",', insertafter: '^  "mod_cgi",$' }
    - { regexp: '^server.modules \+= \( "mod_magnet" \)$', line: 'server.modules += ( "mod_magnet" )' }
  when:
    - vmware_stig_enable_hardening | default(false) | bool
  notify:
    - restart vami

- name: "VCLD-70-000010 | Ensure mod_setenv load override"
  ansible.builtin.lineinfile:
    path: "{{ var_conf_path_etc }}"
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    insertafter: "{{ item.insertafter | default(omit) }}"
    firstmatch: true
    state: present
  loop:
    - { regexp: '^server.modules\s*\+= \($', line: 'server.modules += (' }
    - { regexp: '^\s*"mod_setenv"$', line: '        "mod_setenv"', insertafter: '^server.modules \+= \($' }
  when:
    - vmware_stig_enable_hardening | default(false) | bool
  notify:
    - restart vami

- name: "VCLD-70-000006 | Comment accesslog.format entries"
  ansible.builtin.replace:
    path: "{{ var_conf_path }}"
    regexp: '^(accesslog\\.format.*)$'
    replace: '# \\1'
  when:
    - vmware_stig_enable_hardening | default(false) | bool
  notify:
    - restart vami

- name: "VCLD-70-000011/000013/000015/000021/000023 | Normalize CGI and module exclusions"
  ansible.builtin.lineinfile:
    path: "{{ item.path }}"
    regexp: "{{ item.regexp }}"
    line: "{{ item.line | default(omit) }}"
    state: "{{ item.state | default('present') }}"
    insertafter: "{{ item.insertafter | default(omit) }}"
    firstmatch: true
  loop:
    - { path: "{{ var_conf_path }}", regexp: '^.*"\\.sh".*$', state: absent }
    - { path: "{{ var_conf_path }}", regexp: '^.*"\\.csh".*$', state: absent }
    - { path: "{{ var_conf_path }}", regexp: '^cgi.assign\\s*=.*$', line: 'cgi.assign                 = ( ".py"  => "/usr/bin/python" )' }
    - { path: "{{ var_conf_path_etc }}", regexp: '^cgi.assign \\+=.*$', line: 'cgi.assign += ( ".cgi"  => "/usr/bin/python" )', insertafter: '^#------HTTPPORT_CONFIG END------$' }
    - { path: "{{ var_conf_path }}", regexp: '^.*mod_webdav.*$', state: absent }
    - { path: "{{ var_conf_path }}", regexp: '^.*mod_status.*$', state: absent }
    - { path: "{{ var_conf_path }}", regexp: '^User=.*$', state: absent }
  when:
    - vmware_stig_enable_hardening | default(false) | bool
  notify:
    - restart vami

- name: "VCLD-70-000019 | Discover text MIME types without UTF-8 charset"
  ansible.builtin.shell:
    executable: /bin/bash
    cmd: |
      set -o pipefail
      grep 'text/' '{{ var_conf_path }}' | grep -v 'charset=utf-8' || true
  register: _vami_bad_mime_types
  changed_when: false

- name: "VCLD-70-000019 | Normalize text MIME types to UTF-8"
  ansible.builtin.lineinfile:
    path: "{{ var_conf_path }}"
    regexp: "{{ item }}"
    line: '{{ item | regex_replace(''",$'', '''') }}; charset=utf-8",'
    state: present
  loop: "{{ _vami_bad_mime_types.stdout_lines | default([]) }}"
  when:
    - (_vami_bad_mime_types.stdout_lines | default([])) | length > 0
    - vmware_stig_enable_hardening | default(false) | bool
  notify:
    - restart vami

- name: "VCLD-70-000007 | Discover non-compliant VAMI log files"
  ansible.builtin.find:
    paths: /opt/vmware/var/log/lighttpd
    file_type: file
    patterns: '*.log'
  register: _vami_logs

- name: "VCLD-70-000007 | Correct VAMI log ownership and mode"
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: file
    owner: root
    group: root
    mode: "0644"
  loop: "{{ _vami_logs.files | default([]) }}"
  when:
    - vmware_stig_enable_hardening | default(false) | bool

- name: "VCLD-70-000008 | Deploy vmware-services-applmgmt.conf"
  ansible.builtin.template:
    src: stig/vmware-services-applmgmt.conf
    dest: "{{ var_syslog_conf_path }}"
    owner: root
    group: root
    mode: "0644"
    force: true
  when:
    - run_vami_syslog_config | bool
    - vmware_stig_enable_hardening | default(false) | bool
  notify:
    - restart syslog

- name: "VCLD-70-000017 | Protect server.pem"
  ansible.builtin.file:
    path: "{{ var_server_pem_file }}"
    state: file
    owner: root
    group: root
    mode: "0600"
  when:
    - run_key_permissions | bool
    - vmware_stig_enable_hardening | default(false) | bool

- name: "stigrule_VCLD-70-000001"
  internal.core.stig:
    _stig_id: VCLD-70-000001
    _stig_apply: ansible.builtin.shell
    _stig_audit_only: true
    _stig_manage: "{{ run_conf_server_max_connections | bool }}"
    _stig_use_check_mode_probe: false
    _stig_validate: ansible.builtin.command
    _stig_validate_args:
      argv: [/bin/bash, -lc, "test \"$(/opt/vmware/sbin/vami-lighttpd -p -f '{{ var_conf_path }}' 2>/dev/null |grep 'server.max-connections'|sed -e 's/^[ ]*//')\" = 'server.max-connections            = 1024'"]
    cmd: "true"

- name: "stigrule_VCLD-70-000002"
  internal.core.stig:
    _stig_id: VCLD-70-000002
    _stig_apply: ansible.builtin.shell
    _stig_audit_only: true
    _stig_manage: "{{ run_conf_ssl_ciphers | bool }}"
    _stig_use_check_mode_probe: false
    _stig_validate: ansible.builtin.command
    _stig_validate_args:
      argv: [/bin/bash, -lc, "test \"$(/opt/vmware/sbin/vami-lighttpd -p -f '{{ var_conf_path }}' 2>/dev/null|grep 'ssl.cipher-list'|sed -e 's/^[ ]*//')\" = 'ssl.cipher-list                   = \"{{ var_conf_ssl_ciphers }}\"'"]
    cmd: "true"

- name: "stigrule_VCLD-70-000003"
  internal.core.stig:
    _stig_id: VCLD-70-000003
    _stig_apply: ansible.builtin.shell
    _stig_audit_only: true
    _stig_manage: "{{ run_conf_ssl_engine | bool }}"
    _stig_use_check_mode_probe: false
    _stig_validate: ansible.builtin.command
    _stig_validate_args:
      argv: [/bin/bash, -lc, "test \"$(/opt/vmware/sbin/vami-lighttpd -p -f '{{ var_conf_path }}' 2>/dev/null|grep 'ssl.engine'|sed -e 's/^[ ]*//')\" = 'ssl.engine                        = \"enable\"'"]
    cmd: "true"

- name: "stigrule_VCLD-70-000004"
  internal.core.stig:
    _stig_id: VCLD-70-000004
    _stig_apply: ansible.builtin.shell
    _stig_audit_only: true
    _stig_manage: "{{ run_conf_server_mod_accesslog | bool }}"
    _stig_use_check_mode_probe: false
    _stig_validate: ansible.builtin.command
    _stig_validate_args:
      argv: [/bin/bash, -lc, "test \"$(/opt/vmware/sbin/vami-lighttpd -p -f '{{ var_conf_path }}' 2>/dev/null|awk '/server\\.modules/,/\\)/'|grep mod_accesslog|sed -e 's/^[ ]*//')\" = '\"mod_accesslog\",'"]
    cmd: "true"

- name: "stigrule_VCLD-70-000005"
  internal.core.stig:
    _stig_id: VCLD-70-000005
    _stig_apply: ansible.builtin.shell
    _stig_audit_only: true
    _stig_manage: "{{ run_conf_server_error_log | bool }}"
    _stig_use_check_mode_probe: false
    _stig_validate: ansible.builtin.command
    _stig_validate_args:
      argv: [/bin/bash, -lc, "test \"$(/opt/vmware/sbin/vami-lighttpd -p -f '{{ var_conf_path }}' 2>/dev/null|grep 'server.errorlog'|sed -e 's/^[ ]*//')\" = 'server.errorlog                   = \"/opt/vmware/var/log/lighttpd/error.log\"'"]
    cmd: "true"

- name: "stigrule_VCLD-70-000006"
  internal.core.stig:
    _stig_id: VCLD-70-000006
    _stig_apply: ansible.builtin.shell
    _stig_audit_only: true
    _stig_manage: "{{ run_conf_comment_accesslog_format | bool }}"
    _stig_use_check_mode_probe: false
    _stig_validate: ansible.builtin.command
    _stig_validate_args:
      argv: [/bin/bash, -lc, "test -z \"$(/opt/vmware/sbin/vami-lighttpd -p -f '{{ var_conf_path }}' 2>/dev/null|grep 'accesslog.format'|sed -e 's/^[ ]*//')\""]
    cmd: "true"

- name: "stigrule_VCLD-70-000007"
  internal.core.stig:
    _stig_id: VCLD-70-000007
    _stig_apply: ansible.builtin.shell
    _stig_audit_only: true
    _stig_manage: "{{ run_vami_logs | bool }}"
    _stig_use_check_mode_probe: false
    _stig_validate: ansible.builtin.command
    _stig_validate_args:
      argv: [/bin/bash, -lc, "test -z \"$(find /opt/vmware/var/log/lighttpd/ -xdev -type f -a '(' -perm -o+w -o -not -user root -o -not -group root ')' -exec ls -ld {} \\; )\""]
    cmd: "true"

- name: "stigrule_VCLD-70-000008"
  internal.core.stig:
    _stig_id: VCLD-70-000008
    _stig_apply: ansible.builtin.shell
    _stig_audit_only: true
    _stig_manage: "{{ run_vami_syslog_config | bool }}"
    _stig_use_check_mode_probe: false
    _stig_validate: ansible.builtin.command
    _stig_validate_args:
      argv: [/bin/bash, -lc, "test -z \"$(rpm -V VMware-visl-integration|grep vmware-services-applmgmt.conf || true)\""]
    cmd: "true"

- name: "stigrule_VCLD-70-000009"
  internal.core.stig:
    _stig_id: VCLD-70-000009
    _stig_apply: ansible.builtin.shell
    _stig_audit_only: true
    _stig_manage: true
    _stig_use_check_mode_probe: false
    _stig_validate: ansible.builtin.command
    _stig_validate_args:
      argv: [/bin/bash, -lc, "test -z \"$(rpm -qa|grep lighttpd|xargs rpm -V|grep -v -E 'lighttpd.conf|vami-lighttp.service' || true)\""]
    cmd: "true"

- name: "stigrule_VCLD-70-000010"
  internal.core.stig:
    _stig_id: VCLD-70-000010
    _stig_apply: ansible.builtin.shell
    _stig_audit_only: true
    _stig_manage: "{{ run_conf_set_server_modules | bool }}"
    _stig_use_check_mode_probe: false
    _stig_validate: ansible.builtin.command
    _stig_validate_args:
      argv:
        - /bin/bash
        - -lc
        - |
          python3 - <<'PY'
          import re, subprocess
          cmd = r"""/opt/vmware/sbin/vami-lighttpd -p -f '{{ var_conf_path }}' 2>/dev/null|awk '/server\.modules/,/\)/'|sed -e 's/^[ ]*//'"""
          out = subprocess.check_output(['/bin/bash', '-lc', cmd], text=True).strip()
          norm = re.sub(r'\s*=\s*', '=', out)
          norm = re.sub(r'#\s+(\d+)', r'#\1', norm)
          expected = 'server.modules=(\n"mod_access",\n"mod_accesslog",\n"mod_proxy",\n"mod_cgi",\n"mod_rewrite",\n"mod_magnet",\n"mod_setenv",\n#7\n)'
          raise SystemExit(0 if norm == expected else 1)
          PY
    cmd: "true"

- name: "stigrule_VCLD-70-000011"
  internal.core.stig:
    _stig_id: VCLD-70-000011
    _stig_apply: ansible.builtin.shell
    _stig_audit_only: true
    _stig_manage: "{{ run_conf_remove_shell_mimetypes | bool }}"
    _stig_use_check_mode_probe: false
    _stig_validate: ansible.builtin.command
    _stig_validate_args:
      argv: [/bin/bash, -lc, "test -z \"$(/opt/vmware/sbin/vami-lighttpd -p -f '{{ var_conf_path }}' 2>/dev/null|awk '/mimetype\\.assign/,/\\)/'|grep -E '\\.sh|\\.csh' || true)\""]
    cmd: "true"

- name: "stigrule_VCLD-70-000012"
  internal.core.stig:
    _stig_id: VCLD-70-000012
    _stig_apply: ansible.builtin.shell
    _stig_audit_only: true
    _stig_manage: "{{ run_conf_mimetype_xattr | bool }}"
    _stig_use_check_mode_probe: false
    _stig_validate: ansible.builtin.command
    _stig_validate_args:
      argv: [/bin/bash, -lc, "test \"$(/opt/vmware/sbin/vami-lighttpd -p -f '{{ var_conf_path }}' 2>/dev/null|grep 'mimetype.use-xattr'|sed 's: ::g')\" = 'mimetype.use-xattr=\"disable\"'"]
    cmd: "true"

- name: "stigrule_VCLD-70-000013"
  internal.core.stig:
    _stig_id: VCLD-70-000013
    _stig_apply: ansible.builtin.shell
    _stig_audit_only: true
    _stig_manage: "{{ run_conf_set_cgi_assign | bool }}"
    _stig_use_check_mode_probe: false
    _stig_validate: ansible.builtin.command
    _stig_validate_args:
      argv:
        - /bin/bash
        - -lc
        - |
          python3 - <<'PY'
          import re, subprocess
          cmd = r"""/opt/vmware/sbin/vami-lighttpd -p -f '{{ var_conf_path }}' 2>/dev/null|awk '/cgi\.assign/,/\)/'|sed -e 's/^[ ]*//'"""
          out = subprocess.check_output(['/bin/bash', '-lc', cmd], text=True).strip()
          norm = re.sub(r'[ ]+', ' ', out)
          expected = 'cgi.assign = (\n".py" => "/usr/bin/python",\n".cgi" => "/usr/bin/python",\n# 2\n)'
          raise SystemExit(0 if norm == expected else 1)
          PY
    cmd: "true"

- name: "stigrule_VCLD-70-000014"
  internal.core.stig:
    _stig_id: VCLD-70-000014
    _stig_apply: ansible.builtin.shell
    _stig_audit_only: true
    _stig_manage: "{{ run_conf_url_access_deny | bool }}"
    _stig_use_check_mode_probe: false
    _stig_validate: ansible.builtin.command
    _stig_validate_args:
      argv: [/bin/bash, -lc, "test \"$(grep 'url.access-deny' '{{ var_conf_path }}')\" = 'url.access-deny             = ( \"~\", \".inc\" )'"]
    cmd: "true"

- name: "stigrule_VCLD-70-000015"
  internal.core.stig:
    _stig_id: VCLD-70-000015
    _stig_apply: ansible.builtin.shell
    _stig_audit_only: true
    _stig_manage: "{{ run_conf_remove_mod_webdav | bool }}"
    _stig_use_check_mode_probe: false
    _stig_validate: ansible.builtin.command
    _stig_validate_args:
      argv: [/bin/bash, -lc, "test -z \"$(/opt/vmware/sbin/vami-lighttpd -p -f '{{ var_conf_path }}' 2>/dev/null|awk '/server\\.modules/,/\\)/'|grep mod_webdav || true)\""]
    cmd: "true"

- name: "stigrule_VCLD-70-000016"
  internal.core.stig:
    _stig_id: VCLD-70-000016
    _stig_apply: ansible.builtin.shell
    _stig_audit_only: true
    _stig_manage: "{{ run_conf_server_max_keep_alive_idle | bool }}"
    _stig_use_check_mode_probe: false
    _stig_validate: ansible.builtin.command
    _stig_validate_args:
      argv: [/bin/bash, -lc, "test \"$(/opt/vmware/sbin/vami-lighttpd -p -f '{{ var_conf_path }}' 2>/dev/null|grep 'server.max-keep-alive-idle'|sed 's: ::g')\" = 'server.max-keep-alive-idle=30'"]
    cmd: "true"

- name: "stigrule_VCLD-70-000017"
  internal.core.stig:
    _stig_id: VCLD-70-000017
    _stig_apply: ansible.builtin.shell
    _stig_audit_only: true
    _stig_manage: "{{ run_key_permissions | bool }}"
    _stig_use_check_mode_probe: false
    _stig_validate: ansible.builtin.command
    _stig_validate_args:
      argv: [/bin/bash, -lc, "test \"$(stat -c '%n has %a permissions and is owned by %U:%G' '{{ var_server_pem_file }}')\" = '{{ var_server_pem_file }} has 600 permissions and is owned by root:root'"]
    cmd: "true"

- name: "stigrule_VCLD-70-000018"
  internal.core.stig:
    _stig_id: VCLD-70-000018
    _stig_apply: ansible.builtin.shell
    _stig_audit_only: true
    _stig_manage: "{{ run_conf_server_max_fds | bool }}"
    _stig_use_check_mode_probe: false
    _stig_validate: ansible.builtin.command
    _stig_validate_args:
      argv: [/bin/bash, -lc, "test \"$(/opt/vmware/sbin/vami-lighttpd -p -f '{{ var_conf_path }}' 2>/dev/null|grep 'server.max-fds'|sed 's: ::g')\" = 'server.max-fds=2048'"]
    cmd: "true"

- name: "stigrule_VCLD-70-000019"
  internal.core.stig:
    _stig_id: VCLD-70-000019
    _stig_apply: ansible.builtin.shell
    _stig_audit_only: true
    _stig_manage: "{{ run_conf_text_mime_utf8 | bool }}"
    _stig_use_check_mode_probe: false
    _stig_validate: ansible.builtin.command
    _stig_validate_args:
