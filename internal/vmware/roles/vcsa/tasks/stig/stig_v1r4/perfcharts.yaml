---

- name: "Perfcharts | Create backup timestamp"
  ansible.builtin.set_fact:
    backup_timestamp: "{{ lookup('pipe', 'date +%Y-%m-%d-%H-%M-%S') }}"
  when:
    - run_create_backups | default(create_backups | default(true)) | bool
    - vmware_stig_enable_hardening | default(false) | bool

- name: "Perfcharts | Backup config files"
  ansible.builtin.copy:
    remote_src: true
    src: "{{ item }}"
    dest: "/tmp/ansible-vcsa-perfcharts-backups-{{ backup_timestamp }}/"
    mode: preserve
  loop:
    - "{{ var_server_xml_path }}"
    - "{{ var_web_xml_path }}"
    - "{{ var_web_stats_xml_path }}"
    - "{{ var_json_path }}"
    - "{{ var_catalina_props_path }}"
    - "{{ var_perf_log4j_path }}"
    - "{{ var_syslog_conf_path }}"
  changed_when: false
  register: backupresult
  failed_when:
    - backupresult.msg is defined
    - "'not found' not in backupresult.msg"
  when:
    - run_create_backups | default(create_backups | default(true)) | bool
    - vmware_stig_enable_hardening | default(false) | bool

- name: "VCPF-70-000011/000018/000031/000032 | Deploy compliant catalina.properties"
  ansible.builtin.template:
    src: stig/perfcharts_catalina.properties
    dest: "{{ var_catalina_props_path }}"
    owner: perfcharts
    group: cis
    mode: "0644"
    force: true
  when:
    - (run_catalina_properties_packages | bool) or
      (run_catalina_properties_shutdown | bool) or
      (run_catalina_properties_bioport | bool) or
      (run_catalina_properties_shutdownport | bool)
    - vmware_stig_enable_hardening | default(false) | bool
  notify:
    - restart perfcharts

- name: "VCPF-70-000029 | Deploy log4j.properties"
  ansible.builtin.template:
    src: stig/perfcharts_log4j.properties
    dest: "{{ var_perf_log4j_path }}"
    owner: root
    group: root
    mode: "0655"
    force: true
  when:
    - run_perfcharts_log_rotation | bool
    - vmware_stig_enable_hardening | default(false) | bool

- name: "VCPF-70-000030 | Deploy vmware-services-perfcharts.conf"
  ansible.builtin.template:
    src: stig/vmware-services-perfcharts.conf
    dest: "{{ var_syslog_conf_path }}"
    owner: root
    group: root
    mode: "0644"
    force: true
  when:
    - run_perfcharts_syslog_config | bool
    - vmware_stig_enable_hardening | default(false) | bool
  notify:
    - restart syslog

- name: "VCPF-70-000006 | Normalize perfcharts.json"
  ansible.builtin.lineinfile:
    path: "{{ var_json_path }}"
    regexp: '^.*"StreamRedirectFile".*$'
    line: '    "StreamRedirectFile" : "{{ var_stream_redirect_file }}",'
    insertbefore: ^.*WorkingDir.*$
    firstmatch: true
    state: present
  when:
    - run_json_stream_redirect_file | bool
    - vmware_stig_enable_hardening | default(false) | bool
  notify:
    - restart perfcharts

- name: "VCPF-70-000012 | Remove prohibited MIME mappings"
  community.general.xml:
    path: "{{ var_web_xml_path }}"
    xpath: "{{ item }}"
    state: absent
    namespaces:
      x: http://xmlns.jcp.org/xml/ns/javaee
  loop:
    - '/x:web-app/x:mime-mapping[x:extension="csh"]'
    - '/x:web-app/x:mime-mapping[x:extension="sh"]'
    - '/x:web-app/x:mime-mapping[x:extension="shar"]'
    - '/x:web-app/x:mime-mapping[x:extension="ksh"]'
  when:
    - run_removed_mime_mappings | bool
    - vmware_stig_enable_hardening | default(false) | bool
  notify:
    - restart perfcharts

- name: "VCPF-70-000013 | Ensure JSP servlet mappings"
  community.general.xml:
    path: "{{ var_web_xml_path }}"
    xpath: "{{ item.xpath }}"
    value: "{{ item.value }}"
    namespaces:
      x: http://xmlns.jcp.org/xml/ns/javaee
    state: present
  loop:
    - { xpath: '/x:web-app/x:servlet-mapping[x:servlet-name="jsp"]/x:url-pattern[1]', value: '{{ var_web_xml_servlet_jsp_url_pattern1 }}' }
    - { xpath: '/x:web-app/x:servlet-mapping[x:servlet-name="jsp"]/x:url-pattern[2]', value: '{{ var_web_xml_servlet_jsp_url_pattern2 }}' }
  when:
    - run_java_servlet | bool
    - vmware_stig_enable_hardening | default(false) | bool
  notify:
    - restart perfcharts

- name: "VCPF-70-000005/000020/000025/000026 | Normalize server.xml text"
  ansible.builtin.shell:
    executable: /bin/bash
    cmd: |
      python3 - <<'PY'
      import re
      from pathlib import Path

      path = Path("{{ var_server_xml_path }}")
      text = path.read_text()

      text = re.sub(
          r'pattern="[^"]*"',
          'pattern="%h %{X-Forwarded-For}i %l %u %t &quot;%r&quot; %s %b &quot;%{User-Agent}i&quot;"',
          text,
          count=1,
      )
      text = re.sub(
          r'<Valve className="org\.apache\.catalina\.valves\.ErrorReportValve"[^>]*/>',
          '<Valve className="org.apache.catalina.valves.ErrorReportValve" showServerInfo="false" showReport="false"/>',
          text,
          count=1,
      )

      def _replace_connector(match):
          attrs = match.group(1)
          if 'URIEncoding=' in attrs:
              attrs = re.sub(r'URIEncoding="[^"]*"', 'URIEncoding="UTF-8"', attrs)
          else:
              attrs = attrs.rstrip() + ' URIEncoding="UTF-8"'
          if 'server=' in attrs:
              attrs = re.sub(r'server="[^"]*"', 'server="Anonymous"', attrs)
          else:
              attrs = attrs.rstrip() + ' server="Anonymous"'
          return f"<Connector{attrs}/>"

      text = re.sub(r'<Connector([^>]*)/>', _replace_connector, text, count=1)
      path.write_text(text)
      PY
  when:
    - (run_access_valve_pattern | bool) or
      (run_uri_encoding | bool) or
      (run_hide_error_reports | bool) or
      (run_server_anonymous | bool)
    - vmware_stig_enable_hardening | default(false) | bool
  notify:
    - restart perfcharts

- name: "VCPF-70-000021/000024/000033 | Normalize statsreport web.xml"
  ansible.builtin.shell:
    executable: /bin/bash
    cmd: |
      python3 - <<'PY'
      import xml.etree.ElementTree as ET

      path = "{{ var_web_stats_xml_path }}"
      ns_uri = "http://java.sun.com/xml/ns/javaee"
      ns = {"x": ns_uri}
      tag = lambda name: "{" + ns_uri + "}" + name
      ET.register_namespace("", ns_uri)

      tree = ET.parse(path)
      root = tree.getroot()

      session_config = root.find("./x:session-config", ns)
      if session_config is not None:
          cookie_config = session_config.find("./x:cookie-config", ns)
          if cookie_config is None:
              cookie_config = ET.SubElement(session_config, tag("cookie-config"))
          http_only = cookie_config.find("./x:http-only", ns)
          if http_only is None:
              http_only = ET.SubElement(cookie_config, tag("http-only"))
          http_only.text = "true"
          secure = cookie_config.find("./x:secure", ns)
          if secure is None:
              secure = ET.SubElement(cookie_config, tag("secure"))
          secure.text = "true"

      for node in list(root.findall('./x:filter-mapping[x:filter-name="setCharacterEncodingFilter"]', ns)):
          root.remove(node)
      for node in list(root.findall('./x:filter[x:filter-name="setCharacterEncodingFilter"]', ns)):
          root.remove(node)

      filter_node = ET.Element(tag("filter"))
      ET.SubElement(filter_node, tag("filter-name")).text = "setCharacterEncodingFilter"
      ET.SubElement(filter_node, tag("filter-class")).text = "org.apache.catalina.filters.SetCharacterEncodingFilter"
      init_encoding = ET.SubElement(filter_node, tag("init-param"))
      ET.SubElement(init_encoding, tag("param-name")).text = "encoding"
      ET.SubElement(init_encoding, tag("param-value")).text = "UTF-8"
      init_ignore = ET.SubElement(filter_node, tag("init-param"))
      ET.SubElement(init_ignore, tag("param-name")).text = "ignore"
      ET.SubElement(init_ignore, tag("param-value")).text = "true"
      ET.SubElement(filter_node, tag("async-supported")).text = "true"

      mapping_node = ET.Element(tag("filter-mapping"))
      ET.SubElement(mapping_node, tag("filter-name")).text = "setCharacterEncodingFilter"
      ET.SubElement(mapping_node, tag("url-pattern")).text = "/*"

      error_page = root.find('./x:error-page[x:exception-type="java.lang.Throwable"]', ns)
      if error_page is None:
          error_page = ET.SubElement(root, tag("error-page"))
          ET.SubElement(error_page, tag("exception-type")).text = "java.lang.Throwable"
          ET.SubElement(error_page, tag("location")).text = "/http_error.jsp"
      else:
          location = error_page.find("./x:location", ns)
          if location is None:
              location = ET.SubElement(error_page, tag("location"))
          location.text = "/http_error.jsp"

      root.append(filter_node)
      root.append(mapping_node)
      tree.write(path, encoding="UTF-8", xml_declaration=True)
      PY
  when:
    - (run_http_only | bool) or
      (run_web_filter | bool) or
      (run_web_error_page | bool) or
      (run_web_cookie_secure | bool)
    - vmware_stig_enable_hardening | default(false) | bool
  notify:
    - restart perfcharts

- name: "VCPF-70-000023 | Normalize listings init-param"
  community.general.xml:
    path: "{{ var_web_xml_path }}"
    xpath: '/x:web-app/x:servlet[x:servlet-name="default"]/x:init-param[x:param-name="listings"]/x:param-value'
    value: "false"
    namespaces:
      x: http://xmlns.jcp.org/xml/ns/javaee
    state: present
  when:
    - run_web_remove_listings | bool
    - vmware_stig_enable_hardening | default(false) | bool
  notify:
    - restart perfcharts

- name: "VCPF-70-000034 | Remove readonly init-param"
  community.general.xml:
    path: "{{ var_web_xml_path }}"
    xpath: '/x:web-app/x:servlet[x:servlet-name="default"]/x:init-param[x:param-name="readonly"]'
    namespaces:
      x: http://xmlns.jcp.org/xml/ns/javaee
    state: absent
  when:
    - run_web_remove_readonly | bool
    - vmware_stig_enable_hardening | default(false) | bool
  notify:
    - restart perfcharts

- name: "VCPF-70-000013 | Capture JSP servlet mapping"
  ansible.builtin.command:
    argv:
      - /bin/bash
      - -lc
      - xmllint --format '{{ var_web_xml_path }}' | sed 's/xmlns=".*"//g' | xmllint --xpath '/web-app/servlet-mapping/servlet-name[text()="jsp"]/parent::servlet-mapping' - 2>/dev/null || true
  register: _vcpf_013_mapping_cmd
  changed_when: false
  check_mode: false

- name: "VCPF-70-000013 | Stage JSP servlet mapping"
  ansible.builtin.set_fact:
    _vcpf_013_mapping: "{{ _vcpf_013_mapping_cmd.stdout | default('') }}"

- name: "VCPF-70-000021 | Capture filter-mapping block"
  ansible.builtin.command:
    argv:
      - /bin/bash
      - -lc
      - xmllint --format '{{ var_web_stats_xml_path }}' | sed 's/xmlns=".*"//g' | xmllint --xpath '/web-app/filter-mapping/filter-name[text()="setCharacterEncodingFilter"]/parent::filter-mapping' - 2>/dev/null || true
  register: _vcpf_021_mapping_cmd
  changed_when: false
  check_mode: false

- name: "VCPF-70-000021 | Capture filter block"
  ansible.builtin.command:
    argv:
      - /bin/bash
      - -lc
      - xmllint --format '{{ var_web_stats_xml_path }}' | sed 's/xmlns=".*"//g' | xmllint --xpath '/web-app/filter/filter-name[text()="setCharacterEncodingFilter"]/parent::filter' - 2>/dev/null || true
  register: _vcpf_021_filter_cmd
  changed_when: false
  check_mode: false

- name: "VCPF-70-000021 | Stage filter blocks"
  ansible.builtin.set_fact:
    _vcpf_021_mapping: "{{ _vcpf_021_mapping_cmd.stdout | default('') }}"
    _vcpf_021_filter: "{{ _vcpf_021_filter_cmd.stdout | default('') }}"

- name: "VCPF-70-000023 | Capture listings init-param"
  ansible.builtin.command:
    argv:
      - /bin/bash
      - -lc
      - xmllint --format '{{ var_web_xml_path }}' | sed 's/xmlns=".*"//g' | xmllint --xpath '//param-name[text()="listings"]/parent::init-param' - 2>/dev/null || true
  register: _vcpf_023_listings_cmd
  changed_when: false
