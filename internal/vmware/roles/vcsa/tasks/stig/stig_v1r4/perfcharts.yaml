- name: "VCPF-70-000023 | Stage listings init-param"
  ansible.builtin.set_fact:
    _vcpf_023_listings: "{{ _vcpf_023_listings_cmd.stdout | default('') }}"

- name: "VCPF-70-000024 | Capture error-page block"
  ansible.builtin.command:
    argv:
      - /bin/bash
      - -lc
      - xmllint --format '{{ var_web_stats_xml_path }}' | sed 's/xmlns=".*"//g' | xmllint --xpath '/web-app/error-page/exception-type["text()=java.lang.Throwable"]/parent::error-page' - 2>/dev/null || true
  register: _vcpf_024_error_cmd
  changed_when: false
  check_mode: false

- name: "VCPF-70-000024 | Stage error-page block"
  ansible.builtin.set_fact:
    _vcpf_024_error: "{{ _vcpf_024_error_cmd.stdout | default('') }}"

- name: "VCPF-70-000034 | Capture readonly probe"
  ansible.builtin.command:
    argv:
      - /bin/bash
      - -lc
      - xmllint --format '{{ var_web_xml_path }}' | sed 's/xmlns=".*"//g' | xmllint --xpath '/web-app/servlet/servlet-name[text()="default"]/../init-param/param-name[text()="readonly"]/../param-value[text()="false"]' - 2>&1 || true
  register: _vcpf_034_readonly_cmd
  changed_when: false
  check_mode: false

- name: "VCPF-70-000034 | Stage readonly probe"
  ansible.builtin.set_fact:
    _vcpf_034_readonly: "{{ _vcpf_034_readonly_cmd.stdout | default('') }}"

- name: "stigrule_VCPF-70-000001"
  internal.core.stig:
    _stig_id: VCPF-70-000001
    _stig_apply: community.general.xml
    _stig_manage: "{{ run_connection_timeout | bool }}"
    _stig_use_check_mode_probe: false
    _stig_notify: [restart perfcharts]
    _stig_validate: ansible.builtin.shell
    _stig_validate_args:
      executable: /bin/bash
      cmd: |
        set -eu
        test "$(xmllint --xpath '/Server/Service/Connector/@connectionTimeout' '{{ var_server_xml_path }}' 2>/dev/null || true)" = ' connectionTimeout="20000"'
    path: "{{ var_server_xml_path }}"
    xpath: /Server/Service/Connector
    attribute: connectionTimeout
    value: "{{ var_server_xml_connectiontimeout }}"
    state: present

- name: "stigrule_VCPF-70-000002"
  internal.core.stig:
    _stig_id: VCPF-70-000002
    _stig_apply: community.general.xml
    _stig_manage: "{{ run_max_threads | bool }}"
    _stig_use_check_mode_probe: false
    _stig_notify: [restart perfcharts]
    _stig_validate: ansible.builtin.shell
    _stig_validate_args:
      executable: /bin/bash
      cmd: |
        set -eu
        test "$(xmllint --xpath '/Server/Service/Executor/@maxThreads' '{{ var_server_xml_path }}' 2>/dev/null || true)" = ' maxThreads="300"'
    path: "{{ var_server_xml_path }}"
    xpath: /Server/Service/Executor
    attribute: maxThreads
    value: "{{ var_server_xml_maxthreads }}"
    state: present

- name: "stigrule_VCPF-70-000003"
  internal.core.stig:
    _stig_id: VCPF-70-000003
    _stig_apply: community.general.xml
    _stig_manage: "{{ run_max_post_size | bool }}"
    _stig_use_check_mode_probe: false
    _stig_notify: [restart perfcharts]
    _stig_validate: ansible.builtin.shell
    _stig_validate_args:
      executable: /bin/bash
      cmd: |
        set -eu
        test "$(xmllint --xpath '/Server/Service/Connector/@maxPostSize' '{{ var_server_xml_path }}' 2>&1 || true)" = 'XPath set is empty'
    path: "{{ var_server_xml_path }}"
    xpath: /Server/Service/Connector/@maxPostSize
    state: absent

- name: "stigrule_VCPF-70-000004"
  internal.core.stig:
    _stig_id: VCPF-70-000004
    _stig_apply: community.general.xml
    _stig_manage: "{{ run_http_only | bool }}"
    _stig_use_check_mode_probe: false
    _stig_notify: [restart perfcharts]
    _stig_validate: ansible.builtin.shell
    _stig_validate_args:
      executable: /bin/bash
      cmd: |
        set -eu
        test "$(xmllint --format '{{ var_web_stats_xml_path }}' | sed 's/xmlns=\".*\"//g' | xmllint --xpath '/web-app/session-config/cookie-config/http-only' - 2>/dev/null || true)" = '<http-only>true</http-only>'
    path: "{{ var_web_stats_xml_path }}"
    xpath: /x:web-app/x:session-config/x:cookie-config/x:http-only
    value: "{{ var_web_xml_http_only }}"
    namespaces:
      x: http://java.sun.com/xml/ns/javaee
    state: present

- name: "stigrule_VCPF-70-000005"
  internal.core.stig:
    _stig_id: VCPF-70-000005
    _stig_apply: ansible.builtin.shell
    _stig_audit_only: true
    _stig_manage: "{{ run_access_valve_pattern | bool }}"
    _stig_use_check_mode_probe: false
    _stig_validate: ansible.builtin.shell
    _stig_validate_args:
      executable: /bin/bash
      cmd: |
        set -eu
        test "$(xmllint --xpath '/Server/Service/Engine/Host/Valve[@className="org.apache.catalina.valves.AccessLogValve"]/@pattern' '{{ var_server_xml_path }}' 2>/dev/null || true)" = ' pattern="%h %{X-Forwarded-For}i %l %u %t &quot;%r&quot; %s %b &quot;%{User-Agent}i&quot;"'
    cmd: "true"

- name: "stigrule_VCPF-70-000006"
  internal.core.stig:
    _stig_id: VCPF-70-000006
    _stig_apply: ansible.builtin.lineinfile
    _stig_manage: "{{ run_json_stream_redirect_file | bool }}"
    _stig_use_check_mode_probe: false
    _stig_notify: [restart perfcharts]
    _stig_validate: ansible.builtin.shell
    _stig_validate_args:
      executable: /bin/bash
      cmd: |
        set -eu
        grep -Fq '"StreamRedirectFile" : "{{ var_stream_redirect_file }}",' '{{ var_json_path }}'
    path: "{{ var_json_path }}"
    regexp: '^.*"StreamRedirectFile".*$'
    line: '    "StreamRedirectFile" : "{{ var_stream_redirect_file }}",'
    insertbefore: ^.*WorkingDir.*$
    firstmatch: true
    state: present

- name: "stigrule_VCPF-70-000007"
  internal.core.stig:
    _stig_id: VCPF-70-000007
    _stig_apply: ansible.builtin.shell
    _stig_audit_only: true
    _stig_manage: "{{ run_logs_permissions | bool }}"
    _stig_use_check_mode_probe: false
    _stig_validate: ansible.builtin.shell
    _stig_validate_args:
      executable: /bin/bash
      cmd: |
        set -eu
        test -z "$(find /storage/log/vmware/perfcharts/ -xdev -type f -a '(' -perm -o+w -o -not -user perfcharts -o -not -group users ')' -exec ls -ld {} \; 2>/dev/null || true)"
    cmd: "true"

- name: "stigrule_VCPF-70-000008"
  internal.core.stig:
    _stig_id: VCPF-70-000008
    _stig_apply: ansible.builtin.shell
    _stig_audit_only: true
    _stig_manage: true
    _stig_use_check_mode_probe: false
    _stig_validate: ansible.builtin.shell
    _stig_validate_args:
      executable: /bin/bash
      cmd: |
        set -eu
        test -z "$(rpm -V VMware-perfcharts 2>/dev/null | grep '^..5......' | grep -v -E '\.properties|\.conf|\.xml|\.password' || true)"
    cmd: "true"

- name: "stigrule_VCPF-70-000009"
  internal.core.stig:
    _stig_id: VCPF-70-000009
    _stig_apply: ansible.builtin.shell
    _stig_audit_only: true
    _stig_manage: true
    _stig_use_check_mode_probe: false
    _stig_validate: ansible.builtin.shell
    _stig_validate_args:
      executable: /bin/bash
      cmd: |
        set -eu
        test "$(ls -A /usr/lib/vmware-perfcharts/tc-instance/webapps 2>/dev/null || true)" = 'statsreport'
    cmd: "true"

- name: "stigrule_VCPF-70-000010"
  internal.core.stig:
    _stig_id: VCPF-70-000010
    _stig_apply: community.general.xml
    _stig_manage: "{{ run_user_database_realm | bool }}"
    _stig_use_check_mode_probe: false
    _stig_notify: [restart perfcharts]
    _stig_validate: ansible.builtin.shell
    _stig_validate_args:
      executable: /bin/bash
      cmd: |
        set -eu
        test -z "$(grep UserDatabaseRealm '{{ var_server_xml_path }}' || true)"
    path: "{{ var_server_xml_path }}"
    xpath: /Server/Service/Engine/Realm
    state: absent

- name: "stigrule_VCPF-70-000011"
  internal.core.stig:
    _stig_id: VCPF-70-000011
    _stig_apply: ansible.builtin.shell
    _stig_audit_only: true
    _stig_manage: "{{ run_catalina_properties_packages | bool }}"
    _stig_use_check_mode_probe: false
    _stig_validate: ansible.builtin.shell
    _stig_validate_args:
      executable: /bin/bash
      cmd: |
        set -eu
        test "$(grep 'package.access' '{{ var_catalina_props_path }}' || true)" = 'package.access=sun.,org.apache.catalina.,org.apache.coyote.,org.apache.jasper.,org.apache.tomcat.'
    cmd: "true"

- name: "stigrule_VCPF-70-000012"
  internal.core.stig:
    _stig_id: VCPF-70-000012
    _stig_apply: ansible.builtin.shell
    _stig_audit_only: true
    _stig_manage: "{{ run_removed_mime_mappings | bool }}"
    _stig_use_check_mode_probe: false
    _stig_validate: ansible.builtin.shell
    _stig_validate_args:
      executable: /bin/bash
      cmd: |
        set -eu
        test -z "$(grep -En '(x-csh<)|(x-sh<)|(x-shar<)|(x-ksh<)' '{{ var_web_xml_path }}' || true)"
    cmd: "true"

- name: "stigrule_VCPF-70-000013"
  internal.core.stig:
    _stig_id: VCPF-70-000013
    _stig_apply: ansible.builtin.shell
    _stig_audit_only: true
    _stig_manage: "{{ run_java_servlet | bool }}"
    _stig_use_check_mode_probe: false
    _stig_validate_expr:
      - var: _vcpf_013_mapping
        contains: '<url-pattern>*.jsp</url-pattern>'
      - var: _vcpf_013_mapping
