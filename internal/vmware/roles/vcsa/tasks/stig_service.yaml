---
# internal.vmware.vcsa : tasks/stig/stig_service.yaml
# Included once per service from the stig orchestrator loop.

- name: "VCSA STIG | Register target for callback ({{ _vcsa_service.name }})"
  ansible.builtin.set_fact:
    _ncs_stig_target_host: "{{ inventory_hostname }}"
    _ncs_stig_target_type: "{{ _vcsa_service.target_type }}"
  check_mode: false
  changed_when: false

- name: "VCSA STIG | Load {{ _vcsa_service.name }} defaults"
  ansible.builtin.include_vars:
    file: "{{ role_path }}/defaults/{{ _vcsa_service.name }}.yaml"

- name: "VCSA STIG | Load {{ _vcsa_service.name }} vars"
  ansible.builtin.include_vars:
    file: "{{ role_path }}/vars/{{ _vcsa_service.name }}.yaml"

- name: "VCSA STIG | Load {{ _vcsa_service.name }} STIG rules"
  ansible.builtin.include_vars:
    file: "{{ role_path }}/vars/{{ _vcsa_service.name }}_stig_rules.yaml"
  when: lookup('ansible.builtin.fileglob', role_path ~ '/vars/' ~ _vcsa_service.name ~ '_stig_rules.yaml') | length > 0

- name: "VCSA STIG | Run {{ _vcsa_service.name }}"
  ansible.builtin.include_tasks:
    file: "{{ role_path }}/tasks/stig_v1r4/{{ _vcsa_service.name }}.yaml"
    apply:
      tags:
        - "{{ _vcsa_service.name }}"
      vars:
        stig_target_host: "{{ inventory_hostname }}"
        stig_target_type: "{{ _vcsa_service.target_type }}"
        stig_platform: "vmware/vcenter/vcsa"
        run_create_backups: "{{ vcsa_stig_create_backups | default(true) | bool }}"
        photon_version: "{{ vcsa_stig_photon_version | default('3') | string }}"
