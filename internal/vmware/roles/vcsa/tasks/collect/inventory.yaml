---
# internal.vmware.vcsa : collect/inventory.yaml
# Queries infrastructure inventory from vCenter for the VCSA report:
# datacenters, clusters, datastores, resource pools, distributed switches,
# licenses, extensions, content libraries, and tags.

# --- Core Infrastructure ---

- name: Inventory | Query Datacenters
  community.vmware.vmware_datacenter_info:
  register: _raw_datacenters
  delegate_to: localhost
  no_log: true
  failed_when: false
  changed_when: false
  when: vcsa_collect_datacenters | default(true) | bool

- name: Inventory | Extract Datacenter list
  ansible.builtin.set_fact:
    _vcenter_datacenters: "{{ _raw_datacenters.datacenter_info | default([]) | map(attribute='name') | list }}"
  changed_when: false
  when: vcsa_collect_datacenters | default(true) | bool

- name: Inventory | Query Compute (Clusters & Hosts)
  vmware.vmware.cluster_info:
    datacenter: "{{ item }}"
  loop: "{{ _vcenter_datacenters }}"
  register: _raw_clusters
  delegate_to: localhost
  no_log: true
  failed_when: false
  changed_when: false
  when:
    - vcsa_collect_compute | default(true) | bool
    - _vcenter_datacenters | default([]) | length > 0

- name: Inventory | Query Storage (Datastores)
  community.vmware.vmware_datastore_info:
    datacenter: "{{ item }}"
  loop: "{{ _vcenter_datacenters }}"
  register: _raw_datastores
  delegate_to: localhost
  no_log: true
  failed_when: false
  changed_when: false
  retries: 2
  delay: 5
  until: _raw_datastores is succeeded
  ignore_errors: true
  when:
    - vcsa_collect_storage | default(true) | bool
    - _vcenter_datacenters | default([]) | length > 0

