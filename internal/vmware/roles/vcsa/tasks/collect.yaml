---
# internal.vmware.vcsa : tasks/collect.yaml
# VCSA collection: infrastructure inventory, appliance health, alarms.

- name: Collect | Preflight
  ansible.builtin.include_tasks: preflight.yaml
  tags: [always]

- name: VCSA Collect
  block:
    - name: Collect | Bootstrap shared collection state
      ansible.builtin.include_role:
        name: internal.vmware.common
        tasks_from: init_collection
      vars:
        vmware_collection_raw_placeholders:
          _raw_appliance_health: {}
          _raw_appliance_backup: {}
          _raw_alarms: {}
          _raw_datacenters: {}
          _raw_clusters: {}
          _raw_datastores: {}
          _raw_resource_pools: {}
          _raw_dvswitches: {}
          _raw_dvs_portgroups: {}
          _raw_licenses: {}
          _raw_extensions: {}
          _raw_content_libraries: {}
          _raw_tag_categories: {}
          _raw_tags: {}

    # --- Inventory ---

    - name: Inventory | Query Datacenters
      community.vmware.vmware_datacenter_info:
      register: _raw_datacenters
      delegate_to: localhost
      no_log: true
      failed_when: false
      changed_when: false
      when: vcsa_collect_datacenters | default(true) | bool

    - name: Inventory | Extract Datacenter list
      ansible.builtin.set_fact:
        _vcenter_datacenters: "{{ _raw_datacenters.datacenter_info | default([]) | map(attribute='name') | list }}"
      changed_when: false
      when: vcsa_collect_datacenters | default(true) | bool

    - name: Inventory | Query Compute (Clusters & Hosts)
      vmware.vmware.cluster_info:
        datacenter: "{{ item }}"
      loop: "{{ _vcenter_datacenters }}"
      register: _raw_clusters
      delegate_to: localhost
      no_log: true
      failed_when: false
      changed_when: false
      when:
        - vcsa_collect_compute | default(true) | bool
        - _vcenter_datacenters | default([]) | length > 0

    - name: Inventory | Query Storage (Datastores)
      community.vmware.vmware_datastore_info:
        datacenter: "{{ item }}"
      loop: "{{ _vcenter_datacenters }}"
      register: _raw_datastores
      delegate_to: localhost
      no_log: true
      failed_when: false
      changed_when: false
      retries: 2
      delay: 5
      until: _raw_datastores is succeeded
      when:
        - vcsa_collect_storage | default(true) | bool
        - _vcenter_datacenters | default([]) | length > 0

    - name: Inventory | Query Resource Pools
      community.vmware.vmware_resource_pool_info:
      register: _raw_resource_pools
      delegate_to: localhost
      no_log: true
      failed_when: false
      changed_when: false
      when: vcsa_collect_resource_pools | default(true) | bool

    - name: Inventory | Query Distributed Switches
      community.vmware.vmware_dvswitch_info:
      register: _raw_dvswitches
      delegate_to: localhost
      no_log: true
      failed_when: false
      changed_when: false
      when: vcsa_collect_networking | default(true) | bool

    - name: Inventory | Query Distributed Portgroups
      community.vmware.vmware_dvs_portgroup_info:
        datacenter: "{{ item }}"
      loop: "{{ _vcenter_datacenters }}"
      register: _raw_dvs_portgroups
      delegate_to: localhost
      no_log: true
      failed_when: false
      changed_when: false
      when:
        - vcsa_collect_networking | default(true) | bool
        - _vcenter_datacenters | default([]) | length > 0

    - name: Inventory | Query Licenses
      vmware.vmware.license_info:
      register: _raw_licenses
      delegate_to: localhost
      no_log: true
      failed_when: false
      changed_when: false
      when: vcsa_collect_licenses | default(true) | bool

    - name: Inventory | Query vCenter Extensions
      community.vmware.vcenter_extension_info:
      register: _raw_extensions
      delegate_to: localhost
      no_log: true
      failed_when: false
      changed_when: false
      when: vcsa_collect_extensions | default(true) | bool

    - name: Inventory | Query Content Libraries
      community.vmware.vmware_content_library_info:
      register: _raw_content_libraries
      delegate_to: localhost
      no_log: true
      failed_when: false
      changed_when: false
      when: vcsa_collect_content_libraries | default(true) | bool

    - name: Inventory | Query Tag Categories
      community.vmware.vmware_category_info:
      register: _raw_tag_categories
      delegate_to: localhost
      no_log: true
      failed_when: false
      changed_when: false
      when: vcsa_collect_tags | default(true) | bool

    - name: Inventory | Query Tags
      community.vmware.vmware_tag_info:
      register: _raw_tags
      delegate_to: localhost
      no_log: true
      failed_when: false
      changed_when: false
      when: vcsa_collect_tags | default(true) | bool

    # --- Appliance ---

    - name: Appliance | Gather system data
      vmware.vmware.appliance_info:
      register: _raw_appliance_health
      delegate_to: localhost
      no_log: true
      failed_when: false
      retries: 2
      delay: 5
      until: _raw_appliance_health is succeeded
      changed_when: false
      when: vcsa_collect_appliance | default(vcenter_collect_appliance | default(true)) | bool

    - name: Appliance | Get backup schedule
      vmware.vmware.vcsa_backup_schedule_info:
      register: _raw_appliance_backup
      delegate_to: localhost
      failed_when: false
      changed_when: false
      no_log: true
      when: vcsa_collect_appliance | default(vcenter_collect_appliance | default(true)) | bool

    # --- Alarms ---

    - name: Alarms | Get triggered alarms
      internal.vmware.vmware_triggered_alarms_info:
      register: _raw_alarms
      delegate_to: localhost
      changed_when: false
      when: vcsa_collect_alarms | default(vcenter_collect_alarms | default(true)) | bool

  always:
    # --- Assemble ---

    - name: Flatten datastores from per-datacenter results
      ansible.builtin.set_fact:
        _flat_datastores: >-
          {{ _raw_datastores.results | default([])
             | selectattr('datastores', 'defined')
             | map(attribute='datastores')
             | flatten | list }}
      changed_when: false

    - name: Flatten distributed portgroups from per-datacenter results
      ansible.builtin.set_fact:
        _flat_dvs_portgroups: >-
          {{ _raw_dvs_portgroups.results | default([])
             | selectattr('dvs_portgroup_info', 'defined')
             | map(attribute='dvs_portgroup_info')
             | flatten | list }}
      changed_when: false

    - name: Flatten clusters and compute counts
      ansible.builtin.set_fact:
        _flat_clusters: >-
          {% set clusters = [] %}
          {% for dc in (_raw_clusters.results | default([])) %}
            {% if dc.clusters is defined and dc.clusters is mapping %}
              {% for cname, cdata in dc.clusters.items() %}
                {% set hosts = cdata.hosts | default([]) %}
                {% set res = cdata.resource_summary | default({}) %}
                {% set cpu_cap = (res.cpuCapacityMHz | default(1)) | float %}
                {% set mem_cap = (res.memCapacityMB | default(1)) | float %}
                {% set _ = clusters.append({
                  "name": cname,
                  "datacenter": dc.item | default(""),
                  "host_count": hosts | length,
                  "ha_enabled": cdata.ha_enabled | default(false),
                  "drs_enabled": cdata.drs_enabled | default(false),
                  "cpu_usage_pct": (((res.cpuUsedMHz | default(0)) | float / cpu_cap) * 100) | round(1) if cpu_cap > 0 else 0,
                  "mem_usage_pct": (((res.memUsedMB | default(0)) | float / mem_cap) * 100) | round(1) if mem_cap > 0 else 0,
                }) %}
              {% endfor %}
            {% endif %}
          {% endfor %}
          {{ clusters }}
        _cluster_count: >-
          {% set count = [] %}
          {% for dc in (_raw_clusters.results | default([])) %}
            {% if dc.clusters is defined and dc.clusters is mapping %}
              {% set _ = count.extend(dc.clusters.keys() | list) %}
            {% endif %}
          {% endfor %}
          {{ count | length }}
        _esxi_host_count: >-
          {% set count = [0] %}
          {% for dc in (_raw_clusters.results | default([])) %}
            {% if dc.clusters is defined and dc.clusters is mapping %}
              {% for cdata in dc.clusters.values() %}
                {% if cdata.hosts is defined %}
                  {% set _ = count.append(cdata.hosts | length) %}
                {% endif %}
              {% endfor %}
            {% endif %}
          {% endfor %}
          {{ count | sum }}
      changed_when: false

    - name: Assemble flat vCenter payload
      ansible.builtin.set_fact:
        vmware_raw_vcenter:
          appliance_version: "{{ ((_raw_appliance_health | default({})).appliance | default({})).summary.version | default('unknown') }}"
          appliance_build: "{{ ((_raw_appliance_health | default({})).appliance | default({})).summary.build_number | default('unknown') }}"
          appliance_health_overall: "{{ ((_raw_appliance_health | default({})).appliance | default({})).summary.health.overall | default('gray') }}"
          appliance_health_cpu: "{{ ((_raw_appliance_health | default({})).appliance | default({})).summary.health.cpu | default('gray') }}"
          appliance_health_memory: "{{ ((_raw_appliance_health | default({})).appliance | default({})).summary.health.memory | default('gray') }}"
          appliance_health_database: "{{ ((_raw_appliance_health | default({})).appliance | default({})).summary.health.database | default('gray') }}"
          appliance_health_storage: "{{ ((_raw_appliance_health | default({})).appliance | default({})).summary.health.storage | default('gray') }}"
          appliance_uptime_seconds: "{{ ((_raw_appliance_health | default({})).appliance | default({})).summary.uptime | default(0) | float }}"
          ssh_enabled: "{{ ((_raw_appliance_health | default({})).appliance | default({})).access.ssh | default(false) | bool }}"
          shell_enabled: "{{ ((_raw_appliance_health | default({})).appliance | default({})).access.shell.enabled | default(false) | bool }}"
          ntp_mode: "{{ ((_raw_appliance_health | default({})).appliance | default({})).time.time_sync.mode | default('unknown') }}"
          ntp_servers: "{{ ((_raw_appliance_health | default({})).appliance | default({})).time.time_sync.servers | default([]) }}"
          backup_schedules: "{{ (_raw_appliance_backup | default({})).schedules | default([]) }}"
          backup_schedule_count: "{{ ((_raw_appliance_backup | default({})).schedules | default([])) | length }}"
          vcenter_count: 1
          datacenter_count: "{{ ((_raw_datacenters | default({})).datacenter_info | default([])) | length }}"
          cluster_count: "{{ _cluster_count | int }}"
          esxi_host_count: "{{ _esxi_host_count | int }}"
          datastore_count: "{{ _flat_datastores | length }}"
          resource_pool_count: "{{ ((_raw_resource_pools | default({})).resource_pool_info | default([])) | length }}"
          dvswitch_count: "{{ ((_raw_dvswitches | default({})).distributed_virtual_switches | default([])) | length }}"
          dvs_portgroup_count: "{{ _flat_dvs_portgroups | length }}"
          license_count: "{{ ((_raw_licenses | default({})).licenses | default([])) | length }}"
          extension_count: "{{ ((_raw_extensions | default({})).ext_facts | default([])) | length }}"
          content_library_count: "{{ ((_raw_content_libraries | default({})).content_libs | default([])) | length }}"
          tag_category_count: "{{ ((_raw_tag_categories | default({})).tag_category_info | default([])) | length }}"
          tag_count: "{{ ((_raw_tags | default({})).tag_info | default([])) | length }}"
          alarm_count: "{{ ((_raw_alarms | default({})).alarms | default([])) | length }}"
          clusters: "{{ _flat_clusters }}"
          datastores: "{{ _flat_datastores }}"
          resource_pools: "{{ (_raw_resource_pools | default({})).resource_pool_info | default([]) }}"
          dvswitches: "{{ (_raw_dvswitches | default({})).distributed_virtual_switches | default([]) }}"
          dvs_portgroups: "{{ _flat_dvs_portgroups }}"
          licenses: "{{ (_raw_licenses | default({})).licenses | default([]) }}"
          extensions: "{{ (_raw_extensions | default({})).ext_facts | default([]) }}"
          content_libraries: "{{ (_raw_content_libraries | default({})).content_libs | default([]) }}"
          tag_categories: "{{ (_raw_tag_categories | default({})).tag_category_info | default([]) }}"
          tags: "{{ (_raw_tags | default({})).tag_info | default([]) }}"
          active_alarms: "{{ (_raw_alarms | default({})).alarms | default([]) }}"
          config: "{{ vcenter.config | default({}) }}"
      changed_when: false
      no_log: true

    # --- Export ---

    - name: "vCenter | Emit collection telemetry"
      ansible.builtin.set_stats:
        data:
          ncs_collect_vcenter:
            platform_dir: "vmware/vcsa"
            report_directory: "{{ ncs_report_directory | default(ncs_config.report_directory | default('/srv/samba/reports')) }}"
            payload: "{{ vmware_raw_vcenter }}"
            config: {}
        per_host: true
      when: vmware_raw_vcenter is defined
      changed_when: false
      no_log: true
