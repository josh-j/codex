---
argument_specs:
  main:
    short_description: vCenter Server Appliance audit, collection, and STIG orchestration
    description:
      - Collects vCenter appliance health, active alarms, and service state.
      - Performs STIG compliance evaluation and optional hardening.
      - Optionally includes Photon OS baseline checks.
      - Requires vCenter credentials (explicit or vault).
    options:
      ncs_action:
        type: str
        required: false
        default: collect
        choices: [collect, audit, remediate, verify]
        description: Primary action to perform.
      ncs_profile:
        type: str
        required: false
        choices: [stig]
        description: Compliance profile. Mutually exclusive with ncs_operation.
      vmware_username:
        type: str
        required: false
        description: vCenter username. Falls back to vault_vcenter_username.
      vmware_password:
        type: str
        required: false
        description: vCenter password. Falls back to vault_vcenter_password.
      vmware_validate_certs:
        type: bool
        required: false
        default: false
        description: Validate vCenter TLS certificates.
      vcsa_stig_enable_audit:
        type: bool
        required: false
        default: true
        description: Enable STIG audit checks.
      vcsa_stig_enable_hardening:
        type: bool
        required: false
        default: false
        description: Enable STIG remediation (mutating).
      vcsa_stig_profile:
        type: str
        required: false
        default: v1r4
        description: STIG profile version.
      vcsa_stig_include_photon:
        type: bool
        required: false
        default: false
        description: Include Photon OS baseline in STIG checks.
      vcsa_stig_create_backups:
        type: bool
        required: false
        default: true
        description: Create configuration backups before remediation.
      vmware_stig_export_cklb:
        type: bool
        required: false
        default: true
        description: Export STIG compliance checklist (CKLB).
      vcsa_collect_appliance:
        type: bool
        required: false
        default: true
        description: Collect appliance health data.
      vcsa_collect_alarms:
        type: bool
        required: false
        default: true
        description: Collect active vCenter alarms.
