---
# collections/ansible_collections/internal/vmware/roles/common/tasks/init_collection.yaml
#
# Shared collection bootstrap for VMware audit roles.

- name: Ensure local facts are available for timestamping
  ansible.builtin.setup:
    gather_subset:
      - min
  delegate_to: localhost
  become: false
  changed_when: false

- name: Set shared controller timestamps
  ansible.builtin.set_fact:
    _vmware_controller_epoch: "{{ ansible_facts['date_time']['epoch'] | int }}"
    _vmware_controller_collected_at: "{{ ansible_facts['date_time']['iso8601'] }}"
  changed_when: false

- name: Initialize collection raw placeholders
  ansible.builtin.set_fact: "{{ vmware_collection_raw_placeholders | default({}) }}"
  changed_when: false

