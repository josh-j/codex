---
# ESXi target routing for --limit support.
# Use as pre_tasks in playbooks targeting "vcsa:esxi_hosts".
#
# Input:  group_names (automatic), ansible_limit (automatic)
#         esxi_stig_target_hosts (optional — skips discovery if pre-populated)
# Output: esxi_stig_target_hosts (list), or meta: end_host for phantom ESXi hosts
#
# Behavior:
#   ESXi hosts without --limit → end_host (vCenter handles discovery)
#   ESXi hosts with --limit → set themselves as sole target
#   vCenter hosts → discover ESXi targets from API

- name: "Skip ESXi phantom hosts (vCenter handles discovery)"
  meta: end_host
  when: "'esxi_hosts' in group_names and ansible_limit is not defined"

- name: "Set ESXi target from inventory"
  ansible.builtin.set_fact:
    esxi_stig_target_hosts: ["{{ inventory_hostname }}"]
  when:
    - "'esxi_hosts' in group_names"
    - esxi_stig_target_hosts | default([]) | length == 0

- name: "Discover and validate ESXi targets"
  ansible.builtin.include_role:
    name: internal.vmware.common
    tasks_from: discover_esxi
  when: "'esxi_hosts' not in group_names"
