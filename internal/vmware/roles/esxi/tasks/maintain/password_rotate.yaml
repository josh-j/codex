---
# internal.vmware.esxi : tasks/rotate_password.yaml

- name: "ESXi Rotate Password | Validate vault password is set"
  ansible.builtin.assert:
    that:
      - rotate_password | default(vault_rotate_password | default('')) | length > 0
    fail_msg: >-
      No rotation password is set.
      Define rotate_password or vault_rotate_password before running the role.

- name: "ESXi Rotate Password | Validate target host list"
  ansible.builtin.assert:
    that:
      - esxi_stig_target_hosts | default([]) | length > 0
    fail_msg: >-
      No ESXi targets provided. Set esxi_stig_target_hosts before running password rotation.

- name: "ESXi Rotate Password | Rotate password on each ESXi host"
  community.vmware.vmware_host_user_manager:
    hostname: "{{ _vcenter_hostname }}"
    username: "{{ vmware_username }}"
    password: "{{ vmware_password }}"
    validate_certs: "{{ vmware_validate_certs | default(false) }}"
    esxi_hostname: "{{ item }}"
    user_name: "{{ rotate_user | default('root') }}"
    user_password: "{{ rotate_password | default(vault_rotate_password) }}"
    override_user_password: true
    state: present
  loop: "{{ esxi_stig_target_hosts }}"
  loop_control:
    label: "{{ item }}"
  no_log: true

- name: "ESXi Rotate Password | Confirm rotation"
  ansible.builtin.debug:
    msg: >-
      Password rotated for {{ rotate_user | default('root') }}
      on ESXi hosts: {{ esxi_stig_target_hosts | join(', ') }}

- name: "ESXi Rotate Password | Report lockdown status per host"
  community.vmware.vmware_host_config_info:
    hostname: "{{ _vcenter_hostname }}"
    username: "{{ vmware_username }}"
    password: "{{ vmware_password }}"
    validate_certs: "{{ vmware_validate_certs | default(false) }}"
    esxi_hostname: "{{ item }}"
  delegate_to: localhost
  register: _esxi_config
  loop: "{{ esxi_stig_target_hosts }}"
  loop_control:
    label: "{{ item }}"
  failed_when: false

- name: "ESXi Rotate Password | Display lockdown status"
  ansible.builtin.debug:
    msg: "{{ item.item }}: lockdown={{ item.hosts_info[item.item]['Security.Lockdown'] | default('unknown') }}"
  loop: "{{ _esxi_config.results }}"
  loop_control:
    label: "{{ item.item }}"
  when: item.hosts_info is defined
