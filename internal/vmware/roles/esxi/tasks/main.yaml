---
# internal.vmware.esxi : tasks/main.yaml

- name: "ESXi | Resolve public interface"
  ansible.builtin.set_fact:
    esxi_ncs_requested_action: "{{ ncs_action | default('collect') }}"
    esxi_ncs_requested_profile: "{{ ncs_profile | default('none') }}"
    esxi_ncs_requested_operation: "{{ ncs_operation | default('none') }}"
  changed_when: false

- name: "ESXi | Validate action"
  ansible.builtin.assert:
    that:
      - esxi_ncs_requested_action in ['collect', 'audit', 'remediate', 'verify']
      - (esxi_ncs_requested_profile == 'none') or (esxi_ncs_requested_profile == 'stig')
      - (esxi_ncs_requested_operation == 'none') or (esxi_ncs_requested_operation in ['password_status', 'rotate_password'])
      - not (esxi_ncs_requested_profile != 'none' and esxi_ncs_requested_operation != 'none')
      - (esxi_ncs_requested_profile != 'stig') or (esxi_ncs_requested_action in ['audit', 'remediate', 'verify'])
      - (esxi_ncs_requested_operation != 'rotate_password') or (esxi_ncs_requested_action == 'remediate')
      - (esxi_ncs_requested_operation != 'password_status') or (esxi_ncs_requested_action in ['audit', 'verify'])
    fail_msg: >-
      Unsupported ESXi role interface:
      action={{ esxi_ncs_requested_action }}, profile={{ esxi_ncs_requested_profile }}, operation={{ esxi_ncs_requested_operation }}.
  changed_when: false

- name: "ESXi | Dispatch"
  module_defaults:
    group/community.vmware.vmware:
      hostname: "{{ _vcenter_hostname }}"
      username: "{{ vmware_username }}"
      password: "{{ vmware_password }}"
      validate_certs: "{{ vmware_validate_certs | default(false) | bool }}"
    vmware.vmware.cluster_info:
      hostname: "{{ _vcenter_hostname }}"
      username: "{{ vmware_username }}"
      password: "{{ vmware_password }}"
      validate_certs: "{{ vmware_validate_certs | default(false) | bool }}"
    internal.core.stig:
      _stig_module_defaults:
        hostname: "{{ _vcenter_hostname }}"
        username: "{{ vmware_username }}"
        password: "{{ vmware_password }}"
        validate_certs: "{{ vmware_validate_certs | default(false) | bool }}"
  block:
    - name: "ESXi | Build dispatch map"
      ansible.builtin.set_fact:
        _dispatch_map:
          password_status: password_status
          rotate_password: rotate_password
          _default_: stig
      changed_when: false

    - name: "ESXi | Run dispatcher"
      ansible.builtin.include_tasks:
        file: >-
          {{ role_path ~ '/tasks/' ~ (
               'collect' if esxi_ncs_requested_action == 'collect'
               else _dispatch_map.get(esxi_ncs_requested_operation, '_default_')
             ) ~ '.yaml' }}
