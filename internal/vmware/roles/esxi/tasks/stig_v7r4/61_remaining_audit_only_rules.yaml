---
# Remaining audit-only rules — wrapped in internal.core.stig

# --- V-256403 / ESXI-70-000038: Host profiles / auth proxy (manual) ---
- name: "stigrule_256403"
  internal.core.stig:
    _stig_apply: ansible.builtin.shell
    _stig_use_check_mode_probe: false
    _stig_audit_only: true
    _stig_validate: ansible.builtin.shell
    _stig_validate_args:
      executable: /bin/bash
      cmd: |
        echo "ESXI-70-000038: Host profile and auth proxy configuration requires manual verification for {{ _current_esxi_host }}"
        exit 1
    _stig_skip_post_validate: true
    _stig_na_reason: "Requires manual verification — host profile and auth proxy configuration"
    _stig_gate_status: not_reviewed
    executable: /bin/bash
    cmd: "true"

