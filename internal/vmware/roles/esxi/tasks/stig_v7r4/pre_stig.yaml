---
# tasks/v7r4/pre_stig.yaml
#
# Pre-flight: capture original lockdown/service state, then unlock
# for STIG checks. post_stig.yaml restores the original state.

- name: "ESXi STIG | Pre | Disable lockdown and start services"
  ansible.builtin.shell:
    executable: /bin/bash
    cmd: |
      set -o pipefail
      timeout 60 pwsh -NoProfile -Command "
      {{ _pwsh_preamble }}
      \$vmhost = Get-VMHost -Name '{{ _current_esxi_host }}' -ErrorAction SilentlyContinue;
      if (-not \$vmhost) { \$vmhost = Get-VMHost | Select-Object -First 1 };

      # --- Capture and disable lockdown ---
      \$view = \$vmhost | Get-View;
      \$lockdown = Get-View \$view.ConfigManager.HostAccessManager;
      \$origMode = \$view.Config.LockdownMode;
      Write-Host 'LOCKDOWN_ORIG:' \$origMode;
      if (\$origMode -ne 'lockdownDisabled') {
        \$lockdown.ChangeLockdownMode('lockdownDisabled');
        Write-Host 'LOCKDOWN_CHANGED: true';
      } else {
        Write-Host 'LOCKDOWN_CHANGED: false';
      }

      # --- Capture and start SSH + Shell ---
      foreach (\$key in @('TSM-SSH', 'TSM')) {
        \$svc = Get-VMHostService -VMHost \$vmhost | Where-Object { \$_.Key -eq \$key };
        if (\$svc) {
          Write-Host \$key 'ORIG_POLICY:' \$svc.Policy 'ORIG_RUNNING:' \$svc.Running;
          if (-not \$svc.Running) {
            Start-VMHostService -HostService \$svc -Confirm:\$false | Out-Null;
            Write-Host \$key 'STARTED';
          }
        }
      }
      " | tr -d '\r'
  environment:
    VC_PASS: "{{ vmware_password | string | trim }}"
  register: _pre_unlock_result
  changed_when: "'LOCKDOWN_CHANGED: true' in (_pre_unlock_result.stdout | default(''))"
  check_mode: false
  no_log: false
  ignore_errors: true
  when: esxi_stig_pre_unlock | default(true) | bool

- name: "ESXi STIG | Pre | Capture original lockdown state"
  ansible.builtin.set_fact:
    _esxi_lockdown_was_enabled: "{{ 'LOCKDOWN_CHANGED: true' in (_pre_unlock_result.stdout | default('')) }}"
    _esxi_lockdown_orig_mode: >-
      {{ (_pre_unlock_result.stdout_lines | default([]) | select('match', '^LOCKDOWN_ORIG:')
          | list | first | default('LOCKDOWN_ORIG: lockdownDisabled')).split(': ', 1)[-1] | trim }}
  check_mode: false
  changed_when: false
  when: esxi_stig_pre_unlock | default(true) | bool

- name: "ESXi STIG | Pre | Unlock result"
  ansible.builtin.debug:
    msg: "{{ _pre_unlock_result.stdout_lines | default(['no output']) }}"
  when: esxi_stig_pre_unlock | default(true) | bool
