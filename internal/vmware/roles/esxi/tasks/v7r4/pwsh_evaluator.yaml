---
# tasks/v7r4/pwsh_evaluator.yaml
# Generic query/assert/remediate executor for PowerShell STIG rules

- name: "stigrule_{{ item.rule_id }}_{{ item.desc | default('pwsh') }}_reset"
  ansible.builtin.set_fact:
    _q_result:
      stdout: ""
      stderr: ""
      rc: -1
      failed: true
      skipped: false
    _should_remediate: false
  changed_when: false
  check_mode: false

- name: "stigrule_{{ item.rule_id }}_{{ item.desc | default('pwsh') }}_query"
  ansible.builtin.shell:
    executable: /bin/bash
    cmd: |
      set -o pipefail
      pwsh -NoProfile -Command "
      {{ _pwsh_preamble }}
      {{ item.query_cmd }}
      " | tr -d '\r'
  environment:
    VC_PASS: "{{ vmware_password | string | trim }}"
    AD_PASS: "{{ esxi_stig_ad_join_password | default('') | string | trim }}"
  register: _q_result
  changed_when: false
  check_mode: false
  no_log: true
  ignore_errors: true # noqa: ignore-errors — query failure handled below
  when: lookup('vars', item.manage_var, default=true) | bool

- name: "stigrule_{{ item.rule_id }}_{{ item.desc | default('pwsh') }}_sanitize"
  ansible.builtin.set_fact:
    _q_result: >-
      {{ _q_result | combine({
        'stdout': _q_result.stdout | default('') | regex_replace('\r', '') | trim
      }) }}
  check_mode: false
  changed_when: false
  when:
    - lookup('vars', item.manage_var, default=true) | bool
    - _q_result is not skipped
    - not (_q_result.failed | default(false))

- name: "stigrule_{{ item.rule_id }}_{{ item.desc | default('pwsh') }}_assert"
  ansible.builtin.assert:
    that: "{{ item.assert_eval }}"
    fail_msg: "{{ item.fail_msg | default('Rule failed') }}"
    success_msg: "{{ item.success_msg | default('Rule passed') }}"
  ignore_errors: true # noqa: ignore-errors — ncs_collector captures the failure; must not halt remaining rules
  when:
    - lookup('vars', item.manage_var, default=true) | bool
    - _q_result is not skipped
    - not (_q_result.failed | default(false))
    - not (vmware_stig_enable_hardening | default(false) | bool)

- name: "stigrule_{{ item.rule_id }}_{{ item.desc | default('pwsh') }}_eval_remediate"
  ansible.builtin.set_fact:
    _should_remediate: "{{ item.remediate_when | default(['false']) | map('regex_replace', '^(.*)$', '(\\1)') | join(' and ') }}"
  check_mode: false
  changed_when: false
  when:
    - "'remediate_cmd' in item"
    - lookup('vars', item.manage_var, default=true) | bool
    - vmware_stig_enable_hardening | default(false) | bool
    - not (_q_result.failed | default(false))

- name: "stigrule_{{ item.rule_id }}_{{ item.desc | default('pwsh') }}_remediate"
  ansible.builtin.shell:
    executable: /bin/bash
    cmd: |
      set -o pipefail
      pwsh -NoProfile -Command "
      {{ _pwsh_preamble }}
      {{ item.remediate_cmd }}
      " | tr -d '\r'
  environment:
    VC_PASS: "{{ vmware_password | string | trim }}"
    AD_PASS: "{{ esxi_stig_ad_join_password | default('') | string | trim }}"
  register: _r_result
  changed_when: true
  check_mode: false
  no_log: true
  ignore_errors: true # noqa: ignore-errors — ncs_collector captures the failure; must not halt remaining rules
  when:
    - "'remediate_cmd' in item"
    - lookup('vars', item.manage_var, default=true) | bool
    - vmware_stig_enable_hardening | default(false) | bool
    - not (_q_result.failed | default(false))
    - _should_remediate | default(false) | bool
