---
# tasks/v7r4/post_stig.yaml

- name: "ESXi STIG | Post | Stop SSH service"
  community.vmware.vmware_host_service_manager:
    esxi_hostname: "{{ _current_esxi_host }}"
    service_name: TSM-SSH
    service_policy: "off"
    state: stop
  ignore_errors: true
  when: esxi_stig_pre_unlock | default(true) | bool

- name: "ESXi STIG | Post | Stop ESXi Shell service"
  community.vmware.vmware_host_service_manager:
    esxi_hostname: "{{ _current_esxi_host }}"
    service_name: TSM
    service_policy: "off"
    state: stop
  ignore_errors: true
  when: esxi_stig_pre_unlock | default(true) | bool

- name: "ESXi STIG | Post | Re-enable lockdown mode"
  ansible.builtin.shell:
    executable: /bin/bash
    cmd: |
      set -o pipefail
      timeout 60 pwsh -NoProfile -Command "
      {{ _pwsh_preamble }}
      \$vmhost = Get-VMHost -Name '{{ _current_esxi_host }}' | Get-View;
      \$lockdown = Get-View \$vmhost.ConfigManager.HostAccessManager;
      \$lockdown.ChangeLockdownMode('{{ esxi_stig_lockdown_level | default('lockdownNormal') }}')
      "
  environment:
    VC_PASS: "{{ vmware_password | string | trim }}"
  changed_when: true
  check_mode: false
  no_log: true
  ignore_errors: true
  when: esxi_stig_pre_unlock | default(true) | bool
