---
# internal.template.example : tasks/collect.yaml
# TEMPLATE: Replace platform check, add discovery tasks, assemble payload.

- name: "Example | Validate platform"
  ansible.builtin.fail:
    msg: >-
      This role targets <YOUR PLATFORM>. Found: {{ ansible_facts['distribution'] | default('Unknown') }}
  when: false # TEMPLATE: Replace with actual platform check (e.g. ansible_facts['distribution'] != 'Ubuntu')

- name: "Example | Discovery"
  block:
    - name: "Example | Gather facts"
      ansible.builtin.setup:
        gather_subset:
          - hardware
          - network
      # TEMPLATE: Adjust gather_subset for your platform's needs.

    # TEMPLATE: Add platform-specific discovery tasks here.
    # Examples: service checks, config reads, package audits, API calls.

    - name: "Example | Assemble discovery payload"
      ansible.builtin.set_fact:
        example_raw_discovery:
          # TEMPLATE: Build your platform's telemetry payload.
          # Flatten facts into a simple dict — ncs-reporter normalizes downstream.
          hostname: "{{ ansible_facts.hostname | default('unknown') }}"
          ip_address: "{{ ansible_facts.default_ipv4.address | default('N/A') }}"
          os_family: "{{ ansible_facts.os_family | default('unknown') }}"
          distribution: "{{ ansible_facts.distribution | default('unknown') }}"
          distribution_version: "{{ ansible_facts.distribution_version | default('unknown') }}"
          uptime_seconds: "{{ ansible_facts.uptime_seconds | default(0) | float }}"
          memory_total_mb: "{{ ansible_facts.memtotal_mb | default(1) | float }}"
          memory_free_mb: "{{ ansible_facts.memfree_mb | default(0) | float }}"
          mounts: "{{ ansible_facts.mounts | default([]) }}"
      changed_when: false

  rescue:
    - name: "Example | Log discovery failure"
      ansible.builtin.debug:
        msg: "Discovery failed on {{ inventory_hostname }}. State will reflect defaults only."

- name: "Example | Emit discovery telemetry"
  ansible.builtin.include_role:
    name: internal.core.emit
  vars:
    # TEMPLATE: Set platform dir to your platform path (e.g. "linux/ubuntu", "vmware/esxi").
    _ncs_emit_platform: "{{ _ncs_platform_dir | default('platform/example') }}"
    _ncs_emit_payload: "{{ example_raw_discovery | default({}) }}"
    _ncs_emit_skip: "{{ example_skip_export | default(false) }}"
    _ncs_emit_config:
      # TEMPLATE: Pass thresholds that ncs-reporter uses for alert evaluation.
      example_memory_warning_pct: "{{ example_memory_warning_pct | default(95) }}"
      example_storage_warning_pct: "{{ example_storage_warning_pct | default(90) }}"
      example_cpu_critical_pct: "{{ example_cpu_critical_pct | default(90) }}"
