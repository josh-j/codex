---
# internal.template.example : tasks/main.yaml
# TEMPLATE: Replace "Example" label, adjust allowed operations and dispatch map.

- name: "Example | Capture task root"
  ansible.builtin.set_fact:
    _ncs_task_root: "{{ role_path }}/tasks"
  changed_when: false

- name: "Example | Dispatch"
  ansible.builtin.include_role:
    name: internal.core.dispatch
  vars:
    _ncs_role_label: Example
    _ncs_default_action: collect
    _ncs_allowed_operations:
      - password_status
      - password_rotate
      # TEMPLATE: Add more operations as needed (e.g. maintain, patch, reboot)
    _ncs_extra_validations:
      - "{{ (_ncs_requested_operation != 'password_rotate') or (_ncs_requested_action == 'remediate') }}"
      - "{{ (_ncs_requested_operation != 'password_status') or (_ncs_requested_action in ['audit', 'verify']) }}"
    _dispatch_map:
      stig: stig
      password_status: maintain/password_status
      password_rotate: maintain/password_rotate
      # TEMPLATE: Add more dispatch entries as you add task files.
      _default_: collect
