---
# internal.template.example : tasks/stig.yaml
# TEMPLATE: Update label, target_type, task_file path, and compat/mode facts.

- name: "Example STIG"
  ansible.builtin.include_role:
    name: internal.core.stig_orchestrator
  vars:
    _ncs_stig_label: "Example STIG"
    # TEMPLATE: Set target_type to your platform identifier (used in STIG telemetry).
    _ncs_stig_target_type: "example"
    # TEMPLATE: Point to your STIG version's main.yaml.
    _ncs_stig_task_file: "{{ _ncs_task_root }}/stig_v1r0/main.yaml"
    _ncs_stig_compat_facts:
      example_stig_enable_audit: "{{ example_stig_enable_audit | default(true) }}"
      example_stig_enable_hardening: "{{ example_stig_enable_hardening | default(false) }}"
    _ncs_stig_mode_facts:
      example_stig_enable_audit: "{{ _ncs_stig_action in ['audit', 'verify'] }}"
      example_stig_enable_hardening: "{{ _ncs_stig_action == 'remediate' }}"
