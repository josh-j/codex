---
# internal.core.dispatch : tasks/main.yaml
#
# Shared role dispatcher. Called via include_role from each platform role.
#
# Required vars:
#   _ncs_role_label        — Display name for task labels (e.g. "Ubuntu")
#   _ncs_task_root         — Absolute path to calling role's tasks/ dir
#   _ncs_default_action    — Default ncs_action value (e.g. "collect" or "audit")
#   _dispatch_map          — Dict mapping dispatch keys to task filenames
#
# Optional vars:
#   _ncs_allowed_profiles        — List of valid profiles (default: ['stig'])
#   _ncs_allowed_operations      — List of valid operations (default: [])
#   _ncs_extra_validations       — List of additional assert conditions beyond the base set
#   _ncs_action_routes           — Actions that route directly (e.g. ['collect'] for VMware)
#   _ncs_dynamic_dispatch        — If true, unmapped keys use the key itself as filename
#   _ncs_dynamic_dispatch_prefix — Prefix for dynamic dispatch filenames (e.g. "maintain/")
#   _ncs_pre_dispatch_facts      — Dict of extra facts to set before dispatch

- name: "{{ _ncs_role_label }} | Resolve public interface"
  ansible.builtin.set_fact:
    _ncs_requested_action: "{{ ncs_action | default(_ncs_default_action) }}"
    _ncs_requested_profile: "{{ ncs_profile | default('none') }}"
    _ncs_requested_operation: "{{ ncs_operation | default('none') }}"
  changed_when: false

- name: "{{ _ncs_role_label }} | Validate public interface"
  ansible.builtin.assert:
    that:
      - "{{ _ncs_requested_action in ['collect', 'audit', 'remediate', 'verify'] }}"
      - "{{ (_ncs_requested_profile == 'none') or (_ncs_requested_profile in (_ncs_allowed_profiles | default(['stig']))) }}"
      - "{{ (_ncs_requested_operation == 'none') or (_ncs_requested_operation in (_ncs_allowed_operations | default([]))) }}"
      - "{{ not (_ncs_requested_profile != 'none' and _ncs_requested_operation != 'none') }}"
      - "{{ (_ncs_requested_profile != 'stig') or (_ncs_requested_action in ['audit', 'remediate', 'verify']) }}"
    fail_msg: >-
      Unsupported {{ _ncs_role_label | lower }} role interface:
      action={{ _ncs_requested_action }}, profile={{ _ncs_requested_profile }}, operation={{ _ncs_requested_operation }}.
  changed_when: false

- name: "{{ _ncs_role_label }} | Extra validations"
  ansible.builtin.assert:
    that: "{{ _ncs_extra_validations }}"
    fail_msg: >-
      Extra validation failed for {{ _ncs_role_label | lower }}:
      action={{ _ncs_requested_action }}, profile={{ _ncs_requested_profile }}, operation={{ _ncs_requested_operation }}.
  when: _ncs_extra_validations is defined and _ncs_extra_validations | length > 0
  changed_when: false

- name: "{{ _ncs_role_label }} | Set pre-dispatch facts"
  ansible.builtin.set_fact: "{{ _ncs_pre_dispatch_facts }}"
  when: _ncs_pre_dispatch_facts is defined and _ncs_pre_dispatch_facts
  changed_when: false

- name: "{{ _ncs_role_label }} | Resolve dispatch key"
  ansible.builtin.set_fact:
    _ncs_dispatch_key: >-
      {{ _ncs_requested_action
         if _ncs_requested_action in (_ncs_action_routes | default([]))
         else _ncs_requested_profile
         if _ncs_requested_profile != 'none'
         else _ncs_requested_operation
         if _ncs_requested_operation != 'none'
         else '_default_' }}
  changed_when: false

- name: "{{ _ncs_role_label }} | Dispatch: {{ _ncs_requested_action }} / {{ _ncs_requested_profile }} / {{ _ncs_requested_operation }}"
  ansible.builtin.include_tasks:
    file: >-
      {{ _ncs_task_root ~ '/' ~ _dispatch_map.get(
           _ncs_dispatch_key,
           (_ncs_dynamic_dispatch_prefix | default('')) ~ _ncs_requested_operation
           if (_ncs_dynamic_dispatch | default(false))
           else _dispatch_map.get('_default_', 'collect')
         ) ~ '.yaml' }}
