---
# internal.core.stig_orchestrator : tasks/main.yaml
#
# Shared three-phase STIG audit/remediate orchestrator.
# Called via include_role from each platform's stig.yaml.
#
# Required vars:
#   _ncs_stig_label       — Display name (e.g. "Ubuntu STIG", "ESXi STIG")
#   _ncs_stig_target_type — Platform identifier for ncs_collector (e.g. "ubuntu", "esxi")
#   _ncs_stig_task_file   — Path to the STIG task file to include in Phase 1
#   _ncs_stig_verify_file — Path to the STIG task file for Phase 2 verification
#                           (defaults to _ncs_stig_task_file)
#
# Optional vars:
#   _ncs_stig_compat_facts    — Dict of backward-compat alias facts to set in Phase 0
#   _ncs_stig_mode_facts      — Dict of role-specific mode facts
#   _ncs_stig_pre_validations — List of fail-when conditions (true = valid)
#   _ncs_stig_pre_phase1      — Task file to include before the main STIG run
#   _ncs_stig_phase1_loop       — List to loop over in Phase 1
#   _ncs_stig_phase1_loop_var   — Loop variable name (default: _current_item)
#   _ncs_stig_phase1_vars       — Extra vars dict to pass in Phase 1 apply block
#   _ncs_stig_phase2_loop       — List to loop over in Phase 2
#   _ncs_stig_phase2_loop_var   — Loop variable name for Phase 2
#   _ncs_stig_phase2_vars       — Extra vars dict to pass in Phase 2 apply block
#   _ncs_stig_telemetry         — Dict with telemetry config (platform, name, payload var)

- name: "{{ _ncs_stig_label }} | Phase 0 | Backward-compat aliases"
  ansible.builtin.set_fact: "{{ _ncs_stig_compat_facts }}"
  when: _ncs_stig_compat_facts is defined and _ncs_stig_compat_facts
  changed_when: false

- name: "{{ _ncs_stig_label }} | Phase 0 | Resolve canonical action"
  ansible.builtin.set_fact:
    _ncs_stig_action: "{{ _ncs_requested_action }}"
  changed_when: false

- name: "{{ _ncs_stig_label }} | Phase 0 | Determine run mode"
  ansible.builtin.set_fact:
    _stig_audit_only: "{{ _ncs_stig_action in ['audit', 'verify'] }}"
    _stig_phase_hint: "{{ 'audit' if _ncs_stig_action in ['audit', 'verify'] else 'remediate' }}"
    _stig_active_phase: "{{ 'audit' if _ncs_stig_action in ['audit', 'verify'] else 'remediate' }}"
  changed_when: false

- name: "{{ _ncs_stig_label }} | Phase 0 | Set role-specific mode facts"
  ansible.builtin.set_fact: "{{ _ncs_stig_mode_facts }}"
  when: _ncs_stig_mode_facts is defined and _ncs_stig_mode_facts
  changed_when: false

- name: "{{ _ncs_stig_label }} | Phase 0 | Register target context for ncs_collector"
  ansible.builtin.set_fact:
    _ncs_stig_target_host: "{{ inventory_hostname }}"
    _ncs_stig_target_type: "{{ _ncs_stig_target_type }}"
  tags:
    - always

- name: "{{ _ncs_stig_label }} | Phase 0 | Pre-run validations"
  ansible.builtin.fail:
    msg: "Pre-run validation failed for {{ _ncs_stig_label }}"
  when: not item
  loop: "{{ _ncs_stig_pre_validations | default([]) }}"
  loop_control:
    label: "validation"

- name: "{{ _ncs_stig_label }} | Phase 1 | Evaluate and/or remediate"
  when:
    - _ncs_stig_action in ['audit', 'remediate']
  block:
    - name: "{{ _ncs_stig_label }} | Phase 1 | Pre-phase tasks"
      ansible.builtin.include_tasks: "{{ _ncs_stig_pre_phase1 }}"
      when: _ncs_stig_pre_phase1 is defined

    - name: "{{ _ncs_stig_label }} | Phase 1a | Run STIG tasks"
      ansible.builtin.include_tasks:
        file: "{{ _ncs_stig_task_file }}"
        apply:
          check_mode: "{{ _stig_audit_only | bool }}"
          tags: [stig_task]
          vars: "{{ _ncs_stig_phase1_vars | default({}) }}"
      when: _ncs_stig_phase1_loop is not defined
      tags: [stig, security]

    - name: "{{ _ncs_stig_label }} | Phase 1a | Run STIG tasks (loop)"
      ansible.builtin.include_tasks:
        file: "{{ _ncs_stig_task_file }}"
        apply:
          check_mode: "{{ _stig_audit_only | bool }}"
          tags: [stig_task]
          vars: "{{ _ncs_stig_phase1_vars | default({}) }}"
      loop: "{{ _ncs_stig_phase1_loop }}"
      loop_control:
        loop_var: "{{ _ncs_stig_phase1_loop_var | default('_current_item') }}"
        label: "{{ item }}"
      when: _ncs_stig_phase1_loop is defined
      ignore_errors: true

    - name: "{{ _ncs_stig_label }} | Phase 1b | Flag run as complete"
      ansible.builtin.set_fact:
        _stig_audit_ran: true
        _stig_remediation_ran: "{{ not (_stig_audit_only | bool) }}"
      changed_when: false
  rescue:
    - name: "{{ _ncs_stig_label }} | Phase 1r | Set failure flag"
      ansible.builtin.set_fact:
        _stig_run_failed: true
      changed_when: false

    - name: "{{ _ncs_stig_label }} | Phase 1r | Log failure"
      ansible.builtin.debug:
        msg: >-
          {{ _ncs_stig_label }} {{ 'audit' if (_stig_audit_only | bool) else 'remediation' }}
          failed on {{ inventory_hostname }}. Partial results emitted via ncs_collector.
  always:
    - name: "{{ _ncs_stig_label }} | Phase 1 | Log completion"
      ansible.builtin.debug:
        msg: >-
          {{ _ncs_stig_label }} {{ 'audit' if (_stig_audit_only | bool) else 'remediation' }}
          completed on {{ inventory_hostname }}. Results emitted via ncs_collector.

- name: "{{ _ncs_stig_label }} | Phase 2 | Set phase hint to audit"
  ansible.builtin.set_fact:
    _stig_phase_hint: "audit"
    _stig_active_phase: "audit"
  changed_when: false
  when:
    - _ncs_stig_action == 'verify'

- name: "{{ _ncs_stig_label }} | Phase 2 | Post-remediation audit"
  when:
    - _ncs_stig_action == 'verify'
  block:
    - name: "{{ _ncs_stig_label }} | Phase 2a | Verify remediation"
      ansible.builtin.include_tasks:
        file: "{{ _ncs_stig_verify_file | default(_ncs_stig_task_file) }}"
        apply:
          check_mode: true
          tags: [stig_task]
          vars: "{{ _ncs_stig_phase2_vars | default({}) }}"
      when: _ncs_stig_phase2_loop is not defined and _ncs_stig_phase1_loop is not defined
      tags: [stig, security, verify]

    - name: "{{ _ncs_stig_label }} | Phase 2a | Verify remediation (loop)"
      ansible.builtin.include_tasks:
        file: "{{ _ncs_stig_verify_file | default(_ncs_stig_task_file) }}"
        apply:
          check_mode: true
          tags: [stig_task]
          vars: "{{ _ncs_stig_phase2_vars | default({}) }}"
      loop: "{{ _ncs_stig_phase2_loop | default(_ncs_stig_phase1_loop) }}"
      loop_control:
        loop_var: "{{ _ncs_stig_phase2_loop_var | default(_ncs_stig_phase1_loop_var | default('_current_item')) }}"
        label: "{{ item }}"
      when: (_ncs_stig_phase2_loop is defined) or (_ncs_stig_phase1_loop is defined)
      ignore_errors: true

    - name: "{{ _ncs_stig_label }} | Phase 2b | Flag verification as complete"
      ansible.builtin.set_fact:
        _stig_audit_ran: true
      changed_when: false
  rescue:
    - name: "{{ _ncs_stig_label }} | Phase 2r | Log verification failure"
      ansible.builtin.debug:
        msg: "Post-remediation STIG audit failed on {{ inventory_hostname }}. Exporting partial results."

- name: "{{ _ncs_stig_label }} | Emit telemetry"
  ansible.builtin.set_stats:
    data:
      ncs_collect:
        platform: "{{ _ncs_stig_telemetry.platform }}"
        name: "{{ _ncs_stig_telemetry.name }}"
        report_directory: "{{ ncs_config.report_directory | default('/srv/samba/reports') }}"
        payload: "{{ lookup('vars', _ncs_stig_telemetry.payload_var) }}"
    per_host: true
  when:
    - _ncs_stig_telemetry is defined
    - _stig_audit_ran | default(false)
  changed_when: false
