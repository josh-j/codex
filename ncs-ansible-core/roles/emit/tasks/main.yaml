---
# internal.core.emit : tasks/main.yaml
#
# Standardized telemetry emitter for ncs_collector.
# Wraps set_stats with a consistent ncs_collect schema.
#
# Required vars:
#   _ncs_emit_platform  — Platform dir path (e.g. "linux/ubuntu", "vmware/esxi")
#   _ncs_emit_payload   — Data dict to persist
#
# Optional vars:
#   _ncs_emit_config          — Thresholds/config dict (written to config.yaml)
#   _ncs_emit_skip            — Skip emission (default: false)
#   _ncs_emit_per_host_split  — Per-host split config for multi-host payloads
#   _ncs_emit_tree_path       — List of slug segments for the hierarchical
#                               report layout. When provided, ncs_collector
#                               writes raw.yaml to
#                               <reports_root>/<*tree_path>/raw.yaml instead
#                               of the legacy platform/<platform_dir>/<host>/
#                               layout. Leave unset for legacy behavior.
#   _ncs_emit_raw_filename     — Override the raw bundle's filename (only
#                               honored when _ncs_emit_tree_path is set).
#                               Use when multiple bundles share a tree node
#                               (e.g. VMware's vm role co-locates with vcsa).
#   _ncs_emit_artifact_kind    — inventory, events, or operation. Defaults
#                               to inventory for legacy raw bundles.
#   _ncs_emit_artifact_id      — Optional artifact/operation identifier.

- name: "Emit telemetry | Reject legacy emit variables"
  ansible.builtin.assert:
    that:
      - emit_type is not defined
      - emit_data is not defined
      - emit_skip is not defined
    fail_msg: >-
      internal.core.emit no longer accepts emit_type/emit_data/emit_skip.
      Use _ncs_emit_platform, _ncs_emit_payload, and _ncs_emit_skip.
    quiet: true
  changed_when: false

- name: "Emit telemetry | Validate required variables"
  ansible.builtin.assert:
    that:
      - _ncs_emit_platform is defined
      - _ncs_emit_payload is defined
    fail_msg: >-
      internal.core.emit requires _ncs_emit_platform and _ncs_emit_payload.
    quiet: true
  changed_when: false

- name: "Emit telemetry | {{ _ncs_emit_platform }}"
  # The callback persists every per-host stat starting with ``ncs_collect``,
  # so plays that emit multiple artifacts per host (e.g. inventory graph +
  # events) need distinct keys. Derive the suffix from the platform slug and
  # artifact_kind/id so each emit lands in its own bucket — using the bare
  # ``ncs_collect`` key would let the second set_stats overwrite the first.
  vars:
    _stats_key_suffix: "{{
      [_ncs_emit_platform | regex_replace('[^a-z0-9]+', '_'),
       (_ncs_emit_artifact_kind | default('inventory')),
       (_ncs_emit_artifact_id | default(''))]
      | reject('equalto', '')
      | join('_')
      | regex_replace('[^a-zA-Z0-9_]', '_')
      | regex_replace('_+', '_')
      | regex_replace('^_+|_+$', '')
    }}"
  ansible.builtin.set_stats:
    data:
      "ncs_collect_{{ _stats_key_suffix }}": >-
        {{
          {
            'platform_dir': _ncs_emit_platform,
            'report_directory': lookup('env', 'NCS_REPORT_DIRECTORY')
              | default(ncs_config.report_directory | default('/srv/samba/reports'), true),
            'payload': _ncs_emit_payload,
          }
          | combine({'config': _ncs_emit_config} if _ncs_emit_config is defined and _ncs_emit_config else {})
          | combine({'per_host_split': _ncs_emit_per_host_split} if _ncs_emit_per_host_split is defined and _ncs_emit_per_host_split else {})
          | combine({'tree_path': _ncs_emit_tree_path} if _ncs_emit_tree_path is defined and _ncs_emit_tree_path else {})
          | combine({'raw_filename': _ncs_emit_raw_filename} if _ncs_emit_raw_filename is defined and _ncs_emit_raw_filename else {})
          | combine({'artifact_kind': _ncs_emit_artifact_kind} if _ncs_emit_artifact_kind is defined and _ncs_emit_artifact_kind else {})
          | combine({'artifact_id': _ncs_emit_artifact_id} if _ncs_emit_artifact_id is defined and _ncs_emit_artifact_id else {})
        }}
    per_host: true
  when: not (_ncs_emit_skip | default(false) | bool)
  changed_when: false
