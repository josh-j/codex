---
# internal.core test inventory skeleton.
#
# internal.core is a foundational collection (callback, action plugins,
# orchestrator role) and does not target a specific platform. The smoke
# playbook (tests/smoke.yml) runs against localhost and needs no remote
# hosts. This inventory is therefore intentionally empty except for the
# implicit localhost group.
#
# Copy this directory to tests/inventory/ and extend if you need to
# exercise the orchestrator role against a real host.

all:
  hosts: {}
