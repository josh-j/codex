---
# internal.windows.server : defaults/main.yaml

# Performance/Safety
windows_audit_startup_delay: 5
windows_audit_skip_startup_delay: true
windows_audit_timeout_minutes: 30

# Inventory Configuration
windows_config_include_system_apps: false

# Thresholds (used by ncs-reporter)
windows_audit_update_age_warning_days: 30
windows_audit_update_age_critical_days: 90

# Update Management
windows_audit_force_update: false
windows_audit_allow_reboot: false
windows_audit_enforce_preference: "Immediate"
windows_audit_update_priority: "Normal"

# STIG Settings
windows_stig_enable_audit: true
windows_stig_enable_hardening: false
windows_stig_native_checks_only: false
windows_stig_require_input: false
windows_stig_target_type: "windows_server_2022"

windows_audit_excluded_apps:
  - "USAF - MDE - DeviceTagging"
  - "Intel(R)_Chipset Device Software_*"

# Health Check Settings
windows_health_check_os: true
windows_health_check_disk: true
windows_health_check_memory_cpu: true
windows_health_check_services: true
windows_health_check_network: true
windows_health_check_reboot_pending: true
windows_health_check_event_logs: true
windows_health_check_secure_channel: true
windows_health_check_software_versions: true

windows_health_disk_warning_pct: 80
windows_health_disk_critical_pct: 90
windows_health_memory_warning_pct: 85
windows_health_memory_critical_pct: 95
windows_health_event_log_hours: 24

windows_health_critical_services:
  - CcmExec
  - WinRM
  - wuauserv
  - MpsSvc
  - WinDefend
  - Tanium Client

# Maintenance Operation Defaults
windows_vuln_scan_file: ""
windows_vuln_scan_format: "csv"
windows_registry_fix_ids: []
windows_registry_fix_apply: false
windows_kb_list: ""
windows_kb_install: false
windows_kb_source_path: ""
windows_update_software_targets:
  - chrome
windows_update_software_force: false
windows_uninstall_names: []
windows_uninstall_appx: false
windows_uninstall_vcredist_cleanup: false
windows_uninstall_winget_remove: false
windows_uninstall_winget_names: []
windows_cleanup_temp: true
windows_cleanup_profiles: false
windows_cleanup_profile_days: 30
windows_update_categories:
  - "SecurityUpdates"
  - "CriticalUpdates"
windows_update_install: false
windows_update_allow_reboot: false
windows_update_timeout_minutes: 60
windows_service_action: list
windows_service_name: "*"
windows_task_action: list
windows_task_name: ""
windows_task_path: "\\"
windows_winrm_enable_force: false
windows_remote_op: uptime
windows_remote_message: ""
windows_remote_reboot_delay: 0
windows_ad_search_type: computer
windows_ad_search_term: ""
windows_ad_search_properties: []
windows_ad_bitlocker_recovery: false
windows_openssh_default_shell: "powershell"
windows_openssh_manage_config: true
windows_openssh_allow_gssapi: true
windows_openssh_allow_password: false
windows_openssh_allow_pubkey: false
windows_openssh_allow_groups: []
windows_openssh_max_auth_tries: 3
windows_openssh_client_alive_interval: 300
windows_openssh_client_alive_count_max: 3
