---
# internal.windows.server : tasks/collect.yaml

- name: Windows Collection Orchestrator
  vars:
    _discover_failed: false
  block:
    - name: Run Application Checks
      ansible.builtin.include_tasks: checks/applications.yaml
      tags: [audit, applications]

    - name: Run Health Checks
      ansible.builtin.include_tasks: checks/health/os_info.yaml
      when: windows_health_check_os | default(true) | bool
      tags: [health, os]

    - name: "Health | Disk Space"
      ansible.builtin.include_tasks: checks/health/disk.yaml
      when: windows_health_check_disk | default(true) | bool
      tags: [health, disk]

    - name: "Health | Memory & CPU"
      ansible.builtin.include_tasks: checks/health/memory_cpu.yaml
      when: windows_health_check_memory_cpu | default(true) | bool
      tags: [health, memory, cpu]

    - name: "Health | Critical Services"
      ansible.builtin.include_tasks: checks/health/services.yaml
      when: windows_health_check_services | default(true) | bool
      tags: [health, services]

    - name: "Health | Network Adapters"
      ansible.builtin.include_tasks: checks/health/network.yaml
      when: windows_health_check_network | default(true) | bool
      tags: [health, network]

    - name: "Health | Pending Reboot"
      ansible.builtin.include_tasks: checks/health/reboot_pending.yaml
      when: windows_health_check_reboot_pending | default(true) | bool
      tags: [health, reboot]

    - name: "Health | Event Logs"
      ansible.builtin.include_tasks: checks/health/event_logs.yaml
      when: windows_health_check_event_logs | default(true) | bool
      tags: [health, events]

    - name: "Health | Secure Channel"
      ansible.builtin.include_tasks: checks/health/secure_channel.yaml
      when: windows_health_check_secure_channel | default(true) | bool
      tags: [health, domain]

    - name: "Health | Software Versions"
      ansible.builtin.include_tasks: checks/health/software_versions.yaml
      when: windows_health_check_software_versions | default(true) | bool
      tags: [health, software]

    - name: Run ConfigMgr Updates
      ansible.builtin.include_tasks: updates/configmgr.yaml
      when: windows_audit_force_update | default(false) | bool
      tags: [update, configmgr]
  rescue:
    - name: Mark discovery as failed
      ansible.builtin.set_fact:
        _discover_failed: true
      changed_when: false

  always:
    # Emit raw register subtrees verbatim; the schema's `first_of` +
    # `type:` per-field declarations apply type coercion and missing-value
    # fallbacks. See `ncs-ansible-windows/ncs_configs/windows.yaml`.
    - name: Assemble flat discovery payload
      ansible.builtin.set_fact:
        _win_raw_payload:
          # Raw register subtrees consumed by schema `first_of` chains.
          _ccm_service: "{{ _ccm_service | default({}) }}"
          _health_os_info: "{{ _health_os_info | default({}) }}"
          _health_memory_cpu: "{{ _health_memory_cpu | default({}) }}"
          _health_reboot_pending: "{{ _health_reboot_pending | default({}) }}"
          _health_event_logs: "{{ _health_event_logs | default({}) }}"
          _health_secure_channel: "{{ _health_secure_channel | default({}) }}"
          _vuln_results: "{{ _vuln_results | default({}) }}"
          # Already-flat lists (no shaping needed beyond the empty fallback).
          configmgr_apps: "{{ _win_configmgr_apps | default([]) }}"
          apps_to_update: "{{ _win_apps_to_update | default([]) }}"
          installed_apps: "{{ _win_installed_apps | default([]) }}"
          update_results: "{{ _win_update_results | default([]) }}"
          health_disk: "{{ _health_disk | default([]) }}"
          health_services: "{{ _health_services | default([]) }}"
          health_network: "{{ _health_network | default([]) }}"
          health_software_versions: "{{ _health_software_versions | default([]) }}"
          kb_detection: "{{ _kb_detection | default([]) }}"
          kb_install_results: "{{ _kb_install_results | default([]) }}"
          audit_failed: "{{ _discover_failed | bool }}"
      changed_when: false

    - name: "Windows | Emit discovery telemetry"
      ansible.builtin.include_role:
        name: internal.core.emit
      vars:
        _ncs_emit_platform: "windows"
        _ncs_emit_tree_path:
          - windows
          - "{{ inventory_hostname }}"
        _ncs_emit_payload: "{{ _win_raw_payload | default({}) }}"
        _ncs_emit_skip: "{{ windows_skip_export | default(false) }}"
        _ncs_emit_config:
          windows_audit_force_update: "{{ windows_audit_force_update | default(false) }}"
          windows_health_disk_warning_pct: "{{ windows_health_disk_warning_pct | default(80) }}"
          windows_health_disk_critical_pct: "{{ windows_health_disk_critical_pct | default(90) }}"
          windows_health_memory_warning_pct: "{{ windows_health_memory_warning_pct | default(85) }}"
          windows_health_memory_critical_pct: "{{ windows_health_memory_critical_pct | default(95) }}"
