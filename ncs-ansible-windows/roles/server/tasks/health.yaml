---
# internal.windows.server : tasks/health.yaml
# Comprehensive system health check orchestrator.
# Covers: OS info, disk, memory/CPU, services, network, reboot pending,
# event logs, secure channel, and software version inventory.

- name: "Health | Orchestrator"
  vars:
    _health_failed: false
  block:
    - name: "Health | OS Information"
      ansible.builtin.include_tasks: checks/health/os_info.yaml
      when: windows_health_check_os | bool
      tags: [health, os]

    - name: "Health | Disk Space"
      ansible.builtin.include_tasks: checks/health/disk.yaml
      when: windows_health_check_disk | bool
      tags: [health, disk]

    - name: "Health | Memory & CPU"
      ansible.builtin.include_tasks: checks/health/memory_cpu.yaml
      when: windows_health_check_memory_cpu | bool
      tags: [health, memory, cpu]

    - name: "Health | Critical Services"
      ansible.builtin.include_tasks: checks/health/services.yaml
      when: windows_health_check_services | bool
      tags: [health, services]

    - name: "Health | Network Adapters"
      ansible.builtin.include_tasks: checks/health/network.yaml
      when: windows_health_check_network | bool
      tags: [health, network]

    - name: "Health | Pending Reboot"
      ansible.builtin.include_tasks: checks/health/reboot_pending.yaml
      when: windows_health_check_reboot_pending | bool
      tags: [health, reboot]

    - name: "Health | Event Logs"
      ansible.builtin.include_tasks: checks/health/event_logs.yaml
      when: windows_health_check_event_logs | bool
      tags: [health, events]

    - name: "Health | Secure Channel"
      ansible.builtin.include_tasks: checks/health/secure_channel.yaml
      when: windows_health_check_secure_channel | bool
      tags: [health, domain]

    - name: "Health | Software Versions"
      ansible.builtin.include_tasks: checks/health/software_versions.yaml
      when: windows_health_check_software_versions | bool
      tags: [health, software]

  rescue:
    - name: "Health | Mark failure"
      ansible.builtin.set_fact:
        _health_failed: true
      changed_when: false

  always:
    - name: "Health | Assemble payload"
      ansible.builtin.set_fact:
        _health_payload:
          os_info: "{{ _health_os_info | default({}) }}"
          disk: "{{ _health_disk | default([]) }}"
          memory_cpu: "{{ _health_memory_cpu | default({}) }}"
          services: "{{ _health_services | default([]) }}"
          network: "{{ _health_network | default([]) }}"
          reboot_pending: "{{ _health_reboot_pending | default({}) }}"
          event_logs: "{{ _health_event_logs | default({}) }}"
          secure_channel: "{{ _health_secure_channel | default({}) }}"
          software_versions: "{{ _health_software_versions | default([]) }}"
          health_failed: "{{ _health_failed | bool }}"
      changed_when: false

    - name: "Health | Emit telemetry"
      ansible.builtin.include_role:
        name: internal.core.emit
      vars:
        _ncs_emit_platform: "windows/health"
        _ncs_emit_payload: "{{ _health_payload | default({}) }}"
        _ncs_emit_config:
          windows_health_disk_warning_pct: "{{ windows_health_disk_warning_pct | default(80) }}"
          windows_health_disk_critical_pct: "{{ windows_health_disk_critical_pct | default(90) }}"
          windows_health_memory_warning_pct: "{{ windows_health_memory_warning_pct | default(85) }}"
          windows_health_memory_critical_pct: "{{ windows_health_memory_critical_pct | default(95) }}"
