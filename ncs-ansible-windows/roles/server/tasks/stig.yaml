---
# internal.windows.server : tasks/stig.yaml

- name: "Windows STIG"
  ansible.builtin.include_role:
    name: internal.core.stig_orchestrator
  vars:
    _ncs_stig_label: "Windows STIG"
    _ncs_stig_target_type: "windows"
    _ncs_stig_task_file: "{{ _ncs_task_root }}/stig_ws2022/main.yaml"
    _ncs_stig_compat_facts:
      windows_stig_enable_audit: "{{ windows_enable_stig_audit | default(windows_stig_enable_audit) | default(true) }}"
      windows_stig_enable_hardening: "{{ windows_enable_stig_hardening | default(windows_stig_enable_hardening) | default(false) }}"
    _ncs_stig_mode_facts:
      windows_stig_enable_audit: "{{ _ncs_stig_action in ['audit', 'verify'] }}"
      windows_stig_enable_hardening: "{{ _ncs_stig_action == 'remediate' }}"
    _ncs_stig_telemetry:
      platform: "windows"
      name: "stig_windows"
      payload_var: "audit_full_list"
