---
argument_specs:
  main:
    short_description: Windows Server audit, health, STIG, and maintenance
    description:
      - Collects system info, installed applications, and update status.
      - Performs STIG compliance evaluation and optional hardening.
      - Runs health checks (disk, memory, services, event logs).
      - Manages patching, software updates, OpenSSH, and WinRM.
      - Connects via WinRM (credentials from inventory).
    options:
      ncs_action:
        type: str
        required: false
        default: audit
        choices: [collect, audit, remediate, verify]
        description: Primary action to perform.
      ncs_profile:
        type: str
        required: false
        choices: [stig, health]
        description: Compliance or health profile. Mutually exclusive with ncs_operation.
      ncs_operation:
        type: str
        required: false
        choices:
          - patch
          - registry_fix
          - kb_install
          - windows_update
          - update_software
          - uninstall_software
          - service
          - scheduled_task
          - cleanup
          - ad_search
          - vuln_scan
          - openssh
          - winrm_enable
          - remote_ops
        description: Named operation. Mutually exclusive with ncs_profile.
      windows_stig_enable_audit:
        type: bool
        required: false
        default: true
        description: Enable STIG audit checks.
      windows_stig_enable_hardening:
        type: bool
        required: false
        default: false
        description: Enable STIG remediation (mutating).
      windows_stig_native_checks_only:
        type: bool
        required: false
        default: false
        description: Only run native PowerShell STIG checks (skip STIG module).
      windows_audit_force_update:
        type: bool
        required: false
        default: false
        description: Force update scan regardless of cache age.
      windows_audit_allow_reboot:
        type: bool
        required: false
        default: false
        description: Allow reboot after maintenance operations.
      windows_audit_timeout_minutes:
        type: int
        required: false
        default: 30
        description: Timeout for long-running operations.
