# Shared Linux alerts — included by linux.yaml, photon.yaml, etc.

- "memory_critical | CRITICAL Capacity | memory_used_pct gte 98.0 | Memory saturation: {memory_used_pct:.1f}% used"

# range condition — stays as full format
- id: memory_warning
  category: "Capacity"
  severity: WARNING
  suppress_if: memory_critical
  condition:
    op: range
    field: memory_used_pct
    min: 85.0
    max: 98.0
  message: "Memory pressure: {memory_used_pct:.1f}% used"

# computed_filter condition — stays as full format
- id: disk_critical
  category: "Capacity"
  severity: CRITICAL
  condition:
    op: computed_filter
    field: disks
    expression: "{used_pct}"
    cmp: gte
    threshold: 95.0
  message: "One or more filesystems critically full (>=95%)"
  affected_items_field: disks

- id: disk_warning
  category: "Capacity"
  severity: WARNING
  suppress_if: disk_critical
  condition:
    op: computed_filter
    field: disks
    expression: "{used_pct}"
    cmp: range
    min: 80.0
    max: 95.0
  message: "One or more filesystems reaching capacity (>=80%)"
  affected_items_field: disks

- "services_failed | CRITICAL Availability | failed_services_count gt 0 | {failed_services_count} systemd service(s) failed"
- "reboot_pending | WARNING Patching | reboot_pending eq 1.0 | System requires a reboot to apply kernel or security updates"
- "pending_updates | WARNING Patching | pending_updates_count gt 0 | {pending_updates_count} package update(s) pending"
- "uptime_violation | WARNING Maintenance | uptime_days gt 180.0 | Uptime policy violation: server has not rebooted in over 6 months ({uptime_days:.0f} days)"
- "world_writable_files | WARNING Security | world_writable_count gt 0 | {world_writable_count} world-writable file(s) detected | affected=world_writable_files"
