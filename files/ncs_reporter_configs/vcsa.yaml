name: vcenter
display_name: "VMware VCSA"
platform:
  name: vmware
  input_dir: vmware/vcenter
  report_dir: vmware/vcenter
  target_types: [vcenter, vami, eam, lookup_svc, perfcharts, vcsa_photon_os, postgresql, rhttpproxy, sts, ui]
  state_file: vmware_fleet_state.yaml
  display_name: VMware
  asset_label: vCenters
  inventory_groups: [vcenters]
  stig_skeleton_map:
    vcsa: cklb_skeleton_vsphere7_vcsa_V1R3.json
    vcenter: cklb_skeleton_vsphere7_vcsa_V1R3.json
    vami: cklb_skeleton_vsphere7_vami_V1R2.json
    eam: cklb_skeleton_vsphere7_vca_eam_V1R2.json
    lookup_svc: cklb_skeleton_vsphere7_vca_lookup_svc_V1R2.json
    perfcharts: cklb_skeleton_vsphere7_vca_perfcharts_V1R1.json
    vcsa_photon_os: cklb_skeleton_vsphere7_vca_photon_os_V1R4.json
    postgresql: cklb_skeleton_vsphere7_vca_postgresql_V1R2.json
    rhttpproxy: cklb_skeleton_vsphere7_vca_rhttpproxy_V1R1.json
    sts: cklb_skeleton_vsphere7_vca_sts_V1R2.json
    ui: cklb_skeleton_vsphere7_vca_ui_V1R2.json
  stig_rule_prefixes:
    VMCH: vm
    ESXI: esxi
    VC: vcsa
    PH: photon
  site_category: VMware
  sub_entries:
    - input_dir: vmware/vcenter/vcsa
      report_dir: vmware/vcenter/vcsa
      state_file: vcsa_fleet_state.yaml
      target_types: [vcsa]
      stig_skeleton_map:
        vcsa: cklb_skeleton_vsphere7_vcsa_V1R3.json
    - input_dir: vmware/esxi
      report_dir: vmware/esxi
      state_file: esxi_fleet_state.yaml
      target_types: [esxi]
      stig_skeleton_map:
        esxi: cklb_skeleton_vsphere7_esxi_V1R4.json
    - input_dir: vmware/vm
      report_dir: vmware/vm
      state_file: vm_fleet_state.yaml
      target_types: [vm]
      stig_skeleton_map:
        vm: cklb_skeleton_vsphere7_vms_V1R4.json

# Detects the key emitted by the internal.vmware.vcsa role via set_stats.
detection:
  keys_any: [vmware_raw_vcenter]

# Paths starting with '.' are relative to path_prefix.
path_prefix: "vmware_raw_vcenter.data"

fleet_columns:
  - { label: "Version", field: appliance_version, width: "120px" }

# ---------------------------------------------------------------------------
# Fields
# ---------------------------------------------------------------------------

fields:
  # --- Appliance ---

  appliance_version:
    path: ".appliance_health_info.appliance.summary.version"
    fallback: "unknown"

  appliance_build:
    path: ".appliance_health_info.appliance.summary.build_number"
    fallback: "unknown"

  appliance_health_overall:
    path: ".appliance_health_info.appliance.summary.health.overall"
    fallback: "gray"

  appliance_health_cpu:
    path: ".appliance_health_info.appliance.summary.health.cpu"
    fallback: "gray"

  appliance_health_memory:
    path: ".appliance_health_info.appliance.summary.health.memory"
    fallback: "gray"

  appliance_health_database:
    path: ".appliance_health_info.appliance.summary.health.database"
    fallback: "gray"

  appliance_health_storage:
    path: ".appliance_health_info.appliance.summary.health.storage"
    fallback: "gray"

  appliance_uptime_seconds:
    path: ".appliance_health_info.appliance.summary.uptime"
    type: float

  appliance_uptime_days:
    compute: "{appliance_uptime_seconds} / 86400"
    type: float

  ssh_enabled:
    path: ".appliance_health_info.appliance.access.ssh"
    type: bool

  shell_enabled:
    path: ".appliance_health_info.appliance.access.shell.enabled"
    type: bool

  ntp_mode:
    path: ".appliance_health_info.appliance.time.time_sync.mode"
    fallback: "unknown"

  ntp_servers:
    path: ".appliance_health_info.appliance.time.time_sync.servers"
    type: list

  # --- Backup ---

  backup_schedules:
    path: ".appliance_backup_info.schedules"
    type: list

  backup_schedule_count:
    path: ".appliance_backup_info.schedules | len_if_list"
    type: int

  # --- Alarms ---

  active_alarms:
    path: ".alarms_info.alarms"
    type: list

  active_critical_alarm_count:
    path: ".alarms_info.alarms"
    type: int
    count_where:
      severity: "critical"

  active_warning_alarm_count:
    path: ".alarms_info.alarms"
    type: int
    count_where:
      severity: "warning"

  alarm_count:
    path: ".alarms_info.alarms | len_if_list"
    type: int

# ---------------------------------------------------------------------------
# Alerts
# ---------------------------------------------------------------------------

alerts:
  - id: appliance_health_red
    category: "Appliance Health"
    severity: CRITICAL
    condition:
      op: eq_str
      field: appliance_health_overall
      value: "red"
    message: "VCSA component failure: overall health is RED"

  - id: appliance_health_yellow
    category: "Appliance Health"
    severity: WARNING
    suppress_if: appliance_health_red
    condition:
      op: eq_str
      field: appliance_health_overall
      value: "yellow"
    message: "VCSA degraded: overall health is YELLOW"

  - id: appliance_health_gray
    category: "Data Quality"
    severity: WARNING
    suppress_if: [appliance_health_red, appliance_health_yellow]
    condition:
      op: eq_str
      field: appliance_health_overall
      value: "gray"
    message: "VCSA health unknown: overall health is GRAY — check permissions and API availability"

  - id: ssh_enabled
    category: "Security"
    severity: WARNING
    condition:
      op: eq
      field: ssh_enabled
      threshold: 1.0
    message: "Hardening violation: SSH is enabled on VCSA"

  - id: shell_enabled
    category: "Security"
    severity: WARNING
    condition:
      op: eq
      field: shell_enabled
      threshold: 1.0
    message: "Hardening violation: interactive shell is enabled on VCSA"

  - id: ntp_disabled
    category: "Time Synchronization"
    severity: WARNING
    condition:
      op: not_in_str
      field: ntp_mode
      values: ["NTP", "HOST"]
    message: "Time sync misconfigured: NTP mode is '{ntp_mode}' — clock drift may affect logs and certificates"

  - id: appliance_uptime_excessive
    category: "Appliance Lifecycle"
    severity: WARNING
    condition:
      op: gte
      field: appliance_uptime_days
      threshold: 90.0
    message: "VCSA has not been rebooted in {appliance_uptime_days:.0f} days — may be missing patches"

  - id: appliance_uptime_recent_reboot
    category: "Appliance Lifecycle"
    severity: INFO
    suppress_if: appliance_uptime_excessive
    condition:
      op: lt
      field: appliance_uptime_days
      threshold: 1.0
    message: "VCSA was rebooted less than 24 hours ago — verify this was planned"

  - id: no_backup_schedule
    category: "Data Protection"
    severity: CRITICAL
    condition:
      op: lte
      field: backup_schedule_count
      threshold: 0
    message: "DR risk: no file-based backup schedule configured on VCSA"

  - id: backup_schedule_disabled
    category: "Data Protection"
    severity: CRITICAL
    condition:
      op: filter_count
      field: backup_schedules
      filter_field: enabled
      filter_value: false
      threshold: 0
    message: "DR risk: a configured backup schedule is DISABLED on VCSA"

  - id: active_critical_alarms
    category: "vCenter Alarms"
    severity: CRITICAL
    condition:
      op: gt
      field: active_critical_alarm_count
      threshold: 0
    message: "Active CRITICAL alarms detected in vCenter ({alarm_count} total triggered)"
    affected_items_field: active_alarms

  - id: active_warning_alarms
    category: "vCenter Alarms"
    severity: WARNING
    suppress_if: active_critical_alarms
    condition:
      op: gt
      field: active_warning_alarm_count
      threshold: 0
    message: "Active WARNING alarms detected in vCenter ({alarm_count} total triggered)"
    affected_items_field: active_alarms

# ---------------------------------------------------------------------------
# Widgets
# ---------------------------------------------------------------------------

widgets:
  - id: alerts
    title: "Active Alerts"
    type: alert_panel

  - id: active_alarms
    title: "Active vCenter Alarms"
    type: table
    rows_field: active_alarms
    columns:
      - { label: "Alarm", field: alarm_name }
      - { label: "Entity", field: entity }
      - { label: "Severity", field: severity, badge: true }
      - { label: "Time", field: time }
      - { label: "Description", field: description }

  - id: inventory_kpis
    title: "Appliance KPIs"
    type: stat_cards
    layout: { width: "full" }
    cards:
      - { field: alarm_count, label: "Alarms", thresholds: { 1: yellow, 5: red } }
      - { field: backup_schedule_count, label: "Backup Schedules" }

  - id: appliance_overview
    title: "Appliance Overview"
    type: key_value
    layout: { width: "half" }
    fields:
      - { label: "Version", field: appliance_version }
      - { label: "Build", field: appliance_build }
      - { label: "Health Overall", field: appliance_health_overall, badge: true }
      - { label: "Health CPU", field: appliance_health_cpu, badge: true }
      - { label: "Health Memory", field: appliance_health_memory, badge: true }
      - { label: "Health DB", field: appliance_health_database, badge: true }
      - { label: "Health Storage", field: appliance_health_storage, badge: true }
      - { label: "Uptime (days)", field: appliance_uptime_days }
      - { label: "SSH Enabled", field: ssh_enabled, badge: true }
      - { label: "NTP Mode", field: ntp_mode }

  - id: backup_schedules_tbl
    title: "Backup Schedules"
    type: table
    visible_if: { op: gt, field: backup_schedule_count, threshold: 0 }
    rows_field: backup_schedules
    columns:
      - { label: "Name", field: name }
      - label: "Enabled"
        field: enabled
        badge: true
        style_rules:
          - condition: { op: eq, field: enabled, threshold: 0.0 }
            css_class: "sv-critical"
      - { label: "Location", field: location }
      - { label: "Retain Count", field: retain_count }
