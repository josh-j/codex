# Shared Linux/Photon base fields.
# Included via $include from linux-family schemas.
# Paths use '.' prefix (relative to the schema's path_prefix).

# --- System identity ---

hostname: ".ansible_facts.hostname = unknown"
ip_address: ".ansible_facts.default_ipv4.address = N/A"
kernel: ".ansible_facts.kernel = unknown"
os_family: ".ansible_facts.os_family = unknown"
distribution: ".ansible_facts.distribution = unknown"
distribution_version: ".ansible_facts.distribution_version = unknown"

# --- Uptime ---

uptime_seconds: ".ansible_facts.uptime_seconds | float"

uptime_days:
  compute: "{uptime_seconds} / 86400"
  type: float

load_avg_15m: ".ansible_facts.loadavg.15m | float"

# --- Memory ---

memory_total_mb: ".ansible_facts.memtotal_mb | float = 1.0"
memory_free_mb: ".ansible_facts.memfree_mb | float"

memory_used_pct:
  compute: "({memory_total_mb} - {memory_free_mb}) / {memory_total_mb} * 100"
  type: float

swap_total_mb: ".ansible_facts.swaptotal_mb | float"
swap_free_mb: ".ansible_facts.swapfree_mb | float"

swap_used_pct:
  compute: "({swap_total_mb} - {swap_free_mb}) / {swap_total_mb} * 100"
  type: float

# --- Services ---

failed_services: ".failed_services.stdout_lines | list"
failed_services_count: ".failed_services.stdout_lines | len_if_list | int"

# --- Updates & reboot ---

pending_updates_count: ".apt_simulate.stdout_lines | join_lines | regex_extract('(\\d+) upgraded,') | int"
reboot_pending: ".reboot_stat.stat.exists | bool"

# --- Storage ---

disks:
  path: ".ansible_facts.mounts"
  type: list
  list_filter:
    exclude:
      fstype: [tmpfs, devtmpfs, squashfs, overlay, proc, sysfs, devpts]
      device: ["^/dev/loop"]
  list_map:
    total_gb: "{size_total} / 1073741824"
    free_gb: "{size_available} / 1073741824"
    used_pct: "({size_total} - {size_available}) / {size_total} * 100"

# --- Security ---

getent_passwd: ".ansible_facts.getent_passwd | dict"
shadow_lines: ".shadow_raw.stdout_lines | list"
epoch_seconds: ".ansible_facts.date_time.epoch | float"
sshd_config: ".sshd_raw.stdout_lines | parse_kv(' ', '#') | dict"
world_writable_files: ".world_writable.stdout_lines | list"
world_writable_count: ".world_writable.stdout_lines | len_if_list | int"

users:
  script: "user_inventory.py"
  type: list
