# Shared Linux widgets — included by linux.yaml, photon.yaml, etc.

- title: "Active Alerts"
  type: alert_panel

- id: headline_kpis
  title: "Key Metrics"
  type: stat_cards
  cards:
    - { field: uptime_days, label: "Uptime (d)", format: "{value:.0f}" }
    - { field: memory_used_pct, label: "Mem Used %", format: "{value:.1f}%", thresholds: { 85: yellow, 98: red } }
    - { field: failed_services_count, label: "Failed Svcs", thresholds: { 1: red } }
    - { field: pending_updates_count, label: "Pending Updates", thresholds: { 1: yellow } }

- title: "System Overview"
  type: key_value
  fields:
    - label: "Hostname"
      field: hostname
    - label: "IP Address"
      field: ip_address
    - label: "Distribution"
      field: distribution
    - label: "Version"
      field: distribution_version
    - label: "Kernel"
      field: kernel
    - { label: "Uptime (days)", field: uptime_days, format: "{value:.1f}" }
    - { label: "Load Avg (15m)", field: load_avg_15m, format: "{value:.2f}" }

- title: "Memory"
  type: key_value
  fields:
    - { label: "Total (MB)", field: memory_total_mb, format: "{value:.1f}" }
    - { label: "Free (MB)", field: memory_free_mb, format: "{value:.1f}" }
    - { label: "Used %", field: memory_used_pct, format: "{value:.1f}" }
    - { label: "Swap Total (MB)", field: swap_total_mb, format: "{value:.1f}" }
    - { label: "Swap Used %", field: swap_used_pct, format: "{value:.1f}" }

- title: "Patching & Services"
  type: key_value
  fields:
    - label: "Failed Services"
      field: failed_services_count
    - label: "Pending Updates"
      field: pending_updates_count
    - label: "Reboot Required"
      field: reboot_pending

- title: "Filesystems"
  type: table
  rows: disks
  columns:
    - label: "Mount"
      field: mount
    - label: "Device"
      field: device
    - label: "FS Type"
      field: fstype
    - label: "Total (GB)"
      field: total_gb
    - label: "Free (GB)"
      field: free_gb
    - label: "Used %"
      field: used_pct
      badge: true
