# Shared Linux widgets — included by linux.yaml, photon.yaml, etc.


- type: stat-cards
  id: headline_kpis
  title: "Key Metrics"
  # Thresholds for these vars are declared in linux_base_fields.yaml
  cards:
    'Uptime (d)': "{{ uptime_days | round(0) }}"
    'Mem Used %': "{{ memory_used_pct | round(1) }}%"
    'Failed Svcs': "{{ failed_services_count }}"
    'Pending Updates': "{{ pending_updates_count }}"

- type: key-value
  title: "System Overview"
  fields:
    - 'Hostname': "{{ hostname }}"
    - 'IP Address': "{{ ip_address }}"
    - 'Distribution': "{{ distribution }}"
    - 'Version': "{{ distribution_version }}"
    - 'Kernel': "{{ kernel }}"
    - { 'Uptime (days)': "{{ uptime_days }}", format: "{{ value | round(1) }}" }
    - { 'Load Avg (15m)': "{{ load_avg_15m }}", format: "{value:.2f}" }

- type: key-value
  title: "Memory"
  fields:
    - { 'Total (MB)': "{{ memory_total_mb }}", format: "{{ value | round(1) }}" }
    - { 'Free (MB)': "{{ memory_free_mb }}", format: "{{ value | round(1) }}" }
    - { 'Used %': "{{ memory_used_pct }}", format: "{{ value | round(1) }}" }
    - { 'Swap Total (MB)': "{{ swap_total_mb }}", format: "{{ value | round(1) }}" }
    - { 'Swap Used %': "{{ swap_used_pct }}", format: "{{ value | round(1) }}" }

- type: key-value
  title: "Patching & Services"
  fields:
    'Failed Services': "{{ failed_services_count }}"
    'Pending Updates': "{{ pending_updates_count }}"
    'Reboot Required': "{{ reboot_pending }}"

- type: table
  title: "Filesystems"
  rows: "{{ disks }}"
  columns:
    'Mount': "{{ mount }}"
    'Device': "{{ device }}"
    'FS Type': "{{ fstype }}"
    'Total (GB)': "{{ total_gb }}"
    'Free (GB)': "{{ free_gb }}"
    'Used % [badge]': "{{ used_pct }}"
