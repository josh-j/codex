# Shared Linux widgets — included by linux.yaml, photon.yaml, etc.

- alert_panel: "Active Alerts"

- id: headline_kpis
  title: "Key Metrics"
  type: stat_cards
  cards:
    - { field: uptime_days, label: "Uptime (d)", format: "{value:.0f}" }
    - { field: memory_used_pct, label: "Mem Used %", format: "{value:.1f}%", thresholds: { 85: yellow, 98: red } }
    - { field: failed_services_count, label: "Failed Svcs", thresholds: { 1: red } }
    - { field: pending_updates_count, label: "Pending Updates", thresholds: { 1: yellow } }

- key_value: "System Overview"
  fields:
    - "Hostname: hostname"
    - "IP Address: ip_address"
    - "Distribution: distribution"
    - "Version: distribution_version"
    - "Kernel: kernel"
    - { label: "Uptime (days)", field: uptime_days, format: "{value:.1f}" }
    - { label: "Load Avg (15m)", field: load_avg_15m, format: "{value:.2f}" }

- key_value: "Memory"
  fields:
    - { label: "Total (MB)", field: memory_total_mb, format: "{value:.1f}" }
    - { label: "Free (MB)", field: memory_free_mb, format: "{value:.1f}" }
    - { label: "Used %", field: memory_used_pct, format: "{value:.1f}" }
    - { label: "Swap Total (MB)", field: swap_total_mb, format: "{value:.1f}" }
    - { label: "Swap Used %", field: swap_used_pct, format: "{value:.1f}" }

- key_value: "Patching & Services"
  fields:
    - "Failed Services: failed_services_count"
    - "Pending Updates: pending_updates_count"
    - "Reboot Required: reboot_pending"

- table: "Filesystems"
  rows: disks
  columns:
    - "Mount: mount"
    - "Device: device"
    - "FS Type: fstype"
    - "Total (GB): total_gb"
    - "Free (GB): free_gb"
    - "Used %: used_pct [badge]"
