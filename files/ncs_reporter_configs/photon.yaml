name: photon
display_name: "Photon OS"
platform:
  name: linux
  input_dir: linux/photon
  report_dir: linux/photon
  state_file: photon_fleet_state.yaml
  render: false
  target_types: [photon]
  stig_skeleton_map:
    photon: cklb_skeleton_vsphere7_vca_photon_os_V1R4.json

# Detects the key emitted by the internal.linux role via ncs_collector callback.
detection:
  keys_any: [raw_discovery]

# Paths starting with '.' are relative to path_prefix.
path_prefix: "raw_discovery.data"

fleet_columns:
  - { label: "Distribution", field: distribution, width: "120px" }
  - { label: "Uptime (d)", field: uptime_days, width: "80px" }
  - { label: "Critical", field: _critical_count, width: "70px" }
  - { label: "Warning", field: _warning_count, width: "70px" }

# ---------------------------------------------------------------------------
# Fields — shared with linux via $include, only collection timestamp differs
# ---------------------------------------------------------------------------

fields:
  $include: "linux_base_fields.yaml"

  # --- Collection timestamp (absolute path, not relative to path_prefix) ---
  collected_at: "raw_discovery.metadata.timestamp"

# ---------------------------------------------------------------------------
# Alerts
# ---------------------------------------------------------------------------

alerts:
  # ---- Memory ----

  - id: memory_critical
    category: "Capacity"
    severity: CRITICAL
    condition:
      op: gte
      field: memory_used_pct
      threshold: 98.0
    message: "Memory saturation: {memory_used_pct:.1f}% used"

  - id: memory_warning
    category: "Capacity"
    severity: WARNING
    suppress_if: memory_critical
    condition:
      op: range
      field: memory_used_pct
      min: 85.0
      max: 98.0
    message: "Memory pressure: {memory_used_pct:.1f}% used"

  # ---- Storage ----

  - id: disk_critical
    category: "Capacity"
    severity: CRITICAL
    condition:
      op: computed_filter
      field: disks
      expression: "{used_pct}"
      cmp: gte
      threshold: 95.0
    message: "One or more filesystems critically full (≥95%)"
    affected_items_field: disks

  - id: disk_warning
    category: "Capacity"
    severity: WARNING
    suppress_if: disk_critical
    condition:
      op: computed_filter
      field: disks
      expression: "{used_pct}"
      cmp: range
      min: 80.0
      max: 95.0
    message: "One or more filesystems reaching capacity (≥80%)"
    affected_items_field: disks

  # ---- Services ----

  - id: services_failed
    category: "Availability"
    severity: CRITICAL
    condition:
      op: gt
      field: failed_services_count
      threshold: 0
    message: "{failed_services_count} systemd service(s) failed"

  # ---- Patching ----

  - id: reboot_pending
    category: "Patching"
    severity: WARNING
    condition:
      op: eq
      field: reboot_pending
      threshold: 1.0
    message: "System requires a reboot to apply kernel or security updates"

  - id: pending_updates
    category: "Patching"
    severity: WARNING
    condition:
      op: gt
      field: pending_updates_count
      threshold: 0
    message: "{pending_updates_count} package update(s) pending"

  # ---- Maintenance ----

  - id: uptime_violation
    category: "Maintenance"
    severity: WARNING
    condition:
      op: gt
      field: uptime_days
      threshold: 180.0
    message: "Uptime policy violation: server has not rebooted in over 6 months ({uptime_days:.0f} days)"

  # ---- Security ----

  - id: world_writable_files
    category: "Security"
    severity: WARNING
    condition:
      op: gt
      field: world_writable_count
      threshold: 0
    message: "{world_writable_count} world-writable file(s) detected"
    affected_items_field: world_writable_files

# ---------------------------------------------------------------------------
# Sections (template rendering)
# ---------------------------------------------------------------------------

widgets:
  - id: alerts
    title: "Active Alerts"
    type: alert_panel

  - id: headline_kpis
    title: "Key Metrics"
    type: stat_cards
    cards:
      - { field: uptime_days, label: "Uptime (d)", format: "{value:.0f}" }
      - { field: memory_used_pct, label: "Mem Used %", format: "{value:.1f}%", thresholds: { 85: yellow, 98: red } }
      - { field: failed_services_count, label: "Failed Svcs", thresholds: { 1: red } }
      - { field: pending_updates_count, label: "Pending Updates", thresholds: { 1: yellow } }

  - id: system_overview
    title: "System Overview"
    type: key_value
    fields:
      - { label: "Hostname", field: hostname }
      - { label: "IP Address", field: ip_address }
      - { label: "Distribution", field: distribution }
      - { label: "Version", field: distribution_version }
      - { label: "Kernel", field: kernel }
      - { label: "Uptime (days)", field: uptime_days, format: "{value:.1f}" }
      - { label: "Load Avg (15m)", field: load_avg_15m, format: "{value:.2f}" }

  - id: memory
    title: "Memory"
    type: key_value
    fields:
      - { label: "Total (MB)", field: memory_total_mb, format: "{value:.1f}" }
      - { label: "Free (MB)", field: memory_free_mb, format: "{value:.1f}" }
      - { label: "Used %", field: memory_used_pct, format: "{value:.1f}" }
      - {
          label: "Swap Total (MB)",
          field: swap_total_mb,
          format: "{value:.1f}",
        }
      - { label: "Swap Used %", field: swap_used_pct, format: "{value:.1f}" }

  - id: patching
    title: "Patching & Services"
    type: key_value
    fields:
      - { label: "Failed Services", field: failed_services_count }
      - { label: "Pending Updates", field: pending_updates_count }
      - { label: "Reboot Required", field: reboot_pending }

  - id: disks
    title: "Filesystems"
    type: table
    rows_field: disks
    columns:
      - { label: "Mount", field: mount }
      - { label: "Device", field: device }
      - { label: "FS Type", field: fstype }
      - { label: "Total (GB)", field: total_gb }
      - { label: "Free (GB)", field: free_gb }
      - { label: "Used %", field: used_pct, badge: true }
