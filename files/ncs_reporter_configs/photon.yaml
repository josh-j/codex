config:
  display_name: "Photon OS"
  platform:
    path: linux/photon
    render: false
  stig:
    ansible_playbook:
      path: "playbooks/photon_stig_remediate.yml"
      target_var: "photon_target_hosts"
    platform_to_checklist:
      photon: cklb_skeletons/cklb_skeleton_vsphere7_vca_photon_os_V1R4.json
  extra_fleet_widget_columns:
    - label: "Distribution"
      field: distribution
    - label: "Uptime (d)"
      field: uptime_days
    - label: "Critical"
      field: _critical_count
    - label: "Warning"
      field: _warning_count

fields:
  $include: "linux_base_fields.yaml"
  collected_at: "raw_photon.metadata.timestamp"

alerts:
  $include: "linux_base_alerts.yaml"

widgets:
  $include: "linux_base_widgets.yaml"
