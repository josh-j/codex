config:
  platform: linux/ubuntu
  stig:
    ansible_playbook:
      path: "playbooks/ubuntu_stig_remediate.yml"
      target_var: "ubuntu_target_hosts"
    rule_prefix_to_platform:
      UBTU: ubuntu
      GEN: ubuntu
  extra_fleet_widget_columns:
    - label: "Distribution"
      field: distribution
    - label: "Uptime (d)"
      field: uptime_days
    - label: "Critical"
      field: _critical_count
    - label: "Warning"
      field: _warning_count

vars:
  $include: "linux_base_fields.yaml"
  collected_at: "raw_ubuntu.metadata.timestamp"

alerts:
  $include: "linux_base_alerts.yaml"

widgets:
  $include: "linux_base_widgets.yaml"
