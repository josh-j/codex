config:
  platform: windows
  stig:
    rule_prefix_to_platform:
      WN: windows
      MS: windows
  extra_fleet_widget_columns:
    'Collected At': "{{ collected_at }}"
    'CCM Status': "{{ ccm_service_state }}"
    'Reboot': "{{ health_reboot_pending }}"
    'Critical': "{{ _critical_count }}"
    'Warning': "{{ _warning_count }}"

# ---------------------------------------------------------------------------
# Fields
# ---------------------------------------------------------------------------

vars:
  # --- Collection timestamp ---
  collected_at: "raw_windows.metadata.timestamp"

  # --- CCMExec service ---
  ccm_service_state:
    path: ".ccm_service.state"
    fallback: "unknown"

  # --- ConfigMgr applications (PowerShell JSON) ---
  configmgr_apps:
    path: ".configmgr_apps | unwrap_ps(AllApps)"
    type: list
  apps_to_update:
    path: ".configmgr_apps | unwrap_ps(AppsToUpdate)"
    type: list

  # --- Installed applications (PowerShell JSON) ---
  installed_apps:
    path: ".installed_apps | unwrap_ps"
    type: list

  # --- Windows Update results ---
  update_results:
    path: ".update_results"
    type: list

  # --- Health fields ---
  health_os_info:
    path: ".health.os_info"
    type: dict
    fallback: {}
  health_hostname:
    path: ".health.os_info.hostname"
    fallback: ''
  health_os_name:
    path: ".health.os_info.os_name"
    fallback: ''
  health_uptime_hours:
    path: ".health.os_info.uptime_hours"
    fallback: 0
  health_disk:
    path: ".health.disk"
    type: list

  # health_disk_alert removed — disk threshold check moved to computed_filter alert

  health_memory_cpu:
    path: ".health.memory_cpu"
    type: dict
    fallback: {}
  health_memory_used_pct:
    path: ".health.memory_cpu.memory_used_pct"
    fallback: 0
  health_cpu_load_pct:
    path: ".health.memory_cpu.cpu_load_pct"
    fallback: 0
  health_services:
    path: ".health.services"
    type: list
  health_network:
    path: ".health.network"
    type: list
  health_reboot_pending:
    path: ".health.reboot_pending.reboot_pending"
    fallback: false
  health_reboot_reasons:
    path: ".health.reboot_pending.reasons"
    type: list
  health_event_logs:
    path: ".health.event_logs"
    type: dict
    fallback: {}
  health_event_count:
    path: ".health.event_logs.event_count"
    fallback: 0
  health_events:
    path: ".health.event_logs.events"
    type: list
  health_secure_channel:
    path: ".health.secure_channel.secure_channel"
    fallback: "N/A"
  health_software_versions:
    path: ".health.software_versions"
    type: list

  # --- Vulnerability scan fields ---
  vuln_total_findings:
    path: ".vuln_scan.results.total_findings"
    fallback: 0
  vuln_remediated:
    path: ".vuln_scan.results.remediated"
    fallback: 0
  vuln_open:
    path: ".vuln_scan.results.open"
    fallback: 0
  vuln_findings:
    path: ".vuln_scan.results.findings"
    type: list

  # --- KB status fields ---
  kb_detection:
    path: ".kb_install.detection"
    type: list
  kb_install_results:
    path: ".kb_install.install_results"
    type: list

# ---------------------------------------------------------------------------
# Alerts
# ---------------------------------------------------------------------------

alerts:
  - id: ccmexec_not_running
    category: "Services"
    severity: WARNING
    when: ccm_service_state != 'running'
    msg: "ConfigMgr client service (CCMExec) is not running (state: {{ ccm_service_state }})"

  - id: failed_updates
    category: "Patching"
    severity: WARNING
    when: update_results | selectattr('failed', 'eq', true) | list | length > 0
    msg: "One or more ConfigMgr application updates failed"

  - id: apps_pending_update
    category: "Patching"
    severity: WARNING
    when: apps_to_update is defined and apps_to_update | length > 0
    msg: "ConfigMgr applications have pending updates"

  - id: reboot_pending
    category: "Health"
    severity: WARNING
    when: health_reboot_pending == 1
    msg: "System has a pending reboot ({{ health_reboot_reasons }})"

  - id: disk_space_warning
    category: "Health"
    severity: WARNING
    when: health_disk | selectattr('UsedPct', 'gt', 80.0) | list | length > 0
    msg: "One or more disks exceed 80% usage"

  - id: memory_high
    category: "Health"
    severity: WARNING
    when: health_memory_used_pct > 85
    msg: "Memory usage is high ({{ health_memory_used_pct }}%)"

  - id: secure_channel_failed
    category: "Health"
    severity: CRITICAL
    when: health_secure_channel == 'FAILED'
    msg: "Domain secure channel test FAILED"

  - id: critical_events
    category: "Health"
    severity: WARNING
    when: health_event_count > 0
    msg: "{{ health_event_count }} critical/error events in recent logs"

  - id: open_vulnerabilities
    category: "Security"
    severity: WARNING
    when: vuln_open > 0
    msg: "{{ vuln_open }} open vulnerability findings"

# ---------------------------------------------------------------------------
# Widgets
# ---------------------------------------------------------------------------

widgets:

  - type: key-value
    title: "System Information"
    fields:
      'Hostname': "{{ health_hostname }}"
      'OS': "{{ health_os_name }}"
      'Uptime (hours)': "{{ health_uptime_hours }}"
      'CCMExec State': "{{ ccm_service_state }}"
      'Reboot Pending': "{{ health_reboot_pending }}"
      'Secure Channel': "{{ health_secure_channel }}"

  - type: table
    title: "Disk Usage"
    rows: "{{ health_disk }}"
    columns:
      'Drive': "{{ DeviceID }}"
      'Size (GB)': "{{ SizeGB }}"
      'Free (GB)': "{{ FreeGB }}"
      'Used % [badge]': "{{ UsedPct }}"

  - type: key-value
    title: "Memory & CPU"
    fields:
      'Memory Used %': "{{ health_memory_used_pct }}"
      'CPU Load %': "{{ health_cpu_load_pct }}"

  - type: table
    title: "Critical Services"
    rows: "{{ health_services }}"
    columns:
      'Service': "{{ display_name }}"
      'Status [badge]': "{{ status }}"
      'Start Type': "{{ start_type }}"

  - type: table
    title: "Recent Critical/Error Events"
    rows: "{{ health_events }}"
    columns:
      'Time': "{{ time }}"
      'Log': "{{ log }}"
      'Level [badge]': "{{ level }}"
      'Source': "{{ source }}"
      'ID': "{{ id }}"
      'Message': "{{ message }}"

  - type: key-value
    title: "Vulnerability Summary"
    fields:
      'Total Findings': "{{ vuln_total_findings }}"
      'Remediated': "{{ vuln_remediated }}"
      'Open': "{{ vuln_open }}"

  - type: table
    title: "Vulnerability Findings"
    rows: "{{ vuln_findings }}"
    columns:
      'Plugin ID': "{{ plugin_id }}"
      'Severity [badge]': "{{ severity }}"
      'Title': "{{ title }}"
      'Remediated [badge]': "{{ remediated }}"

  - type: table
    title: "ConfigMgr Applications"
    rows: "{{ configmgr_apps }}"
    columns:
      'Name': "{{ Name }}"
      'Version': "{{ Version }}"

  - type: table
    title: "Applications Pending Update"
    rows: "{{ apps_to_update }}"
    columns:
      'Name': "{{ Name }}"
      'Current Version': "{{ CurrentVersion }}"
      'Target Version': "{{ TargetVersion }}"

  - type: table
    title: "Update Results"
    rows: "{{ update_results }}"
    columns:
      'Application': "{{ application }}"
      'Status [badge]': "{{ status }}"
      'Failed [badge]': "{{ failed }}"

  - type: table
    title: "KB Detection Status"
    rows: "{{ kb_detection }}"
    columns:
      'KB': "{{ kb }}"
      'Installed [badge]': "{{ installed }}"
      'Detection Method': "{{ method }}"

  - type: table
    title: "Installed Software"
    rows: "{{ health_software_versions }}"
    columns:
      'Name': "{{ name }}"
      'Version': "{{ version }}"
      'Publisher': "{{ publisher }}"
