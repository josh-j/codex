name: esxi
display_name: "VMware ESXi"
platform:
  name: vmware
  input_dir: vmware/vcenter
  report_dir: vmware/esxi
  display_name: "VMware ESXi"
  asset_label: ESXi Hosts
  inventory_groups: [vcenters]
  target_types: [esxi]
  legacy_raw_keys:
    vmware_raw_esxi: raw_esxi
  stig_skeleton_map:
    esxi: cklb_skeleton_vsphere7_esxi_V1R4.json

detection:
  keys_any: [vmware_raw_esxi]

path_prefix: "vmware_raw_esxi.data"

# Split the per-vCenter bundle into per-ESXi-host entries.
# The esxi_hosts field is computed by assemble_esxi_hosts.py, which
# merges host_facts, host_nics, and host_services into a flat list.
# Each item becomes its own node report keyed by the host's name.
split_field: esxi_hosts
split_name_key: name

fleet_columns:
  - "Cluster: cluster"
  - "Status: overall_status"
  - "CPU %: cpu_used_pct"
  - "Mem %: mem_used_pct"
  - "VMs: vm_count"

fields:
  # Raw data references for the assembly script
  hosts_info: ".hosts_info | dict"
  clusters_info_results: ".clusters_info.results | list"

  # Assembly script: merges raw host_facts, host_nics, host_services
  # into a flat list of per-host records for split_field expansion.
  esxi_hosts:
    script: "assemble_esxi_hosts.py"
    type: list

  # Per-host fields (resolved from the split item after expansion)
  cluster: "cluster = ''"
  datacenter: "datacenter = ''"
  connection_state: "connection_state = unknown"
  overall_status: "overall_status = unknown"
  cpu_used_pct: "cpu_used_pct | float"
  mem_used_pct: "mem_used_pct | float"
  mem_mb_total: "mem_mb_total | float"
  mem_mb_used: "mem_mb_used | float"
  vm_count: "vm_count | int"
  uptime_seconds: "uptime_seconds | float"
  uptime_days:
    compute: "{uptime_seconds} / 86400"
    type: float
  version: "version = ''"
  build: "build = ''"
  in_maintenance_mode: "in_maintenance_mode | bool"
  lockdown_mode: "lockdown_mode = unknown"
  ssh_enabled: "ssh_enabled | bool"
  shell_enabled: "shell_enabled | bool"
  ntp_running: "ntp_running | bool"
  datastores: "datastores | list"
  nics: "nics | list"
  vmknics: "vmknics | list"
  hardware_alerts: "hardware_alerts | list"

alerts:
  - "host_disconnected | CRITICAL Host Connectivity | connection_state eq_str disconnected | ESXi host is disconnected from vCenter"
  - "host_not_responding | CRITICAL Host Connectivity | connection_state eq_str notResponding | ESXi host is not responding"
  - "host_in_maintenance | WARNING Host Status | in_maintenance_mode eq 1.0 | ESXi host is in maintenance mode"
  - "mem_critical | CRITICAL Host Resources | mem_used_pct gte 95.0 | Memory utilization critically high at {mem_used_pct:.0f}%"
  - "mem_warning | WARNING Host Resources | mem_used_pct gte 85.0 | Memory utilization elevated at {mem_used_pct:.0f}% | suppress=mem_critical"
  - "cpu_critical | CRITICAL Host Resources | cpu_used_pct gte 95.0 | CPU utilization critically high at {cpu_used_pct:.0f}%"
  - "cpu_warning | WARNING Host Resources | cpu_used_pct gte 85.0 | CPU utilization elevated at {cpu_used_pct:.0f}% | suppress=cpu_critical"
  - "ssh_enabled | WARNING Security | ssh_enabled eq 1.0 | SSH is enabled on this ESXi host"
  - "shell_enabled | WARNING Security | shell_enabled eq 1.0 | ESXi Shell is enabled on this host"
  - "uptime_excessive | WARNING Host Lifecycle | uptime_days gte 90.0 | ESXi host has not been rebooted in {uptime_days:.0f} days — may be missing patches"

widgets:
  - alert_panel: "Active Alerts"

  - key_value: "Host Overview"
    layout: { width: "half" }
    fields:
      - "Connection State: connection_state [badge]"
      - "Overall Status: overall_status [badge]"
      - "Cluster: cluster"
      - "Datacenter: datacenter"
      - "Version: version"
      - "Build: build"
      - "Maintenance Mode: in_maintenance_mode [badge]"
      - "Lockdown Mode: lockdown_mode"

  - id: resource_kpis
    title: "Resource Utilization"
    type: stat_cards
    layout: { width: "half" }
    cards:
      - { field: cpu_used_pct, label: "CPU %", format: "{value:.0f}%", color: auto, thresholds: { 80: yellow, 90: red } }
      - { field: mem_used_pct, label: "Mem %", format: "{value:.0f}%", color: auto, thresholds: { 80: yellow, 90: red } }
      - { field: vm_count, label: "VMs" }
      - { field: uptime_days, label: "Uptime (days)", format: "{value:.0f}" }

  - key_value: "Security & Services"
    layout: { width: "half" }
    fields:
      - "SSH Enabled: ssh_enabled [badge]"
      - "Shell Enabled: shell_enabled [badge]"
      - "NTP Running: ntp_running [badge]"

  - table: "Datastores"
    rows: datastores
    columns:
      - "Name: name"
      - "Total: total"
      - "Free: free"

  - table: "Physical NICs"
    rows: nics
    columns:
      - "Device: device"
      - "Status: link_status [badge]"
      - "Speed (Mbps): speed_mbps"
      - "Driver: driver"
      - "Switch: switch"
