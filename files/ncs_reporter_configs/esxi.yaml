name: esxi
display_name: "VMware ESXi"
platform:
  name: vmware
  input_dir: vmware/vcenter
  report_dir: vmware/esxi
  display_name: "VMware ESXi"
  asset_label: ESXi Hosts
  inventory_groups: [vcenters]
  target_types: [esxi]
  legacy_raw_keys:
    vmware_raw_esxi: raw_esxi
  stig_skeleton_map:
    esxi: cklb_skeleton_vsphere7_esxi_V1R4.json

detection:
  keys_any: [vmware_raw_esxi]

path_prefix: "vmware_raw_esxi.data"

# Split the per-vCenter bundle into per-ESXi-host entries.
# The esxi_hosts field is computed by assemble_esxi_hosts.py, which
# merges host_facts, host_nics, and host_services into a flat list.
# Each item becomes its own node report keyed by the host's name.
split_field: esxi_hosts
split_name_key: name

fleet_columns:
  - { label: "Cluster", field: cluster }
  - { label: "Status", field: overall_status }
  - { label: "CPU %", field: cpu_used_pct }
  - { label: "Mem %", field: mem_used_pct }
  - { label: "VMs", field: vm_count }

# ---------------------------------------------------------------------------
# Fields
# ---------------------------------------------------------------------------

fields:
  # Raw data references for the assembly script
  hosts_info:
    path: ".hosts_info"

  clusters_info_results:
    path: ".clusters_info.results"
    type: list

  # Assembly script: merges raw host_facts, host_nics, host_services
  # into a flat list of per-host records for split_field expansion.
  esxi_hosts:
    script: "assemble_esxi_hosts.py"
    type: list

  # Per-host fields (resolved from the split item after expansion)
  cluster:
    path: "cluster"
    fallback: ""

  datacenter:
    path: "datacenter"
    fallback: ""

  connection_state:
    path: "connection_state"
    fallback: "unknown"

  overall_status:
    path: "overall_status"
    fallback: "unknown"

  cpu_used_pct:
    path: "cpu_used_pct"
    type: float

  mem_used_pct:
    path: "mem_used_pct"
    type: float

  mem_mb_total:
    path: "mem_mb_total"
    type: float

  mem_mb_used:
    path: "mem_mb_used"
    type: float

  vm_count:
    path: "vm_count"
    type: int

  uptime_seconds:
    path: "uptime_seconds"
    type: float

  uptime_days:
    compute: "{uptime_seconds} / 86400"
    type: float

  version:
    path: "version"
    fallback: ""

  build:
    path: "build"
    fallback: ""

  in_maintenance_mode:
    path: "in_maintenance_mode"
    type: bool

  lockdown_mode:
    path: "lockdown_mode"
    fallback: "unknown"

  ssh_enabled:
    path: "ssh_enabled"
    type: bool

  shell_enabled:
    path: "shell_enabled"
    type: bool

  ntp_running:
    path: "ntp_running"
    type: bool

  datastores:
    path: "datastores"
    type: list

  nics:
    path: "nics"
    type: list

  vmknics:
    path: "vmknics"
    type: list

  hardware_alerts:
    path: "hardware_alerts"
    type: list

# ---------------------------------------------------------------------------
# Alerts
# ---------------------------------------------------------------------------

alerts:
  - id: host_disconnected
    category: "Host Connectivity"
    severity: CRITICAL
    condition:
      op: eq_str
      field: connection_state
      value: "disconnected"
    message: "ESXi host is disconnected from vCenter"

  - id: host_not_responding
    category: "Host Connectivity"
    severity: CRITICAL
    condition:
      op: eq_str
      field: connection_state
      value: "notResponding"
    message: "ESXi host is not responding"

  - id: host_in_maintenance
    category: "Host Status"
    severity: WARNING
    condition:
      op: eq
      field: in_maintenance_mode
      threshold: 1.0
    message: "ESXi host is in maintenance mode"

  - id: mem_critical
    category: "Host Resources"
    severity: CRITICAL
    condition:
      op: gte
      field: mem_used_pct
      threshold: 95.0
    message: "Memory utilization critically high at {mem_used_pct:.0f}%"

  - id: mem_warning
    category: "Host Resources"
    severity: WARNING
    suppress_if: mem_critical
    condition:
      op: gte
      field: mem_used_pct
      threshold: 85.0
    message: "Memory utilization elevated at {mem_used_pct:.0f}%"

  - id: cpu_critical
    category: "Host Resources"
    severity: CRITICAL
    condition:
      op: gte
      field: cpu_used_pct
      threshold: 95.0
    message: "CPU utilization critically high at {cpu_used_pct:.0f}%"

  - id: cpu_warning
    category: "Host Resources"
    severity: WARNING
    suppress_if: cpu_critical
    condition:
      op: gte
      field: cpu_used_pct
      threshold: 85.0
    message: "CPU utilization elevated at {cpu_used_pct:.0f}%"

  - id: ssh_enabled
    category: "Security"
    severity: WARNING
    condition:
      op: eq
      field: ssh_enabled
      threshold: 1.0
    message: "SSH is enabled on this ESXi host"

  - id: shell_enabled
    category: "Security"
    severity: WARNING
    condition:
      op: eq
      field: shell_enabled
      threshold: 1.0
    message: "ESXi Shell is enabled on this host"

  - id: uptime_excessive
    category: "Host Lifecycle"
    severity: WARNING
    condition:
      op: gte
      field: uptime_days
      threshold: 90.0
    message: "ESXi host has not been rebooted in {uptime_days:.0f} days — may be missing patches"

# ---------------------------------------------------------------------------
# Widgets
# ---------------------------------------------------------------------------

widgets:
  - id: alerts
    title: "Active Alerts"
    type: alert_panel

  - id: host_overview
    title: "Host Overview"
    type: key_value
    layout: { width: "half" }
    fields:
      - { label: "Connection State", field: connection_state, badge: true }
      - { label: "Overall Status", field: overall_status, badge: true }
      - { label: "Cluster", field: cluster }
      - { label: "Datacenter", field: datacenter }
      - { label: "Version", field: version }
      - { label: "Build", field: build }
      - { label: "Maintenance Mode", field: in_maintenance_mode, badge: true }
      - { label: "Lockdown Mode", field: lockdown_mode }

  - id: resource_kpis
    title: "Resource Utilization"
    type: stat_cards
    layout: { width: "half" }
    cards:
      - { field: cpu_used_pct, label: "CPU %", format: "{value:.0f}%", color: auto, thresholds: { 80: yellow, 90: red } }
      - { field: mem_used_pct, label: "Mem %", format: "{value:.0f}%", color: auto, thresholds: { 80: yellow, 90: red } }
      - { field: vm_count, label: "VMs" }
      - { field: uptime_days, label: "Uptime (days)", format: "{value:.0f}" }

  - id: security_overview
    title: "Security & Services"
    type: key_value
    layout: { width: "half" }
    fields:
      - { label: "SSH Enabled", field: ssh_enabled, badge: true }
      - { label: "Shell Enabled", field: shell_enabled, badge: true }
      - { label: "NTP Running", field: ntp_running, badge: true }

  - id: datastores_tbl
    title: "Datastores"
    type: table
    rows_field: datastores
    columns:
      - { label: "Name", field: name }
      - { label: "Total", field: total }
      - { label: "Free", field: free }

  - id: nics_tbl
    title: "Physical NICs"
    type: table
    rows_field: nics
    columns:
      - { label: "Device", field: device }
      - { label: "Status", field: link_status, badge: true }
      - { label: "Speed (Mbps)", field: speed_mbps }
      - { label: "Driver", field: driver }
      - { label: "Switch", field: switch }
