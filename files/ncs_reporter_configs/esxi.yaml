config:
  display_name: "VMware ESXi"
  platform: vmware/esxi
  stig:
    platform_to_checklist:
      esxi: cklb_skeletons/cklb_skeleton_vsphere7_esxi_V1R4.json
  extra_fleet_widget_columns:
    'Cluster': "{{ cluster }}"
    'Status': "{{ overall_status }}"
    'CPU %': "{{ cpu_used_pct }}"
    'Mem %': "{{ mem_used_pct }}"
    'VMs': "{{ vm_count }}"

vars:
  # All raw_esxi.data.* fields are auto-imported from the collector payload.
  # Only computed/derived vars need explicit declaration.
  uptime_days:
    compute: "{{ uptime_seconds / 86400 }}"

alerts:
  - id: host_disconnected
    category: "Host Connectivity"
    severity: CRITICAL
    when: connection_state == 'disconnected'
    msg: "ESXi host is disconnected from vCenter"

  - id: host_not_responding
    category: "Host Connectivity"
    severity: CRITICAL
    when: connection_state == 'notResponding'
    msg: "ESXi host is not responding"

  - id: host_in_maintenance
    category: "Host Status"
    severity: WARNING
    when: in_maintenance_mode == 1.0
    msg: "ESXi host is in maintenance mode"

  - id: mem_critical
    category: "Host Resources"
    severity: CRITICAL
    when: mem_used_pct >= 95.0
    msg: "Memory utilization critically high at {{ mem_used_pct | round(0) }}%"

  - id: mem_warning
    category: "Host Resources"
    severity: WARNING
    suppress_if: mem_critical
    when: mem_used_pct >= 85.0
    msg: "Memory utilization elevated at {{ mem_used_pct | round(0) }}%"

  - id: cpu_critical
    category: "Host Resources"
    severity: CRITICAL
    when: cpu_used_pct >= 95.0
    msg: "CPU utilization critically high at {{ cpu_used_pct | round(0) }}%"

  - id: cpu_warning
    category: "Host Resources"
    severity: WARNING
    suppress_if: cpu_critical
    when: cpu_used_pct >= 85.0
    msg: "CPU utilization elevated at {{ cpu_used_pct | round(0) }}%"

  - id: ssh_enabled
    category: "Security"
    severity: WARNING
    when: ssh_enabled == 1.0
    msg: "SSH is enabled on this ESXi host"

  - id: shell_enabled
    category: "Security"
    severity: WARNING
    when: shell_enabled == 1.0
    msg: "ESXi Shell is enabled on this host"

  - id: uptime_excessive
    category: "Host Lifecycle"
    severity: WARNING
    when: uptime_days >= 90.0
    msg: "ESXi host has not been rebooted in {{ uptime_days | round(0) }} days — may be missing patches"

widgets:

  - title: "Host Overview"
    type: key_value
    layout: { width: "half" }
    fields:
      - label: "Connection State"
        field: "{{ connection_state }}"
        badge: true
      - label: "Overall Status"
        field: "{{ overall_status }}"
        badge: true
      - label: "Cluster"
        field: "{{ cluster }}"
      - label: "Datacenter"
        field: "{{ datacenter }}"
      - label: "Version"
        field: "{{ version }}"
      - label: "Build"
        field: "{{ build }}"
      - label: "Maintenance Mode"
        field: "{{ in_maintenance_mode }}"
        badge: true
      - label: "Lockdown Mode"
        field: "{{ lockdown_mode }}"

  - id: resource_kpis
    title: "Resource Utilization"
    type: stat_cards
    layout: { width: "half" }
    cards:
      - { field: "{{ cpu_used_pct }}", label: "CPU %", format: "{{ value | round(0) }}%", color: auto, thresholds: { 80: yellow, 90: red } }
      - { field: "{{ mem_used_pct }}", label: "Mem %", format: "{{ value | round(0) }}%", color: auto, thresholds: { 80: yellow, 90: red } }
      - { field: "{{ vm_count }}", label: "VMs" }
      - { field: "{{ uptime_days }}", label: "Uptime (days)", format: "{{ value | round(0) }}" }

  - title: "Security & Services"
    type: key_value
    layout: { width: "half" }
    fields:
      - label: "SSH Enabled"
        field: "{{ ssh_enabled }}"
        badge: true
      - label: "Shell Enabled"
        field: "{{ shell_enabled }}"
        badge: true
      - label: "NTP Running"
        field: "{{ ntp_running }}"
        badge: true

  - title: "Datastores"
    type: table
    rows: "{{ datastores }}"
    columns:
      - label: "Name"
        field: "{{ name }}"
      - label: "Total"
        field: "{{ total }}"
      - label: "Free"
        field: "{{ free }}"

  - title: "Physical NICs"
    type: table
    rows: "{{ nics }}"
    columns:
      - label: "Device"
        field: "{{ device }}"
      - label: "Status"
        field: "{{ link_status }}"
        badge: true
      - label: "Speed (Mbps)"
        field: "{{ speed_mbps }}"
      - label: "Driver"
        field: "{{ driver }}"
      - label: "Switch"
        field: "{{ switch }}"
