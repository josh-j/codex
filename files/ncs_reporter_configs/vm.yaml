# yaml-language-server: $schema=../../../schemas/report_schema.json
config:
  display_name: "VMware VM"
  platform: vmware/vm
  stig:
    ansible_playbook:
      path: "playbooks/vm/stig_remediate.yml"
      target_var: "vm_stig_target_vms"
    platform_to_checklist:
      vm: cklb_skeletons/cklb_skeleton_vsphere7_vms_V1R4.json
  extra_fleet_widget_columns:
    'VMs': "{{ vm_count }}"
    'Snapshots': "{{ snapshot_count }}"
    'Powered Off': "{{ powered_off_vm_count }}"

# ---------------------------------------------------------------------------
# Fields
# ---------------------------------------------------------------------------

vars:
  # All raw_vm.data.* fields are auto-imported from the collector payload.
  # Only scripts and computes need explicit declaration.

  virtual_machines:
    script:
      run: "get_vms_list.py"
      args:
        exclude_patterns: "{{ infra_patterns }}"
    type: list

  snapshots:
    script:
      run: "normalize_snapshots.py"
      args:
        mode: list
        age_days: 7
    type: list

  snapshot_count:
    thresholds: { 1: yellow, 10: red }

  aged_snapshot_count:
    script:
      run: "normalize_snapshots.py"
      args:
        mode: count
        age_days: 7
    type: int

  recent_snapshot_count:
    compute: "{{ snapshot_count - aged_snapshot_count }}"

  powered_off_vm_count:
    path: ".virtual_machines"
    type: int
    count_where:
      power_state: "poweredOff"
    thresholds: { 1: yellow, 5: red }

# ---------------------------------------------------------------------------
# Alerts
# ---------------------------------------------------------------------------

alerts:
  - id: powered_off_vms
    category: "Workload Inventory"
    severity: INFO
    when: powered_off_vm_count > 0
    msg: "{{ powered_off_vm_count }} powered-off VM(s) detected — review for cleanup or licensing"

  - id: vm_tools_not_running
    category: "Workload Compliance"
    severity: WARNING
    when: virtual_machines | selectattr('power_state', 'eq', 'poweredOn') | selectattr('tools_status', 'eq', 'toolsNotRunning') | list | length > 0
    msg: "Powered-on VMs detected with VMware Tools not running"

  - id: vm_tools_not_installed
    category: "Workload Compliance"
    severity: WARNING
    when: virtual_machines | selectattr('power_state', 'eq', 'poweredOn') | selectattr('tools_status', 'eq', 'toolsNotInstalled') | list | length > 0
    msg: "Powered-on VMs detected with VMware Tools not installed"

  - id: snapshots_present
    category: "Snapshots"
    severity: INFO
    when: recent_snapshot_count > 0
    msg: "VM snapshots present: {{ snapshot_count }} snapshot(s) found"

  - id: aged_snapshots
    category: "Snapshots"
    severity: WARNING
    when: aged_snapshot_count > 0
    msg: "{{ aged_snapshot_count }} snapshot(s) older than 7 days — review for removal"

# ---------------------------------------------------------------------------
# Widgets
# ---------------------------------------------------------------------------

widgets:

  - type: stat-cards
    id: vm_kpis
    title: "VM KPIs"
    cards:
      'VMs': "{{ vm_count }}"
      'Snapshots': "{{ snapshot_count }}"
      'Powered Off': "{{ powered_off_vm_count }}"

  - type: grouped-table
    title: "Virtual Machines"
    rows: "{{ virtual_machines }}"
    group_by: "{{ cluster }}"
    columns:
      - 'Name': "{{ guest_name }}"
        link_field: "{{ guest_name }}"
      - 'Power State': "{{ power_state }}"
        badge: true
        style_rules:
          - when: power_state == 'poweredOff'
            css_class: "subtle-text"
      - 'Tools Status': "{{ tools_status }}"
        badge: true
      - 'Cluster': "{{ cluster }}"
      - 'IP Address': "{{ ip_address }}"
      - 'Memory (MB)': "{{ allocated.memory }}"
      - 'vCPU': "{{ allocated.cpu }}"
      - 'Owner Email': "{{ owner_email }}"
      - 'Last Backup': "{{ backup_info }}"

  - type: table
    title: "Snapshots"
    when: snapshot_count > 0
    rows: "{{ snapshots }}"
    columns:
      'VM': "{{ vm_name }}"
      'Owner Email': "{{ owner_email }}"
      'Snapshot': "{{ name }}"
      'Created': "{{ creation_time }}"
      'State': "{{ state }}"
      'Days Old': "{{ days_old }}"
