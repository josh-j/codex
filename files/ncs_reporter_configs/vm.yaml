name: vm
display_name: "VMware VM Workload Health"
platform:
  name: vmware
  input_dir: vmware/vm
  report_dir: vmware/vm
  display_name: "VMware VM"
  asset_label: vCenters
  inventory_groups: [vcenters]
  target_types: [vm]
  legacy_raw_keys:
    vmware_raw_vm: raw_vm
  stig_playbook: "playbooks/vm/stig_remediate.yml"
  stig_target_var: "vm_stig_target_vms"
  stig_skeleton_map:
    vm: cklb_skeleton_vsphere7_vms_V1R4.json

detection:
  keys_any: [vmware_raw_vm]

path_prefix: "vmware_raw_vm.data"

fleet_columns:
  - "VMs: vm_count"
  - "Snapshots: snapshot_count"
  - "Powered Off: powered_off_vm_count"

# ---------------------------------------------------------------------------
# Fields
# ---------------------------------------------------------------------------

fields:
  datacenters: ".datacenters_info.datacenter_info | list"
  vms_info_raw: ".vms_info | dict"
  infra_patterns: ".config.infrastructure_vm_patterns | list"

  virtual_machines:
    script: "get_vms_list.py"
    script_args:
      exclude_patterns: "{infra_patterns}"
    type: list

  vm_count: ".vms_info.virtual_machines | len_if_list | int"
  snapshots_raw: ".snapshots_info.snapshots | list"

  snapshots:
    script: "normalize_snapshots.py"
    script_args:
      mode: list
      age_days: 7
    type: list

  snapshot_count: ".snapshots_info.snapshots | len_if_list | int"
  collected_at: "vmware_raw_vm.metadata.timestamp"

  aged_snapshot_count:
    script: "normalize_snapshots.py"
    script_args:
      mode: count
      age_days: 7
    type: int

  recent_snapshot_count:
    compute: "{snapshot_count} - {aged_snapshot_count}"
    type: int

  powered_off_vm_count:
    path: ".vms_info.virtual_machines"
    type: int
    count_where:
      power_state: "poweredOff"

# ---------------------------------------------------------------------------
# Alerts
# ---------------------------------------------------------------------------

alerts:
  - "powered_off_vms | INFO Workload Inventory | powered_off_vm_count gt 0 | {powered_off_vm_count} powered-off VM(s) detected — review for cleanup or licensing"

  - id: vm_tools_not_running
    category: "Workload Compliance"
    severity: WARNING
    condition:
      op: filter_multi
      field: virtual_machines
      filters:
        - { filter_field: power_state, filter_value: "poweredOn" }
        - { filter_field: tools_status, filter_value: "toolsNotRunning" }
      threshold: 0
    message: "Powered-on VMs detected with VMware Tools not running"
    affected_items_field: virtual_machines

  - id: vm_tools_not_installed
    category: "Workload Compliance"
    severity: WARNING
    condition:
      op: filter_multi
      field: virtual_machines
      filters:
        - { filter_field: power_state, filter_value: "poweredOn" }
        - { filter_field: tools_status, filter_value: "toolsNotInstalled" }
      threshold: 0
    message: "Powered-on VMs detected with VMware Tools not installed"
    affected_items_field: virtual_machines

  - "snapshots_present | INFO Snapshots | recent_snapshot_count gt 0 | VM snapshots present: {snapshot_count} snapshot(s) found"

  - "aged_snapshots | WARNING Snapshots | aged_snapshot_count gt 0 | {aged_snapshot_count} snapshot(s) older than 7 days — review for removal"

# ---------------------------------------------------------------------------
# Widgets
# ---------------------------------------------------------------------------

widgets:
  - alert_panel: "Active Alerts"

  - id: vm_kpis
    title: "VM KPIs"
    type: stat_cards
    layout: { width: "full" }
    cards:
      - { field: vm_count, label: "VMs" }
      - { field: snapshot_count, label: "Snapshots", thresholds: { 1: yellow, 10: red } }
      - { field: powered_off_vm_count, label: "Powered Off", thresholds: { 1: yellow, 5: red } }

  - id: virtual_machines
    title: "Virtual Machines"
    type: grouped_table
    rows: virtual_machines
    group_by: cluster
    columns:
      - { label: "Name", field: guest_name, link_field: guest_name }
      - label: "Power State"
        field: power_state
        badge: true
        style_rules:
          - condition: { op: eq_str, field: power_state, value: "poweredOff" }
            css_class: "subtle-text"
      - "Tools Status: tools_status [badge]"
      - "Cluster: cluster"
      - "IP Address: ip_address"
      - "Memory (MB): allocated.memory"
      - "vCPU: allocated.cpu"
      - "Owner Email: owner_email"
      - "Last Backup: backup_info"

  - table: "Snapshots"
    visible_if: { op: gt, field: snapshot_count, threshold: 0 }
    rows: snapshots
    columns:
      - "VM: vm_name"
      - "Owner Email: owner_email"
      - "Snapshot: name"
      - "Created: creation_time"
      - "State: state"
      - "Days Old: days_old"
