# yaml-language-server: $schema=../../.schemas/report_schema.json
config:
  platform: windows
  stig:
    rule_prefix_to_platform:
      WN: windows
      MS: windows
  extra_fleet_widget_columns:
    'Collected At': "{{ collected_at }}"
    'CCM Status': "{{ ccm_service_state }}"
    'Reboot': "{{ health_reboot_pending }}"
    'Critical': "{{ _critical_count }}"
    'Warning': "{{ _warning_count }}"

# ---------------------------------------------------------------------------
# Fields
# ---------------------------------------------------------------------------

# All raw_windows.data.* fields are auto-imported from the collector payload.

# ---------------------------------------------------------------------------
# Alerts
# ---------------------------------------------------------------------------

alerts:
  - id: ccmexec_not_running
    category: "Services"
    severity: WARNING
    when: ccm_service_state != 'running'
    msg: "ConfigMgr client service (CCMExec) is not running (state: {{ ccm_service_state }})"

  - id: failed_updates
    category: "Patching"
    severity: WARNING
    when: update_results | selectattr('failed', 'eq', true) | list | length > 0
    msg: "One or more ConfigMgr application updates failed"

  - id: apps_pending_update
    category: "Patching"
    severity: WARNING
    when: apps_to_update is defined and apps_to_update | length > 0
    msg: "ConfigMgr applications have pending updates"

  - id: reboot_pending
    category: "Health"
    severity: WARNING
    when: health_reboot_pending == 1
    msg: "System has a pending reboot ({{ health_reboot_reasons }})"

  - id: disk_space_warning
    category: "Health"
    severity: WARNING
    when: health_disk | selectattr('UsedPct', 'gt', 80.0) | list | length > 0
    msg: "One or more disks exceed 80% usage"

  - id: memory_high
    category: "Health"
    severity: WARNING
    when: health_memory_used_pct > 85
    msg: "Memory usage is high ({{ health_memory_used_pct }}%)"

  - id: secure_channel_failed
    category: "Health"
    severity: CRITICAL
    when: health_secure_channel == 'FAILED'
    msg: "Domain secure channel test FAILED"

  - id: critical_events
    category: "Health"
    severity: WARNING
    when: health_event_count > 0
    msg: "{{ health_event_count }} critical/error events in recent logs"

  - id: open_vulnerabilities
    category: "Security"
    severity: WARNING
    when: vuln_open > 0
    msg: "{{ vuln_open }} open vulnerability findings"

# ---------------------------------------------------------------------------
# Widgets
# ---------------------------------------------------------------------------

widgets:

  - type: key-value
    title: "System Information"
    fields:
      'Hostname': "{{ health_hostname }}"
      'OS': "{{ health_os_name }}"
      'Uptime (hours)': "{{ health_uptime_hours }}"
      'CCMExec State': "{{ ccm_service_state }}"
      'Reboot Pending': "{{ health_reboot_pending }}"
      'Secure Channel': "{{ health_secure_channel }}"

  - type: table
    title: "Disk Usage"
    rows: "{{ health_disk }}"
    columns:
      - 'Drive': "{{ DeviceID }}"
      - 'Size (GB)': "{{ SizeGB }}"
      - 'Free (GB)': "{{ FreeGB }}"
      - 'Used %': "{{ UsedPct }}"
        badge: true

  - type: key-value
    title: "Memory & CPU"
    fields:
      'Memory Used %': "{{ health_memory_used_pct }}"
      'CPU Load %': "{{ health_cpu_load_pct }}"

  - type: table
    title: "Critical Services"
    rows: "{{ health_services }}"
    columns:
      - 'Service': "{{ display_name }}"
      - 'Status': "{{ status }}"
        badge: true
      - 'Start Type': "{{ start_type }}"

  - type: table
    title: "Recent Critical/Error Events"
    rows: "{{ health_events }}"
    columns:
      - 'Time': "{{ time }}"
      - 'Log': "{{ log }}"
      - 'Level': "{{ level }}"
        badge: true
      - 'Source': "{{ source }}"
      - 'ID': "{{ id }}"
      - 'Message': "{{ message }}"

  - type: key-value
    title: "Vulnerability Summary"
    fields:
      'Total Findings': "{{ vuln_total_findings }}"
      'Remediated': "{{ vuln_remediated }}"
      'Open': "{{ vuln_open }}"

  - type: table
    title: "Vulnerability Findings"
    rows: "{{ vuln_findings }}"
    columns:
      - 'Plugin ID': "{{ plugin_id }}"
      - 'Severity': "{{ severity }}"
        badge: true
      - 'Title': "{{ title }}"
      - 'Remediated': "{{ remediated }}"
        badge: true

  - type: table
    title: "ConfigMgr Applications"
    rows: "{{ configmgr_apps }}"
    columns:
      'Name': "{{ Name }}"
      'Version': "{{ Version }}"

  - type: table
    title: "Applications Pending Update"
    rows: "{{ apps_to_update }}"
    columns:
      'Name': "{{ Name }}"
      'Current Version': "{{ CurrentVersion }}"
      'Target Version': "{{ TargetVersion }}"

  - type: table
    title: "Update Results"
    rows: "{{ update_results }}"
    columns:
      - 'Application': "{{ application }}"
      - 'Status': "{{ status }}"
        badge: true
      - 'Failed': "{{ failed }}"
        badge: true

  - type: table
    title: "KB Detection Status"
    rows: "{{ kb_detection }}"
    columns:
      - 'KB': "{{ kb }}"
      - 'Installed': "{{ installed }}"
        badge: true
      - 'Detection Method': "{{ method }}"

  - type: table
    title: "Installed Software"
    rows: "{{ health_software_versions }}"
    columns:
      'Name': "{{ name }}"
      'Version': "{{ version }}"
      'Publisher': "{{ publisher }}"
