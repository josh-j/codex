# yaml-language-server: $schema=../../.schemas/ncs_reporter_config_schema.json
config:
  platform: windows
  stig:
    rule_prefix_to_platform:
      WN: windows
      MS: windows
  extra_fleet_widget_columns:
    - name: Collected At
      value: "{{ collected_at }}"
    - name: CCM Status
      value: "{{ ccm_service_state }}"
    - name: Reboot
      value: "{{ health_reboot_pending }}"
    - name: Critical
      value: "{{ _critical_count }}"
    - name: Warning
      value: "{{ _warning_count }}"
# ---------------------------------------------------------------------------
# Fields
# ---------------------------------------------------------------------------

# All raw_windows.data.* fields are auto-imported from the collector payload.

# ---------------------------------------------------------------------------
# Alerts
# ---------------------------------------------------------------------------

alerts:
  - id: ccmexec_not_running
    category: "Services"
    severity: WARNING
    when: ccm_service_state != 'running'
    msg: "ConfigMgr client service (CCMExec) is not running (state: {{ ccm_service_state }})"

  - id: failed_updates
    category: "Patching"
    severity: WARNING
    when: update_results | selectattr('failed', 'eq', true) | list | length > 0
    msg: "One or more ConfigMgr application updates failed"

  - id: apps_pending_update
    category: "Patching"
    severity: WARNING
    when: apps_to_update is defined and apps_to_update | length > 0
    msg: "ConfigMgr applications have pending updates"

  - id: reboot_pending
    category: "Health"
    severity: WARNING
    when: health_reboot_pending == 1
    msg: "System has a pending reboot ({{ health_reboot_reasons }})"

  - id: disk_space_warning
    category: "Health"
    severity: WARNING
    when: health_disk | selectattr('UsedPct', 'gt', 80.0) | list | length > 0
    msg: "One or more disks exceed 80% usage"

  - id: memory_high
    category: "Health"
    severity: WARNING
    when: health_memory_used_pct > 85
    msg: "Memory usage is high ({{ health_memory_used_pct }}%)"

  - id: secure_channel_failed
    category: "Health"
    severity: CRITICAL
    when: health_secure_channel == 'FAILED'
    msg: "Domain secure channel test FAILED"

  - id: critical_events
    category: "Health"
    severity: WARNING
    when: health_event_count > 0
    msg: "{{ health_event_count }} critical/error events in recent logs"

  - id: open_vulnerabilities
    category: "Security"
    severity: WARNING
    when: vuln_open > 0
    msg: "{{ vuln_open }} open vulnerability findings"

# ---------------------------------------------------------------------------
# Widgets
# ---------------------------------------------------------------------------

widgets:

  - type: key-value
    name: "System Information"
    fields:
      - name: Hostname
        value: "{{ health_hostname }}"
      - name: OS
        value: "{{ health_os_name }}"
      - name: Uptime (hours)
        value: "{{ health_uptime_hours }}"
      - name: CCMExec State
        value: "{{ ccm_service_state }}"
      - name: Reboot Pending
        value: "{{ health_reboot_pending }}"
      - name: Secure Channel
        value: "{{ health_secure_channel }}"
  - type: table
    name: "Disk Usage"
    rows: "{{ health_disk }}"
    columns:
      - name: Drive
        value: "{{ DeviceID }}"
      - name: Size (GB)
        value: "{{ SizeGB }}"
      - name: Free (GB)
        value: "{{ FreeGB }}"
      - name: Used %
        value: "{{ UsedPct }}"
        as: status-badge

  - type: key-value
    name: "Memory & CPU"
    fields:
      - name: Memory Used %
        value: "{{ health_memory_used_pct }}"
      - name: CPU Load %
        value: "{{ health_cpu_load_pct }}"
  - type: table
    name: "Critical Services"
    rows: "{{ health_services }}"
    columns:
      - name: Service
        value: "{{ display_name }}"
      - name: Status
        value: "{{ status }}"
        as: status-badge
      - name: Start Type
        value: "{{ start_type }}"
  - type: table
    name: "Recent Critical/Error Events"
    rows: "{{ health_events }}"
    columns:
      - name: Time
        value: "{{ time }}"
      - name: Log
        value: "{{ log }}"
      - name: Level
        value: "{{ level }}"
        as: status-badge
      - name: Source
        value: "{{ source }}"
      - name: ID
        value: "{{ id }}"
      - name: Message
        value: "{{ message }}"
  - type: key-value
    name: "Vulnerability Summary"
    fields:
      - name: Total Findings
        value: "{{ vuln_total_findings }}"
      - name: Remediated
        value: "{{ vuln_remediated }}"
      - name: Open
        value: "{{ vuln_open }}"
  - type: table
    name: "Vulnerability Findings"
    rows: "{{ vuln_findings }}"
    columns:
      - name: Plugin ID
        value: "{{ plugin_id }}"
      - name: Severity
        value: "{{ severity }}"
        as: status-badge
      - name: Title
        value: "{{ title }}"
      - name: Remediated
        value: "{{ remediated }}"
        as: status-badge

  - type: table
    name: "ConfigMgr Applications"
    rows: "{{ configmgr_apps }}"
    columns:
      - name: Name
        value: "{{ Name }}"
      - name: Version
        value: "{{ Version }}"
  - type: table
    name: "Applications Pending Update"
    rows: "{{ apps_to_update }}"
    columns:
      - name: Name
        value: "{{ Name }}"
      - name: Current Version
        value: "{{ CurrentVersion }}"
      - name: Target Version
        value: "{{ TargetVersion }}"
  - type: table
    name: "Update Results"
    rows: "{{ update_results }}"
    columns:
      - name: Application
        value: "{{ application }}"
      - name: Status
        value: "{{ status }}"
        as: status-badge
      - name: Failed
        value: "{{ failed }}"
        as: status-badge

  - type: table
    name: "KB Detection Status"
    rows: "{{ kb_detection }}"
    columns:
      - name: KB
        value: "{{ kb }}"
      - name: Installed
        value: "{{ installed }}"
        as: status-badge
      - name: Detection Method
        value: "{{ method }}"
  - type: table
    name: "Installed Software"
    rows: "{{ health_software_versions }}"
    columns:
      - name: Name
        value: "{{ name }}"
      - name: Version
        value: "{{ version }}"
      - name: Publisher
        value: "{{ publisher }}"