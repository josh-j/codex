# yaml-language-server: $schema=../../.schemas/report_schema.json
config:
  display_name: "VMware VCSA"
  platform: vmware/vcsa
  stig:
    ansible_playbook:
      path: "playbooks/vmware/vcsa/stig_remediate.yml"
      target_var: "vcsa_stig_target_hosts"
    platform_to_checklist:
      vcsa: cklb_skeletons/cklb_skeleton_vsphere7_vcsa_V1R3.json
      vcenter: cklb_skeletons/cklb_skeleton_vsphere7_vcsa_V1R3.json
      vami: cklb_skeletons/cklb_skeleton_vsphere7_vami_V1R2.json
      eam: cklb_skeletons/cklb_skeleton_vsphere7_vca_eam_V1R2.json
      lookup_svc: cklb_skeletons/cklb_skeleton_vsphere7_vca_lookup_svc_V1R2.json
      perfcharts: cklb_skeletons/cklb_skeleton_vsphere7_vca_perfcharts_V1R1.json
      vcsa_photon_os: cklb_skeletons/cklb_skeleton_vsphere7_vca_photon_os_V1R4.json
      postgresql: cklb_skeletons/cklb_skeleton_vsphere7_vca_postgresql_V1R2.json
      rhttpproxy: cklb_skeletons/cklb_skeleton_vsphere7_vca_rhttpproxy_V1R1.json
      sts: cklb_skeletons/cklb_skeleton_vsphere7_vca_sts_V1R2.json
      ui: cklb_skeletons/cklb_skeleton_vsphere7_vca_ui_V1R2.json
    rule_prefix_to_platform:
      VMCH: vm
      ESXI: esxi
      VC: vcsa
      PH: photon
  extra_fleet_widget_columns:
    'Version': "{{ appliance_version }}"

vars:
  # All raw_vcsa.data.* fields are auto-imported from the collector payload.
  # Only computed/derived vars and display metadata need explicit declaration.
  appliance_uptime_days:
    compute: "{{ appliance_uptime_seconds / 86400 }}"
  alarm_count:
    thresholds: { 1: yellow, 5: red }

alerts:
  - id: appliance_health_red
    category: "Appliance Health"
    severity: CRITICAL
    when: appliance_health_overall == 'red'
    msg: "VCSA component failure: overall health is RED"

  - id: appliance_health_yellow
    category: "Appliance Health"
    severity: WARNING
    suppress_if: appliance_health_red
    when: appliance_health_overall == 'yellow'
    msg: "VCSA degraded: overall health is YELLOW"

  - id: appliance_health_gray
    category: "Data Quality"
    severity: WARNING
    suppress_if: [appliance_health_red, appliance_health_yellow]
    when: appliance_health_overall == 'gray'
    msg: "VCSA health unknown: overall health is GRAY — check permissions and API availability"

  - id: ssh_enabled
    category: "Security"
    severity: WARNING
    when: ssh_enabled == 1.0
    msg: "Hardening violation: SSH is enabled on VCSA"

  - id: shell_enabled
    category: "Security"
    severity: WARNING
    when: shell_enabled == 1.0
    msg: "Hardening violation: interactive shell is enabled on VCSA"

  - id: ntp_disabled
    category: "Time Synchronization"
    severity: WARNING
    when: ntp_mode not in ['NTP', 'HOST']
    msg: "Time sync misconfigured: NTP mode is '{{ ntp_mode }}' — clock drift may affect logs and certificates"

  - id: appliance_uptime_excessive
    category: "Appliance Lifecycle"
    severity: WARNING
    when: appliance_uptime_days >= 90.0
    msg: "VCSA has not been rebooted in {{ appliance_uptime_days | round(0) }} days — may be missing patches"

  - id: appliance_uptime_recent_reboot
    category: "Appliance Lifecycle"
    severity: INFO
    suppress_if: appliance_uptime_excessive
    when: appliance_uptime_days < 1.0
    msg: "VCSA was rebooted less than 24 hours ago — verify this was planned"

  - id: no_backup_schedule
    category: "Data Protection"
    severity: CRITICAL
    when: backup_schedule_count <= 0
    msg: "DR risk: no file-based backup schedule configured on VCSA"

  - id: backup_schedule_disabled
    category: "Data Protection"
    severity: CRITICAL
    when: backup_schedules | selectattr('enabled', 'eq', false) | list | length > 0
    msg: "DR risk: a configured backup schedule is DISABLED on VCSA"

  - id: active_critical_alarms
    category: "vCenter Alarms"
    severity: CRITICAL
    when: active_alarms | selectattr('severity', 'eq', 'critical') | list | length > 0
    msg: "Active CRITICAL alarms detected in vCenter ({{ alarm_count }} total triggered)"

  - id: active_warning_alarms
    category: "vCenter Alarms"
    severity: WARNING
    suppress_if: active_critical_alarms
    when: active_alarms | selectattr('severity', 'eq', 'warning') | list | length > 0
    msg: "Active WARNING alarms detected in vCenter ({{ alarm_count }} total triggered)"

widgets:

  - type: table
    title: "Active vCenter Alarms"
    rows: "{{ active_alarms }}"
    columns:
      - 'Alarm': "{{ alarm_name }}"
      - 'Entity': "{{ entity }}"
      - 'Severity': "{{ severity }}"
        badge: true
      - 'Time': "{{ time }}"
      - 'Description': "{{ description }}"

  - type: stat-cards
    id: inventory_kpis
    title: "Infrastructure KPIs"
    cards:
      'Datacenters': "{{ datacenter_count }}"
      'Clusters': "{{ cluster_count }}"
      'ESXi Hosts': "{{ esxi_host_count }}"
      'Datastores': "{{ datastore_count }}"
      'DVSwitches': "{{ dvswitch_count }}"
      'Resource Pools': "{{ resource_pool_count }}"
      'Licenses': "{{ license_count }}"
      'Alarms': "{{ alarm_count }}"

  - type: key-value
    title: "Appliance Overview"
    layout: half
    fields:
      - 'Version': "{{ appliance_version }}"
      - 'Build': "{{ appliance_build }}"
      - 'Health Overall': "{{ appliance_health_overall }}"
        badge: true
      - 'Health CPU': "{{ appliance_health_cpu }}"
        badge: true
      - 'Health Memory': "{{ appliance_health_memory }}"
        badge: true
      - 'Health DB': "{{ appliance_health_database }}"
        badge: true
      - 'Health Storage': "{{ appliance_health_storage }}"
        badge: true
      - 'Uptime (days)': "{{ appliance_uptime_days }}"
      - 'SSH Enabled': "{{ ssh_enabled }}"
        badge: true
      - 'NTP Mode': "{{ ntp_mode }}"
      - 'Backup Schedules': "{{ backup_schedule_count }}"
      - 'Extensions': "{{ extension_count }}"
      - 'Content Libraries': "{{ content_library_count }}"
      - 'Tag Categories': "{{ tag_category_count }}"

  - type: table
    title: "Clusters"
    when: cluster_count > 0
    rows: "{{ clusters }}"
    columns:
      - 'Cluster': "{{ name }}"
      - 'Datacenter': "{{ datacenter }}"
      - 'Hosts': "{{ host_count }}"
      - 'HA': "{{ ha_enabled }}"
        badge: true
      - 'DRS': "{{ drs_enabled }}"
        badge: true
      - 'CPU %': "{{ cpu_usage_pct }}"
      - 'Mem %': "{{ mem_usage_pct }}"

  - type: table
    title: "Datastores"
    when: datastore_count > 0
    rows: "{{ datastores }}"
    columns:
      'Name': "{{ name }}"
      'Capacity (GB)': "{{ capacity_gb }}"
      'Free (GB)': "{{ free_gb }}"
      'Used %': "{{ used_pct }}"

  - type: table
    title: "Resource Pools"
    when: resource_pool_count > 0
    rows: "{{ resource_pools }}"
    columns:
      'Name': "{{ name }}"
      'CPU Reservation': "{{ runtime_cpu_reservation_used }}"
      'CPU Limit': "{{ runtime_cpu_overall_usage }}"
      'Memory Reservation': "{{ runtime_memory_reservation_used }}"
      'Memory Limit': "{{ runtime_memory_overall_usage }}"

  - type: table
    title: "Distributed Switches"
    when: dvswitch_count > 0
    rows: "{{ dvswitches }}"
    columns:
      'Name': "{{ name }}"
      'Ports': "{{ num_ports }}"
      'Uplinks': "{{ num_uplinks }}"
      'MTU': "{{ mtu }}"

  - type: table
    title: "Distributed Portgroups"
    when: dvs_portgroup_count > 0
    rows: "{{ dvs_portgroups }}"
    columns:
      'Name': "{{ portgroup_name }}"
      'Switch': "{{ dvswitch_name }}"
      'VLAN': "{{ vlan_id }}"
      'Ports': "{{ num_ports }}"
      'Type': "{{ port_binding }}"

  - type: table
    title: "Licenses"
    when: license_count > 0
    rows: "{{ licenses }}"
    columns:
      'Name': "{{ name }}"
      'Edition': "{{ edition }}"
      'Total': "{{ total }}"
      'Used': "{{ used }}"
      'Expiration': "{{ expiration_date }}"

  - type: table
    title: "Extensions"
    when: extension_count > 0
    rows: "{{ extensions }}"
    columns:
      'Label': "{{ ext_label }}"
      'Company': "{{ ext_company }}"
      'Version': "{{ ext_version }}"
      'Last Heartbeat': "{{ ext_last_heartbeat_time }}"

  - type: table
    title: "Content Libraries"
    when: content_library_count > 0
    rows: "{{ content_libraries }}"
    columns:
      'Name': "{{ lib_name }}"
      'Type': "{{ lib_type }}"
      'Description': "{{ lib_description }}"

  - type: table
    title: "Backup Schedules"
    when: backup_schedule_count > 0
    rows: "{{ backup_schedules }}"
    columns:
      - 'Name': "{{ name }}"
      - 'Enabled': "{{ enabled }}"
        badge: true
        style_rules:
          - when: enabled == 0.0
            css_class: "sv-critical"
      - 'Location': "{{ location }}"
      - 'Retain Count': "{{ retain_count }}"
