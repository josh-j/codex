---
# ncs-ansible assembles four independent NCS collections, all resolved
# locally — never fetched from Galaxy, GitHub, or any remote.
#
# Active mode: vendored tarballs at collections/vendor/. These are
# committed to the ncs-ansible repo so a fresh `git pull` on any host
# carries the current collection snapshot, and `just install-collections`
# works without sibling-repo checkouts.
#
# Rebuild the tarballs after cutting a new release in a sibling repo:
#   just vendor-collections    # build + stage into collections/vendor/
#
# Alternate: Mode B (sibling working directories) for active dev on
# a separate collection repo — uncomment the block below and comment
# out the tarball block.

collections:
  # --- Mode A (default): vendored tarballs ---------------------------------
  - name: "./collections/vendor/internal-core-1.0.1.tar.gz"
    type: file
  - name: "./collections/vendor/internal-vmware-1.1.6.tar.gz"
    type: file
  - name: "./collections/vendor/internal-linux-1.1.2.tar.gz"
    type: file
  - name: "./collections/vendor/internal-windows-1.1.2.tar.gz"
    type: file
  - name: "./collections/vendor/internal-aci-0.3.2.tar.gz"
    type: file

  # --- Mode B: sibling working directories --------------------------------
  #
  # - name: "../ncs-ansible-core"
  #   type: dir
  # - name: "../ncs-ansible-vmware"
  #   type: dir
  # - name: "../ncs-ansible-linux"
  #   type: dir
  # - name: "../ncs-ansible-windows"
  #   type: dir
  # - name: "../ncs-ansible-aci"
  #   type: dir
