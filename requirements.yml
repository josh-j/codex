---
# ncs-ansible assembles four independent NCS collections, all resolved
# locally — never fetched from Galaxy, GitHub, or any remote.
#
# Active mode: sibling working directories at /home/sio/ncs-ansible-<col>/.
# Edits to those repos propagate into ncs-ansible by re-running:
#
#   just install-collections
#
# (Ansible copies the directory contents into
#  collections/ansible_collections/ at install time; edits don't
#  live-update until re-install.)
#
# To switch to tarball mode for production / CI, comment out the Mode B
# block below and uncomment the Mode A tarballs block. Build tarballs
# inside each sibling repo with:
#
#   cd /home/sio/ncs-ansible-<col>
#   ansible-galaxy collection build --output-path /home/sio/codex/dist/

collections:
  # --- Mode B: sibling working directories (active) -----------------------
  - name: "../ncs-ansible-core"
    type: dir
  - name: "../ncs-ansible-vmware"
    type: dir
  - name: "../ncs-ansible-linux"
    type: dir
  - name: "../ncs-ansible-windows"
    type: dir

  # --- Mode A: local tarballs from dist/ ---------------------------------
  # - name: "./dist/internal-core-1.0.0.tar.gz"
  #   type: file
  # - name: "./dist/internal-vmware-1.1.0.tar.gz"
  #   type: file
  # - name: "./dist/internal-linux-1.1.0.tar.gz"
  #   type: file
  # - name: "./dist/internal-windows-1.1.0.tar.gz"
  #   type: file
