metadata:
  host: vc-site2.local
  raw_type: stig_postgresql
  audit_type: stig_postgresql
  timestamp: '2026-03-02T00:00:00Z'
  engine: ncs_collector_callback
data:
- id: V-256591
  rule_id: SV-256591r887559_rule
  rule_version: VCPG-70-000001
  status: pass
  severity: medium
  title: VMware Postgres must limit the number of connections.
  checktext: 'At the command prompt, run the following command:


    # /opt/vmware/vpostgres/current/bin/psql -U postgres -A -t -c "SHOW max_connections;"


    If the returned number is not greater than or equal to 100 and less than or equal
    to 1000, this is a finding.'
  fixtext: 'At the command prompt, run the following command:


    # vmon-cli --restart vmware-vpostgres


    Note: Restarting the service runs the "pg_tuning" script that will configure "max_connections"
    to the appropriate value based on the allocated memory for vCenter.'
- id: V-256592
  rule_id: SV-256592r887562_rule
  rule_version: VCPG-70-000002
  status: na
  severity: medium
  title: VMware Postgres log files must contain required fields.
  checktext: 'At the command prompt, run the following command:


    # /opt/vmware/vpostgres/current/bin/psql -U postgres -A -t -c "SHOW log_line_prefix;"


    Expected result:


    %m %c %x %d %u %r %p %l


    If the output does not match the expected result, this is a finding.'
  fixtext: 'At the command prompt, run the following commands:


    # /opt/vmware/vpostgres/current/bin/psql -U postgres -c "ALTER SYSTEM SET log_line_prefix
    TO ''%m %c %x %d %u %r %p %l '';"


    # /opt/vmware/vpostgres/current/bin/psql -U postgres -c "SELECT pg_reload_conf();"'
- id: V-256593
  rule_id: SV-256593r887565_rule
  rule_version: VCPG-70-000003
  status: failed
  severity: medium
  title: VMware Postgres configuration files must not be accessible by unauthorized
    users.
  checktext: 'At the command prompt, run the following command:


    # find /storage/db/vpostgres/*conf* -xdev -type f -a ''('' -not -perm 600 -o -not
    -user vpostgres -o -not -group vpgmongrp '')'' -exec ls -ld {} \;


    If any files are returned, this is a finding.'
  fixtext: 'At the command prompt, run the following commands:


    # chmod 600 <file>

    # chown vpostgres:vpgmongrp <file>


    Note: Replace <file> with the file that has incorrect permissions.'
- id: V-256594
  rule_id: SV-256594r887568_rule
  rule_version: VCPG-70-000004
  status: pass
  severity: medium
  title: VMware Postgres must be configured to overwrite older logs when necessary.
  checktext: 'At the command prompt, run the following command:


    # /opt/vmware/vpostgres/current/bin/psql -U postgres -A -t -c "SHOW log_truncate_on_rotation;"


    Expected result:


    on


    If the output does not match the expected result, this is a finding.'
  fixtext: 'At the command prompt, run the following commands:


    # /opt/vmware/vpostgres/current/bin/psql -U postgres -c "ALTER SYSTEM SET log_truncate_on_rotation
    TO ''on'';"


    # /opt/vmware/vpostgres/current/bin/psql -U postgres -c "SELECT pg_reload_conf();"'
- id: V-256595
  rule_id: SV-256595r887571_rule
  rule_version: VCPG-70-000005
  status: na
  severity: medium
  title: The VMware Postgres database must protect log files from unauthorized access
    and modification.
  checktext: 'At the command prompt, run the following command:


    # find /var/log/vmware/vpostgres/* -xdev -type f -a ''('' -not -perm 600 -o -not
    -user vpostgres -o -not -group vpgmongrp '')'' -exec ls -ld {} \;


    If any files are returned, this is a finding.'
  fixtext: 'At the command prompt, run the following commands:


    # chmod 600 <file>

    # chown vpostgres:vpgmongrp <file>


    Note: Replace <file> with the file that has incorrect permissions.


    At the command prompt, run the following commands:


    # /opt/vmware/vpostgres/current/bin/psql -U postgres -c "ALTER SYSTEM SET log_file_mode
    TO ''0600'';"


    # /opt/vmware/vpostgres/current/bin/psql -U postgres -c "SELECT pg_reload_conf();"'
- id: V-256596
  rule_id: SV-256596r918971_rule
  rule_version: VCPG-70-000006
  status: failed
  severity: medium
  title: All vCenter database (VCDB) tables must be owned by the "vc" user account.
  checktext: 'At the command prompt, run the following command:


    # /opt/vmware/vpostgres/current/bin/psql -d VCDB -U postgres -t -A -c "\dt;" |
    grep -v ''table|vc''


    If any tables are returned, this is a finding.


    Note: Upgrades may introduce new tables that are owned by the "postgres" user
    and can be updated to be owned by the "vc" user.'
  fixtext: 'At the command prompt, run the following command:


    # /opt/vmware/vpostgres/current/bin/psql -d VCDB -U postgres -c "ALTER TABLE <tablename>
    OWNER TO vc;"


    Replace <tablename> with the name of the table discovered during the check.'
- id: V-256597
  rule_id: SV-256597r887577_rule
  rule_version: VCPG-70-000007
  status: pass
  severity: medium
  title: VMware Postgres must limit modify privileges to authorized accounts.
  checktext: "At the command prompt, run the following command:\n\n# /opt/vmware/vpostgres/current/bin/psql\
    \ -U postgres -c \"\\du;\"|grep \"Create\"\n\nExpected result:\n\n postgres  \
    \ | Superuser, Create role, Create DB, Replication, Bypass RLS | {}\n vc     \
    \    | Create DB                                                  | {}\n vlcmuser\
    \   | Create DB                                                  | {}\n\nIf accounts\
    \ other than \"postgres\",\"vc\", and \"vlcmuser\" have any \"Create\" privileges,\
    \ this is a finding."
  fixtext: 'At the command prompt, run the following command:


    # /opt/vmware/vpostgres/current/bin/psql -U postgres -c "REVOKE ALL PRIVILEGES
    FROM <user>;"


    Replace <user> with the account discovered during the check.'
- id: V-256598
  rule_id: SV-256598r887580_rule
  rule_version: VCPG-70-000008
  status: na
  severity: medium
  title: VMware Postgres must be configured to use the correct port.
  checktext: 'At the command prompt, run the following command:


    # /opt/vmware/vpostgres/current/bin/psql -U postgres -A -t -c "SHOW port;"


    Expected result:


    5432


    If the output does not match the expected result, this is a finding.'
  fixtext: 'At the command prompt, run the following commands:


    # /opt/vmware/vpostgres/current/bin/psql -U postgres -c "ALTER SYSTEM SET port
    TO ''5432'';"


    # /opt/vmware/vpostgres/current/bin/psql -U postgres -c "SELECT pg_reload_conf();"'
- id: V-256599
  rule_id: SV-256599r887583_rule
  rule_version: VCPG-70-000009
  status: failed
  severity: low
  title: VMware Postgres must require authentication on all connections.
  checktext: 'At the command prompt, run the following command:


    # grep -v "^#" /storage/db/vpostgres/pg_hba.conf|grep -z --color=always "trust"


    If any lines are returned, this is a finding.'
  fixtext: "Navigate to and open /storage/db/pgdata/pg_hba.conf.  \n\nFind and remove\
    \ the line that has a method of \"trust\" in the far-right column.\n\nA correct,\
    \ typical line will look like the following:\n\n# TYPE  DATABASE        USER \
    \           ADDRESS                 METHOD\nhost       all                   \
    \     all                 127.0.0.1/32           md5"
- id: V-256600
  rule_id: SV-256600r887586_rule
  rule_version: VCPG-70-000010
  status: pass
  severity: medium
  title: The vPostgres database must use "md5" for authentication.
  checktext: 'At the command prompt, run the following command:


    # /opt/vmware/vpostgres/current/bin/psql -U postgres -A -t -c "SHOW password_encryption;"


    Expected result:


    md5


    If the output does not match the expected result, this is a finding.'
  fixtext: 'At the command prompt, run the following commands:


    # /opt/vmware/vpostgres/current/bin/psql -U postgres -c "ALTER SYSTEM SET password_encryption
    TO ''md5'';"


    # /opt/vmware/vpostgres/current/bin/psql -U postgres -c "SELECT pg_reload_conf();"'
- id: V-256601
  rule_id: SV-256601r887589_rule
  rule_version: VCPG-70-000011
  status: na
  severity: high
  title: VMware Postgres must be configured to use Transport Layer Security (TLS).
  checktext: 'At the command prompt, run the following command:


    # /opt/vmware/vpostgres/current/bin/psql -U postgres -A -t -c "SHOW ssl;"


    Expected result:


    on


    If the output does not match the expected result, this is a finding.'
  fixtext: 'At the command prompt, run the following commands:


    # /opt/vmware/vpostgres/current/bin/psql -U postgres -c "ALTER SYSTEM SET ssl
    TO ''on'';"


    # /opt/vmware/vpostgres/current/bin/psql -U postgres -c "SELECT pg_reload_conf();"'
- id: V-256602
  rule_id: SV-256602r887592_rule
  rule_version: VCPG-70-000012
  status: failed
  severity: high
  title: VMware Postgres must enforce authorized access to all public key infrastructure
    (PKI) private keys.
  checktext: 'At the command prompt, run the following command:


    # stat -c "%a:%U:%G" /storage/db/vpostgres_ssl/server.key


    Expected result:


    600:vpostgres:vpgmongrp


    If the output does not match the expected result, this is a finding.'
  fixtext: 'At the command prompt, run the following commands:


    # chmod 600 /storage/db/vpostgres_ssl/server.key

    # chown vpostgres:vpgmongrp /storage/db/vpostgres_ssl/server.key'
- id: V-256603
  rule_id: SV-256603r887595_rule
  rule_version: VCPG-70-000013
  status: pass
  severity: high
  title: VMware Postgres must use FIPS 140-2 approved Transport Layer Security (TLS)
    ciphers.
  checktext: 'At the command prompt, run the following command:


    # /opt/vmware/vpostgres/current/bin/psql -U postgres -A -t -c "SHOW ssl_ciphers;"


    Expected result:


    !aNULL:kECDH+AES:ECDH+AES:RSA+AES:@STRENGTH


    If the output does not match the expected result, this is a finding.'
  fixtext: 'At the command prompt, run the following commands:


    # /opt/vmware/vpostgres/current/bin/psql -U postgres -c "ALTER SYSTEM SET ssl_ciphers
    TO ''!aNULL:kECDH+AES:ECDH+AES:RSA+AES:@STRENGTH'';"


    # /opt/vmware/vpostgres/current/bin/psql -U postgres -c "SELECT pg_reload_conf();"'
- id: V-256604
  rule_id: SV-256604r887598_rule
  rule_version: VCPG-70-000014
  status: na
  severity: medium
  title: VMware Postgres must write log entries to disk prior to returning operation
    success or failure.
  checktext: 'At the command prompt, run the following command:


    # /opt/vmware/vpostgres/current/bin/psql -U postgres -A -t -c "SELECT name,setting
    FROM pg_settings WHERE name IN (''fsync'',''full_page_writes'',''synchronous_commit'');"


    Expected result:


    fsync              | on

    full_page_writes   | on

    synchronous_commit | on


    If the output does not match the expected result, this is a finding.'
  fixtext: 'At the command prompt, run the following commands for each setting returned
    as "off" in the check:


    # /opt/vmware/vpostgres/current/bin/psql -U postgres -c "ALTER SYSTEM SET <name>
    TO ''on'';"


    # /opt/vmware/vpostgres/current/bin/psql -U postgres -c "SELECT pg_reload_conf();"


    Note: Substitute <name> with the incorrectly set parameter (fsync, full_page_writes,
    synchronous_commit).'
target_type: postgresql
