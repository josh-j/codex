        message: 'STIG Violation: The vCenter Server must display the Standard Mandatory
          DOD Notice and Consent Banner before login.'
        detail:
          rule_id: V-256320
          description: 'From the vSphere Client, go to Administration >> Single Sign
            On >> Configuration >> Login Message.


            If the selection box next to "Show login message" is disabled, "Details
            of login message" is not configured to the standard DOD User Agreement,
            or the "Consent checkbox" is disabled, this is a finding.


            Note: Refer to vulnerability discussion for user agreement language.'
          original_severity: MEDIUM
          target_type: ubuntu
        affected_items: []
        recommendation: null
        remediation: null
      - severity: WARNING
        category: security_compliance
        message: 'STIG Violation: The vCenter Server must uniquely identify and authenticate
          users or processes acting on behalf of users.'
        detail:
          rule_id: V-256323
          description: "From the vSphere Web Client, go to Administration >> Single\
            \ Sign On >> Configuration >> Identity Provider. \n\nIf the identity provider\
            \ type is \"embedded\" and there is no identity source of type \"Active\
            \ Directory\" (either Windows Integrated Authentication or LDAP), this\
            \ is a finding.\n\nIf the identity provider type is \"Microsoft ADFS\"\
            \ or another supported identity provider, this is NOT a finding."
          original_severity: MEDIUM
          target_type: ubuntu
        affected_items: []
        recommendation: null
        remediation: null
      - severity: WARNING
        category: security_compliance
        message: 'STIG Violation: The vCenter Server must prohibit password reuse
          for a minimum of five generations.'
        detail:
          rule_id: V-256326
          description: 'From the vSphere Client, go to Administration >> Single Sign
            On >> Configuration >> Local Accounts >> Password Policy.


            View the value of the "Restrict reuse" setting.


            If the "Restrict reuse" policy is not set to "5" or more, this is a finding.'
          original_severity: MEDIUM
          target_type: ubuntu
        affected_items: []
        recommendation: null
        remediation: null
