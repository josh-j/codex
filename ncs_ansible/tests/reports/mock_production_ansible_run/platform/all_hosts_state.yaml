        fixtext: 'From the vSphere Client, go to Hosts and Clusters.


          Select the ESXi Host >> Configure >> System >> Security Profile >> Lockdown
          Mode.


          Click "Edit...". Select the "Normal" or "Strict" radio buttons.


          or


          From a PowerCLI command prompt while connected to the ESXi host, run the
          following commands:


          $level = "lockdownNormal" OR "lockdownStrict"

          $vmhost = Get-VMHost -Name <hostname> | Get-View

          $lockdown = Get-View $vmhost.ConfigManager.HostAccessManager

          $lockdown.ChangeLockdownMode($level)


          Note: In strict lockdown mode, the Direct Console User Interface (DCUI)
          service is stopped. If the connection to vCenter Server is lost and the
          vSphere Client is no longer available, the ESXi host becomes inaccessible.'
