      - checktext: "From the vSphere Web Client, go to Administration >> Single Sign\
          \ On >> Configuration >> Identity Provider. \n\nIf the identity provider\
          \ type is \"embedded\" and there is no identity source of type \"Active\
          \ Directory\" (either Windows Integrated Authentication or LDAP), this is\
          \ a finding.\n\nIf the identity provider type is \"Microsoft ADFS\" or another\
          \ supported identity provider, this is NOT a finding."
        fixtext: "When using the embedded identity provider type, perform the following:\n\
          \nFrom the vSphere Web Client, go to Administration >> Single Sign On >>\
          \ Configuration >> Identity Provider >> Identity Sources.\n\nClick \"Add\"\
          .\n\nSelect either \"Active Directory over LDAP\" or \"Active Directory\
          \ (Windows Integrated Authentication)\" and configure appropriately. \n\n\
          Note: Windows Integrated Authentication requires that the vCenter server\
          \ be joined to Active Directory before configuration via Administration\
          \ >> Single Sign On >> Configuration >> Identity Provider >> Active Directory\
          \ Domain.\n\nOR\n\nTo change the identity provider type to a third-party\
          \ identity provider such as Microsoft ADFS, perform the following:\n\nFrom\
          \ the vSphere Web Client, go to Administration >> Single Sign On >> Configuration\
          \ >> Identity Provider.\n\nClick \"Change Identity Provider\".\n\nSelect\
          \ \"Microsoft ADFS\" and click \"Next\".\n\nEnter the ADFS server information\
          \ and User and Group details and click \"Finish\".\n\nFor additional information\
          \ on configuring ADFS for use with vCenter, refer to the vSphere documentation."
