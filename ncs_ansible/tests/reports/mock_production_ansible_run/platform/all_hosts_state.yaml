      - checktext: 'From the vSphere Client, go to Administration >> Solutions >>
          Client Plug-Ins.


          View the Installed/Available Plug-ins list and verify they are all identified
          as authorized VMware, third-party (partner), and/or site-specific approved
          plug-ins.


          If any installed/available plug-ins in the viewable list cannot be verified
          as allowed vSphere Client plug-ins from trusted sources or are not in active
          use, this is a finding.'
        fixtext: "From the vSphere Client, go to Administration >> Solutions >> Client\
          \ Plug-Ins, click the radio button next to the unknown plug-in, and click\
          \ \"Disable\".\n\nIf the plugin will not be needed in the future, proceed\
          \ to uninstall the plug-in.\n\nTo uninstall plug-ins, do the following:\n\
          \nIf vCenter Server is in linked mode, perform this procedure on the vCenter\
          \ Server that is used to install the plug-in initially and then restart\
          \ the vCenter Server services on the linked vCenter Server:\n\nIn a web\
          \ browser, navigate to \"http://vCenter_Server_name_or_IP/mob\", where \"\
          vCenter_Server_name_or_IP/mob\" is the name of the vCenter Server or its\
          \ IP address.\n\nClick \"Content\".\n\nClick \"ExtensionManager\".\n\nSelect\
          \ and copy the name of the plug-in to be removed from the list of values\
          \ under \"Properties\". \n\nClick \"UnregisterExtension\". A new window\
          \ appears.\n\nPaste the name of the plug-in and click \"Invoke Method\"\
          . This removes the plug-in.\n\nClose the window.\n\nRefresh the Managed\
          \ Object Type:ManagedObjectReference:ExtensionManager window to verify the\
          \ plug-in is removed successfully.\n\nNote: If the plug-in still appears,\
          \ restart the vSphere Client.\n\nNote: The Managed Object Browser (MOB)\
          \ may have to be enabled temporarily if it was disabled previously."
        id: V-256322
        rule_id: V-256322
        rule_version: VCSA-70-000057
        severity: medium
        status: na
        title: vCenter Server plugins must be verified.
        description: 'From the vSphere Client, go to Administration >> Solutions >>
          Client Plug-Ins.


