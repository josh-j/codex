          \ \n \nIf the command produces any output, this is a finding."
      - checktext: "At the command prompt, run the following command:  \n \n# xmllint\
          \ --format /usr/lib/vmware-vsphere-ui/server/conf/web.xml | sed 's/xmlns=\"\
          .*\"//g' | xmllint --xpath '/web-app/servlet-mapping/servlet-name[text()=\"\
          jsp\"]/parent::servlet-mapping' - \n \nExpected result: \n \n<servlet-mapping>\
          \ \n  <servlet-name>jsp</servlet-name> \n  <url-pattern>*.jsp</url-pattern>\
          \ \n  <url-pattern>*.jspx</url-pattern> \n</servlet-mapping> \n \nIf the\
          \ .jsp and .jspx file url-patterns are not configured as in the expected\
          \ result, this is a finding."
        fixtext: "Navigate to and open: \n \n/usr/lib/vmware-vsphere-ui/server/conf/web.xml\
          \ \n \nNavigate to and locate the mapping for the JSP servlet. It is the\
          \ <servlet-mapping> node that contains <servlet-name>jsp</servlet-name>.\
          \ \n \nConfigure the <servlet-mapping> node to look like the code snippet\
          \ below: \n \n<!-- The mappings for the JSP servlet --> \n<servlet-mapping>\
          \ \n  <servlet-name>jsp</servlet-name> \n  <url-pattern>*.jsp</url-pattern>\
          \ \n  <url-pattern>*.jspx</url-pattern> \n</servlet-mapping> \n \nRestart\
