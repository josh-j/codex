        description: "From the vSphere Client, go to Administration >> Single Sign\
          \ On >> Configuration >> Local Accounts >> Lockout Policy. \n\nThe lockout\
          \ policy should be set as follows:\n\nMaximum number of failed login attempts:\
          \ 3 \n\nIf this account lockout policy is not configured as stated, this\
