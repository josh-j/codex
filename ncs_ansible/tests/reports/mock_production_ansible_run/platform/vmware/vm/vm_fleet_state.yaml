        fixtext: 'From the vSphere Client, right-click the Virtual Machine and go
          to "Edit Settings".


          Select the target hard disk and change the mode to "persistent" or uncheck
          "Independent".


          or


          From a PowerCLI command prompt while connected to the ESXi host or vCenter
          server, run the provided commands as shown below.


          Get-VM "VM Name" | Get-HardDisk | Set-HardDisk -Persistence IndependentPersistent


          or


          Get-VM "VM Name" | Get-HardDisk | Set-HardDisk -Persistence Persistent'
