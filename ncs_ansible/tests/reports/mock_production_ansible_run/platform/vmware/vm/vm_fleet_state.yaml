      alerts:
      - severity: INFO
        category: security_compliance
        message: 'STIG Violation: Paste operations must be disabled on the virtual
          machine (VM).'
        detail:
          rule_id: V-256452
          description: 'From the vSphere Client, right-click the Virtual Machine and
            go to Edit Settings >> VM Options >> Advanced >> Configuration Parameters
            >> Edit Configuration.


            Verify the "isolation.tools.paste.disable" value is set to "true".


            or


            From a PowerCLI command prompt while connected to the ESXi host or vCenter
            server, run the following command:


            Get-VM "VM Name" | Get-AdvancedSetting -Name isolation.tools.paste.disable


            If the virtual machine advanced setting "isolation.tools.paste.disable"
            does not exist or is not set to "true", this is a finding.'
          original_severity: LOW
          target_type: vm
        affected_items: []
        recommendation: null
        remediation: null
      - severity: WARNING
        category: security_compliance
        message: 'STIG Violation: Independent, nonpersistent disks must not be used
          on the virtual machine (VM).'
        detail:
          rule_id: V-256455
          description: 'From the vSphere Client, right-click the Virtual Machine and
            go to "Edit Settings".


            Review the attached hard disks and verify they are not configured as independent
            nonpersistent disks.


            or


            From a PowerCLI command prompt while connected to the ESXi host or vCenter
            server, run the following command:


            Get-VM "VM Name" | Get-HardDisk | Select Parent, Name, Filename, DiskType,
            Persistence | FT -AutoSize


            If the virtual machine has attached disks that are in independent nonpersistent
            mode and are not documented, this is a finding.'
          original_severity: MEDIUM
          target_type: vm
        affected_items: []
        recommendation: null
        remediation: null
      - severity: INFO
        category: security_compliance
        message: 'STIG Violation: Unauthorized CD/DVD devices must be disconnected
          on the virtual machine (VM).'
        detail:
          rule_id: V-256458
          description: 'From the vSphere Client, right-click the Virtual Machine and
            go to "Edit Settings".


            Review the VM''s hardware and verify no CD/DVD drives are connected.


            or


            From a PowerCLI command prompt while connected to the ESXi host or vCenter
            server, run the following command:


            Get-VM | Get-CDDrive | Where {$_.extensiondata.connectable.connected -eq
            $true} | Select Parent,Name


            If a virtual machine has a CD/DVD drive connected other than temporarily,
            this is a finding.'
          original_severity: LOW
          target_type: vm
        affected_items: []
        recommendation: null
        remediation: null
      - severity: WARNING
        category: security_compliance
        message: 'STIG Violation: Unauthorized USB devices must be disconnected on
          the virtual machine (VM).'
        detail:
          rule_id: V-256461
          description: 'From the vSphere Client, right-click the Virtual Machine and
            go to "Edit Settings".


            Review the VM''s hardware and verify no USB devices exist.


            or


            From a PowerCLI command prompt while connected to the ESXi host or vCenter
            server, run the following commands:


            Get-VM | Where {$_.ExtensionData.Config.Hardware.Device.DeviceInfo.Label
            -match "usb"}

            Get-VM | Get-UsbDevice


            If a virtual machine has any USB devices or USB controllers present, this
            is a finding.


            If USB smart card readers are used to pass smart cards through the VM
            console to a VM, the use of a USB controller and USB devices for that
            purpose is not a finding.'
          original_severity: MEDIUM
          target_type: vm
        affected_items: []
        recommendation: null
        remediation: null
      target_type: vm
