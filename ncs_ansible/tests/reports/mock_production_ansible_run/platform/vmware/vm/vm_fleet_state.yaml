      - checktext: 'From the vSphere Client, right-click the Virtual Machine and go
          to "Edit Settings".


          Review the VM''s hardware and verify no CD/DVD drives are connected.


          or


          From a PowerCLI command prompt while connected to the ESXi host or vCenter
          server, run the following command:


          Get-VM | Get-CDDrive | Where {$_.extensiondata.connectable.connected -eq
          $true} | Select Parent,Name


          If a virtual machine has a CD/DVD drive connected other than temporarily,
          this is a finding.'
        fixtext: 'From the vSphere Client, right-click the Virtual Machine and go
          to "Edit Settings".


          Select the CD/DVD drive and uncheck "Connected" and "Connect at power on"
          and remove any attached ISOs.


          or


          From a PowerCLI command prompt while connected to the ESXi host or vCenter
          server, run the following command:


          Get-VM "VM Name" | Get-CDDrive | Set-CDDrive -NoMedia'
