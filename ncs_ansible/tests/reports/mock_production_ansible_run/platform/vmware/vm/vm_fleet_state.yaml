        description: 'From the vSphere Client, right-click the Virtual Machine and
          go to "Edit Settings".


          Review the VM''s hardware and verify no USB devices exist.


          or


          From a PowerCLI command prompt while connected to the ESXi host or vCenter
          server, run the following commands:


          Get-VM | Where {$_.ExtensionData.Config.Hardware.Device.DeviceInfo.Label
          -match "usb"}

          Get-VM | Get-UsbDevice


          If a virtual machine has any USB devices or USB controllers present, this
          is a finding.


          If USB smart card readers are used to pass smart cards through the VM console
          to a VM, the use of a USB controller and USB devices for that purpose is
          not a finding.'
      - checktext: 'From the vSphere Client, right-click the Virtual Machine and go
          to Edit Settings >> VM Options >> Advanced >> Configuration Parameters >>
          Edit Configuration.


          Verify the "RemoteDisplay.maxConnections" value is set to "1".


          or


          From a PowerCLI command prompt while connected to the ESXi host or vCenter
          server, run the following command:


          Get-VM "VM Name" | Get-AdvancedSetting -Name RemoteDisplay.maxConnections


          If the virtual machine advanced setting "RemoteDisplay.maxConnections" does
          not exist or is not set to "1", this is a finding.'
        fixtext: 'From the vSphere Client, right-click the Virtual Machine and go
          to Edit Settings >> VM Options >> Advanced >> Configuration Parameters >>
          Edit Configuration.


          Find the "RemoteDisplay.maxConnections" value and set it to "1".


          If the setting does not exist, add the Name and Value setting at the bottom
          of screen.


          Note: The VM must be powered off to configure the advanced settings through
          the vSphere Client. Therefore, it is recommended to configure these settings
          with PowerCLI as this can be done while the VM is powered on. Settings do
          not take effect via either method until the virtual machine is cold started,
          not rebooted.


          or


          From a PowerCLI command prompt while connected to the ESXi host or vCenter
          server, run the provided commands as shown below.


          If the setting does not exist, run:


          Get-VM "VM Name" | New-AdvancedSetting -Name RemoteDisplay.maxConnections
          -Value 1


          If the setting exists, run:


          Get-VM "VM Name" | Get-AdvancedSetting -Name RemoteDisplay.maxConnections
          | Set-AdvancedSetting -Value 1'
