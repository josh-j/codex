data:
  - checktext: "At the command prompt, run the following command: \n \n#  xmllint\
      \ --xpath '/Server/Service/Connector[@port=\"${bio-custom.http.port}\"]/@connectionTimeout'\
      \ /usr/lib/vmware-sso/vmware-sts/conf/server.xml \n \nExpected result: \n \n\
      connectionTimeout=\"60000\" \n \nIf the output does not match the expected result,\
      \ this is a finding."
    fixtext: "Navigate to and open: \n \n/usr/lib/vmware-sso/vmware-sts/conf/server.xml\
      \ \n \nNavigate to each of the <Connector> nodes. \n \nConfigure each <Connector>\
      \ node with the value: \n \nconnectionTimeout=\"60000\" \n \nRestart the service\
      \ with the following command: \n \n# vmon-cli --restart sts"
    id: V-256745
    rule_id: SV-256745r889205_rule
    rule_version: VCST-70-000001
    severity: medium
    status: failed
    title: The Security Token Service must limit the amount of time that each Transmission
      Control Protocol (TCP) connection is kept alive.
  - checktext: "At the command prompt, run the following command: \n \n# xmllint --xpath\
      \ '/Server/Service/Executor[@name=\"tomcatThreadPool\"]/@maxThreads' /usr/lib/vmware-sso/vmware-sts/conf/server.xml\
      \ \n \nExpected result: \n \nmaxThreads=\"150\" \n \nIf the output does not\
      \ match the expected result, this is a finding."
    fixtext: "Navigate to and open: \n \n/usr/lib/vmware-sso/vmware-sts/conf/server.xml\
      \ \n \nNavigate to the <Executor> mode with the name of \"tomcatThreadPool\"\
      \ and configure with the value 'maxThreads=\"150\"' as follows: \n \n<Executor\
      \ maxThreads=\"150\" minSpareThreads=\"50\" name=\"tomcatThreadPool\" namePrefix=\"\
      tomcat-http--\" /> \n \nRestart the service with the following command: \n \n\
      # vmon-cli --restart sts"
    id: V-256746
    rule_id: SV-256746r889208_rule
    rule_version: VCST-70-000002
    severity: medium
    status: pass
    title: The Security Token Service must limit the number of concurrent connections
      permitted.
  - checktext: "At the command prompt, run the following command: \n \n# xmllint --xpath\
      \ '/Server/Service/Connector[@port=\"${bio-custom.http.port}\"]/@maxPostSize'\
      \ /usr/lib/vmware-sso/vmware-sts/conf/server.xml \n \nExpected result: \n \n\
      XPath set is empty \n \nIf the output does not match the expected result, this\
      \ is a finding."
    fixtext: "Navigate to and open: \n \n/usr/lib/vmware-sso/vmware-sts/conf/server.xml\
      \ \n \nNavigate to each of the <Connector> nodes. \n \nRemove any configuration\
      \ for \"maxPostSize\". \n \nRestart the service with the following command:\
      \ \n \n# vmon-cli --restart sts"
    id: V-256747
    rule_id: SV-256747r889211_rule
    rule_version: VCST-70-000003
    severity: medium
    status: na
    title: The Security Token Service must limit the maximum size of a POST request.
  - checktext: "At the command prompt, run the following command: \n \n# xmllint --format\
      \ /usr/lib/vmware-sso/vmware-sts/conf/web.xml | sed '2 s/xmlns=\".*\"//g' |\
      \ xmllint --xpath '/web-app/session-config/cookie-config/http-only' - \n \n\
      Expected result: \n \n<http-only>true</http-only> \n \nIf the output does not\
      \ match the expected result, this is a finding."
    fixtext: "Navigate to and open: \n \n/usr/lib/vmware-sso/vmware-sts/conf/web.xml\
      \ \n \nNavigate to the <session-config> node and configure it as follows: \n\
      \ \n<session-config> \n        <session-timeout>30</session-timeout> \n    \
      \    <cookie-config> \n            <http-only>true</http-only> \n          \
      \  <secure>true</secure> \n       </cookie-config> \n</session-config> \n \n\
      Restart the service with the following command: \n \n# vmon-cli --restart sts"
    id: V-256748
    rule_id: SV-256748r889214_rule
    rule_version: VCST-70-000004
    severity: medium
    status: failed
    title: The Security Token Service must protect cookies from cross-site scripting
      (XSS).
  - checktext: "At the command prompt, run the following command: \n \n# xmllint --format\
      \ /usr/lib/vmware-sso/vmware-sts/conf/server.xml | sed '2 s/xmlns=\".*\"//g'\
      \ | xmllint --xpath '/Server/Service/Engine/Host/Valve[@className=\"org.apache.catalina.valves.AccessLogValve\"\
      ]/@pattern' - \n \nExpected result: \n \npattern=\"%t %I [RemoteIP] %{X-Forwarded-For}i\
      \ %u [Request] %h:%{remote}p to local %{local}p - %H %m %U%q    [Response] %s\
      \ - %b bytes    [Perf] process %Dms / commit %Fms / conn [%X]\" \n \nIf the\
      \ output does not match the expected result, this is a finding."
    fixtext: "Navigate to and open: \n \n/usr/lib/vmware-sso/vmware-sts/conf/server.xml\
      \ \n \nInside the <Host> node, find the \"AccessLogValve\" <Valve> node and\
      \ replace the \"pattern\" element as follows: \n \npattern=\"%t %I [RemoteIP]\
      \ %{X-Forwarded-For}i %u [Request] %h:%{remote}p to local %{local}p - %H %m\
      \ %U%q    [Response] %s - %b bytes    [Perf] process %Dms / commit %Fms / conn\
      \ [%X]\" \n \nRestart the service with the following command: \n \n# vmon-cli\
      \ --restart sts"
    id: V-256749
    rule_id: SV-256749r889217_rule
    rule_version: VCST-70-000005
    severity: medium
    status: pass
    title: The Security Token Service must record user access in a format that enables
      monitoring of remote access.
  - checktext: 'At the command prompt, run the following command:


      # grep "1catalina.org.apache.juli.FileHandler" /usr/lib/vmware-sso/vmware-sts/conf/logging.properties


      Expected result:


      handlers = 1catalina.org.apache.juli.FileHandler, 2localhost.org.apache.juli.FileHandler,
      3manager.org.apache.juli.FileHandler, 4host-manager.org.apache.juli.FileHandler

      .handlers = 1catalina.org.apache.juli.FileHandler

      1catalina.org.apache.juli.FileHandler.level = FINE

      1catalina.org.apache.juli.FileHandler.directory = ${catalina.base}/logs/tomcat

      1catalina.org.apache.juli.FileHandler.prefix = catalina.

      1catalina.org.apache.juli.FileHandler.bufferSize = -1

      1catalina.org.apache.juli.FileHandler.formatter = java.util.logging.SimpleFormatter

      1catalina.org.apache.juli.FileHandler.maxDays = 10

      org.apache.catalina.startup.Catalina.handlers = 1catalina.org.apache.juli.FileHandler


      If the output does not match the expected result, this is a finding.'
    fixtext: 'Navigate to and open:


      /usr/lib/vmware-sso/vmware-sts/conf/logging.properties


      Ensure that the "handlers" and ".handlers" lines are configured as follows:


      handlers = 1catalina.org.apache.juli.FileHandler, 2localhost.org.apache.juli.FileHandler,
      3manager.org.apache.juli.FileHandler, 4host-manager.org.apache.juli.FileHandler

      .handlers = 1catalina.org.apache.juli.FileHandler

      1catalina.org.apache.juli.FileHandler.level = FINE

      1catalina.org.apache.juli.FileHandler.directory = ${catalina.base}/logs/tomcat

      1catalina.org.apache.juli.FileHandler.prefix = catalina.

      1catalina.org.apache.juli.FileHandler.bufferSize = -1

      1catalina.org.apache.juli.FileHandler.formatter = java.util.logging.SimpleFormatter

      1catalina.org.apache.juli.FileHandler.maxDays = 10

      org.apache.catalina.startup.Catalina.handlers = 1catalina.org.apache.juli.FileHandler


      Restart the service with the following command:


      # vmon-cli --restart sts'
    id: V-256750
    rule_id: SV-256750r918974_rule
    rule_version: VCST-70-000006
    severity: medium
    status: na
    title: The Security Token Service must generate log records during Java startup
      and shutdown.
  - checktext: "At the command prompt, run the following command: \n \n# find /storage/log/vmware/sso/\
      \ -xdev -type f -a '(' -perm -o+w -o -not -user root -o -not -group root ')'\
      \ -exec ls -ld {} \\; \n \nIf any files are returned, this is a finding."
    fixtext: "At the command prompt, run the following commands: \n \n# chmod o-w\
      \ <file> \n# chown root:root <file> \n \nNote: Substitute <file> with the listed\
      \ file."
    id: V-256751
    rule_id: SV-256751r889223_rule
    rule_version: VCST-70-000007
    severity: medium
    status: failed
    title: Security Token Service log files must only be modifiable by privileged
      users.
  - checktext: "At the command prompt, run the following command: \n \n# rpm -V vmware-identity-sts|grep\
      \ \"^..5......\"|grep -v -E \"\\.properties|\\.xml|\\.conf\" \n \nIf there is\
      \ any output, this is a finding."
    fixtext: "Reinstall the vCenter Server Appliance (VCSA) or roll back to a backup.\
      \ \n \nVMware does not support modifying the Security Token Service installation\
      \ files manually."
    id: V-256752
    rule_id: SV-256752r889226_rule
    rule_version: VCST-70-000008
    severity: medium
    status: pass
    title: The Security Token Service application files must be verified for their
      integrity.
  - checktext: "At the command prompt, run the following command: \n \n# ls /usr/lib/vmware-sso/vmware-sts/webapps/*.war\
      \ \n \nExpected result: \n \n/usr/lib/vmware-sso/vmware-sts/webapps/ROOT.war\
      \ \n \nIf the result of this command does not match the expected result, this\
      \ is a finding."
    fixtext: "For each unexpected file returned in the check, run the following command:\
      \ \n \n# rm /usr/lib/vmware-sso/vmware-sts/webapps/<NAME>.war \n \nRestart the\
      \ service with the following command: \n \n# vmon-cli --restart sts"
    id: V-256753
    rule_id: SV-256753r889229_rule
    rule_version: VCST-70-000009
    severity: medium
    status: na
    title: The Security Token Service must only run one webapp.
  - checktext: "At the command prompt, run the following command: \n \n# grep UserDatabaseRealm\
      \ /usr/lib/vmware-sso/vmware-sts/conf/server.xml \n \nIf the command produces\
      \ any output, this is a finding."
    fixtext: "Navigate to and open: \n \n/usr/lib/vmware-sso/vmware-sts/conf/server.xml\
      \ \n \nRemove the <Realm> node returned in the check. \n \nRestart the service\
      \ with the following command: \n \n# vmon-cli --restart sts"
    id: V-256754
    rule_id: SV-256754r889232_rule
    rule_version: VCST-70-000010
    severity: medium
    status: failed
    title: The Security Token Service must not be configured with unused realms.
  - checktext: "At the command prompt, run the following command: \n \n# grep \"package.access\"\
      \ /usr/lib/vmware-sso/vmware-sts/conf/catalina.properties \n \nExpected result:\
      \ \n \npackage.access=sun.,org.apache.catalina.,org.apache.coyote.,org.apache.tomcat.,org.apache.jasper.\
      \ \n \nIf the output of the command does not match the expected result, this\
      \ is a finding."
    fixtext: "Navigate to and open: \n \n/usr/lib/vmware-sso/vmware-sts/conf/catalina.properties\
      \ \n \nEnsure the \"package.access\" line is configured as follows: \n \npackage.access=sun.,org.apache.catalina.,org.apache.coyote.,org.apache.tomcat.,org.apache.jasper.\
      \ \n \nRestart the service with the following command: \n \n# vmon-cli --restart\
      \ sts"
    id: V-256755
    rule_id: SV-256755r889235_rule
    rule_version: VCST-70-000011
    severity: medium
    status: pass
    title: The Security Token Service must be configured to limit access to internal
      packages.
  - checktext: "At the command prompt, run the following command: \n \n# grep -En\
      \ '(x-csh<)|(x-sh<)|(x-shar<)|(x-ksh<)' /usr/lib/vmware-sso/vmware-sts/conf/web.xml\
      \ \n \nIf the command produces any output, this is a finding."
    fixtext: "Navigate to and open: \n \n/usr/lib/vmware-sso/vmware-sts/conf/web.xml\
      \ \n \nRemove all of the following nodes lines: \n \n<mime-type>application/x-csh</mime-type>\
      \ \n<mime-type>application/x-shar</mime-type> \n<mime-type>application/x-sh</mime-type>\
      \ \n<mime-type>application/x-ksh</mime-type> \n \nRestart the service with the\
      \ following command: \n \n# vmon-cli --restart sts \n \nNote: Delete the entire\
      \ mime-mapping node for the target mime-type. \n \nExample: \n \n<mime-mapping>\
      \ \n    <extension>sh</extension> \n    <mime-type>application/x-sh</mime-type>\
      \ \n</mime-mapping>"
    id: V-256756
    rule_id: SV-256756r889238_rule
    rule_version: VCST-70-000012
    severity: medium
    status: na
    title: The Security Token Service must have Multipurpose Internet Mail Extensions
      (MIME) that invoke operating system shell programs disabled.
  - checktext: "At the command prompt, run the following command:  \n \n# xmllint\
      \ --format /usr/lib/vmware-sso/vmware-sts/conf/web.xml | sed '2 s/xmlns=\".*\"\
      //g' | xmllint --xpath '/web-app/servlet-mapping/servlet-name[text()=\"jsp\"\
      ]/parent::servlet-mapping' - \n \nExpected result: \n \n<servlet-mapping> \n\
      \    <servlet-name>jsp</servlet-name> \n    <url-pattern>*.jsp</url-pattern>\
      \ \n    <url-pattern>*.jspx</url-pattern> \n</servlet-mapping> \n \nIf the output\
      \ of the command does not match the expected result, this is a finding."
    fixtext: "Navigate to and open: \n \n/usr/lib/vmware-sso/vmware-sts/conf/web.xml\
      \ \n \nInside the <web-app> parent node, add the following: \n \n<servlet-mapping>\
      \ \n    <servlet-name>jsp</servlet-name> \n    <url-pattern>*.jsp</url-pattern>\
      \ \n    <url-pattern>*.jspx</url-pattern> \n</servlet-mapping> \n \nRestart\
      \ the service with the following command: \n \n# vmon-cli --restart sts"
    id: V-256757
    rule_id: SV-256757r889241_rule
    rule_version: VCST-70-000013
    severity: medium
    status: failed
    title: The Security Token Service must have mappings set for Java servlet pages.
  - checktext: "At the command prompt, run the following command:  \n \n# grep -n\
      \ 'webdav' /usr/lib/vmware-sso/vmware-sts/conf/web.xml \n \nIf the command produces\
      \ any output, this is a finding."
    fixtext: "Navigate to and open: \n \n/usr/lib/vmware-sso/vmware-sts/conf/web.xml\
      \ \n \nFind the <servlet-name>webdav</servlet-name> node and remove the entire\
      \ parent <servlet> block. \n \nRestart the service with the following command:\
      \ \n \n# vmon-cli --restart sts"
    id: V-256758
    rule_id: SV-256758r889244_rule
    rule_version: VCST-70-000014
    severity: medium
    status: pass
    title: The Security Token Service must not have the Web Distributed Authoring
      (WebDAV) servlet installed.
