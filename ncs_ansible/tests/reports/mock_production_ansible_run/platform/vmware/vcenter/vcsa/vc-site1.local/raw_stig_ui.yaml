data:
  - checktext: "At the command prompt, run the following command: \n \n# xmllint --xpath\
      \ '/Server/Service/Connector[@port=\"${http.port}\"]/@connectionTimeout' /usr/lib/vmware-vsphere-ui/server/conf/server.xml\
      \ \n \nExpected result: \n \nconnectionTimeout=\"300000\" \n \nIf the output\
      \ does not match the expected result, this is a finding."
    fixtext: "Navigate to and open: \n \n/usr/lib/vmware-vsphere-ui/server/conf/server.xml\
      \ \n \nConfigure the http <Connector> node with the value: \n \nconnectionTimeout=\"\
      300000\" \n \nExample: \n \n<Connector .. connectionTimeout=\"300000\" ..> \n\
      \ \nRestart the service with the following command: \n \n# vmon-cli --restart\
      \ vsphere-ui"
    id: V-256778
    rule_id: SV-256778r889333_rule
    rule_version: VCUI-70-000001
    severity: medium
    status: failed
    title: vSphere UI must limit the amount of time that each Transmission Control
      Protocol (TCP) connection is kept alive.
  - checktext: "At the command prompt, run the following command: \n \n# xmllint --xpath\
      \ '/Server/Service/Connector[@port=\"${http.port}\"]/@maxThreads' /usr/lib/vmware-vsphere-ui/server/conf/server.xml\
      \ \n \nExpected result: \n \nmaxThreads=\"800\" \n \nIf the output does not\
      \ match the expected result, this is a finding."
    fixtext: "Navigate to and open: \n \n/usr/lib/vmware-vsphere-ui/server/conf/server.xml\
      \ \n \nConfigure each <Connector> node with the value: \n \nmaxThreads=\"800\"\
      \ \n \nExample: \n \n<Connector .. maxThreads=\"800\" ..> \n \nRestart the service\
      \ with the following command: \n \n# vmon-cli --restart vsphere-ui"
    id: V-256779
    rule_id: SV-256779r889336_rule
    rule_version: VCUI-70-000002
    severity: medium
    status: pass
    title: vSphere UI must limit the number of concurrent connections permitted.
  - checktext: "At the command prompt, run the following command: \n \n# xmllint --xpath\
      \ '/Server/Service/Connector[@port=\"${http.port}\"]/@maxPostSize' /usr/lib/vmware-vsphere-ui/server/conf/server.xml\
      \ \n \nExpected result: \n \nXPath set is empty \n \nIf the output does not\
      \ match the expected result, this is a finding."
    fixtext: "Navigate to and open: \n \n/usr/lib/vmware-vsphere-ui/server/conf/server.xml\
      \ \n \nNavigate to each of the <Connector> nodes. \n \nRemove any configuration\
      \ for \"maxPostSize\". \n \nRestart the service with the following command:\
      \ \n \n# vmon-cli --restart vsphere-ui"
    id: V-256780
    rule_id: SV-256780r889339_rule
    rule_version: VCUI-70-000003
    severity: medium
    status: na
    title: vSphere UI must limit the maximum size of a POST request.
  - checktext: "At the command prompt, run the following command: \n \n# xmllint --format\
      \ /usr/lib/vmware-vsphere-ui/server/conf/context.xml | xmllint --xpath '/Context/@useHttpOnly'\
      \ - \n \nExpected result: \n \nuseHttpOnly=\"true\" \n \nIf the output does\
      \ not match the expected result, this is a finding."
    fixtext: "Navigate to and open: \n \n/usr/lib/vmware-vsphere-ui/server/conf/context.xml\
      \ \n \nAdd the following configuration to the <Context> node: \n \nuseHttpOnly=\"\
      true\" \n \nExample: \n \n<Context useHttpOnly=\"true\" sessionCookieName=\"\
      VSPHERE-UI-JSESSIONID\" sessionCookiePath=\"/ui\"> \n \nRestart the service\
      \ with the following command: \n \n# vmon-cli --restart vsphere-ui"
    id: V-256781
    rule_id: SV-256781r889342_rule
    rule_version: VCUI-70-000004
    severity: medium
    status: failed
    title: vSphere UI must protect cookies from cross-site scripting (XSS).
  - checktext: "At the command prompt, run the following command: \n \n# xmllint --format\
      \ /usr/lib/vmware-vsphere-ui/server/conf/server.xml | xmllint --xpath '/Server/Service/Engine/Host/Valve[@className=\"\
      org.apache.catalina.valves.AccessLogValve\"]/@pattern' - \n \nExpected result:\
      \ \n \npattern=\"%h %{x-forwarded-for}i %l %u %t &quot;%r&quot; %s %b %s %r\
      \ %I %D\" \n \nIf the output does not match the expected result, this is a finding."
    fixtext: "Navigate to and open: \n \n/usr/lib/vmware-vsphere-ui/server/conf/server.xml\
      \ \n \nEnsure the log pattern in the \"org.apache.catalina.valves.AccessLogValve\"\
      \ node is set to the following: \n \npattern=\"%h %{x-forwarded-for}i %l %u\
      \ %t &quot;%r&quot; %s %b %s %r %I %D\" \n \nRestart the service with the following\
      \ command: \n \n# vmon-cli --restart vsphere-ui"
    id: V-256782
    rule_id: SV-256782r889345_rule
    rule_version: VCUI-70-000005
    severity: medium
    status: pass
    title: vSphere UI must record user access in a format that enables monitoring
      of remote access.
  - checktext: "At the command prompt, run the following command: \n \n# grep StreamRedirectFile\
      \ /etc/vmware/vmware-vmon/svcCfgfiles/vsphere-ui.json \n \nExpected result:\
      \ \n \n\"StreamRedirectFile\": \"%VMWARE_LOG_DIR%/vmware/vsphere-ui/logs/vsphere-ui-runtime.log\"\
      , \n \nIf no log file is specified for the \"StreamRedirectFile\" setting, this\
      \ is a finding."
    fixtext: "Navigate to and open: \n \n/etc/vmware/vmware-vmon/svcCfgfiles/vsphere-ui.json\
      \ \n \nBelow the last line of the \"PreStartCommandArg\" block, add or reconfigure\
      \ the following line: \n \n\"StreamRedirectFile\": \"%VMWARE_LOG_DIR%/vmware/vsphere-ui/logs/vsphere-ui-runtime.log\"\
      , \n \nRestart the appliance for changes to take effect."
    id: V-256783
    rule_id: SV-256783r889348_rule
    rule_version: VCUI-70-000006
    severity: medium
    status: na
    title: vSphere UI must generate log records for system startup and shutdown.
  - checktext: "At the command prompt, run the following command: \n \n# find /var/log/vmware/vsphere-ui/\
      \ -xdev -type f -a '(' -perm -o+w -o -not -user vsphere-ui -o -not -group users\
      \ -a -not -group root ')' -exec ls -ld {} \\; \n \nIf any files are returned,\
      \ this is a finding."
    fixtext: "At the command prompt, run the following commands: \n \n# chmod 644\
      \ /storage/log/vmware/vsphere-ui/logs/<file> \n# chown vsphere-ui:users /storage/log/vmware/vsphere-ui/logs/<file>\
      \ \n \nNote: Substitute <file> with the listed file."
    id: V-256784
    rule_id: SV-256784r889351_rule
    rule_version: VCUI-70-000007
    severity: medium
    status: failed
    title: vSphere UI log files must only be accessible by privileged users.
  - checktext: 'At the command prompt, run the following command:


      # rpm -V vsphere-ui|grep "^..5......"|grep -v -E "\.prop|\.pass|\.xml|\.json"


      If there is any output, this is a finding.'
    fixtext: "Reinstall the vCenter Server Appliance (VCSA) or roll back to a snapshot.\
      \ \n \nVMware does not support modifying the vSphere UI installation files manually."
    id: V-256785
    rule_id: SV-256785r918981_rule
    rule_version: VCUI-70-000008
    severity: medium
    status: pass
    title: vSphere UI application files must be verified for their integrity.
  - checktext: "At the command prompt, run the following command: \n \n# diff <(find\
      \ /usr/lib/vmware-vsphere-ui/plugin-packages/vsphere-client/plugins -type f|sort)\
      \ <(rpm -ql vsphere-ui|grep \"/usr/lib/vmware-vsphere-ui/plugin-packages/vsphere-client/plugins/\"\
      |sort) \n \nIf there is any output, this indicates a vSphere UI plugin is present\
      \ that does not ship with the vCenter Server Appliance (VCSA). \n \nIf this\
      \ plugin is not known and approved, this is a finding."
    fixtext: "For every unauthorized plugin returned by the check, run the following\
      \ command: \n \n# rm <file>"
    id: V-256786
    rule_id: SV-256786r889357_rule
    rule_version: VCUI-70-000009
    severity: medium
    status: na
    title: vSphere UI plugins must be authorized before use.
  - checktext: "At the command prompt, run the following command: \n \n# grep UserDatabaseRealm\
      \ /usr/lib/vmware-vsphere-ui/server/conf/server.xml \n \nIf the command produces\
      \ any output, this is a finding."
    fixtext: "Navigate to and open: \n \n/usr/lib/vmware-vsphere-ui/server/conf/server.xml\
      \ \n \nRemove all <Realm> nodes. \n \nRestart the service with the following\
      \ command: \n \n# vmon-cli --restart vsphere-ui"
    id: V-256787
    rule_id: SV-256787r889360_rule
    rule_version: VCUI-70-000010
    severity: medium
    status: failed
    title: vSphere UI must not be configured with the "UserDatabaseRealm" enabled.
  - checktext: "At the command prompt, run the following command: \n \n# grep \"package.access\"\
      \ /usr/lib/vmware-vsphere-ui/server/conf/catalina.properties \n \nExpected result:\
      \ \n \npackage.access=sun.,org.apache.catalina.,org.apache.coyote.,org.apache.jasper.,org.apache.tomcat.\
      \ \n \nIf the output of the command does not match the expected result, this\
      \ is a finding."
    fixtext: "Navigate to and open: \n \n/usr/lib/vmware-sso/vmware-sts/conf/catalina.properties\
      \ \n \nEnsure the \"package.access\" line is configured as follows: \n \npackage.access=sun.,org.apache.catalina.,org.apache.coyote.,org.apache.jasper.,org.apache.tomcat.\
      \ \n \nRestart the service with the following command: \n \n# vmon-cli --restart\
      \ vsphere-ui"
    id: V-256788
    rule_id: SV-256788r889363_rule
    rule_version: VCUI-70-000011
    severity: medium
    status: pass
    title: vSphere UI must be configured to limit access to internal packages.
  - checktext: "At the command prompt, run the following command: \n \n# grep -En\
      \ '(x-csh<)|(x-sh<)|(x-shar<)|(x-ksh<)' /usr/lib/vmware-vsphere-ui/server/conf/web.xml\
      \ \n \nIf the command produces any output, this is a finding."
    fixtext: "Navigate to and open: \n \n/usr/lib/vmware-vsphere-ui/server/conf/web.xml\
      \ \n \nRemove all of the following nodes lines: \n \n<mime-type>application/x-csh</mime-type>\
      \ \n<mime-type>application/x-shar</mime-type> \n<mime-type>application/x-sh</mime-type>\
      \ \n<mime-type>application/x-ksh</mime-type> \n \nRestart the service with the\
      \ following command: \n \n# vmon-cli --restart vsphere-ui \n \nNote: Delete\
      \ the entire mime-mapping node for the target mime-type. \n \nExample: \n \n\
      <mime-mapping> \n    <extension>sh</extension> \n    <mime-type>application/x-sh</mime-type>\
      \ \n</mime-mapping>"
    id: V-256789
    rule_id: SV-256789r889366_rule
    rule_version: VCUI-70-000012
    severity: medium
    status: na
    title: vSphere UI must have Multipurpose Internet Mail Extensions (MIME) that
      invoke operating system shell programs disabled.
  - checktext: "At the command prompt, run the following command:  \n \n# xmllint\
      \ --format /usr/lib/vmware-vsphere-ui/server/conf/web.xml | sed 's/xmlns=\"\
      .*\"//g' | xmllint --xpath '/web-app/servlet-mapping/servlet-name[text()=\"\
      jsp\"]/parent::servlet-mapping' - \n \nExpected result: \n \n<servlet-mapping>\
      \ \n  <servlet-name>jsp</servlet-name> \n  <url-pattern>*.jsp</url-pattern>\
      \ \n  <url-pattern>*.jspx</url-pattern> \n</servlet-mapping> \n \nIf the .jsp\
      \ and .jspx file url-patterns are not configured as in the expected result,\
      \ this is a finding."
    fixtext: "Navigate to and open: \n \n/usr/lib/vmware-vsphere-ui/server/conf/web.xml\
      \ \n \nNavigate to and locate the mapping for the JSP servlet. It is the <servlet-mapping>\
      \ node that contains <servlet-name>jsp</servlet-name>. \n \nConfigure the <servlet-mapping>\
      \ node to look like the code snippet below: \n \n<!-- The mappings for the JSP\
      \ servlet --> \n<servlet-mapping> \n  <servlet-name>jsp</servlet-name> \n  <url-pattern>*.jsp</url-pattern>\
      \ \n  <url-pattern>*.jspx</url-pattern> \n</servlet-mapping> \n \nRestart the\
      \ service with the following command: \n \n# vmon-cli --restart vsphere-ui"
    id: V-256790
    rule_id: SV-256790r889369_rule
    rule_version: VCUI-70-000013
    severity: medium
    status: failed
    title: vSphere UI must have mappings set for Java servlet pages.
  - checktext: "At the command prompt, run the following command:  \n \n# grep -n\
      \ 'webdav' /usr/lib/vmware-vsphere-ui/server/conf/web.xml \n \nIf the command\
      \ produces any output, this is a finding."
    fixtext: "Navigate to and open: \n \n/usr/lib/vmware-vsphere-ui/server/conf/web.xml.\
      \ \n \nFind the <servlet-name>webdav</servlet-name> node and remove the entire\
      \ parent <servlet> block. \n \nFind the <servlet-name>webdav</servlet-name>\
      \ node and remove the entire parent <servlet-mapping> block. \n \nRestart the\
      \ service with the following command: \n \n# vmon-cli --restart vsphere-ui"
    id: V-256791
    rule_id: SV-256791r889372_rule
    rule_version: VCUI-70-000014
    severity: medium
    status: pass
    title: vSphere UI must not have the Web Distributed Authoring (WebDAV) servlet
      installed.
