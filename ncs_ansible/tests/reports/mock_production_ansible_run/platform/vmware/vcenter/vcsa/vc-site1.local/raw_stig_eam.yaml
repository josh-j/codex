data:
  - checktext: 'At the command prompt, run the following command:


      # xmllint --xpath ''/Server/Service/Connector/@connectionTimeout'' /usr/lib/vmware-eam/web/conf/server.xml


      Expected result:


      connectionTimeout="60000"


      If the output does not match the expected result, this is a finding.'
    fixtext: 'Navigate to and open:


      /usr/lib/vmware-eam/web/conf/server.xml


      Configure the <Connector> node with the value:


      connectionTimeout="60000"


      Restart the service with the following command:


      # vmon-cli --restart eam'
    id: V-256673
    rule_id: SV-256673r888575_rule
    rule_version: VCEM-70-000001
    severity: medium
    status: na
    title: ESX Agent Manager must limit the amount of time that each Transmission
      Control Protocol (TCP) connection is kept alive.
  - checktext: 'At the command prompt, run the following command:


      # xmllint --xpath ''/Server/Service/Executor[@name="tomcatThreadPool"]/@maxThreads''
      /usr/lib/vmware-eam/web/conf/server.xml


      Expected result:


      maxThreads="300"


      If the output does not match the expected result, this is a finding.'
    fixtext: "Navigate to and open:\n\n/usr/lib/vmware-eam/web/conf/server.xml\n\n\
      Navigate to the <Executor> mode with the name of \"tomcatThreadPool\" and configure\
      \ with the value 'maxThreads=\"300\"'.\n\nNote: The <Executor> node should be\
      \ configured as follows:\n\n<Executor maxThreads=\"300\"\n                minSpareThreads=\"\
      50\"\n                name=\"tomcatThreadPool\"\n                namePrefix=\"\
      tomcat-http--\"/>\n\nRestart the service with the following command:\n\n# vmon-cli\
      \ --restart eam"
    id: V-256674
    rule_id: SV-256674r888578_rule
    rule_version: VCEM-70-000002
    severity: medium
    status: failed
    title: ESX Agent Manager must limit the number of concurrent connections permitted.
  - checktext: 'At the command prompt, run the following command:


      # xmllint --xpath ''/Server/Service/Connector/@maxPostSize'' /usr/lib/vmware-eam/web/conf/server.xml


      Expected result:


      XPath set is empty


      If the output does not match the expected result, this is a finding.'
    fixtext: 'Navigate to and open:


      /usr/lib/vmware-eam/web/conf/server.xml


      Remove any configuration for "maxPostSize" from the <Connector> node.


      Restart the service with the following command:


      # vmon-cli --restart eam'
    id: V-256675
    rule_id: SV-256675r888581_rule
    rule_version: VCEM-70-000003
    severity: medium
    status: pass
    title: ESX Agent Manager must limit the maximum size of a POST request.
  - checktext: 'At the command prompt, run the following command:


      # xmllint --format /usr/lib/vmware-eam/web/webapps/eam/WEB-INF/web.xml | sed
      ''s/xmlns=".*"//g'' | xmllint --xpath ''/web-app/session-config/cookie-config/http-only''
      -


      Expected result:


      <http-only>true</http-only>


      If the output does not match the expected result, this is a finding.'
    fixtext: "Navigate to and open:\n\n/usr/lib/vmware-eam/web/webapps/eam/WEB-INF/web.xml\n\
      \nNavigate to the <session-config> node and configure it as follows:\n\n   \
      \ <session-config>\n      <cookie-config>\n         <http-only>true</http-only>\n\
      \         <secure>true</secure>\n      </cookie-config>\n      <session-timeout>30</session-timeout>\n\
      \   </session-config>\n\nRestart the service with the following command:\n\n\
      # vmon-cli --restart eam"
    id: V-256676
    rule_id: SV-256676r888584_rule
    rule_version: VCEM-70-000004
    severity: medium
    status: na
    title: ESX Agent Manager must protect cookies from cross-site scripting (XSS).
  - checktext: 'At the command prompt, run the following command:


      # xmllint --xpath ''/Server/Service/Engine/Host/Valve[@className="org.apache.catalina.valves.AccessLogValve"]/@pattern''
      /usr/lib/vmware-eam/web/conf/server.xml


      Expected result:


      pattern="%h %{X-Forwarded-For}i %l %u %t [%I] &quot;%r&quot; %s %b [Processing
      time %D msec] &quot;%{User-Agent}i&quot;"


      If the output does not match the expected result, this is a finding.'
    fixtext: 'Navigate to and open:


      /usr/lib/vmware-eam/web/conf/server.xml


      Inside the <Host> node, find the "AccessLogValve" <Valve> node and replace the
      "pattern" element as follows:


      pattern="%h %{X-Forwarded-For}i %l %u %t [%I] &quot;%r&quot; %s %b [Processing
      time %D msec] &quot;%{User-Agent}i&quot;"


      Restart the service with the following command:


      # vmon-cli --restart eam'
    id: V-256677
    rule_id: SV-256677r888587_rule
    rule_version: VCEM-70-000005
    severity: medium
    status: failed
    title: ESX Agent Manager must record user access in a format that enables monitoring
      of remote access.
  - checktext: 'At the command prompt, run the following command:


      # grep StreamRedirectFile /etc/vmware/vmware-vmon/svcCfgfiles/eam.json


      Expected output:


      "StreamRedirectFile" : "%VMWARE_LOG_DIR%/vmware/eam/jvm.log",


      If no log file is specified for the "StreamRedirectFile" setting, this is a
      finding.'
    fixtext: 'Navigate to and open:


      /etc/vmware/vmware-vmon/svcCfgfiles/eam.json


      Below the last line of the "PreStartCommandArg" block, add the following line:


      "StreamRedirectFile" : "%VMWARE_LOG_DIR%/vmware/eam/jvm.log",


      Restart the appliance for changes to take effect.'
    id: V-256678
    rule_id: SV-256678r888590_rule
    rule_version: VCEM-70-000006
    severity: medium
    status: pass
    title: ESX Agent Manager must generate log records for system startup and shutdown.
  - checktext: 'At the command prompt, run the following command:


      # find /var/log/vmware/eam/web/ -xdev -type f -a ''('' -perm -o+w -o -not -user
      eam -o -not -group users '')'' -exec ls -ld {} \;


      If any files are returned, this is a finding.'
    fixtext: 'At the command prompt, run the following commands:


      # chmod o-w <file>

      # chown eam:users <file>


      Note: Substitute <file> with the listed file.'
    id: V-256679
    rule_id: SV-256679r888593_rule
    rule_version: VCEM-70-000007
    severity: medium
    status: na
    title: ESX Agent Manager log files must only be modifiable by privileged users.
  - checktext: 'At the command prompt, run the following command:


      # rpm -V vmware-eam|grep "^..5......" | grep -v ''c /'' | grep -v -E ".installer|.properties|.xml"


      If there is any output, this is a finding.'
    fixtext: Reinstall the vCenter Server Appliance (VCSA) or roll back to a backup.
      Modifying the EAM installation files manually is not supported by VMware.
    id: V-256680
    rule_id: SV-256680r918904_rule
    rule_version: VCEM-70-000008
    severity: medium
    status: failed
    title: ESX Agent Manager application files must be verified for their integrity.
  - checktext: 'At the command prompt, run the following command:


      # ls -A /usr/lib/vmware-eam/web/webapps


      Expected result:


      eam


      If the output does not match the expected result, this is a finding.'
    fixtext: 'For each unexpected directory returned in the check, run the following
      command:


      # rm /usr/lib/vmware-eam/web/webapps/<NAME>


      Restart the service with the following command:


      # vmon-cli --restart eam'
    id: V-256681
    rule_id: SV-256681r888599_rule
    rule_version: VCEM-70-000009
    severity: medium
    status: pass
    title: ESX Agent Manager must only run one webapp.
  - checktext: 'At the command prompt, run the following command:


      # grep UserDatabaseRealm /usr/lib/vmware-eam/web/conf/server.xml


      If the command produces any output, this is a finding.'
    fixtext: 'Navigate to and open:


      /usr/lib/vmware-eam/web/conf/server.xml


      Remove the <Realm> node returned in the check.


      Restart the service with the following command:


      # vmon-cli --restart eam'
    id: V-256682
    rule_id: SV-256682r888602_rule
    rule_version: VCEM-70-000010
    severity: medium
    status: na
    title: ESX Agent Manager must not be configured with unsupported realms.
  - checktext: 'At the command prompt, run the following command:


      # grep "package.access" -A 5 /etc/vmware-eam/catalina.properties


      Expected result:


      package.access=\

      sun.,\

      org.apache.catalina.,\

      org.apache.coyote.,\

      org.apache.tomcat.,\

      org.apache.jasper.


      If the output of the command does not match the expected result, this is a finding.'
    fixtext: 'Navigate to and open:


      /etc/vmware-eam/catalina.properties


      Ensure the "package.access" line is configured as follows:


      package.access=\

      sun.,\

      org.apache.catalina.,\

      org.apache.coyote.,\

      org.apache.tomcat.,\

      org.apache.jasper.


      Restart the service with the following command:


      # vmon-cli --restart eam'
    id: V-256683
    rule_id: SV-256683r888605_rule
    rule_version: VCEM-70-000011
    severity: medium
    status: failed
    title: ESX Agent Manager must be configured to limit access to internal packages.
  - checktext: 'At the command prompt, run the following command:


      # grep -En ''(x-csh<)|(x-sh<)|(x-shar<)|(x-ksh<)'' /usr/lib/vmware-eam/web/webapps/eam/WEB-INF/web.xml


      If the command produces any output, this is a finding.'
    fixtext: "Navigate to and open:\n\n/usr/lib/vmware-eam/web/webapps/eam/WEB-INF/web.xml\n\
      \nRemove all of the following nodes lines:\n\n<mime-type>application/x-csh</mime-type>\n\
      <mime-type>application/x-shar</mime-type>\n<mime-type>application/x-sh</mime-type>\n\
      <mime-type>application/x-ksh</mime-type>\n\nRestart the service with the following\
      \ command:\n\n# vmon-cli --restart eam\n\nNote: Delete the entire mime-mapping\
      \ node for the target mime-type.\n\nExample:\n\n<mime-mapping>\n    <extension>sh</extension>\n\
      \    <mime-type>application/x-sh</mime-type>\n</mime-mapping>"
    id: V-256684
    rule_id: SV-256684r888608_rule
    rule_version: VCEM-70-000012
    severity: medium
    status: pass
    title: ESX Agent Manager must have Multipurpose Internet Mail Extensions (MIMEs)
      that invoke operating system shell programs disabled.
  - checktext: "At the command prompt, run the following command: \n\n# xmllint --format\
      \ /usr/lib/vmware-eam/web/webapps/eam/WEB-INF/web.xml | sed 's/xmlns=\".*\"\
      //g' | xmllint --xpath '/web-app/servlet-mapping/servlet-name[text()=\"JspServlet\"\
      ]/parent::servlet-mapping' -\n\nExpected result:\n\n<servlet-mapping>\n    <servlet-name>JspServlet</servlet-name>\n\
      \    <url-pattern>*.jsp</url-pattern>\n  </servlet-mapping>\n\nIf the output\
      \ of the command does not match the expected result, this is a finding."
    fixtext: "Navigate to and open:\n\n/usr/lib/vmware-eam/web/webapps/eam/WEB-INF/web.xml\n\
      \nNavigate to and locate the mapping for the JSP servlet. It is the <servlet-mapping>\
      \ node that contains <servlet-name>JspServlet</servlet-name>.\n\nConfigure the\
      \ <servlet-mapping> node to look like the code snippet below:\n\n<servlet-mapping>\n\
      \    <servlet-name>JspServlet</servlet-name>\n    <url-pattern>*.jsp</url-pattern>\n\
      \  </servlet-mapping>\n\nRestart the service with the following command:\n\n\
      # vmon-cli --restart eam"
    id: V-256685
    rule_id: SV-256685r888611_rule
    rule_version: VCEM-70-000013
    severity: medium
    status: na
    title: ESX Agent Manager must have mappings set for Java servlet pages.
  - checktext: "At the command prompt, run the following command: \n\n# grep -n 'webdav'\
      \ /usr/lib/vmware-eam/web/webapps/eam/WEB-INF/web.xml\n\nIf the command produces\
      \ any output, this is a finding."
    fixtext: 'Navigate to and open:


      /usr/lib/vmware-eam/web/webapps/eam/WEB-INF/web.xml


      Find the <servlet-name>webdav</servlet-name> node and remove the entire parent
      <servlet> block.


      Find the <servlet-name>webdav</servlet-name> node and remove the entire parent
      <servlet-mapping> block.


      Restart the service with the following command:


      # vmon-cli --restart eam'
    id: V-256686
    rule_id: SV-256686r888614_rule
    rule_version: VCEM-70-000014
    severity: medium
    status: failed
    title: ESX Agent Manager must not have the Web Distributed Authoring (WebDAV)
      servlet installed.
