data:
  - checktext: "At the command prompt, run the following command: \n \n# xmllint --xpath\
      \ '/config/envoy/L4Filter/tcpKeepAliveTimeSec/text()' /etc/vmware-rhttpproxy/config.xml\
      \ \n \nExpected result: \n \n180 \n \nor \n \nXPath set is empty \n \nIf the\
      \ output does not match the expected result, this is a finding."
    fixtext: "Navigate to and open: \n \n/etc/vmware-rhttpproxy/config.xml \n \nLocate\
      \ the <config>/<envoy>/<L4Filter> block and configure <tcpKeepAliveTimeSec>\
      \ as follows: \n \n<tcpKeepAliveTimeSec>180</tcpKeepAliveTimeSec> \n \nRestart\
      \ the service for changes to take effect. \n \n# vmon-cli --restart rhttpproxy"
    id: V-256737
    rule_id: SV-256737r889149_rule
    rule_version: VCRP-70-000001
    severity: medium
    status: na
    title: Envoy must drop connections to disconnected clients.
  - checktext: "At the command prompt, run the following command: \n \n# xmllint --xpath\
      \ '/config/envoy/L4Filter/maxHttpsConnections/text()' /etc/vmware-rhttpproxy/config.xml\
      \ \n \nExpected result: \n \n2048 \n \nor \n \nXPath set is empty \n \nIf the\
      \ output does not match the expected result, this is a finding."
    fixtext: "Navigate to and open: \n \n/etc/vmware-rhttpproxy/config.xml \n \nLocate\
      \ the <config>/<envoy>/<L4Filter> block and configure <maxHttpsConnections>\
      \ as follows: \n \n<maxHttpsConnections>2048</maxHttpsConnections> \n \nRestart\
      \ the service for changes to take effect. \n \n# vmon-cli --restart rhttpproxy"
    id: V-256738
    rule_id: SV-256738r889152_rule
    rule_version: VCRP-70-000002
    severity: medium
    status: failed
    title: Envoy must set a limit on established connections.
  - checktext: "At the command prompt, run the following command: \n \n# xmllint --xpath\
      \ '/config/vmacore/ssl/fips' /etc/vmware-rhttpproxy/config.xml \n \nExpected\
      \ result: \n \n<fips>true</fips> \n \nIf the output does not match the expected\
      \ result, this is a finding."
    fixtext: "Navigate to and open: \n \n/etc/vmware-rhttpproxy/config.xml \n \nLocate\
      \ the <config>/<vmacore>/<ssl> block and configure <fips> as follows: \n \n\
      <fips>true</fips> \n \nRestart the service for changes to take effect. \n \n\
      # vmon-cli --restart rhttpproxy"
    id: V-256739
    rule_id: SV-256739r889155_rule
    rule_version: VCRP-70-000003
    severity: medium
    status: pass
    title: Envoy must be configured to operate in FIPS mode.
  - checktext: "At the command prompt, run the following command: \n \n# xmllint --xpath\
      \ '/config/vmacore/ssl/protocols' /etc/vmware-rhttpproxy/config.xml \n \nExpected\
      \ result: \n \nXPath set is empty \n \nor \n \n<protocols>tls1.2</protocols>\
      \ \n \nIf the output does not match the expected result, this is a finding."
    fixtext: "Navigate to and open: \n \n/etc/vmware-rhttpproxy/config.xml \n \nLocate\
      \ the <config>/<vmacore>/<ssl> block and configure <protocols> as follows: \n\
      \ \n<protocols>tls1.2</protocols> \n \nRestart the service for changes to take\
      \ effect. \n \n# vmon-cli --restart rhttpproxy"
    id: V-256740
    rule_id: SV-256740r889158_rule
    rule_version: VCRP-70-000004
    severity: medium
    status: na
    title: Envoy must use only Transport Layer Security (TLS) 1.2 for the protection
      of client connections.
  - checktext: "At\_ the command prompt, run the following command: \n \n# stat -c\
      \ \"%n permissions are %a, is owned by %U and group owned by %G\" /etc/vmware-rhttpproxy/ssl/rui.key\
      \ \n \nExpected result: \n \n/etc/vmware-rhttpproxy/ssl/rui.key permissions\
      \ are 600, is owned by root and group owned by root \n \nIf the output does\
      \ not match the expected result, this is a finding."
    fixtext: "At the command prompt, run the following commands: \n \n# chmod 600\
      \ /etc/vmware-rhttpproxy/ssl/rui.key \n# chown root:root /etc/vmware-rhttpproxy/ssl/rui.key"
    id: V-256741
    rule_id: SV-256741r889161_rule
    rule_version: VCRP-70-000005
    severity: medium
    status: failed
    title: The Envoy private key file must be protected from unauthorized access.
  - checktext: "At the command prompt, run the following command: \n \n# xmllint --xpath\
      \ '/config/ssl' /etc/vmware-rhttpproxy/config.xml \n \nExpected result: \n \n\
      <ssl> \n    <!-- The server private key file --> \n    <privateKey>/etc/vmware-rhttpproxy/ssl/rui.key</privateKey>\
      \ \n    <!-- The server side certificate file --> \n    <certificate>/etc/vmware-rhttpproxy/ssl/rui.crt</certificate>\
      \ \n    <!-- vecs server name. Currently vecs runs on all node types. --> \n\
      \    <vecsServerName>localhost</vecsServerName> \n  </ssl> \n \nIf the output\
      \ does not match the expected result, this is a finding."
    fixtext: "Navigate to and open: \n \n/etc/vmware-rhttpproxy/config.xml \n \nLocate\
      \ the first <ssl> block and set its content to the following: \n \n<ssl> \n\
      \    <!-- The server private key file --> \n    <privateKey>/etc/vmware-rhttpproxy/ssl/rui.key</privateKey>\
      \ \n    <!-- The server side certificate file --> \n    <certificate>/etc/vmware-rhttpproxy/ssl/rui.crt</certificate>\
      \ \n    <!-- vecs server name. Currently vecs runs on all node types. --> \n\
      \    <vecsServerName>localhost</vecsServerName> \n</ssl> \n \nRestart the service\
      \ for changes to take effect. \n \n# vmon-cli --restart rhttpproxy"
    id: V-256742
    rule_id: SV-256742r889164_rule
    rule_version: VCRP-70-000006
    severity: medium
    status: pass
    title: Envoy must exclusively use the HTTPS protocol for client connections.
  - checktext: "At the command prompt, run the following command: \n \n# rpm -V VMware-visl-integration|grep\
      \ vmware-services-rhttpproxy.conf|grep \"^..5......\" \n \nIf the command returns\
      \ any output, this is a finding."
    fixtext: "Navigate to and open: \n \n/etc/vmware-syslog/vmware-services-rhttpproxy.conf\
      \ \n \nCreate the file if it does not exist. \n \nSet the contents of the file\
      \ as follows: \n \n#rhttpproxy log \ninput(type=\"imfile\" \n      File=\"/var/log/vmware/rhttpproxy/rhttpproxy.log\"\
      \ \n      Tag=\"rhttpproxy-main\" \n      Severity=\"info\" \n      Facility=\"\
      local0\")"
    id: V-256743
    rule_id: SV-256743r889167_rule
    rule_version: VCRP-70-000007
    severity: medium
    status: na
    title: Envoy (rhttpproxy) log files must be shipped via syslog to a central log
      server.
  - checktext: "At the command prompt, run the following command: \n \n# rpm -V VMware-visl-integration|grep\
      \ vmware-services-envoy.conf|grep \"^..5......\" \n \nIf the command returns\
      \ any output, this is a finding."
    fixtext: "Navigate to and open: \n \n/etc/vmware-syslog/vmware-services-envoy.conf\
      \ \n \nCreate the file if it does not exist. \n \nSet the contents of the file\
      \ as follows: \n \n#envoy service log \ninput(type=\"imfile\" \n      File=\"\
      /var/log/vmware/envoy/envoy.log\" \n      Tag=\"envoy-main\" \n      Severity=\"\
      info\" \n      Facility=\"local0\") \n#envoy access log \ninput(type=\"imfile\"\
      \ \n      File=\"/var/log/vmware/envoy/envoy-access.log\" \n      Tag=\"envoy-access\"\
      \ \n      Severity=\"info\" \n      Facility=\"local0\")"
    id: V-256744
    rule_id: SV-256744r889170_rule
    rule_version: VCRP-70-000008
    severity: medium
    status: failed
    title: Envoy log files must be shipped via syslog to a central log server.
metadata:
