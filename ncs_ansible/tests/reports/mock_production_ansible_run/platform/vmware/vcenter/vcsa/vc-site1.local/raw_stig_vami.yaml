data:
  - checktext: 'At the command prompt, run the following command:


      # /opt/vmware/sbin/vami-lighttpd -p -f /opt/vmware/etc/lighttpd/lighttpd.conf
      2>/dev/null |grep "server.max-connections"|sed -e ''s/^[ ]*//''


      Expected result:


      server.max-connections = 1024


      If the output does not match the expected result, this is a finding.


      Note: The command must be run from a bash shell and not from a shell generated
      by the "appliance shell". Use the "chsh" command to change the shell for the
      account to "/bin/bash". Refer to KB Article 2100508 for more details:


      https://kb.vmware.com/s/article/2100508'
    fixtext: "Navigate to and open:\n\n/opt/vmware/etc/lighttpd/lighttpd.conf \n\n\
      Add or reconfigure the following value:\n\nserver.max-connections = 1024\n\n\
      Restart the service with the following command:\n\n# vmon-cli --restart applmgmt"
    id: V-256645
    rule_id: SV-256645r888457_rule
    rule_version: VCLD-70-000001
    severity: medium
    status: pass
    title: VAMI must limit the number of simultaneous requests.
  - checktext: 'At the command prompt, run the following command:


      # /opt/vmware/sbin/vami-lighttpd -p -f /opt/vmware/etc/lighttpd/lighttpd.conf
      2>/dev/null|grep "ssl.cipher-list"|sed -e ''s/^[ ]*//''


      Expected result:


      ssl.cipher-list                   = "!aNULL:kECDH+AESGCM:ECDH+AESGCM:RSA+AESGCM:kECDH+AES:ECDH+AES:RSA+AES"


      If the output does not match the expected result, this is a finding.


      Note: The command must be run from a bash shell and not from a shell generated
      by the "appliance shell". Use the "chsh" command to change the shell for the
      account to "/bin/bash". Refer to KB Article 2100508 for more details:


      https://kb.vmware.com/s/article/2100508'
    fixtext: 'Navigate to and open:


      /etc/applmgmt/appliance/lighttpd.conf


      Add or reconfigure the following value:


      ssl.cipher-list                   = "!aNULL:kECDH+AESGCM:ECDH+AESGCM:RSA+AESGCM:kECDH+AES:ECDH+AES:RSA+AES"


      Restart the service with the following command:


      # vmon-cli --restart applmgmt'
    id: V-256646
    rule_id: SV-256646r888460_rule
    rule_version: VCLD-70-000002
    severity: high
    status: na
    title: VAMI must be configured with FIPS 140-2 compliant ciphers for HTTPS connections.
  - checktext: 'At the command prompt, run the following command:


      # /opt/vmware/sbin/vami-lighttpd -p -f /opt/vmware/etc/lighttpd/lighttpd.conf
      2>/dev/null|grep "ssl.engine"|sed -e ''s/^[ ]*//''


      Expected result:


      ssl.engine                 = "enable"


      If the output does not match the expected result, this is a finding.


      Note: The command must be run from a bash shell and not from a shell generated
      by the "appliance shell". Use the "chsh" command to change the shell for the
      account to "/bin/bash". Refer to KB Article 2100508 for more details:


      https://kb.vmware.com/s/article/2100508'
    fixtext: "Navigate to and open:\n\n/opt/vmware/etc/lighttpd/lighttpd.conf  \n\n\
      Add or reconfigure the following value:\n\nssl.engine = \"enable\"\n\nRestart\
      \ the service with the following command:\n\n# vmon-cli --restart applmgmt"
    id: V-256647
    rule_id: SV-256647r888463_rule
    rule_version: VCLD-70-000003
    severity: medium
    status: failed
    title: VAMI must use cryptography to protect the integrity of remote sessions.
  - checktext: 'At the command prompt, run the following command:


      # /opt/vmware/sbin/vami-lighttpd -p -f /opt/vmware/etc/lighttpd/lighttpd.conf
      2>/dev/null|awk ''/server\.modules/,/\)/''|grep mod_accesslog|sed -e ''s/^[
      ]*//''


      Expected result:


      "mod_accesslog",


      If the output does not match the expected result, this is a finding.


      Note: The command must be run from a bash shell and not from a shell generated
      by the "appliance shell". Use the "chsh" command to change the shell for the
      account to "/bin/bash". Refer to KB Article 2100508 for more details:


      https://kb.vmware.com/s/article/2100508'
    fixtext: "Navigate to and open:\n\n/opt/vmware/etc/lighttpd/lighttpd.conf\n\n\
      Add the following value in the \"server.modules\" section:\n\nmod_accesslog\n\
      \nThe result should be similar to the following:\n\n    server.modules     \
      \               = (\n        \"mod_access\",\n        \"mod_accesslog\",\n \
      \       \"mod_proxy\",\n        \"mod_cgi\",\n        \"mod_rewrite\",\n   \
      \     \"mod_magnet\",\n        \"mod_setenv\",\n    )\n\nRestart the service\
      \ with the following command:\n\n# vmon-cli --restart applmgmt"
    id: V-256648
    rule_id: SV-256648r888466_rule
    rule_version: VCLD-70-000004
    severity: medium
    status: pass
    title: VAMI must be configured to monitor remote access.
  - checktext: 'At the command prompt, run the following command:


      # /opt/vmware/sbin/vami-lighttpd -p -f /opt/vmware/etc/lighttpd/lighttpd.conf
      2>/dev/null|grep "server.errorlog"|sed -e ''s/^[ ]*//''


      Expected result:


      server.errorlog                   = "/opt/vmware/var/log/lighttpd/error.log"


      If the output does not match the expected result, this is a finding.


      Note: The command must be run from a bash shell and not from a shell generated
      by the "appliance shell". Use the "chsh" command to change the shell for the
      account to "/bin/bash". Refer to KB Article 2100508 for more details:


      https://kb.vmware.com/s/article/2100508'
    fixtext: 'Navigate to and open:


      /opt/vmware/etc/lighttpd/lighttpd.conf


      Add or reconfigure the following value:


      server.errorlog = "/opt/vmware/var/log/lighttpd/error.log"


      Restart the service with the following command:


      # vmon-cli --restart applmgmt'
    id: V-256649
    rule_id: SV-256649r888469_rule
    rule_version: VCLD-70-000005
    severity: medium
    status: na
    title: VAMI must generate log records for system startup and shutdown.
  - checktext: 'At the command prompt, run the following command:


      # /opt/vmware/sbin/vami-lighttpd -p -f /opt/vmware/etc/lighttpd/lighttpd.conf
      2>/dev/null|grep "accesslog.format"|sed -e ''s/^[ ]*//''


      The default commented, "accesslog" format is acceptable for this requirement.
      No output should be returned.


      If the command returns any output, this is a finding.


      Note: The command must be run from a bash shell and not from a shell generated
      by the "appliance shell". Use the "chsh" command to change the shell for the
      account to "/bin/bash". Refer to KB Article 2100508 for more details:


      https://kb.vmware.com/s/article/2100508'
    fixtext: 'Navigate to and open:


      /opt/vmware/etc/lighttpd/lighttpd.conf


      Comment any existing "accesslog.format" lines by adding a "#" at the beginning
      of the line.


      Restart the service with the following command:


      # vmon-cli --restart applmgmt'
    id: V-256650
    rule_id: SV-256650r888472_rule
    rule_version: VCLD-70-000006
    severity: medium
    status: failed
    title: VAMI must produce log records containing sufficient information to establish
      what type of events occurred.
  - checktext: 'At the command prompt, run the following command:


      # find /opt/vmware/var/log/lighttpd/ -xdev -type f -a ''('' -perm -o+w -o -not
      -user root -o -not -group root '')'' -exec ls -ld {} \;


      If any files are returned, this is a finding.'
    fixtext: 'At the command prompt, run the following commands:


      # chmod o-w <file>

      # chown root:root <file>


      Note: Substitute <file> with the listed file.'
    id: V-256651
    rule_id: SV-256651r918984_rule
    rule_version: VCLD-70-000007
    severity: medium
    status: pass
    title: VAMI log files must only be accessible by privileged users.
  - checktext: 'At the command prompt, run the following command:


      # rpm -V VMware-visl-integration|grep vmware-services-applmgmt.conf


      If the command returns any output, this is a finding.'
    fixtext: "Navigate to and open:\n\n/etc/vmware-syslog/vmware-services-applmgmt.conf\n\
      \nCreate the file if it does not exist.\n\nSet the contents of the file as follows:\n\
      \n#applmgmt.log\ninput(type=\"imfile\"\n      File=\"/var/log/vmware/applmgmt/applmgmt.log\"\
      \n      Tag=\"applmgmt\"\n      Severity=\"info\"\n      Facility=\"local0\"\
      )\n#applmgmt-audit.log\ninput(type=\"imfile\"\n      File=\"/var/log/vmware/applmgmt-audit/applmgmt-audit.log\"\
      \n      Tag=\"applmgmt-audit\"\n      Severity=\"info\"\n      Facility=\"local0\"\
      )\n#applmgmt-backup-restore-audit.log\ninput(type=\"imfile\"\n      File=\"\
      /var/log/vmware/applmgmt-audit/applmgmt-br-audit.log\"\n      Tag=\"applmgmt-br-audit\"\
      \n      Severity=\"info\"\n      Facility=\"local0\")\n#vami-access.log\ninput(type=\"\
      imfile\"\n      File=\"/opt/vmware/var/log/lighttpd/access.log\"\n      Tag=\"\
      vami-access\"\n      Severity=\"info\"\n      Facility=\"local0\")\n#vami-error.log\n\
      input(type=\"imfile\"\n      File=\"/opt/vmware/var/log/lighttpd/error.log\"\
      \n      Tag=\"vami-error\"\n      Severity=\"info\"\n      Facility=\"local0\"\
      )\n#dcui.log\ninput(type=\"imfile\"\n      File=\"/var/log/vmware/applmgmt/dcui.log\"\
      \n      Tag=\"dcui\"\n      Severity=\"info\"\n      Facility=\"local0\")\n\
      #detwist.log\ninput(type=\"imfile\"\n      File=\"/var/log/vmware/applmgmt/detwist.log\"\
      \n      Tag=\"detwist\"\n      Severity=\"info\"\n      Facility=\"local0\"\
      )\n#firewall-reload.log\ninput(type=\"imfile\"\n      File=\"/var/log/vmware/applmgmt/firewall-reload.log\"\
      \n      Tag=\"firewall-reload\"\n      Severity=\"info\"\n      Facility=\"\
      local0\")\n#applmgmt_vmonsvc.std*\ninput(type=\"imfile\"\n      File=\"/var/log/vmware/applmgmt/applmgmt_vmonsvc.std*\"\
      \n      Tag=\"applmgmt_vmonsvc\"\n      Severity=\"info\"\n      Facility=\"\
      local0\")\n#backupSchedulerCron\ninput(type=\"imfile\"\n      File=\"/var/log/vmware/applmgmt/backupSchedulerCron.log\"\
      \n      Tag=\"backupSchedulerCron\"\n      Severity=\"info\"\n      Facility=\"\
      local0\")\n#progress.log\ninput(type=\"imfile\"\n      File=\"/var/log/vmware/applmgmt/progress.log\"\
      \n      Tag=\"progress\"\n      Severity=\"info\"\n      Facility=\"local0\"\
      )\n#statsmonitor-alarms\ninput(type=\"imfile\"\n      File=\"/var/log/vmware/applmgmt/statsmonitor-alarms.log\"\
      \n      Tag=\"statsmonitor-alarms\"\n      Severity=\"info\"\n      Facility=\"\
      local0\")\n#StatsMonitor\ninput(type=\"imfile\"\n      File=\"/var/log/vmware/applmgmt/StatsMonitor.log\"\
      \n      Tag=\"StatsMonitor\"\n      Severity=\"info\"\n      Facility=\"local0\"\
      )\n#StatsMonitorStartup.log.std*\ninput(type=\"imfile\"\n      File=\"/var/log/vmware/applmgmt/StatsMonitorStartup.log.std*\"\
      \n      Tag=\"StatsMonitor-Startup\"\n      Severity=\"info\"\n      Facility=\"\
      local0\")\n#PatchRunner\ninput(type=\"imfile\"\n      File=\"/var/log/vmware/applmgmt/PatchRunner.log\"\
      \n      Tag=\"PatchRunner\"\n      Severity=\"info\"\n      Facility=\"local0\"\
      )\n#update_microservice\ninput(type=\"imfile\"\n      File=\"/var/log/vmware/applmgmt/update_microservice.log\"\
      \n      Tag=\"update_microservice\"\n      Severity=\"info\"\n      Facility=\"\
      local0\")\n#vami\ninput(type=\"imfile\"\n      File=\"/var/log/vmware/applmgmt/vami.log\"\
      \n      Tag=\"vami\"\n      Severity=\"info\"\n      Facility=\"local0\")\n\
      #vcdb_pre_patch\ninput(type=\"imfile\"\n      File=\"/var/log/vmware/applmgmt/vcdb_pre_patch.*\"\
      \n      Tag=\"vcdb_pre_patch\"\n      Severity=\"info\"\n      Facility=\"local0\"\
      )\n#dnsmasq.log\ninput(type=\"imfile\"\n      File=\"/var/log/vmware/dnsmasq.log\"\
      \n      Tag=\"dnsmasq\"\n      Severity=\"info\"\n      Facility=\"local0\"\
      )\n#procstate\ninput(type=\"imfile\"\n      File=\"/var/log/vmware/procstate\"\
      \n      Tag=\"procstate\"\n      Severity=\"info\"\n      Facility=\"local0\"\
      )\n#backup.log\ninput(type=\"imfile\"\n      File=\"/var/log/vmware/applmgmt/backup.log\"\
      \n      Tag=\"applmgmt-backup\"\n      Severity=\"info\"\n      Facility=\"\
      local0\")\n#size.log\ninput(type=\"imfile\"\n      File=\"/var/log/vmware/applmgmt/size.log\"\
      \n      Tag=\"applmgmt-size\"\n      Severity=\"info\"\n      Facility=\"local0\"\
      )\n#restore.log\ninput(type=\"imfile\"\n      File=\"/var/log/vmware/applmgmt/restore.log\"\
      \n      Tag=\"applmgmt-restore\"\n      Severity=\"info\"\n      Facility=\"\
      local0\")\n#reconciliation.log\ninput(type=\"imfile\"\n      File=\"/var/log/vmware/applmgmt/reconciliation.log\"\
      \n      Tag=\"applmgmt-reconciliation\"\n      Severity=\"info\"\n      Facility=\"\
      local0\")\n#pnid_change.log\ninput(type=\"imfile\"\n      File=\"/var/log/vmware/applmgmt/pnid_change.log\"\
      \n      Tag=\"applmgmt-pnid-change\"\n      Severity=\"info\"\n      Facility=\"\
      local0\")\n      File=\"/opt/vmware/var/log/lighttpd/error.log\"\n      Tag=\"\
      vami-error\"\n      Severity=\"info\"\n      Facility=\"local0\")\ninput(type=\"\
      imfile\"\n      File=\"/var/log/vmware/applmgmt/dcui.log\"\n      Tag=\"dcui\"\
      \n      Severity=\"info\"\n      Facility=\"local0\")\ninput(type=\"imfile\"\
      \n      File=\"/var/log/vmware/applmgmt/detwist.log\"\n      Tag=\"detwist\"\
      \n      Severity=\"info\"\n      Facility=\"local0\")\ninput(type=\"imfile\"\
      \n      File=\"/var/log/vmware/applmgmt/firewall-reload.log\"\n      Tag=\"\
      firewall-reload\"\n      Severity=\"info\"\n      Facility=\"local0\")\ninput(type=\"\
      imfile\"\n      File=\"/var/log/vmware/applmgmt/applmgmt_vmonsvc.std*\"\n  \
      \    Tag=\"applmgmt_vmonsvc\"\n      Severity=\"info\"\n      Facility=\"local0\"\
      )\ninput(type=\"imfile\"\n      File=\"/var/log/vmware/applmgmt/backupSchedulerCron.log\"\
      \n      Tag=\"backupSchedulerCron\"\n      Severity=\"info\"\n      Facility=\"\
      local0\")\ninput(type=\"imfile\"\n      File=\"/var/log/vmware/applmgmt/progress.log\"\
      \n      Tag=\"progress\"\n      Severity=\"info\"\n      Facility=\"local0\"\
      )\ninput(type=\"imfile\"\n      File=\"/var/log/vmware/applmgmt/statsmoitor-alarms.log\"\
      \n      Tag=\"statsmoitor-alarms\"\n      Severity=\"info\"\n      Facility=\"\
      local0\")\ninput(type=\"imfile\"\n      File=\"/var/log/vmware/applmgmt/StatsMonitor.log\"\
      \n      Tag=\"StatsMonitor\"\n      Severity=\"info\"\n      Facility=\"local0\"\
      )\ninput(type=\"imfile\"\n      File=\"/var/log/vmware/applmgmt/StatsMonitorStartup.log.std*\"\
      \n      Tag=\"StatsMonitor-Startup\"\n      Severity=\"info\"\n      Facility=\"\
      local0\")\ninput(type=\"imfile\"\n      File=\"/var/log/vmware/applmgmt/PatchRunner.log\"\
      \n      Tag=\"PatchRunner\"\n      Severity=\"info\"\n      Facility=\"local0\"\
      )\ninput(type=\"imfile\"\n      File=\"/var/log/vmware/applmgmt/update_microservice.log\"\
      \n      Tag=\"update_microservice\"\n      Severity=\"info\"\n      Facility=\"\
      local0\")\ninput(type=\"imfile\"\n      File=\"/var/log/vmware/applmgmt/vami.log\"\
      \n      Tag=\"vami\"\n      Severity=\"info\"\n      Facility=\"local0\")\n\
      input(type=\"imfile\"\n      File=\"/var/log/vmware/applmgmt/vcdb_pre_patch.*\"\
      \n      Tag=\"vcdb_pre_patch\"\n      Severity=\"info\"\n      Facility=\"local0\"\
      )\ninput(type=\"imfile\"\n      File=\"/var/log/vmware/dnsmasq.log\"\n     \
      \ Tag=\"dnsmasq\"\n      Severity=\"info\"\n      Facility=\"local0\")\ninput(type=\"\
      imfile\"\n      File=\"/var/log/vmware/procstate\"\n      Tag=\"procstate\"\n\
      \      Severity=\"info\"\n      Facility=\"local0\")\ninput(type=\"imfile\"\n\
      \      File=\"/var/log/vmware/applmgmt/backup.log\"\n      Tag=\"applmgmt-backup\"\
      \n      Severity=\"info\"\n      Facility=\"local0\")\ninput(type=\"imfile\"\
      \n      File=\"/var/log/vmware/applmgmt/size.log\"\n      Tag=\"applmgmt-size\"\
      \n      Severity=\"info\"\n      Facility=\"local0\")\ninput(type=\"imfile\"\
      \n      File=\"/var/log/vmware/applmgmt/restore.log\"\n      Tag=\"applmgmt-restore\"\
      \n      Severity=\"info\"\n      Facility=\"local0\")\ninput(type=\"imfile\"\
      \n      File=\"/var/log/vmware/applmgmt/reconciliation.log\"\n      Tag=\"applmgmt-reconciliation\"\
      \n      Severity=\"info\"\n      Facility=\"local0\")\ninput(type=\"imfile\"\
      \n      File=\"/var/log/vmware/applmgmt/pnid_change.log\"\n      Tag=\"applmgmt-pnid-change\"\
      \n      Severity=\"info\"\n      Facility=\"local0\")"
    id: V-256652
    rule_id: SV-256652r888478_rule
    rule_version: VCLD-70-000008
    severity: medium
    status: na
    title: The rsyslog must be configured to monitor VAMI logs.
  - checktext: 'At the command prompt, run the following command:


      # rpm -qa|grep lighttpd|xargs rpm -V|grep -v -E "lighttpd.conf|vami-lighttp.service"


      If the command returns any output, this is a finding.'
    fixtext: 'If the VAMI binaries have been modified from the default state when
      deployed as part of the vCenter Server Appliance (VCSA), the system must be
      wiped and redeployed or restored from backup.


      VMware does not recommend or support recovering from such a state by reinstalling
      RPMs or similar efforts.'
    id: V-256653
    rule_id: SV-256653r888481_rule
    rule_version: VCLD-70-000009
    severity: medium
    status: failed
    title: VAMI server binaries and libraries must be verified for their integrity.
  - checktext: 'At the command prompt, run the following command:


      # /opt/vmware/sbin/vami-lighttpd -p -f /opt/vmware/etc/lighttpd/lighttpd.conf
      2>/dev/null|awk ''/server\.modules/,/\)/''|sed -e ''s/^[ ]*//''


      Expected result:


      server.modules=(

      "mod_access",

      "mod_accesslog",

      "mod_proxy",

      "mod_cgi",

      "mod_rewrite",

      "mod_magnet",

      "mod_setenv",

      #7

      )


      If the output does not match the expected result, this is a finding.


      Note: The command must be run from a bash shell and not from a shell generated
      by the "appliance shell". Use the "chsh" command to change the shell for the
      account to "/bin/bash". Refer to KB Article 2100508 for more details:


      https://kb.vmware.com/s/article/2100508'
    fixtext: "Navigate to and open:\n\n/opt/vmware/etc/lighttpd/lighttpd.conf\n\n\
      Configure the \"server.modules\" section to the following:\n\nserver.modules\
      \ = (\n  \"mod_access\",\n  \"mod_accesslog\",\n  \"mod_proxy\",\n  \"mod_cgi\"\
      ,\n  \"mod_rewrite\",\n)\nserver.modules += ( \"mod_magnet\" )\n\nRestart the\
      \ service with the following command:\n\n# vmon-cli --restart applmgmt"
    id: V-256654
    rule_id: SV-256654r888484_rule
    rule_version: VCLD-70-000010
    severity: medium
    status: pass
    title: VAMI must only load allowed server modules.
  - checktext: 'At the command prompt, run the following command:


      # /opt/vmware/sbin/vami-lighttpd -p -f /opt/vmware/etc/lighttpd/lighttpd.conf
      2>/dev/null|awk ''/mimetype\.assign/,/\)/''|grep -E "\.sh|\.csh"


      If the command returns any value, this is a finding.


      Note: The command must be run from a bash shell and not from a shell generated
      by the "appliance shell". Use the "chsh" command to change the shell for the
      account to "/bin/bash". Refer to KB Article 2100508 for more details:


      https://kb.vmware.com/s/article/2100508'
    fixtext: 'Navigate to and open:


      /opt/vmware/etc/lighttpd/lighttpd.conf


      Remove any lines that reference ".sh" or ".csh" from the "mimetype.assign" section.


      Restart the service with the following command:


      # vmon-cli --restart applmgmt'
    id: V-256655
    rule_id: SV-256655r888487_rule
    rule_version: VCLD-70-000011
    severity: medium
    status: na
    title: VAMI must have Multipurpose Internet Mail Extensions (MIME) that invoke
      operating system shell programs disabled.
  - checktext: 'At the command prompt, run the following command:


      # /opt/vmware/sbin/vami-lighttpd -p -f /opt/vmware/etc/lighttpd/lighttpd.conf
      2>/dev/null|grep "mimetype.use-xattr"|sed ''s: ::g''


      Expected result:


      mimetype.use-xattr="disable"


      If the output does not match the expected result, this is a finding.


      Note: The command must be run from a bash shell and not from a shell generated
      by the "appliance shell". Use the "chsh" command to change the shell for the
      account to "/bin/bash". Refer to KB Article 2100508 for more details:


      https://kb.vmware.com/s/article/2100508'
    fixtext: 'Navigate to and open:


      /opt/vmware/etc/lighttpd/lighttpd.conf


      Add or reconfigure the following value:


      mimetype.use-xattr        = "disable"


      Restart the service with the following command:


      # vmon-cli --restart applmgmt'
    id: V-256656
    rule_id: SV-256656r888490_rule
    rule_version: VCLD-70-000012
    severity: medium
    status: failed
    title: VAMI must explicitly disable Multipurpose Internet Mail Extensions (MIME)
      mime mappings based on "Content-Type".
  - checktext: 'At the command prompt, run the following command:


      # /opt/vmware/sbin/vami-lighttpd -p -f /opt/vmware/etc/lighttpd/lighttpd.conf
      2>/dev/null|awk ''/cgi\.assign/,/\)/''|sed -e ''s/^[ ]*//''


      Expected result:


      cgi.assign                        = (

      ".py"  => "/usr/bin/python",

      ".cgi" => "/usr/bin/python",

      # 2

      )


      If the output does not match the expected result, this is a finding.


      Note: The command must be run from a bash shell and not from a shell generated
      by the "appliance shell". Use the "chsh" command to change the shell for the
      account to "/bin/bash". Refer to KB Article 2100508 for more details:


      https://kb.vmware.com/s/article/2100508'
    fixtext: "Navigate to and open:\n\n/opt/vmware/etc/lighttpd/lighttpd.conf\n\n\
      Configure the \"cgi.assign\" section to the following:\n\ncgi.assign       \
      \          = ( \".py\"  => \"/usr/bin/python\",\n                          \
      \     \".cgi\" =>\"/usr/bin/python\" )\n\nRestart the service with the following\
      \ command:\n\n# vmon-cli --restart applmgmt"
    id: V-256657
