- id: V-256455
  rule_id: SV-256455r959010
  rule_version: VMCH-70-000006
  status: failed
  severity: medium
  title: Independent, nonpersistent disks must not be used on the virtual machine
    (VM).
  checktext: 'From the vSphere Client, right-click the Virtual Machine and go to "Edit
    Settings".


    Review the attached hard disks and verify they are not configured as independent
    nonpersistent disks.


    or


    From a PowerCLI command prompt while connected to the ESXi host or vCenter server,
    run the following command:


    Get-VM "VM Name" | Get-HardDisk | Select Parent, Name, Filename, DiskType, Persistence
    | FT -AutoSize


    If the virtual machine has attached disks that are in independent nonpersistent
    mode and are not documented, this is a finding.'
  fixtext: 'From the vSphere Client, right-click the Virtual Machine and go to "Edit
    Settings".


    Select the target hard disk and change the mode to "persistent" or uncheck "Independent".


    or


    From a PowerCLI command prompt while connected to the ESXi host or vCenter server,
    run the provided commands as shown below.


    Get-VM "VM Name" | Get-HardDisk | Set-HardDisk -Persistence IndependentPersistent


    or


    Get-VM "VM Name" | Get-HardDisk | Set-HardDisk -Persistence Persistent'
