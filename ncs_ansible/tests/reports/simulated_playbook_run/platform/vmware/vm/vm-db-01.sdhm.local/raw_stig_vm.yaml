  severity: low
  title: Drag and drop operations must be disabled on the virtual machine (VM).
  checktext: 'From the vSphere Client, right-click the Virtual Machine and go to Edit
    Settings >> VM Options >> Advanced >> Configuration Parameters >> Edit Configuration.


    Verify the "isolation.tools.dnd.disable" value is set to "true".


    or


    From a PowerCLI command prompt while connected to the ESXi host or vCenter server,
    run the following command:


    Get-VM "VM Name" | Get-AdvancedSetting -Name isolation.tools.dnd.disable


    If the virtual machine advanced setting "isolation.tools.dnd.disable" does not
    exist or is not set to "true", this is a finding.'
  fixtext: 'From the vSphere Client, right-click the Virtual Machine and go to Edit
    Settings >> VM Options >> Advanced >> Configuration Parameters >> Edit Configuration.


    Verify the "isolation.tools.dnd.disable" value is set to "true".


    If the setting does not exist, add the Name and Value setting at the bottom of
    screen.


    Note: The VM must be powered off to configure the advanced settings through the
    vSphere Client. Therefore, it is recommended to configure these settings with
    PowerCLI as this can be done while the VM is powered on. Settings do not take
    effect via either method until the virtual machine is cold started, not rebooted.


    or


    From a PowerCLI command prompt while connected to the ESXi host or vCenter server,
    run the provided commands as noted below.


    If the setting does not exist, run:


    Get-VM "VM Name" | New-AdvancedSetting -Name isolation.tools.dnd.disable -Value
    true


    If the setting exists, run:


    Get-VM "VM Name" | Get-AdvancedSetting -Name isolation.tools.dnd.disable | Set-AdvancedSetting
    -Value true'
