- id: V-256450
  rule_id: SV-256450r959010
  rule_version: VMCH-70-000001
  status: pass
  severity: low
  title: Copy operations must be disabled on the virtual machine (VM).
  checktext: 'From the vSphere Client, right-click the Virtual Machine and go to Edit
    Settings >> VM Options >> Advanced >> Configuration Parameters >> Edit Configuration.


    Verify the "isolation.tools.copy.disable" value is set to true.


    or


    From a PowerCLI command prompt while connected to the ESXi host or vCenter server,
    run the following command:


    Get-VM "VM Name" | Get-AdvancedSetting -Name isolation.tools.copy.disable


    If the virtual machine advanced setting "isolation.tools.copy.disable" does not
    exist or is not set to "true", this is a finding.'
  fixtext: "From the vSphere Client, right-click the Virtual Machine and go to Edit\
    \ Settings >> VM Options >> Advanced >> Configuration Parameters >> Edit Configuration.\n\
    \nFind the \"isolation.tools.copy.disable\" value and set it to \"true\".\n\n\
    If the setting does not exist, add the Name and Value setting at the bottom of\
    \ screen. \n\nNote: The VM must be powered off to configure the advanced settings\
    \ through the vSphere Client. Therefore, it is recommended to configure these\
    \ settings with PowerCLI as this can be done while the VM is powered on. Settings\
    \ do not take effect via either method until the virtual machine is cold started,\
    \ not rebooted.\n\nor\n\nFrom a PowerCLI command prompt while connected to the\
    \ ESXi host or vCenter server, run the provided commands as noted below.\n\nIf\
    \ the setting does not exist, run:\n\nGet-VM \"VM Name\" | New-AdvancedSetting\
    \ -Name isolation.tools.copy.disable -Value true\n\nIf the setting exists, run:\n\
    \nGet-VM \"VM Name\" | Get-AdvancedSetting -Name isolation.tools.copy.disable\
    \ | Set-AdvancedSetting -Value true"
