- id: V-256461
  rule_id: SV-256461r959010
  rule_version: VMCH-70-000012
  status: failed
  severity: medium
  title: Unauthorized USB devices must be disconnected on the virtual machine (VM).
  checktext: 'From the vSphere Client, right-click the Virtual Machine and go to "Edit
    Settings".


    Review the VM''s hardware and verify no USB devices exist.


    or


    From a PowerCLI command prompt while connected to the ESXi host or vCenter server,
    run the following commands:


    Get-VM | Where {$_.ExtensionData.Config.Hardware.Device.DeviceInfo.Label -match
    "usb"}

    Get-VM | Get-UsbDevice


    If a virtual machine has any USB devices or USB controllers present, this is a
    finding.


    If USB smart card readers are used to pass smart cards through the VM console
    to a VM, the use of a USB controller and USB devices for that purpose is not a
    finding.'
  fixtext: 'From the vSphere Client, right-click the Virtual Machine and go to "Edit
    Settings".


    Select the USB controller, click the circled "X" to remove it, and click "OK".


    or


    From a PowerCLI command prompt while connected to the ESXi host or vCenter server,
    run the following command:


    Get-VM "VM Name" | Get-USBDevice | Remove-USBDevice


    Note: This will not remove the USB controller, just any connected devices.'
