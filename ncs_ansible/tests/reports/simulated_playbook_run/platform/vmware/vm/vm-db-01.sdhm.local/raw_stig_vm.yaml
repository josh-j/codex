- id: V-256457
  rule_id: SV-256457r959010
  rule_version: VMCH-70-000008
  status: na
  severity: medium
  title: Unauthorized floppy devices must be disconnected on the virtual machine (VM).
  checktext: 'Floppy drives are no longer visible through the vSphere Client and must
    be done via the Application Programming Interface (API) or PowerCLI.


    From a PowerCLI command prompt while connected to the ESXi host or vCenter server,
    run the following command:


    Get-VM | Get-FloppyDrive | Select Parent, Name, ConnectionState


    If a virtual machine has a floppy drive connected, this is a finding.'
  fixtext: 'Floppy drives are no longer visible through the vSphere Client and must
    be done via the API or PowerCLI.


    From a PowerCLI command prompt while connected to the ESXi host or vCenter server,
    run the following command:


    Get-VM "VM Name" | Get-FloppyDrive | Remove-FloppyDrive


    Note: The VM must be powered off to remove the floppy drive.'
- id: V-256458
  rule_id: SV-256458r959010
  rule_version: VMCH-70-000009
  status: failed
  severity: low
  title: Unauthorized CD/DVD devices must be disconnected on the virtual machine (VM).
  checktext: 'From the vSphere Client, right-click the Virtual Machine and go to "Edit
    Settings".


    Review the VM''s hardware and verify no CD/DVD drives are connected.


    or


    From a PowerCLI command prompt while connected to the ESXi host or vCenter server,
    run the following command:


    Get-VM | Get-CDDrive | Where {$_.extensiondata.connectable.connected -eq $true}
    | Select Parent,Name


    If a virtual machine has a CD/DVD drive connected other than temporarily, this
    is a finding.'
  fixtext: 'From the vSphere Client, right-click the Virtual Machine and go to "Edit
    Settings".


    Select the CD/DVD drive and uncheck "Connected" and "Connect at power on" and
    remove any attached ISOs.


    or


    From a PowerCLI command prompt while connected to the ESXi host or vCenter server,
    run the following command:


    Get-VM "VM Name" | Get-CDDrive | Set-CDDrive -NoMedia'
- id: V-256459
  rule_id: SV-256459r959010
  rule_version: VMCH-70-000010
  status: pass
  severity: medium
  title: Unauthorized parallel devices must be disconnected on the virtual machine
    (VM).
  checktext: 'From the vSphere Client, right-click the Virtual Machine and go to "Edit
    Settings".


    Review the VM''s hardware and verify no parallel devices exist.


    or


    From a PowerCLI command prompt while connected to the ESXi host or vCenter server,
    run the following command:


    Get-VM | Where {$_.ExtensionData.Config.Hardware.Device.DeviceInfo.Label -match
    "parallel"}


    If a virtual machine has a parallel device present, this is a finding.'
  fixtext: 'The VM must be powered off to remove a parallel device.


    From the vSphere Client, right-click the Virtual Machine and go to "Edit Settings".


    Select the parallel device, click the circled "X" to remove it, and click "OK".'
