      - id: V-256326
        rule_id: V-256326
        rule_version: VCSA-70-000070
        status: na
        severity: medium
        title: The vCenter Server must prohibit password reuse for a minimum of five
          generations.
        checktext: 'From the vSphere Client, go to Administration >> Single Sign On
          >> Configuration >> Local Accounts >> Password Policy.


          View the value of the "Restrict reuse" setting.


          If the "Restrict reuse" policy is not set to "5" or more, this is a finding.'
        fixtext: 'From the vSphere Client, go to Administration >> Single Sign On
          >> Configuration >> Local Accounts >> Password Policy.


          Click "Edit", enter "5" as the "Restrict reuse" setting, and click "OK".'
        description: 'From the vSphere Client, go to Administration >> Single Sign
          On >> Configuration >> Local Accounts >> Password Policy.


          View the value of the "Restrict reuse" setting.


          If the "Restrict reuse" policy is not set to "5" or more, this is a finding.'
