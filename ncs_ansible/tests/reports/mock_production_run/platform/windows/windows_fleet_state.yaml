      alerts:
      - severity: CRITICAL
        category: security_compliance
        message: 'STIG Violation: The vCenter Server must use TLS 1.2, at a minimum,
          to protect the confidentiality of sensitive data during electronic dissemination
          using remote access.'
        detail:
          rule_id: V-256318
          description: 'At the command prompt on the vCenter Server Appliance, run
            the following command:


            # /usr/lib/vmware-TlsReconfigurator/VcTlsReconfigurator/reconfigureVc
            scan


            If the output indicates versions of TLS other than 1.2 are enabled, this
            is a finding.'
          original_severity: HIGH
          target_type: windows
        affected_items: []
        recommendation: null
        remediation: null
      - severity: WARNING
        category: security_compliance
        message: 'STIG Violation: The vCenter Server must produce audit records containing
          information to establish what type of events occurred.'
        detail:
          rule_id: V-256321
          description: 'From the vSphere Client, go to Host and Clusters.


            Select a vCenter Server >> Configure >> Settings >> Advanced Settings.


            Verify the "config.log.level" value is set to "info".


            or


            From a PowerCLI command prompt while connected to the vCenter server,
            run the following command:


            Get-AdvancedSetting -Entity <vcenter server name> -Name config.log.level
            and verify it is set to "info".


            If the "config.log.level" value is not set to "info" or does not exist,
            this is a finding.'
          original_severity: MEDIUM
          target_type: windows
        affected_items: []
        recommendation: null
        remediation: null
      - severity: WARNING
        category: security_compliance
        message: 'STIG Violation: The vCenter Server must require multifactor authentication.'
        detail:
          rule_id: V-256324
          description: 'From the vSphere Web Client, go to Administration >> Single
            Sign On >> Configuration >> Identity Provider.


            If the embedded identity provider is used, click on "Smart Card Authentication".


            If the embedded identity provider is used and "Smart Card Authentication"
            is not enabled, this is a finding.


            If a third-party identity provider is used, such as Microsoft ADFS, and
