      - id: V-256331
        rule_id: V-256331
        rule_version: VCSA-70-000077
        status: pass
        severity: high
        title: The vCenter Server must enable FIPS-validated cryptography.
        checktext: "From the vSphere Web Client, go to Developer Center >> API Explorer.\n\
          \nFrom the \"Select API\" drop-down menu, select appliance.\n\nExpand system/security/global_fips\
          \ >> GET.\n\nClick \"Execute\" and then \"Copy Response\"\_ to view the\
          \ results.\n\nExample response:\n\n{\n    \"enabled\": true\n}\n\nIf global\
          \ FIPS mode is not enabled, this is a finding."
        fixtext: "From the vSphere Web Client, go to Developer Center >> API Explorer.\n\
          \nFrom the \"Select API\" drop-down menu, select appliance.\n\nExpand system/security/global_fips\
          \ >> PUT.\n\nIn the response body under \"Try it out\", paste the following:\n\
          \n{\n    \"enabled\": true\n}\n\nClick \"Execute\".\n\nNote: The vCenter\
          \ server reboots after FIPS is enabled or disabled."
        description: "From the vSphere Web Client, go to Developer Center >> API Explorer.\n\
          \nFrom the \"Select API\" drop-down menu, select appliance.\n\nExpand system/security/global_fips\
          \ >> GET.\n\nClick \"Execute\" and then \"Copy Response\"\_ to view the\
          \ results.\n\nExample response:\n\n{\n    \"enabled\": true\n}\n\nIf global\
          \ FIPS mode is not enabled, this is a finding."
