        category: security_compliance
        message: 'STIG Violation: The vCenter Server must enable FIPS-validated cryptography.'
        detail:
          rule_id: V-256331
          description: "From the vSphere Web Client, go to Developer Center >> API\
            \ Explorer.\n\nFrom the \"Select API\" drop-down menu, select appliance.\n\
            \nExpand system/security/global_fips >> GET.\n\nClick \"Execute\" and\
            \ then \"Copy Response\"\_ to view the results.\n\nExample response:\n\
            \n{\n    \"enabled\": true\n}\n\nIf global FIPS mode is not enabled, this\
