          \ FIPS mode is not enabled, this is a finding."
        fixtext: "From the vSphere Web Client, go to Developer Center >> API Explorer.\n\
          \nFrom the \"Select API\" drop-down menu, select appliance.\n\nExpand system/security/global_fips\
          \ >> PUT.\n\nIn the response body under \"Try it out\", paste the following:\n\
          \n{\n    \"enabled\": true\n}\n\nClick \"Execute\".\n\nNote: The vCenter\
