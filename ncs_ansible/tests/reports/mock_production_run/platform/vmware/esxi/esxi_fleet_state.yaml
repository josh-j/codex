      - id: V-256375
        rule_id: V-256375
        rule_version: ESXI-70-000001
        status: pass
        severity: medium
        title: Access to the ESXi host must be limited by enabling lockdown mode.
        checktext: 'For environments that do not use vCenter server to manage ESXi,
          this is not applicable.


          From the vSphere Client, go to Hosts and Clusters.


          Select the ESXi Host >> Configure >> System >> Security Profile.


          Scroll down to "Lockdown Mode" and verify it is set to "Enabled" (Normal
          or Strict).


          or


          From a PowerCLI command prompt while connected to the ESXi host, run the
          following command:


          Get-VMHost | Select Name,@{N="Lockdown";E={$_.Extensiondata.Config.LockdownMode}}


          If "Lockdown Mode" is disabled, this is a finding.'
        fixtext: 'From the vSphere Client, go to Hosts and Clusters.


          Select the ESXi Host >> Configure >> System >> Security Profile >> Lockdown
          Mode.


          Click "Edit...". Select the "Normal" or "Strict" radio buttons.


          or


          From a PowerCLI command prompt while connected to the ESXi host, run the
          following commands:


          $level = "lockdownNormal" OR "lockdownStrict"

          $vmhost = Get-VMHost -Name <hostname> | Get-View

          $lockdown = Get-View $vmhost.ConfigManager.HostAccessManager

          $lockdown.ChangeLockdownMode($level)


          Note: In strict lockdown mode, the Direct Console User Interface (DCUI)
          service is stopped. If the connection to vCenter Server is lost and the
          vSphere Client is no longer available, the ESXi host becomes inaccessible.'
        description: 'For environments that do not use vCenter server to manage ESXi,
          this is not applicable.


          From the vSphere Client, go to Hosts and Clusters.


          Select the ESXi Host >> Configure >> System >> Security Profile.


          Scroll down to "Lockdown Mode" and verify it is set to "Enabled" (Normal
          or Strict).


          or


          From a PowerCLI command prompt while connected to the ESXi host, run the
          following command:


          Get-VMHost | Select Name,@{N="Lockdown";E={$_.Extensiondata.Config.LockdownMode}}


          If "Lockdown Mode" is disabled, this is a finding.'
      - id: V-256376
        rule_id: V-256376
        rule_version: ESXI-70-000002
        status: na
        severity: medium
        title: The ESXi host must verify the DCUI.Access list.
        checktext: 'For environments that do not use vCenter server to manage ESXi,
          this is not applicable.


          From the vSphere Client, go to Hosts and Clusters.


          Select the ESXi Host >> Configure >> System >> Advanced System Settings.


          Select the "DCUI.Access" value and verify only the root user is listed.


          or


          From a PowerCLI command prompt while connected to the ESXi host, run the
          following command:


          Get-VMHost | Get-AdvancedSetting -Name DCUI.Access and verify it is set
          to root.


          If the "DCUI.Access" is not restricted to "root", this is a finding.


          Note: This list is only for local user accounts and should only contain
          the root user.'
        fixtext: 'From the vSphere Client, go to Hosts and Clusters.


          Select the ESXi Host >> Configure >> System >> Advanced System Settings.


          Click "Edit". Select the "DCUI.Access" value and configure it to "root".


          or


          From a PowerCLI command prompt while connected to the ESXi host, run the
          following command:


          Get-VMHost | Get-AdvancedSetting -Name DCUI.Access | Set-AdvancedSetting
          -Value "root"'
        description: 'For environments that do not use vCenter server to manage ESXi,
          this is not applicable.


          From the vSphere Client, go to Hosts and Clusters.


          Select the ESXi Host >> Configure >> System >> Advanced System Settings.


          Select the "DCUI.Access" value and verify only the root user is listed.


          or


          From a PowerCLI command prompt while connected to the ESXi host, run the
          following command:


          Get-VMHost | Get-AdvancedSetting -Name DCUI.Access and verify it is set
          to root.


          If the "DCUI.Access" is not restricted to "root", this is a finding.


          Note: This list is only for local user accounts and should only contain
          the root user.'
      - id: V-256377
        rule_id: V-256377
        rule_version: ESXI-70-000003
        status: open
        severity: medium
        title: The ESXi host must verify the exception users list for lockdown mode.
        checktext: 'For environments that do not use vCenter server to manage ESXi,
          this is not applicable.


          From the vSphere Client, go to Hosts and Clusters.


          Select the ESXi Host >> Configure >> System >> Security Profile.


          Under "Lockdown Mode", review the Exception Users list.


          or


          From a PowerCLI command prompt while connected to the ESXi host, run the
          following script:


          $vmhost = Get-VMHost | Get-View

          $lockdown = Get-View $vmhost.ConfigManager.HostAccessManager

          $lockdown.QueryLockdownExceptions()


          If the Exception Users list contains accounts that do not require special
          permissions, this is a finding.


          Note: The Exception Users list is empty by default and should remain that
          way except under site-specific circumstances.'
        fixtext: 'From the vSphere Client, go to Hosts and Clusters.


          Select the ESXi Host >> Configure >> System >> Security Profile.


          Under "Lockdown Mode", click "Edit" and remove unnecessary users from the
          Exception Users list.'
        description: 'For environments that do not use vCenter server to manage ESXi,
          this is not applicable.


          From the vSphere Client, go to Hosts and Clusters.


          Select the ESXi Host >> Configure >> System >> Security Profile.


          Under "Lockdown Mode", review the Exception Users list.


          or


