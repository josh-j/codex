      - id: V-256382
        rule_id: V-256382
        rule_version: ESXI-70-000008
        status: na
        severity: medium
        title: The ESXi host must display the Standard Mandatory DOD Notice and Consent
          Banner before granting access to the system via Secure Shell (SSH).
        checktext: 'From the vSphere Client, go to Hosts and Clusters.


          Select the ESXi Host >> Configure >> System >> Advanced System Settings.


          Select the "Config.Etc.issue" value and verify it is set to the DOD logon
          banner below.


          or


          From a PowerCLI command prompt while connected to the ESXi host, run the
          following command:


          Get-VMHost | Get-AdvancedSetting -Name Config.Etc.issue


          If the "Config.Etc.issue" setting (/etc/issue file) does not contain the
          logon banner exactly as shown below, this is a finding.


          "You are accessing a U.S. Government (USG) Information System (IS) that
          is provided for USG-authorized use only. By using this IS (which includes
          any device attached to this IS), you consent to the following conditions:
          -The USG routinely intercepts and monitors communications on this IS for
          purposes including, but not limited to, penetration testing, COMSEC monitoring,
          network operations and defense, personnel misconduct (PM), law enforcement
          (LE), and counterintelligence (CI) investigations. -At any time, the USG
          may inspect and seize data stored on this IS. -Communications using, or
          data stored on, this IS are not private, are subject to routine monitoring,
          interception, and search, and may be disclosed or used for any USG-authorized
          purpose. -This IS includes security measures (e.g., authentication and access
          controls) to protect USG interests--not for your personal benefit or privacy.
          -Notwithstanding the above, using this IS does not constitute consent to
          PM, LE or CI investigative searching or monitoring of the content of privileged
          communications, or work product, related to personal representation or services
          by attorneys, psychotherapists, or clergy, and their assistants. Such communications
          and work product are private and confidential. See User Agreement for details."'
        fixtext: 'From the vSphere Client, go to Hosts and Clusters.


          Select the ESXi Host >> Configure >> System >> Advanced System Settings.


          Click "Edit". Select the "Config.Etc.issue" value and set it to the following:


          "You are accessing a U.S. Government (USG) Information System (IS) that
          is provided for USG-authorized use only. By using this IS (which includes
          any device attached to this IS), you consent to the following conditions:
          -The USG routinely intercepts and monitors communications on this IS for
          purposes including, but not limited to, penetration testing, COMSEC monitoring,
          network operations and defense, personnel misconduct (PM), law enforcement
          (LE), and counterintelligence (CI) investigations. -At any time, the USG
          may inspect and seize data stored on this IS. -Communications using, or
          data stored on, this IS are not private, are subject to routine monitoring,
          interception, and search, and may be disclosed or used for any USG-authorized
          purpose. -This IS includes security measures (e.g., authentication and access
          controls) to protect USG interests--not for your personal benefit or privacy.
          -Notwithstanding the above, using this IS does not constitute consent to
          PM, LE or CI investigative searching or monitoring of the content of privileged
          communications, or work product, related to personal representation or services
          by attorneys, psychotherapists, or clergy, and their assistants. Such communications
          and work product are private and confidential. See User Agreement for details."


          or


          From a PowerCLI command prompt while connected to the ESXi host, run the
          following command:


          Get-VMHost | Get-AdvancedSetting -Name Config.Etc.issue | Set-AdvancedSetting
          -Value "<insert logon banner>"'
        description: 'From the vSphere Client, go to Hosts and Clusters.


          Select the ESXi Host >> Configure >> System >> Advanced System Settings.


          Select the "Config.Etc.issue" value and verify it is set to the DOD logon
          banner below.


          or


          From a PowerCLI command prompt while connected to the ESXi host, run the
          following command:


          Get-VMHost | Get-AdvancedSetting -Name Config.Etc.issue


          If the "Config.Etc.issue" setting (/etc/issue file) does not contain the
          logon banner exactly as shown below, this is a finding.


          "You are accessing a U.S. Government (USG) Information System (IS) that
          is provided for USG-authorized use only. By using this IS (which includes
          any device attached to this IS), you consent to the following conditions:
          -The USG routinely intercepts and monitors communications on this IS for
          purposes including, but not limited to, penetration testing, COMSEC monitoring,
          network operations and defense, personnel misconduct (PM), law enforcement
          (LE), and counterintelligence (CI) investigations. -At any time, the USG
          may inspect and seize data stored on this IS. -Communications using, or
          data stored on, this IS are not private, are subject to routine monitoring,
          interception, and search, and may be disclosed or used for any USG-authorized
          purpose. -This IS includes security measures (e.g., authentication and access
          controls) to protect USG interests--not for your personal benefit or privacy.
          -Notwithstanding the above, using this IS does not constitute consent to
          PM, LE or CI investigative searching or monitoring of the content of privileged
          communications, or work product, related to personal representation or services
          by attorneys, psychotherapists, or clergy, and their assistants. Such communications
          and work product are private and confidential. See User Agreement for details."'
      - id: V-256383
        rule_id: V-256383
        rule_version: ESXI-70-000009
        status: open
        severity: medium
        title: The ESXi host SSH daemon must be configured with the DOD logon banner.
        checktext: 'From an ESXi shell, run the following command:


          # /usr/lib/vmware/openssh/bin/sshd -T|grep banner


          Expected result:


          banner /etc/issue


          If the output does not match the expected result, this is a finding.'
        fixtext: 'From an ESXi shell, add or correct the following line in "/etc/ssh/sshd_config":


          Banner /etc/issue'
        description: 'From an ESXi shell, run the following command:


          # /usr/lib/vmware/openssh/bin/sshd -T|grep banner


          Expected result:


          banner /etc/issue


          If the output does not match the expected result, this is a finding.'
      - id: V-256384
        rule_id: V-256384
        rule_version: ESXI-70-000010
        status: pass
        severity: medium
        title: The ESXi host Secure Shell (SSH) daemon must use FIPS 140-2 validated
          cryptographic modules to protect the confidentiality of remote access sessions.
        checktext: 'From an ESXi shell, run the following command:


          # esxcli system security fips140 ssh get


          or


          From a PowerCLI command prompt while connected to the ESXi host, run the
          following commands:


          $esxcli = Get-EsxCli -v2

          $esxcli.system.security.fips140.ssh.get.invoke()


          Expected result:


          Enabled: true


          If the output does not match the expected result, this is a finding.'
        fixtext: 'From an ESXi shell, run the following command:


          # esxcli system security fips140 ssh set -e true


          or


          From a PowerCLI command prompt while connected to the ESXi host, run the
          following commands:


          $esxcli = Get-EsxCli -v2

          $arguments = $esxcli.system.security.fips140.ssh.set.CreateArgs()

          $arguments.enable = $true

          $esxcli.system.security.fips140.ssh.set.Invoke($arguments)'
        description: 'From an ESXi shell, run the following command:


          # esxcli system security fips140 ssh get


          or


          From a PowerCLI command prompt while connected to the ESXi host, run the
          following commands:


          $esxcli = Get-EsxCli -v2

          $esxcli.system.security.fips140.ssh.get.invoke()


          Expected result:


          Enabled: true


          If the output does not match the expected result, this is a finding.'
      - id: V-256385
        rule_id: V-256385
        rule_version: ESXI-70-000012
        status: na
        severity: medium
        title: The ESXi host Secure Shell (SSH) daemon must ignore ".rhosts" files.
        checktext: 'From an ESXi shell, run the following command:


          # /usr/lib/vmware/openssh/bin/sshd -T|grep ignorerhosts


          Expected result:


          ignorerhosts yes


          If the output does not match the expected result, this is a finding.'
        fixtext: 'From an ESXi shell, add or correct the following line in "/etc/ssh/sshd_config":


          IgnoreRhosts yes'
        description: 'From an ESXi shell, run the following command:


          # /usr/lib/vmware/openssh/bin/sshd -T|grep ignorerhosts


