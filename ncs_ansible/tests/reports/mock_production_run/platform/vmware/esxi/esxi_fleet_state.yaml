          permissions, this is a finding.


          Note: The Exception Users list is empty by default and should remain that
          way except under site-specific circumstances.'
      - id: V-256378
        rule_id: V-256378
        rule_version: ESXI-70-000004
        status: pass
        severity: medium
        title: Remote logging for ESXi hosts must be configured.
        checktext: 'From the vSphere Client, go to Hosts and Clusters.


          Select the ESXi Host >> Configure >> System >> Advanced System Settings.


          Select the "Syslog.global.logHost" value and verify it is set to a site-specific
          syslog server.


          Follow the conventions shown below:


          udp://<IP/FQDN>:514

          tcp://<IP/FQDN>:514

          ssl://<IP/FQDN>:1514


          Multiple servers can be specified when separated by commas.


          or


          From a PowerCLI command prompt while connected to the ESXi host, run the
          following command:


          Get-VMHost | Get-AdvancedSetting -Name Syslog.global.logHost


          If the "Syslog.global.logHost" setting is not set to a valid, site-specific
          syslog server, this is a finding.'
        fixtext: 'From the vSphere Client, go to Hosts and Clusters.


          Select the ESXi Host >> Configure >> System >> Advanced System Settings.


          Click "Edit". Select the "Syslog.global.logHost" value and configure it
          to a site-specific syslog server.


          or


          From a PowerCLI command prompt while connected to the ESXi host, run the
          following command:


          Get-VMHost | Get-AdvancedSetting -Name Syslog.global.logHost | Set-AdvancedSetting
          -Value "<syslog server hostname>"'
        description: 'From the vSphere Client, go to Hosts and Clusters.


