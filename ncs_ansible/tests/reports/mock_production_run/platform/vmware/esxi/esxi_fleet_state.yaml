      - severity: WARNING
        category: security_compliance
        message: 'STIG Violation: The ESXi host must verify the DCUI.Access list.'
        detail:
          rule_id: V-256376
          description: 'For environments that do not use vCenter server to manage
            ESXi, this is not applicable.


            From the vSphere Client, go to Hosts and Clusters.


            Select the ESXi Host >> Configure >> System >> Advanced System Settings.


            Select the "DCUI.Access" value and verify only the root user is listed.


            or


            From a PowerCLI command prompt while connected to the ESXi host, run the
            following command:


            Get-VMHost | Get-AdvancedSetting -Name DCUI.Access and verify it is set
            to root.


            If the "DCUI.Access" is not restricted to "root", this is a finding.


            Note: This list is only for local user accounts and should only contain
            the root user.'
          original_severity: MEDIUM
          target_type: esxi
        affected_items: []
        recommendation: null
        remediation: null
      - severity: WARNING
        category: security_compliance
        message: 'STIG Violation: The ESXi host must enforce the limit of three consecutive
          invalid logon attempts by a user.'
        detail:
