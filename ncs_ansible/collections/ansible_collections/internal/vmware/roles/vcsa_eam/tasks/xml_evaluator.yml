---
# Generic XML evaluator for VCSA STIG rules.
# Looped from the role task file over the role's XML rules list.

- name: "{{ item.stig_id }} - {{ item.desc }}"
  community.general.xml:
    path: "{{ lookup('vars', item.xml_path) }}"
    xpath: "{{ item.xpath }}"
    attribute: "{{ item.attribute | default(omit) }}"
    value: "{{ item.value | default(omit) }}"
    state: "{{ item.state | default('present') }}"
    namespaces: "{{ item.namespaces | default(omit) }}"
  tags:
    - "{{ item.stig_id }}"
  notify:
    - "{{ _vcsa_notify_handler }}"
  when:
    - "{{ item.manage_var }}"
