---
# Data-driven XML rules for EAM STIG remediation.
# Consumed by xml_evaluator.yml.

eam_xml_rules:
  - stig_id: "VCEM-70-000001"
    desc: "ESX Agent Manager must limit the amount of time that each TCP connection is kept alive."
    xml_path: "var_server_xml_path"
    xpath: "/Server/Service/Connector"
    attribute: "connectionTimeout"
    value: "{{ var_server_xml_connectiontimeout }}"
    manage_var: "run_connection_timeout | bool"

  - stig_id: "VCEM-70-000002"
    desc: "ESX Agent Manager must limit the number of concurrent connections permitted"
    xml_path: "var_server_xml_path"
    xpath: '/Server/Service/Executor[@name="tomcatThreadPool"]'
    attribute: "maxThreads"
    value: "{{ var_server_xml_maxthreads }}"
    manage_var: "run_max_threads | bool"

  - stig_id: "VCEM-70-000003"
    desc: "ESX Agent Manager must limit the maximum size of a POST request"
    xml_path: "var_server_xml_path"
    xpath: "/Server/Service/Connector/@maxPostSize"
    state: "absent"
    manage_var: "run_max_post_size | bool"

  - stig_id: "VCEM-70-000004"
    desc: "ESX Agent Manager must protect cookies from XSS"
    xml_path: "var_web_xml_path"
    xpath: "/x:web-app/x:session-config/x:cookie-config/x:http-only"
    value: "{{ var_web_xml_http_only }}"
    namespaces:
      x: "http://java.sun.com/xml/ns/javaee"
    manage_var: "run_http_only | bool"

  - stig_id: "VCEM-70-000005"
    desc: "ESX Agent Manager must record user access in a format that enables monitoring of remote access"
    xml_path: "var_server_xml_path"
    xpath: '/Server/Service/Engine/Host/Valve[@className="org.apache.catalina.valves.AccessLogValve"]'
    attribute: "pattern"
    value: "{{ var_server_xml_access_log_valve_pattern }}"
    manage_var: "run_access_valve_pattern | bool"

  - stig_id: "VCEM-70-000010"
    desc: "Remove GlobalNamingResources"
    xml_path: "var_server_xml_path"
    xpath: "/Server/GlobalNamingResources"
    state: "absent"
    manage_var: "run_user_database_realm | bool"

  - stig_id: "VCEM-70-000010"
    desc: "Remove Realm"
    xml_path: "var_server_xml_path"
    xpath: "/Server/Service/Engine/Realm"
    state: "absent"
    manage_var: "run_user_database_realm | bool"

  - stig_id: "VCEM-70-000012"
    desc: "MIME that invoke OS shell programs disabled CSH"
    xml_path: "var_web_xml_path"
    xpath: '/x:web-app/x:mime-mapping/x:extension[text()="csh"]/..'
    state: "absent"
    namespaces:
      x: "http://java.sun.com/xml/ns/javaee"
    manage_var: "run_removed_mime_mappings | bool"

  - stig_id: "VCEM-70-000012"
    desc: "MIME that invoke OS shell programs disabled SH"
    xml_path: "var_web_xml_path"
    xpath: '/x:web-app/x:mime-mapping/x:extension[text()="sh"]/..'
    state: "absent"
    namespaces:
      x: "http://java.sun.com/xml/ns/javaee"
    manage_var: "run_removed_mime_mappings | bool"

  - stig_id: "VCEM-70-000012"
    desc: "MIME that invoke OS shell programs disabled SHAR"
    xml_path: "var_web_xml_path"
    xpath: '/x:web-app/x:mime-mapping/x:extension[text()="shar"]/..'
    state: "absent"
    namespaces:
      x: "http://java.sun.com/xml/ns/javaee"
    manage_var: "run_removed_mime_mappings | bool"

  - stig_id: "VCEM-70-000012"
    desc: "MIME that invoke OS shell programs disabled KSH"
    xml_path: "var_web_xml_path"
    xpath: '/x:web-app/x:mime-mapping/x:extension[text()="ksh"]/..'
    state: "absent"
    namespaces:
      x: "http://java.sun.com/xml/ns/javaee"
    manage_var: "run_removed_mime_mappings | bool"

  - stig_id: "VCEM-70-000013"
    desc: "ESX Agent Manager must have mappings set for Java servlet pages."
    xml_path: "var_web_xml_path"
    xpath: '/x:web-app/x:servlet-mapping[x:servlet-name="JspServlet"]/x:url-pattern'
    value: "{{ var_web_xml_servlet_jsp_url_pattern }}"
    namespaces:
      x: "http://java.sun.com/xml/ns/javaee"
    manage_var: "run_java_servlet | bool"

  - stig_id: "VCEM-70-000014"
    desc: "ESX Agent Manager must not have the Web Distributed Authoring (WebDAV) servlet installed."
    xml_path: "var_web_xml_path"
    xpath: '/x:web-app/x:servlet-mapping[x:servlet-name="webdav"]/..'
    state: "absent"
    namespaces:
      x: "http://java.sun.com/xml/ns/javaee"
    manage_var: "run_remove_webdav | bool"

  - stig_id: "VCEM-70-000015"
    desc: "ESX Agent Manager must be configured with memory leak protection."
    xml_path: "var_server_xml_path"
    xpath: '/Server/Listener[@className="org.apache.catalina.core.JreMemoryLeakPreventionListener"]'
    state: "present"
    manage_var: "run_mem_leak_prevention | bool"

  - stig_id: "VCEM-70-000019"
    desc: "ESX Agent Manager must limit the number of allowed connections."
    xml_path: "var_server_xml_path"
    xpath: "/Server/Service/Connector"
    attribute: "acceptCount"
    value: "{{ var_server_xml_acceptcount }}"
    manage_var: "run_accept_count | bool"

  - stig_id: "VCEM-70-000020"
    desc: "ESX Agent Manager must set URIEncoding to UTF-8."
    xml_path: "var_server_xml_path"
    xpath: "/Server/Service/Connector"
    attribute: "URIEncoding"
    value: "{{ var_server_xml_uriencoding }}"
    manage_var: "run_uri_encoding | bool"

  - stig_id: "VCEM-70-000022"
    desc: "ESX Agent Manager must set the welcome-file node to a default web page."
    xml_path: "var_web_xml_path"
    xpath: "/x:web-app/x:welcome-file-list/x:welcome-file"
    value: "{{ var_web_xml_welcome_file_list }}"
    namespaces:
      x: "http://java.sun.com/xml/ns/javaee"
    manage_var: "run_web_welcome_file | bool"

  - stig_id: "VCEM-70-000023"
    desc: "ESX Agent Manager must not show directory listings."
    xml_path: "var_web_xml_path"
    xpath: '/x:web-app/x:servlet/x:init-param/x:param-name[text()="listings"]/..'
    state: "absent"
    namespaces:
      x: "http://java.sun.com/xml/ns/javaee"
    manage_var: "run_web_remove_listings | bool"

  - stig_id: "VCEM-70-000024"
    desc: "ESX Agent Manager must configured to show error pages with minimal information."
    xml_path: "var_web_xml_path"
    xpath: '/x:web-app/x:error-page[x:exception-type="java.lang.Throwable"]/x:location'
    value: "{{ var_web_xml_error_page }}"
    namespaces:
      x: "http://java.sun.com/xml/ns/javaee"
    manage_var: "run_web_error_page | bool"

  - stig_id: "VCEM-70-000025"
    desc: "ESX Agent Manager must be configured to not show error reports. showServerInfo"
    xml_path: "var_server_xml_path"
    xpath: '/Server/Service/Engine/Host/Valve[@className="org.apache.catalina.valves.ErrorReportValve"]'
    attribute: "showServerInfo"
    value: "{{ var_server_xml_show_server_info }}"
    manage_var: "run_hide_error_reports | bool"

  - stig_id: "VCEM-70-000025"
    desc: "ESX Agent Manager must be configured to not show error reports. showReport"
    xml_path: "var_server_xml_path"
    xpath: '/Server/Service/Engine/Host/Valve[@className="org.apache.catalina.valves.ErrorReportValve"]'
    attribute: "showReport"
    value: "{{ var_server_xml_show_server_report }}"
    manage_var: "run_hide_error_reports | bool"

  - stig_id: "VCEM-70-000026"
    desc: "ESX Agent Manager must hide the server version."
    xml_path: "var_server_xml_path"
    xpath: "/Server/Service/Connector"
    attribute: "server"
    value: "{{ var_server_xml_server }}"
    manage_var: "run_server_anonymous | bool"

  - stig_id: "VCEM-70-000027"
    desc: "ESX Agent Manager must not enable support for TRACE requests."
    xml_path: "var_server_xml_path"
    xpath: "/Server/Service/Connector/@allowTrace"
    state: "absent"
    manage_var: "run_allow_trace | bool"

  - stig_id: "VCEM-70-000028"
    desc: "ESX Agent Manager must have the debug option turned off."
    xml_path: "var_web_xml_path"
    xpath: '/x:web-app/x:servlet/x:init-param/x:param-name[text()="debug"]/..'
    state: "absent"
    namespaces:
      x: "http://java.sun.com/xml/ns/javaee"
    manage_var: "run_web_remove_debug | bool"

  - stig_id: "VCEM-70-000030"
    desc: "ESX Agent Manager must set the secure flag for cookies."
    xml_path: "var_web_xml_path"
    xpath: "/x:web-app/x:session-config/x:cookie-config/x:secure"
    value: "{{ var_web_xml_cookie_secure }}"
    namespaces:
      x: "http://java.sun.com/xml/ns/javaee"
    manage_var: "run_web_cookie_secure | bool"

  - stig_id: "VCEM-70-000033"
    desc: "ESX Agent Manager default servlet must be set to readonly."
    xml_path: "var_web_xml_path"
    xpath: '/x:web-app/x:servlet/x:servlet-name[text()="default"]/../x:init-param/param-name[text()="readonly"]'
    state: "absent"
    namespaces:
      x: "http://java.sun.com/xml/ns/javaee"
    manage_var: "run_web_remove_readonly | bool"
