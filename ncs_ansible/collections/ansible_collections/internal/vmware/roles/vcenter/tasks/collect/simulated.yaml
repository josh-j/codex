---
# internal.vmware.vcenter : tasks/collect/simulated.yaml
# Loads fixture data shaped like callback raw_vcenter artifacts and maps it onto
# the same _raw_* variables expected by assemble.yaml.

- name: Simulation | Ensure fixture exists for vCenter host
  ansible.builtin.stat:
    path: "{{ simulation_vcenter_fixture_file }}"
  register: _sim_vcenter_fixture
  delegate_to: localhost
  changed_when: false

- name: Simulation | Abort when fixture file is missing
  ansible.builtin.assert:
    that:
      - _sim_vcenter_fixture.stat.exists
    fail_msg: "Simulation fixture not found: {{ simulation_vcenter_fixture_file }}"
    success_msg: "Loaded simulation fixture: {{ simulation_vcenter_fixture_file }}"

- name: Simulation | Load fixture document
  ansible.builtin.set_fact:
    _sim_vcenter_doc: "{{ lookup('ansible.builtin.file', simulation_vcenter_fixture_file) | from_yaml }}"
  changed_when: false

- name: Simulation | Normalize fixture payload envelope
  ansible.builtin.set_fact:
    _sim_vcenter_payload: >-
      {{
        _sim_vcenter_doc.data
        if (_sim_vcenter_doc is mapping and _sim_vcenter_doc.data is defined)
        else (_sim_vcenter_doc | default({}))
      }}
  changed_when: false

- name: Simulation | Map fixture payload to raw module variables
  ansible.builtin.set_fact:
    _raw_appliance_health: "{{ _sim_vcenter_payload.appliance_health_info | default({}) }}"
    _raw_appliance_backup: "{{ _sim_vcenter_payload.appliance_backup_info | default({}) }}"
    _raw_datacenters: "{{ _sim_vcenter_payload.datacenters_info | default({}) }}"
    _raw_clusters: "{{ _sim_vcenter_payload.clusters_info | default({}) }}"
    _raw_datastores:
      results:
        - datastores: "{{ _sim_vcenter_payload.datastores_info.datastores | default([]) }}"
    _raw_vms: "{{ _sim_vcenter_payload.vms_info | default({}) }}"
    _raw_snapshots:
      results:
        - vmware_all_snapshots_info: "{{ _sim_vcenter_payload.snapshots_info.snapshots | default([]) }}"
    _raw_alarms: "{{ _sim_vcenter_payload.alarms_info | default({}) }}"
  changed_when: false
