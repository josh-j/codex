---
# internal.vmware.stig : vm/vm_v7r4.yaml
#
# Clean drop-in VM V7R4 STIG tasks for a single VM (_current_vm_name).
# Included via check.yaml which injects: check_mode, ignore_errors, tags.
#
# Conventions:
#   - Each task has ONLY: name, module, parameters, when guard
#   - NO register (except functional), NO ignore_errors, NO tags
#   - Toggle guard: vmch_70_NNNNNN_Manage | default(true)
#   - Advanced settings driven by vm_stig_rules.yaml (data-driven loop)
#
# Credentials come from module_defaults in tasks/main.yaml.
# Task naming: stigrule_NNNNNN_<desc> for callback compatibility.

# =========================================================================
# INIT: V-number mapping (kept for reporting/callback reference)
# =========================================================================

- name: "VM STIG | Initialize for {{ _current_vm_name }}"
  ansible.builtin.set_fact:
    _vm_stig_id_map:
      VMCH-70-000001: "V-256450"
      VMCH-70-000002: "V-256451"
      VMCH-70-000003: "V-256452"
      VMCH-70-000004: "V-256453"
      VMCH-70-000005: "V-256454"
      VMCH-70-000006: "V-256455"
      VMCH-70-000007: "V-256456"
      VMCH-70-000008: "V-256457"
      VMCH-70-000009: "V-256458"
      VMCH-70-000010: "V-256459"
      VMCH-70-000011: "V-256460"
      VMCH-70-000012: "V-256461"
      VMCH-70-000013: "V-256462"
      VMCH-70-000015: "V-256463"
      VMCH-70-000016: "V-256464"
      VMCH-70-000017: "V-256465"
      VMCH-70-000018: "V-256466"
      VMCH-70-000022: "V-256470"
      VMCH-70-000023: "V-256471"
      VMCH-70-000024: "V-256472"
      VMCH-70-000025: "V-256473"
      VMCH-70-000026: "V-256474"
      VMCH-70-000027: "V-256475"
      VMCH-70-000019: "V-256467"
      VMCH-70-000020: "V-256468"
      VMCH-70-000021: "V-256469"
      VMCH-70-000028: "V-256476"
      VMCH-70-000029: "V-256477"
  changed_when: false
  check_mode: false

# =========================================================================
# PRE-TASK: Gather VM info for hardware/attribute assertions
# =========================================================================

- name: "VM STIG | Gather info for {{ _current_vm_name }}"
  community.vmware.vmware_vm_info:
    vm_name: "{{ _current_vm_name }}"
  register: _vm_info_raw
  check_mode: false

- name: "VM STIG | Extract VM details"
  ansible.builtin.set_fact:
    _vm_detail: "{{ _vm_info_raw.virtual_machines | default([]) | first | default({}) }}"
  changed_when: false
  check_mode: false

# =========================================================================
# GROUP A: Advanced settings — data-driven loop
# =========================================================================

- name: "VM STIG | Load advanced settings rules"
  ansible.builtin.include_vars:
    file: vm_stig_rules.yaml

- name: "VM STIG | Apply advanced settings"
  ansible.builtin.include_tasks: v7r4/advanced_settings_evaluator.yaml
  loop: "{{ vm_advanced_settings_rules }}"

# V-256466 / VMCH-70-000018: Shared salt values must be disabled
- name: stigrule_256466_pshare_salt
  ansible.builtin.debug:
    msg: "VMCH-70-000018: sched.mem.pshare.salt should be absent on {{ _current_vm_name }}"
  when: vmch_70_000018_Manage | default(true) | bool

# =========================================================================
# GROUP B: Hardware assertions & remediation
# =========================================================================

# --- VMCH-70-000008 / floppy ---
- name: stigrule_256457_floppy_assert
  ansible.builtin.assert:
    that:
      - "_vm_detail.floppy_drives | default(0) | int == 0"
    fail_msg: "VM {{ _current_vm_name }} has {{ _vm_detail.floppy_drives }} floppy drives"
    success_msg: "VM {{ _current_vm_name }} has no floppy drives"
  when:
    - vmch_70_000008_Manage | default(true) | bool
    - not (vmware_stig_enable_hardening | default(false) | bool)

- name: stigrule_256457_floppy_remediate
  community.vmware.vmware_guest:
    name: "{{ _current_vm_name }}"
    hardware:
      floppy:
        - state: absent
  when:
    - vmch_70_000008_Manage | default(true) | bool
    - vmware_stig_enable_hardening | default(false) | bool
    - "_vm_detail.floppy_drives | default(0) | int > 0"

# --- VMCH-70-000009 / cdrom ---
- name: stigrule_256458_cdrom_assert
  ansible.builtin.assert:
    that:
      - "_vm_detail.cdrom | default([]) | length == 0"
    fail_msg: "VM {{ _current_vm_name }} has {{ _vm_detail.cdrom | length }} CD-ROM devices"
    success_msg: "VM {{ _current_vm_name }} has no CD-ROM devices"
  when:
    - vmch_70_000009_Manage | default(true) | bool
    - not (vmware_stig_enable_hardening | default(false) | bool)

- name: stigrule_256458_cdrom_remediate
  community.vmware.vmware_guest:
    name: "{{ _current_vm_name }}"
    hardware:
      cdrom:
        - state: absent
  when:
    - vmch_70_000009_Manage | default(true) | bool
    - vmware_stig_enable_hardening | default(false) | bool
    - "_vm_detail.cdrom | default([]) | length > 0"

# --- VMCH-70-000010 / parallel ---
- name: stigrule_256459_parallel_assert
  ansible.builtin.assert:
    that:
      - "_vm_detail.parallel_ports | default(0) | int == 0"
    fail_msg: "VM {{ _current_vm_name }} has {{ _vm_detail.parallel_ports }} parallel ports"
    success_msg: "VM {{ _current_vm_name }} has no parallel ports"
  when:
    - vmch_70_000010_Manage | default(true) | bool
    - not (vmware_stig_enable_hardening | default(false) | bool)

- name: stigrule_256459_parallel_remediate
  community.vmware.vmware_guest:
    name: "{{ _current_vm_name }}"
    hardware:
      parallel:
        - state: absent
  when:
    - vmch_70_000010_Manage | default(true) | bool
    - vmware_stig_enable_hardening | default(false) | bool
    - "_vm_detail.parallel_ports | default(0) | int > 0"

# --- VMCH-70-000011 / serial ---
- name: stigrule_256460_serial_assert
  ansible.builtin.assert:
    that:
      - "_vm_detail.serial_ports | default(0) | int == 0"
    fail_msg: "VM {{ _current_vm_name }} has {{ _vm_detail.serial_ports }} serial ports"
    success_msg: "VM {{ _current_vm_name }} has no serial ports"
  when:
    - vmch_70_000011_Manage | default(true) | bool
    - not (vmware_stig_enable_hardening | default(false) | bool)

- name: stigrule_256460_serial_remediate
  community.vmware.vmware_guest:
    name: "{{ _current_vm_name }}"
    hardware:
      serial:
        - state: absent
  when:
    - vmch_70_000011_Manage | default(true) | bool
    - vmware_stig_enable_hardening | default(false) | bool
    - "_vm_detail.serial_ports | default(0) | int > 0"

# --- VMCH-70-000012 / USB ---
- name: stigrule_256461_usb_assert
  ansible.builtin.assert:
    that:
      - "_vm_detail.usb_controllers | default(0) | int == 0"
    fail_msg: "VM {{ _current_vm_name }} has {{ _vm_detail.usb_controllers }} USB controllers"
    success_msg: "VM {{ _current_vm_name }} has no USB controllers"
  when:
    - vmch_70_000012_Manage | default(true) | bool
    - not (vmware_stig_enable_hardening | default(false) | bool)

- name: stigrule_256461_usb_remediate
  community.vmware.vmware_guest:
    name: "{{ _current_vm_name }}"
    hardware:
      usb_controller:
        - state: absent
  when:
    - vmch_70_000012_Manage | default(true) | bool
    - vmware_stig_enable_hardening | default(false) | bool
    - "_vm_detail.usb_controllers | default(0) | int > 0"

# --- VMCH-70-000006 / disk persistence ---
- name: stigrule_256455_disk_persistence
  ansible.builtin.debug:
    msg: "VMCH-70-000006: Disk persistence mode requires manual inspection for {{ _current_vm_name }}"
  when: vmch_70_000006_Manage | default(true) | bool

# V-256467 / VMCH-70-000019: dvFilter network API access
- name: stigrule_256467_dvfilter
  ansible.builtin.debug:
    msg: "VMCH-70-000019: dvFilter network API access requires manual inspection for {{ _current_vm_name }}"
  when: vmch_70_000019_Manage | default(true) | bool

# V-256468 / VMCH-70-000020: Template usage for VM deployment
- name: stigrule_256468_template_usage
  ansible.builtin.debug:
    msg: "VMCH-70-000020: Template usage for VM deployment requires manual policy verification for {{ _current_vm_name }}"
  when: vmch_70_000020_Manage | default(true) | bool

# V-256469 / VMCH-70-000021: VM console usage minimization
- name: stigrule_256469_console_minimize
  ansible.builtin.debug:
    msg: "VMCH-70-000021: VM console usage minimization requires manual policy verification for {{ _current_vm_name }}"
  when: vmch_70_000021_Manage | default(true) | bool

# V-256476 / VMCH-70-000028: DirectPath I/O (PCI passthrough)
- name: stigrule_256476_pci_passthru
  ansible.builtin.debug:
    msg: "VMCH-70-000028: DirectPath I/O (PCI passthrough) must be disabled when not required — requires manual inspection for {{ _current_vm_name }}"
  when: vmch_70_000028_Manage | default(true) | bool

# =========================================================================
# GROUP C: VM attribute assertions & remediation
# =========================================================================

# --- VMCH-70-000024 / vMotion encryption ---
- name: stigrule_256472_vmotion_encryption_assert
  ansible.builtin.assert:
    that:
      - "_vm_detail.vmotion_encryption | default('disabled') == 'required'"
    fail_msg: "VM {{ _current_vm_name }} vMotion encryption is {{ _vm_detail.vmotion_encryption | default('disabled') }}"
    success_msg: "VM {{ _current_vm_name }} vMotion encryption is correct"
  when:
    - vmch_70_000024_Manage | default(true) | bool
    - not (vmware_stig_enable_hardening | default(false) | bool)

- name: stigrule_256472_vmotion_encryption_remediate
  community.vmware.vmware_guest:
    name: "{{ _current_vm_name }}"
    vmotion_encryption: required
  when:
    - vmch_70_000024_Manage | default(true) | bool
    - vmware_stig_enable_hardening | default(false) | bool
    - "_vm_detail.vmotion_encryption | default('disabled') != 'required'"

# --- VMCH-70-000025 / Logging ---
- name: stigrule_256473_logging_assert
  ansible.builtin.assert:
    that:
      - "_vm_detail.logging_enabled | default(false) == true"
    fail_msg: "VM {{ _current_vm_name }} logging is disabled"
    success_msg: "VM {{ _current_vm_name }} logging is enabled"
  when:
    - vmch_70_000025_Manage | default(true) | bool
    - not (vmware_stig_enable_hardening | default(false) | bool)

- name: stigrule_256473_logging_remediate
  community.vmware.vmware_guest:
    name: "{{ _current_vm_name }}"
    advanced_settings:
      - key: vmx.log.enabled
        value: "TRUE"
  when:
    - vmch_70_000025_Manage | default(true) | bool
    - vmware_stig_enable_hardening | default(false) | bool
    - "_vm_detail.logging_enabled | default(false) == false"

# --- VMCH-70-000029 / FT encryption ---
- name: stigrule_256477_ft_encryption_assert
  ansible.builtin.assert:
    that:
      - "_vm_detail.ft_encryption | default('disabled') == 'required'"
    fail_msg: "VM {{ _current_vm_name }} FT encryption is {{ _vm_detail.ft_encryption | default('disabled') }}"
    success_msg: "VM {{ _current_vm_name }} FT encryption is correct"
  when:
    - vmch_70_000029_Manage | default(true) | bool
    - not (vmware_stig_enable_hardening | default(false) | bool)

- name: stigrule_256477_ft_encryption_remediate
  community.vmware.vmware_guest:
    name: "{{ _current_vm_name }}"
    ft_encryption: required
  when:
    - vmch_70_000029_Manage | default(true) | bool
    - vmware_stig_enable_hardening | default(false) | bool
    - "_vm_detail.ft_encryption | default('disabled') != 'required'"
