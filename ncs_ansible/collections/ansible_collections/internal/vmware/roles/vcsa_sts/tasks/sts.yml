    path: '{{ var_logging_props_path }}'
    section: null
    state: present
    option: 'handlers'
    value: '{{ var_logging_props_handlers }}'
    mode: "0600"
  tags:
    - VCST-70-000006
  when:
    - run_logging_properties | bool

