# VMware vSphere 7.0 vCenter Server Appliance STS Ansible Playbook

---
############################################

# Backup files that may be modified in case restoration is needed

- name: Create time stamp
  ansible.builtin.set_fact:
    backup_timestamp: "{{ lookup('pipe', 'date +%Y-%m-%d-%H-%M-%S') }}"
  when:
    - create_backups | bool

- name: Backup files...if restoring be sure to restore permissions that original file had!!
  ansible.builtin.copy:
    remote_src: true
    src: "{{ item }}"
    dest: "/tmp/ansible-vcsa-sts-backups-{{ backup_timestamp }}/"
    mode: preserve
  with_items:
    - '{{ var_server_xml_path }}'
    - '{{ var_web_xml_path }}'
    - '{{ var_logging_props_path }}'
    - '{{ var_catalina_props_path }}'
    - '{{ var_syslog_conf_path }}'
  changed_when: false
  register: backupresult
  failed_when:
    - backupresult.msg is defined
    - "'not found' not in backupresult.msg"
  when:
    - create_backups | bool

############################################

# Data-driven XML rules (26 rules)
# Covers: VCST-70-000001, 000002, 000003, 000004, 000005, 000010,
#         000012 (×4), 000013 (×2), 000014, 000015, 000019, 000020,
#         000022 (×3), 000023, 000024 (×2), 000025, 000026, 000030, 000031

- name: "Load STS STIG XML rules"
  ansible.builtin.include_vars:
    file: sts_stig_rules.yaml

- name: "Apply STS STIG XML rules"
  ansible.builtin.include_tasks: xml_evaluator.yml
  loop: "{{ sts_xml_rules }}"
  vars:
    _vcsa_notify_handler: "restart sts"

