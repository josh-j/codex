---
# tasks/v7r4/explicit_remediation.yaml
# Mixed declarative aliases and explicit PowerShell remediation rules

- name: "Load PowerShell rules"
  ansible.builtin.include_vars:
    file: pwsh_rules.yaml

- name: "Execute Explicit Remediation PowerShell STIG Rules"
  ansible.builtin.include_tasks: v7r4/pwsh_evaluator.yaml
  loop: "{{ esxi_pwsh_rules | selectattr('file', 'equalto', 'explicit_remediation.yaml') | list }}"

# Declarative Hardening Remediation Aliases
# These tasks emit debug messages to satisfy the reporting requirement that a rule has a _remediate component,
# when the actual remediation was already natively handled by the declarative module execution.

- name: stigrule_256376_dcui_access_remediate
  ansible.builtin.debug:
    msg: "ESXI-70-000002 remediation handled by stigrule_256376_dcui_access."
  changed_when: false
  when:
    - vmware_stig_enable_hardening | default(false) | bool
    - esxi_70_000002_Manage | default(esxi_70_000002) | default(true) | bool

