---
# tasks/v7r4/pwsh_evaluator.yaml
# Generic query/assert/remediate executor for PowerShell STIG rules

- name: "stigrule_{{ item.rule_id }}_{{ item.desc | default('pwsh') }}_query"
  ansible.builtin.shell:
    executable: /bin/bash
    cmd: |
      set -o pipefail
      pwsh -NoProfile -Command "
      {{ _pwsh_preamble }}
      {{ item.query_cmd }}
      "
  environment:
    VC_PASS: "{{ vmware_password | string | trim }}"
    AD_PASS: "{{ esxi_stig_ad_join_password | default('') | string | trim }}"
  register: _q_result
  changed_when: false
  check_mode: false
  no_log: true
  when: "{{ item.manage_var }}"

- name: "stigrule_{{ item.rule_id }}_{{ item.desc | default('pwsh') }}_assert"
  ansible.builtin.assert:
    that: "{{ item.assert_eval }}"
    fail_msg: "{{ item.fail_msg | default('Rule failed') }}"
    success_msg: "{{ item.success_msg | default('Rule passed') }}"
  when:
    - "{{ item.manage_var }}"
    - _q_result is not skipped
    - not (_q_result.failed | default(false))
    - not (vmware_stig_enable_hardening | default(false) | bool)
  vars:
    # Need to alias the dynamic _q_256... variable so the existing assert logic continues to work
    "{{ item.reg_var }}": "{{ _q_result }}"

- name: "stigrule_{{ item.rule_id }}_{{ item.desc | default('pwsh') }}_remediate"
  ansible.builtin.shell:
    executable: /bin/bash
    cmd: |
      set -o pipefail
      pwsh -NoProfile -Command "
      {{ _pwsh_preamble }}
      {{ item.remediate_cmd }}
      "
  environment:
    VC_PASS: "{{ vmware_password | string | trim }}"
    AD_PASS: "{{ esxi_stig_ad_join_password | default('') | string | trim }}"
  register: _r_result
  changed_when: false
  check_mode: false
  no_log: true
  when:
    - "'remediate_cmd' in item"
    - "{{ item.manage_var }}"
    - vmware_stig_enable_hardening | default(false) | bool
    - not (_q_result.failed | default(false))
    - "{{ item.remediate_when | default(['false']) | join(' and ') }}"
  vars:
    "{{ item.reg_var }}": "{{ _q_result }}"
