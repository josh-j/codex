---
# tasks/v7r4/ssh_evaluator.yaml
# Assert against pre-fetched sshd config for a single rule

- name: "stigrule_{{ item.rule_id }}_{{ item.desc }}_assert"
  ansible.builtin.assert:
    that:
      - "not (_sshd_config_result.failed | default(false))"
      - "((_sshd_config_lines | default([])) | select('match', '(?i)^' + item.key + '\\s') | list | first | default('') | lower | trim) == '{{ item.expected }}'"
    fail_msg: "{{ item.fail_msg | default('Rule failed') }}{{ ' (sshd config gather failed)' if (_sshd_config_result.failed | default(false)) else '' }}"
    success_msg: "{{ item.success_msg | default('Rule passed') }}"
  ignore_errors: true # noqa: ignore-errors — ncs_collector captures the failure; must not halt remaining rules
  when:
    - "{{ item.manage_var }}"
    - _sshd_config_result is not skipped
    - not (vmware_stig_enable_hardening | default(false) | bool)
