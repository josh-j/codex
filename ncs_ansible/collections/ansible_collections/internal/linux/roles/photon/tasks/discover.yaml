---
# internal.linux.photon : tasks/discover.yaml

- name: Ensure distribution facts are gathered
  ansible.builtin.setup:
    gather_subset:
      - "distribution"
  when: ansible_distribution is not defined
  tags: [always]

- name: Check OS Family
  ansible.builtin.fail:
    msg: "This role is for Photon OS only. Found: {{ ansible_facts['distribution'] | default('Unknown') }}"
  when: ansible_facts['distribution'] | default('') not in ['VMware Photon OS', 'PhotonOS']

- name: Gather base system facts
  ansible.builtin.setup:
    gather_subset:
      - hardware
      - mounts
      - network

- name: Photon | Emit discovery telemetry
  ansible.builtin.set_stats:
    data:
      ncs_collect:
        platform: "photon"
        name: "discovery"
        report_directory: "{{ ncs_config.report_directory | default('/srv/samba/reports') }}"
        payload:
          ansible_facts: "{{ ansible_facts }}"
    per_host: true
  when: not (photon_skip_export | default(false) | bool)
  changed_when: false
