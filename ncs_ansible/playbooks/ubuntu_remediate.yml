---
# playbooks/ubuntu_remediate.yml
# Compatibility wrapper for Ubuntu remediation workflow.

- name: "Composite Ubuntu Remediate | Pre-Discover"
  ansible.builtin.import_playbook: ubuntu_discover.yml

- name: "Composite Ubuntu Remediate | Apply"
  ansible.builtin.import_playbook: ubuntu_remediate_apply.yml

- name: "Composite Ubuntu Remediate | Post-Discover"
  ansible.builtin.import_playbook: ubuntu_discover.yml
