---
# playbooks/site_remediate.yml
# Primary orchestrator for the NCS automated remediation and hardening pipeline.
# This playbook applies security controls and configuration standards across
# the infrastructure, including VMware, Linux, and Windows environments.
# It runs in a specific order: initial discovery, hardening, and final verification.

# Phase 1: Environment Readiness
- name: "Phase 1: Initialize Reporting Environment"
  ansible.builtin.import_playbook: setup_env.yml

# Phase 2: VMware STIG Hardening
- name: "Phase 2: VMware Infrastructure Hardening"
  ansible.builtin.import_playbook: vmware_stig_remediate.yml

# Phase 3: Linux Fleet Hardening
- name: "Phase 3: Linux System Hardening"
  ansible.builtin.import_playbook: ubuntu_stig_remediate.yml

- name: "Phase 3b: Photon OS Hardening"
  ansible.builtin.import_playbook: photon_stig_remediate.yml

# Phase 4: Windows Fleet Hardening
- name: "Phase 4: Windows System Hardening"
  ansible.builtin.import_playbook: windows_stig_remediate.yml

# Phase 5: Verification & Unified Reporting
- name: "Phase 5: Final Compliance Assessment"
  ansible.builtin.import_playbook: generate_reports.yml
