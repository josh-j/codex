---
# playbooks/vmware_stig_audit.yml
# Compatibility wrapper that runs VMware STIG audit targets (ESXi, VM, VCSA).

- name: "Composite VMware STIG Audit | ESXi"
  ansible.builtin.import_playbook: vmware_esxi_stig_audit.yml

- name: "Composite VMware STIG Audit | VM"
  ansible.builtin.import_playbook: vmware_vm_stig_audit.yml

- name: "Composite VMware STIG Audit | VCSA"
  ansible.builtin.import_playbook: vmware_vcsa_stig_audit.yml
