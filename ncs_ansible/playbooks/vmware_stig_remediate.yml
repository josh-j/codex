---
# playbooks/vmware_stig_remediate.yml
# Compatibility wrapper that runs VMware STIG remediation targets (ESXi, VM, VCSA).

- name: "Composite VMware STIG Remediation | ESXi"
  ansible.builtin.import_playbook: vmware_esxi_stig_remediate.yml

- name: "Composite VMware STIG Remediation | VM"
  ansible.builtin.import_playbook: vmware_vm_stig_remediate.yml

- name: "Composite VMware STIG Remediation | VCSA"
  ansible.builtin.import_playbook: vmware_vcsa_stig_remediate.yml
