# yaml-language-server: $schema=../../.schemas/ncs_reporter_config_schema.json
config:
  display_name: "VMware VCSA"
  platform: vmware/vcsa
  stig:
    ansible_playbook:
      path: "internal.vmware.vcsa_stig_remediate"
      target_var: "vcsa_stig_target_hosts"
    platform_to_checklist:
      vcsa: cklb_skeletons/cklb_skeleton_vsphere7_vcsa_V1R3.json
      vcenter: cklb_skeletons/cklb_skeleton_vsphere7_vcsa_V1R3.json
      vami: cklb_skeletons/cklb_skeleton_vsphere7_vami_V1R2.json
      eam: cklb_skeletons/cklb_skeleton_vsphere7_vca_eam_V1R2.json
      lookup_svc: cklb_skeletons/cklb_skeleton_vsphere7_vca_lookup_svc_V1R2.json
      perfcharts: cklb_skeletons/cklb_skeleton_vsphere7_vca_perfcharts_V1R1.json
      vcsa_photon_os: cklb_skeletons/cklb_skeleton_vsphere7_vca_photon_os_V1R4.json
      postgresql: cklb_skeletons/cklb_skeleton_vsphere7_vca_postgresql_V1R2.json
      rhttpproxy: cklb_skeletons/cklb_skeleton_vsphere7_vca_rhttpproxy_V1R1.json
      sts: cklb_skeletons/cklb_skeleton_vsphere7_vca_sts_V1R2.json
      ui: cklb_skeletons/cklb_skeleton_vsphere7_vca_ui_V1R2.json
    rule_prefix_to_platform:
      VMCH: vm
      ESXI: esxi
      VC: vcsa
      PH: photon
  extra_inventory_widget_columns:
    - name: Version
      value: "{{ appliance_version }}"
vars:
  # All raw_vcsa.data.* fields are auto-imported from the collector payload.
  # Only computed/derived vars and display metadata need explicit declaration.
  appliance_uptime_days:
    compute: "{{ appliance_uptime_seconds / 86400 }}"
  alarm_count:
    thresholds:
      warn_if_above: 1
      crit_if_above: 5

alerts:
  - id: appliance_health_red
    category: "Appliance Health"
    severity: CRITICAL
    when: appliance_health_overall == 'red'
    msg: "VCSA component failure: overall health is RED"

  - id: appliance_health_yellow
    category: "Appliance Health"
    severity: WARNING
    suppress_if: appliance_health_red
    when: appliance_health_overall == 'yellow'
    msg: "VCSA degraded: overall health is YELLOW"

  - id: appliance_health_gray
    category: "Data Quality"
    severity: WARNING
    suppress_if: [appliance_health_red, appliance_health_yellow]
    when: appliance_health_overall == 'gray'
    msg: "VCSA health unknown: overall health is GRAY — check permissions and API availability"

  - id: ssh_enabled
    category: "Security"
    severity: WARNING
    when: ssh_enabled == 1.0
    msg: "Hardening violation: SSH is enabled on VCSA"

  - id: shell_enabled
    category: "Security"
    severity: WARNING
    when: shell_enabled == 1.0
    msg: "Hardening violation: interactive shell is enabled on VCSA"

  - id: ntp_disabled
    category: "Time Synchronization"
    severity: WARNING
    when: ntp_mode not in ['NTP', 'HOST']
    msg: "Time sync misconfigured: NTP mode is '{{ ntp_mode }}' — clock drift may affect logs and certificates"

  - id: appliance_uptime_excessive
    category: "Appliance Lifecycle"
    severity: WARNING
    when: appliance_uptime_days >= 90.0
    msg: "VCSA has not been rebooted in {{ appliance_uptime_days | round(0) }} days — may be missing patches"

  - id: appliance_uptime_recent_reboot
    category: "Appliance Lifecycle"
    severity: WARNING
    suppress_if: appliance_uptime_excessive
    when: appliance_uptime_days < 1.0
    msg: "VCSA was rebooted less than 24 hours ago — verify this was planned"

  - id: no_backup_schedule
    category: "Data Protection"
    severity: CRITICAL
    when: backup_schedule_count <= 0
    msg: "DR risk: no file-based backup schedule configured on VCSA"

  - id: backup_schedule_disabled
    category: "Data Protection"
    severity: CRITICAL
    when: backup_schedules | selectattr('enabled', 'eq', false) | list | length > 0
    msg: "DR risk: a configured backup schedule is DISABLED on VCSA"

  - id: active_critical_alarms
    category: "vCenter Alarms"
    severity: CRITICAL
    when: active_alarms | selectattr('severity', 'eq', 'critical') | list | length > 0
    msg: "Active CRITICAL alarms detected in vCenter ({{ alarm_count }} total triggered)"

  - id: active_warning_alarms
    category: "vCenter Alarms"
    severity: WARNING
    suppress_if: active_critical_alarms
    when: active_alarms | selectattr('severity', 'eq', 'warning') | list | length > 0
    msg: "Active WARNING alarms detected in vCenter ({{ alarm_count }} total triggered)"

widgets:

  - type: table
    name: "Active vCenter Alarms"
    rows: "{{ active_alarms }}"
    columns:
      - name: Alarm
        value: "{{ alarm_name }}"
      - name: Entity
        value: "{{ entity }}"
      - name: Severity
        value: "{{ severity }}"
        as: status-badge
      - name: Time
        value: "{{ time }}"
      - name: Description
        value: "{{ description }}"
  - type: stat-cards
    slug: inventory_kpis
    name: "Infrastructure KPIs"
    cards:
      - name: Datacenters
        value: "{{ datacenter_count }}"
      - name: Clusters
        value: "{{ cluster_count }}"
      - name: ESXi Hosts
        value: "{{ esxi_host_count }}"
      - name: Datastores
        value: "{{ datastore_count }}"
      - name: DVSwitches
        value: "{{ dvswitch_count }}"
      - name: Resource Pools
        value: "{{ resource_pool_count }}"
      - name: Licenses
        value: "{{ license_count }}"
      - name: Alarms
        value: "{{ alarm_count }}"

  - type: key-value
    name: "Appliance Overview"
    layout: half
    fields:
      - name: Version
        value: "{{ appliance_version }}"
      - name: Build
        value: "{{ appliance_build }}"
      - name: Health Overall
        value: "{{ appliance_health_overall }}"
        as: status-badge
      - name: Health CPU
        value: "{{ appliance_health_cpu }}"
        as: status-badge
      - name: Health Memory
        value: "{{ appliance_health_memory }}"
        as: status-badge
      - name: Health DB
        value: "{{ appliance_health_database }}"
        as: status-badge
      - name: Health Storage
        value: "{{ appliance_health_storage }}"
        as: status-badge
      - name: Uptime (days)
        value: "{{ appliance_uptime_days }}"
      - name: SSH Enabled
        value: "{{ ssh_enabled }}"
        as: status-badge
      - name: NTP Mode
        value: "{{ ntp_mode }}"
      - name: Backup Schedules
        value: "{{ backup_schedule_count }}"
      - name: Extensions
        value: "{{ extension_count }}"
      - name: Content Libraries
        value: "{{ content_library_count }}"
      - name: Tag Categories
        value: "{{ tag_category_count }}"
  - type: table
    name: "Clusters"
    when: cluster_count > 0
    rows: "{{ clusters }}"
    columns:
      - name: Cluster
        value: "{{ name }}"
      - name: Datacenter
        value: "{{ datacenter }}"
      - name: Hosts
        value: "{{ host_count }}"
      - name: HA
        value: "{{ ha_enabled }}"
        as: status-badge
      - name: DRS
        value: "{{ drs_enabled }}"
        as: status-badge
      - name: CPU %
        value: "{{ cpu_usage_pct }}"
      - name: Mem %
        value: "{{ mem_usage_pct }}"
  - type: table
    name: "Datastores"
    when: datastore_count > 0
    rows: "{{ datastores }}"
    columns:
      - name: Name
        value: "{{ name }}"
      - name: Capacity (GB)
        value: "{{ capacity_gb }}"
      - name: Free (GB)
        value: "{{ free_gb }}"
      - name: Used %
        value: "{{ used_pct }}"
  - type: table
    name: "Resource Pools"
    when: resource_pool_count > 0
    rows: "{{ resource_pools }}"
    columns:
      - name: Name
        value: "{{ name }}"
      - name: CPU Reservation
        value: "{{ runtime_cpu_reservation_used }}"
      - name: CPU Limit
        value: "{{ runtime_cpu_overall_usage }}"
      - name: Memory Reservation
        value: "{{ runtime_memory_reservation_used }}"
      - name: Memory Limit
        value: "{{ runtime_memory_overall_usage }}"
  - type: table
    name: "Distributed Switches"
    when: dvswitch_count > 0
    rows: "{{ dvswitches }}"
    columns:
      - name: Name
        value: "{{ name }}"
      - name: Ports
        value: "{{ num_ports }}"
      - name: Uplinks
        value: "{{ num_uplinks }}"
      - name: MTU
        value: "{{ mtu }}"
  - type: table
    name: "Distributed Portgroups"
    when: dvs_portgroup_count > 0
    rows: "{{ dvs_portgroups }}"
    columns:
      - name: Name
        value: "{{ portgroup_name }}"
      - name: Switch
        value: "{{ dvswitch_name }}"
      - name: VLAN
        value: "{{ vlan_id }}"
      - name: Ports
        value: "{{ num_ports }}"
      - name: Type
        value: "{{ port_binding }}"
  - type: table
    name: "Licenses"
    when: license_count > 0
    rows: "{{ licenses }}"
    columns:
      - name: Name
        value: "{{ name }}"
      - name: Edition
        value: "{{ edition }}"
      - name: Total
        value: "{{ total }}"
      - name: Used
        value: "{{ used }}"
      - name: Expiration
        value: "{{ expiration_date }}"
  - type: table
    name: "Extensions"
    when: extension_count > 0
    rows: "{{ extensions }}"
    columns:
      - name: Label
        value: "{{ ext_label }}"
      - name: Company
        value: "{{ ext_company }}"
      - name: Version
        value: "{{ ext_version }}"
      - name: Last Heartbeat
        value: "{{ ext_last_heartbeat_time }}"
  - type: table
    name: "Content Libraries"
    when: content_library_count > 0
    rows: "{{ content_libraries }}"
    columns:
      - name: Name
        value: "{{ lib_name }}"
      - name: Type
        value: "{{ lib_type }}"
      - name: Description
        value: "{{ lib_description }}"
  - type: table
    name: "Backup Schedules"
    when: backup_schedule_count > 0
    rows: "{{ backup_schedules }}"
    columns:
      - name: Name
        value: "{{ name }}"
      - name: Enabled
        value: "{{ enabled }}"
        as: status-badge
        style_rules:
          - when: enabled == 0.0
            css_class: "sv-critical"
      - name: Location
        value: "{{ location }}"
      - name: Retain Count
        value: "{{ retain_count }}"