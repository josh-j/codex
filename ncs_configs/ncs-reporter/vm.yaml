# yaml-language-server: $schema=../../.schemas/ncs_reporter_config_schema.json
config:
  display_name: "VMware VM"
  platform: vmware/vm
  stig:
    ansible_playbook:
      path: "internal.vmware.vm_stig_remediate"
      target_var: "vm_stig_target_vms"
    platform_to_checklist:
      vm: cklb_skeletons/cklb_skeleton_vsphere7_vms_V1R4.json
  extra_fleet_widget_columns:
    - name: VMs
      value: "{{ vm_count }}"
    - name: Snapshots
      value: "{{ snapshot_count }}"
    - name: Powered Off
      value: "{{ powered_off_vm_count }}"
# ---------------------------------------------------------------------------
# Fields
# ---------------------------------------------------------------------------

vars:
  # All raw_vm.data.* fields are auto-imported from the collector payload.
  # Only scripts and computes need explicit declaration.

  virtual_machines:
    script:
      run: "get_vms_list.py"
      args:
        exclude_patterns: "{{ infra_patterns }}"
    type: list

  snapshot_age_days: 7

  snapshots:
    script:
      run: "normalize_snapshots.py"
      args:
        mode: list
        age_days: 7
    type: list

  snapshot_count:
    thresholds:
      warn_if_above: 1
      crit_if_above: 10

  powered_off_vms:
    compute: "{{ virtual_machines | selectattr('power_state', 'eq', 'poweredOff') | list }}"
    type: list

  powered_on_vms:
    compute: "{{ virtual_machines | selectattr('power_state', 'eq', 'poweredOn') | list }}"
    type: list

  vms_tools_not_running:
    compute: "{{ powered_on_vms | selectattr('tools_status', 'eq', 'toolsNotRunning') | list }}"
    type: list

  vms_tools_not_installed:
    compute: "{{ powered_on_vms | selectattr('tools_status', 'eq', 'toolsNotInstalled') | list }}"
    type: list

  aged_snapshots:
    compute: "{{ snapshots | selectattr('days_old', 'ge', snapshot_age_days) | list }}"
    type: list

  vms_never_backup:
    compute: "{{ virtual_machines | selectattr('backup_never', 'equalto', true) | list }}"
    type: list

  vms_no_backup_tags:
    compute: "{{ virtual_machines | selectattr('backup_expected_days', 'equalto', -1) | list }}"
    type: list

  vms_overdue_backup:
    compute: "{{ virtual_machines | selectattr('backup_overdue', 'equalto', true) | list }}"
    type: list

  vms_no_owner_email:
    compute: "{{ virtual_machines | rejectattr('owner_email', 'match', '^.+@.+\\..+$') | list }}"
    type: list

  vms_missing_owner_desc:
    compute: "{{ virtual_machines | selectattr('owner_tag', 'ne', '') | selectattr('owner_description', 'equalto', '') | list }}"
    type: list

  powered_off_vm_count:
    compute: "{{ powered_off_vms | length }}"
    thresholds:
      warn_if_above: 1
      crit_if_above: 5

  vms_tools_not_running_count:
    compute: "{{ vms_tools_not_running | length }}"

  vms_tools_not_installed_count:
    compute: "{{ vms_tools_not_installed | length }}"

  aged_snapshot_count:
    compute: "{{ aged_snapshots | length }}"

  vms_never_backup_count:
    compute: "{{ vms_never_backup | length }}"

  vms_no_backup_tags_count:
    compute: "{{ vms_no_backup_tags | length }}"

  vms_overdue_backup_count:
    compute: "{{ vms_overdue_backup | length }}"

  vms_no_owner_email_count:
    compute: "{{ vms_no_owner_email | length }}"

  vms_missing_owner_desc_count:
    compute: "{{ vms_missing_owner_desc | length }}"

# ---------------------------------------------------------------------------
# Alerts
# ---------------------------------------------------------------------------

alerts:
  - id: powered_off_vms
    category: "Workload Inventory"
    severity: WARNING
    when: powered_off_vm_count > 0
    items: "{{ powered_off_vms }}"
    msg: "{{ powered_off_vm_count }} powered-off VM(s) detected — review for cleanup or licensing"

  - id: vm_tools_not_running
    category: "Workload Compliance"
    severity: WARNING
    when: vms_tools_not_running_count > 0
    items: "{{ vms_tools_not_running }}"
    msg: "{{ vms_tools_not_running_count }} powered-on VM(s) with VMware Tools not running"

  - id: vm_tools_not_installed
    category: "Workload Compliance"
    severity: WARNING
    when: vms_tools_not_installed_count > 0
    items: "{{ vms_tools_not_installed }}"
    msg: "{{ vms_tools_not_installed_count }} powered-on VM(s) with VMware Tools not installed"

  - id: snapshots_present
    category: "Snapshots"
    severity: WARNING
    when: snapshot_count > 0
    msg: "{{ snapshot_count }} VM snapshot(s) present — review for removal"

  - id: aged_snapshots
    category: "Snapshots"
    severity: CRITICAL
    when: aged_snapshot_count > 0
    items: "{{ aged_snapshots }}"
    msg: "{{ aged_snapshot_count }} snapshot(s) older than {{ snapshot_age_days }} days"

  - id: vms_never_backup
    category: "Data Protection"
    severity: CRITICAL
    when: vms_never_backup_count > 0
    items: "{{ vms_never_backup }}"
    msg: "{{ vms_never_backup_count }} VM(s) scheduled for backup have never been backed up"

  - id: vms_no_backup_tags
    category: "Data Protection"
    severity: CRITICAL
    when: vms_no_backup_tags_count > 0
    items: "{{ vms_no_backup_tags }}"
    msg: "{{ vms_no_backup_tags_count }} VM(s) missing a Backup Schedule tag"

  - id: vms_overdue_backup
    category: "Data Protection"
    severity: CRITICAL
    when: vms_overdue_backup_count > 0
    items: "{{ vms_overdue_backup }}"
    msg: "{{ vms_overdue_backup_count }} VM(s) have overdue backups (past the Backup Schedule cadence)"

  - id: vms_no_owner_email
    category: "Ownership"
    severity: INFO
    when: vms_no_owner_email_count > 0
    items: "{{ vms_no_owner_email }}"
    msg: "{{ vms_no_owner_email_count }} VM(s) missing a valid Owner Email attribute"

  - id: vms_missing_owner_desc
    category: "Ownership"
    severity: INFO
    when: vms_missing_owner_desc_count > 0
    items: "{{ vms_missing_owner_desc }}"
    msg: "{{ vms_missing_owner_desc_count }} VM(s) with an Owner tag but empty description"

# ---------------------------------------------------------------------------
# Widgets
# ---------------------------------------------------------------------------

widgets:

  - type: stat-cards
    slug: vm_kpis
    name: "VM KPIs"
    cards:
      - name: VMs
        value: "{{ vm_count }}"
      - name: Snapshots
        value: "{{ snapshot_count }}"
      - name: Powered Off
        value: "{{ powered_off_vm_count }}"

  - type: grouped-table
    name: "Virtual Machines"
    rows: "{{ virtual_machines }}"
    group_by: "{{ cluster }}"
    columns:
      - name: Name
        value: "{{ guest_name }}"
        link_field: "{{ guest_name }}"
      - name: Power State
        value: "{{ power_state }}"
        as: status-badge
        style_rules:
          - when: power_state == 'poweredOff'
            css_class: "subtle-text"
      - name: Tools Status
        value: "{{ tools_status }}"
        as: status-badge
      - name: Cluster
        value: "{{ cluster }}"
      - name: IP Address
        value: "{{ ip_address }}"
      - name: Memory (MB)
        value: "{{ allocated.memory }}"
      - name: vCPU
        value: "{{ allocated.cpu }}"
      - name: Owner Email
        value: "{{ owner_email }}"
      - name: Last Backup
        value: "{{ backup_info }}"
  - type: table
    name: "Snapshots"
    when: snapshot_count > 0
    rows: "{{ snapshots }}"
    columns:
      - name: VM
        value: "{{ vm_name }}"
      - name: Owner Email
        value: "{{ owner_email }}"
      - name: Snapshot
        value: "{{ name }}"
      - name: Created
        value: "{{ creation_time }}"
      - name: State
        value: "{{ state }}"
      - name: Days Old
        value: "{{ 'Unknown' if days_old == -1 else days_old }}"

  - type: table
    name: "VMs Never Backed Up"
    when: vms_never_backup_count > 0
    rows: "{{ vms_never_backup }}"
    columns:
      - name: Name
        value: "{{ guest_name }}"
      - name: Datacenter
        value: "{{ datacenter }}"
      - name: Cluster
        value: "{{ cluster }}"
      - name: Schedule
        value: "{{ backup_schedule }}"
      - name: Owner Email
        value: "{{ owner_email }}"

  - type: table
    name: "VMs Missing Backup Tag"
    when: vms_no_backup_tags_count > 0
    rows: "{{ vms_no_backup_tags }}"
    columns:
      - name: Name
        value: "{{ guest_name }}"
      - name: Datacenter
        value: "{{ datacenter }}"
      - name: Cluster
        value: "{{ cluster }}"
      - name: Owner Email
        value: "{{ owner_email }}"

  - type: table
    name: "VMs With Overdue Backups"
    when: vms_overdue_backup_count > 0
    rows: "{{ vms_overdue_backup }}"
    columns:
      - name: Name
        value: "{{ guest_name }}"
      - name: Datacenter
        value: "{{ datacenter }}"
      - name: Cluster
        value: "{{ cluster }}"
      - name: Schedule
        value: "{{ backup_schedule }}"
      - name: Last Backup
        value: "{{ last_backup_at }}"
      - name: Days Since
        value: "{{ days_since_backup }}"
      - name: Expected (days)
        value: "{{ backup_expected_days }}"
      - name: Owner Email
        value: "{{ owner_email }}"

  - type: table
    name: "VMs Missing Owner Email"
    when: vms_no_owner_email_count > 0
    rows: "{{ vms_no_owner_email }}"
    columns:
      - name: Name
        value: "{{ guest_name }}"
      - name: Datacenter
        value: "{{ datacenter }}"
      - name: Cluster
        value: "{{ cluster }}"
      - name: Owner Tag
        value: "{{ owner_tag }}"

  - type: table
    name: "VMs With Owner Tag But No Description"
    when: vms_missing_owner_desc_count > 0
    rows: "{{ vms_missing_owner_desc }}"
    columns:
      - name: Name
        value: "{{ guest_name }}"
      - name: Datacenter
        value: "{{ datacenter }}"
      - name: Cluster
        value: "{{ cluster }}"
      - name: Owner Tag
        value: "{{ owner_tag }}"
      - name: Owner Email
        value: "{{ owner_email }}"
