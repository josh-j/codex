# yaml-language-server: $schema=../../.schemas/ncs_reporter_config_schema.json
config:
  display_name: "Photon OS"
  platform:
    path: linux/photon
    render: false
  stig:
    ansible_playbook:
      path: "internal.linux.photon_stig_remediate"
      target_var: "photon_target_hosts"
    platform_to_checklist:
      photon: cklb_skeletons/cklb_skeleton_vsphere7_vca_photon_os_V1R4.json
  extra_product_widget_columns:
    - name: Distribution
      value: "{{ distribution }}"
    - name: Uptime (d)
      value: "{{ uptime_days }}"
    - name: Critical
      value: "{{ _critical_count }}"
    - name: Warning
      value: "{{ _warning_count }}"
vars:
  $include: "linux_base_fields.yaml"

alerts:
  $include: "linux_base_alerts.yaml"

widgets:
  $include: "linux_base_widgets.yaml"
