# yaml-language-server: $schema=../../.schemas/ncs_reporter_config_schema.json
config:
  display_name: "VMware ESXi"
  platform: vmware/esxi
  stig:
    platform_to_checklist:
      esxi: cklb_skeletons/cklb_skeleton_vsphere7_esxi_V1R4.json
  extra_fleet_widget_columns:
    - name: Cluster
      value: "{{ cluster }}"
    - name: Status
      value: "{{ overall_status }}"
    - name: CPU %
      value: "{{ cpu_used_pct }}"
    - name: Mem %
      value: "{{ mem_used_pct }}"
    - name: VMs
      value: "{{ vm_count }}"
vars:
  # All raw_esxi.data.* fields are auto-imported from the collector payload.
  # Only computed/derived vars and metadata need explicit declaration.
  uptime_days:
    compute: "{{ uptime_seconds / 86400 }}"
  cpu_used_pct:
    thresholds:
      warn_if_above: 80
      crit_if_above: 90
  mem_used_pct:
    thresholds:
      warn_if_above: 80
      crit_if_above: 90

alerts:
  - id: host_disconnected
    category: "Host Connectivity"
    severity: CRITICAL
    when: connection_state == 'disconnected'
    msg: "ESXi host is disconnected from vCenter"

  - id: host_not_responding
    category: "Host Connectivity"
    severity: CRITICAL
    when: connection_state == 'notResponding'
    msg: "ESXi host is not responding"

  - id: host_in_maintenance
    category: "Host Status"
    severity: WARNING
    when: in_maintenance_mode == 1.0
    msg: "ESXi host is in maintenance mode"

  - id: mem_critical
    category: "Host Resources"
    severity: CRITICAL
    when: mem_used_pct >= 95.0
    msg: "Memory utilization critically high at {{ mem_used_pct | round(0) }}%"

  - id: mem_warning
    category: "Host Resources"
    severity: WARNING
    suppress_if: mem_critical
    when: mem_used_pct >= 85.0
    msg: "Memory utilization elevated at {{ mem_used_pct | round(0) }}%"

  - id: cpu_critical
    category: "Host Resources"
    severity: CRITICAL
    when: cpu_used_pct >= 95.0
    msg: "CPU utilization critically high at {{ cpu_used_pct | round(0) }}%"

  - id: cpu_warning
    category: "Host Resources"
    severity: WARNING
    suppress_if: cpu_critical
    when: cpu_used_pct >= 85.0
    msg: "CPU utilization elevated at {{ cpu_used_pct | round(0) }}%"

  - id: ssh_enabled
    category: "Security"
    severity: WARNING
    when: ssh_enabled == 1.0
    msg: "SSH is enabled on this ESXi host"

  - id: shell_enabled
    category: "Security"
    severity: WARNING
    when: shell_enabled == 1.0
    msg: "ESXi Shell is enabled on this host"

  - id: uptime_excessive
    category: "Host Lifecycle"
    severity: WARNING
    when: uptime_days >= 90.0
    msg: "ESXi host has not been rebooted in {{ uptime_days | round(0) }} days — may be missing patches"

widgets:

  - type: key-value
    name: "Host Overview"
    layout: half
    fields:
      - name: Connection State
        value: "{{ connection_state }}"
        as: status-badge
      - name: Overall Status
        value: "{{ overall_status }}"
        as: status-badge
      - name: Cluster
        value: "{{ cluster }}"
      - name: Datacenter
        value: "{{ datacenter }}"
      - name: Version
        value: "{{ version }}"
      - name: Build
        value: "{{ build }}"
      - name: Maintenance Mode
        value: "{{ in_maintenance_mode }}"
        as: status-badge
      - name: Lockdown Mode
        value: "{{ lockdown_mode }}"
  - type: stat-cards
    slug: resource_kpis
    name: "Resource Utilization"
    layout: half
    cards:
      - name: CPU %
        value: "{{ cpu_used_pct | round(0) }}%"
      - name: Mem %
        value: "{{ mem_used_pct | round(0) }}%"
      - name: VMs
        value: "{{ vm_count }}"
      - name: Uptime (days)
        value: "{{ uptime_days | round(0) }}"

  - type: key-value
    name: "Security & Services"
    layout: half
    fields:
      - name: SSH Enabled
        value: "{{ ssh_enabled }}"
        as: status-badge
      - name: Shell Enabled
        value: "{{ shell_enabled }}"
        as: status-badge
      - name: NTP Running
        value: "{{ ntp_running }}"
        as: status-badge

  - type: table
    name: "Datastores"
    rows: "{{ datastores }}"
    columns:
      - name: Name
        value: "{{ name }}"
      - name: Total
        value: "{{ total }}"
      - name: Free
        value: "{{ free }}"
  - type: table
    name: "Physical NICs"
    rows: "{{ nics }}"
    columns:
      - name: Device
        value: "{{ device }}"
      - name: Status
        value: "{{ link_status }}"
        as: status-badge
      - name: Speed (Mbps)
        value: "{{ speed_mbps }}"
      - name: Driver
        value: "{{ driver }}"
      - name: Switch
        value: "{{ switch }}"