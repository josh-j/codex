---
# internal.ise.ise : tasks/one_offs.yaml
#
# Operator-focused, read-only ISE lookups for ncs-console.

- name: "ISE One-Off | Normalize inputs"
  ansible.builtin.set_fact:
    _ise_one_off_operation: "{{ ncs_operation | default('endpoint_lookup') }}"
    _ise_lookup: "{{ ise_lookup | default('') | trim }}"
    _ise_nad_query: "{{ ise_nad_query | default('') | trim }}"
    _ise_port_query: "{{ ise_port_query | default('') | trim }}"
    _ise_username_query: "{{ ise_username_query | default('') | trim }}"
    _ise_policy_query: "{{ ise_policy_query | default('') | trim }}"
    _ise_one_off_seconds: "{{ ise_seconds | default(86400) | int }}"
    _ise_one_off_records: "{{ ise_records | default(100) | int }}"
    _ise_one_off_repeat_threshold: "{{ ise_endpoint_repeat_counter_threshold | default(3) | int }}"
    _ise_one_off_collected_at: "{{ now(utc=true, fmt='%Y-%m-%dT%H:%M:%SZ') }}"
    _ise_one_off_stamp: "{{ now(utc=true, fmt='%Y%m%dT%H%M%SZ') }}"
    _ise_one_off_reports_root: "{{ ncs_config.report_directory | default('/srv/samba/reports') }}/one_offs/ise"
  changed_when: false

# MnT calls against a non-MnT node return HTTP 200 + valid XML with
# every <activeSession> stubbed to just <user_name>. If the operator
# left ise_mnt_hostname defaulted to ise_pan_hostname on a split-persona
# deployment, surface that before they chase phantom-empty reports.
- name: "ISE One-Off | MnT host sanity check"
  ansible.builtin.debug:
    msg: >-
      ise_mnt_hostname={{ ise_mnt_hostname }} matches ise_pan_hostname=
      {{ ise_pan_hostname }}. Correct for single-node deployments; on
      split-persona deployments set ise_mnt_hostname to the MnT node or
      session-bearing reports will be empty.
  when: ise_mnt_hostname == ise_pan_hostname

- name: "ISE One-Off | Show request"
  ansible.builtin.debug:
    msg:
      operation: "{{ _ise_one_off_operation }}"
      endpoint_lookup: "{{ _ise_lookup }}"
      nad_query: "{{ _ise_nad_query }}"
      port_query: "{{ _ise_port_query }}"
      username_query: "{{ _ise_username_query }}"
      policy_query: "{{ _ise_policy_query }}"
      seconds: "{{ _ise_one_off_seconds }}"
      records: "{{ _ise_one_off_records }}"
      repeat_threshold: "{{ _ise_one_off_repeat_threshold }}"

# Hit ERS:9060 directly. The cisco.ise SDK's endpoints_info module routes
# through OpenAPI on 443 regardless of ise_uses_api_gateway, and OpenAPI
# doesn't accept the ERS filter syntax we need. endpoint_risk_report and
# nad_port_history pull the full population for their joins; the others
# filter server-side so we don't paginate the entire endpoint inventory.
- name: "ISE One-Off | Build endpoint URL"
  # ERS endpoint resource has no searchable `name` field — only `mac` is
  # the identity. We only emit a server-side filter when the lookup
  # value matches a MAC pattern; non-MAC inputs (hostname, IP,
  # username) fall back to a full-scan and let downstream Jinja narrow
  # via session / auth-status rows instead.
  ansible.builtin.set_fact:
    _ise_endpoint_filter_clauses: >-
      {{
        ['mac.EQ.' ~ (_ise_lookup | internal.ise.ise_normalize_mac)]
        if _ise_one_off_operation not in ['endpoint_risk_report', 'nad_port_history']
           and (_ise_lookup | internal.ise.ise_normalize_mac | length) > 0
        else []
      }}
  changed_when: false

- name: "ISE One-Off | Assemble endpoint URL"
  ansible.builtin.set_fact:
    _ise_endpoint_url: >-
      https://{{ ise_pan_hostname }}:{{ ise_ers_port }}/ers/config/endpoint{%
        if _ise_endpoint_filter_clauses | length > 0
      %}?{{ _ise_endpoint_filter_clauses | map('regex_replace', '^', 'filter=') | join('&') }}{% endif %}
  changed_when: false

- name: "ISE One-Off | Get endpoints"
  ansible.builtin.uri:
    url: "{{ _ise_endpoint_url }}"
    method: GET
    headers:
      Accept: application/json
  become: false
  register: _ise_one_off_endpoints_raw
  changed_when: false
  failed_when: false
  when: _ise_one_off_operation in ['endpoint_lookup', 'endpoint_risk_report', 'endpoint_timeline', 'nad_port_history']

# Unified NAD inventory step. Lookup ops (switch_lookup, nad_troubleshooting,
# nad_port_history, nad_endpoint_inventory, port_endpoint_report) pass
# _ise_nad_query as a server-side ERS name filter so they hit the full
# fleet, not just page 1 of the unfiltered list — the previous page-1 GET
# silently produced "0 match network devices" whenever the target NAD lived
# on page 2+. nad_missing_protocols leaves name_filter empty to audit
# everything. Both modes need authenticationSettings/tacacsSettings on the
# detail body, so include_settings stays on for both.
- name: "ISE One-Off | Inventory NADs"
  internal.ise.ise_network_devices_info:
    hostname: "{{ ise_pan_hostname }}"
    port: "{{ ise_ers_port }}"
    username: "{{ ise_username }}"
    password: "{{ ise_password }}"
    validate_certs: "{{ ise_verify }}"
    request_timeout: "{{ ise_single_request_timeout }}"
    max_workers: "{{ ise_nad_audit_workers | default(16) | int }}"
    name_filter: "{{ '' if _ise_one_off_operation == 'nad_missing_protocols' else _ise_nad_query }}"
  register: _ise_one_off_nad_inventory
  changed_when: false
  failed_when: false
  when: _ise_one_off_operation in ['switch_lookup', 'port_endpoint_report', 'nad_troubleshooting', 'nad_port_history', 'nad_endpoint_inventory', 'nad_missing_protocols', 'nad_policy_hits']

# MnT XML endpoints — the cisco.ise SDK's mnt_*_info modules call methods
# that don't exist on the installed SDK version. Operator's exporter
# confirms /admin/API/mnt/Session/ActiveList works directly; the rest are
# standard MnT XML paths from the Cisco MnT API reference.
- name: "ISE One-Off | Get active sessions"
  ansible.builtin.uri:
    url: "https://{{ ise_mnt_hostname }}/admin/API/mnt/Session/ActiveList"
    method: GET
    headers:
      Accept: application/xml
  become: false
  register: _ise_one_off_active_sessions_raw
  changed_when: false
  failed_when: false
  when: >-
    _ise_one_off_operation in [
      'endpoint_lookup',
      'switch_lookup',
      'port_endpoint_report',
      'endpoint_timeline',
      'nad_troubleshooting',
      'nad_port_history',
      'nad_endpoint_inventory'
    ]

# Why no AuthStatus/* poll here: on ISE 3.3 the entire AuthStatus /
# AuthDetail / AuthList / IPAddress branch of the MnT XML surface is
# confirmed-404 or 500-on-call. The only working session paths are
# Session/ActiveList and Session/MACAddress/<mac>, both already fanned
# out by ise_session_details_info.

# nad_endpoint_inventory needs full per-session detail (port, vlan, auth
# protocol, authz profile, matched rule, ...) for the "Active Endpoints"
# table — MnT Session/ActiveList only carries a condensed payload. The
# only MnT endpoint that returns full detail is Session/MACAddress/<mac>,
# one call per MAC. ise_session_details_info lists, narrows to the
# matched NAD's IP(s), and fans the per-MAC GETs out across a
# ThreadPoolExecutor.
- name: "ISE One-Off | Fetch full session detail for matched NADs"
  internal.ise.ise_session_details_info:
    hostname: "{{ ise_mnt_hostname }}"
    username: "{{ ise_username }}"
    password: "{{ ise_password }}"
    validate_certs: "{{ ise_verify }}"
    request_timeout: "{{ ise_single_request_timeout }}"
    max_workers: "{{ ise_session_detail_workers | default(16) | int }}"
    nad_ip_filter: >-
      {{ ((_ise_one_off_nad_inventory.rows | default([]))
          | map(attribute='ip_address') | select | unique | list) }}
  register: _ise_one_off_session_details
  changed_when: false
  failed_when: false
  when: _ise_one_off_operation in ['nad_endpoint_inventory', 'nad_policy_hits']

- name: "ISE One-Off | Get session by MAC"
  ansible.builtin.uri:
    url: "https://{{ ise_mnt_hostname }}/admin/API/mnt/Session/MACAddress/{{ _ise_lookup | internal.ise.ise_normalize_mac }}"
    method: GET
    headers:
      Accept: application/xml
  become: false
  register: _ise_one_off_session_by_mac_raw
  changed_when: false
  failed_when: false
  when:
    - _ise_one_off_operation in ['endpoint_lookup', 'endpoint_timeline']
    - _ise_lookup is match('^[0-9A-Fa-f]{2}([:-]?[0-9A-Fa-f]{2}){5}$')

- name: "ISE One-Off | Get session by username"
  ansible.builtin.uri:
    url: "https://{{ ise_mnt_hostname }}/admin/API/mnt/Session/UserName/{{ _ise_username_query }}"
    method: GET
    headers:
      Accept: application/xml
  become: false
  register: _ise_one_off_session_by_username_raw
  changed_when: false
  failed_when: false
  when:
    - _ise_one_off_operation == 'user_auth_history'
    - _ise_username_query | length > 0

- name: "ISE One-Off | Get authentication failure reasons"
  ansible.builtin.uri:
    url: "https://{{ ise_mnt_hostname }}/admin/API/mnt/FailureReasons"
    method: GET
    headers:
      Accept: application/xml
  become: false
  register: _ise_one_off_failure_reasons_raw
  changed_when: false
  failed_when: false
  when: _ise_one_off_operation in ['failed_auth_summary', 'nad_troubleshooting']

- name: "ISE One-Off | Get authorization profiles"
  ansible.builtin.uri:
    url: "https://{{ ise_pan_hostname }}:{{ ise_ers_port }}/ers/config/authorizationprofile?size=100"
    method: GET
    headers:
      Accept: application/json
  become: false
  register: _ise_one_off_authorization_profiles_raw
  changed_when: false
  failed_when: false
  when: _ise_one_off_operation in ['policy_hit_explorer', 'policy_object_detail']

- name: "ISE One-Off | Get downloadable ACLs"
  ansible.builtin.uri:
    url: "https://{{ ise_pan_hostname }}:{{ ise_ers_port }}/ers/config/downloadableacl?size=100"
    method: GET
    headers:
      Accept: application/json
  become: false
  register: _ise_one_off_downloadable_acls_raw
  changed_when: false
  failed_when: false
  when: _ise_one_off_operation in ['policy_hit_explorer', 'policy_object_detail']

- name: "ISE One-Off | Get allowed protocols"
  ansible.builtin.uri:
    url: "https://{{ ise_pan_hostname }}:{{ ise_ers_port }}/ers/config/allowedprotocols?size=100"
    method: GET
    headers:
      Accept: application/json
  become: false
  register: _ise_one_off_allowed_protocols_raw
  changed_when: false
  failed_when: false
  when: _ise_one_off_operation in ['policy_hit_explorer', 'policy_object_detail']

- name: "ISE One-Off | Get filter policies"
  ansible.builtin.uri:
    url: "https://{{ ise_pan_hostname }}:{{ ise_ers_port }}/ers/config/filterpolicy?size=100"
    method: GET
    headers:
      Accept: application/json
  become: false
  register: _ise_one_off_filter_policies_raw
  changed_when: false
  failed_when: false
  when: _ise_one_off_operation == 'policy_object_detail'

- name: "ISE One-Off | Shape lookup data"
  ansible.builtin.set_fact:
    _ise_one_off_endpoint_rows: >-
      {{
        _ise_one_off_endpoints_raw | default({}) | internal.ise.ise_result_rows | internal.ise.ise_endpoint_rows
      }}
    # ise_network_devices_info already returns the row shape we want
    # (name/id/ip_address/description/location/type/has_radius/has_tacacs/
    # missing_protocols/profile_name/model_name); no extra normalization
    # needed.
    _ise_one_off_network_device_rows: "{{ _ise_one_off_nad_inventory.rows | default([]) }}"
    # nad_endpoint_inventory and nad_policy_hits consume the full per-MAC
    # session detail from ise_session_details_info; the other session-bearing
    # ops keep using the condensed ActiveList payload.
    _ise_one_off_session_rows: >-
      {{
        (
          (_ise_one_off_session_details.sessions | default([]))
          if _ise_one_off_operation in ['nad_endpoint_inventory', 'nad_policy_hits']
          else (_ise_one_off_active_sessions_raw | default({}))
        )
        | internal.ise.ise_result_rows
        | internal.ise.ise_auth_rows
      }}
    # AuthStatus/* MnT paths are dead on ISE 3.3. Reports still referencing
    # _ise_one_off_auth_rows render an empty section until ported to a
    # Session/MACAddress data path.
    _ise_one_off_auth_rows: []
    _ise_one_off_session_by_mac_rows: >-
      {{
        _ise_one_off_session_by_mac_raw | default({}) | internal.ise.ise_result_rows | internal.ise.ise_auth_rows
      }}
    _ise_one_off_session_by_username_rows: >-
      {{
        _ise_one_off_session_by_username_raw | default({}) | internal.ise.ise_result_rows | internal.ise.ise_auth_rows
      }}
    _ise_one_off_failure_reason_rows: >-
      {{
        _ise_one_off_failure_reasons_raw | default({}) | internal.ise.ise_result_rows
      }}
    _ise_one_off_authorization_profile_rows: >-
      {{
        _ise_one_off_authorization_profiles_raw | default({}) | internal.ise.ise_result_rows
      }}
    _ise_one_off_downloadable_acl_rows: >-
      {{
        _ise_one_off_downloadable_acls_raw | default({}) | internal.ise.ise_result_rows
      }}
    _ise_one_off_allowed_protocol_rows: >-
      {{
        _ise_one_off_allowed_protocols_raw | default({}) | internal.ise.ise_result_rows
      }}
    _ise_one_off_filter_policy_rows: >-
      {{
        _ise_one_off_filter_policies_raw | default({}) | internal.ise.ise_result_rows
      }}
  changed_when: false

- name: "ISE One-Off | Build endpoint lookup report"
  ansible.builtin.set_fact:
    _ise_one_off_report:
      title: "Endpoint Lookup"
      query: "{{ _ise_lookup }}"
      collected_at: "{{ _ise_one_off_collected_at }}"
      ise_hostname: "{{ ise_hostname }}"
      endpoints: "{{ _ise_one_off_endpoint_rows | internal.ise.ise_search_rows(_ise_lookup) | internal.ise.ise_limit_rows(25) }}"
      active_or_recent_sessions: >-
        {{
          (
            (_ise_one_off_session_rows | internal.ise.ise_search_rows(_ise_lookup))
            + (_ise_one_off_auth_rows | internal.ise.ise_search_rows(_ise_lookup))
            + _ise_one_off_session_by_mac_rows
          ) | internal.ise.ise_limit_rows(50)
        }}
  changed_when: false
  when: _ise_one_off_operation == 'endpoint_lookup'

- name: "ISE One-Off | Build endpoint risk report"
  ansible.builtin.set_fact:
    _ise_one_off_report:
      title: "Endpoint Risk Report"
      collected_at: "{{ _ise_one_off_collected_at }}"
      ise_hostname: "{{ ise_hostname }}"
      repeat_threshold: "{{ _ise_one_off_repeat_threshold }}"
      default_policy_endpoints: "{{ _ise_one_off_endpoint_rows | internal.ise.ise_default_policy_rows | internal.ise.ise_limit_rows(50) }}"
      high_repeat_counter_endpoints: "{{ _ise_one_off_endpoint_rows | internal.ise.ise_high_repeat_rows(_ise_one_off_repeat_threshold) | internal.ise.ise_limit_rows(50) }}"
      randomized_mac_endpoints: "{{ _ise_one_off_endpoint_rows | internal.ise.ise_randomized_mac_rows | internal.ise.ise_limit_rows(50) }}"
  changed_when: false
  when: _ise_one_off_operation == 'endpoint_risk_report'

- name: "ISE One-Off | Build switch lookup report"
  ansible.builtin.set_fact:
    _ise_one_off_report:
      title: "Switch Lookup"
      query: "{{ _ise_nad_query }}"
      collected_at: "{{ _ise_one_off_collected_at }}"
      ise_hostname: "{{ ise_hostname }}"
      network_devices: "{{ _ise_one_off_network_device_rows | internal.ise.ise_limit_rows(25) }}"
      # MnT Session/ActiveList only carries nas_ip_address — no NAD name.
      # ise_sessions_on_nads joins on NAD IP so a name-based query still
      # finds active sessions. Recent auths from AuthStatus already carry
      # network_device_name, so ise_nad_rows(query) is still correct there.
      active_or_recent_sessions: >-
        {{
          (
            (_ise_one_off_session_rows | internal.ise.ise_sessions_on_nads(_ise_one_off_network_device_rows))
            + (_ise_one_off_auth_rows | internal.ise.ise_nad_rows(_ise_nad_query))
          ) | internal.ise.ise_limit_rows(75)
        }}
  changed_when: false
  when: _ise_one_off_operation == 'switch_lookup'

- name: "ISE One-Off | Build NAD port endpoint report"
  ansible.builtin.set_fact:
    _ise_one_off_report:
      title: "NAD Port Endpoint Report"
      nad_query: "{{ _ise_nad_query }}"
      port_query: "{{ _ise_port_query }}"
      collected_at: "{{ _ise_one_off_collected_at }}"
      ise_hostname: "{{ ise_hostname }}"
      matching_network_devices: "{{ _ise_one_off_network_device_rows | internal.ise.ise_search_rows(_ise_nad_query) | internal.ise.ise_limit_rows(25) }}"
      endpoints_on_port: >-
        {{
          (
            (_ise_one_off_session_rows | internal.ise.ise_port_rows(_ise_nad_query, _ise_port_query))
            + (_ise_one_off_auth_rows | internal.ise.ise_port_rows(_ise_nad_query, _ise_port_query))
          ) | internal.ise.ise_limit_rows(100)
        }}
  changed_when: false
  when: _ise_one_off_operation == 'port_endpoint_report'

- name: "ISE One-Off | Build user authentication history report"
  ansible.builtin.set_fact:
    _ise_one_off_report:
      title: "User Auth History"
      username: "{{ _ise_username_query }}"
      collected_at: "{{ _ise_one_off_collected_at }}"
      ise_hostname: "{{ ise_hostname }}"
      user_session_detail: "{{ _ise_one_off_session_by_username_rows | internal.ise.ise_limit_rows(25) }}"
      recent_authentications: "{{ _ise_one_off_auth_rows | internal.ise.ise_search_rows(_ise_username_query) | internal.ise.ise_limit_rows(75) }}"
  changed_when: false
  when: _ise_one_off_operation == 'user_auth_history'

- name: "ISE One-Off | Build failed authentication summary"
  ansible.builtin.set_fact:
    _ise_one_off_report:
      title: "Failed Auth Summary"
      collected_at: "{{ _ise_one_off_collected_at }}"
      ise_hostname: "{{ ise_hostname }}"
      failure_reasons: "{{ _ise_one_off_failure_reason_rows | internal.ise.ise_limit_rows(50) }}"
      recent_failures: "{{ _ise_one_off_auth_rows | internal.ise.ise_failure_rows | internal.ise.ise_limit_rows(100) }}"
      top_failure_reasons_from_recent_auth: "{{ _ise_one_off_auth_rows | internal.ise.ise_failure_summary }}"
  changed_when: false
  when: _ise_one_off_operation == 'failed_auth_summary'

- name: "ISE One-Off | Build endpoint timeline report"
  ansible.builtin.set_fact:
    _ise_one_off_report:
      title: "Endpoint Timeline"
      query: "{{ _ise_lookup }}"
      collected_at: "{{ _ise_one_off_collected_at }}"
      ise_hostname: "{{ ise_hostname }}"
      endpoint_candidates: "{{ _ise_one_off_endpoint_rows | internal.ise.ise_search_rows(_ise_lookup) | internal.ise.ise_limit_rows(25) }}"
      active_sessions: "{{ _ise_one_off_session_rows | internal.ise.ise_search_rows(_ise_lookup) | internal.ise.ise_limit_rows(50) }}"
      mac_session_detail: "{{ _ise_one_off_session_by_mac_rows | internal.ise.ise_limit_rows(25) }}"
      timeline: >-
        {{
          (
            (_ise_one_off_session_rows | internal.ise.ise_search_rows(_ise_lookup))
            + (_ise_one_off_auth_rows | internal.ise.ise_search_rows(_ise_lookup))
            + _ise_one_off_session_by_mac_rows
          ) | internal.ise.ise_timeline_rows | internal.ise.ise_limit_rows(150)
        }}
  changed_when: false
  when: _ise_one_off_operation == 'endpoint_timeline'

- name: "ISE One-Off | Build policy hit explorer report"
  ansible.builtin.set_fact:
    _ise_one_off_report:
      title: "Policy Hit Explorer"
      query: "{{ _ise_policy_query }}"
      collected_at: "{{ _ise_one_off_collected_at }}"
      ise_hostname: "{{ ise_hostname }}"
      auth_hits: "{{ _ise_one_off_auth_rows | internal.ise.ise_policy_hit_rows(_ise_policy_query) | internal.ise.ise_limit_rows(150) }}"
      authorization_profiles: "{{ _ise_one_off_authorization_profile_rows | internal.ise.ise_search_rows(_ise_policy_query) | internal.ise.ise_limit_rows(50) }}"
      downloadable_acls: "{{ _ise_one_off_downloadable_acl_rows | internal.ise.ise_search_rows(_ise_policy_query) | internal.ise.ise_limit_rows(50) }}"
      allowed_protocols: "{{ _ise_one_off_allowed_protocol_rows | internal.ise.ise_search_rows(_ise_policy_query) | internal.ise.ise_limit_rows(50) }}"
  changed_when: false
  when: _ise_one_off_operation == 'policy_hit_explorer'

- name: "ISE One-Off | Build NAD troubleshooting report"
  ansible.builtin.set_fact:
    _ise_one_off_report:
      title: "NAD Troubleshooting"
      nad_query: "{{ _ise_nad_query }}"
      collected_at: "{{ _ise_one_off_collected_at }}"
      ise_hostname: "{{ ise_hostname }}"
      matching_network_devices: "{{ _ise_one_off_network_device_rows | internal.ise.ise_limit_rows(25) }}"
      active_sessions: "{{ _ise_one_off_session_rows | internal.ise.ise_sessions_on_nads(_ise_one_off_network_device_rows) | internal.ise.ise_limit_rows(100) }}"
      recent_authentications: "{{ _ise_one_off_auth_rows | internal.ise.ise_nad_rows(_ise_nad_query) | internal.ise.ise_limit_rows(150) }}"
      recent_failures: "{{ _ise_one_off_auth_rows | internal.ise.ise_nad_rows(_ise_nad_query) | internal.ise.ise_failure_rows | internal.ise.ise_limit_rows(100) }}"
      top_failure_ports: "{{ _ise_one_off_auth_rows | internal.ise.ise_nad_rows(_ise_nad_query) | internal.ise.ise_port_failure_summary }}"
      failure_reasons: "{{ _ise_one_off_failure_reason_rows | internal.ise.ise_limit_rows(50) }}"
      coa_anc_candidates: "{{ _ise_one_off_session_rows | internal.ise.ise_sessions_on_nads(_ise_one_off_network_device_rows) | internal.ise.ise_limit_rows(50) }}"
  changed_when: false
  when: _ise_one_off_operation == 'nad_troubleshooting'

- name: "ISE One-Off | Build NAD endpoint inventory report"
  ansible.builtin.set_fact:
    _ise_one_off_report:
      title: "Endpoints on NAD"
      nad_query: "{{ _ise_nad_query }}"
      collected_at: "{{ _ise_one_off_collected_at }}"
      ise_hostname: "{{ ise_hostname }}"
      matching_network_devices: "{{ _ise_one_off_network_device_rows | internal.ise.ise_limit_rows(25) }}"
      # _ise_one_off_session_rows here is already the per-MAC detail fetched
      # by ise_session_details_info and narrowed to the matched NAD's IP(s),
      # so the columns (port, vlan, auth_protocol, authz profile, matched
      # rule, ...) the ActiveList payload doesn't carry are now populated.
      active_endpoints: "{{ _ise_one_off_session_rows | internal.ise.ise_limit_rows(250) }}"
      recent_endpoint_auths: "{{ _ise_one_off_auth_rows | internal.ise.ise_nad_rows(_ise_nad_query) | internal.ise.ise_limit_rows(250) }}"
  changed_when: false
  when: _ise_one_off_operation == 'nad_endpoint_inventory'

- name: "ISE One-Off | Build NAD policy hits report"
  ansible.builtin.set_fact:
    _ise_one_off_report:
      title: "NAD Policy Hits"
      nad_query: "{{ _ise_nad_query }}"
      collected_at: "{{ _ise_one_off_collected_at }}"
      ise_hostname: "{{ ise_hostname }}"
      # Session-detail count from the Session/MACAddress fan-out; the
      # cap is mostly informational since the module narrows by
      # nas_ip_address before fanning out.
      sessions_examined: "{{ (_ise_one_off_session_rows | default([])) | length }}"
      matching_network_devices: "{{ _ise_one_off_network_device_rows | internal.ise.ise_limit_rows(25) }}"
      # No rule-name breakdowns: MnT XML on 3.3 carries the outcome
      # (selected_azn_profiles, auth_method, identity_group, etc.) but
      # not the matched authc/authz rule names per session.
      status_breakdown:
        "{{ _ise_one_off_session_rows | internal.ise.ise_status_breakdown }}"
      authorization_profiles:
        "{{ _ise_one_off_session_rows | internal.ise.ise_authz_profile_summary }}"
      authentication_methods:
        "{{ _ise_one_off_session_rows | internal.ise.ise_authc_method_summary }}"
      identity_groups:
        "{{ _ise_one_off_session_rows | internal.ise.ise_identity_group_summary }}"
      endpoint_policies:
        "{{ _ise_one_off_session_rows | internal.ise.ise_endpoint_policy_summary }}"
      cts_security_groups:
        "{{ _ise_one_off_session_rows | internal.ise.ise_cts_sgt_summary }}"
      failure_breakdown:
        "{{ _ise_one_off_session_rows | internal.ise.ise_failure_summary }}"
      recent_events:
        "{{ _ise_one_off_session_rows | internal.ise.ise_limit_rows(150) }}"
  changed_when: false
  when: _ise_one_off_operation == 'nad_policy_hits'

- name: "ISE One-Off | Shape NAD protocol audit rows"
  ansible.builtin.set_fact:
    # nad_missing_protocols passes empty name_filter so the inventory step
    # walks the full fleet. _ise_nad_query (optional) narrows on the client
    # side here — usually blank for a full audit.
    _ise_one_off_nad_protocol_rows: >-
      {{ (_ise_one_off_nad_inventory.rows | default([]))
         | internal.ise.ise_search_rows(_ise_nad_query) }}
  changed_when: false
  when: _ise_one_off_operation == 'nad_missing_protocols'

- name: "ISE One-Off | Build NAD protocol audit report"
  ansible.builtin.set_fact:
    _ise_one_off_report:
      title: "NADs Missing RADIUS/TACACS"
      nad_query: "{{ _ise_nad_query }}"
      collected_at: "{{ _ise_one_off_collected_at }}"
      ise_hostname: "{{ ise_hostname }}"
      nads_missing_protocols: >-
        {{ _ise_one_off_nad_protocol_rows
           | selectattr('missing_protocols', '!=', '') | list
           | internal.ise.ise_limit_rows(250) }}
      all_nads_status: "{{ _ise_one_off_nad_protocol_rows | internal.ise.ise_limit_rows(250) }}"
  changed_when: false
  when: _ise_one_off_operation == 'nad_missing_protocols'

- name: "ISE One-Off | Build NAD port history report"
  ansible.builtin.set_fact:
    _ise_one_off_report:
      title: "NAD Port History"
      nad_query: "{{ _ise_nad_query }}"
      port_query: "{{ _ise_port_query }}"
      collected_at: "{{ _ise_one_off_collected_at }}"
      ise_hostname: "{{ ise_hostname }}"
      matching_network_devices: "{{ _ise_one_off_network_device_rows | internal.ise.ise_search_rows(_ise_nad_query) | internal.ise.ise_limit_rows(25) }}"
      endpoint_history: >-
        {{
          (
            (_ise_one_off_session_rows | internal.ise.ise_port_rows(_ise_nad_query, _ise_port_query))
            + (_ise_one_off_auth_rows | internal.ise.ise_port_rows(_ise_nad_query, _ise_port_query))
          ) | internal.ise.ise_port_history_rows(_ise_one_off_endpoint_rows)
        }}
      port_timeline: >-
        {{
          (
            (_ise_one_off_session_rows | internal.ise.ise_port_rows(_ise_nad_query, _ise_port_query))
            + (_ise_one_off_auth_rows | internal.ise.ise_port_rows(_ise_nad_query, _ise_port_query))
          ) | internal.ise.ise_timeline_rows | internal.ise.ise_limit_rows(200)
        }}
      port_failures: >-
        {{
          (
            (_ise_one_off_session_rows | internal.ise.ise_port_rows(_ise_nad_query, _ise_port_query))
            + (_ise_one_off_auth_rows | internal.ise.ise_port_rows(_ise_nad_query, _ise_port_query))
          ) | internal.ise.ise_failure_rows | internal.ise.ise_limit_rows(100)
        }}
  changed_when: false
  when: _ise_one_off_operation == 'nad_port_history'

- name: "ISE One-Off | Build policy object detail report"
  ansible.builtin.set_fact:
    _ise_one_off_report:
      title: "Policy Object Detail"
      query: "{{ _ise_policy_query }}"
      collected_at: "{{ _ise_one_off_collected_at }}"
      ise_hostname: "{{ ise_hostname }}"
      authorization_profiles: "{{ _ise_one_off_authorization_profile_rows | internal.ise.ise_search_rows(_ise_policy_query) | internal.ise.ise_limit_rows(50) }}"
      downloadable_acls: "{{ _ise_one_off_downloadable_acl_rows | internal.ise.ise_search_rows(_ise_policy_query) | internal.ise.ise_limit_rows(50) }}"
      allowed_protocols: "{{ _ise_one_off_allowed_protocol_rows | internal.ise.ise_search_rows(_ise_policy_query) | internal.ise.ise_limit_rows(50) }}"
      filter_policies: "{{ _ise_one_off_filter_policy_rows | internal.ise.ise_search_rows(_ise_policy_query) | internal.ise.ise_limit_rows(50) }}"
      recent_auth_hits: "{{ _ise_one_off_auth_rows | internal.ise.ise_policy_hit_rows(_ise_policy_query) | internal.ise.ise_limit_rows(150) }}"
      hit_summary: "{{ _ise_one_off_auth_rows | internal.ise.ise_policy_hit_rows(_ise_policy_query) | internal.ise.ise_policy_hit_summary }}"
  changed_when: false
  when: _ise_one_off_operation == 'policy_object_detail'

- name: "ISE One-Off | Print report"
  ansible.builtin.debug:
    var: _ise_one_off_report

- name: "ISE One-Off | Build artifact paths"
  ansible.builtin.set_fact:
    _ise_one_off_artifact_slug: >-
      {{
        (
          _ise_one_off_operation ~ '-' ~
          (_ise_lookup | default(_ise_nad_query, true) | default(_ise_username_query, true) | default(_ise_policy_query, true))
        )
        | lower
        | regex_replace('[^a-z0-9._-]+', '-')
        | regex_replace('(^-+|-+$)', '')
      }}
    _ise_one_off_artifact_base: >-
      {{ _ise_one_off_stamp }}-{{ inventory_hostname | lower | regex_replace('[^a-z0-9._-]+', '-') }}
  changed_when: false

- name: "ISE One-Off | Ensure report directory exists"
  ansible.builtin.file:
    path: "{{ _ise_one_off_reports_root }}"
    state: directory
    mode: "0755"

- name: "ISE One-Off | Write HTML report"
  ansible.builtin.copy:
    dest: >-
      {{ _ise_one_off_reports_root }}/{{ _ise_one_off_artifact_base }}-{{ _ise_one_off_artifact_slug }}.html
    mode: "0644"
    content: "{{ _ise_one_off_report | internal.ise.ise_one_off_html }}"
  register: _ise_one_off_html_artifact

- name: "ISE One-Off | Write CSV report"
  ansible.builtin.copy:
    dest: >-
      {{ _ise_one_off_reports_root }}/{{ _ise_one_off_artifact_base }}-{{ _ise_one_off_artifact_slug }}.csv
    mode: "0644"
    content: "{{ _ise_one_off_report | internal.ise.ise_one_off_csv }}"
  register: _ise_one_off_csv_artifact

- name: "ISE One-Off | Publish report path"
  ansible.builtin.debug:
    msg: >-
      NCS_REPORT: one_offs/ise/{{ _ise_one_off_html_artifact.dest | basename }}
