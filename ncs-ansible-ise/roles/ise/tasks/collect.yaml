# =============================================================================
# Build collection payload
# =============================================================================
#
# Helpers used below:
#   - ERS list responses → .json.SearchResult.resources
#   - OpenAPI list/object → .json.response
#   - MnT XML payloads keep their raw .content; the reporter's normalize
#     specs handle XML parsing where needed.
#   - failed is a Boolean already set by ansible's uri module when status
#     mismatches; default false if the task was skipped.

- name: "ISE | Build collection payload"
  ansible.builtin.set_fact:
    _ise_payload:
      inventory_hostname: "{{ inventory_hostname }}"
      ise_hostname: "{{ ise_pan_hostname }}"
      ise_mnt_hostname: "{{ ise_mnt_hostname }}"
      ise_version: "{{ ise_version }}"
      collected_at: "{{ now(utc=true, fmt='%Y-%m-%dT%H:%M:%SZ') }}"
      collection_options:
        network_devices: "{{ ise_collect_network_devices | bool }}"
        endpoints: "{{ ise_collect_endpoints | bool }}"
        guests: "{{ ise_collect_guests | bool }}"
        trustsec: "{{ ise_collect_trustsec | bool }}"
        certificates: "{{ ise_collect_certificates | bool }}"
