---
# internal.ise.ise : tasks/collect.yaml
#
# Bulk read-only Cisco ISE collection. We bypass the cisco.ise SDK
# entirely — the installed collection/ciscoisesdk pair in our target
# environment is missing methods on the Misc/IdentityServicesEngineAPI
# classes — and hit the three API surfaces directly:
#
#   - ERS on PAN port 9060 (/ers/config/...)         → JSON
#   - OpenAPI on PAN port 443 (/api/v1/...)          → JSON
#   - MnT XML on MnT port 443 (/admin/API/mnt/...)   → XML
#
# All tasks run on the controller (the role play sets connection: local,
# become: false), and each uri task pins become: false because
# ansible.cfg's global become=True would otherwise force sudo on each.

# =============================================================================
# MnT XML calls
# =============================================================================

- name: "ISE | Get MnT version"
  ansible.builtin.uri:
    url: "https://{{ ise_mnt_hostname }}/admin/API/mnt/Version"
    method: GET
    url_username: "{{ ise_username }}"
    url_password: "{{ ise_password }}"
    force_basic_auth: true
    validate_certs: "{{ ise_verify }}"
    headers:
      Accept: application/xml
    return_content: true
    status_code: [200]
    timeout: "{{ ise_single_request_timeout }}"
  become: false
  register: _ise_mnt_version
  changed_when: false
  failed_when: false

- name: "ISE | Get active session count"
  ansible.builtin.uri:
    url: "https://{{ ise_mnt_hostname }}/admin/API/mnt/Session/ActiveCount"
    method: GET
    url_username: "{{ ise_username }}"
    url_password: "{{ ise_password }}"
    force_basic_auth: true
    validate_certs: "{{ ise_verify }}"
    headers:
      Accept: application/xml
    return_content: true
    status_code: [200]
    timeout: "{{ ise_single_request_timeout }}"
  become: false
  register: _ise_active_session_count
  changed_when: false
  failed_when: false
  when: ise_collect_sessions | bool

- name: "ISE | Get active session list"
  ansible.builtin.uri:
    url: "https://{{ ise_mnt_hostname }}/admin/API/mnt/Session/ActiveList"
    method: GET
    url_username: "{{ ise_username }}"
    url_password: "{{ ise_password }}"
