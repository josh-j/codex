  become: false
  register: _ise_failure_reasons
  changed_when: false
  failed_when: false
  when: ise_collect_sessions | bool

- name: "ISE | Get recent authentication status"
  ansible.builtin.uri:
    url: >-
      https://{{ ise_mnt_hostname }}/admin/API/mnt/AuthStatus/MACAddress/0/{{ ise_authentication_status_seconds }}/{{ ise_authentication_status_records }}/All/FALSE
    method: GET
    url_username: "{{ ise_username }}"
    url_password: "{{ ise_password }}"
    force_basic_auth: true
