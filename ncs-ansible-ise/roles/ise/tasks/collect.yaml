---
# internal.ise.ise : tasks/collect.yaml
#
# Read-only Cisco ISE collection through the upstream cisco.ise
# modules. Emit raw module results; any shaping for dashboards belongs
# in ncs_configs normalize specs.

# cisco.ise.mnt_*_info modules invoke SDK methods that don't exist in
# the installed ciscoisesdk version (Misc.get_product_version /
# Misc.get_active_session_list). Hit the MnT XML endpoints directly,
# same pattern as one_offs.yaml.
- name: "ISE | Get MnT version"
  ansible.builtin.uri:
    url: "https://{{ ise_mnt_hostname }}/admin/API/mnt/Version"
    method: GET
    url_username: "{{ ise_username }}"
    url_password: "{{ ise_password }}"
    force_basic_auth: true
    validate_certs: "{{ ise_verify }}"
    headers:
      Accept: application/xml
    return_content: true
    status_code: [200]
    timeout: "{{ ise_single_request_timeout }}"
  become: false
  register: _ise_mnt_version
  changed_when: false
  failed_when: false

- name: "ISE | Get telemetry information"
  cisco.ise.telemetryinfo_info: &ise_pan_args
    ise_hostname: "{{ ise_pan_hostname }}"
    ise_username: "{{ ise_username }}"
    ise_password: "{{ ise_password }}"
    ise_verify: "{{ ise_verify }}"
    ise_version: "{{ ise_version }}"
    ise_wait_on_rate_limit: "{{ ise_wait_on_rate_limit }}"
    ise_uses_api_gateway: "{{ ise_uses_api_gateway }}"
    ise_uses_csrf_token: "{{ ise_uses_csrf_token }}"
    ise_debug: "{{ ise_debug }}"
    ise_single_request_timeout: "{{ ise_single_request_timeout }}"
  register: _ise_telemetry
  changed_when: false
  failed_when: false

- name: "ISE | Get node inventory"
  cisco.ise.node_info:
    ise_hostname: "{{ ise_pan_hostname }}"
    ise_username: "{{ ise_username }}"
    ise_password: "{{ ise_password }}"
    ise_verify: "{{ ise_verify }}"
    ise_version: "{{ ise_version }}"
    ise_wait_on_rate_limit: "{{ ise_wait_on_rate_limit }}"
    ise_uses_api_gateway: "{{ ise_uses_api_gateway }}"
    ise_uses_csrf_token: "{{ ise_uses_csrf_token }}"
    ise_debug: "{{ ise_debug }}"
    ise_single_request_timeout: "{{ ise_single_request_timeout }}"
  register: _ise_nodes
  changed_when: false
  failed_when: false

- name: "ISE | Get network device groups"
  cisco.ise.network_device_group_info:
    ise_hostname: "{{ ise_pan_hostname }}"
    ise_username: "{{ ise_username }}"
    ise_password: "{{ ise_password }}"
    ise_verify: "{{ ise_verify }}"
    ise_version: "{{ ise_version }}"
    ise_wait_on_rate_limit: "{{ ise_wait_on_rate_limit }}"
    ise_uses_api_gateway: "{{ ise_uses_api_gateway }}"
    ise_uses_csrf_token: "{{ ise_uses_csrf_token }}"
    ise_debug: "{{ ise_debug }}"
    ise_single_request_timeout: "{{ ise_single_request_timeout }}"
  register: _ise_network_device_groups
  changed_when: false
  failed_when: false

- name: "ISE | Get network devices"
  cisco.ise.network_device_info:
    ise_hostname: "{{ ise_pan_hostname }}"
    ise_username: "{{ ise_username }}"
    ise_password: "{{ ise_password }}"
    ise_verify: "{{ ise_verify }}"
    ise_version: "{{ ise_version }}"
    ise_wait_on_rate_limit: "{{ ise_wait_on_rate_limit }}"
    ise_uses_api_gateway: "{{ ise_uses_api_gateway }}"
    ise_uses_csrf_token: "{{ ise_uses_csrf_token }}"
    ise_debug: "{{ ise_debug }}"
    ise_single_request_timeout: "{{ ise_single_request_timeout }}"
  register: _ise_network_devices
  changed_when: false
  failed_when: false
  when: ise_collect_network_devices | bool

- name: "ISE | Get identity groups"
  cisco.ise.identitygroup_info:
    ise_hostname: "{{ ise_pan_hostname }}"
    ise_username: "{{ ise_username }}"
    ise_password: "{{ ise_password }}"
    ise_verify: "{{ ise_verify }}"
    ise_version: "{{ ise_version }}"
    ise_wait_on_rate_limit: "{{ ise_wait_on_rate_limit }}"
    ise_uses_api_gateway: "{{ ise_uses_api_gateway }}"
    ise_uses_csrf_token: "{{ ise_uses_csrf_token }}"
    ise_debug: "{{ ise_debug }}"
    ise_single_request_timeout: "{{ ise_single_request_timeout }}"
  register: _ise_identity_groups
  changed_when: false
  failed_when: false

- name: "ISE | Get profiler profiles"
  cisco.ise.profiler_profile_info:
    ise_hostname: "{{ ise_pan_hostname }}"
    ise_username: "{{ ise_username }}"
    ise_password: "{{ ise_password }}"
    ise_verify: "{{ ise_verify }}"
    ise_version: "{{ ise_version }}"
    ise_wait_on_rate_limit: "{{ ise_wait_on_rate_limit }}"
    ise_uses_api_gateway: "{{ ise_uses_api_gateway }}"
    ise_uses_csrf_token: "{{ ise_uses_csrf_token }}"
    ise_debug: "{{ ise_debug }}"
    ise_single_request_timeout: "{{ ise_single_request_timeout }}"
  register: _ise_profiler_profiles
  changed_when: false
  failed_when: false

- name: "ISE | Get endpoints"
  cisco.ise.endpoints_info:
    ise_hostname: "{{ ise_pan_hostname }}"
    ise_username: "{{ ise_username }}"
    ise_password: "{{ ise_password }}"
    ise_verify: "{{ ise_verify }}"
    ise_version: "{{ ise_version }}"
    ise_wait_on_rate_limit: "{{ ise_wait_on_rate_limit }}"
    ise_uses_api_gateway: "{{ ise_uses_api_gateway }}"
    ise_uses_csrf_token: "{{ ise_uses_csrf_token }}"
    ise_debug: "{{ ise_debug }}"
    ise_single_request_timeout: "{{ ise_single_request_timeout }}"
  register: _ise_endpoints
  changed_when: false
  failed_when: false
  when: ise_collect_endpoints | bool

- name: "ISE | Get endpoint device type summary"
  cisco.ise.endpoints_device_type_info:
    <<: *ise_pan_args
  register: _ise_endpoint_device_types
  changed_when: false
  failed_when: false
  when: ise_collect_endpoints | bool

- name: "ISE | Get endpoint configuration"
  cisco.ise.configuration_info:
    <<: *ise_pan_args
  register: _ise_endpoint_configuration
  changed_when: false
  failed_when: false
  when: ise_collect_endpoints | bool

- name: "ISE | Get guest users"
  cisco.ise.guest_user_info:
    ise_hostname: "{{ ise_pan_hostname }}"
    ise_username: "{{ ise_username }}"
    ise_password: "{{ ise_password }}"
    ise_verify: "{{ ise_verify }}"
    ise_version: "{{ ise_version }}"
    ise_wait_on_rate_limit: "{{ ise_wait_on_rate_limit }}"
    ise_uses_api_gateway: "{{ ise_uses_api_gateway }}"
    ise_uses_csrf_token: "{{ ise_uses_csrf_token }}"
    ise_debug: "{{ ise_debug }}"
    ise_single_request_timeout: "{{ ise_single_request_timeout }}"
  register: _ise_guest_users
  changed_when: false
  failed_when: false
  when: ise_collect_guests | bool

- name: "ISE | Get SGACLs"
  cisco.ise.sgacl_info:
    ise_hostname: "{{ ise_pan_hostname }}"
    ise_username: "{{ ise_username }}"
    ise_password: "{{ ise_password }}"
    ise_verify: "{{ ise_verify }}"
    ise_version: "{{ ise_version }}"
    ise_wait_on_rate_limit: "{{ ise_wait_on_rate_limit }}"
    ise_uses_api_gateway: "{{ ise_uses_api_gateway }}"
    ise_uses_csrf_token: "{{ ise_uses_csrf_token }}"
    ise_debug: "{{ ise_debug }}"
    ise_single_request_timeout: "{{ ise_single_request_timeout }}"
  register: _ise_sg_acls
  changed_when: false
  failed_when: false
  when: ise_collect_trustsec | bool

- name: "ISE | Get SGTs"
  cisco.ise.sgt_info:
    ise_hostname: "{{ ise_pan_hostname }}"
    ise_username: "{{ ise_username }}"
    ise_password: "{{ ise_password }}"
    ise_verify: "{{ ise_verify }}"
    ise_version: "{{ ise_version }}"
    ise_wait_on_rate_limit: "{{ ise_wait_on_rate_limit }}"
    ise_uses_api_gateway: "{{ ise_uses_api_gateway }}"
    ise_uses_csrf_token: "{{ ise_uses_csrf_token }}"
    ise_debug: "{{ ise_debug }}"
    ise_single_request_timeout: "{{ ise_single_request_timeout }}"
  register: _ise_sgts
