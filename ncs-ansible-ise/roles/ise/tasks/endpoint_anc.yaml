---
# internal.ise.ise : tasks/endpoint_anc.yaml
#
# Apply or clear an ANC policy after resolving MAC/IP/hostname to a MAC.

- name: "ISE ANC | Normalize inputs"
  ansible.builtin.set_fact:
    _ise_anc_lookup: "{{ ise_lookup | default('') | trim }}"
    _ise_anc_action: "{{ ise_anc_action | default('apply') | trim }}"
    _ise_anc_policy_name: "{{ ise_anc_policy_name | default('') | trim }}"
    _ise_anc_confirm: "{{ ise_anc_confirm | default('') | trim }}"
    _ise_anc_collected_at: "{{ now(utc=true, fmt='%Y-%m-%dT%H:%M:%SZ') }}"
    _ise_anc_stamp: "{{ now(utc=true, fmt='%Y%m%dT%H%M%SZ') }}"
    _ise_anc_reports_root: "{{ ncs_config.report_directory | default('/srv/samba/reports') }}/one_offs/ise"
  changed_when: false

- name: "ISE ANC | Validate required inputs"
  ansible.builtin.assert:
    that:
      - _ise_anc_lookup | length > 0
      - _ise_anc_policy_name | length > 0
      - _ise_anc_action in ['apply', 'clear']
      - _ise_anc_confirm == 'ANC'
    fail_msg: >-
      Endpoint ANC requires ise_lookup, ise_anc_policy_name,
      ise_anc_action=apply|clear, and ise_anc_confirm=ANC.

- name: "ISE ANC | Build endpoint URL"
  # ERS endpoint resource has no `name` field — only filter on mac.EQ
  # when the input is a MAC. Non-MAC inputs fall back to a full scan;
  # the downstream candidate resolver narrows via session data.
  ansible.builtin.set_fact:
    _ise_anc_endpoint_filter_clauses: >-
      {{
        ['mac.EQ.' ~ (_ise_anc_lookup | internal.ise.ise_normalize_mac)]
        if (_ise_anc_lookup | internal.ise.ise_normalize_mac | length) > 0
        else []
      }}
  changed_when: false

- name: "ISE ANC | Assemble endpoint URL"
  ansible.builtin.set_fact:
    _ise_anc_endpoint_url: >-
      https://{{ ise_pan_hostname }}:{{ ise_ers_port }}/ers/config/endpoint{%
        if _ise_anc_endpoint_filter_clauses | length > 0
      %}?{{ _ise_anc_endpoint_filter_clauses | map('regex_replace', '^', 'filter=') | join('&') }}{% endif %}
  changed_when: false

- name: "ISE ANC | Get endpoint inventory"
  ansible.builtin.uri:
    url: "{{ _ise_anc_endpoint_url }}"
    method: GET
    headers:
      Accept: application/json
  become: false
  register: _ise_anc_endpoints_raw
  changed_when: false
  failed_when: false

- name: "ISE ANC | Get active sessions"
  ansible.builtin.uri:
    url: "https://{{ ise_mnt_hostname }}/admin/API/mnt/Session/ActiveList"
    method: GET
    headers:
      Accept: application/xml
  become: false
  register: _ise_anc_active_sessions_raw
  changed_when: false
  failed_when: false

- name: "ISE ANC | Get ANC policies"
  ansible.builtin.uri:
    url: "https://{{ ise_pan_hostname }}:{{ ise_ers_port }}/ers/config/ancpolicy?size=100"
    method: GET
    headers:
      Accept: application/json
  become: false
  register: _ise_anc_policies_raw
  changed_when: false
  failed_when: false

- name: "ISE ANC | Get current ANC endpoints"
  ansible.builtin.uri:
    url: "https://{{ ise_pan_hostname }}:{{ ise_ers_port }}/ers/config/ancendpoint?size=100"
    method: GET
    headers:
      Accept: application/json
  become: false
  register: _ise_anc_endpoint_assignments_raw
  changed_when: false
  failed_when: false

- name: "ISE ANC | Shape candidates"
  ansible.builtin.set_fact:
    _ise_anc_endpoint_rows: "{{ _ise_anc_endpoints_raw | internal.ise.ise_result_rows | internal.ise.ise_endpoint_rows }}"
    _ise_anc_session_rows: "{{ _ise_anc_active_sessions_raw | internal.ise.ise_result_rows | internal.ise.ise_auth_rows }}"
    _ise_anc_policy_rows: "{{ _ise_anc_policies_raw | internal.ise.ise_result_rows }}"
    _ise_anc_assignment_rows: "{{ _ise_anc_endpoint_assignments_raw | internal.ise.ise_result_rows }}"
  changed_when: false

- name: "ISE ANC | Resolve endpoint candidates"
  ansible.builtin.set_fact:
    _ise_anc_candidates: "{{ _ise_anc_endpoint_rows | internal.ise.ise_coa_candidates(_ise_anc_session_rows, _ise_anc_lookup) }}"
  changed_when: false

- name: "ISE ANC | Require a resolved endpoint"
  ansible.builtin.assert:
    that:
      - _ise_anc_candidates | length > 0
      - (_ise_anc_candidates[0].mac | default('')) | length > 0
    fail_msg: >-
      No endpoint/session candidate with a MAC address matched
      '{{ _ise_anc_lookup }}'. Use a MAC address directly or run Endpoint
      Lookup first.

- name: "ISE ANC | Select target and build request"
  # Body shape verified against ciscoisesdk/api/v3_1_patch_1/anc_endpoint.py:
  #   {OperationAdditionalData: {additionalData: [{name, value}, ...]}}
  # Only the `apply` action carries policyName; `clear` only needs the MAC.
  ansible.builtin.set_fact:
    _ise_anc_target: "{{ _ise_anc_candidates[0] }}"
    _ise_anc_url: >-
      https://{{ ise_pan_hostname }}/ers/config/ancendpoint/{{ _ise_anc_action }}
    _ise_anc_body:
      OperationAdditionalData:
        additionalData: >-
          {{
            [{'name': 'macAddress', 'value': (_ise_anc_candidates[0].mac | internal.ise.ise_normalize_mac)}]
            + ([{'name': 'policyName', 'value': _ise_anc_policy_name}]
                if _ise_anc_action == 'apply' else [])
          }}
  changed_when: false

- name: "ISE ANC | Show target"
  ansible.builtin.debug:
    msg:
      action: "{{ _ise_anc_action }}"
      policy: "{{ _ise_anc_policy_name }}"
      selected_target: "{{ _ise_anc_target }}"
      matching_policies: "{{ _ise_anc_policy_rows | internal.ise.ise_search_rows(_ise_anc_policy_name) }}"
      current_assignments: "{{ _ise_anc_assignment_rows | internal.ise.ise_search_rows(_ise_anc_target.mac) }}"

- name: "ISE ANC | Apply or clear endpoint policy"
  ansible.builtin.uri:
    url: "{{ _ise_anc_url }}"
    method: PUT
    body_format: json
    body: "{{ _ise_anc_body }}"
    status_code: [200, 201, 202, 204]
    headers:
      Accept: application/json
      Content-Type: application/json
  become: false
  register: _ise_anc_result
  changed_when: _ise_anc_result.status in [200, 201, 202, 204]

- name: "ISE ANC | Build report"
  ansible.builtin.set_fact:
    _ise_anc_report:
      title: "Endpoint ANC"
      collected_at: "{{ _ise_anc_collected_at }}"
      ise_hostname: "{{ ise_hostname }}"
      action: "{{ _ise_anc_action }}"
      policy: "{{ _ise_anc_policy_name }}"
      status: "{{ _ise_anc_result.status | default('unknown') }}"
      selected_target: "{{ _ise_anc_target }}"
      matching_policies: "{{ _ise_anc_policy_rows | internal.ise.ise_search_rows(_ise_anc_policy_name) }}"
      current_assignments_before_action: "{{ _ise_anc_assignment_rows | internal.ise.ise_search_rows(_ise_anc_target.mac) }}"
      response:
        content: "{{ _ise_anc_result.content | default('') }}"
  changed_when: false

- name: "ISE ANC | Ensure report directory exists"
  ansible.builtin.file:
    path: "{{ _ise_anc_reports_root }}"
    state: directory
    mode: "0755"

- name: "ISE ANC | Write HTML report"
  ansible.builtin.copy:
    dest: >-
      {{ _ise_anc_reports_root }}/{{ _ise_anc_stamp }}-{{ inventory_hostname | lower | regex_replace('[^a-z0-9._-]+', '-') }}-endpoint-anc.html
    mode: "0644"
    content: "{{ _ise_anc_report | internal.ise.ise_one_off_html }}"
  register: _ise_anc_html_artifact

- name: "ISE ANC | Write CSV report"
  ansible.builtin.copy:
    dest: >-
      {{ _ise_anc_reports_root }}/{{ _ise_anc_stamp }}-{{ inventory_hostname | lower | regex_replace('[^a-z0-9._-]+', '-') }}-endpoint-anc.csv
    mode: "0644"
    content: "{{ _ise_anc_report | internal.ise.ise_one_off_csv }}"

- name: "ISE ANC | Result"
  ansible.builtin.debug:
    msg:
      status: "{{ _ise_anc_result.status | default('unknown') }}"
      changed: "{{ _ise_anc_result.changed | default(false) }}"
      response: "{{ _ise_anc_result.content | default('') }}"

- name: "ISE ANC | Publish report path"
  ansible.builtin.debug:
    msg: >-
      NCS_REPORT: one_offs/ise/{{ _ise_anc_html_artifact.dest | basename }}
