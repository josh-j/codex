      - name: "System Certs"
        value: "{{ system_certificate_count }}"
      - name: "Trusted Certs"
        value: "{{ trusted_certificate_count }}"
      - name: "Expired Certs"
        value: "{{ certificate_expired_count }}"
      - name: "Certs <=7d"
        value: "{{ certificate_expiring_7_count }}"
      - name: "Auth Profiles"
        value: "{{ authorization_profile_count }}"
      - name: "DACLs"
