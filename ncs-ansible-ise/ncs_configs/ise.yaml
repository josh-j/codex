        value: "{{ backup_start_date }}"
      - name: "Backup Age Days"
        value: "{{ backup_age_days }}"
      - name: "ISE Version"
        value: "{{ patch_ise_version }}"
      - name: "Installed Patches"
        value: "{{ patch_count }}"
      - name: "Hotpatches"
        value: "{{ hotpatch_count }}"

  - type: stat-cards
    slug: ise_security_audit
