      - name: "Allowed Protocols"
        value: "{{ allowed_protocol_count }}"
      - name: "TACACS Cmd Sets"
        value: "{{ tacacs_command_set_count }}"
      - name: "TACACS Profiles"
        value: "{{ tacacs_profile_count }}"
      - name: "AD Sources"
        value: "{{ active_directory_count }}"
      - name: "ID Store Sequences"
        value: "{{ id_store_sequence_count }}"
      - name: "Internal Users"
        value: "{{ internal_user_count }}"

  - type: table
    name: "System Certificates"
    when: system_certificate_count > 0
    rows: "{{ system_certificate_rows }}"
    columns:
      - name: "Name"
        value: "{{ name }}"
      - name: "Issued To"
        value: "{{ issued_to }}"
      - name: "Issued By"
        value: "{{ issued_by }}"
      - name: "Used By"
        value: "{{ used_by }}"
      - name: "Expires"
        value: "{{ expiration_date }}"
      - name: "Days Left"
        value: "{{ expires_in_days | round(1) }}"
        as: status-badge
        style_rules:
          - when: expires_in_days < 0
            css_class: "sv-critical"
          - when: expires_in_days >= 0 and expires_in_days <= 30
            css_class: "sv-warning"

  - type: table
    name: "Trusted Certificates"
    when: trusted_certificate_count > 0
    rows: "{{ trusted_certificate_rows }}"
    columns:
