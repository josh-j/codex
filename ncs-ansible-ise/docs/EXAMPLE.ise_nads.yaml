# Example inventory config for the internal.ise.ise_nads plugin.
#
# Usage:
#   1. Copy this file into your inventory tree as <name>.ise_nads.yaml
#      (the .ise_nads.yaml suffix is how Ansible discovers it).
#   2. Either fill in hostname / username / password below, or omit
#      them and set ISE_HOST / ISE_API_USER / ISE_API_PASSWORD in the
#      env (see "Siloing credentials" below for patterns).
#   3. ansible-inventory -i <name>.ise_nads.yaml --list
#      ansible-playbook  -i <name>.ise_nads.yaml site.yml
#
# Standard Constructable hooks apply: keyed_groups / compose / groups
# all operate against the host vars the plugin sets per NAD.

plugin: internal.ise.ise_nads

# --- Connection ---
# Each of hostname / username / password / validate_certs / port can
# be omitted here and resolved from env vars instead (ISE_HOST,
# ISE_API_USER, ISE_API_PASSWORD, ISE_VALIDATE_CERTS, ISE_ERS_PORT).
hostname: ise-pan.example.com
# port: 9060            # ERS default

username: ers.readonly
# Run `ansible-vault encrypt_string` to produce this in practice.
password: !vault |
  $ANSIBLE_VAULT;1.1;AES256
  3866666633323835...

validate_certs: false   # set true if you've imported the PAN's CA
# request_timeout: 60
# max_workers: 16
# page_size: 100
# max_pages: 100

# Optional: narrow to NADs whose name contains a substring (ERS
# server-side filter). Empty = the full fleet.
name_filter: ""

# Default parent group every NAD lands in.
parent_group: ise_nads

# Enable Ansible's inventory cache so repeat invocations don't re-hit
# the PAN — useful when you're iterating on a playbook.
cache: true
cache_plugin: jsonfile
cache_connection: /tmp/ise_nads_cache
cache_timeout: 3600

# Generate dynamic groups from the NDG-derived host vars.
keyed_groups:
  - key: ise_device_type
    prefix: type
    separator: "_"
  - key: ise_location
    prefix: loc
    separator: "_"
  - key: ise_ops_owner
    prefix: ops
    separator: "_"
  # Workcenter classifier — pairs with the per-workcenter group_vars
  # vault layout in ncs-ansible/docs/VAULT_LABELED_GROUPS.md. Each
  # ise_ops_owner value (e.g. `NetworkOps_Alpha`) becomes a group
  # `workcenter_NetworkOps_Alpha` which Ansible auto-loads
  # `group_vars/workcenter_NetworkOps_Alpha/{main,vault}.yaml` for.
  - key: ise_ops_owner
    prefix: workcenter
    separator: "_"

# Compose extra host vars off the same data. Example: set
# ansible_network_os to "ios" for anything ISE classifies as a switch.
compose:
  ansible_network_os: "'ios' if ise_device_type == 'Switch' else None"
  is_ipsec: "'IPSEC#All IPSEC#Is IPSEC Device' in ise_groups"

# Filter / add to groups conditionally with `groups:`.
# groups:
#   site_a_switches: "ise_device_type == 'Switch' and 'SiteA' in ise_location"

# =========================================================================
# Siloing credentials across multiple ISE deployments / vaults
# =========================================================================
#
# Three patterns, pick whichever matches your deployment story:
#
# --- 1. Per-shell env vars (one inventory file, multiple operators) ---
#
# Drop the username / password / hostname keys from this YAML entirely.
# Each operator (or CI job) exports their own values:
#
#   export ISE_HOST=ise-prod-pan.example.com
#   export ISE_API_USER=ers.readonly
#   export ISE_API_PASSWORD='…'
#   ansible-inventory -i inventory/ise_nads --graph
#
# Pair with direnv / .envrc per project root so each working tree
# auto-loads its own credentials when you `cd` into it.
#
# --- 2. Multi-vault labels (one repo, multiple ISE deployments) ---
#
# Encrypt each deployment's password under a deployment-specific
# vault label, then ship one .ise_nads.yaml per deployment.
#
#   echo '<prod-ers-password>' | ansible-vault encrypt_string \
#       --vault-id prod@~/.vault/prod.pass --name 'password' --stdin-name password
#   echo '<lab-ers-password>'  | ansible-vault encrypt_string \
#       --vault-id lab@~/.vault/lab.pass   --name 'password' --stdin-name password
#
# The resulting !vault blocks carry the label in their header
# ($ANSIBLE_VAULT;1.2;AES256;prod). At decrypt time Ansible matches
# the label to the right key:
#
#   ansible-playbook \
#     --vault-id prod@~/.vault/prod.pass \
#     --vault-id lab@~/.vault/lab.pass  \
#     -i inventory/ise_nads/prod.ise_nads.yaml site.yml
#
# Or put the list in ansible.cfg:
#
#   [defaults]
#   vault_identity_list = prod@~/.vault/prod.pass, lab@~/.vault/lab.pass
#
# Each inventory file's password is decryptable only with its
# matching label's key, so a leaked lab key never touches prod.
#
# --- 3. Per-inventory-dir vault password file ---
#
# Coarser-grained than #2 but no labels to manage:
#
#   inventory/
#     prod/
#       .vault_pass        # prod-only key (gitignored)
#       switches.ise_nads.yaml
#     lab/
#       .vault_pass
#       switches.ise_nads.yaml
#
# Run each with its own vault file:
#
#   ansible-playbook --vault-password-file inventory/prod/.vault_pass \
#     -i inventory/prod ...
