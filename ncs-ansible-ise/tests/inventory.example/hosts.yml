---
# internal.ise test inventory skeleton.
# The ise_collect playbook defaults to the ise_servers group. Each
# entry is an ISE node reachable from the Ansible control host.

all:
  children:
    ise_servers:
      hosts:
        ise-lab-01.example.test:
          ansible_host: 10.0.4.10
          ise_hostname: "{{ ansible_host }}"
          ise_username: admin
          ise_password: "{{ vault_ise_admin_password }}"
