---
# Lab defaults for Cisco ISE. The role runs with connection: local and
# reaches ISE over HTTPS, so no SSH user/password is needed.
ansible_connection: local

ise_verify: false
ise_version: "3.5.0"
ise_wait_on_rate_limit: true
ise_uses_api_gateway: true
ise_uses_csrf_token: false
ise_debug: false
ise_single_request_timeout: 60

ise_collect_network_devices: true
ise_collect_endpoints: false
ise_collect_guests: false
ise_collect_trustsec: true
ise_collect_certificates: true
ise_collect_node_health: true
ise_collect_backup_repository: true
ise_collect_patches: true
ise_collect_policy: true
ise_collect_device_admin: true
ise_collect_identity_sources: true
ise_collect_sessions: true
ise_collect_active_session_list: false

ise_replication_nodes: []
ise_repository_file_names: []
ise_authentication_status_seconds: 3600
ise_authentication_status_records: 25
ise_endpoint_repeat_counter_threshold: 3

vault_ise_admin_password: "replace-me-with-vaulted-value"
