---
# collections/ansible_collections/internal/linux/roles/ubuntu_stig_audit/tasks/stigs_ubuntu2404.yaml
# Refactored Ubuntu 24.04 STIG task file.
# Audit-mode tasks use explicit asserts/shell checks where the STIG check content
# requires exact command semantics. Remediation-mode tasks use idempotent modules.
# ansible-lint: skip-file

- name: "Set NCS STIG target type to ubuntu"
  ansible.builtin.set_fact:
    _ncs_stig_target_type: "ubuntu"
  tags:
    - always

- name: "Ubuntu STIG | Gather package facts"
  ansible.builtin.package_facts:
    manager: apt
  check_mode: false
  tags: [always]

- name: "Ubuntu STIG | Gather service facts"
  ansible.builtin.service_facts:
  check_mode: false
  tags: [always]

- name: "Ubuntu STIG | Ensure auditd is installed (remediate only)"
  ansible.builtin.apt:
    name: auditd
    state: present
  register: _apt_auditd
  until: _apt_auditd is success
  retries: 12
  delay: 10
  when: not (ansible_check_mode | default(false))

- name: "Ubuntu STIG | Ensure stig.rules exists (remediate only)"
  ansible.builtin.file:
    path: /etc/audit/rules.d/stig.rules
    state: touch
    mode: "0640"
    modification_time: preserve
    access_time: preserve
  when: not (ansible_check_mode | default(false))

# =============================================================================
# Package management and core services
# =============================================================================

- name: "stigrule_{{ item.id }}_package_absent_assert"
  ansible.builtin.assert:
    that:
      - item.pkg not in ansible_facts.packages
    fail_msg: "{{ item.pkg }} is installed"
    success_msg: "{{ item.pkg }} is absent"
  ignore_errors: true
  when:
    - ansible_check_mode | default(false)
    - vars[item.manage_var] | default(true) | bool
  loop:
    - { id: '270645', manage_var: 'ubuntu2404STIG_stigrule_270645_manage', pkg: 'systemd-timesyncd' }
    - { id: '270646', manage_var: 'ubuntu2404STIG_stigrule_270646_manage', pkg: 'ntp' }
    - { id: '270648', manage_var: 'ubuntu2404STIG_stigrule_270648_manage', pkg: 'rsh-server' }
  loop_control:
    label: "{{ item.id }}"

- name: "stigrule_{{ item.id }}_package_absent"
  ansible.builtin.apt:
    name: "{{ item.pkg }}"
    state: absent
    purge: "{{ item.purge | default(false) }}"
    autoremove: "{{ item.autoremove | default(false) }}"
    update_cache: "{{ item.update_cache | default(true) }}"
  when:
    - not (ansible_check_mode | default(false))
    - vars[item.manage_var] | default(true) | bool
  loop:
    - { id: '270645', manage_var: 'ubuntu2404STIG_stigrule_270645_manage', pkg: 'systemd-timesyncd', purge: true }
    - { id: '270646', manage_var: 'ubuntu2404STIG_stigrule_270646_manage', pkg: 'ntp', purge: true }
    - { id: '270648', manage_var: 'ubuntu2404STIG_stigrule_270648_manage', pkg: 'rsh-server' }
  loop_control:
    label: "{{ item.id }}"

- name: "stigrule_270647_telnetd_check"
  ansible.builtin.shell:
    cmd: "dpkg -l | grep -w telnetd"
  register: _stigrule_270647_telnetd
  changed_when: false
  failed_when: false
  check_mode: false
  when:
    - ubuntu2404STIG_stigrule_270647_manage | default(true) | bool

- name: "stigrule_270647_telnetd_assert"
  ansible.builtin.assert:
    that:
      - _stigrule_270647_telnetd.rc != 0
    fail_msg: "telnetd is installed"
    success_msg: "telnetd is absent"
  ignore_errors: true
  when:
    - ubuntu2404STIG_stigrule_270647_manage | default(true) | bool
    - _stigrule_270647_telnetd is defined

- name: "stigrule_270647_telnetd_remove"
  ansible.builtin.apt:
    name: telnetd
    state: absent
    purge: true
    autoremove: true
  when:
    - not (ansible_check_mode | default(false))
    - ubuntu2404STIG_stigrule_270647_manage | default(true) | bool

- name: "stigrule_{{ item.id }}_package_present_assert"
  ansible.builtin.assert:
    that:
      - item.pkg in ansible_facts.packages
    fail_msg: "{{ item.pkg }} is not installed"
    success_msg: "{{ item.pkg }} is installed"
  ignore_errors: true
  when:
    - ansible_check_mode | default(false)
    - vars[item.manage_var] | default(true) | bool
  loop:
    - { id: '270649', manage_var: 'ubuntu2404STIG_stigrule_270649_manage', pkg: 'aide' }
    - { id: '270654', manage_var: 'ubuntu2404STIG_stigrule_270654_manage', pkg: 'ufw' }
    - { id: '270656', manage_var: 'ubuntu2404STIG_stigrule_270656_manage', pkg: 'auditd' }
    - { id: '270659', manage_var: 'ubuntu2404STIG_stigrule_270659_manage', pkg: 'apparmor' }
    - { id: '270661', manage_var: 'ubuntu2404STIG_stigrule_270661_manage', pkg: 'libpam-pwquality' }
    - { id: '270664', manage_var: 'ubuntu2404STIG_stigrule_270664_manage', pkg: 'chrony' }
    - { id: '270665', manage_var: 'ubuntu2404STIG_stigrule_270665_manage', pkg: 'openssh-server' }
    - { id: '270672', manage_var: 'ubuntu2404STIG_stigrule_270672_manage', pkg: 'opensc-pkcs11' }
    - { id: '270673', manage_var: 'ubuntu2404STIG_stigrule_270673_manage', pkg: 'libpam-pkcs11' }
    - { id: '270674', manage_var: 'ubuntu2404STIG_stigrule_270674_manage', pkg: 'vlock' }
  loop_control:
    label: "{{ item.id }}"

- name: "stigrule_{{ item.id }}_package_present"
  ansible.builtin.apt:
    name: "{{ item.pkg }}"
    state: present
    update_cache: true
  when:
    - not (ansible_check_mode | default(false))
    - vars[item.manage_var] | default(true) | bool
  loop:
    - { id: '270649', manage_var: 'ubuntu2404STIG_stigrule_270649_manage', pkg: 'aide' }
    - { id: '270654', manage_var: 'ubuntu2404STIG_stigrule_270654_manage', pkg: 'ufw' }
    - { id: '270656', manage_var: 'ubuntu2404STIG_stigrule_270656_manage', pkg: 'auditd' }
    - { id: '270659', manage_var: 'ubuntu2404STIG_stigrule_270659_manage', pkg: 'apparmor' }
    - { id: '270661', manage_var: 'ubuntu2404STIG_stigrule_270661_manage', pkg: 'libpam-pwquality' }
    - { id: '270664', manage_var: 'ubuntu2404STIG_stigrule_270664_manage', pkg: 'chrony' }
    - { id: '270665', manage_var: 'ubuntu2404STIG_stigrule_270665_manage', pkg: 'openssh-server' }
    - { id: '270672', manage_var: 'ubuntu2404STIG_stigrule_270672_manage', pkg: 'opensc-pkcs11' }
    - { id: '270673', manage_var: 'ubuntu2404STIG_stigrule_270673_manage', pkg: 'libpam-pkcs11' }
    - { id: '270674', manage_var: 'ubuntu2404STIG_stigrule_270674_manage', pkg: 'vlock' }
  loop_control:
    label: "{{ item.id }}"

- name: "stigrule_270653_rsyslog_assert"
  ansible.builtin.assert:
    that:
      - "'rsyslog' in ansible_facts.packages"
      - ansible_facts.services.get('rsyslog.service', {}).get('state') == 'running'
    fail_msg: "rsyslog is not installed or not running"
    success_msg: "rsyslog is installed and running"
  ignore_errors: true
  when:
    - ansible_check_mode | default(false)
    - ubuntu2404STIG_stigrule_270653_manage | default(true) | bool

- name: "stigrule_270653_rsyslog"
  ansible.builtin.apt:
    name: rsyslog
    state: present
    update_cache: true
  when:
    - not (ansible_check_mode | default(false))
    - ubuntu2404STIG_stigrule_270653_manage | default(true) | bool

- name: "stigrule_270655_ufw_status_check"
  ansible.builtin.command:
