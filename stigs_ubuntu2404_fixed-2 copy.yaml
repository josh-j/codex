  register: _stigrule_270655_ufw_status
  changed_when: false
  failed_when: false
  check_mode: false
  when:
    - ubuntu2404STIG_stigrule_270655_manage | default(true) | bool

- name: "stigrule_270655_ufw_status_assert"
  ansible.builtin.assert:
    that:
      - _stigrule_270655_ufw_status.rc == 0
      - "'Status: active' in _stigrule_270655_ufw_status.stdout"
    fail_msg: "ufw is not active"
    success_msg: "ufw is active"
  ignore_errors: true
  when:
    - ubuntu2404STIG_stigrule_270655_manage | default(true) | bool
    - _stigrule_270655_ufw_status is defined

- name: "stigrule_270655_ufw_enable"
  community.general.ufw:
    state: enabled
  become: true
  when:
    - not (ansible_check_mode | default(false))
    - ubuntu2404STIG_stigrule_270655_manage | default(true) | bool

- name: "stigrule_270662_sssd_packages_assert"
  ansible.builtin.assert:
    that:
      - "'sssd' in ansible_facts.packages"
      - "'libpam-sss' in ansible_facts.packages"
      - "'libnss-sss' in ansible_facts.packages"
    fail_msg: "SSSD package set is incomplete"
    success_msg: "SSSD package set is installed"
  ignore_errors: true
  when:
    - ansible_check_mode | default(false)
    - ubuntu2404STIG_stigrule_270662_manage | default(true) | bool

- name: "stigrule_270662_sssd_packages_install"
  ansible.builtin.apt:
    name:
      - sssd
      - libpam-sss
      - libnss-sss
    state: present
    update_cache: true
  when:
    - not (ansible_check_mode | default(false))
    - ubuntu2404STIG_stigrule_270662_manage | default(true) | bool

- name: "stigrule_{{ item.id }}_service_assert"
  ansible.builtin.assert:
    that:
      - ansible_facts.services.get(item.unit, {}).get('state') == 'running'
      - ansible_facts.services.get(item.unit, {}).get('status') == 'enabled'
    fail_msg: "{{ item.unit }} is not running and enabled"
    success_msg: "{{ item.unit }} is running and enabled"
  ignore_errors: true
  when:
    - ansible_check_mode | default(false)
    - vars[item.manage_var] | default(true) | bool
  loop:
    - { id: '270657', manage_var: 'ubuntu2404STIG_stigrule_270657_manage', unit: 'auditd.service' }
    - { id: '270660', manage_var: 'ubuntu2404STIG_stigrule_270660_manage', unit: 'apparmor.service' }
    - { id: '270663', manage_var: 'ubuntu2404STIG_stigrule_270663_manage', unit: 'sssd.service' }
  loop_control:
    label: "{{ item.id }}"

- name: "stigrule_270657_auditd_enable"
  ansible.builtin.service:
    name: auditd.service
    state: "{{ ubuntu2404STIG_stigrule_270657_auditd_enable_state }}"
    enabled: "{{ ubuntu2404STIG_stigrule_270657_auditd_enable_enabled }}"
  when:
    - not (ansible_check_mode | default(false))
    - ubuntu2404STIG_stigrule_270657_manage | default(true) | bool
    - "'auditd.service' in ansible_facts.services"

- name: "stigrule_270660_apparmor_start"
  ansible.builtin.service:
    name: apparmor.service
    state: "{{ ubuntu2404STIG_stigrule_270660_apparmor_start_state }}"
    enabled: "{{ ubuntu2404STIG_stigrule_270660_apparmor_enable_enabled }}"
  when:
    - not (ansible_check_mode | default(false))
    - ubuntu2404STIG_stigrule_270660_manage | default(true) | bool
    - "'apparmor.service' in ansible_facts.services"

- name: "stigrule_270663_sssd_enable"
  ansible.builtin.service:
    name: sssd.service
    state: "{{ ubuntu2404STIG_stigrule_270663_sssd_enable_state }}"
    enabled: "{{ ubuntu2404STIG_stigrule_270663_sssd_enable_enabled }}"
  when:
    - not (ansible_check_mode | default(false))
    - ubuntu2404STIG_stigrule_270663_manage | default(true) | bool
    - "'sssd.service' in ansible_facts.services"

- name: "stigrule_270666_ssh_enabled_check"
  ansible.builtin.command:
    cmd: systemctl is-enabled ssh
  register: _stigrule_270666_ssh_enabled
  changed_when: false
  failed_when: false
  check_mode: false
  when:
    - ubuntu2404STIG_stigrule_270666_manage | default(true) | bool

- name: "stigrule_270666_ssh_active_check"
  ansible.builtin.command:
    cmd: systemctl is-active ssh
  register: _stigrule_270666_ssh_active
  changed_when: false
  failed_when: false
  check_mode: false
  when:
    - ubuntu2404STIG_stigrule_270666_manage | default(true) | bool

- name: "stigrule_270666_ssh_assert"
  ansible.builtin.assert:
    that:
      - _stigrule_270666_ssh_enabled.stdout | trim == 'enabled'
      - _stigrule_270666_ssh_active.stdout | trim == 'active'
    fail_msg: "ssh is not enabled and active"
    success_msg: "ssh is enabled and active"
  ignore_errors: true
  when:
    - ubuntu2404STIG_stigrule_270666_manage | default(true) | bool
    - _stigrule_270666_ssh_enabled is defined
    - _stigrule_270666_ssh_active is defined

- name: "stigrule_270666_ssh_start"
  ansible.builtin.service:
    name: ssh.service
    state: "{{ ubuntu2404STIG_stigrule_270666_ssh_start_state }}"
    enabled: "{{ ubuntu2404STIG_stigrule_270666_ssh_active_enabled }}"
  when:
    - not (ansible_check_mode | default(false))
    - ubuntu2404STIG_stigrule_270666_manage | default(true) | bool
    - "'ssh.service' in ansible_facts.services"
# =============================================================================
# Exact-audit SSH crypto rules
# =============================================================================

- name: "stigrule_{{ item.id }}_ssh_check"
  ansible.builtin.shell:
    cmd: "{{ item.check_cmd }}"
  register: _ssh_crypto_checks
  changed_when: false
  failed_when: false
  check_mode: false
  when:
    - vars[item.manage_var] | default(true) | bool
    - ansible_facts.packages['openssh-server'] is defined
  loop:
    - id: '270667'
      manage_var: 'ubuntu2404STIG_stigrule_270667_manage'
      check_cmd: 'grep -rsiE ''^\s*Ciphers\s+'' /etc/ssh/sshd_config /etc/ssh/sshd_config.d 2>/dev/null'
    - id: '270668'
      manage_var: 'ubuntu2404STIG_stigrule_270668_manage'
      check_cmd: 'grep -rsiE ''^\s*MACs\s+'' /etc/ssh/sshd_config /etc/ssh/sshd_config.d 2>/dev/null'
    - id: '270669'
      manage_var: 'ubuntu2404STIG_stigrule_270669_manage'
      check_cmd: 'grep -rsiE ''^\s*KexAlgorithms\s+'' /etc/ssh/sshd_config /etc/ssh/sshd_config.d 2>/dev/null'
    - id: '270670'
      manage_var: 'ubuntu2404STIG_stigrule_270670_manage'
      check_cmd: 'grep -rsiE ''^\s*Ciphers\s+'' /etc/ssh/ssh_config /etc/ssh/ssh_config.d 2>/dev/null'
    - id: '270671'
      manage_var: 'ubuntu2404STIG_stigrule_270671_manage'
      check_cmd: 'grep -rsiE ''^\s*MACs\s+'' /etc/ssh/ssh_config /etc/ssh/ssh_config.d 2>/dev/null'
  loop_control:
    label: "{{ item.id }}"

- name: "stigrule_{{ item.item.id }}_ssh_assert"
  ansible.builtin.assert:
    that:
      - item.stdout_lines | length == 1
      - item.stdout is search(item_expected[item.item.id])
    fail_msg: "SSH setting {{ item.item.id }} is missing, commented, or conflicting across config includes"
    success_msg: "SSH setting {{ item.item.id }} matches STIG exactly"
  vars:
    item_expected:
      '270667': 'Ciphers aes256-gcm@openssh.com,aes128-gcm@openssh.com,aes256-ctr,aes128-ctr$'
      '270668': 'MACs hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com,hmac-sha2-512,hmac-sha2-256$'
      '270669': 'KexAlgorithms ecdh-sha2-nistp521,ecdh-sha2-nistp384,ecdh-sha2-nistp256,diffie-hellman-group-exchange-sha256,diffie-hellman-group16-sha512,diffie-hellman-group14-sha256$'
      '270670': 'Ciphers aes256-gcm@openssh.com,aes128-gcm@openssh.com,aes256-ctr,aes128-ctr$'
      '270671': 'MACs hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com,hmac-sha2-512,hmac-sha2-256$'
  ignore_errors: true
  when:
    - item is mapping
  loop: "{{ _ssh_crypto_checks.results | default([]) }}"
  loop_control:
    label: "{{ item.item.id if (item is mapping and item.item is defined) else 'unknown' }}"

- name: "stigrule_{{ item.id }}_ssh_remediate"
  ansible.builtin.lineinfile:
    path: "{{ item.path }}"
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    create: true
  notify: ssh_restart
  when:
    - not (ansible_check_mode | default(false))
    - vars[item.manage_var] | default(true) | bool
    - ansible_facts.packages['openssh-server'] is defined
  loop:
    - id: '270667'
      manage_var: 'ubuntu2404STIG_stigrule_270667_manage'
      path: '/etc/ssh/sshd_config'
      regexp: '(?i)^\s*Ciphers\s+'
      line: "{{ ubuntu2404STIG_stigrule_270667_Ciphers_line }}"
    - id: '270668'
      manage_var: 'ubuntu2404STIG_stigrule_270668_manage'
      path: '/etc/ssh/sshd_config'
      regexp: '(?i)^\s*MACs\s+'
      line: "{{ ubuntu2404STIG_stigrule_270668_MACs_line }}"
    - id: '270669'
      manage_var: 'ubuntu2404STIG_stigrule_270669_manage'
      path: '/etc/ssh/sshd_config'
      regexp: '(?i)^\s*KexAlgorithms\s+'
      line: "{{ ubuntu2404STIG_stigrule_270669_KexAlgorithms_line }}"
    - id: '270670'
      manage_var: 'ubuntu2404STIG_stigrule_270670_manage'
      path: '/etc/ssh/ssh_config'
      regexp: '(?i)^\s*Ciphers\s+'
      line: "{{ ubuntu2404STIG_stigrule_270670_Ciphers_line }}"
    - id: '270671'
      manage_var: 'ubuntu2404STIG_stigrule_270671_manage'
      path: '/etc/ssh/ssh_config'
      regexp: '(?i)^\s*MACs\s+'
      line: "{{ ubuntu2404STIG_stigrule_270671_MACs_line }}"
  loop_control:
    label: "{{ item.id }}"
# =============================================================================
# Direct file and config rules
# =============================================================================

- name: "stigrule_270652_aide_silentreports"
  ansible.builtin.lineinfile:
    path: /etc/default/aide
    regexp: "^SILENTREPORTS="
    line: "{{ ubuntu2404STIG_stigrule_270652_silentreports_line }}"
    create: true
  when:
    - ubuntu2404STIG_stigrule_270652_manage | default(true) | bool

- name: "stigrule_270675_grub_password_assert"
  ansible.builtin.shell:
    cmd: "grep -iE '^password_pbkdf2[[:space:]]+root[[:space:]]+' /boot/grub/grub.cfg"
  register: _grub_pw
  changed_when: false
  failed_when: false
  check_mode: false
  when:
    - ubuntu2404STIG_stigrule_270675_manage | default(false) | bool

- name: "stigrule_270675_grub_password_check"
  ansible.builtin.assert:
    that:
      - _grub_pw.rc == 0
    fail_msg: "No GRUB password_pbkdf2 root entry found"
    success_msg: "GRUB password is set"
  ignore_errors: true
  when:
    - ubuntu2404STIG_stigrule_270675_manage | default(false) | bool
    - _grub_pw is defined

- name: "stigrule_270676_grub_audit_assert"
  ansible.builtin.shell:
    cmd: 'grep -E ''^\s*linux'' /boot/grub/grub.cfg | grep -q ''audit=1'''
  register: _grub_audit
  changed_when: false
  failed_when: false
  check_mode: false
  when:
    - ubuntu2404STIG_stigrule_270676_manage | default(true) | bool

- name: "stigrule_270676_grub_audit_check"
  ansible.builtin.assert:
    that:
      - _grub_audit.rc == 0
    fail_msg: "audit=1 not found in GRUB config"
    success_msg: "audit=1 is set in GRUB config"
  ignore_errors: true
  when:
    - ubuntu2404STIG_stigrule_270676_manage | default(true) | bool
    - _grub_audit is defined

- name: "stigrule_270676_grub_cmdline_linux"
  ansible.builtin.lineinfile:
    path: /etc/default/grub
    regexp: '^GRUB_CMDLINE_LINUX="'
    line: "{{ ubuntu2404STIG_stigrule_270676_grub_cmdline_linux_line }}"
  notify: update_grub
  when:
    - not (ansible_check_mode | default(false))
    - ubuntu2404STIG_stigrule_270676_manage | default(true) | bool

- name: "stigrule_270678_dconf_session_lock"
  block:
    - name: "stigrule_270678_idle_delay"
      community.general.ini_file:
        path: /etc/dconf/db/local.d/00-screensaver
        section: org/gnome/desktop/session
        option: idle-delay
        value: "{{ ubuntu2404STIG_stigrule_270678__etc_dconf_db_local_d_00_screensaver_idle_delay_value }}"
        no_extra_spaces: true
      notify: dconf_update

    - name: "stigrule_270678_lock_enabled"
      community.general.ini_file:
        path: /etc/dconf/db/local.d/00-screensaver
        section: org/gnome/desktop/screensaver
        option: lock-enabled
        value: "{{ ubuntu2404STIG_stigrule_270678__etc_dconf_db_local_d_00_screensaver_lock_enabled_value }}"
        no_extra_spaces: true
      notify: dconf_update

    - name: "stigrule_270678_lock_delay"
      community.general.ini_file:
        path: /etc/dconf/db/local.d/00-screensaver
        section: org/gnome/desktop/screensaver
        option: lock-delay
        value: "{{ ubuntu2404STIG_stigrule_270678__etc_dconf_db_local_d_00_screensaver_lock_delay_value }}"
        no_extra_spaces: true
      notify: dconf_update
  when:
    - ubuntu2404STIG_stigrule_270678_manage | default(true) | bool
    - ansible_facts.packages['gdm3'] is defined

- name: "stigrule_270679_automount_open_lock"
  ansible.builtin.lineinfile:
    path: /etc/dconf/db/local.d/locks/00-security-settings-lock
    regexp: '^/org/gnome/desktop/media-handling/automount-open$'
    line: '/org/gnome/desktop/media-handling/automount-open'
    create: true
  notify: dconf_update
  when:
    - ubuntu2404STIG_stigrule_270679_manage | default(true) | bool
    - ansible_facts.packages['gdm3'] is defined

- name: "stigrule_270680_tmout_profile"
  ansible.builtin.copy:
    dest: "{{ ubuntu2404STIG_stigrule_270680__etc_profile_d_99_terminal_tmout_sh_dest }}"
    content: "{{ ubuntu2404STIG_stigrule_270680__etc_profile_d_99_terminal_tmout_sh_content }}"
  when:
    - ubuntu2404STIG_stigrule_270680_manage | default(true) | bool

