# =============================================================================
# Additional audit daemon controls and remaining audit rules
# =============================================================================

- name: "stigrule_270658_audisp_remote_check"
  ansible.builtin.shell:
    cmd: |
      set -e
      dpkg -l | grep -w audispd-plugins
      grep -Eq '^active *= *yes$' /etc/audit/plugins.d/au-remote.conf
      grep -Eq '^remote_server *= *.+$' /etc/audit/audisp-remote.conf
  register: _stigrule_270658_audisp_remote
  changed_when: false
  failed_when: false
  check_mode: false
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - ubuntu2404STIG_stigrule_270658_manage | default(true) | bool

- name: "stigrule_270658_audisp_remote_assert"
  ansible.builtin.assert:
    that:
      - _stigrule_270658_audisp_remote.rc == 0
    fail_msg: "audisp remote offload is not configured"
    success_msg: "audisp remote offload is configured"
  ignore_errors: true
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - ubuntu2404STIG_stigrule_270658_manage | default(true) | bool
    - _stigrule_270658_audisp_remote is defined

- name: "stigrule_270658_audisp_remote_package"
  ansible.builtin.apt:
    name: audispd-plugins
    state: present
    update_cache: true
  when:
    - not (ansible_check_mode | default(false))
    - ubuntu2404STIG_stigrule_270658_manage | default(true) | bool

- name: "stigrule_270658_audisp_remote_active"
  ansible.builtin.lineinfile:
    path: /etc/audit/plugins.d/au-remote.conf
    regexp: '^\s*active\s*='
    line: 'active = yes'
    create: true
  notify: auditd_restart
  when:
    - not (ansible_check_mode | default(false))
    - ubuntu2404STIG_stigrule_270658_manage | default(true) | bool

- name: "stigrule_270658_audisp_remote_server"
  ansible.builtin.lineinfile:
    path: /etc/audit/audisp-remote.conf
    regexp: '^\s*remote_server\s*='
    line: 'remote_server = {{ ubuntu2404STIG_stigrule_270658_remote_server }}'
    create: true
  notify: auditd_restart
  when:
    - not (ansible_check_mode | default(false))
    - ubuntu2404STIG_stigrule_270658_manage | default(true) | bool
    - ubuntu2404STIG_stigrule_270658_remote_server | default('') | length > 0

- name: "stigrule_{{ item.id }}_additional_audit_rule"
  ansible.builtin.lineinfile:
    path: /etc/audit/rules.d/stig.rules
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    create: true
  notify: reload_audit_rules
  when:
    - not (ansible_check_mode | default(false))
    - vars[item.manage_var] | default(true) | bool
  loop:
    - { id: '270784a', manage_var: 'ubuntu2404STIG_stigrule_270784_manage', regexp: '^-a always,exit -F arch=b32 -S setxattr,fsetxattr,lsetxattr,removexattr,fremovexattr,lremovexattr -F auid>=1000 -F auid!=-1 -k perm_mod$', line: '-a always,exit -F arch=b32 -S setxattr,fsetxattr,lsetxattr,removexattr,fremovexattr,lremovexattr -F auid>=1000 -F auid!=-1 -k perm_mod' }
    - { id: '270784b', manage_var: 'ubuntu2404STIG_stigrule_270784_manage', regexp: '^-a always,exit -F arch=b32 -S setxattr,fsetxattr,lsetxattr,removexattr,fremovexattr,lremovexattr -F auid=0 -k perm_mod$', line: '-a always,exit -F arch=b32 -S setxattr,fsetxattr,lsetxattr,removexattr,fremovexattr,lremovexattr -F auid=0 -k perm_mod' }
    - { id: '270784c', manage_var: 'ubuntu2404STIG_stigrule_270784_manage', regexp: '^-a always,exit -F arch=b64 -S setxattr,fsetxattr,lsetxattr,removexattr,fremovexattr,lremovexattr -F auid>=1000 -F auid!=-1 -k perm_mod$', line: '-a always,exit -F arch=b64 -S setxattr,fsetxattr,lsetxattr,removexattr,fremovexattr,lremovexattr -F auid>=1000 -F auid!=-1 -k perm_mod' }
    - { id: '270784d', manage_var: 'ubuntu2404STIG_stigrule_270784_manage', regexp: '^-a always,exit -F arch=b64 -S setxattr,fsetxattr,lsetxattr,removexattr,fremovexattr,lremovexattr -F auid=0 -k perm_mod$', line: '-a always,exit -F arch=b64 -S setxattr,fsetxattr,lsetxattr,removexattr,fremovexattr,lremovexattr -F auid=0 -k perm_mod' }
    - { id: '270785a', manage_var: 'ubuntu2404STIG_stigrule_270785_manage', regexp: '^-a always,exit -F arch=b32 -S chown,fchown,fchownat,lchown -F auid>=1000 -F auid!=-1 -k perm_chng$', line: '-a always,exit -F arch=b32 -S chown,fchown,fchownat,lchown -F auid>=1000 -F auid!=-1 -k perm_chng' }
    - { id: '270785b', manage_var: 'ubuntu2404STIG_stigrule_270785_manage', regexp: '^-a always,exit -F arch=b64 -S chown,fchown,fchownat,lchown -F auid>=1000 -F auid!=-1 -k perm_chng$', line: '-a always,exit -F arch=b64 -S chown,fchown,fchownat,lchown -F auid>=1000 -F auid!=-1 -k perm_chng' }
    - { id: '270796', manage_var: 'ubuntu2404STIG_stigrule_270796_manage', regexp: '^-w /var/log/faillog -p wa -k logins$', line: '-w /var/log/faillog -p wa -k logins' }
    - { id: '270797', manage_var: 'ubuntu2404STIG_stigrule_270797_manage', regexp: '^-w /var/log/lastlog -p wa -k logins$', line: '-w /var/log/lastlog -p wa -k logins' }
    - { id: '270805a', manage_var: 'ubuntu2404STIG_stigrule_270805_manage', regexp: '^-a always,exit -F arch=b32 -S init_module,finit_module -F auid>=1000 -F auid!=-1 -k module_chng$', line: '-a always,exit -F arch=b32 -S init_module,finit_module -F auid>=1000 -F auid!=-1 -k module_chng' }
    - { id: '270805b', manage_var: 'ubuntu2404STIG_stigrule_270805_manage', regexp: '^-a always,exit -F arch=b64 -S init_module,finit_module -F auid>=1000 -F auid!=-1 -k module_chng$', line: '-a always,exit -F arch=b64 -S init_module,finit_module -F auid>=1000 -F auid!=-1 -k module_chng' }
    - { id: '270809a', manage_var: 'ubuntu2404STIG_stigrule_270809_manage', regexp: '^-a always,exit -F arch=b64 -S unlink,unlinkat,rename,renameat,rmdir -F auid>=1000 -F auid!=-1 -k delete$', line: '-a always,exit -F arch=b64 -S unlink,unlinkat,rename,renameat,rmdir -F auid>=1000 -F auid!=-1 -k delete' }
    - { id: '270809b', manage_var: 'ubuntu2404STIG_stigrule_270809_manage', regexp: '^-a always,exit -F arch=b32 -S unlink,unlinkat,rename,renameat,rmdir -F auid>=1000 -F auid!=-1 -k delete$', line: '-a always,exit -F arch=b32 -S unlink,unlinkat,rename,renameat,rmdir -F auid>=1000 -F auid!=-1 -k delete' }
    - { id: '270810', manage_var: 'ubuntu2404STIG_stigrule_270810_manage', regexp: '^-w /var/log/wtmp -p wa -k logins$', line: '-w /var/log/wtmp -p wa -k logins' }
    - { id: '270811', manage_var: 'ubuntu2404STIG_stigrule_270811_manage', regexp: '^-w /var/run/utmp -p wa -k logins$', line: '-w /var/run/utmp -p wa -k logins' }
    - { id: '270812', manage_var: 'ubuntu2404STIG_stigrule_270812_manage', regexp: '^-w /var/log/btmp -p wa -k logins$', line: '-w /var/log/btmp -p wa -k logins' }
    - { id: '270813', manage_var: 'ubuntu2404STIG_stigrule_270813_manage', regexp: '^-w /sbin/modprobe -p x -k modules$', line: '-w /sbin/modprobe -p x -k modules' }
    - { id: '270814', manage_var: 'ubuntu2404STIG_stigrule_270814_manage', regexp: '^-w /bin/kmod -p x -k modules$', line: '-w /bin/kmod -p x -k modules' }
  loop_control:
    label: "{{ item.id }}"

- name: "stigrule_{{ item.id }}_additional_audit_rule_check"
  ansible.builtin.shell:
    cmd: |
      set -e
      grep -Fqx -- {{ item.line | quote }} /etc/audit/rules.d/stig.rules
      auditctl -l | grep -Fqx -- {{ item.line | quote }}
  register: _stigrule_42_audit_rule_checks
  changed_when: false
  failed_when: false
  check_mode: false
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - vars[item.manage_var] | default(true) | bool
  loop:
    - { id: '270784a', manage_var: 'ubuntu2404STIG_stigrule_270784_manage', line: '-a always,exit -F arch=b32 -S setxattr,fsetxattr,lsetxattr,removexattr,fremovexattr,lremovexattr -F auid>=1000 -F auid!=-1 -k perm_mod' }
    - { id: '270784b', manage_var: 'ubuntu2404STIG_stigrule_270784_manage', line: '-a always,exit -F arch=b32 -S setxattr,fsetxattr,lsetxattr,removexattr,fremovexattr,lremovexattr -F auid=0 -k perm_mod' }
    - { id: '270784c', manage_var: 'ubuntu2404STIG_stigrule_270784_manage', line: '-a always,exit -F arch=b64 -S setxattr,fsetxattr,lsetxattr,removexattr,fremovexattr,lremovexattr -F auid>=1000 -F auid!=-1 -k perm_mod' }
    - { id: '270784d', manage_var: 'ubuntu2404STIG_stigrule_270784_manage', line: '-a always,exit -F arch=b64 -S setxattr,fsetxattr,lsetxattr,removexattr,fremovexattr,lremovexattr -F auid=0 -k perm_mod' }
    - { id: '270785a', manage_var: 'ubuntu2404STIG_stigrule_270785_manage', line: '-a always,exit -F arch=b32 -S chown,fchown,fchownat,lchown -F auid>=1000 -F auid!=-1 -k perm_chng' }
    - { id: '270785b', manage_var: 'ubuntu2404STIG_stigrule_270785_manage', line: '-a always,exit -F arch=b64 -S chown,fchown,fchownat,lchown -F auid>=1000 -F auid!=-1 -k perm_chng' }
    - { id: '270796', manage_var: 'ubuntu2404STIG_stigrule_270796_manage', line: '-w /var/log/faillog -p wa -k logins' }
    - { id: '270797', manage_var: 'ubuntu2404STIG_stigrule_270797_manage', line: '-w /var/log/lastlog -p wa -k logins' }
    - { id: '270805a', manage_var: 'ubuntu2404STIG_stigrule_270805_manage', line: '-a always,exit -F arch=b32 -S init_module,finit_module -F auid>=1000 -F auid!=-1 -k module_chng' }
    - { id: '270805b', manage_var: 'ubuntu2404STIG_stigrule_270805_manage', line: '-a always,exit -F arch=b64 -S init_module,finit_module -F auid>=1000 -F auid!=-1 -k module_chng' }
    - { id: '270809a', manage_var: 'ubuntu2404STIG_stigrule_270809_manage', line: '-a always,exit -F arch=b64 -S unlink,unlinkat,rename,renameat,rmdir -F auid>=1000 -F auid!=-1 -k delete' }
    - { id: '270809b', manage_var: 'ubuntu2404STIG_stigrule_270809_manage', line: '-a always,exit -F arch=b32 -S unlink,unlinkat,rename,renameat,rmdir -F auid>=1000 -F auid!=-1 -k delete' }
    - { id: '270810', manage_var: 'ubuntu2404STIG_stigrule_270810_manage', line: '-w /var/log/wtmp -p wa -k logins' }
    - { id: '270811', manage_var: 'ubuntu2404STIG_stigrule_270811_manage', line: '-w /var/run/utmp -p wa -k logins' }
    - { id: '270812', manage_var: 'ubuntu2404STIG_stigrule_270812_manage', line: '-w /var/log/btmp -p wa -k logins' }
    - { id: '270813', manage_var: 'ubuntu2404STIG_stigrule_270813_manage', line: '-w /sbin/modprobe -p x -k modules' }
    - { id: '270814', manage_var: 'ubuntu2404STIG_stigrule_270814_manage', line: '-w /bin/kmod -p x -k modules' }
  loop_control:
    label: "{{ item.id }}"

- name: "stigrule_{{ item.item.id }}_additional_audit_rule_assert"
  ansible.builtin.assert:
    that:
      - item.rc == 0
    fail_msg: "Additional audit rule for STIG {{ item.item.id }} is missing"
    success_msg: "Additional audit rule for STIG {{ item.item.id }} is present"
  ignore_errors: true
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - item is mapping
  loop: "{{ _stigrule_42_audit_rule_checks.results | default([]) }}"
  loop_control:
    label: "{{ item.item.id if (item is mapping and item.item is defined) else 'unknown' }}"

- name: "stigrule_270816_audit_capacity_check"
  ansible.builtin.shell:
    cmd: |
      set -e
      log_file="$(awk -F'= *' '/^log_file/ {print $2}' /etc/audit/auditd.conf)"
      mount_dir="$(dirname "$log_file")"
      free_kb="$(df -Pk "$mount_dir" | awk 'NR==2 {print $4}')"
      test "$free_kb" -ge "{{ ubuntu2404STIG_stigrule_270816_min_free_kb | default(0) }}"
  register: _stigrule_270816_capacity
  changed_when: false
  failed_when: false
  check_mode: false
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - ubuntu2404STIG_stigrule_270816_manage | default(true) | bool

- name: "stigrule_270816_audit_capacity_assert"
  ansible.builtin.assert:
    that:
      - _stigrule_270816_capacity.rc == 0
    fail_msg: "Audit log storage capacity is below the required minimum"
    success_msg: "Audit log storage capacity meets the required minimum"
  ignore_errors: true
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - ubuntu2404STIG_stigrule_270816_manage | default(true) | bool
    - _stigrule_270816_capacity is defined

- name: "stigrule_270816_audit_capacity_remediate"
  ansible.builtin.lineinfile:
    path: /etc/audit/auditd.conf
    regexp: '^\s*log_file\s*='
    line: 'log_file = {{ ubuntu2404STIG_stigrule_270816_audit_log_mountpoint }}/audit.log'
  notify: auditd_restart
  when:
    - not (ansible_check_mode | default(false))
    - ubuntu2404STIG_stigrule_270816_manage | default(true) | bool
    - ubuntu2404STIG_stigrule_270816_audit_log_mountpoint | default('') | length > 0

- name: "stigrule_270817_audit_offload_check"
  ansible.builtin.shell:
    cmd: "test -x /etc/cron.weekly/audit-offload && grep -Fq {{ ubuntu2404STIG_stigrule_270817_audit_offload_destination | quote }} /etc/cron.weekly/audit-offload"
  register: _stigrule_270817_offload
  changed_when: false
  failed_when: false
  check_mode: false
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - ubuntu2404STIG_stigrule_270817_manage | default(true) | bool
    - ubuntu2404STIG_stigrule_270817_audit_offload_destination | default('') | length > 0

- name: "stigrule_270817_audit_offload_assert"
  ansible.builtin.assert:
    that:
      - _stigrule_270817_offload.rc == 0
    fail_msg: "Weekly audit offload script is missing or not configured"
    success_msg: "Weekly audit offload script is present and configured"
  ignore_errors: true
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - ubuntu2404STIG_stigrule_270817_manage | default(true) | bool
    - _stigrule_270817_offload is defined

- name: "stigrule_270817_audit_offload_remediate"
  ansible.builtin.copy:
    dest: /etc/cron.weekly/audit-offload
    mode: "0755"
    content: |
      #!/bin/sh
      rsync -a /var/log/audit/ {{ ubuntu2404STIG_stigrule_270817_audit_offload_destination }}/
  when:
    - not (ansible_check_mode | default(false))
    - ubuntu2404STIG_stigrule_270817_manage | default(true) | bool
    - ubuntu2404STIG_stigrule_270817_audit_offload_destination | default('') | length > 0

- name: "stigrule_270820_timezone_check"
  ansible.builtin.shell:
    cmd: "timedatectl status | grep -i 'Time zone' | grep -E 'UTC|GMT'"
  register: _stigrule_270820_timezone
  changed_when: false
  failed_when: false
  check_mode: false
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - ubuntu2404STIG_stigrule_270820_manage | default(true) | bool

- name: "stigrule_270820_timezone_assert"
  ansible.builtin.assert:
    that:
      - _stigrule_270820_timezone.rc == 0
    fail_msg: "System timezone is not UTC or GMT"
    success_msg: "System timezone is UTC or GMT"
  ignore_errors: true
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - ubuntu2404STIG_stigrule_270820_manage | default(true) | bool
    - _stigrule_270820_timezone is defined

- name: "stigrule_270820_timezone_remediate"
  ansible.builtin.command:
    cmd: timedatectl set-timezone UTC
  when:
    - not (ansible_check_mode | default(false))
    - ubuntu2404STIG_stigrule_270820_manage | default(true) | bool
