# =============================================================================
# Remaining filesystem and audit log controls
# =============================================================================

- name: "stigrule_270750_sticky_bit_check"
  ansible.builtin.shell:
    cmd: "find / -xdev -type d -perm -002 ! -perm -1000 2>/dev/null"
  register: _stigrule_270750_sticky
  changed_when: false
  failed_when: false
  check_mode: false
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - ubuntu2404STIG_stigrule_270750_manage | default(true) | bool

- name: "stigrule_270750_sticky_bit_assert"
  ansible.builtin.assert:
    that:
      - _stigrule_270750_sticky.stdout | trim == ''
    fail_msg: "World-writable directories without the sticky bit were found"
    success_msg: "All world-writable directories have the sticky bit set"
  ignore_errors: true
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - ubuntu2404STIG_stigrule_270750_manage | default(true) | bool
    - _stigrule_270750_sticky is defined

- name: "stigrule_270750_sticky_bit_remediate"
  ansible.builtin.file:
    path: "{{ item }}"
    mode: "1777"
  loop: "{{ _stigrule_270750_sticky.stdout_lines | default([]) }}"
  loop_control:
    label: "{{ item }}"
  when:
    - not (ansible_check_mode | default(false))
    - ubuntu2404STIG_stigrule_270750_manage | default(true) | bool
    - _stigrule_270750_sticky is defined
    - _stigrule_270750_sticky.stdout | trim != ''

- name: "stigrule_270827_270830_audit_log_metadata_check"
  ansible.builtin.shell:
    cmd: |
      set -e
      log_file="$(awk -F'= *' '/^log_file/ {print $2}' /etc/audit/auditd.conf | tail -n1)"
      log_dir="$(dirname "$log_file")"
      case "{{ item.id }}" in
        270827) stat -c '%a' "$log_file" "$log_dir"/* 2>/dev/null | awk '$1 > 600 {exit 1}' ;;
        270828) stat -c '%U' "$log_file" "$log_dir"/* 2>/dev/null | awk '$1 != \"root\" {exit 1}' ;;
        270829)
          grep -Eq '^log_group *= *root$' /etc/audit/auditd.conf
          stat -c '%G' "$log_file" "$log_dir"/* 2>/dev/null | awk '$1 != \"root\" {exit 1}'
          ;;
        270830) stat -c '%a' "$log_dir" | awk '$1 > 750 {exit 1}' ;;
      esac
  register: _stigrule_35_audit_log_metadata
  changed_when: false
  failed_when: false
  check_mode: false
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - vars[item.manage_var] | default(true) | bool
  loop:
    - id: "270827"
      manage_var: "ubuntu2404STIG_stigrule_270827_manage"
    - id: "270828"
      manage_var: "ubuntu2404STIG_stigrule_270828_manage"
    - id: "270829"
      manage_var: "ubuntu2404STIG_stigrule_270829_manage"
    - id: "270830"
      manage_var: "ubuntu2404STIG_stigrule_270830_manage"
  loop_control:
    label: "{{ item.id }}"

- name: "stigrule_{{ item.item.id }}_audit_log_metadata_assert"
  ansible.builtin.assert:
    that:
      - item.rc == 0
    fail_msg: "Audit log metadata is not compliant for STIG {{ item.item.id }}"
    success_msg: "Audit log metadata is compliant for STIG {{ item.item.id }}"
  ignore_errors: true
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - item is mapping
  loop: "{{ _stigrule_35_audit_log_metadata.results | default([]) }}"
  loop_control:
    label: "{{ item.item.id if (item is mapping and item.item is defined) else 'unknown' }}"

- name: "stigrule_270827_audit_log_mode_remediate"
  ansible.builtin.shell:
    cmd: |
      set -e
      log_file="$(awk -F'= *' '/^log_file/ {print $2}' /etc/audit/auditd.conf | tail -n1)"
      log_dir="$(dirname "$log_file")"
      chmod 0600 "$log_file" "$log_dir"/* 2>/dev/null
  when:
    - not (ansible_check_mode | default(false))
    - ubuntu2404STIG_stigrule_270827_manage | default(true) | bool

- name: "stigrule_270828_audit_log_owner_remediate"
  ansible.builtin.shell:
    cmd: |
      set -e
      log_file="$(awk -F'= *' '/^log_file/ {print $2}' /etc/audit/auditd.conf | tail -n1)"
      log_dir="$(dirname "$log_file")"
      chown root "$log_file" "$log_dir"/* 2>/dev/null
  when:
    - not (ansible_check_mode | default(false))
    - ubuntu2404STIG_stigrule_270828_manage | default(true) | bool

- name: "stigrule_270829_audit_log_group_config"
  ansible.builtin.lineinfile:
    path: /etc/audit/auditd.conf
    regexp: '^\s*log_group\s*='
    insertafter: '^\s*log_file\s*='
    line: "log_group = root"
  notify: auditd_restart
  when:
    - not (ansible_check_mode | default(false))
    - ubuntu2404STIG_stigrule_270829_manage | default(true) | bool

- name: "stigrule_270829_audit_log_group_remediate"
  ansible.builtin.shell:
    cmd: |
      set -e
      log_file="$(awk -F'= *' '/^log_file/ {print $2}' /etc/audit/auditd.conf | tail -n1)"
      log_dir="$(dirname "$log_file")"
      chgrp root "$log_file" "$log_dir"/* 2>/dev/null
  when:
    - not (ansible_check_mode | default(false))
    - ubuntu2404STIG_stigrule_270829_manage | default(true) | bool

- name: "stigrule_270830_audit_log_directory_mode_remediate"
  ansible.builtin.shell:
    cmd: |
      set -e
      log_file="$(awk -F'= *' '/^log_file/ {print $2}' /etc/audit/auditd.conf | tail -n1)"
      chmod 0750 "$(dirname "$log_file")"
  when:
    - not (ansible_check_mode | default(false))
    - ubuntu2404STIG_stigrule_270830_manage | default(true) | bool
