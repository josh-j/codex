# =============================================================================
# Access control, PAM, accounts, and privilege elevation
# =============================================================================

- name: "stigrule_270677_maxlogins_check"
  ansible.builtin.shell:
    cmd: "grep -rE '^\\*\\s+hard\\s+maxlogins\\s+([0-9]|10)$' /etc/security/limits.conf /etc/security/limits.d/*.conf 2>/dev/null"
  register: _stigrule_270677_maxlogins
  changed_when: false
  failed_when: false
  check_mode: false
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - ubuntu2404STIG_stigrule_270677_manage | default(true) | bool

- name: "stigrule_270677_maxlogins_assert"
  ansible.builtin.assert:
    that:
      - _stigrule_270677_maxlogins.rc == 0
    fail_msg: "maxlogins is not configured to 10 or less"
    success_msg: "maxlogins is configured to 10 or less"
  ignore_errors: true
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - ubuntu2404STIG_stigrule_270677_manage | default(true) | bool
    - _stigrule_270677_maxlogins is defined

- name: "stigrule_270677_maxlogins_remediate"
  ansible.builtin.lineinfile:
    path: /etc/security/limits.conf
    regexp: '^\*\s+hard\s+maxlogins\s+'
    line: '* hard maxlogins 10'
    create: true
  when:
    - not (ansible_check_mode | default(false))
    - ubuntu2404STIG_stigrule_270677_manage | default(true) | bool

- name: "stigrule_270682_temporary_accounts_check"
  ansible.builtin.shell:
    cmd: |
      set -e
      for acct in {{ ubuntu2404STIG_stigrule_270682_temporary_accounts | default([]) | join(' ') }}; do
        test -n "$acct"
        expiry="$(chage -l "$acct" | awk -F': ' '/Account expires/ {print $2}')"
        test "$expiry" != "never"
      done
  register: _stigrule_270682_temp_accounts
  changed_when: false
  failed_when: false
  check_mode: false
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - ubuntu2404STIG_stigrule_270682_manage | default(true) | bool

- name: "stigrule_270682_temporary_accounts_assert"
  ansible.builtin.assert:
    that:
      - _stigrule_270682_temp_accounts.rc == 0
    fail_msg: "One or more temporary accounts do not have an expiration date"
    success_msg: "Temporary accounts are configured with expiration dates"
  ignore_errors: true
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - ubuntu2404STIG_stigrule_270682_manage | default(true) | bool
    - _stigrule_270682_temp_accounts is defined

- name: "stigrule_270682_temporary_accounts_remediate"
  ansible.builtin.shell:
    cmd: "chage -E $(date -d +3days +%Y-%m-%d) {{ item }}"
  loop: "{{ ubuntu2404STIG_stigrule_270682_temporary_accounts | default([]) }}"
  loop_control:
    label: "{{ item }}"
  when:
    - not (ansible_check_mode | default(false))
    - ubuntu2404STIG_stigrule_270682_manage | default(true) | bool

- name: "stigrule_270690_faillock_check"
  ansible.builtin.shell:
    cmd: |
      set -e
      grep -Fqx -- 'auth [default=die] pam_faillock.so authfail' /etc/pam.d/common-auth
      grep -Fqx -- 'auth sufficient pam_faillock.so authsucc' /etc/pam.d/common-auth
      grep -Eq '^audit$' /etc/security/faillock.conf
      grep -Eq '^silent$' /etc/security/faillock.conf
      grep -Eq '^deny *= *3$' /etc/security/faillock.conf
      grep -Eq '^fail_interval *= *900$' /etc/security/faillock.conf
      grep -Eq '^unlock_time *= *0$' /etc/security/faillock.conf
  register: _stigrule_270690_faillock
  changed_when: false
  failed_when: false
  check_mode: false
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - ubuntu2404STIG_stigrule_270690_manage | default(true) | bool

- name: "stigrule_270690_faillock_assert"
  ansible.builtin.assert:
    that:
      - _stigrule_270690_faillock.rc == 0
    fail_msg: "pam_faillock or faillock.conf settings are not compliant"
    success_msg: "pam_faillock and faillock.conf settings are compliant"
  ignore_errors: true
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - ubuntu2404STIG_stigrule_270690_manage | default(true) | bool
    - _stigrule_270690_faillock is defined

- name: "stigrule_270690_faillock_pam_authfail"
  ansible.builtin.lineinfile:
    path: /etc/pam.d/common-auth
    regexp: '^\s*auth\s+\[default=die\]\s+pam_faillock\.so\s+authfail\b'
    line: 'auth [default=die] pam_faillock.so authfail'
    insertafter: 'pam_unix.so'
  when:
    - not (ansible_check_mode | default(false))
    - ubuntu2404STIG_stigrule_270690_manage | default(true) | bool

- name: "stigrule_270690_faillock_pam_authsucc"
  ansible.builtin.lineinfile:
    path: /etc/pam.d/common-auth
    regexp: '^\s*auth\s+sufficient\s+pam_faillock\.so\s+authsucc\b'
    line: 'auth sufficient pam_faillock.so authsucc'
    insertafter: 'pam_faillock.so authfail'
  when:
    - not (ansible_check_mode | default(false))
    - ubuntu2404STIG_stigrule_270690_manage | default(true) | bool

- name: "stigrule_270690_faillock_config"
  ansible.builtin.blockinfile:
    path: /etc/security/faillock.conf
    marker: "# {mark} ANSIBLE MANAGED STIG 270690"
    block: |
      audit
      silent
      deny = 3
      fail_interval = 900
      unlock_time = 0
    create: true
  when:
    - not (ansible_check_mode | default(false))
    - ubuntu2404STIG_stigrule_270690_manage | default(true) | bool

- name: "stigrule_{{ item.id }}_single_line_check"
  ansible.builtin.shell:
    cmd: "grep -Fqx -- {{ item.line | quote }} {{ item.path | quote }}"
  register: _stigrule_32_single_line_checks
  changed_when: false
  failed_when: false
  check_mode: false
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - vars[item.manage_var] | default(true) | bool
  loop:
    - { id: '270704', manage_var: 'ubuntu2404STIG_stigrule_270704_manage', path: '/etc/security/pwquality.conf', line: 'dictcheck=1' }
    - { id: '270721', manage_var: 'ubuntu2404STIG_stigrule_270721_manage', path: '/etc/pam.d/common-auth', line: 'auth [success=2 default=ignore] pam_pkcs11.so' }
    - { id: '270724', manage_var: 'ubuntu2404STIG_stigrule_270724_manage', path: '/etc/shadow', line: '' }
    - { id: '270725', manage_var: 'ubuntu2404STIG_stigrule_270725_manage', path: '/etc/pam.d/common-password', line: 'password [success=1 default=ignore] pam_unix.so obscure sha512' }
    - { id: '270734', manage_var: 'ubuntu2404STIG_stigrule_270734_manage', path: '/etc/sssd/sssd.conf', line: 'offline_credentials_expiration = 1' }
  loop_control:
    label: "{{ item.id }}"

- name: "stigrule_{{ item.item.id }}_single_line_assert"
  ansible.builtin.assert:
    that:
      - item.item.id != '270724' or (_stigrule_270724_root_status.stdout is search(' root L '))
      - item.item.id == '270724' or item.rc == 0
    fail_msg: "Required setting for STIG {{ item.item.id }} is missing or incorrect"
    success_msg: "Required setting for STIG {{ item.item.id }} is present"
  ignore_errors: true
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - item is mapping
  loop: "{{ _stigrule_32_single_line_checks.results | default([]) }}"
  loop_control:
    label: "{{ item.item.id if (item is mapping and item.item is defined) else 'unknown' }}"

- name: "stigrule_270704_dictcheck_remediate"
  ansible.builtin.lineinfile:
    path: /etc/security/pwquality.conf
    regexp: '^dictcheck='
    line: 'dictcheck=1'
    create: true
  when:
    - not (ansible_check_mode | default(false))
    - ubuntu2404STIG_stigrule_270704_manage | default(true) | bool

