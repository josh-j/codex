- name: "stigrule_274869_privilege_elevation_check"
  ansible.builtin.shell:
    cmd: "grep -iwR 'ALL' /etc/sudoers /etc/sudoers.d/ | grep -v '#' | grep -E 'ALL ALL=\\(ALL\\) ALL|ALL ALL=\\(ALL:ALL\\) ALL'"
  register: _stigrule_274869_all_entries
  changed_when: false
  failed_when: false
  check_mode: false
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - ubuntu2404STIG_stigrule_274869_manage | default(true) | bool

