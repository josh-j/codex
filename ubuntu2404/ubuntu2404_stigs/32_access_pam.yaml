  ansible.builtin.assert:
    that:
      - _stigrule_274869_all_entries.stdout | trim == ''
    fail_msg: "Overly broad ALL sudoers entries were found"
    success_msg: "No overly broad ALL sudoers entries were found"
  ignore_errors: true
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - ubuntu2404STIG_stigrule_274869_manage | default(true) | bool
    - _stigrule_274869_all_entries is defined

- name: "stigrule_274869_privilege_elevation_remediate"
  ansible.builtin.shell:
    cmd: |
      set -e
      find /etc/sudoers /etc/sudoers.d -type f -exec sed -i \
        -e '/^[[:space:]]*ALL[[:space:]]\+ALL=(ALL)[[:space:]]\+ALL[[:space:]]*$/d' \
        -e '/^[[:space:]]*ALL[[:space:]]\+ALL=(ALL:ALL)[[:space:]]\+ALL[[:space:]]*$/d' {} +
      visudo -cf /etc/sudoers
  changed_when: true
  when:
    - not (ansible_check_mode | default(false))
    - ubuntu2404STIG_stigrule_274869_manage | default(true) | bool
