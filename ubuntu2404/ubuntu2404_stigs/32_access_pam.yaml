  ansible.builtin.lineinfile:
    path: /etc/pam.d/common-auth
    regexp: '^\s*auth\s+\[success=2 default=ignore\]\s+pam_pkcs11\.so\b'
    line: 'auth [success=2 default=ignore] pam_pkcs11.so'
    insertbefore: BOF
  when:
