- name: "stigrule_270723_270738_pam_pkcs11_policy_check"
  ansible.builtin.shell:
    cmd: |
      set -e
      grep -Eq '^use_pkcs11_module' /etc/pam_pkcs11/pam_pkcs11.conf
      grep -Eq 'cert_policy *= *ca,signature,ocsp_on,crl_(auto|offline);' /etc/pam_pkcs11/pam_pkcs11.conf
  register: _stigrule_270723_pam_pkcs11
  changed_when: false
  failed_when: false
  check_mode: false
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - ubuntu2404STIG_stigrule_270723_manage | default(true) | bool
      or ubuntu2404STIG_stigrule_270737_manage | default(true) | bool
      or ubuntu2404STIG_stigrule_270738_manage | default(true) | bool

- name: "stigrule_270723_270738_pam_pkcs11_policy_assert"
  ansible.builtin.assert:
    that:
      - _stigrule_270723_pam_pkcs11.rc == 0
    fail_msg: "pam_pkcs11 cert_policy does not include the required CA, OCSP, and CRL settings"
    success_msg: "pam_pkcs11 cert_policy includes the required CA, OCSP, and CRL settings"
  ignore_errors: true
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - _stigrule_270723_pam_pkcs11 is defined

- name: "stigrule_270723_270738_pam_pkcs11_policy_remediate"
  ansible.builtin.lineinfile:
    path: /etc/pam_pkcs11/pam_pkcs11.conf
    regexp: '^\s*cert_policy\s*='
    line: 'cert_policy = ca,signature,ocsp_on,crl_auto;'
    create: true
  when:
    - not (ansible_check_mode | default(false))
    - ubuntu2404STIG_stigrule_270723_manage | default(true) | bool
      or ubuntu2404STIG_stigrule_270737_manage | default(true) | bool
      or ubuntu2404STIG_stigrule_270738_manage | default(true) | bool

