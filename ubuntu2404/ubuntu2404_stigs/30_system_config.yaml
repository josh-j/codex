    - ubuntu2404STIG_stigrule_270707_manage | default(true) | bool

- name: "stigrule_270707_sudoers_authenticate_remove"
  ansible.builtin.shell:
    cmd: |
      set -euo pipefail
      python3 - <<'PY'
      import pathlib
      import re
      import shutil
      import subprocess
      import sys
      import tempfile

      path = pathlib.Path({{ item | quote }})
      original = path.read_text()
      updated = re.sub(r'(^|[,\s])!authenticate(?=,|\s|$)', r'\1', original, flags=re.MULTILINE)
      updated = re.sub(r',\s*,', ',', updated)
      updated = re.sub(r',\s*(\n)', r'\1', updated)
      updated = re.sub(r'(\s),', ',', updated)
      updated = re.sub(r'[ \t]+$', '', updated, flags=re.MULTILINE)

      if updated == original:
          sys.exit(0)

      with tempfile.NamedTemporaryFile('w', dir=str(path.parent), delete=False) as tmp:
          tmp.write(updated)
          tmp_path = pathlib.Path(tmp.name)

      shutil.copymode(path, tmp_path)
      try:
          subprocess.check_call(['visudo', '-cf', str(tmp_path)])
          tmp_path.replace(path)
          print('CHANGED')
      finally:
          if tmp_path.exists():
              tmp_path.unlink()
      PY
  register: _stigrule_270707_cleanup
  loop: "{{ ['/etc/sudoers'] + (_stigrule_270707_sudoers_files.files | default([]) | map(attribute='path') | list) }}"
  loop_control:
    label: "{{ item }}"
  changed_when: "'CHANGED' in _stigrule_270707_cleanup.stdout"
  when:
    - not (ansible_check_mode | default(false))
    - ubuntu2404STIG_stigrule_270707_manage | default(true) | bool

