- name: "stigrule_270675_grub_password_assert"
  ansible.builtin.shell:
    cmd: "grep -iE '^password_pbkdf2[[:space:]]+root[[:space:]]+' /boot/grub/grub.cfg"
  register: _grub_pw
  changed_when: false
  failed_when: false
  check_mode: false
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - ubuntu2404STIG_stigrule_270675_manage | default(false) | bool

- name: "stigrule_270675_grub_password_check"
  ansible.builtin.assert:
    that:
      - _grub_pw.rc == 0
    fail_msg: "No GRUB password_pbkdf2 root entry found"
    success_msg: "GRUB password is set"
  ignore_errors: true
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - ubuntu2404STIG_stigrule_270675_manage | default(false) | bool
    - _grub_pw is defined

- name: "stigrule_270675_grub_password_hash_required"
  ansible.builtin.assert:
    that:
      - ubuntu2404STIG_stigrule_270675_grub_pbkdf2_hash | default('') | length > 0
    fail_msg: "Set ubuntu2404STIG_stigrule_270675_grub_pbkdf2_hash to remediate the GRUB password control"
    success_msg: "GRUB PBKDF2 hash is available for remediation"
  when:
    - not (ansible_check_mode | default(false))
    - ubuntu2404STIG_stigrule_270675_manage | default(false) | bool

- name: "stigrule_270675_grub_password_remediate"
  ansible.builtin.blockinfile:
    path: /etc/grub.d/40_custom
    marker: "# {mark} ANSIBLE MANAGED STIG 270675"
    block: |
      set superusers="root"
      password_pbkdf2 root {{ ubuntu2404STIG_stigrule_270675_grub_pbkdf2_hash }}
    create: true
    mode: "0755"
  notify: update_grub
  when:
    - not (ansible_check_mode | default(false))
    - ubuntu2404STIG_stigrule_270675_manage | default(false) | bool
    - ubuntu2404STIG_stigrule_270675_grub_pbkdf2_hash | default('') | length > 0

