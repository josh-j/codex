- name: "stigrule_270694_ssh_confirm_script_check"
  ansible.builtin.slurp:
    src: /etc/profile.d/ssh_confirm.sh
  register: _stigrule_270694_ssh_confirm
  failed_when: false
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - ubuntu2404STIG_stigrule_270694_manage | default(true) | bool

- name: "stigrule_270694_ssh_confirm_script_assert"
  ansible.builtin.assert:
    that:
      - _stigrule_270694_ssh_confirm.content is defined
      - (_stigrule_270694_ssh_confirm.content | b64decode) is search('SSH_CLIENT')
      - (_stigrule_270694_ssh_confirm.content | b64decode) is search('DoD Notice and Consent Banner Acknowledgement')
    fail_msg: "SSH acknowledgement script is missing or incomplete"
    success_msg: "SSH acknowledgement script is present"
  ignore_errors: true
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - ubuntu2404STIG_stigrule_270694_manage | default(true) | bool
    - _stigrule_270694_ssh_confirm is defined

- name: "stigrule_270694_ssh_confirm_script_remediate"
  ansible.builtin.copy:
    dest: /etc/profile.d/ssh_confirm.sh
    mode: "0755"
    content: |
      #!/bin/bash
      if [ -n "$SSH_CLIENT" ] || [ -n "$SSH_TTY" ]; then
        if [ -z "${DOD_SSH_BANNER_ACK:-}" ]; then
          while true; do
            read -r -p "DoD Notice and Consent Banner Acknowledgement [y/n]: " reply
            case "$reply" in
              y|Y)
                export DOD_SSH_BANNER_ACK=1
                break
                ;;
              n|N)
                exit 1
                ;;
            esac
          done
        fi
      fi
  when:
    - not (ansible_check_mode | default(false))
    - ubuntu2404STIG_stigrule_270694_manage | default(true) | bool

