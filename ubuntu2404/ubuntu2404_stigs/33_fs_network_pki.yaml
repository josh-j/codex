- name: "stigrule_270757_270764_systemd_tmpfiles_check"
  ansible.builtin.shell:
    cmd: |
      set -e
      grep -Fqx -- 'z /run/log/journal 2640 root systemd-journal - -' /usr/lib/tmpfiles.d/systemd.conf
      grep -Fqx -- 'Z /run/log/journal/%m ~2640 root systemd-journal - -' /usr/lib/tmpfiles.d/systemd.conf
      grep -Fqx -- 'z /var/log/journal 2640 root systemd-journal - -' /usr/lib/tmpfiles.d/systemd.conf
      grep -Fqx -- 'z /var/log/journal/%m 2640 root systemd-journal - -' /usr/lib/tmpfiles.d/systemd.conf
      grep -Fqx -- 'z /var/log/journal/%m/system.journal 0640 root systemd-journal - -' /usr/lib/tmpfiles.d/systemd.conf
  register: _stigrule_270757_tmpfiles
  changed_when: false
  failed_when: false
  check_mode: false
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - ubuntu2404STIG_stigrule_270757_manage | default(true) | bool
      or ubuntu2404STIG_stigrule_270761_manage | default(true) | bool
      or ubuntu2404STIG_stigrule_270762_manage | default(true) | bool
      or ubuntu2404STIG_stigrule_270763_manage | default(true) | bool
      or ubuntu2404STIG_stigrule_270764_manage | default(true) | bool

- name: "stigrule_270757_270764_systemd_tmpfiles_assert"
  ansible.builtin.assert:
    that:
      - _stigrule_270757_tmpfiles.rc == 0
    fail_msg: "systemd tmpfiles journal rules are incomplete"
    success_msg: "systemd tmpfiles journal rules are configured"
  ignore_errors: true
  when:
    - _ubuntu2404_stig_phase == 'audit'
    - _stigrule_270757_tmpfiles is defined

- name: "stigrule_270757_270764_systemd_tmpfiles_remediate"
  ansible.builtin.blockinfile:
    path: /usr/lib/tmpfiles.d/systemd.conf
    marker: "# {mark} ANSIBLE MANAGED STIG JOURNAL"
    block: |
      z /run/log/journal 2640 root systemd-journal - -
      Z /run/log/journal/%m ~2640 root systemd-journal - -
      z /var/log/journal 2640 root systemd-journal - -
      z /var/log/journal/%m 2640 root systemd-journal - -
      z /var/log/journal/%m/system.journal 0640 root systemd-journal - -
  when:
    - not (ansible_check_mode | default(false))
    - ubuntu2404STIG_stigrule_270757_manage | default(true) | bool
      or ubuntu2404STIG_stigrule_270761_manage | default(true) | bool
      or ubuntu2404STIG_stigrule_270762_manage | default(true) | bool
      or ubuntu2404STIG_stigrule_270763_manage | default(true) | bool
      or ubuntu2404STIG_stigrule_270764_manage | default(true) | bool

