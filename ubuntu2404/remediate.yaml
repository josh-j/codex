---

- name: "Ubuntu STIG | Execute hardening"
  block:
    - name: "Ubuntu STIG | Run enforcement tasks"
      ansible.builtin.include_tasks: ubuntu2404.yaml
      args:
        apply:
          check_mode: false
          tags: [stig_task]
          vars:
            _ubuntu2404_stig_phase: "remediate"
            stig_target_host: "{{ inventory_hostname }}"
            stig_target_type: "ubuntu"
            stig_platform: "linux/ubuntu"
  rescue:
    - name: "Ubuntu STIG | Log remediation failure"
      ansible.builtin.debug:
        msg: "Remediation failed on {{ inventory_hostname }} - check output above for details."
