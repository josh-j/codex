---
# playbooks/ubuntu_stig_verify.yml
# Read-only Ubuntu STIG verification collection.

- name: "Ubuntu | STIG Verify"
  hosts: "{{ ubuntu_target_hosts | default('ubuntu_servers') }}"
  gather_facts: false
  tags: ["ubuntu", "stig", "audit", "verify", "security"]
  roles:
    - role: internal.linux.ubuntu
      vars:
        ubuntu_action: stig
