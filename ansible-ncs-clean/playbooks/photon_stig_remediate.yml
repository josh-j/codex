---
# playbooks/photon_stig_remediate.yml
# Automated STIG hardening and remediation for VMware Photon OS 5.0.

- name: "Phase 2: Photon STIG Remediation"
  hosts: "{{ photon_target_hosts | default('photon_servers') }}"
  gather_facts: false
  become: true
  tags: ["photon", "remediate", "stig", "security"]
  roles:
    - role: internal.linux.photon
      vars:
        photon_action: discover
    - role: internal.linux.photon
      vars:
        photon_action: remediate
        photon_stig_enable_hardening: true
    - role: internal.linux.photon
      vars:
        photon_action: stig
        photon_stig_enable_hardening: false
