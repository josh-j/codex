[defaults]
interpreter_python = /home/joshua.johnson/automations/ansible-ncs-clean/.venv/bin/python3
collections_path = ./collections
callbacks_enabled = internal.core.ncs_collector, ansible.posix.profile_tasks
inventory = ./inventory/production
vault_password_file = ./.vaultpass
host_key_checking = False

# Performance
forks = 20
gathering = explicit
# interpreter_python = auto_silent

# Output
callback_result_format = yaml
display_skipped_hosts = true
retry_files_enabled = False
log_path = ./logs/ansible.log

# Timeouts
timeout = 60

# Caching (speeds up repeated runs against same hosts)
fact_caching = jsonfile
fact_caching_connection = ./.cache/ansible_facts
fact_caching_timeout = 21600

deprecation_warnings = True
command_warnings = False

[callback_default]
result_format = yaml

[persistent_connection]
connect_timeout = 60
command_timeout = 60

[ssh_connection]
# Reuse SSH connections and reduce per-task overhead
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=60s
