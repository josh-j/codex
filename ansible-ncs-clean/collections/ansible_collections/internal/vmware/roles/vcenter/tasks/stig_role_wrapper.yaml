---
# internal.vmware.vcenter : tasks/stig_role_wrapper.yaml
# Included once per VCSA role from stig.yaml loop.

- name: "vCenter STIG | Register target for callback ({{ _vcsa_role }})"
  ansible.builtin.set_fact:
    _ncs_stig_target_host: "{{ inventory_hostname }}"
    _ncs_stig_target_type: "{{ _vcsa_role_map[_vcsa_role] | default('vcsa') }}"
  check_mode: false
  changed_when: false

- name: "vCenter STIG | Include {{ _vcsa_role }}"
  ansible.builtin.include_role:
    name: "{{ _vcsa_role }}"
    apply:
      check_mode: "{{ not (vmware_stig_enable_hardening | default(false) | bool) }}"
      tags: [stig_task]
      vars:
        stig_target_host: "{{ inventory_hostname }}"
        stig_target_type: "{{ _vcsa_role_map[_vcsa_role] | default('vcsa') }}"
        stig_platform: "vmware/vcenter/vcsa"
  vars:
    run_create_backups: "{{ vcenter_stig_create_backups | default(true) | bool }}"
    photon_version: "{{ vcenter_stig_photon_version | default('3') | string }}"
