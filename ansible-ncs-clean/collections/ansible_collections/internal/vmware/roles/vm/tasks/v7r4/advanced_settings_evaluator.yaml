---
# vm/tasks/v7r4/advanced_settings_evaluator.yaml
# Generic evaluator for VM advanced settings STIG rules.
# Looped from vm_v7r4.yaml over vm_advanced_settings_rules.

- name: "stigrule_{{ item.rule_id }}_{{ item.desc }}"
  community.vmware.vmware_guest:
    name: "{{ _current_vm_name }}"
    advanced_settings:
      - key: "{{ item.key }}"
        value: "{{ lookup('vars', item.value_var, default=item.default_value) }}"
  when: lookup('vars', item.manage_var, default=true) | bool
