---
# vCenter 7.0 Appliance VAMI Ansible Role

############################################
# Backup files that may be modified in case restoration is needed

- name: "VAMI | Create backup timestamp"
  ansible.builtin.set_fact:
    backup_timestamp: "{{ lookup('pipe', 'date +%Y-%m-%d-%H-%M-%S') }}"
  when:
    - run_create_backups | default(run_create_backups | default(true)) | bool
    - vmware_stig_enable_hardening | default(false) | bool

- name: "VAMI | Backup config files"
  ansible.builtin.copy:
    remote_src: true
    src: "{{ item }}"
    dest: "/tmp/ansible-vcsa-vami-backups-{{ backup_timestamp }}/"
    mode: preserve
  loop:
    - "{{ var_conf_path }}"
    - "{{ var_syslog_conf_path }}"
  loop_control:
    label: "{{ item | basename }}"
  changed_when: false
  register: backupresult
  failed_when:
    - backupresult.msg is defined
    - "'not found' not in backupresult.msg"
  when:
    - run_create_backups | default(run_create_backups | default(true)) | bool
    - vmware_stig_enable_hardening | default(false) | bool

- name: "VAMI | Backup etc config files"
  ansible.builtin.copy:
    remote_src: true
    src: "{{ item }}"
    dest: "/tmp/ansible-vcsa-vami-backups-{{ backup_timestamp }}/etc/"
    mode: preserve
  loop:
    - "{{ var_conf_path_etc }}"
  loop_control:
    label: "{{ item | basename }}"
  changed_when: false
  register: backupresult
  failed_when:
    - backupresult.msg is defined
    - "'not found' not in backupresult.msg"
  when:
    - run_create_backups | default(run_create_backups | default(true)) | bool
    - vmware_stig_enable_hardening | default(false) | bool

############################################
# Data-driven lineinfile rules (17 rules)

- name: "VAMI | Load STIG lineinfile rules"
  ansible.builtin.include_vars:
    file: vami_stig_rules.yaml

- name: "VAMI | Apply STIG lineinfile rules"
  ansible.builtin.include_tasks: lineinfile_evaluator.yml
  loop: "{{ vami_lineinfile_rules }}"

############################################
# VCLD-70-000004: VAMI must be configured to use mod_accesslog.

- name: "VCLD-70-000004 - VAMI must be configured to use mod_accesslog."
  ansible.builtin.lineinfile:
    path: "{{ var_conf_path }}"
    state: present
    regexp: '^  "mod_accesslog",$'
    line: '  "mod_accesslog",'
    insertafter: '^server.modules = \($'
  notify:
    - restart vami
  when:
    - run_conf_server_mod_accesslog | bool

############################################
# VCLD-70-000006: VAMI must produce log records containing sufficient information.

- name: "VCLD-70-000006 - VAMI must produce log records containing sufficient information."
  ansible.builtin.replace:
    path: "{{ var_conf_path }}"
    regexp: "^(accesslog.format.*)$"
    replace: '# \1'
  notify:
    - restart vami
  when:
    - run_conf_comment_accesslog_format | bool

############################################
# VCLD-70-000007: VAMI log files must be owned by root

- name: "VCLD-70-000007 - Find VAMI log files"
  ansible.builtin.find:
    paths: /opt/vmware/var/log/lighttpd
    file_type: file
    patterns: "*.log"
    recurse: true
  register: vamilogfiles
  check_mode: false
  when:
    - run_vami_logs | bool

- name: "VCLD-70-000007 - VAMI log file permissions"
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: file
    owner: root
    group: root
    mode: "o-w"
  loop: "{{ vamilogfiles.files | default([]) }}"
  loop_control:
    label: "{{ item.path | basename }}"
  when:
    - run_vami_logs | bool
    - vamilogfiles.files | default([]) | length > 0

############################################
# VCLD-70-000008: Rsyslog must be configured to monitor VAMI logs.

- name: "VCLD-70-000008 - Rsyslog must be configured to monitor VAMI logs."
  ansible.builtin.template:
    src: vmware-services-applmgmt.conf
    dest: /etc/vmware-syslog/vmware-services-applmgmt.conf
    owner: root
    group: root
    mode: "0644"
    force: true
  notify:
    - restart syslog
  when:
    - run_vami_syslog_config | bool

############################################
# VCLD-70-000010: VAMI must only load allowed server modules.

- name: "VCLD-70-000010 - VAMI must only load allowed server modules."
  ansible.builtin.lineinfile:
    path: "{{ var_conf_path }}"
    state: present
    regexp: "^server.modules =.*$"
    line: server.modules = (
    firstmatch: true
  notify:
    - restart vami
  when:
    - run_conf_set_server_modules | bool

- name: "VCLD-70-000010 - VAMI must only contain services and functions necessary for operation."
  ansible.builtin.lineinfile:
    path: "{{ var_conf_path }}"
    state: present
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    insertafter: "{{ item.insertafter }}"
  loop:
    - {
        line: '  "mod_access",',
        regexp: '^  "mod_access",$',
        insertafter: '^server.modules = \($',
      }
    - {
        line: '  "mod_accesslog",',
        regexp: '^  "mod_accesslog",$',
        insertafter: '^  "mod_access",$',
      }
    - {
        line: '  "mod_proxy",',
        regexp: '^  "mod_proxy",$',
        insertafter: '^  "mod_accesslog",$',
      }
    - {
        line: '  "mod_cgi",',
        regexp: '^  "mod_cgi",$',
        insertafter: '^  "mod_proxy",$',
      }
    - {
        line: '  "mod_rewrite",',
        regexp: '^  "mod_rewrite",$',
        insertafter: '^  "mod_cgi",$',
      }
  loop_control:
    label: "{{ item.line }}"
  notify:
    - restart vami
  when:
    - run_conf_set_server_modules | bool

- name: "VCLD-70-000010 - VAMI mod_magnet module."
  ansible.builtin.lineinfile:
    path: "{{ var_conf_path }}"
    state: present
    regexp: '^server.modules \+= \( "mod_magnet" \)$'
    line: server.modules += ( "mod_magnet" )
    firstmatch: true
  notify:
    - restart vami
  when:
    - run_conf_set_server_modules | bool

############################################
# VCLD-70-000011: VAMI must have MIME that invoke OS shell programs disabled.

- name: "VCLD-70-000011 - VAMI must have MIME that invoke OS shell programs disabled."
  ansible.builtin.lineinfile:
    path: "{{ var_conf_path }}"
    state: absent
    regexp: "^.*{{ item }}.*$"
  loop:
    - '".sh"'
    - '".csh"'
  loop_control:
    label: "{{ item }}"
  notify:
    - restart vami
  when:
    - run_conf_remove_shell_mimetypes | bool

############################################
# VCLD-70-000013: VAMI must remove all mappings to unused scripts.

- name: "VCLD-70-000013 - VAMI must remove all mappings to unused scripts."
  ansible.builtin.lineinfile:
    path: "{{ var_conf_path }}"
    state: present
    regexp: "^cgi.assign.*=.*$"
    line: cgi.assign                 = ( ".py"  => "/usr/bin/python",
    firstmatch: true
  notify:
    - restart vami
  when:
    - run_conf_set_cgi_assign | bool

- name: "VCLD-70-000013 - VAMI CGI assign python entry."
  ansible.builtin.lineinfile:
    path: "{{ var_conf_path }}"
    state: present
    regexp: '^                               ".cgi" =>"/usr/bin/python" \)$'
    line: '                               ".cgi" =>"/usr/bin/python" )'
    insertafter: "^cgi.assign.*=.*$"
  notify:
    - restart vami
  when:
    - run_conf_set_cgi_assign | bool

############################################
# VCLD-70-000017: VAMI must protect the keystore from unauthorized access.

- name: "VCLD-70-000017 - VAMI must protect the keystore from unauthorized access."
  ansible.builtin.file:
    path: "{{ var_server_pem_file }}"
    state: file
    mode: "0600"
    owner: "root"
    group: "root"
  when:
    - run_key_permissions | bool

############################################
# VCLD-70-000019: VAMI must set the encoding for all text mime types to UTF-8.

- name: "VCLD-70-000019 - Find text mime types without charset."
  ansible.builtin.shell: >
    set -o pipefail &&
    grep 'text/' '{{ var_conf_path }}' | grep -v 'charset=utf-8'
  register: _mimetypes_raw
  check_mode: false
  changed_when: false
  failed_when: "_mimetypes_raw.rc == 2"
  when:
    - run_conf_text_mime_utf8 | bool

- name: "VCLD-70-000019 - Parse mime type results"
  ansible.builtin.set_fact:
    _mimetypes_list: "{{ _mimetypes_raw.stdout_lines | default([]) }}"
  when:
    - run_conf_text_mime_utf8 | bool

- name: "VCLD-70-000019 - VAMI must set the encoding for all text mime types to UTF-8."
  ansible.builtin.lineinfile:
    path: "{{ var_conf_path }}"
    state: present
    regexp: "{{ item }}"
    line: '{{ item | regex_replace(''",$'', '''') }}; charset=utf-8",'
  loop: "{{ _mimetypes_list | default([]) }}"
  loop_control:
    label: "{{ item | default('') | truncate(60) }}"
  notify:
    - restart vami
  when:
    - run_conf_text_mime_utf8 | bool
    - _mimetypes_list | default([]) | length > 0

############################################
# VCLD-70-000024: VAMI must implement TLS1.2 exclusively.

- name: "VCLD-70-000024 - VAMI must implement TLS1.2 exclusively. Disabled versions."
  ansible.builtin.lineinfile:
    path: "{{ var_conf_path }}"
    state: present
    regexp: "^{{ item }}.*$"
    line: '{{ item }} = "{{ var_conf_ssl_disabled_versions }}"'
    firstmatch: true
  loop:
    - ssl.use-sslv2
    - ssl.use-sslv3
    - ssl.use-tlsv10
    - ssl.use-tlsv11
  notify:
    - restart vami
  when:
    - run_conf_ssl_disabled_versions | bool

- name: "VCLD-70-000024 - VAMI must use an approved TLS version. Enabled versions."
  ansible.builtin.lineinfile:
    path: "{{ var_conf_path }}"
    state: present
    regexp: "^{{ item }}.*$"
    line: '{{ item }} = "{{ var_conf_ssl_enabled_versions }}"'
    firstmatch: true
  loop:
    - ssl.use-tlsv12
  notify:
    - restart vami
  when:
    - run_conf_ssl_disabled_versions | bool
