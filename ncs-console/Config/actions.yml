- group: Windows
  actions:
    - label: Collect
      playbook: windows/collect.yml
    - label: STIG Audit
      playbook: windows/stig_audit.yml
    - label: STIG Remediate
      playbook: windows/stig_remediate.yml
      mutating: true
    - label: Health
      playbook: windows/health.yml
    - label: Patch
      playbook: windows/patch.yml
      mutating: true
    - label: AD Search
      playbook: windows/run.yml
      options:
        - name: ncs_operation
          label: Operation
          default: ad_search
        - name: windows_ad_search_term
          label: Search Term
        - name: windows_ad_search_type
          label: Type
          default: computer
    - label: Vuln Scan
      playbook: windows/run.yml
      options:
        - name: ncs_operation
          label: Operation
          default: vuln_scan
        - name: windows_vuln_scan_file
          label: Scan File Path
    - label: Cleanup
      playbook: windows/run.yml
      mutating: true
      options:
        - name: ncs_operation
          label: Operation
          default: cleanup
    - label: KB Install
      playbook: windows/run.yml
      mutating: true
      options:
        - name: ncs_operation
          label: Operation
          default: kb_install
        - name: windows_kb_list
          label: KB Numbers
    - label: Windows Update
      playbook: windows/run.yml
      mutating: true
      options:
        - name: ncs_operation
          label: Operation
          default: windows_update
    - label: Install Software
      playbook: windows/run.yml
      mutating: true
      options:
        - name: ncs_operation
          label: Operation
          default: update_software
    - label: Uninstall Software
      playbook: windows/run.yml
      mutating: true
      options:
        - name: ncs_operation
          label: Operation
          default: uninstall_software
    - label: Service Management
      playbook: windows/run.yml
      mutating: true
      options:
        - name: ncs_operation
          label: Operation
          default: service
        - name: windows_service_name
          label: Service Name
        - name: windows_service_action
          label: Action
          default: restart
    - label: Scheduled Task
      playbook: windows/run.yml
      mutating: true
      options:
        - name: ncs_operation
          label: Operation
          default: scheduled_task
        - name: windows_task_name
          label: Task Name
    - label: Registry Fix
      playbook: windows/run.yml
      mutating: true
      options:
        - name: ncs_operation
          label: Operation
          default: registry_fix
    - label: OpenSSH Setup
      playbook: windows/run.yml
      mutating: true
      options:
        - name: ncs_operation
          label: Operation
          default: openssh
    - label: WinRM Enable
      playbook: windows/run.yml
      mutating: true
      options:
        - name: ncs_operation
          label: Operation
          default: winrm_enable
    - label: Remote Ops
      playbook: windows/run.yml
      options:
        - name: ncs_operation
          label: Operation
          default: remote_ops
        - name: windows_remote_op
          label: Command
          default: uptime

