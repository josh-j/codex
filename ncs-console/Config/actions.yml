    - label: STIG Remediate
      playbook: vcsa/stig_remediate.yml
      mutating: true
    - label: Rotate Password
      playbook: vcsa/rotate_password.yml
      mutating: true
      options:
        - name: rotate_user
          label: Username
          default: root
    - label: Password Status
      playbook: vcsa/password_status.yml

- group: VM
  actions:
    - label: Audit
      playbook: vm/audit.yml
    - label: STIG Audit
      playbook: vm/stig_audit.yml
    - label: STIG Audit (Parallel)
      playbook: vm/stig_audit_parallel.yml
    - label: STIG Remediate
      playbook: vm/stig_remediate.yml
      mutating: true
    - label: STIG Remediate (Parallel)
      playbook: vm/stig_remediate_parallel.yml
      mutating: true

- group: Ubuntu
  actions:
    - label: Audit
      playbook: ubuntu/audit.yml
    - label: STIG Audit
      playbook: ubuntu/stig_audit.yml
    - label: STIG Remediate
      playbook: ubuntu/stig_remediate.yml
      mutating: true
    - label: Update
      playbook: ubuntu/update.yml
      mutating: true
    - label: Rotate Password
      playbook: ubuntu/rotate_password.yml
      mutating: true
      options:
        - name: rotate_user
          label: Username
          default: root
    - label: Rotate Passwords (Bulk)
      playbook: ubuntu/rotate_passwords.yml
      mutating: true
    - label: Password Status
      playbook: ubuntu/password_status.yml

- group: Windows
  actions:
    - label: Audit
      playbook: windows/audit.yml
    - label: STIG Audit
      playbook: windows/stig_audit.yml
    - label: STIG Remediate
      playbook: windows/stig_remediate.yml
      mutating: true
    - label: Health
      playbook: windows/health.yml
    - label: Patch
      playbook: windows/patch.yml
      mutating: true
    - label: Cleanup
      playbook: windows/cleanup.yml
      mutating: true
    - label: Vuln Scan
      playbook: windows/vuln_scan.yml
    - label: Registry Fix
      playbook: windows/registry_fix.yml
      mutating: true
    - label: KB Install
      playbook: windows/kb_install.yml
      mutating: true
      options:
        - name: kb_number
          label: KB Number
    - label: Windows Update
      playbook: windows/windows_update.yml
      mutating: true
    - label: Install Software
      playbook: windows/update_software.yml
      mutating: true
    - label: Uninstall Software
      playbook: windows/uninstall_software.yml
      mutating: true
    - label: Service Management
      playbook: windows/service.yml
      mutating: true
      options:
        - name: service_name
          label: Service Name
        - name: service_action
          label: Action
          default: restart
    - label: Scheduled Task
      playbook: windows/scheduled_task.yml
      mutating: true
      options:
        - name: task_name
          label: Task Name
    - label: OpenSSH Setup
      playbook: windows/openssh.yml
      mutating: true
    - label: WinRM Enable
      playbook: windows/winrm_enable.yml
      mutating: true
    - label: Remote Ops
      playbook: windows/remote_ops.yml
    - label: AD Search
      playbook: windows/ad_search.yml

- group: Photon
  actions:
    - label: STIG Audit
      playbook: photon/stig_audit.yml
    - label: STIG Remediate
      playbook: photon/stig_remediate.yml
      mutating: true
    - label: Rotate Password
      playbook: photon/rotate_password.yml
      mutating: true
      options:
        - name: rotate_user
          label: Username
          default: root
    - label: Password Status
