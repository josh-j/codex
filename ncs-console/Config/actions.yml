- group: Fleet
  actions:
    - label: Full Audit
      playbook: site.yml
    - label: STIG Audit
      playbook: site_stig_audit.yml
    - label: Remediate
      playbook: site_remediate.yml
      mutating: true
    - label: Collect Only
      playbook: site_collect_only.yml
    - label: Reports Only
      playbook: site_reports_only.yml
    - label: VMware Only
      playbook: site_vmware_only.yml
    - label: Windows Only
      playbook: site_windows_only.yml

- group: VMware
  actions:
    - label: Collect
      playbook: vmware/collect.yml
    - label: STIG Audit
      playbook: vmware/stig_audit.yml
    - label: STIG Remediate
      playbook: vmware/stig_remediate.yml
      mutating: true

- group: ESXi
  actions:
    - label: Collect
      playbook: esxi/collect.yml
      options:
        - name: esxi_collect_per_host
          label: Per-Host Health
          type: bool
          default: "true"
    - label: STIG Audit
      playbook: esxi/stig_audit.yml
    - label: STIG Remediate
      playbook: esxi/stig_remediate.yml
      mutating: true
      options:
        - name: esxi_stig_enable_ssh_checks
          label: SSH Checks
          type: bool
          default: "true"
    - label: Rotate Password
      playbook: esxi/rotate_password.yml
      mutating: true
      options:
        - name: rotate_user
          label: Username
          default: root
    - label: Password Status
      playbook: esxi/password_status.yml

- group: VCSA
  actions:
    - label: Collect
      playbook: vcsa/collect.yml
    - label: STIG Audit
      playbook: vcsa/stig_audit.yml
      options:
        - name: vcsa_stig_include_photon
          label: Include Photon Baseline
          type: bool
          default: "false"
    - label: STIG Remediate
      playbook: vcsa/stig_remediate.yml
      mutating: true
      options:
        - name: vcsa_stig_include_photon
          label: Include Photon Baseline
          type: bool
          default: "false"
        - name: vcsa_stig_create_backups
          label: Create Backups
          type: bool
          default: "true"
    - label: Rotate Password
      playbook: vcsa/rotate_password.yml
      mutating: true
      options:
        - name: rotate_user
          label: Username
          default: root
        - name: rotate_password
          label: New Password (blank = use vault)
        - name: rotate_force_change
          label: Force Password Change at Login
          type: bool
          default: "false"
    - label: Password Status
      playbook: vcsa/password_status.yml

- group: VM
  actions:
    - label: Collect
      playbook: vm/collect.yml
    - label: STIG Audit
      playbook: vm/stig_audit.yml
      options:
        - name: vm_stig_target_vms
          label: Target VMs (comma-separated, empty=auto)
    - label: STIG Audit (Parallel)
      playbook: vm/stig_audit_parallel.yml
      options:
        - name: vm_stig_target_vms
          label: Target VMs (comma-separated, empty=auto)
    - label: STIG Remediate
      playbook: vm/stig_remediate.yml
      mutating: true
      options:
        - name: vm_stig_target_vms
          label: Target VMs (comma-separated, empty=auto)
    - label: STIG Remediate (Parallel)
      playbook: vm/stig_remediate_parallel.yml
      mutating: true
      options:
        - name: vm_stig_target_vms
          label: Target VMs (comma-separated, empty=auto)

- group: Ubuntu
  actions:
    - label: Collect
      playbook: ubuntu/collect.yml
    - label: STIG Audit
      playbook: ubuntu/stig_audit.yml
    - label: STIG Remediate
      playbook: ubuntu/stig_remediate.yml
      mutating: true
      options:
        - name: ubuntu_stig_enable_hardening
          label: Enable Hardening
          type: bool
          default: "false"
    - label: Update
      playbook: ubuntu/update.yml
      mutating: true
      options:
        - name: ubuntu_enable_upgrade_reboots
          label: Allow Reboot
          type: bool
          default: "true"
    - label: Rotate Password
      playbook: ubuntu/rotate_password.yml
      mutating: true
      options:
        - name: rotate_user
          label: Username
          default: root
        - name: rotate_password
          label: New Password (blank = use vault)
        - name: rotate_force_change
          label: Force Password Change at Login
          type: bool
          default: "true"
    - label: Rotate Passwords (Bulk)
      playbook: ubuntu/rotate_passwords.yml
      mutating: true
      options:
        - name: user_name
          label: Username
          default: admin
        - name: new_password
          label: New Password
    - label: Password Status
      playbook: ubuntu/password_status.yml

- group: Windows
  actions:
    - label: Collect
      playbook: windows/collect.yml
    - label: STIG Audit
      playbook: windows/stig_audit.yml
      options:
        - name: windows_stig_native_checks_only
          label: Native Checks Only
          type: bool
          default: "false"
    - label: STIG Remediate
      playbook: windows/stig_remediate.yml
      mutating: true
      options:
        - name: windows_stig_enable_hardening
          label: Enable Hardening
          type: bool
          default: "false"
    - label: Health
      playbook: windows/health.yml
      options:
        - name: windows_health_check_disk
          label: Disk Check
          type: bool
          default: "true"
        - name: windows_health_check_memory_cpu
          label: Memory/CPU Check
          type: bool
          default: "true"
        - name: windows_health_check_services
          label: Services Check
          type: bool
          default: "true"
        - name: windows_health_check_event_logs
          label: Event Logs Check
          type: bool
          default: "true"
        - name: windows_health_check_secure_channel
          label: Secure Channel Check
          type: bool
          default: "true"
    - label: Patch
      playbook: windows/patch.yml
      mutating: true
      options:
        - name: windows_update_allow_reboot
          label: Allow Reboot
          type: bool
          default: "false"
    - label: AD Search
      playbook: windows/run.yml
      options:
        - name: ncs_operation
          label: Operation
          default: ad_search
        - name: windows_ad_search_term
          label: Search Term
        - name: windows_ad_search_type
          label: Type
          type: select
          choices: [computer, user, group]
          default: computer
        - name: windows_ad_bitlocker_recovery
          label: BitLocker Recovery
          type: bool
          default: "false"
    - label: Vuln Scan
      playbook: windows/run.yml
      options:
        - name: ncs_operation
          label: Operation
          default: vuln_scan
        - name: windows_vuln_scan_file
          label: Scan File Path
    - label: Cleanup
      playbook: windows/run.yml
      mutating: true
      options:
        - name: ncs_operation
          label: Operation
          default: cleanup
        - name: windows_cleanup_profiles
          label: Clean Profiles
          type: bool
          default: "false"
        - name: windows_cleanup_profile_days
          label: Profile Age (days)
          default: "30"
    - label: KB Install
      playbook: windows/run.yml
      mutating: true
      options:
        - name: ncs_operation
          label: Operation
          default: kb_install
        - name: windows_kb_list
          label: KB Numbers
    - label: Windows Update
      playbook: windows/run.yml
      mutating: true
      options:
        - name: ncs_operation
          label: Operation
          default: windows_update
    - label: Install Software
      playbook: windows/run.yml
      mutating: true
      options:
        - name: ncs_operation
          label: Operation
          default: update_software
        - name: windows_update_software_targets
          label: Software Targets
          default: chrome,edge
    - label: Uninstall Software
      playbook: windows/run.yml
      mutating: true
      options:
        - name: ncs_operation
          label: Operation
          default: uninstall_software
        - name: windows_uninstall_names
          label: Software Names
    - label: Service Management
      playbook: windows/run.yml
      mutating: true
      options:
        - name: ncs_operation
          label: Operation
          default: service
        - name: windows_service_name
          label: Service Name
        - name: windows_service_action
          label: Action
          type: select
          choices: [list, start, stop, restart]
          default: restart
    - label: Scheduled Task
      playbook: windows/run.yml
      mutating: true
      options:
        - name: ncs_operation
          label: Operation
          default: scheduled_task
        - name: windows_task_name
          label: Task Name
        - name: windows_task_action
          label: Task Action
          type: select
          choices: [list, run, enable, disable, delete]
          default: list
    - label: Registry Fix
      playbook: windows/run.yml
      mutating: true
      options:
        - name: ncs_operation
          label: Operation
          default: registry_fix
    - label: OpenSSH Setup
      playbook: windows/run.yml
      mutating: true
      options:
        - name: ncs_operation
          label: Operation
          default: openssh
        - name: windows_openssh_default_shell
          label: Default Shell
          type: select
          choices: [powershell, cmd]
          default: powershell
        - name: windows_openssh_allow_password
          label: Allow Password Auth
          type: bool
          default: "false"
        - name: windows_openssh_allow_pubkey
          label: Allow Pubkey Auth
          type: bool
          default: "false"
    - label: WinRM Enable
      playbook: windows/run.yml
      mutating: true
      options:
        - name: ncs_operation
          label: Operation
          default: winrm_enable
    - label: Remote Ops
      playbook: windows/run.yml
      options:
        - name: ncs_operation
          label: Operation
          default: remote_ops
        - name: windows_remote_op
          label: Command
          type: select
          choices: [uptime, reboot, shutdown, logoff, gpupdate, message]
          default: uptime
        - name: windows_remote_message
          label: Message

