- group: Fleet
  actions:
    - label: Full Audit
      playbook: site.yml
    - label: STIG Audit
      playbook: site_stig_audit.yml
    - label: Remediate
      playbook: site_remediate.yml
      mutating: true
    - label: Collect Only
      playbook: site_collect_only.yml
    - label: Reports Only
      playbook: site_reports_only.yml
    - label: VMware Only
      playbook: site_vmware_only.yml
    - label: Windows Only
      playbook: site_windows_only.yml

- group: VMware
  actions:
    - label: Audit
      playbook: vmware/audit.yml
    - label: STIG Audit
      playbook: vmware/stig_audit.yml
    - label: STIG Remediate
      playbook: vmware/stig_remediate.yml
      mutating: true

- group: ESXi
  actions:
    - label: Audit
      playbook: esxi/audit.yml
    - label: STIG Audit
      playbook: esxi/stig_audit.yml
    - label: STIG Remediate
      playbook: esxi/stig_remediate.yml
      mutating: true
    - label: Rotate Password
      playbook: esxi/rotate_password.yml
      mutating: true
      options:
        - name: rotate_user
          label: Username
          default: root
    - label: Password Status
      playbook: esxi/password_status.yml

- group: VCSA
  actions:
    - label: Audit
