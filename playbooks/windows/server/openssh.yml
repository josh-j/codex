---
# playbooks/windows/openssh.yml
# Install and configure OpenSSH Server on Windows targets.

- name: "Windows | Install OpenSSH Server"
  hosts: "{{ windows_target_hosts | default('windows_servers') }}"
  gather_facts: false
  tags: [windows, openssh, ssh]
  vars:
    ansible_connection: winrm
    ansible_winrm_transport: "{{ windows_bootstrap_winrm_transport | default('kerberos') }}"
    ansible_port: 5985
  roles:
    - role: internal.windows.server
      vars:
        ncs_action: remediate
        ncs_operation: openssh
