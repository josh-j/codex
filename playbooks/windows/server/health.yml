# >>>
# is_read_only: true
# options:
#   windows_health_check_disk: bool = true | Disk Check | Check disk space usage per volume
#   windows_health_check_memory_cpu: bool = true | Memory/CPU Check | Check RAM and CPU utilization
#   windows_health_check_services: bool = true | Services Check | Check status of critical Windows services
#   windows_health_check_event_logs: bool = true | Event Logs Check | Scan Application/System logs for errors
#   windows_health_check_secure_channel: bool = true | Secure Channel Check | Verify domain trust and secure channel
#   windows_health_check_os: bool = true | OS Info | Collect OS version, build, and uptime
#   windows_health_check_network: bool = true | Network Config | Collect NIC, IP, DNS, and gateway info
#   windows_health_check_updates: bool = true | Update Status | Check pending and installed Windows updates
#   windows_health_check_reboot_pending: bool = true | Reboot Pending | Detect if a reboot is required
#   windows_health_check_software_inventory: bool = true | Software Inventory | List installed applications
#   windows_health_event_log_hours: text = 24 | Event Log Lookback (hours) | How many hours back to scan event logs
#   windows_health_disk_warning_pct: text = 80 | Disk Warning % | Disk usage percent to flag as warning
#   windows_health_disk_critical_pct: text = 90 | Disk Critical % | Disk usage percent to flag as critical
# <<<
---
# playbooks/windows/health.yml
# Comprehensive system health check for Windows fleet.
# Collects OS info, disk, memory/CPU, services, network, reboot pending,
# event logs, secure channel, and software inventory.

- name: "Windows | System Health Check"
  hosts: "{{ windows_target_hosts | default('windows_servers') }}"
  gather_facts: false
  tags: [windows, health]
  roles:
    - role: internal.windows.server
      vars:
        ncs_action: audit
        ncs_profile: health
