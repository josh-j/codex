---
# playbooks/windows/update.yml
# Apply Windows updates via ConfigMgr-triggered update workflow.

- name: "Windows | Update (Apply)"
  hosts: "{{ windows_target_hosts | default('windows_servers') }}"
  gather_facts: false
  tags: ["windows", "update", "apply"]
  roles:
    - role: internal.windows.windows
      vars:
        ncs_action: remediate
        ncs_operation: patch
