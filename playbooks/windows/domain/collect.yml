---
# playbooks/windows/domain/collect.yml
# Run AD information gathering from a domain-joined Windows host.
#
# Usage:
#   ansible-playbook playbooks/windows/domain/collect.yml -l windows_servers --limit 1
#   ansible-playbook playbooks/windows/domain/collect.yml -e 'ncs_operation=privileged_groups'

- name: "Domain | AD Audit"
  hosts: "{{ domain_target_hosts | default('windows_servers') }}"
  gather_facts: false
  roles:
    - role: internal.windows.domain
      vars:
        ncs_action: collect
