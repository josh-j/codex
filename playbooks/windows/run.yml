# >>>
# label: AD Search
# read_only: true
# operation: ad_search
# options:
#   windows_ad_search_term: text | Search Term
#   windows_ad_search_type: select[computer, user, group] = computer | Type
#   windows_ad_bitlocker_recovery: bool = false | BitLocker Recovery
# ---
# label: Vuln Scan
# read_only: true
# operation: vuln_scan
# options:
#   windows_vuln_scan_file: text | Scan File Path
# ---
# label: Cleanup
# operation: cleanup
# options:
#   windows_cleanup_profiles: bool = false | Clean Profiles
#   windows_cleanup_profile_days: text = 30 | Profile Age (days)
# ---
# label: KB Install
# operation: kb_install
# options:
#   windows_kb_list: text | KB Numbers
# ---
# label: Windows Update
# operation: windows_update
# ---
# label: Install Software
# operation: update_software
# options:
#   windows_update_software_targets: text = chrome,edge | Software Targets
# ---
# label: Uninstall Software
# operation: uninstall_software
# options:
#   windows_uninstall_names: text | Software Names
# ---
# label: Service Management
# operation: service
# options:
#   windows_service_name: text | Service Name
#   windows_service_action: select[list, start, stop, restart] = restart | Action
# ---
# label: Scheduled Task
# operation: scheduled_task
# options:
#   windows_task_name: text | Task Name
#   windows_task_action: select[list, run, enable, disable, delete] = list | Task Action
# ---
# label: Registry Fix
# operation: registry_fix
# ---
# label: OpenSSH Setup
# operation: openssh
# options:
#   windows_openssh_default_shell: select[powershell, cmd] = powershell | Default Shell
#   windows_openssh_allow_password: bool = false | Allow Password Auth
#   windows_openssh_allow_pubkey: bool = false | Allow Pubkey Auth
# ---
# label: WinRM Enable
# operation: winrm_enable
# ---
# label: Remote Ops
# read_only: true
# operation: remote_ops
# options:
#   windows_remote_op: select[uptime, reboot, shutdown, logoff, gpupdate, message] = uptime | Command
#   windows_remote_message: text | Message
# <<<
---

- name: "Windows | {{ ncs_operation | default('collect') }}"
  hosts: "{{ windows_target_hosts | default('windows_servers') }}"
  gather_facts: false
  roles:
    - role: internal.windows.server
