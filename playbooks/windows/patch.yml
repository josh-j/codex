#   - name: windows_update_allow_reboot
#     label: Allow Reboot
#     type: bool
#     default: "false"
---
# playbooks/windows/patch.yml
# Apply Windows updates via ConfigMgr + post-patch verification audit.

- name: "Windows | Apply Updates"
  hosts: "{{ windows_target_hosts | default('windows_servers') }}"
  gather_facts: false
  tags: ["windows", "update", "apply"]
  roles:
    - role: internal.windows.server
      vars:
        ncs_action: remediate
        ncs_operation: patch

- name: "Windows | Post-Patch Audit"
  hosts: "{{ windows_target_hosts | default('windows_servers') }}"
  gather_facts: false
  tags: ["windows", "audit", "verify", "post-patch"]
  roles:
    - role: internal.windows.server
      vars:
        ncs_action: verify
        ncs_operation: patch
