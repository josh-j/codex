---
# playbooks/vcsa/stig_remediate.yml
# STIG hardening + verification for vCenter Server Appliance (VCSA).

- name: "Phase 2a: VCSA STIG Remediation"
  hosts: "{{ vcsa_stig_target_hosts | default(vcenter_stig_target_hosts | default('vcsa')) }}"
  gather_facts: false
  become: true
  tags: ["vmware", "stig", "remediate", "vcsa"]
  vars:
    ansible_connection: ssh
    ansible_user: root
    ansible_password: "{{ vault_vcenter_ssh_password }}"
    ansible_python_interpreter: /usr/bin/python3
  roles:
    - role: internal.vmware.vcsa
      vars:
        ncs_action: remediate
        ncs_profile: stig

- name: "Phase 2b: VCSA STIG Post-Remediation Audit"
  hosts: "{{ vcsa_stig_target_hosts | default(vcenter_stig_target_hosts | default('vcsa')) }}"
  gather_facts: false
  become: true
  tags: ["vmware", "stig", "audit", "vcsa"]
  vars:
    ansible_connection: ssh
    ansible_user: root
    ansible_password: "{{ vault_vcenter_ssh_password }}"
    ansible_python_interpreter: /usr/bin/python3
  roles:
    - role: internal.vmware.vcsa
      vars:
        ncs_action: verify
        ncs_profile: stig
