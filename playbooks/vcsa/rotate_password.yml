# ncs:
# label: Rotate Password
# mutating: true
# options:
#   - name: rotate_user
#     label: Username
#     default: root
---
# playbooks/vcsa/rotate_password.yml
# Rotate the root password on VCSA appliances via SSH.
#
# Usage:
#   ansible-playbook playbooks/vcsa/rotate_password.yml \
#     -l site1_vcsa

- name: "VCSA | Rotate Root Password"
  hosts: "{{ rotate_target | default('vcsa') }}"
  gather_facts: false
  vars:
    ansible_connection: ssh
    ansible_user: root
    ansible_password: "{{ vault_vcenter_ssh_password }}"
    ansible_python_interpreter: /usr/bin/python3
    ansible_ssh_timeout: 10
    rotate_user: root
    rotate_password: "{{ vault_rotate_password }}"
    rotate_force_change: false

  pre_tasks:
    - name: Validate vault password is set
      ansible.builtin.assert:
        that:
          - rotate_password | default('') | length > 0
        fail_msg: >-
          vault_rotate_password is not set.
          Define it in your Ansible vault or pass via -e.

  tasks:
    - name: Rotate password
      block:
        - name: Wait for SSH connection
          ansible.builtin.wait_for_connection:
            timeout: 10

        - name: Set user password
          ansible.builtin.user:
            name: "{{ rotate_user }}"
            password: "{{ rotate_password | password_hash('sha512') }}"
            update_password: always
          no_log: true

        - name: Force password change on next login
          ansible.builtin.command: chage -d 0 {{ rotate_user }}
          changed_when: true
          when: rotate_force_change | bool

        - name: Confirm rotation
          ansible.builtin.debug:
            msg: "Password rotated for {{ rotate_user }} on {{ inventory_hostname }}."

      rescue:
        - name: SSH unreachable
          ansible.builtin.fail:
            msg: >-
              SSH connection to {{ inventory_hostname }} failed.
              VCSA may have SSH disabled (STIG requirement).
              Enable SSH via VAMI (https://{{ inventory_hostname }}:5480)
              or the vCenter UI before running this playbook.
