---
# playbooks/vcsa/password_status.yml
# Report password aging and account status on VCSA appliances via SSH.
#
# Usage:
#   ansible-playbook playbooks/vcsa/password_status.yml -l vcenters

- name: "VCSA | Password & Account Status"
  hosts: "{{ rotate_target | default('vcenters') }}"
  gather_facts: false
  vars:
    ansible_connection: ssh
    ansible_user: root
    ansible_password: "{{ vault_vcenter_ssh_password }}"
    ansible_python_interpreter: /usr/bin/python3
    ansible_ssh_timeout: 10
    rotate_user: root

  tasks:
    - name: Check SSH connectivity
      block:
        - name: Wait for SSH connection
          ansible.builtin.wait_for_connection:
            timeout: 10

        - name: Get password aging info
          ansible.builtin.command: chage -l {{ rotate_user }}
          register: _chage
          changed_when: false

        - name: Get account status
          ansible.builtin.command: passwd -S {{ rotate_user }}
          register: _passwd
          changed_when: false

        - name: Display password status
          ansible.builtin.debug:
            msg: |-
              === {{ inventory_hostname }} | {{ rotate_user }} ===
              {{ _passwd.stdout }}
              {{ _chage.stdout }}

      rescue:
        - name: SSH unreachable
          ansible.builtin.fail:
            msg: >-
              SSH connection to {{ inventory_hostname }} failed.
              VCSA may have SSH disabled (STIG requirement).
              Enable SSH via VAMI (https://{{ inventory_hostname }}:5480)
              or the vCenter UI before running this playbook.
