# >>>
# label: Rotate Password
# options:
#   rotate_user: text = root | Username
#   rotate_password: text | New Password (blank = use vault)
#   rotate_force_change: bool = true | Force Password Change at Login
# <<<
---
# playbooks/photon/rotate_password.yml
# Rotate a local user password on Photon OS servers.
#
# Usage:
#   ansible-playbook playbooks/photon/rotate_password.yml \
#     -l photon_servers -e 'rotate_user=root'

- name: "Photon | Rotate Local User Password"
  hosts: "{{ rotate_target | default('photon_servers') }}"
  gather_facts: false
  become: true
  vars:
    rotate_user: root
    rotate_password: "{{ vault_rotate_password }}"
    rotate_force_change: true
    ansible_ssh_timeout: 10

  roles:
    - role: internal.linux.photon
      vars:
        ncs_action: remediate
        ncs_operation: password_rotate
