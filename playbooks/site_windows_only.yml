---
# playbooks/site_windows_only.yml
# Windows-only pipeline with report generation.

- name: "Phase 1: Initialize Reporting Environment"
  ansible.builtin.import_playbook: ncs/setup_env.yml

- name: "Phase 3b: Windows System Audit"
  ansible.builtin.import_playbook: windows/server/collect.yml

- name: "Phase 3c: Windows System Health Check"
  ansible.builtin.import_playbook: windows/server/health.yml

- name: "Phase 4: Unified Infrastructure Reporting"
  ansible.builtin.import_playbook: ncs/generate_reports.yml
