---
# playbooks/esxi/rotate_password.yml
# Rotate a local user password on ESXi hosts via the vCenter API.
# Uses vCenter as proxy — lockdown mode does not block this operation.
#
# Usage:
#   ansible-playbook playbooks/esxi/rotate_password.yml \
#     -l site1_vcenters -e '{"esxi_stig_target_hosts": ["esxi01.lab"]}'
#
# Requires: community.vmware.vmware_host_user_manager

- name: "ESXi | Rotate Local User Password"
  hosts: "{{ rotate_target | default('vcenters') }}"
  connection: local
  gather_facts: false
  vars:
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
    rotate_user: root

  pre_tasks:
    - name: Validate ESXi target list
      ansible.builtin.assert:
        that:
          - esxi_stig_target_hosts | default([]) | length > 0
        fail_msg: >-
          No ESXi targets provided. Set esxi_stig_target_hosts
          (e.g., -e '{"esxi_stig_target_hosts": ["esxi01"]}').

  roles:
    - role: internal.vmware.esxi
      vars:
        ncs_action: remediate
        ncs_operation: rotate_password
