---
# playbooks/esxi/audit.yml
# Read-only audit focused on ESXi host and datastore inventory/health data.

- name: Phase 2b | ESXi Infrastructure Audit
  hosts: vcenters
  connection: local
  gather_facts: false
  roles:
    - role: internal.vmware.vcenter_collect
      vars:
        vcsa_collect_appliance: false
        vcsa_collect_inventory: true
        vcsa_collect_alarms: false
        vcsa_collect_datacenters: true
        vcsa_collect_compute: true
        vcsa_collect_storage: true
        vcsa_collect_workload: false
        vcsa_collect_snapshots: false
