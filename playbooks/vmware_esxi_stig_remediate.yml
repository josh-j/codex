---
# playbooks/vmware_esxi_stig_remediate.yml
# Automated security hardening remediation for VMware ESXi hosts.

- name: "Phase 2c | ESXi STIG Hardening (per vCenter)"
  hosts: vcenters
  connection: local
  gather_facts: false
  tags: ["vmware", "stig", "remediate", "esxi"]
  vars:
    vmware_stig_enable_hardening: true # MUTATING — applies changes
    esxi_stig_enable_ssh_checks: false
  pre_tasks:
    - name: "Validate ESXi target list is provided"
      ansible.builtin.assert:
        that:
          - esxi_stig_target_hosts | default([]) | length > 0
        fail_msg: "No ESXi targets provided. Set esxi_stig_target_hosts (for example via just stig-harden-esxi-*)."

  tasks:
    - name: "Execute ESXi STIG Hardening"
      ansible.builtin.include_role:
        name: internal.vmware.esxi
      when: esxi_stig_target_hosts | default([]) | length > 0

- name: "Phase 2e | Post-Remediation ESXi STIG Audit"
  hosts: vcenters
  connection: local
  gather_facts: false
  tags: ["vmware", "stig", "audit", "esxi"]
  vars:
    vmware_stig_enable_hardening: false # READ-ONLY

  tasks:
    - name: "Execute Post-Remediation ESXi STIG Audit"
      ansible.builtin.include_role:
        name: internal.vmware.esxi
      when: esxi_stig_target_hosts | default([]) | length > 0
