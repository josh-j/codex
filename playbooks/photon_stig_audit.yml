---
# playbooks/photon_stig_audit.yml
# Security Technical Implementation Guide (STIG) audit for VMware Photon OS 3.0.
- name: "Phase 2: Photon STIG Audit"
  hosts: "{{ photon_target_hosts | default('photon_servers') }}"
  gather_facts: false
  become: false
  tags: ["photon", "stig", "security"]
  vars:
    ansible_connection: ssh
    ansible_user: root
    ansible_password: "{{ vault_vcenter_ssh_password }}"
    ansible_python_interpreter: /usr/bin/python3
  roles:
    - role: internal.linux.photon
      vars:
        photon_action: discover
    - role: internal.linux.photon
      vars:
        photon_action: stig
