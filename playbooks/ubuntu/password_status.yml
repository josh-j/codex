---
# playbooks/ubuntu/password_status.yml
# Report password aging and account status for a local user on Ubuntu servers.
#
# Usage:
#   ansible-playbook playbooks/ubuntu/password_status.yml -l ubuntu_servers
#   ansible-playbook playbooks/ubuntu/password_status.yml -l ubuntu_servers -e 'rotate_user=admin'

- name: "Ubuntu | Password & Account Status"
  hosts: "{{ rotate_target | default('ubuntu_servers') }}"
  gather_facts: false
  become: true
  vars:
    rotate_user: root
    ansible_ssh_timeout: 10

  tasks:
    - name: Check SSH connectivity
      block:
        - name: Wait for SSH connection
          ansible.builtin.wait_for_connection:
            timeout: 10

        - name: Get password aging info
          ansible.builtin.command: chage -l {{ rotate_user }}
          register: _chage
          changed_when: false

        - name: Get account status
          ansible.builtin.command: passwd -S {{ rotate_user }}
          register: _passwd
          changed_when: false

        - name: Display password status
          ansible.builtin.debug:
            msg: |-
              === {{ inventory_hostname }} | {{ rotate_user }} ===
              {{ _passwd.stdout }}
              {{ _chage.stdout }}

      rescue:
        - name: SSH unreachable
          ansible.builtin.fail:
            msg: >-
              SSH connection to {{ inventory_hostname }} failed.
              Verify SSH is running and the host is reachable.
