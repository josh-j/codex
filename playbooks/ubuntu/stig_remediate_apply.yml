---
# playbooks/ubuntu/stig_remediate_apply.yml
# Apply Ubuntu STIG hardening controls.
- name: "Ubuntu | STIG Remediate (Apply)"
  hosts: "{{ ubuntu_target_hosts | default('ubuntu_servers') }}"
  gather_facts: false
  # become: true
  tags: ["ubuntu", "stig", "remediate", "apply", "security"]

  pre_tasks:
    - name: Write SSH key to temp file
      copy:
        content: "{{ vault_logservers_private_key }}"
        dest: /tmp/logservers_key
        mode: "0600"
      delegate_to: localhost
      run_once: true
      when: vault_logservers_private_key | default('') | trim | length > 0

  roles:
    - role: internal.linux.ubuntu
      vars:
        ubuntu_action: stig
        ubuntu_enable_maintenance: true
        ubuntu_enable_stig_hardening: true
        ansible_ssh_private_key_file: "{{ '/tmp/logservers_key' if (vault_logservers_private_key | default('') | trim | length > 0) else omit }}"
