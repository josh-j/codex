---
# playbooks/ubuntu/patch.yml
# Compatibility wrapper for Ubuntu patch workflow.

- name: "Composite Ubuntu Patch | Pre-Discover"
  ansible.builtin.import_playbook: discover.yml

- name: "Composite Ubuntu Patch | Apply"
  ansible.builtin.import_playbook: patch_apply.yml

- name: "Composite Ubuntu Patch | Post-Discover"
  ansible.builtin.import_playbook: discover.yml
