---
# playbooks/ubuntu/rotate_password.yml
# Rotate a local user password on Ubuntu servers using a vault variable.
#
# Usage:
#   ansible-playbook playbooks/ubuntu/rotate_password.yml \
#     -l ubuntu_servers -e 'rotate_user=admin'

- name: "Ubuntu | Rotate Local User Password"
  hosts: "{{ rotate_target | default('ubuntu_servers') }}"
  gather_facts: false
  become: true
  vars:
    rotate_user: root
    rotate_password: "{{ vault_rotate_password }}"
    rotate_force_change: true
    ansible_ssh_timeout: 10

  pre_tasks:
    - name: Validate vault password is set
      ansible.builtin.assert:
        that:
          - rotate_password | default('') | length > 0
        fail_msg: >-
          vault_rotate_password is not set.
          Define it in your Ansible vault or pass via -e.

    - name: Hash password
      ansible.builtin.set_fact:
        _hashed_password: "{{ rotate_password | password_hash('sha512') }}"
      no_log: true

  tasks:
    - name: Rotate password
      block:
        - name: Wait for SSH connection
          ansible.builtin.wait_for_connection:
            timeout: 10

        - name: Set user password
          ansible.builtin.user:
            name: "{{ rotate_user }}"
            password: "{{ _hashed_password }}"
            update_password: always
          no_log: true

        - name: Force password change on next login
          ansible.builtin.command: chage -d 0 {{ rotate_user }}
          changed_when: true
          when: rotate_force_change | bool

        - name: Confirm rotation
          ansible.builtin.debug:
            msg: "Password rotated for {{ rotate_user }} on {{ inventory_hostname }}."

      rescue:
        - name: SSH unreachable
          ansible.builtin.fail:
            msg: >-
              SSH connection to {{ inventory_hostname }} failed.
              Verify SSH is running and the host is reachable.
