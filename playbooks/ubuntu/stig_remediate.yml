- name: "Composite Ubuntu STIG Remediate | Apply"
  ansible.builtin.import_playbook: stig_remediate_apply.yml

- name: "Composite Ubuntu STIG Remediate | Verify"
  ansible.builtin.import_playbook: stig_verify.yml
