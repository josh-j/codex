---
# playbooks/vmware/stig_audit.yml
# Compatibility wrapper that runs VMware STIG audit targets (ESXi, VM, VCSA).

- name: "Composite VMware STIG Audit | ESXi"
  ansible.builtin.import_playbook: esxi_stig_audit.yml

- name: "Composite VMware STIG Audit | VM"
  ansible.builtin.import_playbook: vm_stig_audit.yml

- name: "Composite VMware STIG Audit | VCSA"
  ansible.builtin.import_playbook: vcsa_stig_audit.yml
