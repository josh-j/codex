---
# playbooks/vmware/rotate_esxi_password.yml
# Rotate a local user password on ESXi hosts via the vCenter API.
# Uses vCenter as proxy — lockdown mode does not block this operation.
#
# Usage:
#   ansible-playbook playbooks/vmware/rotate_esxi_password.yml \
#     -l site1_vcenters -e '{"esxi_stig_target_hosts": ["esxi01.lab"]}'
#
# Requires: community.vmware.vmware_host_user_manager

- name: "ESXi | Rotate Local User Password"
  hosts: "{{ rotate_target | default('vcenters') }}"
  connection: local
  gather_facts: false
  vars:
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
    rotate_user: root
    rotate_password: "{{ vault_rotate_password }}"

  pre_tasks:
    - name: Validate vault password is set
      ansible.builtin.assert:
        that:
          - rotate_password | default('') | length > 0
        fail_msg: >-
          vault_rotate_password is not set.
          Define it in your Ansible vault or pass via -e.

    - name: Validate ESXi target list
      ansible.builtin.assert:
        that:
          - esxi_stig_target_hosts | default([]) | length > 0
        fail_msg: >-
          No ESXi targets provided. Set esxi_stig_target_hosts
          (e.g., -e '{"esxi_stig_target_hosts": ["esxi01"]}').

  roles:
    - role: internal.vmware.common

  tasks:
    - name: Rotate password on each ESXi host
      community.vmware.vmware_host_user_manager:
        hostname: "{{ _vcenter_hostname }}"
        username: "{{ vmware_username }}"
        password: "{{ vmware_password }}"
        validate_certs: "{{ vmware_validate_certs | default(false) }}"
        esxi_hostname: "{{ item }}"
        user_name: "{{ rotate_user }}"
        user_password: "{{ rotate_password }}"
        override_user_password: true
        state: present
      loop: "{{ esxi_stig_target_hosts }}"
      loop_control:
        label: "{{ item }}"
      no_log: true

    - name: Confirm rotation
      ansible.builtin.debug:
        msg: "Password rotated for {{ rotate_user }} on ESXi hosts: {{ esxi_stig_target_hosts | join(', ') }}"

    - name: Report lockdown status per host
      community.vmware.vmware_host_config_info:
        hostname: "{{ _vcenter_hostname }}"
        username: "{{ vmware_username }}"
        password: "{{ vmware_password }}"
        validate_certs: "{{ vmware_validate_certs | default(false) }}"
        esxi_hostname: "{{ item }}"
      delegate_to: localhost
      register: _esxi_config
      loop: "{{ esxi_stig_target_hosts }}"
      loop_control:
        label: "{{ item }}"
      failed_when: false

    - name: Display lockdown status
      ansible.builtin.debug:
        msg: "{{ item.item }}: lockdown={{ item.hosts_info[item.item]['Security.Lockdown'] | default('unknown') }}"
      loop: "{{ _esxi_config.results }}"
      loop_control:
        label: "{{ item.item }}"
      when: item.hosts_info is defined
