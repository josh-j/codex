# >>>
# options:
#   vcsa_stig_include_photon: bool = false | Include Photon Baseline
#   vcsa_stig_create_backups: bool = true | Create Backups
# <<<
---
# playbooks/vmware/vcsa/stig_remediate.yml
# STIG hardening + verification for vCenter Server Appliance (VCSA).

- name: "Phase 2a: VCSA STIG Remediation"
  hosts: "{{ vcsa_target_hosts | default('vcsa') }}"
  gather_facts: false
  become: true
  tags: ["vmware", "stig", "remediate", "vcsa"]
  roles:
    - role: internal.vmware.vcsa
      vars:
        ncs_action: remediate
        ncs_profile: stig

- name: "Phase 2b: VCSA STIG Post-Remediation Audit"
  hosts: "{{ vcsa_target_hosts | default('vcsa') }}"
  gather_facts: false
  become: true
  tags: ["vmware", "stig", "audit", "vcsa"]
  roles:
    - role: internal.vmware.vcsa
      vars:
        ncs_action: verify
        ncs_profile: stig
