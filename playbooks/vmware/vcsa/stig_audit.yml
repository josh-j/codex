# >>>
# is_read_only: true
# options:
#   vcsa_stig_include_photon: bool = false | Include Photon Baseline | Also audit the underlying Photon OS STIG controls
#   vmware_stig_export_cklb: bool = true | Export STIG Checklist (CKLB) | Generate DISA STIG Viewer checklist artifact
# <<<
---
# playbooks/vmware/vcsa/stig_audit.yml
- name: "Phase 2a: VCSA STIG Audit"
  hosts: "{{ vcsa_target_hosts | default('vcsa') }}"
  gather_facts: false
  tags: ["vmware", "stig", "audit", "vcsa"]
  roles:
    - role: internal.vmware.vcsa
      vars:
        ncs_action: audit
        ncs_profile: stig
