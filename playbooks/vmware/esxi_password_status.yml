---
# playbooks/vmware/esxi_password_status.yml
# Report local user accounts and password policy on ESXi hosts.
# Lockdown-aware: gracefully degrades if lockdown blocks direct queries.
#
# Usage:
#   ansible-playbook playbooks/vmware/esxi_password_status.yml \
#     -l site1_vcenters -e '{"esxi_stig_target_hosts": ["esxi01.lab"]}'

- name: "ESXi | Local User & Account Status"
  hosts: "{{ rotate_target | default('vcenters') }}"
  connection: local
  gather_facts: false
  vars:
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
    rotate_user: root

  pre_tasks:
    - name: Validate ESXi target list
      ansible.builtin.assert:
        that:
          - esxi_stig_target_hosts | default([]) | length > 0
        fail_msg: >-
          No ESXi targets provided. Set esxi_stig_target_hosts
          (e.g., -e '{"esxi_stig_target_hosts": ["esxi01"]}').

  roles:
    - role: internal.vmware.common

  tasks:
    # Password policy via vCenter — always works regardless of lockdown
    - name: Get password policy from each ESXi host
      community.vmware.vmware_host_config_info:
        hostname: "{{ _vcenter_hostname }}"
        username: "{{ vmware_username }}"
        password: "{{ vmware_password }}"
        validate_certs: "{{ vmware_validate_certs | default(false) }}"
        esxi_hostname: "{{ item }}"
      delegate_to: localhost
      register: _esxi_config
      loop: "{{ esxi_stig_target_hosts }}"
      loop_control:
        label: "{{ item }}"
      failed_when: false

    - name: Display password policy and lockdown status per host
      ansible.builtin.debug:
        msg: |-
          === {{ item.item }} | Password Policy ===
          Max days: {{ item.hosts_info[item.item]['Security.PasswordMaxDays'] | default('N/A') }}
          Quality control: {{ item.hosts_info[item.item]['Security.PasswordQualityControl'] | default('N/A') }}
          History: {{ item.hosts_info[item.item]['Security.PasswordHistory'] | default('N/A') }}
          Lockdown mode: {{ item.hosts_info[item.item]['Security.Lockdown'] | default('N/A') }}
      loop: "{{ _esxi_config.results }}"
      loop_control:
        label: "{{ item.item }}"
      when: item.hosts_info is defined

    # User list via direct ESXi connection — may be blocked by lockdown
    - name: Gather local user info from each ESXi host
      community.vmware.vmware_local_user_info:
        hostname: "{{ item }}"
        username: "{{ vmware_username }}"
        password: "{{ vmware_password }}"
        validate_certs: "{{ vmware_validate_certs | default(false) }}"
      delegate_to: localhost
      register: _esxi_users
      loop: "{{ esxi_stig_target_hosts }}"
      loop_control:
        label: "{{ item }}"
      ignore_errors: true

    - name: Display account status per host
      ansible.builtin.debug:
        msg: |-
          === {{ item.item }} ===
          {% for user in item.local_user_info %}
          {{ '%-16s' | format(user.user_name) }} role={{ user.role | default('N/A') }}  shell={{ user.shell_access | default(false) }}  description={{ user.description | default('') }}
          {% endfor %}
      loop: "{{ _esxi_users.results }}"
      loop_control:
        label: "{{ item.item }}"
      when: item.local_user_info is defined

    - name: Warn about hosts where user info was unavailable
      ansible.builtin.debug:
        msg: >-
          WARNING: Could not retrieve local user list from {{ item.item }}.
          Lockdown mode may be enabled. Disable lockdown or use the vCenter UI
          to inspect local accounts. Password policy (above) is still accurate.
      loop: "{{ _esxi_users.results }}"
      loop_control:
        label: "{{ item.item }}"
      when: item is failed
