---
# playbooks/vmware/esxi/refresh_inventory.yml
# Queries all vCenters and writes inventory/production/esxi_hosts.yaml
# with discovered ESXi hosts grouped by managing vCenter.
#
# Usage:
#   just refresh-esxi-inventory
#   ansible-playbook playbooks/vmware/esxi/refresh_inventory.yml

- name: "Discover ESXi hosts from all vCenters"
  hosts: vcsa
  connection: local
  gather_facts: false
  become: false
  vars:
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
  tasks:
    - name: "Init vCenter connection"
      ansible.builtin.include_role:
        name: internal.vmware.common
        tasks_from: init_vcenter

    - name: "Query datacenters"
      community.vmware.vmware_datacenter_info:
        hostname: "{{ _vcenter_hostname }}"
        username: "{{ vmware_username }}"
        password: "{{ vmware_password }}"
        validate_certs: "{{ vmware_validate_certs | default(false) | bool }}"
      register: _refresh_datacenters

    - name: "Query clusters per datacenter"
      vmware.vmware.cluster_info:
        hostname: "{{ _vcenter_hostname }}"
        username: "{{ vmware_username }}"
        password: "{{ vmware_password }}"
        validate_certs: "{{ vmware_validate_certs | default(false) | bool }}"
        datacenter: "{{ item }}"
      loop: "{{ _refresh_datacenters.datacenter_info | default([]) | map(attribute='name') | list }}"
      register: _refresh_clusters

    - name: "Extract ESXi hostnames"
      ansible.builtin.set_fact:
        _refresh_esxi_hosts: >-
          {{
            _refresh_clusters.results | default([])
            | selectattr('clusters', 'defined')
            | map(attribute='clusters')
            | map('dict2items') | flatten
            | map(attribute='value')
            | selectattr('hosts', 'defined')
            | map(attribute='hosts') | flatten
            | map(attribute='name')
            | sort | unique | list
          }}

    - name: "Store per-vCenter results"
      ansible.builtin.set_fact:
        _refresh_site_code: "{{ inventory_hostname | regex_replace('^vcsa-', '') }}"
        _refresh_result:
          vcenter: "{{ inventory_hostname }}"
          hosts: "{{ _refresh_esxi_hosts | default([]) }}"

- name: "Write ESXi inventory file"
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    _inventory_path: "{{ playbook_dir }}/../../../inventory/production/esxi_hosts.yaml"
  tasks:
    - name: "Collect results from all vCenters"
      ansible.builtin.set_fact:
        _all_sites: >-
          {{ groups['vcsa'] | default([])
             | map('extract', hostvars, '_refresh_result')
             | select('defined')
             | list }}

    - name: "Build inventory YAML"
      ansible.builtin.set_fact:
        _inventory_content: |
          ---
          # ESXi hosts grouped by managing vCenter.
          # Auto-generated by: ansible-playbook playbooks/vmware/esxi/refresh_inventory.yml
          # _ncs_vcenter links each group to its vCenter for API routing.
          # These are "phantom" inventory entries for --limit targeting only.
          all:
            children:
              esxi_hosts:
                vars:
                  vmware_validate_certs: false
                children:
          {% for site in _all_sites | sort(attribute='vcenter') %}
          {% set site_code = site.vcenter | regex_replace('^vcsa-', '') %}
                  {{ site_code }}_esxi_hosts:
                    vars:
                      _ncs_vcenter: "{{ site.vcenter }}"
          {% if site.hosts | length > 0 %}
                    hosts:
          {% for host in site.hosts | sort %}
                      {{ host }}: {}
          {% endfor %}
          {% else %}
                    hosts: {}
          {% endif %}
          {% endfor %}

    - name: "Write inventory file"
      ansible.builtin.copy:
        content: "{{ _inventory_content }}"
        dest: "{{ _inventory_path }}"
        mode: "0644"

    - name: "Summary"
      ansible.builtin.debug:
        msg: >-
          Wrote {{ _all_sites | map(attribute='hosts') | map('length') | sum }} ESXi hosts
          across {{ _all_sites | length }} vCenters to {{ _inventory_path }}
