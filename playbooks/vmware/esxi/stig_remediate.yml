# >>>
# options:
#   esxi_stig_enable_ssh_checks: bool = true | SSH Checks | Run SSH-based STIG checks (disable for lockdown mode hosts)
# <<<
---
# playbooks/vmware/esxi/stig_remediate.yml
# Automated security hardening remediation for VMware ESXi hosts.

- name: "Phase 2c | ESXi STIG Hardening"
  hosts: "vcsa:esxi_hosts"
  connection: local
  gather_facts: false
  become: false
  tags: ["vmware", "stig", "remediate", "esxi"]
  vars:
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
    esxi_stig_enable_ssh_checks: false
  pre_tasks:
    - name: Route ESXi targets
      ansible.builtin.include_role:
        name: internal.vmware.common
        tasks_from: route_esxi

  tasks:
    - name: "Execute ESXi STIG Hardening"
      ansible.builtin.include_role:
        name: internal.vmware.esxi
      vars:
        ncs_action: remediate
        ncs_profile: stig
      when: esxi_stig_target_hosts | default([]) | length > 0

- name: "Phase 2e | Post-Remediation ESXi STIG Audit"
  hosts: "vcsa:esxi_hosts"
  connection: local
  gather_facts: false
  become: false
  tags: ["vmware", "stig", "audit", "esxi"]
  vars:
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
  pre_tasks:
    - name: Route ESXi targets
      ansible.builtin.include_role:
        name: internal.vmware.common
        tasks_from: route_esxi
  tasks:
    - name: "Execute Post-Remediation ESXi STIG Audit"
      ansible.builtin.include_role:
        name: internal.vmware.esxi
      vars:
        ncs_action: verify
        ncs_profile: stig
      when: esxi_stig_target_hosts | default([]) | length > 0
