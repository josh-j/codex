---
# playbooks/vmware/esxi_audit.yml
# Read-only audit focused on ESXi host and datastore inventory/health data.

- name: Phase 2b | ESXi Infrastructure Audit
  hosts: vcenters
  connection: local
  gather_facts: false
  roles:
    - role: internal.vmware.vcenter
      vars:
        vcenter_action: collect
        vcenter_collect_appliance: false
        vcenter_collect_inventory: true
        vcenter_collect_alarms: false
        vcenter_collect_datacenters: true
        vcenter_collect_compute: true
        vcenter_collect_storage: true
        vcenter_collect_workload: false
        vcenter_collect_snapshots: false
