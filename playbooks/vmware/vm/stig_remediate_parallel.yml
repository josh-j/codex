# >>>
# label: VM STIG Remediation (Parallel)
# options:
#   site: text | Site Code (required, e.g. tyfq)
#   vm_stig_exclude_pattern: text | VM Exclusion Regex
#   vm_stig_target_vms: text | Target VMs (JSON array)
# <<<
---
# playbooks/vmware/vm/stig_remediate_parallel.yml
# VM STIG Remediation — parallel per-VM execution.
#
# Usage:
#   ansible-playbook playbooks/vmware/vm/stig_remediate_parallel.yml -e 'site=tyfq' -f 20
# ansible-playbook playbooks/vmware/vm/stig_remediate_parallel.yml -e 'site=tyfq' \
# -e 'vm_stig_exclude_pattern=(?i).*(-(ise|wave|vcm)-).*' -f 20
#   ansible-playbook playbooks/vmware/vm/stig_remediate_parallel.yml -e 'site=tyfq' -e '{"vm_stig_target_vms": ["vm-web01"]}' -f 10

- name: "Phase 2b-pre | Discover VMs and build target list"
  hosts: "vcsa-{{ site | default('undefined') }}"
  connection: local
  gather_facts: false
  become: false
  strategy: linear
  tags: ["vmware", "stig", "remediate", "vm"]
  vars:
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
  pre_tasks:
    - name: "Validate site variable is provided"
      ansible.builtin.assert:
        that:
          - site is defined
          - site | length > 0
        fail_msg: "Please specify a site (e.g., -e 'site=tyfq')"

  tasks:
    - name: "Discover VMs and register parallel targets"
      ansible.builtin.include_role:
        name: internal.vmware.common
        tasks_from: register_vm_targets

    - name: "Display target summary"
      ansible.builtin.debug:
        msg: >-
          Discovered {{ vm_stig_target_vms | length }} VMs on {{ inventory_hostname }}.
          Exclude pattern: {{ vm_stig_exclude_pattern | default('none') }}.

- name: "Phase 2b | VM STIG Hardening (parallel per VM)"
  hosts: _stig_vm_targets
  connection: local
  gather_facts: false
  become: false
  strategy: free
  tags: ["vmware", "stig", "remediate", "vm"]
  vars:
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
    _current_vm_name: "{{ inventory_hostname }}"
    _current_vm_datacenter: "{{ vm_datacenter | default(omit) }}"
    vm_datacenter_map: "{{ { inventory_hostname: vm_datacenter | default('') } }}"
    vm_stig_target_vms:
      - "{{ inventory_hostname }}"
  roles:
    - role: internal.vmware.common
    - role: internal.vmware.vm
      vars:
        ncs_action: remediate
        ncs_profile: stig

- name: "Phase 2b-post | Post-Remediation VM STIG Audit (parallel per VM)"
  hosts: _stig_vm_targets
  connection: local
  gather_facts: false
  become: false
  strategy: free
  tags: ["vmware", "stig", "audit", "vm"]
  vars:
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
    _current_vm_name: "{{ inventory_hostname }}"
    _current_vm_datacenter: "{{ vm_datacenter | default(omit) }}"
    vm_datacenter_map: "{{ { inventory_hostname: vm_datacenter | default('') } }}"
    vm_stig_target_vms:
      - "{{ inventory_hostname }}"
  roles:
    - role: internal.vmware.common
    - role: internal.vmware.vm
      vars:
        ncs_action: verify
        ncs_profile: stig
