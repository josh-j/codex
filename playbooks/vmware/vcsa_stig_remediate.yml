---
# playbooks/vmware/vcsa_stig_remediate.yml
# STIG hardening + verification for vCenter Server Appliance (VCSA).

- name: "Phase 2a: VCSA STIG Remediation"
  hosts: "{{ vcenter_stig_target_hosts | default(vcenter_target_hosts | default('vcenters')) }}"
  gather_facts: false
  become: true
  tags: ["vmware", "stig", "remediate", "vcsa"]
  vars:
    ansible_connection: ssh
    ansible_user: root
    ansible_password: "{{ vault_vcenter_ssh_password }}"
    ansible_python_interpreter: /usr/bin/python3
  roles:
    - role: internal.vmware.vcenter
      vars:
        vcenter_action: stig
        vmware_stig_enable_hardening: true

- name: "Phase 2b: VCSA STIG Post-Remediation Audit"
  hosts: "{{ vcenter_stig_target_hosts | default(vcenter_target_hosts | default('vcenters')) }}"
  gather_facts: false
  become: true
  tags: ["vmware", "stig", "audit", "vcsa"]
  vars:
    ansible_connection: ssh
    ansible_user: root
    ansible_password: "{{ vault_vcenter_ssh_password }}"
    ansible_python_interpreter: /usr/bin/python3
  roles:
    - role: internal.vmware.vcenter
      vars:
        vcenter_action: stig
        vmware_stig_enable_hardening: false
