---
# playbooks/site_collect_only.yml
# Collection-only pipeline (no report rendering).

- name: "Phase 1: Initialize Reporting Environment"
  ansible.builtin.import_playbook: ncs/setup_env.yml

- name: "Phase 2: VMware Infrastructure Inventory & Health"
  ansible.builtin.import_playbook: internal.vmware.collect

- name: "Phase 3: Linux System Health Audit"
  ansible.builtin.import_playbook: internal.linux.ubuntu_collect

- name: "Phase 3b: Windows System Audit"
  ansible.builtin.import_playbook: internal.windows.server_collect

- name: "Phase 3c: Windows System Health Check"
  ansible.builtin.import_playbook: internal.windows.server_health
