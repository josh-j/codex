---
# playbooks/vars/ncs_global_config.yaml
# Truly global configuration for the NCS fleet.

ncs_config:
  debug_mode: true
  dry_run_mode: false
  report_directory: /srv/samba/reports
  logging:
    export_to_file: true
    file_path: "/var/log/ncs/ncs.log"
    max_size_mb: 100
    backup_count: 5

# SMTP alert email configuration (used by playbooks/core/send_alert_email.yml)
# ncs_smtp_host: smtp.example.com
# ncs_smtp_port: 587
# ncs_smtp_username: alerts@example.com
# ncs_smtp_password: "{{ vault_smtp_password }}"
# ncs_smtp_secure: starttls
# ncs_alert_email_from: ncs-alerts@example.com
# ncs_alert_email_to: ops-team@example.com
