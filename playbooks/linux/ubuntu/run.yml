---
# playbooks/linux/ubuntu/run.yml
# Generic Ubuntu role runner — driven by ncs_action, ncs_profile, ncs_operation.
#
# Usage:
#   ansible-playbook playbooks/linux/ubuntu/run.yml -e 'ncs_action=collect'
#   ansible-playbook playbooks/linux/ubuntu/run.yml -e 'ncs_action=audit ncs_profile=stig'
#   ansible-playbook playbooks/linux/ubuntu/run.yml -e 'ncs_action=audit ncs_operation=password_status'

- name: "Ubuntu | {{ ncs_operation | default(ncs_profile | default('collect')) }}"
  hosts: "{{ ubuntu_target_hosts | default('ubuntu_servers') }}"
  gather_facts: false
  pre_tasks:
    - name: Prepare SSH key
      ansible.builtin.include_tasks: _pre_ssh_key.yml
  roles:
    - role: internal.linux.ubuntu
