# >>>
# label: Rotate Password
# options:
#   rotate_user: text = root | Username
#   rotate_password: text | New Password (blank = use vault)
#   rotate_force_change: bool = true | Force Password Change at Login
# <<<
---
# playbooks/linux/ubuntu/password_rotate.yml
# Rotate a local user password on Ubuntu servers using a vault variable.
#
# Usage:
#   ansible-playbook playbooks/linux/ubuntu/password_rotate.yml \
#     -l ubuntu_servers -e 'rotate_user=admin'

- name: "Ubuntu | Rotate Local User Password"
  hosts: "{{ rotate_target | default('ubuntu_servers') }}"
  gather_facts: false
  become: true
  vars:
    rotate_user: root
    rotate_password: "{{ vault_rotate_password }}"
    rotate_force_change: true
    ansible_ssh_timeout: 10

  pre_tasks:
    - name: Validate vault password is set
      ansible.builtin.assert:
        that:
          - rotate_password | default('') | length > 0
        fail_msg: >-
          vault_rotate_password is not set.
          Define it in your Ansible vault or pass via -e.

  roles:
    - role: internal.linux.ubuntu
      vars:
        ncs_action: remediate
        ncs_operation: password_rotate
