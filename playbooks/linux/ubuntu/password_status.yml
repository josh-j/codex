---
# playbooks/ubuntu/password_status.yml
# Report password aging and account status for a local user on Ubuntu servers.
#
# Usage:
#   ansible-playbook playbooks/ubuntu/password_status.yml -l ubuntu_servers
#   ansible-playbook playbooks/ubuntu/password_status.yml -l ubuntu_servers -e 'rotate_user=admin'

- name: "Ubuntu | Password & Account Status"
  hosts: "{{ rotate_target | default('ubuntu_servers') }}"
  gather_facts: false
  become: true
  vars:
    rotate_user: root
    ansible_ssh_timeout: 10

  pre_tasks:
    - name: Prepare SSH key
      ansible.builtin.include_tasks: _pre_ssh_key.yml

  roles:
    - role: internal.linux.ubuntu
      vars:
        ncs_action: audit
        ncs_operation: password_status
        ansible_ssh_private_key_file: "{{ '/tmp/logservers_key' if (vault_logservers_private_key | default('') | trim | length > 0) else omit }}"
