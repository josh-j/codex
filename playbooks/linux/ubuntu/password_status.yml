# >>>
# label: Password Status
# is_read_only: true
# options:
#   rotate_user: text = root | User
# <<<
---
# playbooks/linux/ubuntu/password_status.yml
# Report password aging and account status for a local user on Ubuntu servers.
#
# Usage:
#   ansible-playbook playbooks/linux/ubuntu/password_status.yml -l ubuntu_servers
#   ansible-playbook playbooks/linux/ubuntu/password_status.yml -l ubuntu_servers -e 'rotate_user=admin'

- name: "Ubuntu | Password & Account Status"
  hosts: "{{ rotate_target | default('ubuntu_servers') }}"
  gather_facts: false
  become: true
  vars:
    rotate_user: root
    ansible_ssh_timeout: 10

  roles:
    - role: internal.linux.ubuntu
      vars:
        ncs_action: audit
        ncs_operation: password_status
