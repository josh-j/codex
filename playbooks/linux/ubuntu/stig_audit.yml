---
# playbooks/ubuntu/stig_audit.yml
# Read-only Ubuntu STIG verification collection + compliance report.
- name: "Ubuntu | STIG Verify"
  hosts: "{{ ubuntu_target_hosts | default('ubuntu_servers') }}"
  gather_facts: true
  tags: ["ubuntu", "stig", "audit", "verify", "security"]
  vars:
    ansible_become_password: "{{ vault_ubuntu_server_password }}"

  pre_tasks:
    - name: Prepare SSH key
      ansible.builtin.include_tasks: _pre_ssh_key.yml

  roles:
    - role: internal.linux.ubuntu
      vars:
        ncs_action: audit
        ncs_profile: stig
        ansible_ssh_private_key_file: "{{ '/tmp/logservers_key' if (vault_logservers_private_key | default('') | trim | length > 0) else omit }}"

- name: "Ubuntu | STIG Compliance Report"
  ansible.builtin.import_playbook: stig_verify.yml
