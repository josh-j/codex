# >>>
# options:
#   photon_stig_enable_hardening: bool = false | Enable Hardening
# <<<
---
# playbooks/linux/photon/stig_remediate.yml
# Automated STIG hardening and remediation for VMware Photon OS 3.0.

- name: "Phase 2: Photon STIG Remediation"
  hosts: "{{ photon_target_hosts | default('photon_servers') }}"
  gather_facts: false
  become: true
  tags: ["photon", "remediate", "stig", "security"]
  roles:
    - role: internal.linux.photon
      vars:
        ncs_action: collect
    - role: internal.linux.photon
      vars:
        ncs_action: remediate
        ncs_profile: stig
    - role: internal.linux.photon
      vars:
        ncs_action: verify
        ncs_profile: stig
