---
# playbooks/photon/password_status.yml
# Report password aging and account status for a local user on Photon OS servers.
#
# Usage:
#   ansible-playbook playbooks/photon/password_status.yml -l photon_servers
#   ansible-playbook playbooks/photon/password_status.yml -l photon_servers -e 'rotate_user=root'

- name: "Photon | Password & Account Status"
  hosts: "{{ rotate_target | default('photon_servers') }}"
  gather_facts: false
  become: true
  vars:
    rotate_user: root
    ansible_ssh_timeout: 10

  roles:
    - role: internal.linux.photon
      vars:
        ncs_action: audit
        ncs_operation: password_status
