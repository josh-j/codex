---
# playbooks/site_stig_audit.yml
# Primary orchestrator for the NCS unified STIG compliance audit pipeline.
# This playbook performs a non-mutating security assessment across all
# supported platforms (VMware, Linux, Windows). It collects STIG findings
# as raw telemetry and generates a fleet-wide compliance dashboard.

# Phase 1: Environment Readiness
- name: "Phase 1: Initialize Reporting Environment"
  ansible.builtin.import_playbook: infra/setup_env.yml

# Phase 2: VMware STIG Audit
- name: "Phase 2: VMware Infrastructure STIG Audit"
  ansible.builtin.import_playbook: vmware/stig_audit.yml

# Phase 3: Linux Fleet STIG Audit
- name: "Phase 3: Ubuntu STIG Audit"
  ansible.builtin.import_playbook: ubuntu/stig_audit.yml

- name: "Phase 3b: Photon OS STIG Audit"
  ansible.builtin.import_playbook: photon/stig_audit.yml

# Phase 4: Windows Fleet STIG Audit
- name: "Phase 4: Windows Server STIG Audit"
  ansible.builtin.import_playbook: windows/stig_audit.yml

# Phase 5: Unified Infrastructure Reporting
- name: "Phase 5: Unified Compliance Reporting"
  ansible.builtin.import_playbook: infra/generate_reports.yml
