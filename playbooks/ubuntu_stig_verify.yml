---
# playbooks/ubuntu_stig_verify.yml
# Post-collection STIG compliance report.
# Runs locally after ncs_collector has persisted raw_stig data.
- name: "Ubuntu | STIG Compliance Report"
  hosts: "{{ ubuntu_target_hosts | default('ubuntu_servers') }}"
  gather_facts: false
  connection: local
  tags: ["ubuntu", "stig", "verify", "report"]

  vars:
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
    stig_report_dir: "{{ ncs_report_directory | default('/srv/samba/reports') }}"
    stig_report_platform_dir: "linux/ubuntu"
    stig_report_target_type: "ubuntu"

  tasks:
    - name: "STIG Report | Resolve paths"
      ansible.builtin.set_fact:
        _stig_raw_path: "{{ stig_report_dir }}/platform/{{ stig_report_platform_dir }}/{{ inventory_hostname }}/raw_stig_{{ stig_report_target_type }}.yaml"
        _stig_report_script: "{{ playbook_dir }}/../scripts/stig_report.py"

    - name: "STIG Report | Check for raw STIG data"
      ansible.builtin.stat:
        path: "{{ _stig_raw_path }}"
      register: _stig_raw_stat

    - name: "STIG Report | Generate compliance report"
      ansible.builtin.command:
        cmd: >-
          {{ ansible_playbook_python }}
          {{ _stig_report_script }}
          {{ _stig_raw_path }}
      register: _stig_report_output
      changed_when: false
      when: _stig_raw_stat.stat.exists

    - name: "STIG Report | Display"
      ansible.builtin.debug:
        msg: "{{ _stig_report_output.stdout_lines }}"
      when: _stig_raw_stat.stat.exists

    - name: "STIG Report | No data"
      ansible.builtin.debug:
        msg: "No STIG data found at {{ _stig_raw_path }}. Run an audit or remediation first."
      when: not _stig_raw_stat.stat.exists
