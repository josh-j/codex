---
# playbooks/vm/stig_audit.yml
- name: "Phase 2b | VM STIG Audit (per vCenter)"
  hosts: "{{ vm_stig_target_hosts | default('vcenters') }}"
  connection: local
  gather_facts: false
  tags: ["vmware", "stig", "audit", "vm"]
  vars:
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
  pre_tasks:
    - name: "Discover and validate VM targets"
      ansible.builtin.include_tasks: _discover.yml
  roles:
    - role: internal.vmware.vm
      vars:
        ncs_action: audit
        ncs_profile: stig
