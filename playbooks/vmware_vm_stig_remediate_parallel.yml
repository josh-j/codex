---
# playbooks/vmware_vm_stig_remediate_parallel.yml
# VM STIG Remediation — parallel per-VM execution.
#
# Usage:
#   ansible-playbook playbooks/vmware_vm_stig_remediate_parallel.yml -e 'site=tyfq' -f 20
# ansible-playbook playbooks/vmware_vm_stig_remediate_parallel.yml -e 'site=tyfq' \
# -e 'vm_stig_exclude_pattern=(?i).*(-(ise|wave|vcm)-).*' -f 20
#   ansible-playbook playbooks/vmware_vm_stig_remediate_parallel.yml -e 'site=tyfq' -e '{"vm_stig_target_vms": ["vm-web01"]}' -f 10

- name: "Phase 2b-pre | Discover VMs and build target list"
  hosts: "{{ site }}_vcenters"
  connection: local
  gather_facts: false
  strategy: linear
  tags: ["vmware", "stig", "remediate", "vm"]
  vars:
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
  pre_tasks:
    - name: "Validate site variable is provided"
      ansible.builtin.assert:
        that:
          - site is defined
          - site | length > 0
        fail_msg: "Please specify a site (e.g., -e 'site=tyfq')"

  tasks:
    - name: "Discover all VMs on vCenter"
      community.vmware.vmware_vm_info:
        hostname: "{{ inventory_hostname }}"
        username: "{{ vmware_username }}"
        password: "{{ vmware_password }}"
        validate_certs: "{{ vmware_validate_certs | default(false) | bool }}"
      register: _vcenter_vms
      when: vm_stig_target_vms | default([]) | length == 0

    - name: "Set VM target list from discovery"
      ansible.builtin.set_fact:
        vm_stig_target_vms: >-
          {{ vm_stig_target_vms | default(None) or
             _vcenter_vms.virtual_machines | default([])
             | rejectattr('guest_name', 'match', '^vCLS-')
             | rejectattr('guest_name', 'match', vm_stig_exclude_pattern | default('^$'))
             | map(attribute='guest_name') | list }}
      when: vm_stig_target_vms | default([]) | length == 0

    - name: "Build VM-to-datacenter map"
      ansible.builtin.set_fact:
        vm_datacenter_map: >-
          {{ dict(
             _vcenter_vms.virtual_machines | default([])
             | rejectattr('guest_name', 'match', '^vCLS-')
             | rejectattr('guest_name', 'match', vm_stig_exclude_pattern | default('^$'))
             | map(attribute='guest_name')
             | zip(
                 _vcenter_vms.virtual_machines | default([])
                 | rejectattr('guest_name', 'match', '^vCLS-')
                 | rejectattr('guest_name', 'match', vm_stig_exclude_pattern | default('^$'))
                 | map(attribute='datacenter')
               )
          ) }}
      when:
        - vm_datacenter_map is not defined
        - _vcenter_vms.virtual_machines is defined

    - name: "Display target summary"
      ansible.builtin.debug:
        msg: >-
          Discovered {{ vm_stig_target_vms | length }} VMs on {{ inventory_hostname }}.
          Exclude pattern: {{ vm_stig_exclude_pattern | default('none') }}.

    - name: "Register dynamic VM host group"
      ansible.builtin.add_host:
        name: "{{ item }}"
        groups: _stig_vm_targets
        vcenter: "{{ inventory_hostname }}"
        site: "{{ site }}"
        vm_datacenter: "{{ vm_datacenter_map[item] | default('') }}"
        vmware_username: "{{ vmware_username }}"
        vmware_password: "{{ vmware_password }}"
        vmware_validate_certs: "{{ vmware_validate_certs | default(false) }}"
      loop: "{{ vm_stig_target_vms | reject('match', '^vCLS-') | list }}"
      changed_when: false

    - name: "Validate VM target list"
      ansible.builtin.assert:
        that:
          - vm_stig_target_vms | default([]) | length > 0
        fail_msg: "No VMs discovered on {{ inventory_hostname }}. Check vCenter connectivity or set vm_stig_target_vms explicitly."

- name: "Phase 2b | VM STIG Hardening (parallel per VM)"
  hosts: _stig_vm_targets
  connection: local
  gather_facts: false
  strategy: free
  tags: ["vmware", "stig", "remediate", "vm"]
  vars:
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
    _current_vm_name: "{{ inventory_hostname }}"
    _vcenter_hostname: "{{ vcenter }}"
    _current_vm_datacenter: "{{ vm_datacenter | default(omit) }}"
    vm_datacenter_map: "{{ { inventory_hostname: vm_datacenter | default('') } }}"
    vm_stig_target_vms:
      - "{{ inventory_hostname }}"
  roles:
    - role: internal.vmware.common
    - role: internal.vmware.vm
      vars:
        vmware_stig_enable_hardening: true

- name: "Phase 2b-post | Post-Remediation VM STIG Audit (parallel per VM)"
  hosts: _stig_vm_targets
  connection: local
  gather_facts: false
  strategy: free
  tags: ["vmware", "stig", "audit", "vm"]
  vars:
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
    _current_vm_name: "{{ inventory_hostname }}"
    _vcenter_hostname: "{{ vcenter }}"
    _current_vm_datacenter: "{{ vm_datacenter | default(omit) }}"
    vm_datacenter_map: "{{ { inventory_hostname: vm_datacenter | default('') } }}"
    vm_stig_target_vms:
      - "{{ inventory_hostname }}"
  roles:
    - role: internal.vmware.common
    - role: internal.vmware.vm
      vars:
        vmware_stig_enable_hardening: false
