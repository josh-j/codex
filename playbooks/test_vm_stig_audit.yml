---
# playbooks/test_vm_stig_audit.yml
# Lab VM STIG audit against vCenter at 192.168.2.120
#
# Usage:
#   .venv/bin/ansible-playbook playbooks/test_vm_stig_audit.yml \
#     -i playbooks/test_vm_inventory.yml

- name: "Lab VM STIG Audit"
  hosts: esxi_standalone
  connection: local
  gather_facts: false
  tags: ["vmware", "stig", "audit", "vm"]
  vars:
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
    vmware_stig_enable_hardening: false
  pre_tasks:
    - name: "Set vCenter hostname (ESXi standalone)"
      ansible.builtin.set_fact:
        _vcenter_hostname: "{{ vmware_hostname }}"
      changed_when: false
      no_log: true

    - name: "Discover all VMs on ESXi"
      community.vmware.vmware_vm_info:
        hostname: "{{ vmware_hostname }}"
        username: "{{ vmware_username }}"
        password: "{{ vmware_password }}"
        validate_certs: "{{ vmware_validate_certs | default(false) | bool }}"
      register: _vcenter_vms
      when: vm_stig_target_vms | default([]) | length == 0

    - name: "Set VM target list from discovery"
      ansible.builtin.set_fact:
        vm_stig_target_vms: >-
          {{ vm_stig_target_vms | default(None) or
             _vcenter_vms.virtual_machines | default([])
             | rejectattr('guest_name', 'match', '^vCLS-')
             | map(attribute='guest_name') | list }}
      when: vm_stig_target_vms | default([]) | length == 0

    - name: "Build VM-to-datacenter map"
      ansible.builtin.set_fact:
        vm_datacenter_map: >-
          {{ dict(
             _vcenter_vms.virtual_machines | default([])
             | rejectattr('guest_name', 'match', '^vCLS-')
             | map(attribute='guest_name')
             | zip(
                 _vcenter_vms.virtual_machines | default([])
                 | rejectattr('guest_name', 'match', '^vCLS-')
                 | map(attribute='datacenter')
               )
          ) }}
      when:
        - vm_datacenter_map is not defined
        - _vcenter_vms.virtual_machines is defined

    - name: "Show discovered targets"
      ansible.builtin.debug:
        msg: "Targets: {{ vm_stig_target_vms | default([]) }}"

    - name: "Validate VM target list"
      ansible.builtin.assert:
        that:
          - vm_stig_target_vms | default([]) | length > 0
        fail_msg: "No VMs discovered or provided."

  roles:
    - role: internal.vmware.vm
      vars:
        vmware_stig_enable_hardening: false
