[defaults]
inventory = inventory/production/
collections_path = collections:~/.ansible/collections:/usr/share/ansible/collections
# Vault key list. `default@.vaultpass` keeps back-compat with anything
# previously encrypted without a vault-id label (Ansible treats those
# as label "default"). To silo per workcenter, append entries like
# `, alpha@/etc/ansible/vaults/alpha.pass, bravo@/etc/ansible/vaults/bravo.pass`.
# Per-workcenter group_vars/workcenter_<name>/vault.yaml is then
# encrypted under its matching label and stays opaque to operators
# who can only read their own .pass file. See docs/VAULT_LABELED_GROUPS.md.
vault_identity_list = default@.vaultpass
host_key_checking = False
timeout = 30
callbacks_enabled = internal.core.ncs_collector

[ssh_connection]
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o PreferredAuthentications=publickey,password
control_path_dir = /tmp/.ansible-cp
retries = 2

[privilege_escalation]
become = True
become_method = sudo
