---
# Shared variables applied to all hosts.

# Repository root — derived from inventory location (always loaded).
ncs_repo_root: "{{ inventory_dir | dirname | dirname }}"

# --- NCS Platform Config ---
ncs_config:
  debug_mode: true
  dry_run_mode: false
  report_directory: /srv/samba/reports
  logging:
    export_to_file: true
    file_path: "/var/log/ncs/ncs.log"
    max_size_mb: 100
    backup_count: 5

# Uncomment and set values for your environment.

# --- DNS / NTP / Domain ---
# ntp_servers:
#   - 0.mil.pool.ntp.org
#   - 1.mil.pool.ntp.org
# dns_servers:
#   - 10.0.0.53
#   - 10.0.0.54
# domain: yourdomain.mil

# --- Logging ---
# syslog_host: syslog.yourdomain.mil

# --- Reporting ---
report_directory: /opt/ncs-framework/reports

# --- SMTP alert email configuration (used by playbooks/core/send_alert_email.yml) ---
# ncs_smtp_host: smtp.example.com
# ncs_smtp_port: 587
# ncs_smtp_username: alerts@example.com
# ncs_smtp_password: "{{ vault_smtp_password }}"
# ncs_smtp_secure: starttls
# ncs_alert_email_from: ncs-alerts@example.com
# ncs_alert_email_to: ops-team@example.com
