---
# Cisco ISE deployment-level vars. ise_pan_hostname / ise_mnt_hostname are
# per-host — set them alongside ansible_host under each entry in
# inventory/production/ise_servers.yaml. Use one anchor host per deployment
# (the primary PAN), with both hostnames pointing at the right node persona:
#   - ise_pan_hostname → primary PAN  (ERS + OpenAPI)
#   - ise_mnt_hostname → any MnT node (/admin/API/mnt/...)
ise_username: "{{ vault_ise_username }}"
ise_password: "{{ vault_ise_password }}"
ise_verify: false
# cisco.ise SDK accepts: 3.1.0, 3.1.1, 3.1_Patch_1, 3.2_beta, 3.3_patch_1, 3.5.0.
# Override per-host if your appliances run different patch levels.
ise_version: "3.3_patch_1"
