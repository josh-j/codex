---
# playbooks/core/generate_reports.yml
# Invokes ncs-reporter to render HTML dashboards, STIG reports, and CKLB
# artifacts from raw audit data collected by ncs_collector.

- name: "Reporting Phase | Unified Fleet Report Generation"
  hosts: localhost
  connection: local
  gather_facts: false
  become: false
  vars:
    _reports_root: "{{ ncs_config.report_directory | default('/srv/samba/reports') }}"
    _platform_root: "{{ _reports_root }}/platform"
    _config_dir: "{{ playbook_dir }}/../../ncs_configs"

    report_stamp: "{{ now(utc=true, fmt='%Y%m%d') }}"

  tasks:
    - name: Ensure platform root exists
      # No mode/owner — the dir is typically pre-created by the samba
      # setup play and owned by the samba user, so chmod-from-here
      # would EPERM. We only need to assert existence; if it's missing,
      # ansible creates it with the running user's umask.
      ansible.builtin.file:
        path: "{{ _platform_root }}"
        state: directory
      ignore_errors: true

    - name: Run Unified Reporting Engine (ncs-reporter all)
      block:
        - name: Execute NCS reporter CLI
          ansible.builtin.command:
            cmd: >-
              ncs-reporter all
              --bundle-root "{{ _platform_root }}"
              --reports-root "{{ _reports_root }}"
              --report-stamp "{{ report_stamp }}"
              --config-dir "{{ _config_dir }}"
          register: _reporter_result
          changed_when: _reporter_result.rc == 0

      rescue:
        - name: Handle report generation failure
          ansible.builtin.debug:
            msg: >-
              ncs-reporter exited {{ _reporter_result.rc | default('unknown') }}.
              stderr: {{ _reporter_result.stderr | default('') }}
