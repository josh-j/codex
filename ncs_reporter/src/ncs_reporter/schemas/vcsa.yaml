name: vcenter
display_name: "VMware VCSA"
platform:
  name: vmware
  input_dir: vmware/vcenter
  report_dir: vmware/vcenter
  target_types: [vcenter, vami, eam, lookup_svc, perfcharts, vcsa_photon_os, postgresql, rhttpproxy, sts, ui]
  state_file: vmware_fleet_state.yaml
  display_name: VMware
  asset_label: vCenters
  inventory_groups: [vcenters]
  stig_skeleton_map:
    vcsa: cklb_skeleton_vsphere7_vcsa_V1R3.json
    vcenter: cklb_skeleton_vsphere7_vcsa_V1R3.json
    vami: cklb_skeleton_vsphere7_vami_V1R2.json
    eam: cklb_skeleton_vsphere7_vca_eam_V1R2.json
    lookup_svc: cklb_skeleton_vsphere7_vca_lookup_svc_V1R2.json
    perfcharts: cklb_skeleton_vsphere7_vca_perfcharts_V1R1.json
    vcsa_photon_os: cklb_skeleton_vsphere7_vca_photon_os_V1R4.json
    postgresql: cklb_skeleton_vsphere7_vca_postgresql_V1R2.json
    rhttpproxy: cklb_skeleton_vsphere7_vca_rhttpproxy_V1R1.json
    sts: cklb_skeleton_vsphere7_vca_sts_V1R2.json
    ui: cklb_skeleton_vsphere7_vca_ui_V1R2.json
  stig_rule_prefixes:
    VMCH: vm
    ESXI: esxi
    VC: vcsa
    PH: photon
  site_category: VMware
  sub_entries:
    - input_dir: vmware/vcenter/vcsa
      report_dir: vmware/vcenter/vcsa
      state_file: vcsa_fleet_state.yaml
      target_types: [vcsa]
      stig_skeleton_map:
        vcsa: cklb_skeleton_vsphere7_vcsa_V1R3.json
    - input_dir: vmware/esxi
      report_dir: vmware/esxi
      state_file: esxi_fleet_state.yaml
      target_types: [esxi]
      stig_skeleton_map:
        esxi: cklb_skeleton_vsphere7_esxi_V1R4.json
    - input_dir: vmware/vm
      report_dir: vmware/vm
      state_file: vm_fleet_state.yaml
      target_types: [vm]
      stig_skeleton_map:
        vm: cklb_skeleton_vsphere7_vms_V1R4.json

# Detects the key emitted by the internal.vmware.vcsa role via set_stats.
# Alternative raw keys (raw_vcenter, vcenter) require their own schema variant
# because the top-level key is part of every field path below.
detection:
  keys_any: [vmware_raw_vcenter]

# Paths starting with '.' are relative to path_prefix.
path_prefix: "vmware_raw_vcenter.data"

fleet_columns:
  - { label: "Version", field: appliance_version, width: "120px" }
  - { label: "Clusters", field: cluster_count, width: "80px" }
  - { label: "ESXi Hosts", field: esxi_host_count, width: "80px" }
  - { label: "VMs", field: vm_count, width: "80px" }

# ---------------------------------------------------------------------------
# Fields
#
# Paths traverse:  vmware_raw_vcenter → data → <module result key> → ...
# ---------------------------------------------------------------------------

fields:
  # --- Appliance ---

  appliance_version:
    path: ".appliance_health_info.appliance.summary.version"
    fallback: "unknown"

  appliance_build:
    path: ".appliance_health_info.appliance.summary.build_number"
    fallback: "unknown"

  # String; one of green / yellow / red / gray.
  # Used for display only — threshold alerting on strings is not supported.
  appliance_health_overall:
    path: ".appliance_health_info.appliance.summary.health.overall"
    fallback: "gray"

  appliance_health_cpu:
    path: ".appliance_health_info.appliance.summary.health.cpu"
    fallback: "gray"

  appliance_health_memory:
    path: ".appliance_health_info.appliance.summary.health.memory"
    fallback: "gray"

  appliance_health_database:
    path: ".appliance_health_info.appliance.summary.health.database"
    fallback: "gray"

  appliance_health_storage:
    path: ".appliance_health_info.appliance.summary.health.storage"
    fallback: "gray"

  appliance_uptime_seconds:
    path: ".appliance_health_info.appliance.summary.uptime"
    type: float

  appliance_uptime_days:
    compute: "{appliance_uptime_seconds} / 86400"
    type: float

  # bool; True == 1.0 for threshold comparison
  ssh_enabled:
    path: ".appliance_health_info.appliance.access.ssh"
    type: bool

  shell_enabled:
    path: ".appliance_health_info.appliance.access.shell.enabled"
    type: bool

  ntp_mode:
    path: ".appliance_health_info.appliance.time.time_sync.mode"
    fallback: "unknown"

  ntp_servers:
    path: ".appliance_health_info.appliance.time.time_sync.servers"
    type: list

  # --- Backup ---

  backup_schedules:
    path: ".appliance_backup_info.schedules"
    type: list

  backup_schedule_count:
    path: ".appliance_backup_info.schedules | len_if_list"
    type: int

  # --- Infrastructure inventory ---

  datacenters:
    path: ".datacenters_info.datacenter_info"
    type: list

  datacenter_count:
    path: ".datacenters_info.datacenter_info | len_if_list"
    type: int

  # Raw Ansible loop results from cluster_info — consumed by count_clusters_and_hosts.py
  clusters_info_results:
    path: ".clusters_info.results"
    type: list

  cluster_count:
    script: "count_clusters_and_hosts.py"
    script_args:
      metric: cluster_count
    type: int

  esxi_host_count:
    script: "count_clusters_and_hosts.py"
    script_args:
      metric: esxi_host_count
    type: int

  datastores_raw:
    path: ".datastores_info.datastores"
    type: list

  # Replaces normalize_datastores.py — list_map computes capacity_gb/free_gb/used_pct.
  datastores:
    path: ".datastores_info.datastores"
    type: list
    list_map:
      capacity_gb: "{capacity} / 1073741824"
      free_gb: "{freeSpace} / 1073741824"
      used_pct: "({capacity} - {freeSpace}) / {capacity} * 100"

  datastore_count:
    path: ".datastores_info.datastores | len_if_list"
    type: int

  vms_info_raw:
    path: ".vms_info"
    type: dict

  infra_patterns:
    path: ".config.infrastructure_vm_patterns"
    type: list

  virtual_machines:
    script: "get_vms_list.py"
    script_args:
      exclude_patterns: "{infra_patterns}"
    type: list

  vm_count:
    path: ".vms_info.virtual_machines | len_if_list"
    type: int

  clusters:
    script: "get_clusters_list.py"
    type: list

  snapshots_raw:
    path: ".snapshots_info.snapshots"
    type: list

  snapshots:
    script: "normalize_snapshots.py"
    script_args:
      mode: list
      age_days: 7
    type: list

  snapshot_count:
    path: ".snapshots_info.snapshots | len_if_list"
    type: int

  # ISO timestamp of the collection run — passed to the snapshot age script as the
  # reference time so that age is calculated against collection time, not report time.
  collected_at: "vmware_raw_vcenter.metadata.timestamp"

  # Count of snapshots older than age_days.
  aged_snapshot_count:
    script: "normalize_snapshots.py"
    script_args:
      mode: count
      age_days: 7
    type: int

  # Derived field for mutually exclusive info alert
  recent_snapshot_count:
    compute: "{snapshot_count} - {aged_snapshot_count}"
    type: int

  # --- Alarms ---
  # Raw triggered alarms from internal.vmware.vmware_triggered_alarms_info.
  # Each item: {alarm_name, entity, severity (lowercase), status, time, description}

  active_alarms:
    path: ".alarms_info.alarms"
    type: list

  # Replaces normalize_vcenter_alarms.py — count_where provides inline aggregation.
  active_critical_alarm_count:
    path: ".alarms_info.alarms"
    type: int
    count_where:
      severity: "critical"

  active_warning_alarm_count:
    path: ".alarms_info.alarms"
    type: int
    count_where:
      severity: "warning"

  alarm_count:
    path: ".alarms_info.alarms | len_if_list"
    type: int

  # --- Derived counts ---

  powered_off_vm_count:
    path: ".vms_info.virtual_machines"
    type: int
    count_where:
      power_state: "poweredOff"

  # Cluster HA/DRS disabled counts (computed from clusters list)
  cluster_ha_disabled_count:
    script: "count_clusters_and_hosts.py"
    script_args:
      metric: cluster_ha_disabled_count
    type: int

  cluster_drs_disabled_count:
    script: "count_clusters_and_hosts.py"
    script_args:
      metric: cluster_drs_disabled_count
    type: int

  # Total allocated vCPU and memory across all VMs
  total_allocated_vcpu:
    script: "count_clusters_and_hosts.py"
    script_args:
      metric: total_cpu_capacity
    type: int

  total_allocated_mem_mb:
    script: "count_clusters_and_hosts.py"
    script_args:
      metric: total_mem_capacity
    type: int

  total_used_cpu_pct:
    script: "count_clusters_and_hosts.py"
    script_args:
      metric: total_cpu_used_pct
    type: float

  total_used_mem_pct:
    script: "count_clusters_and_hosts.py"
    script_args:
      metric: total_mem_used_pct
    type: float

# ---------------------------------------------------------------------------
# Alerts
# ---------------------------------------------------------------------------

alerts:
  # ---- Appliance health (string comparison) ----

  - id: appliance_health_red
    category: "Appliance Health"
    severity: CRITICAL
    condition:
      op: eq_str
      field: appliance_health_overall
      value: "red"
    message: "VCSA component failure: overall health is RED"

  - id: appliance_health_yellow
    category: "Appliance Health"
    severity: WARNING
    suppress_if: appliance_health_red
    condition:
      op: eq_str
      field: appliance_health_overall
      value: "yellow"
    message: "VCSA degraded: overall health is YELLOW"

  - id: appliance_health_gray
    category: "Data Quality"
    severity: WARNING
    suppress_if: [appliance_health_red, appliance_health_yellow]
    condition:
      op: eq_str
      field: appliance_health_overall
      value: "gray"
    message: "VCSA health unknown: overall health is GRAY — check permissions and API availability"

  # ---- Infrastructure ----

  - id: no_datacenters
    category: "Infrastructure"
    severity: CRITICAL
    condition:
      op: lte
      field: datacenter_count
      threshold: 0
    message: "Inventory gap: no datacenters detected in vCenter"

  - id: no_esxi_hosts
    category: "Infrastructure"
    severity: CRITICAL
    condition:
      op: lte
      field: esxi_host_count
      threshold: 0
    message: "Inventory gap: no ESXi hosts detected in vCenter"

  # ---- Cluster availability ----

  - id: cluster_ha_disabled
    category: "Cluster Availability"
    severity: WARNING
    condition:
      op: gt
      field: cluster_ha_disabled_count
      threshold: 0
    message: "{cluster_ha_disabled_count} cluster(s) have HA disabled — reduced fault tolerance"

  - id: cluster_drs_disabled
    category: "Cluster Availability"
    severity: INFO
    condition:
      op: gt
      field: cluster_drs_disabled_count
      threshold: 0
    message: "{cluster_drs_disabled_count} cluster(s) have DRS disabled — no automatic load balancing"

  # ---- Cluster resource utilization ----

  - id: cluster_cpu_critical
    category: "Cluster Resources"
    severity: CRITICAL
    condition:
      op: computed_filter
      field: clusters
      expression: "{cpu_usage_pct}"
      cmp: gte
      threshold: 90.0
    message: "One or more clusters have critically high CPU utilization (≥90%)"

  - id: cluster_cpu_warning
    category: "Cluster Resources"
    severity: WARNING
    suppress_if: cluster_cpu_critical
    condition:
      op: computed_filter
      field: clusters
      expression: "{cpu_usage_pct}"
      cmp: gte
      threshold: 80.0
    message: "One or more clusters have elevated CPU utilization (≥80%)"

  - id: cluster_mem_critical
    category: "Cluster Resources"
    severity: CRITICAL
    condition:
      op: computed_filter
      field: clusters
      expression: "{mem_usage_pct}"
      cmp: gte
      threshold: 90.0
    message: "One or more clusters have critically high memory utilization (≥90%)"

  - id: cluster_mem_warning
    category: "Cluster Resources"
    severity: WARNING
    suppress_if: cluster_mem_critical
    condition:
      op: computed_filter
      field: clusters
      expression: "{mem_usage_pct}"
      cmp: gte
      threshold: 80.0
    message: "One or more clusters have elevated memory utilization (≥80%)"

  # ---- Appliance security ----

  # ssh_enabled is bool; float(True) == 1.0
  - id: ssh_enabled
    category: "Security"
    severity: WARNING
    condition:
      op: eq
      field: ssh_enabled
      threshold: 1.0
    message: "Hardening violation: SSH is enabled on VCSA"

  - id: shell_enabled
    category: "Security"
    severity: WARNING
    condition:
      op: eq
      field: shell_enabled
      threshold: 1.0
    message: "Hardening violation: interactive shell is enabled on VCSA"

  # ---- NTP ----

  - id: ntp_disabled
    category: "Time Synchronization"
    severity: WARNING
    condition:
      op: not_in_str
      field: ntp_mode
      values: ["NTP", "HOST"]
    message: "Time sync misconfigured: NTP mode is '{ntp_mode}' — clock drift may affect logs and certificates"

  # ---- Appliance uptime ----

  - id: appliance_uptime_excessive
    category: "Appliance Lifecycle"
    severity: WARNING
    condition:
      op: gte
      field: appliance_uptime_days
      threshold: 90.0
    message: "VCSA has not been rebooted in {appliance_uptime_days:.0f} days — may be missing patches"

  - id: appliance_uptime_recent_reboot
    category: "Appliance Lifecycle"
    severity: INFO
    suppress_if: appliance_uptime_excessive
    condition:
      op: lt
      field: appliance_uptime_days
      threshold: 1.0
    message: "VCSA was rebooted less than 24 hours ago — verify this was planned"

  # ---- Powered-off VMs ----

  - id: powered_off_vms
    category: "Workload Inventory"
    severity: INFO
    condition:
      op: gt
      field: powered_off_vm_count
      threshold: 0
    message: "{powered_off_vm_count} powered-off VM(s) detected — review for cleanup or licensing"

  # ---- Datastore over-provisioning ----

  - id: datastore_overprovisioned
    category: "Storage Capacity"
    severity: INFO
    condition:
      op: computed_filter
      field: datastores_raw
      expression: "{provisioned} / {capacity} * 100"
      cmp: gte
      threshold: 200.0
    message: "One or more datastores are thin-provisioned beyond 2x capacity — monitor for space contention"

  # ---- Backup ----

  - id: no_backup_schedule
    category: "Data Protection"
    severity: CRITICAL
    condition:
      op: lte
      field: backup_schedule_count
      threshold: 0
    message: "DR risk: no file-based backup schedule configured on VCSA"

  # Fires when any schedule exists but is disabled
  - id: backup_schedule_disabled
    category: "Data Protection"
    severity: CRITICAL
    condition:
      op: filter_count
      field: backup_schedules
      filter_field: enabled
      filter_value: false
      threshold: 0
    message: "DR risk: a configured backup schedule is DISABLED on VCSA"

  # ---- Storage capacity (computed free % per datastore) ----

  - id: datastore_critical_space
    category: "Storage Capacity"
    severity: CRITICAL
    condition:
      op: computed_filter
      field: datastores_raw
      expression: "{freeSpace} / {capacity} * 100"
      cmp: lte
      threshold: 10.0
    message: "One or more datastores have critically low free space (≤10%)"
    affected_items_field: datastores_raw

  - id: datastore_warning_space
    category: "Storage Capacity"
    severity: WARNING
    suppress_if: datastore_critical_space
    condition:
      op: computed_filter
      field: datastores_raw
      expression: "{freeSpace} / {capacity} * 100"
      cmp: lte
      threshold: 15.0
    message: "One or more datastores have low free space (≤15%)"
    affected_items_field: datastores_raw

  # ---- Storage connectivity ----

  - id: datastore_inaccessible
    category: "Storage Connectivity"
    severity: CRITICAL
    condition:
      op: filter_count
      field: datastores_raw
      filter_field: accessible
      filter_value: false
      threshold: 0
    message: "One or more datastores are INACCESSIBLE"
    affected_items_field: datastores_raw

  # ---- Active vCenter alarms ----

  - id: active_critical_alarms
    category: "vCenter Alarms"
    severity: CRITICAL
    condition:
      op: gt
      field: active_critical_alarm_count
      threshold: 0
    message: "Active CRITICAL alarms detected in vCenter ({alarm_count} total triggered)"
    affected_items_field: active_alarms

  - id: active_warning_alarms
    category: "vCenter Alarms"
    severity: WARNING
    suppress_if: active_critical_alarms
    condition:
      op: gt
      field: active_warning_alarm_count
      threshold: 0
    message: "Active WARNING alarms detected in vCenter ({alarm_count} total triggered)"
    affected_items_field: active_alarms

  # ---- VM tools compliance (multi-field AND filter) ----

  - id: vm_tools_not_running
    category: "Workload Compliance"
    severity: WARNING
    condition:
      op: filter_multi
      field: virtual_machines
      filters:
        - { filter_field: power_state, filter_value: "poweredOn" }
        - { filter_field: tools_status, filter_value: "toolsNotRunning" }
      threshold: 0
    message: "Powered-on VMs detected with VMware Tools not running"
    affected_items_field: virtual_machines

  - id: vm_tools_not_installed
    category: "Workload Compliance"
    severity: WARNING
    condition:
      op: filter_multi
      field: virtual_machines
      filters:
        - { filter_field: power_state, filter_value: "poweredOn" }
        - { filter_field: tools_status, filter_value: "toolsNotInstalled" }
      threshold: 0
    message: "Powered-on VMs detected with VMware Tools not installed"
    affected_items_field: virtual_machines

  # ---- Snapshots ----

  - id: snapshots_present
    category: "Snapshots"
    severity: INFO
    condition:
      op: gt
      field: recent_snapshot_count
      threshold: 0
    message: "VM snapshots present: {snapshot_count} snapshot(s) found"

  - id: aged_snapshots
    category: "Snapshots"
    severity: WARNING
    condition:
      op: gt
      field: aged_snapshot_count
      threshold: 0
    message: "{aged_snapshot_count} snapshot(s) older than 7 days — review for removal"

# ---------------------------------------------------------------------------
# Sections (template rendering)
# ---------------------------------------------------------------------------

widgets:
  - id: alerts
    title: "Active Alerts"
    type: alert_panel

  - id: active_alarms
    title: "Active vCenter Alarms"
    type: table
    rows_field: active_alarms
    columns:
      - { label: "Alarm", field: alarm_name }
      - { label: "Entity", field: entity }
      - { label: "Severity", field: severity, badge: true }
      - { label: "Time", field: time }
      - { label: "Description", field: description }

  - id: inventory_kpis
    title: "Inventory KPIs"
    type: stat_cards
    layout: { width: "full" }
    cards:
      - { field: datacenter_count, label: "Datacenters" }
      - { field: cluster_count, label: "Clusters" }
      - { field: esxi_host_count, label: "ESXi Hosts" }
      - { field: vm_count, label: "VMs" }
      - { field: datastore_count, label: "Datastores" }
      - { field: snapshot_count, label: "Snapshots", thresholds: { 1: yellow, 10: red } }
      - { field: alarm_count, label: "Alarms", thresholds: { 1: yellow, 5: red } }
      - { field: powered_off_vm_count, label: "Powered Off", thresholds: { 1: yellow, 5: red } }

  - id: appliance_overview
    title: "Appliance Overview"
    type: key_value
    layout: { width: "half" }
    fields:
      - { label: "Version", field: appliance_version }
      - { label: "Build", field: appliance_build }
      - { label: "Health Overall", field: appliance_health_overall, badge: true }
      - { label: "Health CPU", field: appliance_health_cpu, badge: true }
      - { label: "Health Memory", field: appliance_health_memory, badge: true }
      - { label: "Health DB", field: appliance_health_database, badge: true }
      - { label: "Health Storage", field: appliance_health_storage, badge: true }
      - { label: "Uptime (days)", field: appliance_uptime_days }
      - { label: "SSH Enabled", field: ssh_enabled, badge: true }
      - { label: "NTP Mode", field: ntp_mode }

  - id: ds_capacity
    title: "Datastore Capacity"
    type: bar_chart
    layout: { width: "half" }
    rows_field: datastores
    label_field: name
    value_field: used_pct
    max: 100
    thresholds: { 75: yellow, 90: red }

  - id: datastores
    title: "Datastores"
    type: table
    rows_field: datastores
    columns:
      - { label: "Name", field: name }
      - { label: "Type", field: type }
      - { label: "Capacity (GB)", field: capacity_gb }
      - { label: "Free (GB)", field: free_gb }
      - label: "Used %"
        field: used_pct
        style_rules:
          - condition: { op: gt, field: used_pct, threshold: 90 }
            css_class: "sv-critical"
          - condition: { op: gt, field: used_pct, threshold: 75 }
            css_class: "sv-warning"
      - label: "Accessible"
        field: accessible
        badge: true
        style_rules:
          - condition: { op: eq, field: accessible, threshold: 0.0 }
            css_class: "sv-critical"
      - { label: "Maintenance", field: maintenanceMode }

  - id: clusters
    title: "Clusters"
    type: table
    rows_field: clusters
    columns:
      - { label: "Name", field: name }
      - { label: "Datacenter", field: datacenter }
      - { label: "DRS", field: drs_enabled, badge: true }
      - { label: "HA", field: ha_enabled, badge: true }
      - { label: "Hosts", field: host_count }
      - label: "CPU %"
        field: cpu_usage_pct
        style_rules:
          - condition: { op: gt, field: cpu_usage_pct, threshold: 85 }
            css_class: "sv-critical"
      - label: "Mem %"
        field: mem_usage_pct
        style_rules:
          - condition: { op: gt, field: mem_usage_pct, threshold: 85 }
            css_class: "sv-critical"

  - id: cluster_cpu
    title: "Cluster CPU Utilization"
    type: bar_chart
    rows_field: clusters
    label_field: name
    value_field: cpu_usage_pct
    max: 100
    thresholds: { 80: yellow, 90: red }

  - id: cluster_mem
    title: "Cluster Memory Utilization"
    type: bar_chart
    rows_field: clusters
    label_field: name
    value_field: mem_usage_pct
    max: 100
    thresholds: { 80: yellow, 90: red }

  - id: backup_schedules_tbl
    title: "Backup Schedules"
    type: table
    visible_if: { op: gt, field: backup_schedule_count, threshold: 0 }
    rows_field: backup_schedules
    columns:
      - { label: "Name", field: name }
      - label: "Enabled"
        field: enabled
        badge: true
        style_rules:
          - condition: { op: eq, field: enabled, threshold: 0.0 }
            css_class: "sv-critical"
      - { label: "Location", field: location }
      - { label: "Retain Count", field: retain_count }

  - id: virtual_machines
    title: "Virtual Machines"
    type: grouped_table
    rows_field: virtual_machines
    group_by: cluster
    columns:
      - { label: "Name", field: guest_name, link_field: guest_name }
      - label: "Power State"
        field: power_state
        badge: true
        style_rules:
          - condition: { op: eq_str, field: power_state, value: "poweredOff" }
            css_class: "subtle-text"
      - { label: "Tools Status", field: tools_status, badge: true }
      - { label: "Cluster", field: cluster }
      - { label: "IP Address", field: ip_address }
      - { label: "Memory (MB)", field: "allocated.memory" }
      - { label: "vCPU", field: "allocated.cpu" }
      - { label: "Owner Email", field: owner_email }
      - { label: "Last Backup", field: backup_info }

