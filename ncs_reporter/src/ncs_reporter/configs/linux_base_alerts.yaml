# Shared Linux alerts — included by linux.yaml, photon.yaml, etc.

- id: memory_critical
  category: "Capacity"
  severity: CRITICAL
  condition:
    op: gte
    field: memory_used_pct
    threshold: 98.0
  message: "Memory saturation: {memory_used_pct:.1f}% used"

- id: memory_warning
  category: "Capacity"
  severity: WARNING
  suppress_if: memory_critical
  condition:
    op: range
    field: memory_used_pct
    min: 85.0
    max: 98.0
  message: "Memory pressure: {memory_used_pct:.1f}% used"

- id: disk_critical
  category: "Capacity"
  severity: CRITICAL
  condition:
    op: computed_filter
    field: disks
    expression: "{used_pct}"
    cmp: gte
    threshold: 95.0
  message: "One or more filesystems critically full (≥95%)"
  affected_items_field: disks

- id: disk_warning
  category: "Capacity"
  severity: WARNING
  suppress_if: disk_critical
  condition:
    op: computed_filter
    field: disks
    expression: "{used_pct}"
    cmp: range
    min: 80.0
    max: 95.0
  message: "One or more filesystems reaching capacity (≥80%)"
  affected_items_field: disks

- id: services_failed
  category: "Availability"
  severity: CRITICAL
  condition:
    op: gt
    field: failed_services_count
    threshold: 0
  message: "{failed_services_count} systemd service(s) failed"

- id: reboot_pending
  category: "Patching"
  severity: WARNING
  condition:
    op: eq
    field: reboot_pending
    threshold: 1.0
  message: "System requires a reboot to apply kernel or security updates"

- id: pending_updates
  category: "Patching"
  severity: WARNING
  condition:
    op: gt
    field: pending_updates_count
    threshold: 0
  message: "{pending_updates_count} package update(s) pending"

- id: uptime_violation
  category: "Maintenance"
  severity: WARNING
  condition:
    op: gt
    field: uptime_days
    threshold: 180.0
  message: "Uptime policy violation: server has not rebooted in over 6 months ({uptime_days:.0f} days)"

- id: world_writable_files
  category: "Security"
  severity: WARNING
  condition:
    op: gt
    field: world_writable_count
    threshold: 0
  message: "{world_writable_count} world-writable file(s) detected"
  affected_items_field: world_writable_files
