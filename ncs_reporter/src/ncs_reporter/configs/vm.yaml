display_name: "VMware VM"
platform: vmware/vm
stig_playbook: "playbooks/vm/stig_remediate.yml"
stig_target_var: "vm_stig_target_vms"
stig_checklist_map:
  vm: cklb_skeletons/cklb_skeleton_vsphere7_vms_V1R4.json


fleet_columns:
  - "VMs: vm_count"
  - "Snapshots: snapshot_count"
  - "Powered Off: powered_off_vm_count"

# ---------------------------------------------------------------------------
# Fields
# ---------------------------------------------------------------------------

fields:
  datacenters: ".datacenters_info.datacenter_info | list"
  vms_info_raw: ".vms_info | dict"
  infra_patterns: ".config.infrastructure_vm_patterns | list"

  virtual_machines:
    script: "get_vms_list.py"
    script_args:
      exclude_patterns: "{infra_patterns}"
    type: list

  vm_count: ".vms_info.virtual_machines | len_if_list | int"
  snapshots_raw: ".snapshots_info.snapshots | list"

  snapshots:
    script: "normalize_snapshots.py"
    script_args:
      mode: list
      age_days: 7
    type: list

  snapshot_count: ".snapshots_info.snapshots | len_if_list | int"
  collected_at: "raw_vm.metadata.timestamp"

  aged_snapshot_count:
    script: "normalize_snapshots.py"
    script_args:
      mode: count
      age_days: 7
    type: int

  recent_snapshot_count:
    compute: "snapshot_count - aged_snapshot_count"
    type: int

  powered_off_vm_count:
    path: ".vms_info.virtual_machines"
    type: int
    count_where:
      power_state: "poweredOff"

# ---------------------------------------------------------------------------
# Alerts
# ---------------------------------------------------------------------------

alerts:
  - id: powered_off_vms
    category: "Workload Inventory"
    severity: INFO
    when: "powered_off_vm_count > 0"
    message: "{powered_off_vm_count} powered-off VM(s) detected — review for cleanup or licensing"

  - id: vm_tools_not_running
    category: "Workload Compliance"
    severity: WARNING
    when: "virtual_machines | selectattr('power_state', 'eq', 'poweredOn') | selectattr('tools_status', 'eq', 'toolsNotRunning') | list | length > 0"
    message: "Powered-on VMs detected with VMware Tools not running"
    affected_items_field: virtual_machines

  - id: vm_tools_not_installed
    category: "Workload Compliance"
    severity: WARNING
    when: "virtual_machines | selectattr('power_state', 'eq', 'poweredOn') | selectattr('tools_status', 'eq', 'toolsNotInstalled') | list | length > 0"
    message: "Powered-on VMs detected with VMware Tools not installed"
    affected_items_field: virtual_machines

  - id: snapshots_present
    category: "Snapshots"
    severity: INFO
    when: "recent_snapshot_count > 0"
    message: "VM snapshots present: {snapshot_count} snapshot(s) found"

  - id: aged_snapshots
    category: "Snapshots"
    severity: WARNING
    when: "aged_snapshot_count > 0"
    message: "{aged_snapshot_count} snapshot(s) older than 7 days — review for removal"

# ---------------------------------------------------------------------------
# Widgets
# ---------------------------------------------------------------------------

widgets:
  - alert_panel: "Active Alerts"

  - id: vm_kpis
    title: "VM KPIs"
    type: stat_cards
    layout: { width: "full" }
    cards:
      - { field: vm_count, label: "VMs" }
      - { field: snapshot_count, label: "Snapshots", thresholds: { 1: yellow, 10: red } }
      - { field: powered_off_vm_count, label: "Powered Off", thresholds: { 1: yellow, 5: red } }

  - id: virtual_machines
    title: "Virtual Machines"
    type: grouped_table
    rows: virtual_machines
    group_by: cluster
    columns:
      - { label: "Name", field: guest_name, link_field: guest_name }
      - label: "Power State"
        field: power_state
        badge: true
        style_rules:
          - when: "power_state == 'poweredOff'"
            css_class: "subtle-text"
      - "Tools Status: tools_status [badge]"
      - "Cluster: cluster"
      - "IP Address: ip_address"
      - "Memory (MB): allocated.memory"
      - "vCPU: allocated.cpu"
      - "Owner Email: owner_email"
      - "Last Backup: backup_info"

  - table: "Snapshots"
    visible_if: "snapshot_count > 0"
    rows: snapshots
    columns:
      - "VM: vm_name"
      - "Owner Email: owner_email"
      - "Snapshot: name"
      - "Created: creation_time"
      - "State: state"
      - "Days Old: days_old"
