name: vcenter
display_name: "VMware VCSA"
platform:
  name: vmware
  input_dir: vmware/vcenter
  report_dir: vmware/vcsa
  target_types: [vcenter, vami, eam, lookup_svc, perfcharts, vcsa_photon_os, postgresql, rhttpproxy, sts, ui]
  state_file: vmware_fleet_state.yaml
  display_name: VMware
  asset_label: vCenters
  inventory_groups: [vcenters]
  site_compute_node: true
  site_infra_fields: [vcenter_count, datacenter_count, cluster_count, esxi_host_count, vm_count, datastore_count, snapshot_count, active_alarm_count]
  legacy_raw_keys:
    vmware_raw_vcenter: raw_vcenter
  legacy_audit_key: vmware_vcenter
  stig_playbook: "playbooks/vcsa/stig_remediate.yml"
  stig_target_var: "vcsa_stig_target_hosts"
  stig_skeleton_map:
    vcsa: cklb_skeleton_vsphere7_vcsa_V1R3.json
    vcenter: cklb_skeleton_vsphere7_vcsa_V1R3.json
    vami: cklb_skeleton_vsphere7_vami_V1R2.json
    eam: cklb_skeleton_vsphere7_vca_eam_V1R2.json
    lookup_svc: cklb_skeleton_vsphere7_vca_lookup_svc_V1R2.json
    perfcharts: cklb_skeleton_vsphere7_vca_perfcharts_V1R1.json
    vcsa_photon_os: cklb_skeleton_vsphere7_vca_photon_os_V1R4.json
    postgresql: cklb_skeleton_vsphere7_vca_postgresql_V1R2.json
    rhttpproxy: cklb_skeleton_vsphere7_vca_rhttpproxy_V1R1.json
    sts: cklb_skeleton_vsphere7_vca_sts_V1R2.json
    ui: cklb_skeleton_vsphere7_vca_ui_V1R2.json
  stig_rule_prefixes:
    VMCH: vm
    ESXI: esxi
    VC: vcsa
    PH: photon
  site_category: VMware
  children:
    - input_dir: vmware/vcenter/vcsa
      report_dir: vmware/vcsa/vcsa
      state_file: vcsa_fleet_state.yaml
      target_types: [vcsa]
      stig_skeleton_map:
        vcsa: cklb_skeleton_vsphere7_vcsa_V1R3.json

detection:
  keys_any: [vmware_raw_vcenter]

path_prefix: "vmware_raw_vcenter.data"

fleet_columns:
  - "Version: appliance_version"

fields:
  # --- Appliance ---
  appliance_version: ".appliance_health_info.appliance.summary.version = unknown"
  appliance_build: ".appliance_health_info.appliance.summary.build_number = unknown"
  appliance_health_overall: ".appliance_health_info.appliance.summary.health.overall = gray"
  appliance_health_cpu: ".appliance_health_info.appliance.summary.health.cpu = gray"
  appliance_health_memory: ".appliance_health_info.appliance.summary.health.memory = gray"
  appliance_health_database: ".appliance_health_info.appliance.summary.health.database = gray"
  appliance_health_storage: ".appliance_health_info.appliance.summary.health.storage = gray"
  appliance_uptime_seconds: ".appliance_health_info.appliance.summary.uptime | float"
  appliance_uptime_days:
    compute: "{appliance_uptime_seconds} / 86400"
    type: float
  ssh_enabled: ".appliance_health_info.appliance.access.ssh | bool"
  shell_enabled: ".appliance_health_info.appliance.access.shell.enabled | bool"
  ntp_mode: ".appliance_health_info.appliance.time.time_sync.mode = unknown"
  ntp_servers: ".appliance_health_info.appliance.time.time_sync.servers | list"

  # --- Backup ---
  backup_schedules: ".appliance_backup_info.schedules | list"
  backup_schedule_count: ".appliance_backup_info.schedules | len_if_list | int"

  # --- Infrastructure Inventory ---
  datacenter_count: ".datacenters_info.datacenter_info | len_if_list | int"
  clusters_info_results: ".clusters_info.results | list"
  cluster_count:
    script: "count_clusters_and_hosts.py"
    script_args: { metric: "cluster_count" }
    type: int
  esxi_host_count:
    script: "count_clusters_and_hosts.py"
    script_args: { metric: "esxi_host_count" }
    type: int
  clusters:
    script: "get_clusters_list.py"
    type: list
  datastores_raw: ".datastores_info.datastores | list"
  datastore_count: ".datastores_info.datastores | len_if_list | int"
  datastores:
    script: "normalize_datastores.py"
    type: list
  vcenter_count:
    compute: "1"
    type: int

  # --- Alarms ---
  active_alarms: ".alarms_info.alarms | list"
  active_critical_alarm_count:
    path: ".alarms_info.alarms"
    type: int
    count_where:
      severity: "critical"
  active_warning_alarm_count:
    path: ".alarms_info.alarms"
    type: int
    count_where:
      severity: "warning"
  alarm_count: ".alarms_info.alarms | len_if_list | int"

alerts:
  - "appliance_health_red | CRITICAL Appliance Health | appliance_health_overall eq_str red | VCSA component failure: overall health is RED"
  - "appliance_health_yellow | WARNING Appliance Health | appliance_health_overall eq_str yellow | VCSA degraded: overall health is YELLOW | suppress=appliance_health_red"
  - "appliance_health_gray | WARNING Data Quality | appliance_health_overall eq_str gray | VCSA health unknown: overall health is GRAY — check permissions and API availability | suppress=appliance_health_red;appliance_health_yellow"
  - "ssh_enabled | WARNING Security | ssh_enabled eq 1.0 | Hardening violation: SSH is enabled on VCSA"
  - "shell_enabled | WARNING Security | shell_enabled eq 1.0 | Hardening violation: interactive shell is enabled on VCSA"
  - id: ntp_disabled
    category: "Time Synchronization"
    severity: WARNING
    condition:
      op: not_in_str
      field: ntp_mode
      values: ["NTP", "HOST"]
    message: "Time sync misconfigured: NTP mode is '{ntp_mode}' — clock drift may affect logs and certificates"
  - "appliance_uptime_excessive | WARNING Appliance Lifecycle | appliance_uptime_days gte 90.0 | VCSA has not been rebooted in {appliance_uptime_days:.0f} days — may be missing patches"
  - "appliance_uptime_recent_reboot | INFO Appliance Lifecycle | appliance_uptime_days lt 1.0 | VCSA was rebooted less than 24 hours ago — verify this was planned | suppress=appliance_uptime_excessive"
  - "no_backup_schedule | CRITICAL Data Protection | backup_schedule_count lte 0 | DR risk: no file-based backup schedule configured on VCSA"
  - id: backup_schedule_disabled
    category: "Data Protection"
    severity: CRITICAL
    condition:
      op: filter_count
      field: backup_schedules
      filter_field: enabled
      filter_value: false
      threshold: 0
    message: "DR risk: a configured backup schedule is DISABLED on VCSA"
  - "active_critical_alarms | CRITICAL vCenter Alarms | active_critical_alarm_count gt 0 | Active CRITICAL alarms detected in vCenter ({alarm_count} total triggered) | affected=active_alarms"
  - "active_warning_alarms | WARNING vCenter Alarms | active_warning_alarm_count gt 0 | Active WARNING alarms detected in vCenter ({alarm_count} total triggered) | affected=active_alarms suppress=active_critical_alarms"

widgets:
  - alert_panel: "Active Alerts"

  - table: "Active vCenter Alarms"
    rows: active_alarms
    columns:
      - "Alarm: alarm_name"
      - "Entity: entity"
      - "Severity: severity [badge]"
      - "Time: time"
      - "Description: description"

  - id: inventory_kpis
    title: "Infrastructure & Appliance KPIs"
    type: stat_cards
    layout: { width: "full" }
    cards:
      - { field: datacenter_count, label: "Datacenters" }
      - { field: cluster_count, label: "Clusters" }
      - { field: esxi_host_count, label: "ESXi Hosts" }
      - { field: datastore_count, label: "Datastores" }
      - { field: alarm_count, label: "Alarms", thresholds: { 1: yellow, 5: red } }
      - { field: backup_schedule_count, label: "Backup Schedules" }

  - key_value: "Appliance Overview"
    layout: { width: "half" }
    fields:
      - "Version: appliance_version"
      - "Build: appliance_build"
      - "Health Overall: appliance_health_overall [badge]"
      - "Health CPU: appliance_health_cpu [badge]"
      - "Health Memory: appliance_health_memory [badge]"
      - "Health DB: appliance_health_database [badge]"
      - "Health Storage: appliance_health_storage [badge]"
      - "Uptime (days): appliance_uptime_days"
      - "SSH Enabled: ssh_enabled [badge]"
      - "NTP Mode: ntp_mode"

  - table: "Clusters"
    visible_if: { op: gt, field: cluster_count, threshold: 0 }
    rows: clusters
    columns:
      - "Cluster: name"
      - "Datacenter: datacenter"
      - "Hosts: host_count"
      - "HA: ha_enabled [badge]"
      - "DRS: drs_enabled [badge]"
      - "CPU %: cpu_usage_pct"
      - "Mem %: mem_usage_pct"

  - table: "Datastores"
    visible_if: { op: gt, field: datastore_count, threshold: 0 }
    rows: datastores
    columns:
      - "Name: name"
      - "Capacity (GB): capacity_gb"
      - "Free (GB): free_gb"
      - "Used %: used_pct"

  - table: "Backup Schedules"
    visible_if: { op: gt, field: backup_schedule_count, threshold: 0 }
    rows: backup_schedules
    columns:
      - "Name: name"
      - label: "Enabled"
        field: enabled
        badge: true
        style_rules:
          - condition: { op: eq, field: enabled, threshold: 0.0 }
            css_class: "sv-critical"
      - "Location: location"
      - "Retain Count: retain_count"
