config:
  display_name: "VMware VCSA"
  detection:
    keys_any: [raw_vcenter]
  path_prefix: "raw_vcenter.data"
  platform:
    path: vmware/vcsa
    input_dir: vmware/vcenter
    site_compute_node: true
    site_infra_fields: [vcenter_count, datacenter_count, cluster_count, esxi_host_count, vm_count, datastore_count, snapshot_count, active_alarm_count]
    children:
      - input_dir: vmware/vcenter/vcsa
        report_dir: vmware/vcsa/vcsa
        stig_platform_to_checklist:
          vcsa: cklb_skeletons/cklb_skeleton_vsphere7_vcsa_V1R3.json
  stig:
    ansible_playbook:
      path: "playbooks/vcsa/stig_remediate.yml"
      target_var: "vcsa_stig_target_hosts"
    platform_to_checklist:
      vcsa: cklb_skeletons/cklb_skeleton_vsphere7_vcsa_V1R3.json
      vcenter: cklb_skeletons/cklb_skeleton_vsphere7_vcsa_V1R3.json
      vami: cklb_skeletons/cklb_skeleton_vsphere7_vami_V1R2.json
      eam: cklb_skeletons/cklb_skeleton_vsphere7_vca_eam_V1R2.json
      lookup_svc: cklb_skeletons/cklb_skeleton_vsphere7_vca_lookup_svc_V1R2.json
      perfcharts: cklb_skeletons/cklb_skeleton_vsphere7_vca_perfcharts_V1R1.json
      vcsa_photon_os: cklb_skeletons/cklb_skeleton_vsphere7_vca_photon_os_V1R4.json
      postgresql: cklb_skeletons/cklb_skeleton_vsphere7_vca_postgresql_V1R2.json
      rhttpproxy: cklb_skeletons/cklb_skeleton_vsphere7_vca_rhttpproxy_V1R1.json
      sts: cklb_skeletons/cklb_skeleton_vsphere7_vca_sts_V1R2.json
      ui: cklb_skeletons/cklb_skeleton_vsphere7_vca_ui_V1R2.json
    rule_prefixes:
      VMCH: vm
      ESXI: esxi
      VC: vcsa
      PH: photon
  extra_fleet_widget_columns:
    - label: "Version"
      field: appliance_version

fields:
  # --- Appliance ---
  appliance_version: ".appliance_health_info.appliance.summary.version = unknown"
  appliance_build: ".appliance_health_info.appliance.summary.build_number = unknown"
  appliance_health_overall: ".appliance_health_info.appliance.summary.health.overall = gray"
  appliance_health_cpu: ".appliance_health_info.appliance.summary.health.cpu = gray"
  appliance_health_memory: ".appliance_health_info.appliance.summary.health.memory = gray"
  appliance_health_database: ".appliance_health_info.appliance.summary.health.database = gray"
  appliance_health_storage: ".appliance_health_info.appliance.summary.health.storage = gray"
  appliance_uptime_seconds: ".appliance_health_info.appliance.summary.uptime | float"
  appliance_uptime_days:
    compute: "appliance_uptime_seconds / 86400"
    type: float
  ssh_enabled: ".appliance_health_info.appliance.access.ssh | bool"
  shell_enabled: ".appliance_health_info.appliance.access.shell.enabled | bool"
  ntp_mode: ".appliance_health_info.appliance.time.time_sync.mode = unknown"
  ntp_servers: ".appliance_health_info.appliance.time.time_sync.servers | list"

  # --- Backup ---
  backup_schedules: ".appliance_backup_info.schedules | list"
  backup_schedule_count: ".appliance_backup_info.schedules | len_if_list | int"

  # --- Infrastructure Inventory ---
  datacenter_count: ".datacenters_info.datacenter_info | len_if_list | int"
  clusters_info_results: ".clusters_info.results | list"
  cluster_count:
    script: "count_clusters_and_hosts.py"
    script_args: { metric: "cluster_count" }
    type: int
  esxi_host_count:
    script: "count_clusters_and_hosts.py"
    script_args: { metric: "esxi_host_count" }
    type: int
  clusters:
    script: "get_clusters_list.py"
    type: list
  datastores_raw: ".datastores_info.datastores | list"
  datastore_count: ".datastores_info.datastores | len_if_list | int"
  datastores:
    path: ".datastores_info.datastores"
    type: list
    list_map:
      capacity_gb: "capacity / 1073741824"
      free_gb: "freeSpace / 1073741824"
      used_pct: "(capacity - freeSpace) / capacity * 100"
  vcenter_count:
    compute: "1"
    type: int

  # --- Resource Pools ---
  resource_pools: ".resource_pools_info.resource_pool_info | list"
  resource_pool_count: ".resource_pools_info.resource_pool_info | len_if_list | int"

  # --- Networking ---
  dvswitches: ".dvswitches_info.distributed_virtual_switches | list"
  dvswitch_count: ".dvswitches_info.distributed_virtual_switches | len_if_list | int"
  dvs_portgroups: ".dvs_portgroups_info.dvs_portgroup_info | list"
  dvs_portgroup_count: ".dvs_portgroups_info.dvs_portgroup_info | len_if_list | int"

  # --- Licensing ---
  licenses: ".licenses_info.licenses | list"
  license_count: ".licenses_info.licenses | len_if_list | int"

  # --- Extensions ---
  extensions: ".extensions_info.ext_facts | list"
  extension_count: ".extensions_info.ext_facts | len_if_list | int"

  # --- Content Libraries ---
  content_libraries: ".content_libraries_info.content_libs | list"
  content_library_count: ".content_libraries_info.content_libs | len_if_list | int"

  # --- Tags ---
  tag_categories: ".tag_categories_info.tag_category_info | list"
  tag_category_count: ".tag_categories_info.tag_category_info | len_if_list | int"
  tags: ".tags_info.tag_info | list"
  tag_count: ".tags_info.tag_info | len_if_list | int"

  # --- Alarms ---
  active_alarms: ".alarms_info.alarms | list"
  active_critical_alarm_count:
    path: ".alarms_info.alarms"
    type: int
    count_where:
      severity: "critical"
  active_warning_alarm_count:
    path: ".alarms_info.alarms"
    type: int
    count_where:
      severity: "warning"
  alarm_count: ".alarms_info.alarms | len_if_list | int"

alerts:
  - id: appliance_health_red
    category: "Appliance Health"
    severity: CRITICAL
    when: "appliance_health_overall == 'red'"
    message: "VCSA component failure: overall health is RED"

  - id: appliance_health_yellow
    category: "Appliance Health"
    severity: WARNING
    suppress_if: appliance_health_red
    when: "appliance_health_overall == 'yellow'"
    message: "VCSA degraded: overall health is YELLOW"

  - id: appliance_health_gray
    category: "Data Quality"
    severity: WARNING
    suppress_if: [appliance_health_red, appliance_health_yellow]
    when: "appliance_health_overall == 'gray'"
    message: "VCSA health unknown: overall health is GRAY — check permissions and API availability"

  - id: ssh_enabled
    category: "Security"
    severity: WARNING
    when: "ssh_enabled == 1.0"
    message: "Hardening violation: SSH is enabled on VCSA"

  - id: shell_enabled
    category: "Security"
    severity: WARNING
    when: "shell_enabled == 1.0"
    message: "Hardening violation: interactive shell is enabled on VCSA"

  - id: ntp_disabled
    category: "Time Synchronization"
    severity: WARNING
    when: "ntp_mode not in ['NTP', 'HOST']"
    message: "Time sync misconfigured: NTP mode is '{ntp_mode}' — clock drift may affect logs and certificates"

  - id: appliance_uptime_excessive
    category: "Appliance Lifecycle"
    severity: WARNING
    when: "appliance_uptime_days >= 90.0"
    message: "VCSA has not been rebooted in {appliance_uptime_days:.0f} days — may be missing patches"

  - id: appliance_uptime_recent_reboot
    category: "Appliance Lifecycle"
    severity: INFO
    suppress_if: appliance_uptime_excessive
    when: "appliance_uptime_days < 1.0"
    message: "VCSA was rebooted less than 24 hours ago — verify this was planned"

  - id: no_backup_schedule
    category: "Data Protection"
    severity: CRITICAL
    when: "backup_schedule_count <= 0"
    message: "DR risk: no file-based backup schedule configured on VCSA"

  - id: backup_schedule_disabled
    category: "Data Protection"
    severity: CRITICAL
    when: "backup_schedules | selectattr('enabled', 'eq', false) | list | length > 0"
    message: "DR risk: a configured backup schedule is DISABLED on VCSA"

  - id: active_critical_alarms
    category: "vCenter Alarms"
    severity: CRITICAL
    when: "active_critical_alarm_count > 0"
    message: "Active CRITICAL alarms detected in vCenter ({alarm_count} total triggered)"

  - id: active_warning_alarms
    category: "vCenter Alarms"
    severity: WARNING
    suppress_if: active_critical_alarms
    when: "active_warning_alarm_count > 0"
    message: "Active WARNING alarms detected in vCenter ({alarm_count} total triggered)"

widgets:
  - alert_panel: "Active Alerts"

  - table: "Active vCenter Alarms"
    rows: active_alarms
    columns:
      - "Alarm: alarm_name"
      - "Entity: entity"
      - "Severity: severity [badge]"
      - "Time: time"
      - "Description: description"

  - id: inventory_kpis
    title: "Infrastructure KPIs"
    type: stat_cards
    layout: { width: "full" }
    cards:
      - { field: datacenter_count, label: "Datacenters" }
      - { field: cluster_count, label: "Clusters" }
      - { field: esxi_host_count, label: "ESXi Hosts" }
      - { field: datastore_count, label: "Datastores" }
      - { field: dvswitch_count, label: "DVSwitches" }
      - { field: resource_pool_count, label: "Resource Pools" }
      - { field: license_count, label: "Licenses" }
      - { field: alarm_count, label: "Alarms", thresholds: { 1: yellow, 5: red } }

  - key_value: "Appliance Overview"
    layout: { width: "half" }
    fields:
      - "Version: appliance_version"
      - "Build: appliance_build"
      - "Health Overall: appliance_health_overall [badge]"
      - "Health CPU: appliance_health_cpu [badge]"
      - "Health Memory: appliance_health_memory [badge]"
      - "Health DB: appliance_health_database [badge]"
      - "Health Storage: appliance_health_storage [badge]"
      - "Uptime (days): appliance_uptime_days"
      - "SSH Enabled: ssh_enabled [badge]"
      - "NTP Mode: ntp_mode"
      - "Backup Schedules: backup_schedule_count"
      - "Extensions: extension_count"
      - "Content Libraries: content_library_count"
      - "Tag Categories: tag_category_count"

  - table: "Clusters"
    visible_if: "cluster_count > 0"
    rows: clusters
    columns:
      - "Cluster: name"
      - "Datacenter: datacenter"
      - "Hosts: host_count"
      - "HA: ha_enabled [badge]"
      - "DRS: drs_enabled [badge]"
      - "CPU %: cpu_usage_pct"
      - "Mem %: mem_usage_pct"

  - table: "Datastores"
    visible_if: "datastore_count > 0"
    rows: datastores
    columns:
      - "Name: name"
      - "Capacity (GB): capacity_gb"
      - "Free (GB): free_gb"
      - "Used %: used_pct"

  - table: "Resource Pools"
    visible_if: "resource_pool_count > 0"
    rows: resource_pools
    columns:
      - "Name: name"
      - "CPU Reservation: runtime_cpu_reservation_used"
      - "CPU Limit: runtime_cpu_overall_usage"
      - "Memory Reservation: runtime_memory_reservation_used"
      - "Memory Limit: runtime_memory_overall_usage"

  - table: "Distributed Switches"
    visible_if: "dvswitch_count > 0"
    rows: dvswitches
    columns:
      - "Name: name"
      - "Ports: num_ports"
      - "Uplinks: num_uplinks"
      - "MTU: mtu"

  - table: "Distributed Portgroups"
    visible_if: "dvs_portgroup_count > 0"
    rows: dvs_portgroups
    columns:
      - "Name: portgroup_name"
      - "Switch: dvswitch_name"
      - "VLAN: vlan_id"
      - "Ports: num_ports"
      - "Type: port_binding"

  - table: "Licenses"
    visible_if: "license_count > 0"
    rows: licenses
    columns:
      - "Name: name"
      - "Edition: edition"
      - "Total: total"
      - "Used: used"
      - "Expiration: expiration_date"

  - table: "Extensions"
    visible_if: "extension_count > 0"
    rows: extensions
    columns:
      - "Label: ext_label"
      - "Company: ext_company"
      - "Version: ext_version"
      - "Last Heartbeat: ext_last_heartbeat_time"

  - table: "Content Libraries"
    visible_if: "content_library_count > 0"
    rows: content_libraries
    columns:
      - "Name: lib_name"
      - "Type: lib_type"
      - "Description: lib_description"

  - table: "Backup Schedules"
    visible_if: "backup_schedule_count > 0"
    rows: backup_schedules
    columns:
      - "Name: name"
      - label: "Enabled"
        field: enabled
        badge: true
        style_rules:
          - when: "enabled == 0.0"
            css_class: "sv-critical"
      - "Location: location"
      - "Retain Count: retain_count"
