config:
  display_name: "VMware VCSA"
  platform:
    path: vmware/vcsa
    site_compute_node: true
    site_infra_fields: [vcenter_count, datacenter_count, cluster_count, esxi_host_count, vm_count, datastore_count, snapshot_count, active_alarm_count]
    children:
      - input_dir: vmware/vcsa/vcsa
        report_dir: vmware/vcsa/vcsa
        stig_platform_to_checklist:
          vcsa: cklb_skeletons/cklb_skeleton_vsphere7_vcsa_V1R3.json
  stig:
    ansible_playbook:
      path: "playbooks/vcsa/stig_remediate.yml"
      target_var: "vcsa_stig_target_hosts"
    platform_to_checklist:
      vcsa: cklb_skeletons/cklb_skeleton_vsphere7_vcsa_V1R3.json
      vcenter: cklb_skeletons/cklb_skeleton_vsphere7_vcsa_V1R3.json
      vami: cklb_skeletons/cklb_skeleton_vsphere7_vami_V1R2.json
      eam: cklb_skeletons/cklb_skeleton_vsphere7_vca_eam_V1R2.json
      lookup_svc: cklb_skeletons/cklb_skeleton_vsphere7_vca_lookup_svc_V1R2.json
      perfcharts: cklb_skeletons/cklb_skeleton_vsphere7_vca_perfcharts_V1R1.json
      vcsa_photon_os: cklb_skeletons/cklb_skeleton_vsphere7_vca_photon_os_V1R4.json
      postgresql: cklb_skeletons/cklb_skeleton_vsphere7_vca_postgresql_V1R2.json
      rhttpproxy: cklb_skeletons/cklb_skeleton_vsphere7_vca_rhttpproxy_V1R1.json
      sts: cklb_skeletons/cklb_skeleton_vsphere7_vca_sts_V1R2.json
      ui: cklb_skeletons/cklb_skeleton_vsphere7_vca_ui_V1R2.json
    rule_prefix_to_platform:
      VMCH: vm
      ESXI: esxi
      VC: vcsa
      PH: photon
  extra_fleet_widget_columns:
    - label: "Version"
      field: appliance_version

vars:
  # --- Appliance ---
  appliance_version:
    path: ".appliance_health_info.appliance.summary.version"
    fallback: "unknown"
  appliance_build:
    path: ".appliance_health_info.appliance.summary.build_number"
    fallback: "unknown"
  appliance_health_overall:
    path: ".appliance_health_info.appliance.summary.health.overall"
    fallback: "gray"
  appliance_health_cpu:
    path: ".appliance_health_info.appliance.summary.health.cpu"
    fallback: "gray"
  appliance_health_memory:
    path: ".appliance_health_info.appliance.summary.health.memory"
    fallback: "gray"
  appliance_health_database:
    path: ".appliance_health_info.appliance.summary.health.database"
    fallback: "gray"
  appliance_health_storage:
    path: ".appliance_health_info.appliance.summary.health.storage"
    fallback: "gray"
  appliance_uptime_seconds:
    path: ".appliance_health_info.appliance.summary.uptime"
    type: float
  appliance_uptime_days:
    compute: "appliance_uptime_seconds / 86400"
    type: float
  ssh_enabled:
    path: ".appliance_health_info.appliance.access.ssh"
    type: bool
  shell_enabled:
    path: ".appliance_health_info.appliance.access.shell.enabled"
    type: bool
  ntp_mode:
    path: ".appliance_health_info.appliance.time.time_sync.mode"
    fallback: "unknown"
  ntp_servers:
    path: ".appliance_health_info.appliance.time.time_sync.servers"
    type: list

  # --- Backup ---
  backup_schedules:
    path: ".appliance_backup_info.schedules"
    type: list
  backup_schedule_count:
    path: ".appliance_backup_info.schedules | len_if_list"
    type: int

  # --- Infrastructure Inventory ---
  datacenter_count:
    path: ".datacenters_info.datacenter_info | len_if_list"
    type: int
  clusters_info_results:
    path: ".clusters_info.results"
    type: list
  cluster_count:
    script: "count_clusters_and_hosts.py"
    script_args: { metric: "cluster_count" }
    type: int
  esxi_host_count:
    script: "count_clusters_and_hosts.py"
    script_args: { metric: "esxi_host_count" }
    type: int
  clusters:
    script: "get_clusters_list.py"
    type: list
  datastores_raw:
    path: ".datastores_info.datastores"
    type: list
  datastore_count:
    path: ".datastores_info.datastores | len_if_list"
    type: int
  datastores:
    path: ".datastores_info.datastores"
    type: list
    list_map:
      capacity_gb: "capacity / 1073741824"
      free_gb: "freeSpace / 1073741824"
      used_pct: "(capacity - freeSpace) / capacity * 100"
  vcenter_count:
    compute: "1"
    type: int

  # --- Resource Pools ---
  resource_pools:
    path: ".resource_pools_info.resource_pool_info"
    type: list
  resource_pool_count:
    path: ".resource_pools_info.resource_pool_info | len_if_list"
    type: int

  # --- Networking ---
  dvswitches:
    path: ".dvswitches_info.distributed_virtual_switches"
    type: list
  dvswitch_count:
    path: ".dvswitches_info.distributed_virtual_switches | len_if_list"
    type: int
  dvs_portgroups:
    path: ".dvs_portgroups_info.dvs_portgroup_info"
    type: list
  dvs_portgroup_count:
    path: ".dvs_portgroups_info.dvs_portgroup_info | len_if_list"
    type: int

  # --- Licensing ---
  licenses:
    path: ".licenses_info.licenses"
    type: list
  license_count:
    path: ".licenses_info.licenses | len_if_list"
    type: int

  # --- Extensions ---
  extensions:
    path: ".extensions_info.ext_facts"
    type: list
  extension_count:
    path: ".extensions_info.ext_facts | len_if_list"
    type: int

  # --- Content Libraries ---
  content_libraries:
    path: ".content_libraries_info.content_libs"
    type: list
  content_library_count:
    path: ".content_libraries_info.content_libs | len_if_list"
    type: int

  # --- Tags ---
  tag_categories:
    path: ".tag_categories_info.tag_category_info"
    type: list
  tag_category_count:
    path: ".tag_categories_info.tag_category_info | len_if_list"
    type: int
  tags:
    path: ".tags_info.tag_info"
    type: list
  tag_count:
    path: ".tags_info.tag_info | len_if_list"
    type: int

  # --- Alarms ---
  active_alarms:
    path: ".alarms_info.alarms"
    type: list
  active_critical_alarm_count:
    path: ".alarms_info.alarms"
    type: int
    count_where:
      severity: "critical"
  active_warning_alarm_count:
    path: ".alarms_info.alarms"
    type: int
    count_where:
      severity: "warning"
  alarm_count:
    path: ".alarms_info.alarms | len_if_list"
    type: int

alerts:
  - id: appliance_health_red
    category: "Appliance Health"
    severity: CRITICAL
    when: "appliance_health_overall == 'red'"
    message: "VCSA component failure: overall health is RED"

  - id: appliance_health_yellow
    category: "Appliance Health"
    severity: WARNING
    suppress_if: appliance_health_red
    when: "appliance_health_overall == 'yellow'"
    message: "VCSA degraded: overall health is YELLOW"

  - id: appliance_health_gray
    category: "Data Quality"
    severity: WARNING
    suppress_if: [appliance_health_red, appliance_health_yellow]
    when: "appliance_health_overall == 'gray'"
    message: "VCSA health unknown: overall health is GRAY — check permissions and API availability"

  - id: ssh_enabled
    category: "Security"
    severity: WARNING
    when: "ssh_enabled == 1.0"
    message: "Hardening violation: SSH is enabled on VCSA"

  - id: shell_enabled
    category: "Security"
    severity: WARNING
    when: "shell_enabled == 1.0"
    message: "Hardening violation: interactive shell is enabled on VCSA"

  - id: ntp_disabled
    category: "Time Synchronization"
    severity: WARNING
    when: "ntp_mode not in ['NTP', 'HOST']"
    message: "Time sync misconfigured: NTP mode is '{{ ntp_mode }}' — clock drift may affect logs and certificates"

  - id: appliance_uptime_excessive
    category: "Appliance Lifecycle"
    severity: WARNING
    when: "appliance_uptime_days >= 90.0"
    message: "VCSA has not been rebooted in {{ appliance_uptime_days | round(0) }} days — may be missing patches"

  - id: appliance_uptime_recent_reboot
    category: "Appliance Lifecycle"
    severity: INFO
    suppress_if: appliance_uptime_excessive
    when: "appliance_uptime_days < 1.0"
    message: "VCSA was rebooted less than 24 hours ago — verify this was planned"

  - id: no_backup_schedule
    category: "Data Protection"
    severity: CRITICAL
    when: "backup_schedule_count <= 0"
    message: "DR risk: no file-based backup schedule configured on VCSA"

  - id: backup_schedule_disabled
    category: "Data Protection"
    severity: CRITICAL
    when: "backup_schedules | selectattr('enabled', 'eq', false) | list | length > 0"
    message: "DR risk: a configured backup schedule is DISABLED on VCSA"

  - id: active_critical_alarms
    category: "vCenter Alarms"
    severity: CRITICAL
    when: "active_critical_alarm_count > 0"
    message: "Active CRITICAL alarms detected in vCenter ({{ alarm_count }} total triggered)"

  - id: active_warning_alarms
    category: "vCenter Alarms"
    severity: WARNING
    suppress_if: active_critical_alarms
    when: "active_warning_alarm_count > 0"
    message: "Active WARNING alarms detected in vCenter ({{ alarm_count }} total triggered)"

widgets:
  - title: "Active Alerts"
    type: alert_panel

  - title: "Active vCenter Alarms"
    type: table
    rows: active_alarms
    columns:
      - label: "Alarm"
        field: alarm_name
      - label: "Entity"
        field: entity
      - label: "Severity"
        field: severity
        badge: true
      - label: "Time"
        field: time
      - label: "Description"
        field: description

  - id: inventory_kpis
    title: "Infrastructure KPIs"
    type: stat_cards
    layout: { width: "full" }
    cards:
      - { field: datacenter_count, label: "Datacenters" }
      - { field: cluster_count, label: "Clusters" }
      - { field: esxi_host_count, label: "ESXi Hosts" }
      - { field: datastore_count, label: "Datastores" }
      - { field: dvswitch_count, label: "DVSwitches" }
      - { field: resource_pool_count, label: "Resource Pools" }
      - { field: license_count, label: "Licenses" }
      - { field: alarm_count, label: "Alarms", thresholds: { 1: yellow, 5: red } }

  - title: "Appliance Overview"
    type: key_value
    layout: { width: "half" }
    fields:
      - label: "Version"
        field: appliance_version
      - label: "Build"
        field: appliance_build
      - label: "Health Overall"
        field: appliance_health_overall
        badge: true
      - label: "Health CPU"
        field: appliance_health_cpu
        badge: true
      - label: "Health Memory"
        field: appliance_health_memory
        badge: true
      - label: "Health DB"
        field: appliance_health_database
        badge: true
      - label: "Health Storage"
        field: appliance_health_storage
        badge: true
      - label: "Uptime (days)"
        field: appliance_uptime_days
      - label: "SSH Enabled"
        field: ssh_enabled
        badge: true
      - label: "NTP Mode"
        field: ntp_mode
      - label: "Backup Schedules"
        field: backup_schedule_count
      - label: "Extensions"
        field: extension_count
      - label: "Content Libraries"
        field: content_library_count
      - label: "Tag Categories"
        field: tag_category_count

  - title: "Clusters"
    type: table
    visible_if: "cluster_count > 0"
    rows: clusters
    columns:
      - label: "Cluster"
        field: name
      - label: "Datacenter"
        field: datacenter
      - label: "Hosts"
        field: host_count
      - label: "HA"
        field: ha_enabled
        badge: true
      - label: "DRS"
        field: drs_enabled
        badge: true
      - label: "CPU %"
        field: cpu_usage_pct
      - label: "Mem %"
        field: mem_usage_pct

  - title: "Datastores"
    type: table
    visible_if: "datastore_count > 0"
    rows: datastores
    columns:
      - label: "Name"
        field: name
      - label: "Capacity (GB)"
        field: capacity_gb
      - label: "Free (GB)"
        field: free_gb
      - label: "Used %"
        field: used_pct

  - title: "Resource Pools"
    type: table
    visible_if: "resource_pool_count > 0"
    rows: resource_pools
    columns:
      - label: "Name"
        field: name
      - label: "CPU Reservation"
        field: runtime_cpu_reservation_used
      - label: "CPU Limit"
        field: runtime_cpu_overall_usage
      - label: "Memory Reservation"
        field: runtime_memory_reservation_used
      - label: "Memory Limit"
        field: runtime_memory_overall_usage

  - title: "Distributed Switches"
    type: table
    visible_if: "dvswitch_count > 0"
    rows: dvswitches
    columns:
      - label: "Name"
        field: name
      - label: "Ports"
        field: num_ports
      - label: "Uplinks"
        field: num_uplinks
      - label: "MTU"
        field: mtu

  - title: "Distributed Portgroups"
    type: table
    visible_if: "dvs_portgroup_count > 0"
    rows: dvs_portgroups
    columns:
      - label: "Name"
        field: portgroup_name
      - label: "Switch"
        field: dvswitch_name
      - label: "VLAN"
        field: vlan_id
      - label: "Ports"
        field: num_ports
      - label: "Type"
        field: port_binding

  - title: "Licenses"
    type: table
    visible_if: "license_count > 0"
    rows: licenses
    columns:
      - label: "Name"
        field: name
      - label: "Edition"
        field: edition
      - label: "Total"
        field: total
      - label: "Used"
        field: used
      - label: "Expiration"
        field: expiration_date

  - title: "Extensions"
    type: table
    visible_if: "extension_count > 0"
    rows: extensions
    columns:
      - label: "Label"
        field: ext_label
      - label: "Company"
        field: ext_company
      - label: "Version"
        field: ext_version
      - label: "Last Heartbeat"
        field: ext_last_heartbeat_time

  - title: "Content Libraries"
    type: table
    visible_if: "content_library_count > 0"
    rows: content_libraries
    columns:
      - label: "Name"
        field: lib_name
      - label: "Type"
        field: lib_type
      - label: "Description"
        field: lib_description

  - title: "Backup Schedules"
    type: table
    visible_if: "backup_schedule_count > 0"
    rows: backup_schedules
    columns:
      - label: "Name"
        field: name
      - label: "Enabled"
        field: enabled
        badge: true
        style_rules:
          - when: "enabled == 0.0"
            css_class: "sv-critical"
      - label: "Location"
        field: location
      - label: "Retain Count"
        field: retain_count
