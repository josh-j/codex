name: photon
display_name: "Photon OS"
platform:
  name: linux
  input_dir: linux/photon
  report_dir: linux/photon
  render: false
  stig_playbook: "playbooks/photon_stig_remediate.yml"
  stig_target_var: "photon_target_hosts"
  stig_checklist_map:
    photon: cklb_skeletons/cklb_skeleton_vsphere7_vca_photon_os_V1R4.json

# Detects the key emitted by the internal.linux role via ncs_collector callback.
detection:
  keys_any: [raw_discovery]

# Paths starting with '.' are relative to path_prefix.
path_prefix: "raw_discovery.data"

fleet_columns:
  - "Distribution: distribution"
  - "Uptime (d): uptime_days"
  - "Critical: _critical_count"
  - "Warning: _warning_count"

fields:
  $include: "linux_base_fields.yaml"
  collected_at: "raw_discovery.metadata.timestamp"

alerts:
  $include: "linux_base_alerts.yaml"

widgets:
  $include: "linux_base_widgets.yaml"
