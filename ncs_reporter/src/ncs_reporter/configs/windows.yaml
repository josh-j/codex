config:
  platform: windows
  stig:
    rule_prefix_to_platform:
      WN: windows
      MS: windows
  extra_fleet_widget_columns:
    - label: "Collected At"
      field: collected_at
    - label: "CCM Status"
      field: ccm_service_state
    - label: "Reboot"
      field: health_reboot_pending
    - label: "Critical"
      field: _critical_count
    - label: "Warning"
      field: _warning_count

# ---------------------------------------------------------------------------
# Fields
# ---------------------------------------------------------------------------

fields:
  # --- Collection timestamp ---
  collected_at: "raw_windows.metadata.timestamp"

  # --- CCMExec service ---
  ccm_service_state:
    path: ".ccm_service.state"
    fallback: "unknown"

  # --- ConfigMgr applications (PowerShell JSON) ---
  configmgr_apps:
    path: ".configmgr_apps | unwrap_ps(AllApps)"
    type: list
  apps_to_update:
    path: ".configmgr_apps | unwrap_ps(AppsToUpdate)"
    type: list

  # --- Installed applications (PowerShell JSON) ---
  installed_apps:
    path: ".installed_apps | unwrap_ps"
    type: list

  # --- Windows Update results ---
  update_results:
    path: ".update_results"
    type: list

  # --- Health fields ---
  health_os_info:
    path: ".health.os_info"
    type: dict
    fallback: {}
  health_hostname:
    path: ".health.os_info.hostname"
    fallback: ''
  health_os_name:
    path: ".health.os_info.os_name"
    fallback: ''
  health_uptime_hours:
    path: ".health.os_info.uptime_hours"
    fallback: 0
  health_disk:
    path: ".health.disk"
    type: list

  # health_disk_alert removed — disk threshold check moved to computed_filter alert

  health_memory_cpu:
    path: ".health.memory_cpu"
    type: dict
    fallback: {}
  health_memory_used_pct:
    path: ".health.memory_cpu.memory_used_pct"
    fallback: 0
  health_cpu_load_pct:
    path: ".health.memory_cpu.cpu_load_pct"
    fallback: 0
  health_services:
    path: ".health.services"
    type: list
  health_network:
    path: ".health.network"
    type: list
  health_reboot_pending:
    path: ".health.reboot_pending.reboot_pending"
    fallback: false
  health_reboot_reasons:
    path: ".health.reboot_pending.reasons"
    type: list
  health_event_logs:
    path: ".health.event_logs"
    type: dict
    fallback: {}
  health_event_count:
    path: ".health.event_logs.event_count"
    fallback: 0
  health_events:
    path: ".health.event_logs.events"
    type: list
  health_secure_channel:
    path: ".health.secure_channel.secure_channel"
    fallback: "N/A"
  health_software_versions:
    path: ".health.software_versions"
    type: list

  # --- Vulnerability scan fields ---
  vuln_total_findings:
    path: ".vuln_scan.results.total_findings"
    fallback: 0
  vuln_remediated:
    path: ".vuln_scan.results.remediated"
    fallback: 0
  vuln_open:
    path: ".vuln_scan.results.open"
    fallback: 0
  vuln_findings:
    path: ".vuln_scan.results.findings"
    type: list

  # --- KB status fields ---
  kb_detection:
    path: ".kb_install.detection"
    type: list
  kb_install_results:
    path: ".kb_install.install_results"
    type: list

# ---------------------------------------------------------------------------
# Alerts
# ---------------------------------------------------------------------------

alerts:
  - id: ccmexec_not_running
    category: "Services"
    severity: WARNING
    when: "ccm_service_state != 'running'"
    message: "ConfigMgr client service (CCMExec) is not running (state: {ccm_service_state})"

  - id: failed_updates
    category: "Patching"
    severity: WARNING
    when: "update_results | selectattr('failed', 'eq', true) | list | length > 0"
    message: "One or more ConfigMgr application updates failed"

  - id: apps_pending_update
    category: "Patching"
    severity: WARNING
    when: "apps_to_update is defined and apps_to_update | length > 0"
    message: "ConfigMgr applications have pending updates"

  - id: reboot_pending
    category: "Health"
    severity: WARNING
    when: "health_reboot_pending == 1"
    message: "System has a pending reboot ({health_reboot_reasons})"

  - id: disk_space_warning
    category: "Health"
    severity: WARNING
    when: "health_disk | selectattr('UsedPct', 'gt', 80.0) | list | length > 0"
    message: "One or more disks exceed 80% usage"

  - id: memory_high
    category: "Health"
    severity: WARNING
    when: "health_memory_used_pct > 85"
    message: "Memory usage is high ({health_memory_used_pct}%)"

  - id: secure_channel_failed
    category: "Health"
    severity: CRITICAL
    when: "health_secure_channel == 'FAILED'"
    message: "Domain secure channel test FAILED"

  - id: critical_events
    category: "Health"
    severity: WARNING
    when: "health_event_count > 0"
    message: "{health_event_count} critical/error events in recent logs"

  - id: open_vulnerabilities
    category: "Security"
    severity: WARNING
    when: "vuln_open > 0"
    message: "{vuln_open} open vulnerability findings"

# ---------------------------------------------------------------------------
# Widgets
# ---------------------------------------------------------------------------

widgets:
  - title: "Active Alerts"
    type: alert_panel

  - title: "System Information"
    type: key_value
    fields:
      - label: "Hostname"
        field: health_hostname
      - label: "OS"
        field: health_os_name
      - label: "Uptime (hours)"
        field: health_uptime_hours
      - label: "CCMExec State"
        field: ccm_service_state
      - label: "Reboot Pending"
        field: health_reboot_pending
      - label: "Secure Channel"
        field: health_secure_channel

  - title: "Disk Usage"
    type: table
    rows: health_disk
    columns:
      - label: "Drive"
        field: DeviceID
      - label: "Size (GB)"
        field: SizeGB
      - label: "Free (GB)"
        field: FreeGB
      - label: "Used %"
        field: UsedPct
        badge: true

  - title: "Memory & CPU"
    type: key_value
    fields:
      - label: "Memory Used %"
        field: health_memory_used_pct
      - label: "CPU Load %"
        field: health_cpu_load_pct

  - title: "Critical Services"
    type: table
    rows: health_services
    columns:
      - label: "Service"
        field: display_name
      - label: "Status"
        field: status
        badge: true
      - label: "Start Type"
        field: start_type

  - title: "Recent Critical/Error Events"
    type: table
    rows: health_events
    columns:
      - label: "Time"
        field: time
      - label: "Log"
        field: log
      - label: "Level"
        field: level
        badge: true
      - label: "Source"
        field: source
      - label: "ID"
        field: id
      - label: "Message"
        field: message

  - title: "Vulnerability Summary"
    type: key_value
    fields:
      - label: "Total Findings"
        field: vuln_total_findings
      - label: "Remediated"
        field: vuln_remediated
      - label: "Open"
        field: vuln_open

  - title: "Vulnerability Findings"
    type: table
    rows: vuln_findings
    columns:
      - label: "Plugin ID"
        field: plugin_id
      - label: "Severity"
        field: severity
        badge: true
      - label: "Title"
        field: title
      - label: "Remediated"
        field: remediated
        badge: true

  - title: "ConfigMgr Applications"
    type: table
    rows: configmgr_apps
    columns:
      - label: "Name"
        field: Name
      - label: "Version"
        field: Version

  - title: "Applications Pending Update"
    type: table
    rows: apps_to_update
    columns:
      - label: "Name"
        field: Name
      - label: "Current Version"
        field: CurrentVersion
      - label: "Target Version"
        field: TargetVersion

  - title: "Update Results"
    type: table
    rows: update_results
    columns:
      - label: "Application"
        field: application
      - label: "Status"
        field: status
        badge: true
      - label: "Failed"
        field: failed
        badge: true

  - title: "KB Detection Status"
    type: table
    rows: kb_detection
    columns:
      - label: "KB"
        field: kb
      - label: "Installed"
        field: installed
        badge: true
      - label: "Detection Method"
        field: method

  - title: "Installed Software"
    type: table
    rows: health_software_versions
    columns:
      - label: "Name"
        field: name
      - label: "Version"
        field: version
      - label: "Publisher"
        field: publisher
