config:
  display_name: "VMware ESXi"
  platform: vmware/esxi
  stig:
    platform_to_checklist:
      esxi: cklb_skeletons/cklb_skeleton_vsphere7_esxi_V1R4.json
  extra_fleet_widget_columns:
    'Cluster': "{{ cluster }}"
    'Status': "{{ overall_status }}"
    'CPU %': "{{ cpu_used_pct }}"
    'Mem %': "{{ mem_used_pct }}"
    'VMs': "{{ vm_count }}"

vars:
  # Per-host fields (pre-assembled by collector)
  cluster:
    path: "raw_esxi.data.cluster"
    fallback: ''
  datacenter:
    path: "raw_esxi.data.datacenter"
    fallback: ''
  connection_state:
    path: "raw_esxi.data.connection_state"
    fallback: "unknown"
  overall_status:
    path: "raw_esxi.data.overall_status"
    fallback: "unknown"
  cpu_used_pct:
    path: "raw_esxi.data.cpu_used_pct"
    type: float
  mem_used_pct:
    path: "raw_esxi.data.mem_used_pct"
    type: float
  mem_mb_total:
    path: "raw_esxi.data.mem_mb_total"
    type: float
  mem_mb_used:
    path: "raw_esxi.data.mem_mb_used"
    type: float
  vm_count:
    path: "raw_esxi.data.vm_count"
    type: int
  uptime_seconds:
    path: "raw_esxi.data.uptime_seconds"
    type: float
  uptime_days:
    compute: "uptime_seconds / 86400"
    type: float
  version:
    path: "raw_esxi.data.version"
    fallback: ''
  build:
    path: "raw_esxi.data.build"
    fallback: ''
  in_maintenance_mode:
    path: "raw_esxi.data.in_maintenance_mode"
    type: bool
  lockdown_mode:
    path: "raw_esxi.data.lockdown_mode"
    fallback: "unknown"
  ssh_enabled:
    path: "raw_esxi.data.ssh_enabled"
    type: bool
  shell_enabled:
    path: "raw_esxi.data.shell_enabled"
    type: bool
  ntp_running:
    path: "raw_esxi.data.ntp_running"
    type: bool
  datastores:
    path: "raw_esxi.data.datastores"
    type: list
  nics:
    path: "raw_esxi.data.nics"
    type: list
  vmknics:
    path: "raw_esxi.data.vmknics"
    type: list
  hardware_alerts:
    path: "raw_esxi.data.hardware_alerts"
    type: list

alerts:
  - id: host_disconnected
    category: "Host Connectivity"
    severity: CRITICAL
    when: "connection_state == 'disconnected'"
    message: "ESXi host is disconnected from vCenter"

  - id: host_not_responding
    category: "Host Connectivity"
    severity: CRITICAL
    when: "connection_state == 'notResponding'"
    message: "ESXi host is not responding"

  - id: host_in_maintenance
    category: "Host Status"
    severity: WARNING
    when: "in_maintenance_mode == 1.0"
    message: "ESXi host is in maintenance mode"

  - id: mem_critical
    category: "Host Resources"
    severity: CRITICAL
    when: "mem_used_pct >= 95.0"
    message: "Memory utilization critically high at {{ mem_used_pct | round(0) }}%"

  - id: mem_warning
    category: "Host Resources"
    severity: WARNING
    suppress_if: mem_critical
    when: "mem_used_pct >= 85.0"
    message: "Memory utilization elevated at {{ mem_used_pct | round(0) }}%"

  - id: cpu_critical
    category: "Host Resources"
    severity: CRITICAL
    when: "cpu_used_pct >= 95.0"
    message: "CPU utilization critically high at {{ cpu_used_pct | round(0) }}%"

  - id: cpu_warning
    category: "Host Resources"
    severity: WARNING
    suppress_if: cpu_critical
    when: "cpu_used_pct >= 85.0"
    message: "CPU utilization elevated at {{ cpu_used_pct | round(0) }}%"

  - id: ssh_enabled
    category: "Security"
    severity: WARNING
    when: "ssh_enabled == 1.0"
    message: "SSH is enabled on this ESXi host"

  - id: shell_enabled
    category: "Security"
    severity: WARNING
    when: "shell_enabled == 1.0"
    message: "ESXi Shell is enabled on this host"

  - id: uptime_excessive
    category: "Host Lifecycle"
    severity: WARNING
    when: "uptime_days >= 90.0"
    message: "ESXi host has not been rebooted in {{ uptime_days | round(0) }} days — may be missing patches"

widgets:
  - title: "Active Alerts"
    type: alert_panel

  - title: "Host Overview"
    type: key_value
    layout: { width: "half" }
    fields:
      - label: "Connection State"
        field: connection_state
        badge: true
      - label: "Overall Status"
        field: overall_status
        badge: true
      - label: "Cluster"
        field: cluster
      - label: "Datacenter"
        field: datacenter
      - label: "Version"
        field: version
      - label: "Build"
        field: build
      - label: "Maintenance Mode"
        field: in_maintenance_mode
        badge: true
      - label: "Lockdown Mode"
        field: lockdown_mode

  - id: resource_kpis
    title: "Resource Utilization"
    type: stat_cards
    layout: { width: "half" }
    cards:
      - { field: cpu_used_pct, label: "CPU %", format: "{{ value | round(0) }}%", color: auto, thresholds: { 80: yellow, 90: red } }
      - { field: mem_used_pct, label: "Mem %", format: "{{ value | round(0) }}%", color: auto, thresholds: { 80: yellow, 90: red } }
      - { field: vm_count, label: "VMs" }
      - { field: uptime_days, label: "Uptime (days)", format: "{{ value | round(0) }}" }

  - title: "Security & Services"
    type: key_value
    layout: { width: "half" }
    fields:
      - label: "SSH Enabled"
        field: ssh_enabled
        badge: true
      - label: "Shell Enabled"
        field: shell_enabled
        badge: true
      - label: "NTP Running"
        field: ntp_running
        badge: true

  - title: "Datastores"
    type: table
    rows: datastores
    columns:
      - label: "Name"
        field: name
      - label: "Total"
        field: total
      - label: "Free"
        field: free

  - title: "Physical NICs"
    type: table
    rows: nics
    columns:
      - label: "Device"
        field: device
      - label: "Status"
        field: link_status
        badge: true
      - label: "Speed (Mbps)"
        field: speed_mbps
      - label: "Driver"
        field: driver
      - label: "Switch"
        field: switch
