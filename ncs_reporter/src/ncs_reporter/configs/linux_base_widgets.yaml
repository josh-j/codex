# Shared Linux widgets — included by linux.yaml, photon.yaml, etc.


- id: headline_kpis
  title: "Key Metrics"
  type: stat_cards
  # Thresholds for these vars are declared in linux_base_fields.yaml
  cards:
    'Uptime (d)': "{{ uptime_days | round(0) }}"
    'Mem Used %': "{{ memory_used_pct | round(1) }}%"
    'Failed Svcs': "{{ failed_services_count }}"
    'Pending Updates': "{{ pending_updates_count }}"

- title: "System Overview"
  type: key_value
  fields:
    - label: "Hostname"
      field: "{{ hostname }}"
    - label: "IP Address"
      field: "{{ ip_address }}"
    - label: "Distribution"
      field: "{{ distribution }}"
    - label: "Version"
      field: "{{ distribution_version }}"
    - label: "Kernel"
      field: "{{ kernel }}"
    - { label: "Uptime (days)", field: "{{ uptime_days }}", format: "{{ value | round(1) }}" }
    - { label: "Load Avg (15m)", field: "{{ load_avg_15m }}", format: "{value:.2f}" }

- title: "Memory"
  type: key_value
  fields:
    - { label: "Total (MB)", field: "{{ memory_total_mb }}", format: "{{ value | round(1) }}" }
    - { label: "Free (MB)", field: "{{ memory_free_mb }}", format: "{{ value | round(1) }}" }
    - { label: "Used %", field: "{{ memory_used_pct }}", format: "{{ value | round(1) }}" }
    - { label: "Swap Total (MB)", field: "{{ swap_total_mb }}", format: "{{ value | round(1) }}" }
    - { label: "Swap Used %", field: "{{ swap_used_pct }}", format: "{{ value | round(1) }}" }

- title: "Patching & Services"
  type: key_value
  fields:
    'Failed Services': "{{ failed_services_count }}"
    'Pending Updates': "{{ pending_updates_count }}"
    'Reboot Required': "{{ reboot_pending }}"

- title: "Filesystems"
  type: table
  rows: "{{ disks }}"
  columns:
    'Mount': "{{ mount }}"
    'Device': "{{ device }}"
    'FS Type': "{{ fstype }}"
    'Total (GB)': "{{ total_gb }}"
    'Free (GB)': "{{ free_gb }}"
    'Used % [badge]': "{{ used_pct }}"
