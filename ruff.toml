line-length = 120
target-version = "py310"

exclude = [
    "collections_vcsa",
    "collections",
    ".venv",
    ".venv-vcsa",
]

[lint]
# E402: Ansible modules/plugins put imports after DOCUMENTATION strings (standard pattern)
per-file-ignores = { "internal/core/plugins/modules/*.py" = ["E402"], "internal/core/tests/*.py" = ["E402"] }
