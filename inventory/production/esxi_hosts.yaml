---
# ESXi hosts grouped by managing vCenter.
# ansible_host on each ESXi entry points to its managing vCenter.
# These are "phantom" inventory entries for --limit targeting only —
# playbooks connect to the vCenter API, never SSH to ESXi directly.
#
# Populate hosts by running discovery or adding them manually:
#   just refresh-esxi-inventory
all:
  children:
    esxi_hosts:
      vars:
        vmware_validate_certs: false
      children:
        esxi_aedw:
          vars:
            ansible_host: vcsa-aedw.area52.afnoapps.usaf.mil
          hosts: {}
        esxi_ashe:
          vars:
            ansible_host: vcsa-ashe.area52.afnoapps.usaf.mil
          hosts: {}
        esxi_gfpy:
          vars:
            ansible_host: vcsa-gfpy.area52.afnoapps.usaf.mil
          hosts: {}
        esxi_mqna:
          vars:
            ansible_host: vcsa-mqna.area52.afnoapps.usaf.mil
          hosts: {}
        esxi_sdhm:
          vars:
            ansible_host: vcsa-sdhm.area52.afnoapps.usaf.mil
          hosts: {}
        esxi_tyfq:
          vars:
            ansible_host: vcsa-tyfq.area52.afnoapps.usaf.mil
          hosts: {}
