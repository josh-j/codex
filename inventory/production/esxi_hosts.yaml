---
# ESXi hosts grouped by managing vCenter.
# _ncs_vcenter links each group to its vCenter for API routing.
# These are "phantom" inventory entries for --limit targeting only —
# playbooks connect to the vCenter API, never SSH to ESXi directly.
#
# Populate hosts by running discovery or adding them manually:
#   just refresh-esxi-inventory
all:
  children:
    esxi_hosts:
      vars:
        vmware_validate_certs: false
      children:
        esxi_aedw:
          vars:
            _ncs_vcenter: vcsa-aedw
          hosts: {}
        esxi_ashe:
          vars:
            _ncs_vcenter: vcsa-ashe
          hosts: {}
        esxi_gfpy:
          vars:
            _ncs_vcenter: vcsa-gfpy
          hosts: {}
        esxi_mqna:
          vars:
            _ncs_vcenter: vcsa-mqna
          hosts: {}
        esxi_sdhm:
          vars:
            _ncs_vcenter: vcsa-sdhm
          hosts: {}
        esxi_tyfq:
          vars:
            _ncs_vcenter: vcsa-tyfq
          hosts: {}
